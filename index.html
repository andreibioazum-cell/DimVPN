
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enof Vault P2P</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="neon-theme">
    <canvas id="particle-canvas"></canvas>

    <!-- 1. Экран приветствия -->
    <div id="step-welcome" class="neon-overlay" style="display: flex;">
        <div class="welcome-card">
            <h1 class="neon-text-yellow" style="font-size: 54px; margin-bottom: 10px;">Enof</h1>
            <p class="welcome-desc">Децентрализованный узел в защищенной P2P сети.</p>
            <div class="features">
                <div class="feature-item"><i data-lucide="shield-alert"></i> <span>Шифрование данных</span></div>
                <div class="feature-item"><i data-lucide="eye-off"></i> <span>Никаких серверов и слежки</span></div>
                <div class="feature-item"><i data-lucide="trash-2"></i> <span>Самоуничтожение данных</span></div>
            </div>
            <button id="to-auth-btn" class="neon-btn" disabled>Синхронизация модулей (5)...</button>
        </div>
    </div>

    <!-- 2. Авторизация -->
    <div id="step-auth" class="neon-overlay">
        <div class="welcome-card">
            <h2 class="neon-text-yellow">Авторизация</h2>
            <p class="welcome-desc">Введите ключ доступа к узлу</p>
            <div class="search-wrap"><input type="text" id="auth-name" placeholder="Имя"></div>
            <div class="search-wrap"><input type="password" id="auth-pass" placeholder="Пароль"></div>
            <button id="auth-submit-btn" class="neon-btn">Установить соединение</button>
        </div>
    </div>

    <!-- 3. Настройка профиля -->
    <div id="step-profile" class="neon-overlay">
        <div class="welcome-card">
            <h2 class="neon-text-yellow">Личность</h2>
            <div class="avatar-huge-wrap"><div id="avatar-preview" class="avatar-huge" onclick="document.getElementById('avatar-input').click()">?</div></div>
            <input type="file" id="avatar-input" hidden accept="image/*">
            <button id="finish-reg-btn" class="neon-btn">Запустить систему</button>
        </div>
    </div>

    <!-- Главная панель (HUB) -->
    <div class="sidebar" id="sidebar">
        <div class="glass-header">
            <div id="my-avatar-mini" class="neon-avatar" style="width: 80px; height: 80px; margin-bottom: 15px;">?</div>
            <h2 id="my-display-name" class="neon-text-yellow" style="font-size: 22px; margin-bottom: 5px; font-weight: 600;">Пользователь</h2>
            
            <div class="my-id-badge" id="my-id-btn" style="margin-bottom: 25px;">
                <span id="my-id" class="neon-text-yellow" style="font-size: 13px; font-weight: bold;">загрузка...</span>
            </div>

            <div class="search-wrap">
                <input type="text" id="connect-to-id" placeholder="ID узла друга">
            </div>

            <button id="connect-btn" class="neon-btn">УСТАНОВИТЬ СВЯЗЬ</button>
            
            <button class="icon-btn" onclick="panicButton()" style="margin-top: 20px; color: #ff3b30 !important; font-size: 10px; display: flex; align-items: center; gap: 5px;">
                <i data-lucide="power" style="width: 12px;"></i> УНИЧТОЖИТЬ ДАННЫЕ
            </button>
        </div>
        <div class="chat-list" id="chat-list"></div>
    </div>

    <!-- Окно переписки -->
    <div class="main-content" id="main-content">
        <div class="glass-header-chat">
            <button class="icon-btn" id="back-btn"><i data-lucide="chevron-left"></i></button>
            <div class="user-meta">
                <div id="header-avatar" class="neon-avatar" style="width: 40px; height: 40px;"><i data-lucide="user"></i></div>
                <div>
                    <h3 id="header-name" class="neon-text-yellow">...</h3>
                    <p id="header-status" class="neon-text-yellow" style="font-size: 10px; opacity: 0.8; display: flex; align-items: center; gap: 4px;">
                        <i data-lucide="shield-check" style="width: 10px; height: 10px;"></i> Канал зашифрован
                    </p>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="self-destruct-btn" title="Самоуничтожение"><i data-lucide="timer"></i></button>
                <button class="icon-btn" id="call-btn"><i data-lucide="phone"></i></button>
            </div>
        </div>
        <div class="messages-container" id="messages-container"></div>
        <div class="input-wrap">
            <div id="destruct-indicator" style="display: none; color: #ff3b30; font-size: 10px; text-align: center; margin-bottom: 5px;">
                Режим самоуничтожения включен
            </div>
            <div class="input-inner">
                <button id="attach-btn" class="icon-btn"><i data-lucide="plus"></i></button>
                <input type="file" id="file-input" style="display: none;">
                <input type="text" id="message-input" placeholder="Введите зашифрованное сообщение..." autocomplete="off">
                <button id="send-btn" class="send-neon"><i data-lucide="lock"></i></button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
