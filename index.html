
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram P2P</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <!-- Главное меню -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="action-btn"><i data-lucide="menu"></i></button>
            <div style="flex: 1; margin-left: 10px;">
                <h2 style="font-size: 18px;">Мой ID: <span id="my-id" style="color: var(--tg-blue); cursor: pointer;">загрузка...</span></h2>
                <p style="font-size: 11px; color: var(--tg-hint);">нажмите, чтобы скопировать</p>
            </div>
        </div>
        <div class="p-3" style="padding: 15px; border-bottom: 1px solid #eee;">
            <div class="search-container">
                <i data-lucide="user-plus" class="search-icon"></i>
                <input type="text" id="connect-to-id" placeholder="Введите ID друга для чата">
            </div>
            <button id="connect-btn" style="width: 100%; margin-top: 10px; padding: 10px; background: var(--tg-blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 500;">
                Начать чат
            </button>
        </div>
        <div class="chat-list" id="chat-list">
            <!-- Активные соединения появятся здесь -->
        </div>
    </div>

    <!-- Окно переписки -->
    <div class="main-content" id="main-content">
        <div class="chat-header">
            <button class="back-btn" id="back-btn"><i data-lucide="arrow-left"></i></button>
            <div class="header-info">
                <div id="header-avatar-placeholder" class="avatar" style="width: 40px; height: 40px; margin-right: 10px; background: var(--tg-blue);">?</div>
                <div class="header-user-info">
                    <h3 id="header-name">Выберите контакт</h3>
                    <p id="header-status">ожидание подключения</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="action-btn" id="call-btn"><i data-lucide="phone"></i></button>
            </div>
        </div>

        <div class="messages-container" id="messages-container"></div>

        <div class="input-area">
            <input type="text" class="message-input" id="message-input" placeholder="Написать сообщение...">
            <button class="send-btn" id="send-btn"><i data-lucide="send"></i></button>
        </div>
    </div>

    <!-- Звонок -->
    <div id="call-overlay">
        <div class="call-avatar-container">
            <div class="pulse"></div>
            <div class="avatar" style="width: 140px; height: 140px; font-size: 50px;" id="call-avatar-placeholder">?</div>
        </div>
        <h2 id="call-name">Имя</h2>
        <p id="call-status-text">Звонок...</p>
        <div class="call-controls">
            <button class="call-btn btn-end" id="end-call-btn"><i data-lucide="phone-off"></i></button>
            <button class="call-btn btn-accept" id="accept-call-btn" style="display: none;"><i data-lucide="phone"></i></button>
        </div>
        <audio id="remote-audio" autoplay></audio>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
