
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enof Vault</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body class="neon-theme">
    <canvas id="particle-canvas"></canvas>

    <!-- 1. Приветствие -->
    <div id="step-welcome" class="neon-overlay" style="display: flex;">
        <div class="welcome-card">
            <h1 class="neon-text-yellow" style="font-size: 54px; margin-bottom: 10px;">Enof</h1>
            <p class="welcome-desc">Децентрализованный узел в защищенной P2P сети.</p>
            <div class="features">
                <div class="feature-item"><i data-lucide="shield-alert"></i> <span>Шифрование данных</span></div>
                <div class="feature-item"><i data-lucide="eye-off"></i> <span>Никаких серверов</span></div>
                <div class="feature-item"><i data-lucide="trash-2"></i> <span>Удаление по кнопке</span></div>
            </div>
            <button id="to-auth-btn" class="neon-btn" disabled>Синхронизация (5)...</button>
        </div>
    </div>

    <!-- 2. Авторизация -->
    <div id="step-auth" class="neon-overlay">
        <div class="welcome-card">
            <h2 class="neon-text-yellow">Авторизация</h2>
            <p class="welcome-desc">Вход в защищенный профиль</p>
            <div class="search-wrap"><input type="text" id="auth-name" placeholder="Имя пользователя"></div>
            <div class="search-wrap"><input type="password" id="auth-pass" placeholder="Пароль"></div>
            <button id="auth-submit-btn" class="neon-btn">Войти</button>
        </div>
    </div>

    <!-- 3. Фото -->
    <div id="step-profile" class="neon-overlay">
        <div class="welcome-card">
            <h2 class="neon-text-yellow">Фото профиля</h2>
            <div class="avatar-huge-wrap">
                <div id="avatar-preview" class="avatar-huge" onclick="document.getElementById('avatar-input').click()">?</div>
            </div>
            <input type="file" id="avatar-input" hidden accept="image/*">
            <p class="welcome-desc" style="font-size: 12px;">Нажмите на круг выше для выбора фото</p>
            <button id="finish-reg-btn" class="neon-btn">Начать общение</button>
        </div>
    </div>

    <!-- HUB -->
    <div class="sidebar" id="sidebar">
        <div class="glass-header">
            <div id="my-avatar-mini" class="neon-avatar" style="width: 80px; height: 80px; margin-bottom: 15px;">?</div>
            <h2 id="my-display-name" class="neon-text-yellow" style="font-size: 24px; font-weight: 700;">...</h2>
            
            <div class="my-id-badge" id="my-id-btn" style="margin-bottom: 25px;">
                <span id="my-id" class="neon-text-yellow" style="font-size: 13px; font-weight: bold;">загрузка...</span>
            </div>

            <div class="search-wrap"><input type="text" id="connect-to-id" placeholder="ID собеседника"></div>
            <button id="connect-btn" class="neon-btn">УСТАНОВИТЬ СВЯЗЬ</button>
            
            <!-- Понятная кнопка удаления -->
            <button class="neon-btn" onclick="panicButton()" style="margin-top: 25px; border-color: #ff3b30; color: #ff3b30 !important; font-size: 13px; box-shadow: 0 0 10px rgba(255, 59, 48, 0.3);">
                <i data-lucide="trash-2" style="width: 14px; margin-right: 8px; vertical-align: middle;"></i> УДАЛИТЬ МОЙ ПРОФИЛЬ
            </button>
        </div>
        <div class="chat-list" id="chat-list"></div>
    </div>

    <!-- ЧАТ -->
    <div class="main-content" id="main-content">
        <div class="glass-header-chat">
            <button class="icon-btn" id="back-btn"><i data-lucide="chevron-left"></i></button>
            <div class="user-meta">
                <div id="header-avatar" class="neon-avatar" style="width: 40px; height: 40px;"><i data-lucide="user"></i></div>
                <div>
                    <h3 id="header-name" class="neon-text-yellow">...</h3>
                    <p class="neon-text-yellow" style="font-size: 10px; opacity: 0.7;">на связи</p>
                </div>
            </div>
            <button class="icon-btn" id="call-btn"><i data-lucide="phone"></i></button>
        </div>
        <div class="messages-container" id="messages-container"></div>
        <div class="input-wrap">
            <div class="input-inner">
                <button id="attach-btn" class="icon-btn"><i data-lucide="plus"></i></button>
                <input type="file" id="file-input" style="display: none;">
                <input type="text" id="message-input" placeholder="Зашифрованное сообщение..." autocomplete="off">
                <button id="send-btn" class="send-neon"><i data-lucide="send"></i></button>
            </div>
        </div>
    </div>

    <!-- Звонок -->
    <div id="call-overlay" class="neon-overlay">
        <div class="call-card-neon">
            <div class="avatar-huge-wrap"><div id="call-avatar-container" class="avatar-huge">?</div></div>
            <h2 id="call-name" class="neon-text-yellow">User</h2>
            <p id="call-status" class="neon-text-yellow">ВЫЗОВ...</p>
            <div class="call-btns">
                <button class="c-btn-neon c-red" id="end-call-btn"><i data-lucide="x"></i></button>
                <button class="c-btn-neon c-green" id="accept-call-btn" style="display: none;"><i data-lucide="check"></i></button>
            </div>
        </div>
        <audio id="remote-audio" autoplay></audio>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
