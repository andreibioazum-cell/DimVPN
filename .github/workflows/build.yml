name: Build DimOpenOS Runner v9

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: mkdir -p app/src/main/java/com/dim/openos/core app/src/main/res/layout gradle/wrapper

      - name: Create Proxy Engine
        run: |
          cat > app/src/main/java/com/dim/openos/core/ProxyActivity.java << 'EOF'
          package com.dim.openos.core;
          import android.app.Activity;
          import android.content.res.AssetManager;
          import android.content.res.Resources;
          import android.os.Bundle;
          import android.widget.Toast;
          import dalvik.system.DexClassLoader;
          import java.lang.reflect.Method;

          public class ProxyActivity extends Activity {
              protected String apkPath;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  apkPath = getIntent().getStringExtra("apkPath");
                  try {
                      // 1. Загрузка кода
                      DexClassLoader loader = new DexClassLoader(apkPath, getCacheDir().getAbsolutePath(), null, getClassLoader());
                      // 2. Попытка найти главный класс (упрощенно)
                      Toast.makeText(this, "Virtual Launch: " + apkPath, Toast.LENGTH_SHORT).show();
                      // В реальной ВМ здесь идет запуск onCreate загруженного класса
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }
              // Переопределение ресурсов, чтобы APK видел СВОИ картинки
              @Override public Resources getResources() { 
                  if (apkPath == null) return super.getResources();
                  try {
                      AssetManager am = AssetManager.class.newInstance();
                      Method addAssetPath = am.getClass().getMethod("addAssetPath", String.class);
                      addAssetPath.invoke(am, apkPath);
                      return new Resources(am, super.getResources().getDisplayMetrics(), super.getResources().getConfiguration());
                  } catch (Exception e) { return super.getResources(); }
              }
          }
          EOF

      - name: Update MainActivity (Launcher)
        run: |
          cat > app/src/main/java/com/dim/openos/MainActivity.java << 'EOF'
          package com.dim.openos;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.widget.*;
          import com.dim.openos.core.ProxyActivity;
          import java.io.*;
          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private ArrayList<File> installedFiles = new ArrayList<>();
              private ArrayAdapter<String> adapter;
              private ArrayList<String> names = new ArrayList<>();

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout l = new LinearLayout(this);
                  l.setOrientation(LinearLayout.VERTICAL);
                  l.setBackgroundColor(0xFF000000);

                  GridView g = new GridView(this);
                  g.setNumColumns(3);
                  adapter = new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, names);
                  g.setAdapter(adapter);

                  Button btn = new Button(this);
                  btn.setText("INSTALL APK");
                  btn.setOnClickListener(v -> {
                      Intent i = new Intent(Intent.ACTION_GET_CONTENT);
                      i.setType("application/vnd.android.package-archive");
                      startActivityForResult(i, 7);
                  });

                  l.addView(btn); l.addView(g);
                  setContentView(l);

                  g.setOnItemClickListener((p, v, pos, id) -> {
                      Intent intent = new Intent(this, ProxyActivity.class);
                      intent.putExtra("apkPath", installedFiles.get(pos).getAbsolutePath());
                      startActivity(intent);
                  });
                  refresh();
              }

              @Override
              protected void onActivityResult(int req, int res, Intent data) {
                  if (req == 7 && res == RESULT_OK) {
                      try {
                          File dir = new File(getFilesDir(), "v_apps");
                          if (!dir.exists()) dir.mkdirs();
                          File dest = new File(dir, "app_" + System.currentTimeMillis() + ".apk");
                          InputStream in = getContentResolver().openInputStream(data.getData());
                          OutputStream out = new FileOutputStream(dest);
                          byte[] buf = new byte[4096]; int len;
                          while ((len = in.read(buf)) > 0) out.write(buf, 0, len);
                          in.close(); out.close();
                          refresh();
                      } catch (Exception e) { Toast.makeText(this, "Fail", 0).show(); }
                  }
              }

              private void refresh() {
                  installedFiles.clear(); names.clear();
                  File dir = new File(getFilesDir(), "v_apps");
                  if (dir.exists()) {
                      for (File f : dir.listFiles()) {
                          installedFiles.add(f);
                          names.add(f.getName());
                      }
                  }
                  adapter.notifyDataSetChanged();
              }
          }
          EOF

      - name: Finalize Build
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.dim.openos'; compileSdk 34; defaultConfig { applicationId "com.dim.openos"; minSdk 21; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimOpenOS" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity>
                  <activity android:name=".core.ProxyActivity" />
              </application>
          </manifest>
          EOF
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimOpenOS-Runner-v9
          path: app/build/outputs/apk/debug/*.apk
