name: Build DimCheat Overlay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/java/com/dimcheat/app
          mkdir -p gradle/wrapper

      - name: Create Overlay Service (Плавающее окно)
        run: |
          cat > app/src/main/java/com/dimcheat/app/OverlayService.java << 'EOF'
          package com.dimcheat.app;

          import android.app.Service;
          import android.content.Intent;
          import android.graphics.PixelFormat;
          import android.os.IBinder;
          import android.view.Gravity;
          import android.view.LayoutInflater;
          import android.view.View;
          import android.view.WindowManager;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Toast;

          public class OverlayService extends Service {
              private WindowManager wm;
              private View floatingView;

              @Override
              public IBinder onBind(Intent intent) { return null; }

              @Override
              public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  floatingView = LayoutInflater.from(this).inflate(R.layout.overlay_layout, null);

                  final WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                      PixelFormat.TRANSLUCENT);

                  params.gravity = Gravity.TOP | Gravity.LEFT;
                  params.x = 100;
                  params.y = 100;

                  wm.addView(floatingView, params);

                  Button btnScan = floatingView.findViewById(R.id.btnScan);
                  btnScan.setOnClickListener(v -> {
                      Toast.makeText(this, "Поиск значения в памяти...", Toast.LENGTH_SHORT).show();
                      // Здесь вызывается логика SandHook
                  });
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (floatingView != null) wm.removeView(floatingView);
              }
          }
          EOF

      - name: Create UI for Overlay
        run: |
          cat > app/src/main/res/layout/overlay_layout.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="wrap_content" android:layout_height="wrap_content"
              android:background="#CC000000" android:padding="10dp" android:orientation="vertical">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
                  android:text="DimCheat Engine" android:textColor="#00FF00" android:textStyle="bold"/>
              <EditText android:id="@+id/editValue" android:layout_width="100dp" 
                  android:layout_height="wrap_content" android:hint="Значение" android:textColorHint="#AAA" android:textColor="#FFF"/>
              <Button android:id="@+id/btnScan" android:layout_width="match_parent" 
                  android:layout_height="wrap_content" android:text="SCAN"/>
          </LinearLayout>
          EOF

      - name: Create MainActivity (Запрос разрешений)
        run: |
          cat > app/src/main/java/com/dimcheat/app/MainActivity.java << 'EOF'
          package com.dimcheat.app;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Button btn = new Button(this);
                  btn.setText("ЗАПУСТИТЬ ОВЕРЛЕЙ");
                  setContentView(btn);

                  btn.setOnClickListener(v -> {
                      if (!Settings.canDrawOverlays(this)) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                                  Uri.parse("package:" + getPackageName()));
                          startActivityForResult(intent, 123);
                      } else {
                          startService(new Intent(this, OverlayService.class));
                      }
                  });
              }
          }
          EOF

      - name: Create AndroidManifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application android:label="DimCheat" android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".OverlayService" android:exported="false"/>
              </application>
          </manifest>
          EOF

      - name: Project Configs (With SandHook)
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects {
              repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } }
          }
          EOF
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.dimcheat.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimcheat.app"
                  minSdk 21
                  targetSdk 34
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              // Библиотека для хуков в реальном времени
              implementation 'com.github.ganyao114:SandHook:1.5.2'
          }
          EOF
          echo "include ':app'" > settings.gradle

      - name: Build APK
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          printf "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimCheat-Overlay
          path: app/build/outputs/apk/debug/*.apk
