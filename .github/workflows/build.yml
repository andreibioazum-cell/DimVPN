name: DimOS_Ultimate_Build_Fixed
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize DimOS Project Structure
        run: |
          # Создаем структуру папок
          mkdir -p app/src/main/java/com/dimos
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/libs

          # 1. Корневой build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 2. settings.gradle
          echo "include ':app'" > settings.gradle

          # 3. build.gradle для модуля
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dimos'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimos.launcher"
                  minSdk 26
                  targetSdk 34
                  versionCode 3
                  versionName "1.2-Ultimate"
              }
          }
          EOF

          # 4. AndroidManifest.xml
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application android:label="DimOS Ultimate" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. Код MainActivity.java
          cat <<EOF > app/src/main/java/com/dimos/MainActivity.java
          package com.dimos;

          import android.app.Activity;
          import android.app.AlertDialog;
          import android.graphics.Color;
          import android.os.*;
          import android.view.Gravity;
          import android.view.View;
          import android.widget.*;
          import org.json.JSONObject;
          import java.io.*;
          import java.net.URL;
          import java.util.Scanner;

          public class MainActivity extends Activity {
              LinearLayout root;
              String internalRoot;
              int systemBgColor = Color.parseColor("#121212");

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  internalRoot = getFilesDir().getAbsolutePath();
                  new File(internalRoot + "/apps").mkdirs();
                  showDesktop();
              }

              private void showDesktop() {
                  prepareLayout(systemBgColor);
                  addLabel("DimOS Ultimate", 28, Color.CYAN);
                  
                  LinearLayout toolbar = new LinearLayout(this);
                  addToolButton(toolbar, "📂 Файлы", v -> showFileManager(internalRoot));
                  addToolButton(toolbar, "🌐 Маркет", v -> showAppInstaller());
                  addToolButton(toolbar, "📝 Создать", v -> showEditor());
                  root.addView(toolbar);

                  File appsDir = new File(internalRoot + "/apps");
                  File[] apps = appsDir.listFiles();
                  if (apps != null) {
                      for (File app : apps) {
                          if (app.getName().endsWith(".dim")) {
                              addAppButton(app);
                          }
                      }
                  }
                  setContentView(root);
              }

              private void runDimEngine(File file) {
                  try {
                      String content = new Scanner(file).useDelimiter("\\\\Z").next();
                      JSONObject json = new JSONObject(content);
                      String script = json.getString("script");
                      String[] commands = script.split(";");
                      for (String cmd : commands) {
                          String c = cmd.trim();
                          if (c.startsWith("PRINT:")) Toast.makeText(this, c.substring(6), Toast.LENGTH_SHORT).show();
                          if (c.startsWith("SET_BG:")) { systemBgColor = Color.parseColor(c.substring(7).trim()); showDesktop(); }
                          if (c.startsWith("VIBE:")) { 
                             Vibrator v = (Vibrator) getSystemService(VIBRATOR_SERVICE);
                             v.vibrate(VibrationEffect.createOneShot(Integer.parseInt(c.substring(5).trim()), VibrationEffect.DEFAULT_AMPLITUDE));
                          }
                      }
                  } catch (Exception e) { Toast.makeText(this, "Error", Toast.LENGTH_SHORT).show(); }
              }

              private void showEditor() {
                  prepareLayout(Color.BLACK);
                  EditText ed = new EditText(this);
                  ed.setText("{\n \"appName\": \"Test\",\n \"icon\": \"⭐\",\n \"script\": \"PRINT: Work!\"\n}");
                  ed.setTextColor(Color.GREEN);
                  root.addView(ed);
                  addActionButton("Сохранить", v -> {
                      try { saveFile(internalRoot + "/apps/app_" + System.currentTimeMillis() + ".dim", ed.getText().toString()); } catch(Exception e){}
                      showDesktop();
                  });
                  setContentView(root);
              }

              private void showAppInstaller() {
                  AlertDialog.Builder b = new AlertDialog.Builder(this);
                  b.setTitle("Install .dim");
                  final EditText input = new EditText(this);
                  b.setView(input);
                  b.setPositiveButton("Download", (d, w) -> {
                      new Thread(() -> {
                          try {
                              URL url = new URL(input.getText().toString());
                              Scanner s = new Scanner(url.openStream());
                              saveFile(internalRoot + "/apps/web.dim", s.useDelimiter("\\\\Z").next());
                              runOnUiThread(this::showDesktop);
                          } catch (Exception e) {}
                      }).start();
                  });
                  b.show();
              }

              private void showFileManager(String path) {
                  prepareLayout(Color.DKGRAY);
                  File dir = new File(path);
                  File[] files = dir.listFiles();
                  if (files != null) {
                      for (File f : files) addActionButton((f.isDirectory() ? "[D] " : "[F] ") + f.getName(), null);
                  }
                  addActionButton("Назад", v -> showDesktop());
                  setContentView(root);
              }

              private void prepareLayout(int color) {
                  root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(color);
                  root.setPadding(40, 80, 40, 40);
              }

              private void addLabel(String t, int s, int c) {
                  TextView tv = new TextView(this); tv.setText(t); tv.setTextSize(s); tv.setTextColor(c); root.addView(tv);
              }

              private void addActionButton(String t, View.OnClickListener cl) {
                  Button b = new Button(this); b.setText(t); b.setOnClickListener(cl); root.addView(b);
              }

              private void addToolButton(LinearLayout l, String t, View.OnClickListener cl) {
                  Button b = new Button(this); b.setText(t); b.setTextSize(10); b.setOnClickListener(cl); l.addView(b);
              }

              private void addAppButton(File f) {
                  Button b = new Button(this); b.setText(f.getName()); b.setOnClickListener(v -> runDimEngine(f)); root.addView(b);
              }

              private void saveFile(String p, String d) throws IOException {
                  FileWriter fw = new FileWriter(p); fw.write(d); fw.close();
              }
          }
          EOF

      - name: Build DimOS APK
        # Используем системный gradle вместо ./gradlew
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimOS-v1-2-Kusman
          path: app/build/outputs/apk/debug/*.apk
