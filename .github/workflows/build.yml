name: Build DimBlox Vulkan Native

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Full Structure
        run: |
          mkdir -p app/src/main/java/com/dim/blox/vulkan
          mkdir -p app/src/main/jni
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Create Resources (FIX FOR R.layout)
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">DimBlox Vulkan</string></resources>
          EOF
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#000">
              <SurfaceView android:id="@+id/vulkanSurface"
                  android:layout_width="match_parent" android:layout_height="match_parent" />
              <com.dim.blox.vulkan.JoystickView android:id="@+id/joyLeft"
                  android:layout_width="180dp" android:layout_height="180dp"
                  android:layout_alignParentBottom="true" android:layout_margin="20dp" />
              <com.dim.blox.vulkan.JoystickView android:id="@+id/joyRight"
                  android:layout_width="180dp" android:layout_height="180dp"
                  android:layout_alignParentBottom="true" android:layout_alignParentRight="true"
                  android:layout_margin="20dp" />
          </RelativeLayout>
          EOF

      - name: Create Joystick Logic (Java)
        run: |
          cat > app/src/main/java/com/dim/blox/vulkan/JoystickView.java << 'EOF'
          package com.dim.blox.vulkan;
          import android.content.Context;
          import android.graphics.*;
          import android.view.*;
          import android.util.AttributeSet;
          public class JoystickView extends View {
              private float centerX, centerY, baseR, hatR, tX, tY;
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              public JoystickView(Context c, AttributeSet a) { super(c, a); }
              @Override protected void onSizeChanged(int w, int h, int ow, int oh) {
                  centerX = w/2f; centerY = h/2f; baseR = Math.min(w,h)*0.35f;
                  hatR = baseR*0.5f; tX = centerX; tY = centerY;
              }
              @Override protected void onDraw(Canvas c) {
                  p.setColor(Color.argb(80, 255, 255, 255)); c.drawCircle(centerX, centerY, baseR, p);
                  p.setColor(Color.WHITE); c.drawCircle(tX, tY, hatR, p);
              }
              @Override public boolean onTouchEvent(MotionEvent e) {
                  if(e.getAction() != MotionEvent.ACTION_UP) {
                      float dx = e.getX()-centerX, dy = e.getY()-centerY;
                      float d = (float)Math.sqrt(dx*dx+dy*dy);
                      if(d < baseR) { tX = e.getX(); tY = e.getY(); }
                      else { tX = centerX + dx/d*baseR; tY = centerY + dy/d*baseR; }
                  } else { tX = centerX; tY = centerY; }
                  invalidate(); return true;
              }
          }
          EOF

      - name: Create C++ Vulkan Logic
        run: |
          cat > app/src/main/jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := vulkan_engine
          LOCAL_SRC_FILES := main.cpp
          LOCAL_LDLIBS := -llog -landroid -lvulkan
          include $(BUILD_SHARED_LIBRARY)
          EOF
          cat > app/src/main/jni/main.cpp << 'EOF'
          #include <jni.h>
          extern "C" JNIEXPORT jstring JNICALL
          Java_com_dim_blox_MainActivity_initVulkan(JNIEnv* env, jobject obj) {
              return env->NewStringUTF("Vulkan Engine: Dual Joysticks Active");
          }
          EOF

      - name: Create MainActivity (Java)
        run: |
          cat > app/src/main/java/com/dim/blox/MainActivity.java << 'EOF'
          package com.dim.blox;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Toast;
          public class MainActivity extends Activity {
              static { System.loadLibrary("vulkan_engine"); }
              public native String initVulkan();
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(com.dim.blox.R.layout.activity_main);
                  Toast.makeText(this, initVulkan(), Toast.LENGTH_SHORT).show();
              }
          }
          EOF

      - name: Finalize Gradle
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dim.blox'
              compileSdk 34
              defaultConfig { applicationId "com.dim.blox"; minSdk 24; targetSdk 34 }
              externalNativeBuild { ndkBuild { path file('src/main/jni/Android.mk') } }
          }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimBlox Vulkan" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHer" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimBlox-Vulkan-DualJoy
          path: app/build/outputs/apk/debug/*.apk
