name: Build Working DimVPN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/java/com/dimvpn/app
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

      - name: Save VPN Config
        run: |
          cat > app/src/main/assets/config.json << 'EOF'
          {
            "remarks": "DimVPN ✅",
            "outbounds": [
              {
                "protocol": "vless",
                "settings": {
                  "vnext": [{"address": "test.bold-crown.test-cdn-kkk.com", "port": 443, "users": [{"id": "d8094751-0c2e-4ba3-ac2c-16d95c6fc707", "encryption": "none", "flow": "xtls-rprx-vision"}]}]
                },
                "streamSettings": {
                  "network": "tcp",
                  "security": "reality",
                  "realitySettings": {"serverName": "tradingview.com", "publicKey": "-tePObR3oZwGAUOb5kqTYkNWl6rtUKl0RFuzuu06wgw", "shortId": "50", "fingerprint": "qq"}
                }
              }
            ]
          }
          EOF

      - name: Create AndroidManifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application android:label="DimVPN" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/dimvpn/app/MainActivity.java << 'EOF'
          package com.dimvpn.app;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.VpnService;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Button btn = new Button(this);
                  btn.setText("ЗАПУСТИТЬ DIMVPN");
                  setContentView(btn);

                  btn.setOnClickListener(v -> {
                      Intent intent = VpnService.prepare(this);
                      if (intent != null) {
                          startActivityForResult(intent, 1);
                      } else {
                          onActivityResult(1, RESULT_OK, null);
                      }
                  });
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (resultCode == RESULT_OK) {
                      Toast.makeText(this, "DimVPN: Готов к работе!", Toast.LENGTH_LONG).show();
                  }
              }
          }
          EOF

      - name: Build Project Configs
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # Корневой build.gradle (упрощенный)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          EOF

          # Настройки репозиториев теперь должны быть здесь для Gradle 8+
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          include ':app'
          EOF

          # build.gradle приложения с исправленной зависимостью
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.dimvpn.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimvpn.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              // Используем стабильную ветку lib
              implementation 'com.github.2dust:androidLibV2rayLite:master-SNAPSHOT'
          }
          EOF

      - name: Setup Gradle Wrapper and Build
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip
          EOF
          
          printf '#!/bin/sh\nexec java -Xmx64m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimVPN-Installer
          path: app/build/outputs/apk/debug/*.apk
