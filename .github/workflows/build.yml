name: Build DimBlox Vulkan

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: mkdir -p app/src/main/java/com/dim/blox/vulkan app/src/main/res/layout gradle/wrapper

      - name: Create Joystick Logic
        run: |
          cat > app/src/main/java/com/dim/blox/vulkan/JoystickView.java << 'EOF'
          package com.dim.blox.vulkan;
          import android.content.Context;
          import android.graphics.*;
          import android.view.*;
          import android.util.AttributeSet;

          public class JoystickView extends View {
              private float centerX, centerY, baseRadius, hatRadius;
              private float touchX, touchY;
              private Paint p = new Paint();

              public JoystickView(Context ctx, AttributeSet attrs) {
                  super(ctx, attrs);
                  p.setAntiAlias(true);
              }

              @Override
              protected void onSizeChanged(int w, int h, int oldw, int oldh) {
                  centerX = w / 2f; centerY = h / 2f;
                  baseRadius = Math.min(w, h) * 0.4f;
                  hatRadius = baseRadius * 0.5f;
                  touchX = centerX; touchY = centerY;
              }

              @Override
              protected void onDraw(Canvas canvas) {
                  p.setColor(Color.argb(100, 255, 255, 255));
                  canvas.drawCircle(centerX, centerY, baseRadius, p);
                  p.setColor(Color.WHITE);
                  canvas.drawCircle(touchX, touchY, hatRadius, p);
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() != MotionEvent.ACTION_UP) {
                      float dx = e.getX() - centerX;
                      float dy = e.getY() - centerY;
                      float dist = (float) Math.sqrt(dx*dx + dy*dy);
                      if (dist < baseRadius) {
                          touchX = e.getX(); touchY = e.getY();
                      } else {
                          touchX = centerX + dx / dist * baseRadius;
                          touchY = centerY + dy / dist * baseRadius;
                      }
                  } else {
                      touchX = centerX; touchY = centerY;
                  }
                  invalidate();
                  return true;
              }
          }
          EOF

      - name: Create Vulkan Activity UI
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#000">

              <SurfaceView android:id="@+id/vulkanSurface"
                  android:layout_width="match_parent" android:layout_height="match_parent" />

              <com.dim.blox.vulkan.JoystickView
                  android:id="@+id/joystick"
                  android:layout_width="200dp" android:layout_height="200dp"
                  android:layout_alignParentBottom="true"
                  android:layout_alignParentLeft="true"
                  android:layout_margin="30dp" />

              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="VULKAN ENGINE ALPHA" android:textColor="#00FF00"
                  android:layout_centerHorizontal="true" android:layout_marginTop="10dp"/>
          </RelativeLayout>
          EOF

      - name: Create Main Activity
        run: |
          cat > app/src/main/java/com/dim/blox/MainActivity.java << 'EOF'
          package com.dim.blox;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.SurfaceView;
          import android.view.WindowManager;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  setContentView(R.layout.activity_main);
                  
                  // В реальном Vulkan проекте здесь подключается Native C++ код через System.loadLibrary("vulkan_engine")
              }
          }
          EOF

      - name: Setup Build
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { 
              namespace 'com.dim.blox'
              compileSdk 34
              defaultConfig { applicationId "com.dim.blox"; minSdk 24; targetSdk 34 }
              externalNativeBuild { ndkBuild { path 'src/main/jni/Android.mk' } } // Место для Vulkan C++
          }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-feature android:name="android.hardware.vulkan.version" android:required="true" />
              <application android:label="DimBlox Vulkan" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimBlox-Vulkan-Joystick-v24
          path: app/build/outputs/apk/debug/*.apk
