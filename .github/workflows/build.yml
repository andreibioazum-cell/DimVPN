name: Build DimCheat Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          mkdir -p app/src/main/java/com/dimcheat/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Create Logic (Overlay Fixed)
        run: |
          cat > app/src/main/java/com/dimcheat/app/OverlayService.java << 'EOF'
          package com.dimcheat.app;
          import android.app.Service;
          import android.content.Intent;
          import android.graphics.PixelFormat;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.view.*;
          import android.widget.*;
          import java.util.Random;

          public class OverlayService extends Service {
              private WindowManager wm;
              private View v;
              private Handler handler = new Handler(Looper.getMainLooper());

              @Override public IBinder onBind(Intent i) { return null; }

              @Override public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  v = LayoutInflater.from(this).inflate(R.layout.overlay_layout, null);

                  final WindowManager.LayoutParams p = new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                      PixelFormat.TRANSLUCENT);

                  p.gravity = Gravity.TOP | Gravity.START;
                  p.x = 100; p.y = 100;

                  TextView status = v.findViewById(R.id.txtStatus);
                  EditText edit = v.findViewById(R.id.editValue);

                  v.findViewById(R.id.btnScan).setOnClickListener(view -> {
                      status.setText("Scanning...");
                      status.setTextColor(0xFFFFFF00);
                      
                      handler.postDelayed(() -> {
                          int found = new Random().nextInt(200);
                          status.setText("Found: " + found + " addr");
                          status.setTextColor(0xFF00FF00);
                          Toast.makeText(this, "Scan Finished", Toast.LENGTH_SHORT).show();
                      }, 1200);
                  });

                  v.findViewById(R.id.btnClose).setOnClickListener(view -> stopSelf());

                  v.setOnTouchListener(new View.OnTouchListener() {
                      private int ix, iy; private float tx, ty;
                      @Override public boolean onTouch(View view, MotionEvent e) {
                          if(e.getAction()==MotionEvent.ACTION_DOWN){
                              ix=p.x; iy=p.y; tx=e.getRawX(); ty=e.getRawY(); return true;
                          }
                          if(e.getAction()==MotionEvent.ACTION_MOVE){
                              p.x=ix+(int)(e.getRawX()-tx); p.y=iy+(int)(e.getRawY()-ty);
                              wm.updateViewLayout(v, p); return true;
                          }
                          return false;
                      }
                  });
                  wm.addView(v, p);
              }
              @Override public void onDestroy() { super.onDestroy(); if(v!=null) wm.removeView(v); }
          }
          EOF

      - name: Create UI Layout
        run: |
          cat > app/src/main/res/layout/overlay_layout.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="140dp" android:layout_height="wrap_content"
              android:background="#F2111111" android:padding="10dp" android:orientation="vertical">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content" 
                  android:text="DIM ENGINE" android:textColor="#00FF00" android:gravity="center" android:textStyle="bold"/>
              <TextView android:id="@+id/txtStatus" android:layout_width="match_parent" android:layout_height="wrap_content" 
                  android:text="IDLE" android:textColor="#999" android:textSize="10sp" android:gravity="center"/>
              <EditText android:id="@+id/editValue" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:hint="Value" android:textColor="#FFF" android:inputType="number" android:textSize="14sp"/>
              <Button android:id="@+id/btnScan" android:layout_width="match_parent" android:layout_height="40dp"
                  android:text="SCAN" android:backgroundTint="#2196F3" android:layout_marginTop="5dp"/>
              <Button android:id="@+id/btnClose" android:layout_width="match_parent" android:layout_height="30dp" 
                  android:text="CLOSE" android:backgroundTint="#444" android:layout_marginTop="5dp"/>
          </LinearLayout>
          EOF

      - name: Create App Configs
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application android:label="DimCheat" android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity>
                  <service android:name=".OverlayService" android:exported="false" />
              </application>
          </manifest>
          EOF
          cat > app/src/main/java/com/dimcheat/app/MainActivity.java << 'EOF'
          package com.dimcheat.app;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          public class MainActivity extends Activity {
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  Button btn = new Button(this); btn.setText("START"); setContentView(btn);
                  btn.setOnClickListener(v -> {
                      if (!Settings.canDrawOverlays(this)) startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName())), 1);
                      else startService(new Intent(this, OverlayService.class));
                  });
              }
          }
          EOF
          echo "include ':app'" > settings.gradle
          printf "android.useAndroidX=true\nandroid.enableJetifier=true\nandroid.suppressUnsupportedCompileSdk=34" > gradle.properties
          echo "apply plugin: 'com.android.application'" > app/build.gradle
          echo "android { namespace 'com.dimcheat.app'; compileSdk 34; defaultConfig { applicationId 'com.dimcheat.app'; minSdk 21; targetSdk 34 } }" >> app/build.gradle
          echo "dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" >> app/build.gradle
          echo '<resources><style name="Theme.DimVPN" parent="Theme.AppCompat.DayNight.NoActionBar" /></resources>' > app/src/main/res/values/themes.xml

      - name: Setup Gradle Wrapper
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          printf "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimCheat-v1.6
          path: app/build/outputs/apk/debug/*.apk
