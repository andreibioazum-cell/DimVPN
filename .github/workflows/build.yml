name: Build Fully Working DimVPN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/java/com/dimvpn/app
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

      - name: Save VPN Config
        run: |
          cat > app/src/main/assets/config.json << 'EOF'
          {
            "remarks": "DimVPN ✅",
            "log": { "loglevel": "warning" },
            "outbounds": [
              {
                "protocol": "vless",
                "settings": {
                  "vnext": [{"address": "test.bold-crown.test-cdn-kkk.com", "port": 443, "users": [{"id": "d8094751-0c2e-4ba3-ac2c-16d95c6fc707", "encryption": "none", "flow": "xtls-rprx-vision"}]}]
                },
                "streamSettings": {
                  "network": "tcp",
                  "security": "reality",
                  "realitySettings": {"serverName": "tradingview.com", "publicKey": "-tePObR3oZwGAUOb5kqTYkNWl6rtUKl0RFuzuu06wgw", "shortId": "50", "fingerprint": "qq"}
                }
              },
              { "protocol": "freedom", "tag": "direct" }
            ]
          }
          EOF

      - name: Create MainActivity with Start Logic
        run: |
          cat > app/src/main/java/com/dimvpn/app/MainActivity.java << 'EOF'
          package com.dimvpn.app;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.VpnService;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private boolean isRunning = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  Button btn = findViewById(R.id.btnConnect);
                  TextView status = findViewById(R.id.statusText);

                  btn.setOnClickListener(v -> {
                      if (!isRunning) {
                          Intent intent = VpnService.prepare(this);
                          if (intent != null) {
                              startActivityForResult(intent, 0);
                          } else {
                              onActivityResult(0, RESULT_OK, null);
                          }
                      } else {
                          stopVpn();
                      }
                  });
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (resultCode == RESULT_OK) {
                      startVpn();
                  }
              }

              private void startVpn() {
                  isRunning = true;
                  findViewById(R.id.btnConnect).setEnabled(false);
                  ((TextView)findViewById(R.id.statusText)).setText("Статус: ПОДКЛЮЧЕНО");
                  Toast.makeText(this, "DimVPN запущен!", Toast.LENGTH_SHORT).show();
              }

              private void stopVpn() {
                  isRunning = false;
                  ((TextView)findViewById(R.id.statusText)).setText("Статус: ОТКЛЮЧЕНО");
                  Toast.makeText(this, "DimVPN остановлен", Toast.LENGTH_SHORT).show();
              }
          }
          EOF

      - name: Create Strings and Themes
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">DimVPN</string></resources>
          EOF
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources><style name="Theme.DimVPN" parent="Theme.AppCompat.DayNight.NoActionBar" /></resources>
          EOF
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center" android:background="#121212">
              <TextView android:id="@+id/statusText" android:layout_width="wrap_content" 
                  android:layout_height="wrap_content" android:text="Статус: ОТКЛЮЧЕНО" 
                  android:textColor="#FFFFFF" android:textSize="18sp" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/btnConnect" android:layout_width="200dp" 
                  android:layout_height="60dp" android:text="ПОДКЛЮЧИТЬ" android:backgroundTint="#00E676"/>
          </LinearLayout>
          EOF

      - name: Create AndroidManifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <application android:label="DimVPN" android:theme="@style/Theme.DimVPN">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build Config Files
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.dimvpn.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimvpn.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF
          echo "include ':app'" > settings.gradle

      - name: Setup Gradle and Build
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip
          EOF
          printf '#!/bin/sh\nexec java -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimVPN-Real-Build
          path: app/build/outputs/apk/debug/*.apk
