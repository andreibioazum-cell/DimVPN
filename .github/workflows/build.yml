name: Build DimBlox CSharp Corrected

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK (Fixed Action)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Android Workload
        run: dotnet workload install android

      - name: Create Project and Files
        shell: pwsh
        run: |
          # Создаем проект, если его нет
          if (-not (Test-Path "DimBloxApp")) {
              dotnet new android -n DimBloxApp
          }
          cd DimBloxApp

          # Создаем код рендерера (Твой 3D фундамент)
          $renderer = @"
          using System;
          using Android.Opengl;
          using javax.microedition.khronos.egl;
          using javax.microedition.khronos.opengles;

          namespace DimBlox {
              public class MyRenderer : Java.Lang.Object, GLSurfaceView.IRenderer {
                  public void OnSurfaceCreated(IGL10 gl, EGLConfig config) {
                      GLES30.GlClearColor(0.1f, 0.16f, 0.29f, 1.0f); // Цвет фона из style-core.css
                      GLES30.GlEnable(GLES30.GlDepthTest);
                  }
                  public void OnSurfaceChanged(IGL10 gl, int width, int height) {
                      GLES30.GlViewport(0, 0, width, height);
                  }
                  public void OnDrawFrame(IGL10 gl) {
                      GLES30.GlClear(GLES30.GlColorBufferBit | GLES30.GlDepthBufferBit);
                      // Сюда переносим отрисовку кубов из script.js
                  }
              }
          }
          "@
          $renderer | Out-File -FilePath MyRenderer.cs -Encoding utf8

          # Создаем Activity
          $activity = @"
          using Android.App;
          using Android.OS;
          using Android.Opengl;

          namespace DimBlox {
              [Activity(Label = "DimBlox Sharp", MainLauncher = true, Theme = "@android:style/Theme.NoTitleBar.Fullscreen", ScreenOrientation = Android.Content.PM.ScreenOrientation.Landscape)]
              public class MainActivity : Activity {
                  protected override void OnCreate(Bundle savedInstanceState) {
                      base.OnCreate(savedInstanceState);
                      var view = new GLSurfaceView(this);
                      view.SetEGLContextClientVersion(3);
                      view.SetRenderer(new MyRenderer());
                      SetContentView(view);
                  }
              }
          }
          "@
          $activity | Out-File -FilePath MainActivity.cs -Encoding utf8

      - name: Build Android APK
        run: |
          cd DimBloxApp
          dotnet build -c Release -f net8.0-android

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DimBlox-CSharp-v41
          path: DimBloxApp/bin/Release/net8.0-android/*-Signed.apk
