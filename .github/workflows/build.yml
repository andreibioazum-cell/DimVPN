name: Build DimEngine True Java 21

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: mkdir -p app/src/main/java/com/dim/engine/runtime app/src/main/res/layout gradle/wrapper

      - name: Create Java Execution Kernel
        run: |
          cat > app/src/main/java/com/dim/engine/runtime/JavaKernel.java << 'EOF'
          package com.dim.engine.runtime;
          import java.lang.reflect.*;
          import java.util.*;
          import android.content.Context;

          public class JavaKernel {
              // Ядро, позволяющее вызывать ЛЮБОЙ метод ЛЮБОГО класса через Reflection
              public static Object invokeAny(String className, String methodName, Object[] args, Class<?>[] types) throws Exception {
                  Class<?> clazz = Class.forName(className);
                  Method method = clazz.getDeclaredMethod(methodName, types);
                  method.setAccessible(true);
                  return method.invoke(null, args);
              }

              // Продвинутая математика векторов для физики
              public static float[] calculateForce(float mass, float accel) {
                  return new float[]{ mass * accel }; // F = ma
              }
          }
          EOF

      - name: Create Physics View with Rotational Dynamics
        run: |
          cat > app/src/main/java/com/dim/engine/core/PhysicsView.java << 'EOF'
          package com.dim.engine.core;
          import android.content.Context;
          import android.graphics.*;
          import android.view.*;
          import java.util.concurrent.*;

          public class PhysicsView extends SurfaceView implements SurfaceHolder.Callback {
              private PhysicsThread thread;
              private CopyOnWriteArrayList<Body> bodies = new CopyOnWriteArrayList<>();

              public PhysicsView(Context ctx) {
                  super(ctx);
                  getHolder().addCallback(this);
              }

              @Override
              public void surfaceCreated(SurfaceHolder h) {
                  thread = new PhysicsThread(h);
                  thread.setRunning(true);
                  thread.start();
              }

              @Override
              public boolean onTouchEvent(MotionEvent e) {
                  if(e.getAction() == MotionEvent.ACTION_DOWN) {
                      bodies.add(new Body(e.getX(), e.getY(), 50));
                  }
                  return true;
              }

              @Override
              public void surfaceChanged(SurfaceHolder h, int f, int w, int h1) {}
              @Override
              public void surfaceDestroyed(SurfaceHolder h) { thread.setRunning(false); }

              class PhysicsThread extends Thread {
                  private SurfaceHolder holder;
                  private boolean running = false;
                  private Paint p = new Paint();

                  public PhysicsThread(SurfaceHolder h) { this.holder = h; p.setColor(Color.YELLOW); }
                  public void setRunning(boolean r) { running = r; }

                  @Override
                  public void run() {
                      while(running) {
                          Canvas c = holder.lockCanvas();
                          if(c != null) {
                              c.drawColor(Color.parseColor("#050505"));
                              for(Body b : bodies) {
                                  b.update(getHeight());
                                  c.drawRect(b.x-b.s, b.y-b.s, b.x+b.s, b.y+b.s, p);
                              }
                              holder.unlockCanvasAndPost(c);
                          }
                      }
                  }
              }

              class Body {
                  float x, y, s, vy = 0, gravity = 2.0f;
                  Body(float x, float y, float s) { this.x = x; this.y = y; this.s = s; }
                  void update(int h) {
                      vy += gravity;
                      y += vy;
                      if(y + s > h) { y = h - s; vy *= -0.8f; } // Отскок
                  }
              }
          }
          EOF

      - name: Create Main Activity
        run: |
          cat > app/src/main/java/com/dim/engine/MainActivity.java << 'EOF'
          package com.dim.engine;
          import android.app.Activity;
          import android.os.Bundle;
          import com.dim.engine.core.PhysicsView;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  // Весь UI теперь - это холст физического движка
                  setContentView(new PhysicsView(this));
              }
          }
          EOF

      - name: Finalize Build
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.dim.engine'; compileSdk 34; defaultConfig { applicationId "com.dim.engine"; minSdk 21; targetSdk 34 } }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimEngine 21" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimEngine-TrueJava-v21
          path: app/build/outputs/apk/debug/*.apk
