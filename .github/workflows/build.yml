name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create Android project
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/dimvpn/app
          
      - name: Copy config
        run: cp config/config.json app/src/main/assets/config.json || echo "no config"
      
      - name: Create settings.gradle.kts
        run: |
          cat > settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "DimVPN"
          include(":app")
          EOF
      
      - name: Create build.gradle.kts
        run: |
          cat > app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.dimvpn.app"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.dimvpn.app"
                  minSdk = 21
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  debug {
                      isMinifyEnabled = false
                  }
              }
              
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              
              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF
      
      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              
              <application android:label="DimVPN">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <service android:name=".VpnService" android:permission="android.permission.BIND_VPN_SERVICE" />
              </application>
          </manifest>
          EOF
      
      - name: Create MainActivity.kt
        run: |
          cat > app/src/main/java/com/dimvpn/app/MainActivity.kt << 'EOF'
          package com.dimvpn.app

          import android.content.Intent
          import android.net.VpnService
          import android.os.Bundle
          import android.widget.Button
          import android.widget.LinearLayout
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat

          class MainActivity : AppCompatActivity() {
              private var isRunning = false
              
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  
                  val layout = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setBackgroundColor(android.graphics.Color.parseColor("#1a1a1a"))
                      setPadding(50, 50, 50, 50)
                  }
                  
                  val title = TextView(this).apply {
                      text = "DimVPN"
                      textSize = 32f
                      setTextColor(android.graphics.Color.parseColor("#4CAF50"))
                      textAlignment = TextView.TEXT_ALIGNMENT_CENTER
                  }
                  
                  val statusText = TextView(this).apply {
                      text = "Статус: Отключено"
                      textSize = 18f
                      setTextColor(android.graphics.Color.WHITE)
                      textAlignment = TextView.TEXT_ALIGNMENT_CENTER
                      setPadding(0, 50, 0, 50)
                  }
                  
                  val toggleButton = Button(this).apply {
                      text = "ЗАПУСТИТЬ VPN"
                      setBackgroundColor(android.graphics.Color.parseColor("#4CAF50"))
                      setTextColor(android.graphics.Color.WHITE)
                      setOnClickListener {
                          if (isRunning) stopVPN(statusText, this)
                          else startVPN(statusText, this)
                      }
                  }
                  
                  layout.addView(title)
                  layout.addView(statusText)
                  layout.addView(toggleButton)
                  setContentView(layout)
              }
              
              private fun startVPN(statusText: TextView, button: Button) {
                  val intent = VpnService.prepare(this)
                  if (intent != null) {
                      startActivityForResult(intent, 0)
                  } else {
                      onActivityResult(0, RESULT_OK, null)
                  }
                  
                  isRunning = true
                  statusText.text = "Статус: Подключено"
                  button.text = "ОСТАНОВИТЬ VPN"
                  Toast.makeText(this, "VPN запущен", Toast.LENGTH_SHORT).show()
              }
              
              private fun stopVPN(statusText: TextView, button: Button) {
                  val intent = Intent(this, VpnService::class.java)
                  stopService(intent)
                  
                  isRunning = false
                  statusText.text = "Статус: Отключено"
                  button.text = "ЗАПУСТИТЬ VPN"
                  Toast.makeText(this, "VPN остановлен", Toast.LENGTH_SHORT).show()
              }
              
              override fun onActivityResult(request: Int, result: Int, data: Intent?) {
                  super.onActivityResult(request, result, data)
                  if (result == RESULT_OK) {
                      val intent = Intent(this, VpnService::class.java)
                      ContextCompat.startForegroundService(this, intent)
                  }
              }
          }
          EOF
      
      - name: Create VpnService.kt
        run: |
          cat > app/src/main/java/com/dimvpn/app/VpnService.kt << 'EOF'
          package com.dimvpn.app

          import android.net.VpnService
          import android.os.ParcelFileDescriptor
          import android.util.Log
          import java.io.IOException

          class VpnService : VpnService() {
              private var vpnInterface: ParcelFileDescriptor? = null
              
              override fun onCreate() {
                  super.onCreate()
                  startVPN()
              }
              
              private fun startVPN() {
                  try {
                      val builder = Builder().apply {
                          setSession("DimVPN")
                          setMtu(1500)
                          addAddress("10.0.0.2", 32)
                          addRoute("0.0.0.0", 0)
                          addDnsServer("8.8.8.8")
                      }
                      
                      vpnInterface = builder.establish()
                      Log.d("DimVPN", "VPN запущен")
                  } catch (e: Exception) {
                      Log.e("DimVPN", "Ошибка: ${e.message}")
                  }
              }
              
              override fun onDestroy() {
                  try {
                      vpnInterface?.close()
                  } catch (e: IOException) {
                      e.printStackTrace()
                  }
                  super.onDestroy()
              }
          }
          EOF
      
      - name: Create gradle-wrapper.properties
        run: |
          mkdir -p gradle/wrapper
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0-bin.zip" > gradle/wrapper/gradle-wrapper.properties
      
      - name: Download gradle-wrapper.jar
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar
      
      - name: Create gradlew
        run: |
          echo '#!/bin/sh' > gradlew
          echo 'exec java -Xmx64m -classpath "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew
      
      - name: Build APK
        run: ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimVPN-APK
          path: app/build/outputs/apk/debug/*.apk
