name: KUSMAN_V63_ARMADILLO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.10' }

      - name: Generate Project
        run: |
          mkdir -p src/main/java/com/kusman/mixin src/main/resources
          echo "pluginManagement { repositories { maven { url 'https://maven.fabricmc.net/' }; gradlePluginPortal() } }" > settings.gradle
          echo "rootProject.name = 'kusman_mod'" >> settings.gradle

          cat <<'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          repositories { mavenCentral(); maven { url "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.16.0"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1"
          }
          EOF

          cat <<'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1, "id": "kusman", "version": "1.0.0", "name": "KusmanV63",
            "entrypoints": { "client": [ "com.kusman.KusmanClient" ] },
            "mixins": [ "kusman.mixins.json" ]
          }
          EOF

          echo '{"required":true,"package":"com.kusman.mixin","mixins":["PlayerRendererMixin","PlayerEntityMixin"]}' > src/main/resources/kusman.mixins.json

          cat <<'EOF' > src/main/java/com/kusman/KusmanClient.java
          package com.kusman;
          import net.fabricmc.api.ClientModInitializer;
          import net.fabricmc.fabric.api.client.event.lifecycle.v1.ClientTickEvents;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.entity.EntityType;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.EntityPose;
          import net.minecraft.entity.effect.StatusEffectInstance;
          import net.minecraft.entity.effect.StatusEffects;
          import net.minecraft.item.Items;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.util.math.Vec3d;

          public class KusmanClient implements ClientModInitializer {
              public static LivingEntity morphEntity = null;
              public static EntityType<?> currentType = null;
              private int shiftTicks = 0;

              @Override public void onInitializeClient() {
                  ClientTickEvents.END_CLIENT_TICK.register(client -> {
                      if (client.player == null || client.world == null) return;

                      var handItem = client.player.getMainHandStack().getItem();
                      EntityType<?> newType = null;

                      // ЗЕМЛЯ -> БРОНЕНОСЕЦ
                      if (handItem == Items.DIRT) newType = EntityType.ARMADILLO;
                      else if (handItem == Items.IRON_BLOCK) newType = EntityType.IRON_GOLEM;
                      else if (handItem == Items.GUNPOWDER) newType = EntityType.CREEPER;

                      if (newType != currentType) {
                          currentType = newType;
                          morphEntity = (currentType != null) ? (LivingEntity) currentType.create(client.world) : null;
                          shiftTicks = 0;
                          if (currentType != null) client.player.setInvisible(true); // Друг видит моба
                          else client.player.setInvisible(false);
                      }

                      if (morphEntity != null) {
                          morphEntity.copyPositionAndRotation(client.player);
                          
                          // Логика Броненосца
                          if (currentType == EntityType.ARMADILLO) {
                              // Пассивная броня
                              client.player.addStatusEffect(new StatusEffectInstance(StatusEffects.RESISTANCE, 5, 1, false, false));

                              if (client.player.isSneaking()) {
                                  shiftTicks++;
                                  // Сворачивание в клубок
                                  if (shiftTicks == 1) client.player.playSound(SoundEvents.ENTITY_ARMADILLO_LAND, 1.0f, 1.0f);
                                  
                                  // Полная защита, неподвижность
                                  client.player.addStatusEffect(new StatusEffectInstance(StatusEffects.RESISTANCE, 5, 4, false, false));
                                  client.player.addStatusEffect(new StatusEffectInstance(StatusEffects.SLOWNESS, 5, 10, false, false));
                                  client.player.setVelocity(Vec3d.ZERO); // Стоим на месте
                                  
                                  morphEntity.setPose(EntityPose.SITTING); // Визуал сворачивания
                              } else {
                                  if (shiftTicks > 0) client.player.playSound(SoundEvents.ENTITY_ARMADILLO_UNROLL_FINISH, 1.0f, 1.0f);
                                  shiftTicks = 0;
                                  morphEntity.setPose(EntityPose.STANDING);
                              }
                          }
                      }
                  });
              }
          }
          EOF

          cat <<'EOF' > src/main/java/com/kusman/mixin/PlayerRendererMixin.java
          package com.kusman.mixin;
          import com.kusman.KusmanClient;
          import net.minecraft.client.MinecraftClient;
          import net.minecraft.client.network.AbstractClientPlayerEntity;
          import net.minecraft.client.render.VertexConsumerProvider;
          import net.minecraft.client.render.entity.PlayerEntityRenderer;
          import net.minecraft.client.util.math.MatrixStack;
          import net.minecraft.entity.EntityPose;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(PlayerEntityRenderer.class)
          public abstract class PlayerRendererMixin {
              @Inject(method = "render", at = @At("HEAD"), cancellable = true)
              private void onRender(AbstractClientPlayerEntity player, float yaw, float tickDelta, MatrixStack matrices, VertexConsumerProvider vertexConsumers, int light, CallbackInfo ci) {
                  if (player == MinecraftClient.getInstance().player && KusmanClient.morphEntity != null) {
                      ci.cancel(); 
                      matrices.push();
                      
                      // Синхронизация анимаций
                      KusmanClient.morphEntity.copyPositionAndRotation(player);
                      KusmanClient.morphEntity.handSwingProgress = player.handSwingProgress;
                      KusmanClient.morphEntity.limbAnimator.setSpeed(player.limbAnimator.getSpeed());

                      // Масштаб для броненосца (он маленький)
                      if (KusmanClient.currentType == net.minecraft.entity.EntityType.ARMADILLO) {
                          matrices.scale(0.7f, 0.7f, 0.7f);
                          matrices.translate(0, 0, 0);
                      }

                      MinecraftClient.getInstance().getEntityRenderDispatcher().render(
                          KusmanClient.morphEntity, 0.0, 0.0, 0.0, yaw, tickDelta, matrices, vertexConsumers, light
                      );
                      matrices.pop();
                  }
              }
          }
          EOF
          
          # Health Mixin (опционально, для синхронизации ХП)
          cat <<'EOF' > src/main/java/com/kusman/mixin/PlayerEntityMixin.java
          package com.kusman.mixin;
          import com.kusman.KusmanClient;
          import net.minecraft.entity.EntityType;
          import net.minecraft.entity.player.PlayerEntity;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfoReturnable;

          @Mixin(PlayerEntity.class)
          public class PlayerEntityMixin {
              @Inject(method = "getMaxHealth", at = @At("HEAD"), cancellable = true)
              private void onGetMaxHealth(CallbackInfoReturnable<Float> cir) {
                  if (KusmanClient.currentType == EntityType.ARMADILLO) cir.setReturnValue(12f); // ХП Броненосца
                  else if (KusmanClient.currentType == EntityType.IRON_GOLEM) cir.setReturnValue(100f);
              }
          }
          EOF
      - name: Build
        run: gradle build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V63-Armadillo
          path: build/libs/*.jar
