name: KUSMAN_V72_FORGE_SUCCESS
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      
      - uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: '8.10' }

      - name: Generate Forge Project
        run: |
          mkdir -p src/main/java/com/kusman src/main/resources/META-INF
          
          cat <<'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  maven { url = 'https://maven.minecraftforge.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          rootProject.name = 'kusman_mod'
          EOF

          cat <<'EOF' > build.gradle
          plugins {
              id 'net.minecraftforge.gradle' version '6.0.24'
          }
          group = 'com.kusman'
          version = '1.0.0'
          minecraft {
              mappings channel: 'official', version: '1.21.1'
          }
          repositories {
              mavenCentral()
              maven { url = 'https://maven.minecraftforge.net/' }
          }
          dependencies {
              minecraft 'net.minecraftforge:forge:1.21.1-52.1.2'
          }
          EOF

          cat <<'EOF' > src/main/java/com/kusman/KusmanMod.java
          package com.kusman;

          import net.minecraft.world.level.block.Block;
          import net.minecraft.world.level.block.state.BlockBehaviour;
          import net.minecraft.world.level.block.state.BlockState;
          import net.minecraft.world.item.BlockItem;
          import net.minecraft.world.item.Item;
          import net.minecraft.world.item.ItemStack;
          import net.minecraft.world.InteractionResult;
          import net.minecraft.world.ItemInteractionResult;
          import net.minecraft.world.InteractionHand;
          import net.minecraft.world.entity.EntityType;
          import net.minecraft.world.entity.LightningBolt;
          import net.minecraft.world.entity.monster.Monster;
          import net.minecraft.world.entity.player.Player;
          import net.minecraft.world.phys.BlockHitResult;
          import net.minecraft.world.phys.AABB;
          import net.minecraft.core.BlockPos;
          import net.minecraft.world.level.Level;
          import net.minecraft.network.chat.Component;
          import net.minecraft.world.effect.MobEffectInstance;
          import net.minecraft.world.effect.MobEffects;
          import net.minecraft.sounds.SoundEvents;
          import net.minecraft.sounds.SoundSource;
          import net.minecraft.world.level.material.MapColor;
          import net.minecraftforge.common.MinecraftForge;
          import net.minecraftforge.eventbus.api.IEventBus;
          import net.minecraftforge.fml.common.Mod;
          import net.minecraftforge.fml.javafmlmod.FMLJavaModLoadingContext;
          import net.minecraftforge.registries.DeferredRegister;
          import net.minecraftforge.registries.ForgeRegistries;
          import net.minecraftforge.registries.RegistryObject;

          import java.util.Comparator;
          import java.util.List;

          @Mod("kusman")
          public class KusmanMod {
              public static final String MODID = "kusman";
              private static final DeferredRegister<Block> BLOCKS = DeferredRegister.create(ForgeRegistries.BLOCKS, MODID);
              private static final DeferredRegister<Item> ITEMS = DeferredRegister.create(ForgeRegistries.ITEMS, MODID);

              public static final RegistryObject<Block> GOD_BLOCK = BLOCKS.register("god_block", () -> new Block(
                  BlockBehaviour.Properties.of()
                      .mapColor(MapColor.GOLD)
                      .strength(5.0f, 6.0f)
                      .lightLevel(state -> 15)
              ) {
                  // Исправленный метод взаимодействия для 52.1.2
                  @Override
                  protected ItemInteractionResult useItemOn(ItemStack stack, BlockState state, Level level, BlockPos pos, Player player, InteractionHand hand, BlockHitResult hit) {
                      if (!level.isClientSide && hand == InteractionHand.MAIN_HAND) {
                          AABB area = new AABB(pos).inflate(30.0);
                          List<Monster> targets = level.getEntitiesOfClass(Monster.class, area, Monster::isAlive);

                          if (targets.isEmpty()) {
                              player.displayClientMessage(Component.literal("§cЦелей нет!"), true);
                              return ItemInteractionResult.SUCCESS;
                          }

                          targets.sort(Comparator.comparingDouble(e -> e.distanceToSqr(player.getX(), player.getY(), player.getZ())));
                          Monster target = targets.get(0);

                          LightningBolt lightning = EntityType.LIGHTNING_BOLT.create(level);
                          if (lightning != null) {
                              lightning.moveTo(target.getX(), target.getY(), target.getZ());
                              level.addFreshEntity(lightning);
                              level.playSound(null, pos, SoundEvents.LIGHTNING_BOLT_THUNDER, SoundSource.BLOCKS, 1.0f, 1.0f);
                              player.addEffect(new MobEffectInstance(MobEffects.REGENERATION, 200, 1));
                          }
                          return ItemInteractionResult.SUCCESS;
                      }
                      return ItemInteractionResult.PASS_TO_DEFAULT_BLOCK_INTERACTION;
                  }
              });

              public static final RegistryObject<Item> GOD_BLOCK_ITEM = ITEMS.register("god_block", () -> new BlockItem(GOD_BLOCK.get(), new Item.Properties()));

              public KusmanMod() {
                  // Возвращаем корректное обращение к шине событий
                  IEventBus modEventBus = FMLJavaModLoadingContext.get().getModEventBus();
                  BLOCKS.register(modEventBus);
                  ITEMS.register(modEventBus);
                  MinecraftForge.EVENT_BUS.register(this);
              }
          }
          EOF

          cat <<'EOF' > src/main/resources/META-INF/mods.toml
          modLoader="javafml"
          loaderVersion="[52,)"
          license="MIT"
          [[mods]]
          modId="kusman"
          version="1.0.0"
          displayName="Kusman God Block"
          authors="Kusman"
          description="Compatibility fix for Forge 52.1.2"
          EOF

      - name: Build
        run: gradle build --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kusman-V72-ForgeSuccess
          path: build/libs/*.jar
