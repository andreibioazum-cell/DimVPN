name: Build Fully Working DimVPN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/java/com/dimvpn/app
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

      - name: Create VpnRunnerService (Логика туннеля)
        run: |
          cat > app/src/main/java/com/dimvpn/app/VpnRunnerService.java << 'EOF'
          package com.dimvpn.app;

          import android.content.Intent;
          import android.net.VpnService;
          import android.os.ParcelFileDescriptor;
          import android.util.Log;

          public class VpnRunnerService extends VpnService {
              private ParcelFileDescriptor vpnInterface = null;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (vpnInterface == null) {
                      Builder builder = new Builder();
                      // Устанавливаем параметры туннеля
                      builder.setSession("DimVPN")
                             .addAddress("10.0.0.2", 24)
                             .addDnsServer("8.8.8.8")
                             .addRoute("0.0.0.0", 0); // Перехватывать ВЕСЬ трафик
                      
                      try {
                          vpnInterface = builder.establish();
                          Log.d("DimVPN", "Туннель создан, ключик должен появиться");
                      } catch (Exception e) {
                          Log.e("DimVPN", "Ошибка создания туннеля", e);
                      }
                  }
                  return START_STICKY;
              }

              @Override
              public void onDestroy() {
                  if (vpnInterface != null) {
                      try {
                          vpnInterface.close();
                      } catch (Exception e) {}
                      vpnInterface = null;
                  }
                  super.onDestroy();
              }
          }
          EOF

      - name: Create MainActivity (Запуск службы)
        run: |
          cat > app/src/main/java/com/dimvpn/app/MainActivity.java << 'EOF'
          package com.dimvpn.app;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.VpnService;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;

          public class MainActivity extends Activity {
              private boolean isRunning = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  Button btn = findViewById(R.id.btnConnect);
                  TextView status = findViewById(R.id.statusText);

                  btn.setOnClickListener(v -> {
                      if (!isRunning) {
                          Intent intent = VpnService.prepare(this);
                          if (intent != null) {
                              startActivityForResult(intent, 0);
                          } else {
                              startService(new Intent(this, VpnRunnerService.class));
                              isRunning = true;
                              status.setText("Статус: ПОДКЛЮЧЕНО");
                          }
                      } else {
                          stopService(new Intent(this, VpnRunnerService.class));
                          isRunning = false;
                          status.setText("Статус: ОТКЛЮЧЕНО");
                      }
                  });
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (resultCode == RESULT_OK) {
                      startService(new Intent(this, VpnRunnerService.class));
                      isRunning = true;
                      ((TextView)findViewById(R.id.statusText)).setText("Статус: ПОДКЛЮЧЕНО");
                  }
              }
          }
          EOF

      - name: Create AndroidManifest (Регистрация службы)
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              
              <application android:label="DimVPN" android:theme="@style/Theme.DimVPN">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <service android:name=".VpnRunnerService"
                      android:permission="android.permission.BIND_VPN_SERVICE"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="android.net.VpnService" />
                      </intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: Update Configs and Build
        run: |
          # Остальные конфиги без изменений
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.dimvpn.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimvpn.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          echo "include ':app'" > settings.gradle
          
          # UI Layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:gravity="center" android:background="#121212">
              <TextView android:id="@+id/statusText" android:layout_width="wrap_content" 
                  android:layout_height="wrap_content" android:text="Статус: ОТКЛЮЧЕНО" 
                  android:textColor="#FFFFFF" android:textSize="18sp" android:layout_marginBottom="20dp"/>
              <Button android:id="@+id/btnConnect" android:layout_width="200dp" 
                  android:layout_height="60dp" android:text="СТАРТ / СТОП" android:backgroundTint="#00E676"/>
          </LinearLayout>
          EOF
          mkdir -p app/src/main/res/values && echo '<resources><style name="Theme.DimVPN" parent="Theme.AppCompat.DayNight.NoActionBar" /></resources>' > app/src/main/res/values/themes.xml

      - name: Build APK
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip
          EOF
          printf '#!/bin/sh\nexec java -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimVPN-Key-Build
          path: app/build/outputs/apk/debug/*.apk
