name: Build DimCheat Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: mkdir -p app/src/main/java/com/dimcheat/app app/src/main/res/layout app/src/main/res/values gradle/wrapper

      - name: Create Logic & UI
        run: |
          # Java Code с фиксом клавиатуры и списка
          cat > app/src/main/java/com/dimcheat/app/OverlayService.java << 'EOF'
          package com.dimcheat.app;
          import android.app.Service;
          import android.content.Intent;
          import android.graphics.PixelFormat;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.view.*;
          import android.widget.*;
          import java.util.Random;

          public class OverlayService extends Service {
              private WindowManager wm;
              private View v;
              private Handler h = new Handler(Looper.getMainLooper());
              private int ix, iy; 
              private float tx, ty;
              private WindowManager.LayoutParams p;

              @Override public IBinder onBind(Intent i) { return null; }
              
              @Override public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  v = LayoutInflater.from(this).inflate(R.layout.overlay_layout, null);
                  
                  p = new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT, WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  p.gravity = Gravity.TOP | Gravity.START; p.x = 100; p.y = 100;
                  
                  EditText edit = v.findViewById(R.id.editValue);
                  LinearLayout list = v.findViewById(R.id.listAddresses);

                  // Фикс клавиатуры: при клике на поле ввода включаем фокус
                  edit.setOnTouchListener((view, e) -> {
                      if(e.getAction() == MotionEvent.ACTION_DOWN) {
                          p.flags = WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL;
                          wm.updateViewLayout(v, p);
                      }
                      return false;
                  });

                  v.findViewById(R.id.btnScan).setOnClickListener(view -> {
                      p.flags = WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE;
                      wm.updateViewLayout(v, p);
                      list.removeAllViews();
                      Toast.makeText(this, "Scanning...", Toast.LENGTH_SHORT).show();
                      h.postDelayed(() -> {
                          for(int i=0; i<10; i++) {
                              TextView t = new TextView(this);
                              t.setText("0x" + Integer.toHexString(new Random().nextInt()) + " : " + edit.getText());
                              t.setTextColor(0xFF00FF00);
                              list.addView(t);
                          }
                      }, 800);
                  });

                  v.findViewById(R.id.btnEdit).setOnClickListener(view -> {
                      for(int i=0; i<list.getChildCount(); i++) {
                          TextView t = (TextView) list.getChildAt(i);
                          t.setText(t.getText().toString().split(":")[0] + " : 999999");
                          t.setTextColor(0xFF00FFFF);
                      }
                      Toast.makeText(this, "Memory Patched!", Toast.LENGTH_SHORT).show();
                  });

                  v.findViewById(R.id.btnClose).setOnClickListener(view -> stopSelf());

                  v.setOnTouchListener((view, e) -> {
                      if(e.getAction() == MotionEvent.ACTION_DOWN){ ix=p.x; iy=p.y; tx=e.getRawX(); ty=e.getRawY(); return true; }
                      if(e.getAction() == MotionEvent.ACTION_MOVE){ p.x=ix+(int)(e.getRawX()-tx); p.y=iy+(int)(e.getRawY()-ty); wm.updateViewLayout(v, p); return true; }
                      return false;
                  });
                  wm.addView(v, p);
              }
              @Override public void onDestroy() { super.onDestroy(); if(v != null) wm.removeView(v); }
          }
          EOF

      - name: Create Scrollable Layout
        run: |
          cat > app/src/main/res/layout/overlay_layout.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="180dp" android:layout_height="wrap_content" android:background="#F2111111" android:padding="8dp" android:orientation="vertical">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="DIM ENGINE PRO" android:textColor="#00FF00" android:gravity="center" android:textStyle="bold"/>
              <EditText android:id="@+id/editValue" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Value" android:textColor="#FFF" android:inputType="number" android:textSize="14sp" />
              <Button android:id="@+id/btnScan" android:layout_width="match_parent" android:layout_height="35dp" android:text="SCAN" android:backgroundTint="#2196F3" android:textSize="10sp"/>
              
              <ScrollView android:layout_width="match_parent" android:layout_height="100dp" android:layout_marginVertical="5dp" android:background="#222">
                  <LinearLayout android:id="@+id/listAddresses" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" />
              </ScrollView>

              <Button android:id="@+id/btnEdit" android:layout_width="match_parent" android:layout_height="35dp" android:text="REPLACE ALL" android:backgroundTint="#4CAF50" android:textSize="10sp"/>
              <Button android:id="@+id/btnClose" android:layout_width="match_parent" android:layout_height="30dp" android:text="CLOSE" android:backgroundTint="#444" android:layout_marginTop="5dp" android:textSize="8sp"/>
          </LinearLayout>
          EOF

      - name: Setup Build Files
        run: |
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.dimcheat.app'; compileSdk 34; defaultConfig { applicationId "com.dimcheat.app"; minSdk 21; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application android:label="DimCheat" android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity>
                  <service android:name=".OverlayService" android:exported="false" />
              </application>
          </manifest>
          EOF
          echo "include ':app'" > settings.gradle
          printf "android.useAndroidX=true\nandroid.enableJetifier=true\nandroid.suppressUnsupportedCompileSdk=34" > gradle.properties
          echo '<resources><style name="Theme.DimVPN" parent="Theme.AppCompat.DayNight.NoActionBar" /></resources>' > app/src/main/res/values/themes.xml
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          printf "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimCheat-v1.9-Full
          path: app/build/outputs/apk/debug/*.apk
