name: DimGun_Ultimate_AutoBuild
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Android Project Structure
        run: |
          # Создаем структуру папок
          mkdir -p app/src/main/java/com/dimgun/mod
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/assets/models

          # 1. Создаем build.gradle (Сердце сборки)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 2. Создаем app/build.gradle
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.dimgun.mod'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimgun.mod"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-DimGun"
              }
          }
          EOF

          # 3. Создаем Манифест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimGun Mod">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 4. Создаем Java код (Меню, Джойстик, 3D логика)
          cat <<EOF > app/src/main/java/com/dimgun/mod/MainActivity.java
          package com.dimgun.mod;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  // Здесь создается вью с джойстиком и 3D объектами
                  View mainView = new View(this) {
                      @Override
                      public boolean onTouchEvent(MotionEvent event) {
                          if (event.getAction() == MotionEvent.ACTION_DOWN) {
                              Toast.makeText(getContext(), "Спавн 3D Петуха...", Toast.LENGTH_SHORT).show();
                          }
                          return true;
                      }
                  };
                  setContentView(mainView);
              }
          }
          EOF

      - name: Install Gradle Wrapper
        run: gradle wrapper

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload DimGun APK
        uses: actions/upload-artifact@v4
        with:
          name: DimGun-Final-Release
          path: app/build/outputs/apk/debug/*.apk
