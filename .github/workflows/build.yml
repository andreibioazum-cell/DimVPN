name: Build Dim Gun Full Game

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          mkdir -p app/src/main/java/com/dim/gun
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Create C++ Engine
        run: |
          cat << 'EOF' | tee app/src/main/cpp/engine.cpp
          #include <jni.h>
          #include <GLES3/gl3.h>
          #include <vector>
          #include <android/log.h>

          #define LOG_TAG "DimGun-Native"
          extern "C" {
              JNIEXPORT void JNICALL Java_com_dim_gun_NativeLib_init(JNIEnv* env, jclass obj) {
                  glEnable(GL_DEPTH_TEST);
              }
              JNIEXPORT void JNICALL Java_com_dim_gun_NativeLib_step(JNIEnv* env, jclass obj) {
                  glClearColor(0.4f, 0.7f, 1.0f, 1.0f);
                  glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);
              }
              JNIEXPORT void JNICALL Java_com_dim_gun_NativeLib_addBlock(JNIEnv* env, jclass obj, jfloat x, jfloat y, jfloat z, jint type) {
                  // Логика добавления блоков
              }
          }
          EOF

      - name: Create Project Files
        run: |
          # CMake
          cat << 'EOF' | tee app/src/main/cpp/CMakeLists.txt
          cmake_minimum_required(VERSION 3.22.1)
          project("dimgun_core")
          add_library(dimgun_core SHARED engine.cpp)
          find_library(log-lib log)
          target_link_libraries(dimgun_core ${log-lib} GLESv3 EGL)
          EOF

          # Java Native Bridge
          cat << 'EOF' | tee app/src/main/java/com/dim/gun/NativeLib.java
          package com.dim.gun;
          public class NativeLib {
              static { System.loadLibrary("dimgun_core"); }
              public static native void init();
              public static native void step();
              public static native void addBlock(float x, float y, float z, int type);
          }
          EOF

          # MainActivity
          cat << 'EOF' | tee app/src/main/java/com/dim/gun/MainActivity.java
          package com.dim.gun;
          import android.app.Activity;
          import android.opengl.GLSurfaceView;
          import android.os.Bundle;
          import android.widget.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  GLSurfaceView v = new GLSurfaceView(this);
                  v.setEGLContextClientVersion(3);
                  v.setRenderer(new GLSurfaceView.Renderer() {
                      public void onSurfaceCreated(GL10 gl, EGLConfig c) { NativeLib.init(); }
                      public void onSurfaceChanged(GL10 gl, int w, int h) {}
                      public void onDrawFrame(GL10 gl) { NativeLib.step(); }
                  });
                  setContentView(v);
              }
          }
          EOF

      - name: Setup Gradle Project
        run: |
          echo "include ':app'" | tee settings.gradle
          cat << 'EOF' | tee build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat << 'EOF' | tee app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dim.gun'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dim.gun"
                  minSdk 24
                  targetSdk 34
              }
              externalNativeBuild { cmake { path "src/main/cpp/CMakeLists.txt" } }
          }
          EOF

          mkdir -p app/src/main
          cat << 'EOF' | tee app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Dim Gun">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build with Gradle Action
        uses: eskatos/gradle-command-action@v3
        with:
          arguments: assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimGun-Alpha
          path: app/build/outputs/apk/debug/*.apk
