name: DimGun_OS_Archive_Edition
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Generate Project
        run: |
          mkdir -p app/src/main/java/com/dimgun/os
          mkdir -p app/src/main/res/layout
          
          echo "include ':app'" > settings.gradle

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dimgun.os'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.dimgun.os"
                  minSdk 26 
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-Archive"
              }
          }
          EOF

          # UI: Список приложений и кнопка импорта
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#050505"
              android:padding="15dp">
              
              <TextView 
                  android:layout_width="wrap_content" 
                  android:layout_height="wrap_content"
                  android:text="DIM-GUN OS: ARCHIVE MANAGER" 
                  android:textColor="#00FF00" 
                  android:textStyle="bold"
                  android:layout_marginBottom="15dp"/>

              <ListView
                  android:id="@+id/app_list"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1" />

              <Button 
                  android:id="@+id/btn_import"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="ИМПОРТИРОВАТЬ .DIM"
                  android:backgroundTint="#2E7D32"
                  android:layout_marginTop="10dp"/>
          </LinearLayout>
          EOF

          # Манифест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimGun OS" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Java Код: Импорт и работа с изолированными архивами
          cat <<EOF > app/src/main/java/com/dimgun/os/MainActivity.java
          package com.dimgun.os;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.widget.*;
          import java.io.*;
          import java.util.ArrayList;

          public class MainActivity extends Activity {
              private File internalAppsDir;
              private ArrayList<String> installedApps = new ArrayList<>();
              private ArrayAdapter<String> adapter;
              private static final int PICK_FILE = 1;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  internalAppsDir = new File(getFilesDir(), "installed_apps");
                  if (!internalAppsDir.exists()) internalAppsDir.mkdirs();

                  ListView listView = findViewById(R.id.app_list);
                  adapter = new ArrayAdapter<>(this, android.R.layout.simple_list_item_1, installedApps);
                  listView.setAdapter(adapter);

                  refreshAppList();

                  findViewById(R.id.btn_import).setOnClickListener(v -> {
                      Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                      intent.setType("*/*"); 
                      startActivityForResult(intent, PICK_FILE);
                  });
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == PICK_FILE && resultCode == RESULT_OK && data != null) {
                      importFile(data.getData());
                  }
              }

              private void importFile(Uri uri) {
                  try {
                      String fileName = "app_" + System.currentTimeMillis() + ".dim";
                      File destination = new File(internalAppsDir, fileName);
                      
                      InputStream is = getContentResolver().openInputStream(uri);
                      FileOutputStream fos = new FileOutputStream(destination);
                      byte[] buffer = new byte[1024];
                      int read;
                      while ((read = is.read(buffer)) != -1) fos.write(buffer, 0, read);
                      is.close();
                      fos.close();
                      
                      Toast.makeText(this, "Импорт завершен!", Toast.LENGTH_SHORT).show();
                      refreshAppList();
                  } catch (Exception e) {
                      Toast.makeText(this, "Ошибка импорта", Toast.LENGTH_SHORT).show();
                  }
              }

              private void refreshAppList() {
                  installedApps.clear();
                  File[] files = internalAppsDir.listFiles();
                  if (files != null) {
                      for (File f : files) installedApps.add("📦 App: " + f.getName());
                  }
                  adapter.notifyDataSetChanged();
              }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimGun-Archive-OS
          path: app/build/outputs/apk/debug/*.apk
