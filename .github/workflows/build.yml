name: Build DimBlox 3D Objects

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Structure
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/dim/blox/render
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Create 3D Cube & Shader Logic
        run: |
          cat > app/src/main/java/com/dim/blox/render/Cube.java << 'EOF'
          package com.dim.blox.render;
          import android.opengl.GLES20;
          import java.nio.*;

          public class Cube {
              private FloatBuffer vertexBuffer;
              private final String vertexShaderCode =
                  "uniform mat4 uMVPMatrix; attribute vec4 vPosition;" +
                  "void main() { gl_Position = uMVPMatrix * vPosition; }";
              private final String fragmentShaderCode =
                  "precision mediump float; void main() { gl_FragColor = vec4(0.0, 0.8, 1.0, 1.0); }";
              private int mProgram;

              static float coords[] = {
                  -0.5f, 0.5f, 0.5f, -0.5f, -0.5f, 0.5f, 0.5f, -0.5f, 0.5f, 0.5f, 0.5f, 0.5f,
                  -0.5f, 0.5f, -0.5f, -0.5f, -0.5f, -0.5f, 0.5f, -0.5f, -0.5f, 0.5f, 0.5f, -0.5f
              };

              public Cube() {
                  ByteBuffer bb = ByteBuffer.allocateDirect(coords.length * 4);
                  bb.order(ByteOrder.nativeOrder());
                  vertexBuffer = bb.asFloatBuffer();
                  vertexBuffer.put(coords);
                  vertexBuffer.position(0);

                  int vertexShader = loadShader(GLES20.GL_VERTEX_SHADER, vertexShaderCode);
                  int fragmentShader = loadShader(GLES20.GL_FRAGMENT_SHADER, fragmentShaderCode);
                  mProgram = GLES20.glCreateProgram();
                  GLES20.glAttachShader(mProgram, vertexShader);
                  GLES20.glAttachShader(mProgram, fragmentShader);
                  GLES20.glLinkProgram(mProgram);
              }

              public void draw(float[] mvpMatrix) {
                  GLES20.glUseProgram(mProgram);
                  int positionHandle = GLES20.glGetAttribLocation(mProgram, "vPosition");
                  GLES20.glEnableVertexAttribArray(positionHandle);
                  GLES20.glVertexAttribPointer(positionHandle, 3, GLES20.GL_FLOAT, false, 12, vertexBuffer);
                  int mvpHandle = GLES20.glGetUniformLocation(mProgram, "uMVPMatrix");
                  GLES20.glUniformMatrix4fv(mvpHandle, 1, false, mvpMatrix, 0);
                  GLES20.glDrawArrays(GLES20.GL_TRIANGLE_STRIP, 0, 8);
              }

              public static int loadShader(int type, String code) {
                  int shader = GLES20.glCreateShader(type);
                  GLES20.glShaderSource(shader, code);
                  GLES20.glCompileShader(shader);
                  return shader;
              }
          }
          EOF

      - name: Create OpenGL Renderer
        run: |
          cat > app/src/main/java/com/dim/blox/render/MyRenderer.java << 'EOF'
          package com.dim.blox.render;
          import android.opengl.GLES20;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class MyRenderer implements GLSurfaceView.Renderer {
              private Cube mCube;
              private final float[] vPMatrix = new float[16];
              private final float[] projectionMatrix = new float[16];
              private final float[] viewMatrix = new float[16];
              public float angle = 0;

              public void onSurfaceCreated(GL10 unused, EGLConfig config) {
                  GLES20.glClearColor(0.1f, 0.1f, 0.15f, 1.0f);
                  mCube = new Cube();
              }

              public void onDrawFrame(GL10 unused) {
                  GLES20.glClear(GLES20.GL_COLOR_BUFFER_BIT | GLES20.GL_DEPTH_BUFFER_BIT);
                  Matrix.setLookAtM(viewMatrix, 0, 0, 0, -4, 0, 0, 0, 0, 1, 0);
                  float[] scratch = new float[16];
                  Matrix.setRotateM(scratch, 0, angle, 0, 1, 0);
                  float[] combined = new float[16];
                  Matrix.multiplyMM(combined, 0, viewMatrix, 0, scratch, 0);
                  Matrix.multiplyMM(vPMatrix, 0, projectionMatrix, 0, combined, 0);
                  mCube.draw(vPMatrix);
              }

              public void onSurfaceChanged(GL10 unused, int width, int height) {
                  GLES20.glViewport(0, 0, width, height);
                  float ratio = (float) width / height;
                  Matrix.frustumM(projectionMatrix, 0, -ratio, ratio, -1, 1, 3, 7);
              }
          }
          EOF

      - name: Create MainActivity & UI
        run: |
          cat > app/src/main/java/com/dim/blox/MainActivity.java << 'EOF'
          package com.dim.blox;
          import android.app.Activity;
          import android.opengl.GLSurfaceView;
          import android.os.Bundle;
          import com.dim.blox.render.MyRenderer;

          public class MainActivity extends Activity {
              private GLSurfaceView glView;
              private MyRenderer renderer;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  glView = new GLSurfaceView(this);
                  glView.setEGLContextClientVersion(2);
                  renderer = new MyRenderer();
                  glView.setRenderer(renderer);
                  setContentView(glView);
                  
                  // Эмуляция ввода с джойстика (вращение)
                  new Thread(() -> {
                      while(true) {
                          renderer.angle += 1.0f;
                          try { Thread.sleep(20); } catch (Exception e) {}
                      }
                  }).start();
              }
          }
          EOF

      - name: Build Project
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.dim.blox'; compileSdk 34; defaultConfig { applicationId "com.dim.blox"; minSdk 21; targetSdk 34 } }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimBlox 3D" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimBlox-3D-Objects-v30
          path: app/build/outputs/apk/debug/*.apk
