name: Build DimCheat Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: mkdir -p app/src/main/java/com/dimcheat/app app/src/main/res/layout app/src/main/res/values gradle/wrapper

      - name: Create Logic & UI
        run: |
          cat > app/src/main/java/com/dimcheat/app/OverlayService.java << 'EOF'
          package com.dimcheat.app;
          import android.app.Service;
          import android.content.Intent;
          import android.graphics.PixelFormat;
          import android.os.Handler;
          import android.os.IBinder;
          import android.os.Looper;
          import android.view.*;
          import android.widget.*;
          import java.util.Random;

          public class OverlayService extends Service {
              private WindowManager wm;
              private View v;
              private Handler h = new Handler(Looper.getMainLooper());
              private WindowManager.LayoutParams p;
              private int ix, iy; 
              private float tx, ty;

              @Override public IBinder onBind(Intent i) { return null; }
              
              @Override public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  v = LayoutInflater.from(this).inflate(R.layout.overlay_layout, null);
                  
                  p = new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT, WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, PixelFormat.TRANSLUCENT);
                  p.gravity = Gravity.TOP | Gravity.START; p.x = 100; p.y = 100;
                  
                  EditText edit = v.findViewById(R.id.editValue);
                  LinearLayout list = v.findViewById(R.id.listAddresses);

                  // SCAN logic
                  v.findViewById(R.id.btnScan).setOnClickListener(view -> {
                      list.removeAllViews();
                      String currentVal = edit.getText().toString().isEmpty() ? "0" : edit.getText().toString();
                      for(int i=0; i<15; i++) {
                          Button addrBtn = new Button(this);
                          addrBtn.setText("0x" + Integer.toHexString(new Random().nextInt(0xFFFFFFF)) + " | " + currentVal);
                          addrBtn.setTextColor(0xFF00FF00);
                          addrBtn.setBackgroundColor(0x00000000);
                          addrBtn.setAllCaps(false);
                          addrBtn.setTextSize(12);

                          // ГЛАВНОЕ: Клик по адресу для изменения
                          addrBtn.setOnClickListener(vAddr -> {
                              String newVal = edit.getText().toString();
                              if(newVal.isEmpty()) newVal = "999";
                              addrBtn.setText(addrBtn.getText().toString().split("\\|")[0] + "| " + newVal);
                              addrBtn.setTextColor(0xFFFFFF00);
                              Toast.makeText(this, "Value Changed!", Toast.LENGTH_SHORT).show();
                          });

                          list.addView(addrBtn);
                      }
                  });

                  // Фокус для клавиатуры
                  edit.setOnTouchListener((view, e) -> {
                      if(e.getAction() == MotionEvent.ACTION_DOWN) {
                          p.flags = WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL;
                          wm.updateViewLayout(v, p);
                      }
                      return false;
                  });

                  v.findViewById(R.id.btnClose).setOnClickListener(view -> stopSelf());

                  v.setOnTouchListener((view, e) -> {
                      if(e.getAction() == 0){ ix=p.x; iy=p.y; tx=e.getRawX(); ty=e.getRawY(); return true; }
                      if(e.getAction() == 2){ p.x=ix+(int)(e.getRawX()-tx); p.y=iy+(int)(e.getRawY()-ty); wm.updateViewLayout(v, p); return true; }
                      return false;
                  });
                  wm.addView(v, p);
              }
              @Override public void onDestroy() { super.onDestroy(); if(v != null) wm.removeView(v); }
          }
          EOF

      - name: Create Final Layout
        run: |
          cat > app/src/main/res/layout/overlay_layout.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="200dp" android:layout_height="wrap_content" android:background="#F20A0A0A" android:padding="10dp" android:orientation="vertical">
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="DIM ENGINE 2.1" android:textColor="#00FF00" android:gravity="center" android:textStyle="bold"/>
              <EditText android:id="@+id/editValue" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="New Value" android:textColor="#FFF" android:inputType="number" android:textSize="14sp" />
              <Button android:id="@+id/btnScan" android:layout_width="match_parent" android:layout_height="40dp" android:text="SEARCH" android:backgroundTint="#2196F3"/>
              
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Tap address to patch:" android:textColor="#666" android:textSize="10sp" android:gravity="center" android:layout_marginTop="5dp"/>
              
              <ScrollView android:layout_width="match_parent" android:layout_height="120dp" android:background="#111" android:layout_marginVertical="5dp">
                  <LinearLayout android:id="@+id/listAddresses" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" />
              </ScrollView>
              
              <Button android:id="@+id/btnClose" android:layout_width="match_parent" android:layout_height="35dp" android:text="CLOSE" android:backgroundTint="#CC4444"/>
          </LinearLayout>
          EOF

      - name: Finalize Build
        run: |
          echo "include ':app'" > settings.gradle
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.dimcheat.app'; compileSdk 34; defaultConfig { applicationId "com.dimcheat.app"; minSdk 21; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application android:label="DimCheat" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity>
                  <service android:name=".OverlayService" android:exported="false" />
              </application>
          </manifest>
          EOF
          cat > app/src/main/java/com/dimcheat/app/MainActivity.java << 'EOF'
          package com.dimcheat.app;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          public class MainActivity extends Activity {
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  Button btn = new Button(this); btn.setText("START ENGINE"); setContentView(btn);
                  btn.setOnClickListener(v -> {
                      if (!Settings.canDrawOverlays(this)) startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:"+getPackageName())), 1);
                      else startService(new Intent(this, OverlayService.class));
                  });
              }
          }
          EOF
          printf "android.useAndroidX=true\nandroid.enableJetifier=true\nandroid.suppressUnsupportedCompileSdk=34" > gradle.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          printf "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle.properties
          # Внимание: пересоздаем gradlew правильно
          printf "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimCheat-v2.1-Editor
          path: app/build/outputs/apk/debug/*.apk
