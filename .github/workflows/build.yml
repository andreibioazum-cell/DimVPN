name: DimOS_GodMode_v3_Fixed
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Project Structure
        run: |
          mkdir -p app/src/main/java/com/dimos
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/libs

          # 1. СТРОГО: Создаем файлы сборки в КОРНЕ
          cat <<EOF > settings.gradle
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 2. Настройка модуля app
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dimos'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimos.launcher"
                  minSdk 26
                  targetSdk 34
                  versionCode 12
                  versionName "3.0-GodMode"
              }
          }
          EOF

          # 3. Полный Fullscreen режим в темах
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.DimOS" parent="android:Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowContentOverlay">@null</item>
              </style>
          </resources>
          EOF

          # 4. Манифест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application android:label="DimOS GodMode" android:theme="@style/Theme.DimOS">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. Ядро системы (MainActivity.java)
          cat <<EOF > app/src/main/java/com/dimos/MainActivity.java
          package com.dimos;

          import android.app.*;
          import android.graphics.Color;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import org.json.JSONObject;
          import java.io.*;
          import java.text.SimpleDateFormat;
          import java.util.*;

          public class MainActivity extends Activity {
              LinearLayout root, desktop;
              String internalRoot;
              String sysPass = "1234";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  internalRoot = getFilesDir().getAbsolutePath();
                  new File(internalRoot + "/apps").mkdirs();
                  
                  // Установка встроенных игр
                  initSystemApps();
                  showLockScreen();
              }

              private void initSystemApps() {
                  File game = new File(internalRoot + "/apps/snake.dim");
                  try {
                      if (!game.exists()) {
                          FileWriter fw = new FileWriter(game);
                          fw.write("{\"appName\":\"Змейка OS\",\"icon\":\"🐍\",\"script\":\"PRINT: Запуск игры...; JAVA_CODE: START_SNAKE\"}");
                          fw.close();
                      }
                  } catch(Exception e) {}
              }

              private void showLockScreen() {
                  setupBase();
                  TextView t = new TextView(this);
                  t.setText("DimOS\nLOCKED");
                  t.setTextSize(40);
                  t.setTextColor(Color.RED);
                  t.setGravity(Gravity.CENTER);
                  root.addView(t);

                  EditText p = new EditText(this);
                  p.setHint("PASSWORD");
                  p.setHintTextColor(Color.GRAY);
                  p.setTextColor(Color.WHITE);
                  p.setInputType(android.text.InputType.TYPE_CLASS_NUMBER | android.text.InputType.TYPE_NUMBER_VARIATION_PASSWORD);
                  root.addView(p);

                  Button b = new Button(this);
                  b.setText("UNLOCK");
                  b.setOnClickListener(v -> {
                      if(p.getText().toString().equals(sysPass)) showDesktop();
                  });
                  root.addView(b);
                  setContentView(root);
              }

              private void showDesktop() {
                  setupBase();
                  
                  // CUSTOM STATUS BAR
                  LinearLayout sb = new LinearLayout(this);
                  sb.setBackgroundColor(Color.parseColor("#0A0A0A"));
                  sb.setPadding(20, 10, 20, 10);
                  TextView info = new TextView(this);
                  String time = new SimpleDateFormat("HH:mm").format(new Date());
                  info.setText(time + "  |  DimOS GodMode  |  System: OK");
                  info.setTextColor(Color.GREEN);
                  sb.addView(info);
                  root.addView(sb);

                  addLabel("Рабочий стол", 24);

                  LinearLayout menu = new LinearLayout(this);
                  addBtn(menu, "➕ Создать", v -> openEditor());
                  addBtn(menu, "📂 Файлы", v -> showFiles(internalRoot));
                  root.addView(menu);

                  desktop = new LinearLayout(this);
                  desktop.setOrientation(LinearLayout.VERTICAL);
                  loadApps();
                  root.addView(desktop);

                  setContentView(root);
              }

              private void loadApps() {
                  File[] files = new File(internalRoot + "/apps").listFiles();
                  if(files != null) {
                      for(File f : files) {
                          try {
                              JSONObject j = new JSONObject(read(f));
                              Button b = new Button(this);
                              b.setText(j.getString("icon") + " " + j.getString("appName"));
                              final String scr = j.getString("script");
                              b.setOnClickListener(v -> runEngine(scr));
                              desktop.addView(b);
                          } catch(Exception e) {}
                      }
                  }
              }

              private void runEngine(String scr) {
                  for(String c : scr.split(";")) {
                      String cmd = c.trim();
                      if(cmd.startsWith("PRINT:")) Toast.makeText(this, cmd.substring(6), Toast.LENGTH_SHORT).show();
                      if(cmd.startsWith("JAVA_CODE: START_SNAKE")) {
                          AlertDialog.Builder ad = new AlertDialog.Builder(this);
                          ad.setTitle("Snake Engine").setMessage("Игра Змейка запущена через Java-модуль DimOS!").show();
                      }
                  }
              }

              private void openEditor() {
                  setupBase();
                  EditText ed = new EditText(this);
                  ed.setHint("Код приложения (JSON)");
                  ed.setTextColor(Color.GREEN);
                  ed.setText("{\\n \"appName\":\"App\",\\n \"icon\":\"📦\",\\n \"script\":\"PRINT: Hello World!\"\\n}");
                  root.addView(ed);
                  addBtn(root, "💾 Сохранить", v -> {
                      try {
                          String name = "app_" + System.currentTimeMillis() + ".dim";
                          FileWriter fw = new FileWriter(new File(internalRoot + "/apps/" + name));
                          fw.write(ed.getText().toString());
                          fw.close();
                      } catch(Exception e) {}
                      showDesktop();
                  });
                  setContentView(root);
              }

              private void showFiles(String p) {
                  setupBase();
                  addLabel("Путь: " + p.replace(internalRoot, "~"), 14);
                  File dir = new File(p);
                  if(!p.equals(internalRoot)) addBtn(root, "⬅ Назад", v -> showFiles(dir.getParent()));
                  
                  File[] list = dir.listFiles();
                  if(list != null) {
                      for(File f : list) {
                          addBtn(root, (f.isDirectory() ? "📁 " : "📄 ") + f.getName(), v -> {
                              if(f.isDirectory()) showFiles(f.getAbsolutePath());
                          });
                      }
                  }
                  addBtn(root, "🏠 Домой", v -> showDesktop());
                  setContentView(root);
              }

              private void setupBase() {
                  root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK);
                  root.setPadding(30, 0, 30, 30);
              }

              private void addLabel(String t, int s) {
                  TextView tv = new TextView(this); tv.setText(t); tv.setTextSize(s); tv.setTextColor(Color.WHITE); root.addView(tv);
              }

              private void addBtn(LinearLayout l, String t, View.OnClickListener c) {
                  Button b = new Button(this); b.setText(t); b.setOnClickListener(c); l.addView(b);
              }

              private String read(File f) throws IOException {
                  Scanner s = new Scanner(f).useDelimiter("\\\\Z");
                  return s.hasNext() ? s.next() : "";
              }
          }
          EOF

      - name: Build DimOS APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimOS-GodMode-v3
          path: app/build/outputs/apk/debug/*.apk
