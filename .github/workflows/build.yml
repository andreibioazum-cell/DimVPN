name: Build DimVPN APK

on:
  push:
    paths:
      - 'config/config.json'
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android project
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/dimvpn/app
          mkdir -p gradle/wrapper

      - name: Copy config
        run: cp config/config.json app/src/main/assets/config.json

      - name: Create build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.dimvpn.app'
              compileSdk 34

              defaultConfig {
                  applicationId "com.dimvpn.app"
                  minSdk 21
                  targetSdk 34
                  versionCode ${GITHUB_RUN_NUMBER}
                  versionName "1.0.${GITHUB_RUN_NUMBER}"
              }
          }

          dependencies {
              implementation 'com.github.v2ray:V2Ray-Android-core:5.16.1'
          }
          EOF

      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          rootProject.name = "DimVPN"
          include ':app'
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              
              <application android:label="DimVPN">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/dimvpn/app/MainActivity.java << 'EOF'
          package com.dimvpn.app;

          import android.app.Activity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.Toast;
          import com.v2ray.core.V2RayService;

          public class MainActivity extends Activity {
              private boolean isRunning = false;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Button btn = new Button(this);
                  btn.setText("Запустить VPN");
                  btn.setTextSize(20);
                  setContentView(btn);
                  
                  btn.setOnClickListener(v -> {
                      if (isRunning) stopVPN();
                      else startVPN();
                  });
              }
              
              private void startVPN() {
                  try {
                      String config = getAssets().open("config.json")
                          .bufferedReader().use { it.readText() };
                      
                      Intent intent = new Intent(this, V2RayService.class);
                      intent.setAction(V2RayService.ACTION_START_V2RAY);
                      intent.putExtra("config", config);
                      startService(intent);
                      
                      isRunning = true;
                      ((Button)getWindow().getDecorView().findViewById(android.R.id.content)).setText("Остановить VPN");
                      Toast.makeText(this, "VPN запущен", Toast.LENGTH_SHORT).show();
                  } catch (Exception e) {
                      Toast.makeText(this, "Ошибка: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                  }
              }
              
              private void stopVPN() {
                  Intent intent = new Intent(this, V2RayService.class);
                  intent.setAction(V2RayService.ACTION_STOP_V2RAY);
                  startService(intent);
                  
                  isRunning = false;
                  ((Button)getWindow().getDecorView().findViewById(android.R.id.content)).setText("Запустить VPN");
                  Toast.makeText(this, "VPN остановлен", Toast.LENGTH_SHORT).show();
              }
          }
          EOF

      - name: Create gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          
          curl -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          
          echo '#!/bin/sh' > gradlew
          echo 'exec java -Xmx64m -classpath "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: DimVPN-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
