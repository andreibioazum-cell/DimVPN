name: DimGun Full Auto Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Чтобы ты мог нажать кнопку "Run" в любое время

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Проверка: есть ли папка с 3D моделями и джойстиком
      - name: Validate Assets
        run: |
          if [ ! -d "app/src/main/assets" ]; then
            echo "ПРЕДУПРЕЖДЕНИЕ: Папка assets не найдена, создаю пустую..."
            mkdir -p app/src/main/assets
          fi

      - name: Grant Execute Permissions
        run: chmod +x gradlew

      # Сама сборка (тут соберутся и 3D модели, и код управления)
      - name: Build DimGun APK
        run: ./gradlew assembleDebug --stacktrace

      # Подпись APK (чтобы телефон не ругался при установке)
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/debug
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true # Если секретов нет, он просто пропустит этот шаг

      - name: Upload Finished Mod
        uses: actions/upload-artifact@v4
        with:
          name: DimGun_v1_Build
          path: app/build/outputs/apk/debug/*.apk
