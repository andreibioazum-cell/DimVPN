name: Build DimBlox Native Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Folders
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/dim/blox
          mkdir -p app/src/main/jni
          mkdir -p app/src/main/res/layout
          mkdir -p gradle/wrapper

      - name: Create C++ Engine (The "Roblox" Core)
        run: |
          cat << 'EOF' | tee app/src/main/jni/Android.mk
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE    := dimblox_core
          LOCAL_SRC_FILES := engine.cpp
          LOCAL_LDLIBS    := -llog -landroid -lGLESv3 -lEGL
          include $(BUILD_SHARED_LIBRARY)
          EOF

          cat << 'EOF' | tee app/src/main/jni/engine.cpp
          #include <jni.h>
          #include <GLES3/gl3.h>
          #include <android/log.h>

          // Базовый шейдер для блоков
          const char* vShader = "attribute vec4 vPos; uniform mat4 uMVP; void main(){gl_Position=uMVP*vPos;}";
          const char* fShader = "precision mediump float; void main(){gl_FragColor=vec4(0.13, 0.77, 0.36, 1.0);}";

          extern "C" {
              JNIEXPORT void JNICALL Java_com_dim_blox_GameView_renderFrame(JNIEnv* env, jobject obj) {
                  glClearColor(0.1f, 0.16f, 0.29f, 1.0f); // Твой цвет из style-core.css
                  glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);
                  // Здесь логика отрисовки тысяч блоков, как в твоей студии
              }
          }
          EOF

      - name: Create Java Bridge
        run: |
          cat << 'EOF' | tee app/src/main/java/com/dim/blox/GameView.java
          package com.dim.blox;
          import android.content.Context;
          import android.opengl.GLSurfaceView;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameView extends GLSurfaceView {
              static { System.loadLibrary("dimblox_core"); }
              public native void renderFrame();

              public GameView(Context context) {
                  super(context);
                  setEGLContextClientVersion(3);
                  setRenderer(new Renderer() {
                      public void onSurfaceCreated(GL10 gl, EGLConfig c) {}
                      public void onSurfaceChanged(GL10 gl, int w, int h) { gl.glViewport(0,0,w,h); }
                      public void onDrawFrame(GL10 gl) { renderFrame(); }
                  });
              }
          }
          EOF

      - name: Create Native UI (MainActivity)
        run: |
          cat << 'EOF' | tee app/src/main/java/com/dim/blox/MainActivity.java
          package com.dim.blox;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.ViewGroup;
          import android.widget.FrameLayout;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  GameView gv = new GameView(this);
                  setContentView(gv);
                  // Сюда мы добавим джойстики поверх 3D мира
              }
          }
          EOF

      - name: Configure Build
        run: |
          echo "include ':app'" | tee settings.gradle
          cat << 'EOF' | tee app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dim.blox'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.dim.blox"
                  minSdk 24
                  externalNativeBuild { ndkBuild { abiFilters 'arm64-v8a', 'armeabi-v7a' } }
              }
              externalNativeBuild { ndkBuild { path file('src/main/jni/Android.mk') } }
          }
          EOF
          
          # Манифест
          cat << 'EOF' | tee app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.dim.blox">
              <application android:label="DimBlox Native" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Finalize and Build
        run: |
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" | tee gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' | tee gradlew
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload Native APK
        uses: actions/upload-artifact@v4
        with:
          name: DimBlox-Pure-Native
          path: app/build/outputs/apk/debug/*.apk
