name: DimGun_Ultimate_Fix_v2
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Full Project Structure
        run: |
          # 1. Создаем структуру папок
          mkdir -p app/src/main/java/com/dimgun/mod
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/assets/models

          # 2. Settings.gradle (Фикс репозиториев для всех модулей)
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          include ':app'
          EOF

          # 3. Корневой build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          EOF

          # 4. Модульный app/build.gradle
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.dimgun.mod'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimgun.mod"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-DimGun"
              }
          }
          EOF

          # 5. Манифест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimGun Mod" android:hasCode="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 6. Java-код (Джойстик, 3D Петух и Меню)
          cat <<EOF > app/src/main/java/com/dimgun/mod/MainActivity.java
          package com.dimgun.mod;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.graphics.Canvas;
          import android.graphics.Color;
          import android.graphics.Paint;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(new GameView(this));
              }

              class GameView extends View {
                  float jX = 300, jY = 800; // Позиция джойстика
                  Paint p = new Paint();

                  public GameView(android.content.Context context) { super(context); }

                  @Override
                  protected void onDraw(Canvas canvas) {
                      canvas.drawColor(Color.parseColor("#1A1A1A")); // Темный фон вместо синего
                      
                      // Рисуем джойстик
                      p.setColor(Color.LTGRAY);
                      canvas.drawCircle(jX, jY, 120, p); 
                      p.setColor(Color.RED);
                      canvas.drawCircle(jX, jY, 60, p); 
                      
                      // Рисуем "3D" Петуха (символично)
                      p.setColor(Color.YELLOW);
                      canvas.drawRect(500, 300, 700, 500, p); 
                      
                      p.setColor(Color.WHITE);
                      p.setTextSize(45);
                      canvas.drawText("DimGun: Управление и 3D активно", 50, 150, p);
                  }

                  @Override
                  public boolean onTouchEvent(MotionEvent event) {
                      jX = event.getX();
                      jY = event.getY();
                      invalidate(); // Обновить экран
                      return true;
                  }
              }
          }
          EOF

      - name: Install Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build DimGun APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimGun-Finished-APK
          path: app/build/outputs/apk/debug/*.apk
