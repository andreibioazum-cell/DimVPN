name: Build DimBlox Pure C# Native

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest # Для сборки .NET Android лучше всего подходит Windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-net@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Android Workload
        run: dotnet workload install android

      - name: Create C# Project Structure
        run: |
          mkdir DimBloxApp
          cd DimBloxApp
          dotnet new android
          
      - name: Create 3D Engine Code (C#)
        shell: pwsh
        run: |
          # Создаем файл рендерера на C#
          $renderer = @"
          using System;
          using Android.Content;
          using Android.Opengl;
          using javax.microedition.khronos.egl;
          using javax.microedition.khronos.opengles;

          namespace DimBlox {
              public class MyRenderer : Java.Lang.Object, GLSurfaceView.IRenderer {
                  public void OnSurfaceCreated(IGL10 gl, EGLConfig config) {
                      GLES30.GlClearColor(0.1f, 0.16f, 0.29f, 1.0f); // Твой фирменный цвет
                  }
                  public void OnSurfaceChanged(IGL10 gl, int width, int height) {
                      GLES30.GlViewport(0, 0, width, height);
                  }
                  public void OnDrawFrame(IGL10 gl) {
                      GLES30.GlClear(GLES30.GlColorBufferBit | GLES30.GlDepthBufferBit);
                      // Сюда мы перенесем отрисовку блоков из script.js
                  }
              }
          }
          "@
          $renderer | Out-File -FilePath DimBloxApp/MyRenderer.cs -Encoding utf8

      - name: Create Main Activity
        shell: pwsh
        run: |
          $activity = @"
          using Android.App;
          using Android.OS;
          using Android.Opengl;

          namespace DimBlox {
              [Activity(Label = "DimBlox Sharp", MainLauncher = true, ScreenOrientation = Android.Content.PM.ScreenOrientation.Landscape)]
              public class MainActivity : Activity {
                  protected override void OnCreate(Bundle savedInstanceState) {
                      base.OnCreate(savedInstanceState);
                      var view = new GLSurfaceView(this);
                      view.SetEGLContextClientVersion(3);
                      view.SetRenderer(new MyRenderer());
                      SetContentView(view);
                  }
              }
          }
          "@
          $activity | Out-File -FilePath DimBloxApp/MainActivity.cs -Encoding utf8

      - name: Build APK
        run: |
          cd DimBloxApp
          dotnet build -c Release -f net8.0-android

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimBlox-CSharp-Native
          path: DimBloxApp/bin/Release/net8.0-android/*-Signed.apk
