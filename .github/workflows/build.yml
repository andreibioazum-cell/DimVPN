name: Build APK with C++

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        method: [
          { name: "cpp-simple", abi: "armeabi-v7a" },
          { name: "cpp-full", abi: "arm64-v8a" },
          { name: "cpp-minimal", abi: "x86" },
          { name: "cpp-compat", abi: "x86_64" }
        ]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android NDK
        run: |
          # Правильный путь к SDK на GitHub Actions
          SDK_MANAGER=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          echo "Using sdkmanager at: $SDK_MANAGER"
          echo "y" | $SDK_MANAGER --install "ndk;25.1.8937393"
          echo "NDK installed at: $ANDROID_SDK_ROOT/ndk/25.1.8937393"
      
      - name: Create Android project
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/dimvpn/app
          mkdir -p app/src/main/cpp
          mkdir -p app/src/main/jniLibs/${{ matrix.method.abi }}
          
      - name: Copy config
        run: cp config/config.json app/src/main/assets/config.json || echo "no config"
      
      # Create C++ code
      - name: Create native C++ code
        run: |
          cat > app/src/main/cpp/native-lib.cpp << 'EOF'
          #include <jni.h>
          #include <string>
          #include <android/log.h>
          
          #define LOG_TAG "DimVPN"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
          
          extern "C" {
          
          JNIEXPORT jstring JNICALL
          Java_com_dimvpn_app_MainActivity_stringFromJNI(
                  JNIEnv* env,
                  jobject /* this */) {
              std::string hello = "DimVPN C++";
              LOGI("Native code loaded");
              return env->NewStringUTF(hello.c_str());
          }
          
          JNIEXPORT jboolean JNICALL
          Java_com_dimvpn_app_MainActivity_startVPNNative(
                  JNIEnv* env,
                  jobject /* this */) {
              LOGI("Starting VPN from C++");
              return JNI_TRUE;
          }
          
          }
          EOF
      
      # Create CMakeLists.txt
      - name: Create CMakeLists.txt
        run: |
          cat > app/src/main/cpp/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.18.1)
          project("dimvpn")
          
          add_library(
              native-lib
              SHARED
              native-lib.cpp
          )
          
          find_library(
              log-lib
              log
          )
          
          target_link_libraries(
              native-lib
              ${log-lib}
          )
          EOF
      
      # Create build.gradle
      - name: Create build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          android {
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.dimvpn.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  
                  externalNativeBuild {
                      cmake {
                          cppFlags "-std=c++17"
                          abiFilters "${{ matrix.method.abi }}"
                      }
                  }
              }
              
              externalNativeBuild {
                  cmake {
                      path "src/main/cpp/CMakeLists.txt"
                  }
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
      
      # Create settings.gradle
      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          include ':app'
          EOF
      
      # Create gradle.properties
      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          EOF
      
      # Create AndroidManifest.xml
      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              
              <application 
                  android:label="DimVPN"
                  android:allowBackup="true">
                  
                  <activity 
                      android:name=".MainActivity" 
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
      
      # Create MainActivity.java with JNI
      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/dimvpn/app/MainActivity.java << 'EOF'
          package com.dimvpn.app;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.TextView;
          import android.widget.LinearLayout;
          import android.widget.Toast;
          import android.graphics.Color;
          import android.view.Gravity;
          
          public class MainActivity extends Activity {
              
              static {
                  System.loadLibrary("native-lib");
              }
              
              public native String stringFromJNI();
              public native boolean startVPNNative();
              
              private boolean isRunning = false;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setGravity(Gravity.CENTER);
                  layout.setBackgroundColor(Color.parseColor("#1a1a1a"));
                  layout.setPadding(50, 50, 50, 50);
                  
                  TextView title = new TextView(this);
                  title.setText("DimVPN");
                  title.setTextSize(32);
                  title.setTextColor(Color.parseColor("#4CAF50"));
                  title.setGravity(Gravity.CENTER);
                  layout.addView(title);
                  
                  final TextView statusText = new TextView(this);
                  statusText.setText(stringFromJNI());
                  statusText.setTextSize(18);
                  statusText.setTextColor(Color.WHITE);
                  statusText.setGravity(Gravity.CENTER);
                  statusText.setPadding(0, 50, 0, 50);
                  layout.addView(statusText);
                  
                  final Button toggleButton = new Button(this);
                  toggleButton.setText("ЗАПУСТИТЬ VPN");
                  toggleButton.setTextSize(16);
                  toggleButton.setBackgroundColor(Color.parseColor("#4CAF50"));
                  toggleButton.setTextColor(Color.WHITE);
                  toggleButton.setPadding(50, 20, 50, 20);
                  layout.addView(toggleButton);
                  
                  setContentView(layout);
                  
                  toggleButton.setOnClickListener(v -> {
                      if (!isRunning) {
                          boolean result = startVPNNative();
                          if (result) {
                              isRunning = true;
                              toggleButton.setText("ОСТАНОВИТЬ VPN");
                              statusText.setText("VPN запущен (C++)");
                              Toast.makeText(MainActivity.this, "VPN запущен", Toast.LENGTH_SHORT).show();
                          }
                      } else {
                          isRunning = false;
                          toggleButton.setText("ЗАПУСТИТЬ VPN");
                          statusText.setText(stringFromJNI());
                          Toast.makeText(MainActivity.this, "VPN остановлен", Toast.LENGTH_SHORT).show();
                      }
                  });
              }
          }
          EOF
      
      # Gradle wrapper
      - name: Create gradle-wrapper.properties
        run: |
          mkdir -p gradle/wrapper
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0-bin.zip" > gradle/wrapper/gradle-wrapper.properties
      
      - name: Download gradle-wrapper.jar
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar
      
      - name: Create gradlew
        run: |
          echo '#!/bin/sh' > gradlew
          echo 'exec java -Xmx64m -classpath "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew
      
      - name: Build APK
        run: ./gradlew assembleDebug
        continue-on-error: true
      
      - name: Upload APK (if successful)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DimVPN-CPP-${{ matrix.method.name }}
          path: app/build/outputs/apk/debug/*.apk
