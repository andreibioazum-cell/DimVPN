name: DimOS_God_Mode
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build DimOS Structure
        run: |
          mkdir -p app/src/main/java/com/dimos
          mkdir -p app/src/main/res/values
          
          # Настройки стиля (Безрамочный режим)
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.DimOS" parent="android:Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowContentOverlay">@null</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dimos'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimos.launcher"
                  minSdk 26
                  targetSdk 34
                  versionCode 10
                  versionName "3.0-GodMode"
              }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application android:label="DimOS GodMode" android:theme="@style/Theme.DimOS">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/java/com/dimos/MainActivity.java
          package com.dimos;

          import android.app.*;
          import android.graphics.Color;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import org.json.JSONObject;
          import java.io.*;
          import java.text.SimpleDateFormat;
          import java.util.*;

          public class MainActivity extends Activity {
              LinearLayout root, desktop;
              String internalRoot;
              String sysPass = "1234";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  internalRoot = getFilesDir().getAbsolutePath();
                  new File(internalRoot + "/apps").mkdirs();
                  
                  // Создаем игру Snake при первом запуске
                  installBuiltInGames();
                  
                  showLockScreen();
              }

              private void installBuiltInGames() {
                  File game = new File(internalRoot + "/apps/snake.dim");
                  if (!game.exists()) {
                      try { writeFile(game, "{\"appName\":\"Змейка\",\"icon\":\"🐍\",\"script\":\"PRINT: Запуск игры...; VIBE: 50; JAVA_CODE: START_SNAKE\"}"); } catch(Exception e){}
                  }
              }

              private void showLockScreen() {
                  setupBaseLayout();
                  addLabel("DimOS PROSECURE", 24, Color.RED);
                  EditText pass = new EditText(this);
                  pass.setHint("PASSWORD");
                  pass.setTextColor(Color.WHITE);
                  root.addView(pass);
                  addBtn("UNLOCK", v -> {
                      if(pass.getText().toString().equals(sysPass)) showDesktop();
                  });
                  setContentView(root);
              }

              private void showDesktop() {
                  setupBaseLayout();
                  
                  // Наш кастомный Status Bar
                  LinearLayout statusBar = new LinearLayout(this);
                  statusBar.setBackgroundColor(Color.parseColor("#050505"));
                  statusBar.setPadding(20, 5, 20, 5);
                  TextView time = new TextView(this);
                  time.setText(new SimpleDateFormat("HH:mm").format(new Date()) + " | DimOS 3.0 | ⚡ 100%");
                  time.setTextColor(Color.WHITE);
                  statusBar.addView(time);
                  root.addView(statusBar);

                  addLabel("DimOS Home", 30, Color.WHITE);

                  LinearLayout tools = new LinearLayout(this);
                  addBtn(tools, "📂 Проводник", v -> showFiles(internalRoot));
                  addBtn(tools, "📝 Создать", v -> openEditor("new.dim", "{\\n \"appName\":\"App\",\\n \"icon\":\"⭐\",\\n \"script\":\"PRINT: Hello;\"\\n}"));
                  root.addView(tools);

                  desktop = new LinearLayout(this);
                  desktop.setOrientation(LinearLayout.VERTICAL);
                  loadApps();
                  root.addView(desktop);
                  setContentView(root);
              }

              private void loadApps() {
                  File[] apps = new File(internalRoot + "/apps").listFiles();
                  if(apps != null) {
                      for(File f : apps) {
                          try {
                              JSONObject j = new JSONObject(readFile(f));
                              Button b = new Button(this);
                              b.setText(j.getString("icon") + " " + j.getString("appName"));
                              b.setBackgroundColor(Color.parseColor("#222222"));
                              b.setTextColor(Color.WHITE);
                              final String sc = j.getString("script");
                              b.setOnClickListener(v -> runEngine(sc));
                              desktop.addView(b);
                          } catch(Exception e){}
                      }
                  }
              }

              private void runEngine(String script) {
                  for(String c : script.split(";")) {
                      String cmd = c.trim();
                      if(cmd.startsWith("PRINT:")) Toast.makeText(this, cmd.substring(6), Toast.LENGTH_SHORT).show();
                      if(cmd.startsWith("VIBE:")) ((Vibrator)getSystemService(VIBRATOR_SERVICE)).vibrate(100);
                      if(cmd.startsWith("JAVA_CODE: START_SNAKE")) startSnakeGame();
                  }
              }

              private void startSnakeGame() {
                  // Упрощенная логика игры (всплывающее окно)
                  AlertDialog.Builder b = new AlertDialog.Builder(this);
                  b.setTitle("Snake DimOS");
                  b.setMessage("Тут будет логика змейки на Canvas. Пока что это прототип игры.");
                  b.setPositiveButton("OK", null);
                  b.show();
              }

              private void showFiles(String path) {
                  setupBaseLayout();
                  addLabel("Путь: " + path, 14, Color.GRAY);
                  File d = new File(path);
                  if(!path.equals(internalRoot)) addBtn("⬅ Назад", v -> showFiles(d.getParent()));
                  
                  File[] ff = d.listFiles();
                  if(ff != null) {
                      for(File f : ff) {
                          addBtn((f.isDirectory() ? "📁 " : "📄 ") + f.getName(), v -> {
                              if(f.isDirectory()) showFiles(f.getAbsolutePath());
                              else openEditor(f.getName(), ""); 
                          });
                      }
                  }
                  addBtn("🏠 Домой", v -> showDesktop());
                  setContentView(root);
              }

              private void openEditor(String name, String def) {
                  setupBaseLayout();
                  EditText ed = new EditText(this);
                  ed.setTextColor(Color.GREEN);
                  ed.setText(def);
                  root.addView(ed);
                  addBtn("💾 Сохранить в APPS", v -> {
                      try { writeFile(new File(internalRoot + "/apps/" + name), ed.getText().toString()); } catch(Exception e){}
                      showDesktop();
                  });
                  setContentView(root);
              }

              private void setupBaseLayout() {
                  root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setBackgroundColor(Color.BLACK); // Тёмная тема
                  root.setPadding(30, 0, 30, 30);
              }

              private void addLabel(String t, int s, int c) {
                  TextView tv = new TextView(this); tv.setText(t); tv.setTextSize(s); tv.setTextColor(c); root.addView(tv);
              }

              private void addBtn(String t, View.OnClickListener c) { addBtn(root, t, c); }
              private void addBtn(LinearLayout l, String t, View.OnClickListener c) {
                  Button b = new Button(this); b.setText(t); b.setOnClickListener(c); l.addView(b);
              }

              private String readFile(File f) throws IOException {
                  Scanner s = new Scanner(f).useDelimiter("\\\\Z");
                  return s.hasNext() ? s.next() : "";
              }

              private void writeFile(File f, String d) throws IOException {
                  FileWriter fw = new FileWriter(f); fw.write(d); fw.close();
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimOS-GodMode-v3
          path: app/build/outputs/apk/debug/*.apk
