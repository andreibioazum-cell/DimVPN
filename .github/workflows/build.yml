name: DimOS_VPN_Full_Fix
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Full Project Initializer
        run: |
          # Создаем структуру, если её нет
          mkdir -p app/src/main/java/com/dimos/vpn
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          # Генерируем gradlew вручную (это решит твою проблему)
          cat <<EOF > settings.gradle
          include ':app'
          EOF

          # Скачиваем официальный Gradle Wrapper
          wget https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -P gradle/wrapper/
          
          cat <<EOF > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # Создаем сам скрипт gradlew
          cat <<'EOF' > gradlew
          #!/bin/sh
          exec java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew

          # Дальше идет скачивание Xray и создание конфига...
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-android-arm64-v8a.zip
          unzip -o Xray-android-arm64-v8a.zip xray -d app/src/main/assets/
          mv app/src/main/assets/xray app/src/main/assets/xray.so

          # Вставляем твой DimVPN.json (сокращенно для примера, вставь свой полный)
          cat <<'EOF' > app/src/main/assets/config.json
          {
            "remarks": "DimVPN ✅",
            "inbounds": [{"tag": "tun", "protocol": "tun", "settings": {"address": ["10.0.0.2"], "mtu": 1500}}],
            "outbounds": [
              {
                "tag": "proxy", 
                "protocol": "vless", 
                "settings": {"vnext": [{"address": "test.bold-crown.test-cdn-kkk.com", "port": 443, "users": [{"id": "d8094751-0c2e-4ba3-ac2c-16d95c6fc707"}]}]},
                "streamSettings": {"network": "tcp", "security": "reality", "realitySettings": {"publicKey": "-tePObR3oZwGAUOb5kqTYkNWl6rtUKl0RFuzuu06wgw", "serverName": "tradingview.com"}}
              }
            ]
          }
          EOF

      - name: Build APK
        run: |
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimOS-Fixed-VPN
          path: app/build/outputs/apk/debug/*.apk
