name: Build DimCheat Overlay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Project
        run: |
          mkdir -p app/src/main/java/com/dimcheat/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Create Files
        run: |
          # 1. Манифест
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>
              <application android:label="DimCheat" android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service android:name=".OverlayService" android:exported="false" />
              </application>
          </manifest>
          EOF

          # 2. MainActivity
          cat > app/src/main/java/com/dimcheat/app/MainActivity.java << 'EOF'
          package com.dimcheat.app;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Button btn = new Button(this);
                  btn.setText("ЗАПУСТИТЬ ЧИТ");
                  setContentView(btn);
                  btn.setOnClickListener(v -> {
                      if (!Settings.canDrawOverlays(this)) {
                          startActivityForResult(new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                                  Uri.parse("package:" + getPackageName())), 1);
                      } else {
                          startService(new Intent(this, OverlayService.class));
                          finish();
                      }
                  });
              }
          }
          EOF

          # 3. OverlayService (ФИКС КЛАВИАТУРЫ)
          cat > app/src/main/java/com/dimcheat/app/OverlayService.java << 'EOF'
          package com.dimcheat.app;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.PixelFormat;
          import android.os.IBinder;
          import android.view.*;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.*;

          public class OverlayService extends Service {
              private WindowManager wm;
              private View v;
              private WindowManager.LayoutParams p;

              @Override public IBinder onBind(Intent i) { return null; }

              @Override public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  v = LayoutInflater.from(this).inflate(R.layout.overlay_layout, null);

                  p = new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE, // По умолчанию не фокусимся
                      PixelFormat.TRANSLUCENT);

                  p.gravity = Gravity.TOP | Gravity.START;
                  p.x = 100; p.y = 100;

                  EditText edit = v.findViewById(R.id.editValue);
                  
                  // Когда нажимаем на поле ввода - включаем фокус для клавиатуры
                  edit.setOnTouchListener((view, event) -> {
                      if (event.getAction() == MotionEvent.ACTION_DOWN) {
                          p.flags = WindowManager.LayoutParams.FLAG_NOT_TOUCH_MODAL;
                          wm.updateViewLayout(v, p);
                      }
                      return false;
                  });

                  v.findViewById(R.id.btnScan).setOnClickListener(view -> {
                      p.flags = WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE;
                      wm.updateViewLayout(v, p);
                      // Прячем клавиатуру
                      InputMethodManager imm = (InputMethodManager) getSystemService(Context.INPUT_METHOD_SERVICE);
                      imm.hideSoftInputFromWindow(edit.getWindowToken(), 0);
                      
                      Toast.makeText(this, "Поиск: " + edit.getText().toString(), Toast.LENGTH_SHORT).show();
                  });

                  v.findViewById(R.id.btnClose).setOnClickListener(view -> stopSelf());

                  // Перетаскивание
                  v.setOnTouchListener(new View.OnTouchListener() {
                      private int ix, iy; private float tx, ty;
                      @Override public boolean onTouch(View v, MotionEvent e) {
                          if(e.getAction()==MotionEvent.ACTION_DOWN){
                              ix=p.x; iy=p.y; tx=e.getRawX(); ty=e.getRawY(); return true;
                          }
                          if(e.getAction()==MotionEvent.ACTION_MOVE){
                              p.x=ix+(int)(e.getRawX()-tx); p.y=iy+(int)(e.getRawY()-ty);
                              wm.updateViewLayout(v, p); return true;
                          }
                          return false;
                      }
                  });

                  wm.addView(v, p);
              }
              @Override public void onDestroy() { super.onDestroy(); if(v!=null) wm.removeView(v); }
          }
          EOF

          # 4. Layout
          cat > app/src/main/res/layout/overlay_layout.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="wrap_content" android:layout_height="wrap_content"
              android:background="#F21A1A1A" android:padding="10dp" android:orientation="vertical">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content">
                  <TextView android:layout_width="0dp" android:layout_height="wrap_content" 
                      android:layout_weight="1" android:text="DimCheat v1.3" android:textColor="#00FF00" />
                  <Button android:id="@+id/btnClose" android:layout_width="30dp" android:layout_height="30dp" 
                      android:text="X" android:backgroundTint="#FF4444" android:textSize="8sp"/>
              </LinearLayout>
              <EditText android:id="@+id/editValue" android:layout_width="120dp" android:layout_height="wrap_content"
                  android:hint="Value" android:textColor="#FFF" android:inputType="number" android:focusable="true" android:focusableInTouchMode="true" />
              <Button android:id="@+id/btnScan" android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:text="SCAN" android:backgroundTint="#2196F3" />
          </LinearLayout>
          EOF

          echo '<resources><style name="Theme.DimVPN" parent="Theme.AppCompat.DayNight.NoActionBar" /></resources>' > app/src/main/res/values/themes.xml
          echo "include ':app'" > settings.gradle
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.dimcheat.app'
              compileSdk 34
              defaultConfig { applicationId "com.dimcheat.app"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          printf "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimCheat-Keyboard-Fixed
          path: app/build/outputs/apk/debug/*.apk
