name: Build DimBlox Native Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/dim/blox
          mkdir -p app/src/main/jni
          mkdir -p gradle/wrapper

      - name: Create C++ Core (OpenGL ES 3.0)
        run: |
          cat << 'EOF' | tee app/src/main/jni/Android.mk
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE    := dimblox_engine
          LOCAL_SRC_FILES := engine.cpp
          LOCAL_LDLIBS    := -llog -landroid -lGLESv3 -lEGL
          include $(BUILD_SHARED_LIBRARY)
          EOF

          cat << 'EOF' | tee app/src/main/jni/engine.cpp
          #include <jni.h>
          #include <GLES3/gl3.h>
          #include <android/log.h>

          extern "C" {
              JNIEXPORT void JNICALL Java_com_dim_blox_NativeLib_init(JNIEnv* env, jclass clazz) {
                  glEnable(GL_DEPTH_TEST);
                  __android_log_print(ANDROID_LOG_INFO, "DimBlox", "Engine Initialized");
              }

              JNIEXPORT void JNICALL Java_com_dim_blox_NativeLib_step(JNIEnv* env, jclass clazz) {
                  glClearColor(0.1f, 0.16f, 0.29f, 1.0f); // Твой фирменный фон
                  glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);
                  // Здесь будет идти отрисовка твоих 3D миров
              }
          }
          EOF

      - name: Create Java Wrapper
        run: |
          cat << 'EOF' | tee app/src/main/java/com/dim/blox/NativeLib.java
          package com.dim.blox;
          public class NativeLib {
              static { System.loadLibrary("dimblox_engine"); }
              public static native void init();
              public static native void step();
          }
          EOF

          cat << 'EOF' | tee app/src/main/java/com/dim/blox/MainActivity.java
          package com.dim.blox;
          import android.app.Activity;
          import android.opengl.GLSurfaceView;
          import android.os.Bundle;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  GLSurfaceView view = new GLSurfaceView(this);
                  view.setEGLContextClientVersion(3);
                  view.setRenderer(new GLSurfaceView.Renderer() {
                      public void onSurfaceCreated(GL10 gl, EGLConfig c) { NativeLib.init(); }
                      public void onSurfaceChanged(GL10 gl, int w, int h) { }
                      public void onDrawFrame(GL10 gl) { NativeLib.step(); }
                  });
                  setContentView(view);
              }
          }
          EOF

      - name: Root Build Configuration (Plugin Fix)
        run: |
          echo "include ':app'" | tee settings.gradle
          cat << 'EOF' | tee build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

      - name: App Build Configuration
        run: |
          cat << 'EOF' | tee app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.dim.blox'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dim.blox"
                  minSdk 24
                  targetSdk 34
                  externalNativeBuild { ndkBuild { abiFilters 'arm64-v8a', 'armeabi-v7a' } }
              }
              externalNativeBuild { ndkBuild { path file('src/main/jni/Android.mk') } }
          }
          EOF

      - name: Manifest and Perms
        run: |
          cat << 'EOF' | tee app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.dim.blox">
              <application android:label="DimBlox Native" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build
        run: |
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" | tee gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' | tee gradlew
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimBlox-Native-Pro
          path: app/build/outputs/apk/debug/*.apk
