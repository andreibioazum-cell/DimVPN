name: Build DimStudio Media Pro

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: mkdir -p app/src/main/java/com/dim/studio app/src/main/res/layout gradle/wrapper

      - name: Create Main Activity with Permissions
        run: |
          cat > app/src/main/java/com/dim/studio/MainActivity.java << 'EOF'
          package com.dim.studio;
          import android.Manifest;
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Bundle;
          import android.widget.*;
          import android.view.View;

          public class MainActivity extends Activity {
              private ImageView previewImage;
              private static final int PICK_IMAGE = 1;
              private static final int PERM_CODE = 100;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);

                  previewImage = findViewById(R.id.imgPreview);
                  Button btnImg = findViewById(R.id.btnAddImg);
                  TextView terminal = findViewById(R.id.terminal);

                  btnImg.setOnClickListener(v -> {
                      // ЗАПРОС РАЗРЕШЕНИЙ (Важнейшая часть)
                      if (checkSelfPermission(Manifest.permission.READ_EXTERNAL_STORAGE) == PackageManager.PERMISSION_DENIED) {
                          String[] permissions = {Manifest.permission.READ_EXTERNAL_STORAGE};
                          requestPermissions(permissions, PERM_CODE);
                      } else {
                          openGallery();
                      }
                  });
              }

              private void openGallery() {
                  Intent intent = new Intent(Intent.ACTION_PICK);
                  intent.setType("image/*");
                  startActivityForResult(intent, PICK_IMAGE);
              }

              @Override
              public void onRequestPermissionsResult(int req, String[] perms, int[] res) {
                  if (req == PERM_CODE && res.length > 0 && res[0] == PackageManager.PERMISSION_GRANTED) {
                      openGallery();
                  } else {
                      Toast.makeText(this, "Permission Denied!", Toast.LENGTH_SHORT).show();
                  }
              }

              @Override
              protected void onActivityResult(int req, int res, Intent data) {
                  if (res == RESULT_OK && req == PICK_IMAGE && data != null) {
                      Uri imageUri = data.getData();
                      previewImage.setImageURI(imageUri);
                      previewImage.setVisibility(View.VISIBLE);
                  }
              }
          }
          EOF

      - name: Create Layout with Image Preview
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#1E1E1E">
              
              <HorizontalScrollView android:layout_width="match_parent" android:layout_height="wrap_content" android:background="#252526">
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:padding="5dp">
                      <Button android:id="@+id/btnAddImg" android:layout_width="wrap_content" android:layout_height="40dp" android:text="ADD IMAGE" android:textSize="12sp" android:backgroundTint="#0E639C"/>
                      <Button android:id="@+id/btnBuild" android:layout_width="wrap_content" android:layout_height="40dp" android:text="BUILD APK" android:textSize="12sp" android:backgroundTint="#28A745" android:layout_marginLeft="5dp"/>
                  </LinearLayout>
              </HorizontalScrollView>

              <EditText android:id="@+id/codeEditor" android:layout_width="match_parent" 
                  android:layout_height="200dp" android:background="#1E1E1E" android:textColor="#D4D4D4"
                  android:fontFamily="monospace" android:gravity="top" android:hint="// Code here..." android:padding="15dp"/>

              <ImageView android:id="@+id/imgPreview" android:layout_width="match_parent" 
                  android:layout_height="150dp" android:scaleType="centerInside" 
                  android:visibility="gone" android:background="#000" android:layout_margin="10dp"/>

              <TextView android:id="@+id/terminal" android:layout_width="match_parent"
                  android:layout_height="match_parent" android:background="#000" android:textColor="#0F0"
                  android:padding="10dp" android:fontFamily="monospace" android:text="Console > Waiting for media..."/>
          </LinearLayout>
          EOF

      - name: Finalize Build Configuration
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.dim.studio'; compileSdk 34; defaultConfig { applicationId "com.dim.studio"; minSdk 21; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <application android:label="DimStudio Media" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimStudio-Media-v18
          path: app/build/outputs/apk/debug/*.apk
