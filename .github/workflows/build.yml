name: Build DimBlox AntiCrash

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Rebuild Project Structure
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/dim/blox/vulkan
          mkdir -p app/src/main/jni
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Create Correct JNI Header & Logic
        run: |
          cat > app/src/main/jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE    := vulkan_engine
          LOCAL_SRC_FILES := main.cpp
          LOCAL_LDLIBS    := -llog -landroid -lvulkan
          include $(BUILD_SHARED_LIBRARY)
          EOF

          cat > app/src/main/jni/main.cpp << 'EOF'
          #include <jni.h>
          #include <android/log.h>

          // СТРОГОЕ СОБЛЮДЕНИЕ ИМЕНИ ПАКЕТА: com_dim_blox
          extern "C" {
              JNIEXPORT jstring JNICALL
              Java_com_dim_blox_MainActivity_initVulkan(JNIEnv* env, jobject obj) {
                  __android_log_print(ANDROID_LOG_INFO, "DimBlox", "Vulkan Native Link: SUCCESS");
                  return env->NewStringUTF("Vulkan Engine Linked!");
              }

              JNIEXPORT void JNICALL
              Java_com_dim_blox_MainActivity_onJump(JNIEnv* env, jobject obj) {
                  __android_log_print(ANDROID_LOG_INFO, "DimBlox", "Native Jump Executed");
              }
          }
          EOF

      - name: Create Robust MainActivity
        run: |
          cat > app/src/main/java/com/dim/blox/MainActivity.java << 'EOF'
          package com.dim.blox;
          import android.app.Activity;
          import android.os.Bundle;
          import android.util.Log;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              // Загрузка библиотеки с обработкой ошибок
              static {
                  try {
                      System.loadLibrary("vulkan_engine");
                  } catch (UnsatisfiedLinkError e) {
                      Log.e("DimBlox", "Native library not found!");
                  }
              }

              public native String initVulkan();
              public native void onJump();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  try {
                      setContentView(R.layout.activity_main);
                      String msg = initVulkan();
                      Toast.makeText(this, msg, Toast.LENGTH_LONG).show();
                  } catch (Exception e) {
                      Log.e("DimBlox", "Crash in onCreate: " + e.getMessage());
                  }
              }
          }
          EOF

      - name: Create View Components (Joystick)
        run: |
          cat > app/src/main/java/com/dim/blox/vulkan/JoystickView.java << 'EOF'
          package com.dim.blox.vulkan;
          import android.content.Context;
          import android.graphics.*;
          import android.view.*;
          import android.util.AttributeSet;

          public class JoystickView extends View {
              private float centerX, centerY, baseRadius, tX, tY;
              private Paint p = new Paint(Paint.ANTI_ALIAS_FLAG);
              public JoystickView(Context c, AttributeSet a) { super(c, a); }
              @Override protected void onSizeChanged(int w, int h, int ow, int oh) {
                  centerX = w/2f; centerY = h/2f; baseRadius = Math.min(w,h)*0.3f;
                  tX = centerX; tY = centerY;
              }
              @Override protected void onDraw(Canvas c) {
                  p.setColor(Color.argb(100, 200, 200, 200));
                  c.drawCircle(centerX, centerY, baseRadius, p);
                  p.setColor(Color.WHITE);
                  c.drawCircle(tX, tY, baseRadius*0.5f, p);
              }
              @Override public boolean onTouchEvent(MotionEvent e) {
                  if (e.getAction() != MotionEvent.ACTION_UP) {
                      tX = e.getX(); tY = e.getY();
                  } else { tX = centerX; tY = centerY; }
                  invalidate(); return true;
              }
          }
          EOF

      - name: Create Layout and Manifest
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#121212">
              <com.dim.blox.vulkan.JoystickView android:id="@+id/joyL"
                  android:layout_width="200dp" android:layout_height="200dp"
                  android:layout_alignParentBottom="true" android:layout_margin="20dp"/>
          </RelativeLayout>
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimBlox Fix" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build and Sign
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dim.blox'
              compileSdk 34
              defaultConfig { applicationId "com.dim.blox"; minSdk 24; targetSdk 34 }
              externalNativeBuild { ndkBuild { path file('src/main/jni/Android.mk') } }
          }
          EOF
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimBlox-AntiCrash-v28
          path: app/build/outputs/apk/debug/*.apk
