name: Build DimCheat Overlay

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/java/com/dimcheat/app
          mkdir -p gradle/wrapper

      - name: Create Overlay Service (С фиксом для игр)
        run: |
          cat > app/src/main/java/com/dimcheat/app/OverlayService.java << 'EOF'
          package com.dimcheat.app;

          import android.app.Service;
          import android.content.Intent;
          import android.graphics.PixelFormat;
          import android.os.IBinder;
          import android.view.Gravity;
          import android.view.LayoutInflater;
          import android.view.MotionEvent;
          import android.view.View;
          import android.view.WindowManager;
          import android.widget.Button;
          import android.widget.Toast;

          public class OverlayService extends Service {
              private WindowManager wm;
              private View floatingView;

              @Override
              public IBinder onBind(Intent intent) { return null; }

              @Override
              public void onCreate() {
                  super.onCreate();
                  wm = (WindowManager) getSystemService(WINDOW_SERVICE);
                  floatingView = LayoutInflater.from(this).inflate(R.layout.overlay_layout, null);

                  final WindowManager.LayoutParams params = new WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY, // Важно для новых Android
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                      PixelFormat.TRANSLUCENT);

                  params.gravity = Gravity.TOP | Gravity.START;
                  params.x = 0;
                  params.y = 100;

                  wm.addView(floatingView, params);

                  // Логика перемещения
                  floatingView.setOnTouchListener(new View.OnTouchListener() {
                      private int initialX, initialY;
                      private float initialTouchX, initialTouchY;

                      @Override
                      public boolean onTouch(View v, MotionEvent event) {
                          switch (event.getAction()) {
                              case MotionEvent.ACTION_DOWN:
                                  initialX = params.x; initialY = params.y;
                                  initialTouchX = event.getRawX(); initialTouchY = event.getRawY();
                                  return true;
                              case MotionEvent.ACTION_MOVE:
                                  params.x = initialX + (int) (event.getRawX() - initialTouchX);
                                  params.y = initialY + (int) (event.getRawY() - initialTouchY);
                                  wm.updateViewLayout(floatingView, params);
                                  return true;
                          }
                          return false;
                      }
                  });

                  // Кнопка Скан
                  floatingView.findViewById(R.id.btnScan).setOnClickListener(v -> 
                      Toast.makeText(this, "Scanning Game Memory...", Toast.LENGTH_SHORT).show());

                  // Кнопка ЗАКРЫТЬ
                  floatingView.findViewById(R.id.btnClose).setOnClickListener(v -> stopSelf());
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (floatingView != null) wm.removeView(floatingView);
              }
          }
          EOF

      - name: Create UI (Добавлена кнопка Close)
        run: |
          cat > app/src/main/res/layout/overlay_layout.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="wrap_content" android:layout_height="wrap_content"
              android:background="#E61A1A1A" android:padding="10dp" android:orientation="vertical">
              <LinearLayout 
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:orientation="horizontal" android:gravity="center_vertical">
                  <TextView android:layout_width="0dp" android:layout_height="wrap_content" 
                      android:layout_weight="1" android:text="DimCheat v1.1" 
                      android:textColor="#00FF00" android:textStyle="bold" android:textSize="12sp"/>
                  <Button android:id="@+id/btnClose" android:layout_width="35dp" 
                      android:layout_height="35dp" android:text="X" android:backgroundTint="#FF4444" 
                      android:textSize="10sp" android:padding="0dp"/>
              </LinearLayout>
              <View android:layout_width="match_parent" android:layout_height="1dp" 
                  android:background="#444" android:layout_marginVertical="5dp"/>
              <Button android:id="@+id/btnScan" android:layout_width="match_parent" 
                  android:layout_height="wrap_content" android:text="SCAN MEMORY" 
                  android:backgroundTint="#2196F3" android:textSize="10sp"/>
          </LinearLayout>
          EOF

      - name: Final Project Configs
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          EOF
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.dimcheat.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimcheat.app"
                  minSdk 21
                  targetSdk 34
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          echo "include ':app'" > settings.gradle
          echo '<resources><style name="Theme.DimVPN" parent="Theme.AppCompat.DayNight.NoActionBar" /></resources>' > app/src/main/res/values/themes.xml

      - name: Build APK
        run: |
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          printf "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nexec java -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimCheat-V1.1
          path: app/build/outputs/apk/debug/*.apk
