name: Build DimOpenOS Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          mkdir -p app/src/main/java/com/dim/openos/core
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/assets/sys_root/system
          mkdir -p gradle/wrapper
          # Даем права на запись во все созданные папки
          chmod -R 777 gradle

      - name: Create System Files & Assets
        run: |
          echo "ro.build.display.id=DimOpenOS-v1.1" > app/src/main/assets/sys_root/system/build.prop
          echo "ro.secure=0" >> app/src/main/assets/sys_root/system/build.prop
          echo "ro.debuggable=1" >> app/src/main/assets/sys_root/system/build.prop

      - name: Create Java Logic
        run: |
          cat > app/src/main/java/com/dim/openos/MainActivity.java << 'EOF'
          package com.dim.openos;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.*;
          public class MainActivity extends Activity {
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  LinearLayout l = new LinearLayout(this);
                  l.setOrientation(LinearLayout.VERTICAL);
                  l.setPadding(50, 50, 50, 50);
                  l.setBackgroundColor(0xFF000000);
                  
                  TextView t = new TextView(this);
                  t.setText("DimOpenOS Kernel");
                  t.setTextColor(0xFF00FF00);
                  t.setTextSize(24);
                  
                  Button btn = new Button(this);
                  btn.setText("FLASH & START OPEN SYSTEM");
                  btn.setBackgroundColor(0xFF333333);
                  btn.setTextColor(0xFF00FF00);
                  
                  btn.setOnClickListener(v -> {
                      Toast.makeText(this, "Installing Custom Android Rootfs...", Toast.LENGTH_LONG).show();
                  });

                  l.addView(t); l.addView(btn);
                  setContentView(l);
              }
          }
          EOF

      - name: Setup Gradle Files
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dim.openos'
              compileSdk 34
              defaultConfig { applicationId "com.dim.openos"; minSdk 21; targetSdk 34 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimOpenOS" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Download Wrapper (Fixed Path)
        run: |
          # Скачиваем напрямую в целевой файл
          curl -sL https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          # Создаем properties для wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          # Создаем исполняемый gradlew
          printf '#!/bin/sh\nexec java -Xmx512m -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew :app:assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DimOpenOS-v4.1
          path: app/build/outputs/apk/debug/*.apk
