              private static final float[][]SKIN_C={{1f,.85f,.15f},{1f,.7f,.5f},{.6f,.35f,.15f},{1f,.55f,.3f},{.85f,.75f,.65f},{.3f,.2f,.1f}};
              private static final float[][]TORSO_C={{.1f,.4f,1f},{1f,.1f,.1f},{.1f,.8f,.1f},{.8f,0f,.8f},{1f,.5f,0f},{.9f,.9f,.9f}};
              private static final float[][]LEGS_C={{.1f,.8f,.2f},{.1f,.1f,.6f},{.5f,.5f,.5f},{0f,0f,0f},{.8f,.6f,0f},{.5f,0f,0f}};
              private static final int[]SKIN_I={0xFFD8B420,0xFFFFB280,0xFF996028,0xFFFF8C4C,0xFFDAC0A6,0xFF4D3318};
              private static final int[]TORSO_I={0xFF1A66FF,0xFFFF1A1A,0xFF1ACC1A,0xFFCC00CC,0xFFFF8000,0xFFE6E6E6};
