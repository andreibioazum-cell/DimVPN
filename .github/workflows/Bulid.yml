                          lblShape.setVisibility(View.VISIBLE);lblSize.setVisibility(View.VISIBLE);lblIntensity.setVisibility(View.GONE);
                      }else if(ren.objType==1){
                          shapePanel.setVisibility(View.GONE);lightPanel.setVisibility(View.VISIBLE);itemPanel.setVisibility(View.GONE);textPanel.setVisibility(View.GONE);
                          sizePanel.setVisibility(View.GONE);intensityPanel.setVisibility(View.VISIBLE);
                          lblShape.setVisibility(View.VISIBLE);lblSize.setVisibility(View.GONE);lblIntensity.setVisibility(View.VISIBLE);
                      }else if(ren.objType==2){
                          shapePanel.setVisibility(View.GONE);lightPanel.setVisibility(View.GONE);itemPanel.setVisibility(View.VISIBLE);textPanel.setVisibility(View.GONE);
                          sizePanel.setVisibility(View.GONE);intensityPanel.setVisibility(View.GONE);
                          lblShape.setVisibility(View.VISIBLE);lblSize.setVisibility(View.GONE);lblIntensity.setVisibility(View.GONE);
                      }else{
                          shapePanel.setVisibility(View.GONE);lightPanel.setVisibility(View.GONE);itemPanel.setVisibility(View.GONE);textPanel.setVisibility(View.VISIBLE);
                          sizePanel.setVisibility(View.GONE);intensityPanel.setVisibility(View.GONE);
                          lblShape.setVisibility(View.GONE);lblSize.setVisibility(View.GONE);lblIntensity.setVisibility(View.GONE);
                      }
                  });
              }

              private void updIntensity(){runOnUiThread(()->txtIntensity.setText(String.format(java.util.Locale.US,"%.0f",ren.lightIntensity)));}

              private void setupCustomize(){
                  buildColorRow(findViewById(R.id.skin_colors),SKIN_I,i->{ren.charSkinR=SKIN_C[i][0];ren.charSkinG=SKIN_C[i][1];ren.charSkinB=SKIN_C[i][2];savePrefs();});
                  buildColorRow(findViewById(R.id.torso_colors),TORSO_I,i->{ren.charTorsoR=TORSO_C[i][0];ren.charTorsoG=TORSO_C[i][1];ren.charTorsoB=TORSO_C[i][2];savePrefs();});
                  buildColorRow(findViewById(R.id.legs_colors),LEGS_I,i->{ren.charLegsR=LEGS_C[i][0];ren.charLegsG=LEGS_C[i][1];ren.charLegsB=LEGS_C[i][2];savePrefs();});
                  buildColorRow(findViewById(R.id.hair_colors),HAIR_I,i->{ren.charHairR=HAIR_C[i][0];ren.charHairG=HAIR_C[i][1];ren.charHairB=HAIR_C[i][2];savePrefs();});

                  LinearLayout faceRow=findViewById(R.id.face_select);
                  faceRow.removeAllViews();
                  String[]faceNames={"Smile","Tongue"};
                  for(int i=0;i<2;i++){
                      final int ii=i;
                      Button fb=new Button(this);
                      LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(0,dpToPx(40));lp.weight=1;lp.setMargins(dpToPx(2),0,dpToPx(2),0);
                      fb.setLayoutParams(lp);fb.setText(faceNames[i]);fb.setTextSize(12);
                      fb.setBackgroundResource(ii==selectedFace?R.drawable.btn_blue_filled:R.drawable.btn_blue);
                      fb.setTextColor(ii==selectedFace?0xFF000000:0xFF00BFFF);
                      fb.setOnClickListener(v->{selectedFace=ii;ren.faceType=ii;savePrefs();setupCustomize();});
                      faceRow.addView(fb);
                  }

                  findViewById(R.id.btn_pack_default).setOnClickListener(v->{equippedPack=0;applyPack();savePrefs();updCustPacks();Toast.makeText(this,"Default equipped",Toast.LENGTH_SHORT).show();});
                  findViewById(R.id.btn_pack_fly).setOnClickListener(v->{
                      if(ownedFly){equippedPack=1;applyPack();savePrefs();updCustPacks();Toast.makeText(this,"Fly equipped",Toast.LENGTH_SHORT).show();}
                      else if(infiniteRidix||ridix>=PACK_PRICE){if(!infiniteRidix)ridix-=PACK_PRICE;ownedFly=true;equippedPack=1;applyPack();savePrefs();updRidix();updCustPacks();Toast.makeText(this,"Fly purchased!",Toast.LENGTH_SHORT).show();}
                      else Toast.makeText(this,"Need "+PACK_PRICE+" Ridix",Toast.LENGTH_SHORT).show();
                  });
                  findViewById(R.id.btn_promo).setOnClickListener(v->{
                      EditText et=findViewById(R.id.et_promo);String code=et.getText().toString().trim();
                      if(code.equals("Dimasi4ek229")){infiniteRidix=true;savePrefs();updRidix();et.setText("");Toast.makeText(this,"Infinite Ridix!",Toast.LENGTH_LONG).show();}
                      else Toast.makeText(this,"Invalid code",Toast.LENGTH_SHORT).show();
                  });
              }

              private int dpToPx(int dp){return(int)(dp*getResources().getDisplayMetrics().density);}
              private void buildColorRow(LinearLayout row,int[]colors,CP cb){
                  row.removeAllViews();int dp=dpToPx(8);
                  for(int i=0;i<colors.length;i++){final int ii=i;View dot=new View(this);LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(dp*5,dp*5);lp.setMargins(dp/2,0,dp/2,0);dot.setLayoutParams(lp);GradientDrawable gd=new GradientDrawable();gd.setShape(GradientDrawable.OVAL);gd.setColor(colors[i]);gd.setStroke(3,0xFF00BFFF);dot.setBackground(gd);dot.setOnClickListener(vv->{cb.pick(ii);Toast.makeText(this,"Applied",Toast.LENGTH_SHORT).show();});row.addView(dot);}
              }
              private void updCustPacks(){
                  Button bd=findViewById(R.id.btn_pack_default),bf=findViewById(R.id.btn_pack_fly);
                  TextView tf=findViewById(R.id.txt_fly_price);
                  bd.setText(equippedPack==0?"Equipped":"Equip");bd.setBackgroundResource(equippedPack==0?R.drawable.btn_blue_filled:R.drawable.btn_blue);bd.setTextColor(equippedPack==0?0xFF000000:0xFF00BFFF);
                  if(ownedFly){bf.setText(equippedPack==1?"Equipped":"Equip");bf.setBackgroundResource(equippedPack==1?R.drawable.btn_blue_filled:R.drawable.btn_blue);bf.setTextColor(equippedPack==1?0xFF000000:0xFF00BFFF);tf.setText("Owned");}
                  else{bf.setText("Buy");bf.setBackgroundResource(R.drawable.btn_blue);bf.setTextColor(0xFF00BFFF);tf.setText(PACK_PRICE+" Ridix");}
              }
              private void applyPack(){if(ren!=null)ren.animPack=equippedPack;}
              private void startRidixTimer(){
                  stopRidixTimer();
                  ridixTimer=new Runnable(){@Override public void run(){if(!infiniteRidix){ridix+=RIDIX_REWARD;savePrefs();}updRidix();Toast.makeText(MainActivity.this,"+"+RIDIX_REWARD+" Ridix",Toast.LENGTH_SHORT).show();handler.postDelayed(this,RIDIX_SEC*1000L);}};
                  handler.postDelayed(ridixTimer,RIDIX_SEC*1000L);
              }
              private void stopRidixTimer(){if(ridixTimer!=null){handler.removeCallbacks(ridixTimer);ridixTimer=null;}}
              private void updRidix(){String sv=infiniteRidix?"Inf":String.valueOf(ridix);if(txtRidixLobby!=null)txtRidixLobby.setText(sv);if(txtRidixShop!=null)txtRidixShop.setText(sv);}
              private void savePrefs(){
                  SharedPreferences.Editor ed=getSharedPreferences("enjoer",MODE_PRIVATE).edit();
                  ed.putInt("ridix",ridix);ed.putBoolean("fly",ownedFly);ed.putInt("pack",equippedPack);ed.putBoolean("infRidix",infiniteRidix);ed.putInt("face",selectedFace);
                  ed.putFloat("sR",ren!=null?ren.charSkinR:1f);ed.putFloat("sG",ren!=null?ren.charSkinG:0.82f);ed.putFloat("sB",ren!=null?ren.charSkinB:0.6f);
                  ed.putFloat("tR",ren!=null?ren.charTorsoR:0.1f);ed.putFloat("tG",ren!=null?ren.charTorsoG:0.4f);ed.putFloat("tB",ren!=null?ren.charTorsoB:1f);
                  ed.putFloat("lR",ren!=null?ren.charLegsR:0.1f);ed.putFloat("lG",ren!=null?ren.charLegsG:0.8f);ed.putFloat("lB",ren!=null?ren.charLegsB:0.2f);
                  ed.putFloat("hR",ren!=null?ren.charHairR:0.2f);ed.putFloat("hG",ren!=null?ren.charHairG:0.15f);ed.putFloat("hB",ren!=null?ren.charHairB:0.1f);
                  ed.apply();
              }
              private void loadPrefs(){
                  SharedPreferences sp=getSharedPreferences("enjoer",MODE_PRIVATE);
                  ridix=sp.getInt("ridix",0);ownedFly=sp.getBoolean("fly",false);equippedPack=sp.getInt("pack",0);infiniteRidix=sp.getBoolean("infRidix",false);selectedFace=sp.getInt("face",0);
              }
              private void applyPrefsToRen(){
                  SharedPreferences sp=getSharedPreferences("enjoer",MODE_PRIVATE);
                  ren.charSkinR=sp.getFloat("sR",1f);ren.charSkinG=sp.getFloat("sG",0.82f);ren.charSkinB=sp.getFloat("sB",0.6f);
                  ren.charTorsoR=sp.getFloat("tR",0.1f);ren.charTorsoG=sp.getFloat("tG",0.4f);ren.charTorsoB=sp.getFloat("tB",1f);
                  ren.charLegsR=sp.getFloat("lR",0.1f);ren.charLegsG=sp.getFloat("lG",0.8f);ren.charLegsB=sp.getFloat("lB",0.2f);
                  ren.charHairR=sp.getFloat("hR",0.2f);ren.charHairG=sp.getFloat("hG",0.15f);ren.charHairB=sp.getFloat("hB",0.1f);
                  ren.animPack=equippedPack;ren.faceType=selectedFace;
              }
              @Override protected void onResume(){super.onResume();if(ren!=null)applyPrefsToRen();handler.postDelayed(this::updInventory,300);}
              @Override protected void onPause(){super.onPause();stopRidixTimer();savePrefs();}

              private void resetP(){ren.pX=0;ren.pY=7;ren.pZ=15;ren.vY=0;ren.hasStick=false;for(int i=0;i<ren.inventory.length;i++)ren.inventory[i]=null;}
              private void axisBtn(int id,float dx,float dy,float dz){findViewById(id).setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN||e.getAction()==MotionEvent.ACTION_MOVE){float step=ren.gridEnabled?ren.gridSize:0.5f;ren.moveSelected(dx*step,dy*step,dz*step);}return true;});}
              private void updAxis(){
                  runOnUiThread(()->{
                      boolean sel=ren.selectedIndex>=0;
                      axisPanel.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDeselect.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnHide.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDelete.setVisibility(sel?View.VISIBLE:View.GONE);
                      if(sel){
                          if(ren.selectedType==0&&ren.selectedIndex<ren.blocks.size()){Block b=ren.blocks.get(ren.selectedIndex);btnHide.setText(b.hidden?"Show":"Hide");}
                          else if(ren.selectedType==1&&ren.selectedIndex<ren.lights.size()){Light l=ren.lights.get(ren.selectedIndex);btnHide.setText(l.hidden?"Show":"Hide");}
                          else if(ren.selectedType==2&&ren.selectedIndex<ren.items.size()){Item it=ren.items.get(ren.selectedIndex);btnHide.setText(it.hidden?"Show":"Hide");}
                          else if(ren.selectedType==3&&ren.selectedIndex<ren.texts.size()){GameText gt=ren.texts.get(ren.selectedIndex);btnHide.setText(gt.hidden?"Show":"Hide");}
                      }
                  });
              }
              private void updSizeInfo(){runOnUiThread(()->txtSizeInfo.setText(String.format(java.util.Locale.US,"%.1f x %.1f x %.1f",ren.blockSX,ren.blockSY,ren.blockSZ)));}
              private void updGridBtn(){runOnUiThread(()->{if(ren.gridEnabled){btnGrid.setText("Grid: On");btnGrid.setBackgroundResource(R.drawable.btn_blue_filled);btnGrid.setTextColor(0xFF000000);}else{btnGrid.setText("Grid: Off");btnGrid.setBackgroundResource(R.drawable.btn_blue);btnGrid.setTextColor(0xFF00BFFF);}});}
              private void setupJoy(View base,View stick){base.setOnTouchListener((v,e)->{float cx=v.getWidth()/2f,cy=v.getHeight()/2f;if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){float dx=e.getX()-cx,dy=e.getY()-cy,d=(float)Math.sqrt(dx*dx+dy*dy),lim=cx-stick.getWidth()/2f;if(d>lim){dx*=lim/d;dy*=lim/d;}stick.setTranslationX(dx);stick.setTranslationY(dy);ren.jX=dx/lim;ren.jY=dy/lim;}else if(e.getAction()==MotionEvent.ACTION_UP){stick.setTranslationX(0);stick.setTranslationY(0);ren.jX=0;ren.jY=0;}return true;});}
              private void setupLook(View z){z.setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}else if(e.getAction()==MotionEvent.ACTION_MOVE){ren.rY+=(e.getX()-lx)*0.25f;ren.rX=Math.max(-80,Math.min(80,ren.rX+(e.getY()-ly)*0.25f));lx=e.getX();ly=e.getY();}return true;});}
              private void updBtnGrp(Button[]btns,int sel){for(int i=0;i<btns.length;i++){if(i==sel){btns[i].setBackgroundResource(R.drawable.btn_blue_filled);btns[i].setTextColor(0xFF000000);}else{btns[i].setBackgroundResource(R.drawable.btn_blue);btns[i].setTextColor(0xFF00BFFF);}}}
              private void updColSel(int sel){for(int i=0;i<colorBtn.length;i++){try{GradientDrawable bg=(GradientDrawable)colorBtn[i].getBackground();if(i==sel)bg.setStroke(6,0xFFFFFFFF);else bg.setStroke(2,0xFF00BFFF);}catch(Exception ignored){}}}
          }
          ENDMAIN

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer 7.1" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 }
              buildFeatures { buildConfig true }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'org.mozilla:rhino:1.7.14'
          }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_7.1_Ultimate
          path: app/build/outputs/apk/debug/app-debug.apk
