name: Enjoer_Horror_3D_Menu_Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # Стили
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
              <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
            </style>
          </resources>
          EOF

          # UI Оформление
          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#22000000"/>
            <stroke android:width="2dp" android:color="#44FF0000"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_stick.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#FF0000"/>
          </shape>
          EOF

          # Макет
          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#050000">

              <android.opengl.GLSurfaceView
                  android:id="@+id/gl_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>

              <View
                  android:id="@+id/look_zone"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>

              <RelativeLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:padding="20dp">

                  <TextView
                      android:id="@+id/horror_text"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_centerHorizontal="true"
                      android:text="ENJOER 6.1 : VOID EDITION"
                      android:textColor="#FF0000"
                      android:textSize="14sp"
                      android:fontFamily="monospace"/>

                  <FrameLayout
                      android:id="@+id/joy_base"
                      android:layout_width="130dp"
                      android:layout_height="130dp"
                      android:layout_alignParentBottom="true"
                      android:layout_alignParentLeft="true"
                      android:background="@drawable/joy_base"/>

                  <View
                      android:id="@+id/joy_stick"
                      android:layout_width="50dp"
                      android:layout_height="50dp"
                      android:layout_alignLeft="@id/joy_base"
                      android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="40dp"
                      android:layout_marginTop="40dp"
                      android:background="@drawable/joy_stick"/>

                  <TextView
                      android:id="@+id/instruction"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_centerInParent="true"
                      android:layout_marginTop="100dp"
                      android:text="WALK INTO THE RED CUBE TO BEGIN"
                      android:textColor="#55FF0000"
                      android:textSize="12sp"/>
              </RelativeLayout>
          </FrameLayout>
          LAYOUT

          # Класс Block
          cat <<EOF > app/src/main/java/com/enjoer/game/Block.java
          package com.enjoer.game;
          public class Block {
              public float x, y, z, sx, sy, sz, r, g, b;
              public String type;
              public Block(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b, String type) {
                  this.x=x; this.y=y; this.z=z; this.sx=sx; this.sy=sy; this.sz=sz; this.r=r; this.g=g; this.b=b; this.type=type;
              }
              public float minX(){return x-sx/2f;} public float maxX(){return x+sx/2f;}
              public float minY(){return y-sy/2f;} public float maxY(){return y+sy/2f;}
              public float minZ(){return z-sz/2f;} public float maxZ(){return z+sz/2f;}
          }
          EOF

          # Рендерер с хоррор-шейдерами
          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;

          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              public float pX=0, pY=4.5f, pZ=12, rY=0, rX=0, jX=0, jY=0;
              public final CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              private int prog;
              private FloatBuffer vBuf;
              private final float[] proj=new float[16], view=new float[16], model=new float[16], vp=new float[16];
              public boolean isMenu = true;
              private float time = 0;

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  
                  String vs = "#version 300 es\n" +
                      "layout(location=0) in vec4 aP;\n" +
                      "uniform mat4 uMVP; out vec3 vP;\n" +
                      "void main(){ vP=aP.xyz; gl_Position=uMVP*aP; }";

                  String fs = "#version 300 es\nprecision highp float;\n" +
                      "in vec3 vP; uniform vec4 uC; uniform float uTime; out vec4 fC;\n" +
                      "void main(){\n" +
                      "  float scanline = sin(vP.y * 100.0 + uTime * 10.0) * 0.1;\n" +
                      "  vec3 col = uC.rgb + scanline;\n" +
                      "  float d = length(vP); \n" +
                      "  fC = vec4(col, uC.a);\n" +
                      "}";
                  prog = mkProg(vs, fs);
                  
                  float[] vc = { -.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,.5f, .5f,-.5f,.5f, -.5f,.5f,-.5f, -.5f,-.5f,-.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f,
                                -.5f,.5f,-.5f, -.5f,.5f,.5f, .5f,.5f,-.5f, .5f,.5f,.5f, -.5f,-.5f,-.5f, -.5f,-.5f,.5f, .5f,-.5f,-.5f, .5f,-.5f,.5f,
                                -.5f,.5f,-.5f, -.5f,-.5f,-.5f, -.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f, .5f,.5f,.5f, .5f,-.5f,.5f };
                  vBuf = ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc);
                  vBuf.position(0);
                  
                  loadMenu();
              }

              public void loadMenu() {
                  blocks.clear();
                  isMenu = true;
                  // Пол (черный бетон)
                  blocks.add(new Block(0, 0, 0, 40, 0.1f, 40, 0.05f, 0.05f, 0.05f, "env"));
                  // 3D Кнопка ПУСК (Красный пульсирующий куб)
                  blocks.add(new Block(0, 2, -8, 3, 3, 3, 0.6f, 0, 0, "btn_play"));
                  // Декор (столбы)
                  blocks.add(new Block(-10, 5, -10, 1, 10, 1, 0.1f, 0.1f, 0.1f, "env"));
                  blocks.add(new Block(10, 5, -10, 1, 10, 1, 0.1f, 0.1f, 0.1f, "env"));
              }

              public void startHorror() {
                  isMenu = false;
                  blocks.clear();
                  blocks.add(new Block(0, 0, 0, 100, 0.1f, 100, 0.02f, 0.02f, 0.02f, "env"));
                  for(int i=0; i<30; i++) {
                      float rx = (float)Math.random()*80-40;
                      float rz = (float)Math.random()*80-40;
                      blocks.add(new Block(rx, 4, rz, 2, 8, 2, 0.1f, 0, 0, "enemy"));
                  }
              }

              @Override
              public void onDrawFrame(GL10 gl) {
                  time += 0.02f;
                  updateMovement();
                  GLES30.glClearColor(0, 0, 0, 1);
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT);
                  GLES30.glUseProgram(prog);

                  float vx = (float)(Math.sin(Math.toRadians(rY)));
                  float vz = (float)(-Math.cos(Math.toRadians(rY)));
                  Matrix.setLookAtM(view, 0, pX, pY, pZ, pX+vx, pY, pZ+vz, 0, 1, 0);
                  Matrix.multiplyMM(vp, 0, proj, 0, view, 0);

                  int uMVP = GLES30.glGetUniformLocation(prog, "uMVP");
                  int uC = GLES30.glGetUniformLocation(prog, "uC");
                  int uT = GLES30.glGetUniformLocation(prog, "uTime");
                  GLES30.glUniform1f(uT, time);

                  GLES30.glVertexAttribPointer(0, 3, GLES30.GL_FLOAT, false, 0, vBuf);
                  GLES30.glEnableVertexAttribArray(0);

                  for(Block b : blocks) {
                      Matrix.setIdentityM(model, 0);
                      Matrix.translateM(model, 0, b.x, b.y, b.z);
                      Matrix.scaleM(model, 0, b.sx, b.sy, b.sz);
                      float[] res = new float[16];
                      Matrix.multiplyMM(res, 0, vp, 0, model, 0);
                      GLES30.glUniformMatrix4fv(uMVP, 1, false, res, 0);
                      
                      float pulse = (b.type.equals("btn_play")) ? (float)Math.abs(Math.sin(time*2.0))*0.4f : 0;
                      GLES30.glUniform4f(uC, b.r + pulse, b.g, b.b, 1.0f);
                      
                      for(int i=0; i<6; i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP, i*4, 4);
                  }
              }

              private void updateMovement() {
                  float s = 0.12f;
                  float rad = (float)Math.toRadians(rY);
                  pX += (Math.sin(rad)*-jY + Math.cos(rad)*jX) * s;
                  pZ += (-Math.cos(rad)*-jY + Math.sin(rad)*jX) * s;

                  if(isMenu) {
                      for(Block b : blocks) {
                          if(b.type.equals("btn_play")) {
                              float dist = (float)Math.sqrt(Math.pow(pX-b.x, 2) + Math.pow(pZ-b.z, 2));
                              if(dist < 2.5f) startHorror();
                          }
                      }
                  }
              }

              @Override
              public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0, 0, w, h);
                  Matrix.perspectiveM(proj, 0, 60, (float)w/h, 0.1f, 100f);
              }

              private int mkProg(String v, String f){
                  int p=GLES30.glCreateProgram();
                  int vs=GLES30.glCreateShader(GLES30.GL_VERTEX_SHADER);
                  GLES30.glShaderSource(vs, v); GLES30.glCompileShader(vs);
                  int fs=GLES30.glCreateShader(GLES30.GL_FRAGMENT_SHADER);
                  GLES30.glShaderSource(fs, f); GLES30.glCompileShader(fs);
                  GLES30.glAttachShader(p, vs); GLES30.glAttachShader(p, fs);
                  GLES30.glLinkProgram(p); return p;
              }
          }
          RENDERER

          # MainActivity
          cat <<'MAIN' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.annotation.SuppressLint;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lx, ly;

              @SuppressLint("ClickableViewAccessibility")
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer();
                  gv.setRenderer(ren);

                  findViewById(R.id.joy_base).setOnTouchListener((v,e)->{
                      View stick = findViewById(R.id.joy_stick);
                      float cx=v.getWidth()/2f, cy=v.getHeight()/2f;
                      if(e.getAction()==MotionEvent.ACTION_MOVE || e.getAction()==MotionEvent.ACTION_DOWN){
                          float dx=e.getX()-cx, dy=e.getY()-cy, d=(float)Math.sqrt(dx*dx+dy*dy), lim=cx-stick.getWidth()/2f;
                          if(d>lim){ dx*=lim/d; dy*=lim/d; }
                          stick.setTranslationX(dx); stick.setTranslationY(dy);
                          ren.jX=dx/lim; ren.jY=dy/lim;
                      } else { stick.setTranslationX(0); stick.setTranslationY(0); ren.jX=0; ren.jY=0; }
                      return true;
                  });

                  findViewById(R.id.look_zone).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){ lx=e.getX(); ly=e.getY(); }
                      else if(e.getAction()==MotionEvent.ACTION_MOVE){
                          ren.rY += (e.getX()-lx)*0.3f;
                          lx=e.getX(); ly=e.getY();
                      }
                      return true;
                  });
              }
          }
          MAIN

          # Манифест без лишних тегов package (Gradle 8.0+ style)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer 6.1 Horror" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Сборка
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.enjoer.game'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "6.1-Horror"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_6.1_Horror_Final
          path: app/build/outputs/apk/debug/app-debug.apk
