          cat <<'JAVA' > app/src/main/java/com/d1m/app/Prefs.java
          package com.d1m.app;

          import android.content.Context;

          public class Prefs {
              private static final String SP = "d1m_prefs";
              private static final String K_NAME = "name";
              private static final String K_PHONE = "phone";
              private static final String K_LOGGED = "logged";

              public static boolean isLogged(Context c){
                  return c.getSharedPreferences(SP, Context.MODE_PRIVATE).getBoolean(K_LOGGED, false);
              }

              public static void setProfile(Context c, String name, String phone){
                  c.getSharedPreferences(SP, Context.MODE_PRIVATE).edit()
                      .putString(K_NAME, name)
                      .putString(K_PHONE, phone)
                      .putBoolean(K_LOGGED, true)
                      .apply();
              }

              public static String name(Context c){
                  return c.getSharedPreferences(SP, Context.MODE_PRIVATE).getString(K_NAME, "Пользователь");
              }

              public static String phone(Context c){
                  return c.getSharedPreferences(SP, Context.MODE_PRIVATE).getString(K_PHONE, "+7...");
              }

              public static void logout(Context c){
                  c.getSharedPreferences(SP, Context.MODE_PRIVATE).edit().clear().apply();
              }
          }
          JAVA

          cat <<'JAVA' > app/src/main/java/com/d1m/app/Models.java
          package com.d1m.app;

          public class Models {
              public static class Chat {
                  public String id;
                  public String title;
                  public long updatedAt;
                  public String lastText;

                  public Chat(String id, String title){
                      this.id = id;
                      this.title = title;
                      this.updatedAt = System.currentTimeMillis();
                      this.lastText = "";
                  }
              }

              public static class Msg {
                  public String id;
                  public String chatId;
                  public String text;
                  public long time;
                  public boolean outgoing;

                  public Msg(String id, String chatId, String text, boolean outgoing){
                      this.id = id;
                      this.chatId = chatId;
                      this.text = text;
                      this.outgoing = outgoing;
                      this.time = System.currentTimeMillis();
                  }
              }
          }
          JAVA

          cat <<'JAVA' > app/src/main/java/com/d1m/app/Storage.java
          package com.d1m.app;

          import android.content.Context;
          import org.json.JSONArray;
          import org.json.JSONObject;
          import java.io.*;
          import java.util.ArrayList;
          import java.util.UUID;

          public class Storage {
              private static File file(Context c){
                  return new File(c.getFilesDir(), "d1m_data.json");
              }

              public static void ensureSeed(Context c){
                  File f = file(c);
                  if(f.exists()) return;

                  try{
                      JSONObject root = new JSONObject();
                      JSONArray chats = new JSONArray();

                      Models.Chat c1 = new Models.Chat(UUID.randomUUID().toString(), "Заметки");
                      c1.lastText = "Добро пожаловать в D1m!";
                      chats.put(chatToJson(c1));

                      Models.Chat c2 = new Models.Chat(UUID.randomUUID().toString(), "Алиса");
                      c2.lastText = "Привет!";
                      chats.put(chatToJson(c2));

                      root.put("chats", chats);

                      JSONObject msgs = new JSONObject();
                      msgs.put(c1.id, new JSONArray().put(msgToJson(new Models.Msg(UUID.randomUUID().toString(), c1.id, "Добро пожаловать в D1m!", false))));
                      msgs.put(c2.id, new JSONArray().put(msgToJson(new Models.Msg(UUID.randomUUID().toString(), c2.id, "Привет!", false))));
                      root.put("messages", msgs);

                      write(c, root.toString());
                  }catch(Exception ignored){}
              }

              public static ArrayList<Models.Chat> loadChats(Context c){
                  ensureSeed(c);
                  ArrayList<Models.Chat> out = new ArrayList<>();
                  try{
                      JSONObject root = new JSONObject(read(c));
                      JSONArray arr = root.getJSONArray("chats");
                      for(int i=0;i<arr.length();i++){
                          out.add(chatFromJson(arr.getJSONObject(i)));
                      }
                  }catch(Exception ignored){}
                  return out;
              }

              public static ArrayList<Models.Msg> loadMessages(Context c, String chatId){
                  ensureSeed(c);
                  ArrayList<Models.Msg> out = new ArrayList<>();
                  try{
                      JSONObject root = new JSONObject(read(c));
                      JSONObject all = root.getJSONObject("messages");
                      JSONArray arr = all.optJSONArray(chatId);
                      if(arr == null) return out;
                      for(int i=0;i<arr.length();i++){
                          out.add(msgFromJson(arr.getJSONObject(i)));
                      }
                  }catch(Exception ignored){}
                  return out;
              }

              public static void addMessage(Context c, Models.Msg msg){
                  ensureSeed(c);
                  try{
                      JSONObject root = new JSONObject(read(c));
                      JSONObject all = root.getJSONObject("messages");

                      JSONArray arr = all.optJSONArray(msg.chatId);
                      if(arr == null) arr = new JSONArray();
                      arr.put(msgToJson(msg));
                      all.put(msg.chatId, arr);

                      JSONArray chats = root.getJSONArray("chats");
                      for(int i=0;i<chats.length();i++){
                          JSONObject co = chats.getJSONObject(i);
                          if(co.optString("id").equals(msg.chatId)){
                              co.put("lastText", msg.text);
                              co.put("updatedAt", msg.time);
                              break;
                          }
                      }

                      write(c, root.toString());
                  }catch(Exception ignored){}
              }

              public static Models.Chat createChat(Context c, String title){
                  ensureSeed(c);
                  Models.Chat chat = new Models.Chat(UUID.randomUUID().toString(), title);
                  try{
                      JSONObject root = new JSONObject(read(c));
                      JSONArray chats = root.getJSONArray("chats");
                      chats.put(chatToJson(chat));
                      root.put("chats", chats);

                      JSONObject all = root.getJSONObject("messages");
                      all.put(chat.id, new JSONArray());
                      root.put("messages", all);

                      write(c, root.toString());
                  }catch(Exception ignored){}
                  return chat;
              }

              private static JSONObject chatToJson(Models.Chat c){
                  JSONObject o = new JSONObject();
                  try{
                      o.put("id", c.id);
                      o.put("title", c.title);
                      o.put("updatedAt", c.updatedAt);
                      o.put("lastText", c.lastText);
                  }catch(Exception ignored){}
                  return o;
              }

              private static Models.Chat chatFromJson(JSONObject o){
                  Models.Chat c = new Models.Chat(o.optString("id"), o.optString("title"));
                  c.updatedAt = o.optLong("updatedAt", System.currentTimeMillis());
                  c.lastText = o.optString("lastText", "");
                  return c;
              }

              private static JSONObject msgToJson(Models.Msg m){
                  JSONObject o = new JSONObject();
                  try{
                      o.put("id", m.id);
                      o.put("chatId", m.chatId);
                      o.put("text", m.text);
                      o.put("time", m.time);
                      o.put("outgoing", m.outgoing);
                  }catch(Exception ignored){}
                  return o;
              }

              private static Models.Msg msgFromJson(JSONObject o){
                  Models.Msg m = new Models.Msg(
                      o.optString("id"),
                      o.optString("chatId"),
                      o.optString("text"),
                      o.optBoolean("outgoing", false)
                  );
                  m.time = o.optLong("time", System.currentTimeMillis());
                  return m;
              }

              private static String read(Context c) throws Exception{
                  BufferedReader rd = new BufferedReader(new FileReader(file(c)));
                  StringBuilder sb = new StringBuilder();
                  String line;
                  while((line = rd.readLine()) != null) sb.append(line);
                  rd.close();
                  return sb.toString();
              }

              private static void write(Context c, String s) throws Exception{
                  FileWriter w = new FileWriter(file(c));
                  w.write(s);
                  w.close();
              }
          }
