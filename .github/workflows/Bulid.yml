name: TitanOS v34 Terminal Gaming Edition

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Android Project
        run: |
          mkdir -p app/src/main/java/com/titan/terminal
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.titan.terminal'
              compileSdk 34
              defaultConfig {
                  applicationId "com.titan.terminal"
                  minSdk 24
                  targetSdk 34
                  versionCode 34
                  versionName "34.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="TitanOS Terminal"
                  android:theme="@style/AppTheme">
                  <activity 
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create Layouts
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#000000">

              <ScrollView
                  android:id="@+id/scrollView"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:padding="8dp">

                  <TextView
                      android:id="@+id/terminalOutput"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:textColor="#00FF00"
                      android:fontFamily="monospace"
                      android:textSize="12sp"/>
              </ScrollView>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#1A1A1A"
                  android:padding="8dp">

                  <TextView
                      android:id="@+id/prompt"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="$ "
                      android:textColor="#00FF00"
                      android:fontFamily="monospace"
                      android:textSize="14sp"/>

                  <EditText
                      android:id="@+id/commandInput"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:background="@android:color/transparent"
                      android:textColor="#00FF00"
                      android:fontFamily="monospace"
                      android:textSize="14sp"
                      android:inputType="text"
                      android:imeOptions="actionDone"
                      android:hint="enter command..."
                      android:textColorHint="#005500"/>
              </LinearLayout>
          </LinearLayout>
          EOF

      - name: Create Styles
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
                  <item name="android:statusBarColor">@android:color/black</item>
              </style>
          </resources>
          EOF

      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/titan/terminal/MainActivity.java << 'EOF'
          package com.titan.terminal;

          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.view.inputmethod.EditorInfo;
          import android.widget.EditText;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {

              private TextView terminalOutput;
              private TextView prompt;
              private EditText commandInput;
              private ScrollView scrollView;
              private TitanOS os;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  terminalOutput = findViewById(R.id.terminalOutput);
                  prompt = findViewById(R.id.prompt);
                  commandInput = findViewById(R.id.commandInput);
                  scrollView = findViewById(R.id.scrollView);

                  os = new TitanOS(this);
                  
                  showBootSequence();
                  updatePrompt();

                  commandInput.setOnEditorActionListener((v, actionId, event) -> {
                      if (actionId == EditorInfo.IME_ACTION_DONE || 
                          (event != null && event.getKeyCode() == KeyEvent.KEYCODE_ENTER)) {
                          executeCommand(commandInput.getText().toString());
                          commandInput.setText("");
                          return true;
                      }
                      return false;
                  });
              }

              private void showBootSequence() {
                  os.terminal.print("====================================");
                  os.terminal.print("    TitanOS Terminal v34.0");
                  os.terminal.print("     Gaming Edition");
                  os.terminal.print("====================================");
                  os.terminal.print("");
                  os.terminal.print("Booting system...");
                  os.terminal.print("[OK] File System");
                  os.terminal.print("[OK] Game Engine");
                  os.terminal.print("[OK] Applications");
                  os.terminal.print("");
                  os.terminal.print("Type 'help' for commands");
                  os.terminal.print("Type 'games' for games list");
                  os.terminal.print("");
              }

              private void executeCommand(String cmd) {
                  if (cmd.trim().isEmpty()) return;
                  
                  os.terminal.print(getCurrentPrompt() + cmd);
                  os.shell.execute(cmd);
                  updatePrompt();
                  
                  scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }

              private String getCurrentPrompt() {
                  String dir = os.shell.getCurrentDir();
                  return dir + "$ ";
              }

              private void updatePrompt() {
                  runOnUiThread(() -> prompt.setText(getCurrentPrompt()));
              }

              public void updateTerminal(String text) {
                  runOnUiThread(() -> terminalOutput.append(text + "\n"));
              }
          }
          EOF

      - name: Create TitanOS Core
        run: |
          cat > app/src/main/java/com/titan/terminal/TitanOS.java << 'EOF'
          package com.titan.terminal;

          import android.content.Context;
          import android.content.SharedPreferences;
          import java.util.*;

          public class TitanOS {
              
              public Terminal terminal;
              public FileSystem fs;
              public Shell shell;
              public GameEngine gameEngine;
              public Context context;

              public TitanOS(MainActivity activity) {
                  this.context = activity;
                  this.terminal = new Terminal(activity);
                  this.fs = new FileSystem(activity);
                  this.gameEngine = new GameEngine(this);
                  this.shell = new Shell(this);
                  
                  initializeSystem();
              }

              private void initializeSystem() {
                  fs.mkdir("/home");
                  fs.mkdir("/games");
                  fs.mkdir("/docs");
                  fs.mkdir("/music");
                  fs.mkdir("/pictures");
                  
                  if (!fs.exists("/home/welcome.txt")) {
                      fs.writeFile("/home/welcome.txt", 
                          "Welcome to TitanOS Gaming Edition!\n\nExplore the file system.\nPlay games.\nHave fun!");
                  }
                  
                  if (!fs.exists("/docs/readme.txt")) {
                      fs.writeFile("/docs/readme.txt", 
                          "TitanOS Documentation\n\nUse 'cd' to navigate folders.\nUse 'games' to see available games.");
                  }
                  
                  gameEngine.installGames();
              }
          }

          class Terminal {
              private MainActivity activity;
              
              public Terminal(MainActivity activity) {
                  this.activity = activity;
              }
              
              public void print(String text) {
                  activity.updateTerminal(text);
              }
              
              public void error(String text) {
                  activity.updateTerminal("ERROR: " + text);
              }
              
              public void success(String text) {
                  activity.updateTerminal("[OK] " + text);
              }
              
              public void warning(String text) {
                  activity.updateTerminal("WARNING: " + text);
              }
          }

          class FileSystem {
              private SharedPreferences prefs;
              private Map<String, FSNode> nodes;
              
              public FileSystem(Context context) {
                  prefs = context.getSharedPreferences("titan_fs", Context.MODE_PRIVATE);
                  nodes = new HashMap<>();
                  loadFromStorage();
              }
              
              private void loadFromStorage() {
                  Map<String, ?> all = prefs.getAll();
                  for (Map.Entry<String, ?> entry : all.entrySet()) {
                      String path = entry.getKey();
                      String data = entry.getValue().toString();
                      
                      if (data.startsWith("DIR:")) {
                          nodes.put(path, new FSNode(path, true));
                      } else {
                          nodes.put(path, new FSNode(path, false, data));
                      }
                  }
              }
              
              private void saveToStorage() {
                  SharedPreferences.Editor editor = prefs.edit();
                  for (Map.Entry<String, FSNode> entry : nodes.entrySet()) {
                      if (entry.getValue().isDirectory) {
                          editor.putString(entry.getKey(), "DIR:");
                      } else {
                          editor.putString(entry.getKey(), entry.getValue().content);
                      }
                  }
                  editor.apply();
              }
              
              public boolean exists(String path) {
                  return nodes.containsKey(path);
              }
              
              public void mkdir(String path) {
                  if (!exists(path)) {
                      nodes.put(path, new FSNode(path, true));
                      saveToStorage();
                  }
              }
              
              public void writeFile(String path, String content) {
                  nodes.put(path, new FSNode(path, false, content));
                  saveToStorage();
              }
              
              public String readFile(String path) {
                  FSNode node = nodes.get(path);
                  return (node != null && !node.isDirectory) ? node.content : null;
              }
              
              public void delete(String path) {
                  nodes.remove(path);
                  saveToStorage();
              }
              
              public List<String> list(String dir) {
                  List<String> result = new ArrayList<>();
                  String normalizedDir = dir.equals("/") ? "/" : dir;
                  if (!normalizedDir.endsWith("/") && !normalizedDir.equals("/")) {
                      normalizedDir += "/";
                  }
                  
                  for (String path : nodes.keySet()) {
                      if (path.equals(normalizedDir)) continue;
                      
                      if (normalizedDir.equals("/")) {
                          if (!path.substring(1).contains("/")) {
                              result.add(path.substring(1));
                          } else {
                              String firstPart = path.substring(1, path.indexOf("/", 1));
                              if (!result.contains(firstPart)) {
                                  result.add(firstPart);
                              }
                          }
                      } else {
                          if (path.startsWith(normalizedDir)) {
                              String relative = path.substring(normalizedDir.length());
                              if (!relative.contains("/")) {
                                  result.add(relative);
                              } else {
                                  String firstPart = relative.substring(0, relative.indexOf("/"));
                                  if (!result.contains(firstPart)) {
                                      result.add(firstPart);
                                  }
                              }
                          }
                      }
                  }
                  Collections.sort(result);
                  return result;
              }
              
              public boolean isDirectory(String path) {
                  FSNode node = nodes.get(path);
                  if (node != null) return node.isDirectory;
                  
                  String normalizedPath = path.endsWith("/") ? path : path + "/";
                  for (String p : nodes.keySet()) {
                      if (p.startsWith(normalizedPath)) {
                          return true;
                      }
                  }
                  return false;
              }
              
              static class FSNode {
                  String path;
                  boolean isDirectory;
                  String content;
                  
                  FSNode(String path, boolean isDirectory) {
                      this(path, isDirectory, "");
                  }
                  
                  FSNode(String path, boolean isDirectory, String content) {
                      this.path = path;
                      this.isDirectory = isDirectory;
                      this.content = content;
                  }
              }
          }
          EOF

      - name: Create Shell
        run: |
          cat > app/src/main/java/com/titan/terminal/Shell.java << 'EOF'
          package com.titan.terminal;

          import java.util.Arrays;
          import java.util.List;

          public class Shell {
              private TitanOS os;
              private String currentDir = "/";
              
              public Shell(TitanOS os) {
                  this.os = os;
              }
              
              public String getCurrentDir() {
                  return currentDir;
              }
              
              public void execute(String commandLine) {
                  String[] parts = commandLine.trim().split("\\s+");
                  if (parts.length == 0) return;
                  
                  String cmd = parts[0].toLowerCase();
                  String[] args = Arrays.copyOfRange(parts, 1, parts.length);
                  
                  switch (cmd) {
                      case "help": showHelp(); break;
                      case "ls": listFiles(args); break;
                      case "cd": changeDirectory(args); break;
                      case "pwd": os.terminal.print(currentDir); break;
                      case "mkdir": makeDirectory(args); break;
                      case "touch": createFile(args); break;
                      case "cat": showFile(args); break;
                      case "write": writeFile(args); break;
                      case "rm": removeFile(args); break;
                      case "tree": showTree(); break;
                      case "games": os.gameEngine.listGames(); break;
                      case "play": playGame(args); break;
                      case "clear": break;
                      default: os.terminal.error("Unknown command: " + cmd);
                  }
              }
              
              private void showHelp() {
                  os.terminal.print("");
                  os.terminal.print("FILE SYSTEM:");
                  os.terminal.print("  ls [dir]   - list files");
                  os.terminal.print("  cd <dir>   - change directory");
                  os.terminal.print("  pwd        - show current dir");
                  os.terminal.print("  mkdir <d>  - create directory");
                  os.terminal.print("  touch <f>  - create file");
                  os.terminal.print("  cat <f>    - show file");
                  os.terminal.print("  write <f> <text> - write to file");
                  os.terminal.print("  rm <f>     - remove file");
                  os.terminal.print("  tree       - show directory tree");
                  os.terminal.print("");
                  os.terminal.print("GAMES:");
                  os.terminal.print("  games      - list available games");
                  os.terminal.print("  play <game> - play a game");
                  os.terminal.print("");
                  os.terminal.print("NAVIGATION:");
                  os.terminal.print("  cd /       - go to root");
                  os.terminal.print("  cd ..      - go to parent");
                  os.terminal.print("  cd folder  - enter folder");
                  os.terminal.print("");
              }
              
              private void listFiles(String[] args) {
                  String dir = args.length > 0 ? args[0] : currentDir;
                  
                  if (!dir.startsWith("/")) {
                      dir = resolvePath(currentDir, dir);
                  }
                  
                  if (!os.fs.exists(dir) && !os.fs.isDirectory(dir)) {
                      os.terminal.error("Directory not found: " + dir);
                      return;
                  }
                  
                  List<String> files = os.fs.list(dir);
                  
                  if (files.isEmpty()) {
                      os.terminal.print("(empty)");
                  } else {
                      for (String file : files) {
                          String fullPath = dir.equals("/") ? "/" + file : dir + "/" + file;
                          String prefix = os.fs.isDirectory(fullPath) ? "[DIR]  " : "[FILE] ";
                          os.terminal.print("  " + prefix + file);
                      }
                  }
              }
              
              private void changeDirectory(String[] args) {
                  if (args.length == 0) {
                      currentDir = "/";
                      os.terminal.success("Changed to /");
                      return;
                  }
                  
                  String newDir = args[0];
                  
                  if (newDir.equals("..")) {
                      if (currentDir.equals("/")) {
                          os.terminal.print("Already at root");
                          return;
                      }
                      int lastSlash = currentDir.lastIndexOf("/");
                      if (lastSlash == 0) {
                          currentDir = "/";
                      } else {
                          currentDir = currentDir.substring(0, lastSlash);
                      }
                      os.terminal.success("Changed to " + currentDir);
                      return;
                  }
                  
                  if (newDir.equals(".")) {
                      return;
                  }
                  
                  if (!newDir.startsWith("/")) {
                      newDir = resolvePath(currentDir, newDir);
                  }
                  
                  if (os.fs.isDirectory(newDir) || os.fs.exists(newDir)) {
                      currentDir = newDir;
                      os.terminal.success("Changed to " + currentDir);
                  } else {
                      os.terminal.error("Directory not found: " + newDir);
                  }
              }
              
              private String resolvePath(String base, String relative) {
                  if (base.equals("/")) {
                      return "/" + relative;
                  } else {
                      return base + "/" + relative;
                  }
              }
              
              private void makeDirectory(String[] args) {
                  if (args.length == 0) {
                      os.terminal.error("Usage: mkdir <directory>");
                      return;
                  }
                  String path = args[0];
                  if (!path.startsWith("/")) {
                      path = resolvePath(currentDir, path);
                  }
                  os.fs.mkdir(path);
                  os.terminal.success("Created: " + path);
              }
              
              private void createFile(String[] args) {
                  if (args.length == 0) {
                      os.terminal.error("Usage: touch <file>");
                      return;
                  }
                  String path = args[0];
                  if (!path.startsWith("/")) {
                      path = resolvePath(currentDir, path);
                  }
                  os.fs.writeFile(path, "");
                  os.terminal.success("Created: " + path);
              }
              
              private void showFile(String[] args) {
                  if (args.length == 0) {
                      os.terminal.error("Usage: cat <file>");
                      return;
                  }
                  String path = args[0];
                  if (!path.startsWith("/")) {
                      path = resolvePath(currentDir, path);
                  }
                  String content = os.fs.readFile(path);
                  if (content != null) {
                      os.terminal.print("");
                      os.terminal.print(content);
                      os.terminal.print("");
                  } else {
                      os.terminal.error("File not found: " + path);
                  }
              }
              
              private void writeFile(String[] args) {
                  if (args.length < 2) {
                      os.terminal.error("Usage: write <file> <content>");
                      return;
                  }
                  String path = args[0];
                  if (!path.startsWith("/")) {
                      path = resolvePath(currentDir, path);
                  }
                  String content = String.join(" ", Arrays.copyOfRange(args, 1, args.length));
                  os.fs.writeFile(path, content);
                  os.terminal.success("Written to: " + path);
              }
              
              private void removeFile(String[] args) {
                  if (args.length == 0) {
                      os.terminal.error("Usage: rm <file>");
                      return;
                  }
                  String path = args[0];
                  if (!path.startsWith("/")) {
                      path = resolvePath(currentDir, path);
                  }
                  os.fs.delete(path);
                  os.terminal.success("Removed: " + path);
              }
              
              private void playGame(String[] args) {
                  if (args.length == 0) {
                      os.terminal.error("Usage: play <game>");
                      return;
                  }
                  os.gameEngine.playGame(args[0]);
              }
              
              private void showTree() {
                  os.terminal.print("/");
                  showTreeRec("/", "");
              }
              
              private void showTreeRec(String dir, String prefix) {
                  List<String> files = os.fs.list(dir);
                  for (int i = 0; i < files.size(); i++) {
                      boolean isLast = (i == files.size() - 1);
                      String file = files.get(i);
                      String fullPath = dir.equals("/") ? "/" + file : dir + "/" + file;
                      
                      os.terminal.print(prefix + (isLast ? "+-- " : "|-- ") + file);
                      
                      if (os.fs.isDirectory(fullPath)) {
                          showTreeRec(fullPath, prefix + (isLast ? "    " : "|   "));
                      }
                  }
              }
          }
          EOF

      - name: Create GameEngine
        run: |
          cat > app/src/main/java/com/titan/terminal/GameEngine.java << 'EOF'
          package com.titan.terminal;

          import java.util.*;

          public class GameEngine {
              
              TitanOS os;
              Map<String, Game> games = new HashMap<>();
              
              public GameEngine(TitanOS os) {
                  this.os = os;
              }
              
              public void installGames() {
                  games.put("guess", new GuessNumberGame(os));
                  games.put("quiz", new QuizGame(os));
                  games.put("maze", new MazeGame(os));
                  games.put("math", new MathGame(os));
                  games.put("adventure", new AdventureGame(os));
              }
              
              public void listGames() {
                  os.terminal.print("");
                  os.terminal.print("AVAILABLE GAMES:");
                  os.terminal.print("");
                  for (String name : games.keySet()) {
                      Game game = games.get(name);
                      os.terminal.print("  " + name + " - " + game.getDescription());
                  }
                  os.terminal.print("");
                  os.terminal.print("Use 'play <game>' to start");
                  os.terminal.print("");
              }
              
              public void playGame(String name) {
                  Game game = games.get(name.toLowerCase());
                  if (game == null) {
                      os.terminal.error("Game not found: " + name);
                      os.terminal.print("Type 'games' to see available games");
                      return;
                  }
                  os.terminal.print("");
                  os.terminal.print("=== Starting " + name + " ===");
                  os.terminal.print("");
                  game.play();
                  os.terminal.print("");
                  os.terminal.print("=== Game Over ===");
                  os.terminal.print("");
              }
          }

          abstract class Game {
              protected TitanOS os;
              protected Random random = new Random();
              
              public Game(TitanOS os) {
                  this.os = os;
              }
              
              public abstract void play();
              public abstract String getDescription();
          }

          class GuessNumberGame extends Game {
              public GuessNumberGame(TitanOS os) { super(os); }
              
              public String getDescription() {
                  return "Guess the number (1-100)";
              }
              
              public void play() {
                  int target = random.nextInt(100) + 1;
                  int[] guesses = {25, 50, 75, 63, target};
                  
                  os.terminal.print("I'm thinking of a number 1-100");
                  os.terminal.print("");
                  
                  for (int i = 0; i < guesses.length; i++) {
                      int guess = guesses[i];
                      os.terminal.print("Attempt " + (i+1) + ": " + guess);
                      
                      if (guess == target) {
                          os.terminal.print("CORRECT! The number was " + target);
                          os.terminal.print("You won in " + (i+1) + " attempts!");
                          return;
                      } else if (guess < target) {
                          os.terminal.print("Too low!");
                      } else {
                          os.terminal.print("Too high!");
                      }
                  }
              }
          }

          class QuizGame extends Game {
              public QuizGame(TitanOS os) { super(os); }
              
              public String getDescription() {
                  return "Answer trivia questions";
              }
              
              public void play() {
                  String[][] questions = {
                      {"What is 2+2?", "4"},
                      {"Capital of France?", "Paris"},
                      {"Largest planet?", "Jupiter"}
                  };
                  
                  int score = 0;
                  
                  for (int i = 0; i < questions.length; i++) {
                      os.terminal.print("Q" + (i+1) + ": " + questions[i][0]);
                      String answer = questions[i][1];
                      os.terminal.print("A: " + answer);
                      os.terminal.print("CORRECT!");
                      score++;
                      os.terminal.print("");
                  }
                  
                  os.terminal.print("Final Score: " + score + "/" + questions.length);
              }
          }

          class MazeGame extends Game {
              public MazeGame(TitanOS os) { super(os); }
              
              public String getDescription() {
                  return "Navigate through a maze";
              }
              
              public void play() {
                  os.terminal.print("MAZE:");
                  os.terminal.print("+---+---+---+");
                  os.terminal.print("| S |   |   |");
                  os.terminal.print("+   +---+   +");
                  os.terminal.print("|   |   |   |");
                  os.terminal.print("+   +   +---+");
                  os.terminal.print("|   |   | E |");
                  os.terminal.print("+---+---+---+");
                  os.terminal.print("");
                  os.terminal.print("Path: Right -> Down -> Right -> Down");
                  os.terminal.print("You found the exit!");
              }
          }

          class MathGame extends Game {
              public MathGame(TitanOS os) { super(os); }
              
              public String getDescription() {
                  return "Solve math problems";
              }
              
              public void play() {
                  int[][] problems = {
                      {5, 3, 8},
                      {12, 7, 5},
                      {8, 4, 2}
                  };
                  
                  os.terminal.print("Solve these problems:");
                  os.terminal.print("");
                  
                  for (int i = 0; i < problems.length; i++) {
                      int a = problems[i][0];
                      int b = problems[i][1];
                      int answer = problems[i][2];
                      
                      if (i == 2) {
                          os.terminal.print((i+1) + ". " + a + " / " + b + " = " + answer);
                      } else if (i == 1) {
                          os.terminal.print((i+1) + ". " + a + " - " + b + " = " + answer);
                      } else {
                          os.terminal.print((i+1) + ". " + a + " + " + b + " = " + answer);
                      }
                      os.terminal.print("CORRECT!");
                  }
                  
                  os.terminal.print("");
                  os.terminal.print("Perfect score!");
              }
          }

          class AdventureGame extends Game {
              public AdventureGame(TitanOS os) { super(os); }
              
              public String getDescription() {
                  return "Text-based adventure";
              }
              
              public void play() {
                  os.terminal.print("ADVENTURE QUEST");
                  os.terminal.print("");
                  os.terminal.print("You wake up in a dark forest...");
                  os.terminal.print("");
                  os.terminal.print("> Go North");
                  os.terminal.print("You find a treasure chest!");
                  os.terminal.print("");
                  os.terminal.print("> Open chest");
                  os.terminal.print("You found: Golden Sword!");
                  os.terminal.print("");
                  os.terminal.print("> Go East");
                  os.terminal.print("You encounter a dragon!");
                  os.terminal.print("");
                  os.terminal.print("> Attack with sword");
                  os.terminal.print("Critical hit! Dragon defeated!");
                  os.terminal.print("");
                  os.terminal.print("YOU WIN! Kingdom saved!");
              }
          }
          EOF

