name: Build GodBlock

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # временный build.gradle
      - run: echo "" > build.gradle

      # Gradle 8.7
      - run: gradle wrapper --gradle-version 8.7

      # settings.gradle
      - run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  maven { url = 'https://maven.fabricmc.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          rootProject.name = 'GodBlock'
          EOF

      # ✅ build.gradle (ИСПРАВЛЕННЫЙ)
      - run: |
          cat << 'EOF' > build.gradle
          plugins {
              id 'fabric-loom' version '1.6.12'
          }

          group = 'me.godblock'
          version = '1.0'

          repositories {
              mavenCentral()
              maven { url 'https://maven.fabricmc.net/' }
          }

          dependencies {
              minecraft "com.mojang:minecraft:1.20.1"
              mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
              modImplementation "net.fabricmc:fabric-loader:0.15.11"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.1+1.20.1"
          }

          java {
              toolchain.languageVersion = JavaLanguageVersion.of(17)
          }
          EOF

      # память
      - run: |
          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G
          org.gradle.daemon=false
          EOF

      # структура
      - run: |
          mkdir -p src/main/java/me/godblock
          mkdir -p src/main/resources/assets/godblock/{blockstates,models/block,models/item,lang,textures/block}
          mkdir -p src/main/resources/data/godblock/recipes

      # fabric.mod.json
      - run: |
          cat << 'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "godblock",
            "version": "1.0",
            "name": "God Block",
            "entrypoints": {
              "main": ["me.godblock.GodBlockMod"]
            },
            "depends": {
              "fabricloader": ">=0.15.0",
              "minecraft": "1.20.1",
              "fabric-api": "*"
            }
          }
          EOF

      # перевод
      - run: |
          cat << 'EOF' > src/main/resources/assets/godblock/lang/en_us.json
          {
            "block.godblock.god_block": "God Block"
          }
          EOF

      # рецепт
      - run: |
          cat << 'EOF' > src/main/resources/data/godblock/recipes/god_block.json
          {
            "type": "minecraft:crafting_shaped",
            "pattern": [
              "SSS",
              "SCS",
              "SSS"
            ],
            "key": {
              "S": { "item": "minecraft:stone" },
              "C": { "item": "minecraft:coal" }
            },
            "result": {
              "item": "godblock:god_block",
              "count": 1
            }
          }
          EOF

      # текстуры
      - run: |
          sudo apt-get update && sudo apt-get install imagemagick -y
          convert -size 16x16 xc:red red.png
          convert -size 16x16 xc:purple purple.png
          convert -size 16x16 xc:green green.png
          mv red.png src/main/resources/assets/godblock/textures/block/god_block_red.png
          mv purple.png src/main/resources/assets/godblock/textures/block/god_block_purple.png
          mv green.png src/main/resources/assets/godblock/textures/block/god_block_green.png

      # blockstates
      - run: |
          cat << 'EOF' > src/main/resources/assets/godblock/blockstates/god_block.json
          {
            "variants": {
              "mode=1": { "model": "godblock:block/god_block_red" },
              "mode=2": { "model": "godblock:block/god_block_purple" },
              "mode=3": { "model": "godblock:block/god_block_green" }
            }
          }
          EOF

      # модели
      - run: |
          cat << 'EOF' > src/main/resources/assets/godblock/models/block/god_block_red.json
          { "parent": "block/cube_all", "textures": { "all": "godblock:block/god_block_red" } }
          EOF
          cat << 'EOF' > src/main/resources/assets/godblock/models/block/god_block_purple.json
          { "parent": "block/cube_all", "textures": { "all": "godblock:block/god_block_purple" } }
          EOF
          cat << 'EOF' > src/main/resources/assets/godblock/models/block/god_block_green.json
          { "parent": "block/cube_all", "textures": { "all": "godblock:block/god_block_green" } }
          EOF
          cat << 'EOF' > src/main/resources/assets/godblock/models/item/god_block.json
          { "parent": "godblock:block/god_block_red" }
          EOF

      # Java код
      - run: |
          cat << 'EOF' > src/main/java/me/godblock/GodBlockMod.java
          package me.godblock;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.object.builder.v1.block.entity.FabricBlockEntityTypeBuilder;
          import net.fabricmc.fabric.api.itemgroup.v1.ItemGroupEvents;
          import net.minecraft.block.*;
          import net.minecraft.block.entity.*;
          import net.minecraft.entity.effect.*;
          import net.minecraft.entity.mob.HostileEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.*;
          import net.minecraft.nbt.NbtCompound;
          import net.minecraft.particle.ParticleTypes;
          import net.minecraft.registry.*;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.sound.SoundCategory;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.state.StateManager;
          import net.minecraft.state.property.IntProperty;
          import net.minecraft.text.Text;
          import net.minecraft.util.*;
          import net.minecraft.util.hit.BlockHitResult;
          import net.minecraft.util.math.*;
          import net.minecraft.world.World;

          public class GodBlockMod implements ModInitializer {

              public static final String MOD_ID = "godblock";
              public static final IntProperty MODE = IntProperty.of("mode", 1, 3);

              public static Block GOD_BLOCK;
              public static BlockEntityType<GodBlockEntity> GOD_BLOCK_ENTITY;

              @Override
              public void onInitialize() {

                  System.out.println("GOD BLOCK MOD LOADED");

                  GOD_BLOCK = Registry.register(Registries.BLOCK,
                          new Identifier(MOD_ID, "god_block"),
                          new GodBlock(AbstractBlock.Settings.copy(Blocks.NETHERITE_BLOCK)
                                  .strength(5f)
                                  .luminance(state -> 15)));

                  Registry.register(Registries.ITEM,
                          new Identifier(MOD_ID, "god_block"),
                          new BlockItem(GOD_BLOCK,new Item.Settings()));

                  GOD_BLOCK_ENTITY = Registry.register(
                          Registries.BLOCK_ENTITY_TYPE,
                          new Identifier(MOD_ID,"god_block_entity"),
                          FabricBlockEntityTypeBuilder.create(GodBlockEntity::new, GOD_BLOCK).build()
                  );

                  ItemGroupEvents.modifyEntriesEvent(ItemGroups.BUILDING_BLOCKS)
                          .register(entries -> entries.add(GOD_BLOCK));
              }

              public static class GodBlock extends BlockWithEntity {

                  public GodBlock(Settings settings) {
                      super(settings);
                      setDefaultState(getStateManager().getDefaultState().with(MODE,1));
                  }

                  @Override
                  protected void appendProperties(StateManager.Builder<Block, BlockState> builder) {
                      builder.add(MODE);
                  }

                  @Override
                  public BlockEntity createBlockEntity(BlockPos pos, BlockState state) {
                      return new GodBlockEntity(pos,state);
                  }

                  @Override
                  public <T extends BlockEntity> BlockEntityTicker<T> getTicker(
                          World world, BlockState state, BlockEntityType<T> type) {

                      return world.isClient ? null :
                              checkType(type, GOD_BLOCK_ENTITY, GodBlockEntity::tick);
                  }

                  @Override
                  public ActionResult onUse(BlockState state, World world, BlockPos pos,
                                            PlayerEntity player, Hand hand, BlockHitResult hit) {

                      if (!world.isClient && player.isSneaking()) {

                          int newMode = state.get(MODE) + 1;
                          if (newMode > 3) newMode = 1;

                          world.setBlockState(pos, state.with(MODE,newMode));

                          BlockEntity be = world.getBlockEntity(pos);
                          if (be instanceof GodBlockEntity gbe) {
                              gbe.mode = newMode;
                              gbe.markDirty();
                          }

                          player.sendMessage(Text.literal("Mode: "+newMode),false);

                          world.playSound(null,pos,
                                  SoundEvents.BLOCK_BEACON_POWER_SELECT,
                                  SoundCategory.BLOCKS,1f,1f);
                      }
                      return ActionResult.SUCCESS;
                  }
              }

              public static class GodBlockEntity extends BlockEntity {

                  public int mode = 1;

                  public GodBlockEntity(BlockPos pos, BlockState state) {
                      super(GOD_BLOCK_ENTITY,pos,state);
                  }

                  public static void tick(World world, BlockPos pos,
                                          BlockState state, GodBlockEntity be) {

                      if (!(world instanceof ServerWorld serverWorld)) return;

                      Box box = new Box(pos).expand(30);

                      if (be.mode == 1) {
                          serverWorld.spawnParticles(ParticleTypes.FLAME,
                                  pos.getX()+0.5,pos.getY()+1,pos.getZ()+0.5,
                                  5,0.3,0.3,0.3,0.02);
                      }

                      if (be.mode == 2) {
                          serverWorld.spawnParticles(ParticleTypes.PORTAL,
                                  pos.getX()+0.5,pos.getY()+1,pos.getZ()+0.5,
                                  10,0.5,0.5,0.5,0.1);
                      }

                      if (be.mode == 3) {
                          for (PlayerEntity p :
                                  serverWorld.getEntitiesByClass(PlayerEntity.class, box, e->true)) {
                              p.addStatusEffect(new StatusEffectInstance(
                                      StatusEffects.REGENERATION,40,0));
                          }
                      }
                  }

                  @Override
                  public void writeNbt(NbtCompound nbt) {
                      super.writeNbt(nbt);
                      nbt.putInt("Mode",mode);
                  }

                  @Override
                  public void readNbt(NbtCompound nbt) {
                      super.readNbt(nbt);
                      mode = nbt.getInt("Mode");
                  }
              }
          }
          EOF

      - run: ./gradlew build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: GodBlock
          path: build/libs/*.jar
