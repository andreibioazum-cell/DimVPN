name: TitanOS v34 Terminal Edition

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Android Project
        run: |
          mkdir -p app/src/main/java/com/titan/terminal
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.titan.terminal'
              compileSdk 34
              defaultConfig {
                  applicationId "com.titan.terminal"
                  minSdk 24
                  targetSdk 34
                  versionCode 34
                  versionName "34.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="TitanOS Terminal"
                  android:theme="@style/AppTheme">
                  <activity 
                      android:name=".MainActivity"
                      android:exported="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create Layouts
        run: |
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#000000">

              <ScrollView
                  android:id="@+id/scrollView"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:padding="8dp">

                  <TextView
                      android:id="@+id/terminalOutput"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:textColor="#00FF00"
                      android:fontFamily="monospace"
                      android:textSize="12sp"/>
              </ScrollView>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#1A1A1A"
                  android:padding="8dp">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="$ "
                      android:textColor="#00FF00"
                      android:fontFamily="monospace"
                      android:textSize="14sp"/>

                  <EditText
                      android:id="@+id/commandInput"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:background="@android:color/transparent"
                      android:textColor="#00FF00"
                      android:fontFamily="monospace"
                      android:textSize="14sp"
                      android:inputType="text"
                      android:imeOptions="actionDone"
                      android:hint="enter command..."
                      android:textColorHint="#005500"/>
              </LinearLayout>
          </LinearLayout>
          EOF

      - name: Create Styles
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
                  <item name="android:statusBarColor">@android:color/black</item>
              </style>
          </resources>
          EOF

      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/titan/terminal/MainActivity.java << 'EOF'
          package com.titan.terminal;

          import android.os.Bundle;
          import android.view.KeyEvent;
          import android.view.inputmethod.EditorInfo;
          import android.widget.EditText;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {

              private TextView terminalOutput;
              private EditText commandInput;
              private ScrollView scrollView;
              private TitanOS os;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  terminalOutput = findViewById(R.id.terminalOutput);
                  commandInput = findViewById(R.id.commandInput);
                  scrollView = findViewById(R.id.scrollView);

                  os = new TitanOS(this);
                  
                  showBootSequence();

                  commandInput.setOnEditorActionListener((v, actionId, event) -> {
                      if (actionId == EditorInfo.IME_ACTION_DONE || 
                          (event != null && event.getKeyCode() == KeyEvent.KEYCODE_ENTER)) {
                          executeCommand(commandInput.getText().toString());
                          commandInput.setText("");
                          return true;
                      }
                      return false;
                  });
              }

              private void showBootSequence() {
                  os.terminal.print("====================================");
                  os.terminal.print("    TitanOS Terminal v34.0");
                  os.terminal.print("  Advanced File System Edition");
                  os.terminal.print("====================================");
                  os.terminal.print("");
                  os.terminal.print("Initializing system...");
                  os.terminal.print("[OK] Virtual File System");
                  os.terminal.print("[OK] Application Manager");
                  os.terminal.print("[OK] Terminal Shell");
                  os.terminal.print("");
                  os.terminal.print("Type 'help' for commands");
                  os.terminal.print("");
              }

              private void executeCommand(String cmd) {
                  if (cmd.trim().isEmpty()) return;
                  
                  os.terminal.print("$ " + cmd);
                  os.shell.execute(cmd);
                  
                  scrollView.post(() -> scrollView.fullScroll(ScrollView.FOCUS_DOWN));
              }

              public void updateTerminal(String text) {
                  runOnUiThread(() -> terminalOutput.append(text + "\n"));
              }
          }
          EOF

      - name: Create TitanOS Core
        run: |
          cat > app/src/main/java/com/titan/terminal/TitanOS.java << 'EOF'
          package com.titan.terminal;

          import android.content.Context;
          import android.content.SharedPreferences;
          import java.util.*;

          public class TitanOS {
              
              public Terminal terminal;
              public FileSystem fs;
              public Shell shell;
              public AppManager appManager;
              public Context context;

              public TitanOS(MainActivity activity) {
                  this.context = activity;
                  this.terminal = new Terminal(activity);
                  this.fs = new FileSystem(activity);
                  this.appManager = new AppManager(this);
                  this.shell = new Shell(this);
                  
                  initializeSystem();
              }

              private void initializeSystem() {
                  fs.mkdir("/home");
                  fs.mkdir("/apps");
                  fs.mkdir("/system");
                  
                  if (!fs.exists("/home/welcome.txt")) {
                      fs.writeFile("/home/welcome.txt", 
                          "Welcome to TitanOS!\nFull-featured terminal OS.");
                  }
                  
                  appManager.installBuiltInApps();
              }
          }

          class Terminal {
              private MainActivity activity;
              
              public Terminal(MainActivity activity) {
                  this.activity = activity;
              }
              
              public void print(String text) {
                  activity.updateTerminal(text);
              }
              
              public void error(String text) {
                  activity.updateTerminal("ERROR: " + text);
              }
              
              public void success(String text) {
                  activity.updateTerminal("[OK] " + text);
              }
          }

          class FileSystem {
              private SharedPreferences prefs;
              private Map<String, FSNode> nodes;
              
              public FileSystem(Context context) {
                  prefs = context.getSharedPreferences("titan_fs", Context.MODE_PRIVATE);
                  nodes = new HashMap<>();
                  loadFromStorage();
              }
              
              private void loadFromStorage() {
                  Map<String, ?> all = prefs.getAll();
                  for (Map.Entry<String, ?> entry : all.entrySet()) {
                      String path = entry.getKey();
                      String data = entry.getValue().toString();
                      
                      if (data.startsWith("DIR:")) {
                          nodes.put(path, new FSNode(path, true));
                      } else {
                          nodes.put(path, new FSNode(path, false, data));
                      }
                  }
              }
              
              private void saveToStorage() {
                  SharedPreferences.Editor editor = prefs.edit();
                  for (Map.Entry<String, FSNode> entry : nodes.entrySet()) {
                      if (entry.getValue().isDirectory) {
                          editor.putString(entry.getKey(), "DIR:");
                      } else {
                          editor.putString(entry.getKey(), entry.getValue().content);
                      }
                  }
                  editor.apply();
              }
              
              public boolean exists(String path) {
                  return nodes.containsKey(path);
              }
              
              public void mkdir(String path) {
                  if (!exists(path)) {
                      nodes.put(path, new FSNode(path, true));
                      saveToStorage();
                  }
              }
              
              public void writeFile(String path, String content) {
                  nodes.put(path, new FSNode(path, false, content));
                  saveToStorage();
              }
              
              public String readFile(String path) {
                  FSNode node = nodes.get(path);
                  return (node != null && !node.isDirectory) ? node.content : null;
              }
              
              public void delete(String path) {
                  nodes.remove(path);
                  saveToStorage();
              }
              
              public List<String> list(String dir) {
                  List<String> result = new ArrayList<>();
                  if (!dir.endsWith("/")) dir += "/";
                  
                  for (String path : nodes.keySet()) {
                      if (path.startsWith(dir) && !path.equals(dir)) {
                          String relative = path.substring(dir.length());
                          if (!relative.contains("/") || 
                              (relative.indexOf("/") == relative.length() - 1)) {
                              result.add(relative);
                          }
                      }
                  }
                  Collections.sort(result);
                  return result;
              }
              
              public boolean isDirectory(String path) {
                  FSNode node = nodes.get(path);
                  return node != null && node.isDirectory;
              }
              
              static class FSNode {
                  String path;
                  boolean isDirectory;
                  String content;
                  
                  FSNode(String path, boolean isDirectory) {
                      this(path, isDirectory, "");
                  }
                  
                  FSNode(String path, boolean isDirectory, String content) {
                      this.path = path;
                      this.isDirectory = isDirectory;
                      this.content = content;
                  }
              }
          }
          EOF

      - name: Create Shell
        run: |
          cat > app/src/main/java/com/titan/terminal/Shell.java << 'EOF'
          package com.titan.terminal;

          import java.util.Arrays;

          public class Shell {
              private TitanOS os;
              private String currentDir = "/";
              
              public Shell(TitanOS os) {
                  this.os = os;
              }
              
              public void execute(String commandLine) {
                  String[] parts = commandLine.trim().split("\\s+");
                  if (parts.length == 0) return;
                  
                  String cmd = parts[0].toLowerCase();
                  String[] args = Arrays.copyOfRange(parts, 1, parts.length);
                  
                  switch (cmd) {
                      case "help": showHelp(); break;
                      case "ls": listFiles(args); break;
                      case "cd": changeDirectory(args); break;
                      case "pwd": os.terminal.print(currentDir); break;
                      case "mkdir": makeDirectory(args); break;
                      case "touch": createFile(args); break;
                      case "cat": showFile(args); break;
                      case "write": writeFile(args); break;
                      case "rm": removeFile(args); break;
                      case "apps": os.appManager.listApps(); break;
                      case "start": startApp(args); break;
                      case "tree": showTree(); break;
                      case "clear": break;
                      default: os.terminal.error("Unknown: " + cmd);
                  }
              }
              
              private void showHelp() {
                  os.terminal.print("");
                  os.terminal.print("COMMANDS:");
                  os.terminal.print("  ls         - list files");
                  os.terminal.print("  cd <dir>   - change dir");
                  os.terminal.print("  pwd        - current dir");
                  os.terminal.print("  mkdir <d>  - create dir");
                  os.terminal.print("  touch <f>  - create file");
                  os.terminal.print("  cat <f>    - show file");
                  os.terminal.print("  write <f> <text> - write");
                  os.terminal.print("  rm <f>     - remove");
                  os.terminal.print("  apps       - list apps");
                  os.terminal.print("  start <a>  - run app");
                  os.terminal.print("  tree       - show tree");
                  os.terminal.print("");
              }
              
              private void listFiles(String[] args) {
                  String dir = args.length > 0 ? args[0] : currentDir;
                  if (!dir.startsWith("/")) dir = currentDir + "/" + dir;
                  
                  for (String file : os.fs.list(dir)) {
                      String fullPath = dir + "/" + file;
                      String prefix = os.fs.isDirectory(fullPath) ? "[DIR] " : "[FILE]";
                      os.terminal.print("  " + prefix + file);
                  }
              }
              
              private void changeDirectory(String[] args) {
                  if (args.length == 0) { currentDir = "/"; return; }
                  
                  String newDir = args[0];
                  if (!newDir.startsWith("/")) newDir = currentDir + "/" + newDir;
                  
                  if (os.fs.exists(newDir) && os.fs.isDirectory(newDir)) {
                      currentDir = newDir;
                      os.terminal.success("Changed to " + currentDir);
                  } else {
                      os.terminal.error("Not found: " + newDir);
                  }
              }
              
              private void makeDirectory(String[] args) {
                  if (args.length == 0) return;
                  String path = args[0];
                  if (!path.startsWith("/")) path = currentDir + "/" + path;
                  os.fs.mkdir(path);
                  os.terminal.success("Created: " + path);
              }
              
              private void createFile(String[] args) {
                  if (args.length == 0) return;
                  String path = args[0];
                  if (!path.startsWith("/")) path = currentDir + "/" + path;
                  os.fs.writeFile(path, "");
                  os.terminal.success("Created: " + path);
              }
              
              private void showFile(String[] args) {
                  if (args.length == 0) return;
                  String path = args[0];
                  if (!path.startsWith("/")) path = currentDir + "/" + path;
                  String content = os.fs.readFile(path);
                  if (content != null) {
                      os.terminal.print("");
                      os.terminal.print(content);
                      os.terminal.print("");
                  } else {
                      os.terminal.error("Not found: " + path);
                  }
              }
              
              private void writeFile(String[] args) {
                  if (args.length < 2) return;
                  String path = args[0];
                  if (!path.startsWith("/")) path = currentDir + "/" + path;
                  String content = String.join(" ", Arrays.copyOfRange(args, 1, args.length));
                  os.fs.writeFile(path, content);
                  os.terminal.success("Written: " + path);
              }
              
              private void removeFile(String[] args) {
                  if (args.length == 0) return;
                  String path = args[0];
                  if (!path.startsWith("/")) path = currentDir + "/" + path;
                  os.fs.delete(path);
                  os.terminal.success("Removed: " + path);
              }
              
              private void startApp(String[] args) {
                  if (args.length == 0) return;
                  os.appManager.startApp(args[0]);
              }
              
              private void showTree() {
                  os.terminal.print("/");
                  showTreeRec("/", "");
              }
              
              private void showTreeRec(String dir, String prefix) {
                  for (String file : os.fs.list(dir)) {
                      String fullPath = dir + "/" + file;
                      os.terminal.print(prefix + "  " + file);
                      if (os.fs.isDirectory(fullPath)) {
                          showTreeRec(fullPath, prefix + "  ");
                      }
                  }
              }
          }
          EOF

      - name: Create AppManager
        run: |
          cat > app/src/main/java/com/titan/terminal/AppManager.java << 'EOF'
          package com.titan.terminal;

          import java.util.*;

          public class AppManager {
              
              TitanOS os;
              Map<String, Application> apps = new HashMap<>();
              
              public AppManager(TitanOS os) {
                  this.os = os;
              }
              
              public void installBuiltInApps() {
                  apps.put("filemanager", new FileManagerApp(os));
                  apps.put("editor", new TextEditorApp(os));
                  apps.put("calc", new CalculatorApp(os));
              }
              
              public void listApps() {
                  os.terminal.print("");
                  os.terminal.print("INSTALLED APPS:");
                  for (String name : apps.keySet()) {
                      Application app = apps.get(name);
                      os.terminal.print("  " + name + " - " + app.getDescription());
                  }
                  os.terminal.print("");
              }
              
              public void startApp(String name) {
                  Application app = apps.get(name.toLowerCase());
                  if (app == null) {
                      os.terminal.error("App not found: " + name);
                      return;
                  }
                  os.terminal.print("");
                  os.terminal.print("=== Starting " + name + " ===");
                  app.run();
                  os.terminal.print("=== Exited ===");
                  os.terminal.print("");
              }
          }

          abstract class Application {
              protected TitanOS os;
              public Application(TitanOS os) { this.os = os; }
              public abstract void run();
              public abstract String getDescription();
          }

          class FileManagerApp extends Application {
              public FileManagerApp(TitanOS os) { super(os); }
              
              public String getDescription() {
                  return "Browse files";
              }
              
              public void run() {
                  os.terminal.print("");
                  os.terminal.print("FILE MANAGER");
                  showDirectory("/");
              }
              
              private void showDirectory(String path) {
                  List<String> files = os.fs.list(path);
                  os.terminal.print("");
                  os.terminal.print("Directory: " + path);
                  for (String file : files) {
                      String fullPath = path + "/" + file;
                      if (os.fs.isDirectory(fullPath)) {
                          os.terminal.print("  [D] " + file);
                      } else {
                          os.terminal.print("  [F] " + file);
                      }
                  }
              }
          }

          class TextEditorApp extends Application {
              public TextEditorApp(TitanOS os) { super(os); }
              
              public String getDescription() {
                  return "Text editor";
              }
              
              public void run() {
                  os.terminal.print("");
                  os.terminal.print("TEXT EDITOR");
                  os.terminal.print("Use: write <file> <text>");
                  os.terminal.print("Use: cat <file>");
              }
          }

          class CalculatorApp extends Application {
              public CalculatorApp(TitanOS os) { super(os); }
              
              public String getDescription() {
                  return "Calculator";
              }
              
              public void run() {
                  os.terminal.print("");
                  os.terminal.print("CALCULATOR");
                  os.terminal.print("2 + 2 = 4");
                  os.terminal.print("10 * 5 = 50");
              }
          }
          EOF

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: TitanOS-Terminal
          path: app/build/outputs/apk/debug/app-debug.apk
