name: Build VPN Wrapper APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target_package:
        description: 'Package name to wrap (e.g., com.roblox.client)'
        required: false
        default: 'com.roblox.client'
        type: string
      target_url:
        description: 'URL to open (e.g., https://www.roblox.com)'
        required: false
        default: 'https://www.roblox.com'
        type: string
      proxy_type:
        description: 'Proxy type (vless/vmess/shadowsocks)'
        required: false
        default: 'vless'
        type: choice
        options:
          - vless
          - vmess
          - shadowsocks

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Create Android project with VPN bypass
        run: |
          mkdir -p app/src/main/java/com/vpnwrapper/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable

          # gradle files
          cat <<'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "VPNWrapper"
          include(":app")
          EOF

          cat <<'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat <<'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.vpnwrapper.app'
              compileSdk 34

              defaultConfig {
                  applicationId "com.vpnwrapper.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.9.0'
              implementation 'com.google.android.material:material:1.10.0'
          }
          EOF

          echo "# empty" > app/proguard-rules.pro

          # AndroidManifest
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <!-- VPN permission -->
              <uses-permission android:name="android.permission.CONTROL_VPN" tools:ignore="ProtectedPermissions" />

              <application
                  android:allowBackup="true"
                  android:label="VPN Wrapper"
                  android:theme="@style/Theme.VPNWrapper"
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".VpnBypassService"
                      android:exported="false"
                      android:foregroundServiceType="dataSync"
                      android:permission="android.permission.BIND_VPN_SERVICE">
                      <intent-filter>
                          <action android:name="android.net.VpnService" />
                      </intent-filter>
                  </service>

              </application>
          </manifest>
          EOF

          # Network security config (allows custom certs and proxies)
          mkdir -p app/src/main/res/xml
          cat <<'EOF' > app/src/main/res/xml/network_security_config.xml
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
              <domain-config cleartextTrafficPermitted="true">
                  <domain includeSubdomains="true">roblox.com</domain>
                  <domain includeSubdomains="true">rbxcdn.com</domain>
              </domain-config>
          </network-security-config>
          EOF

          # Theme
          cat <<'EOF' > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.VPNWrapper" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#2196F3</item>
                  <item name="colorPrimaryDark">#1976D2</item>
                  <item name="colorAccent">#03DAC5</item>
              </style>
          </resources>
          EOF

          # Layout
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#1a1a2e">

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:padding="12dp"
                  android:background="#16213e">

                  <TextView
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="VPN BYPASS"
                      android:textColor="#e94560"
                      android:textStyle="bold"
                      android:textSize="18sp"/>

                  <TextView
                      android:id="@+id/txt_vpn_status"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="DISCONNECTED"
                      android:textColor="#ff4444"
                      android:textSize="12sp"
                      android:layout_marginEnd="12dp"/>

                  <Button
                      android:id="@+id/btn_vpn"
                      android:layout_width="80dp"
                      android:layout_height="36dp"
                      android:text="START"
                      android:textSize="12sp"
                      android:backgroundTint="#e94560"/>
              </LinearLayout>

              <ProgressBar
                  android:id="@+id/progress_bar"
                  style="?android:attr/progressBarStyleHorizontal"
                  android:layout_width="match_parent"
                  android:layout_height="3dp"
                  android:progressTint="#e94560"
                  android:visibility="gone"/>

              <WebView
                  android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:gravity="center"
                  android:padding="8dp"
                  android:background="#16213e">

                  <Button
                      android:id="@+id/btn_back"
                      android:layout_width="wrap_content"
                      android:layout_height="40dp"
                      android:text="◀ BACK"
                      android:textSize="12sp"
                      android:backgroundTint="#0f3460"
                      style="@style/Widget.AppCompat.Button.Borderless"/>

                  <Button
                      android:id="@+id/btn_forward"
                      android:layout_width="wrap_content"
                      android:layout_height="40dp"
                      android:text="FORWARD ▶"
                      android:textSize="12sp"
                      android:backgroundTint="#0f3460"
                      style="@style/Widget.AppCompat.Button.Borderless"/>

                  <Button
                      android:id="@+id/btn_reload"
                      android:layout_width="wrap_content"
                      android:layout_height="40dp"
                      android:text="⟳"
                      android:textSize="14sp"
                      android:backgroundTint="#0f3460"
                      style="@style/Widget.AppCompat.Button.Borderless"/>

                  <EditText
                      android:id="@+id/url_input"
                      android:layout_width="0dp"
                      android:layout_height="40dp"
                      android:layout_weight="1"
                      android:hint="Enter URL"
                      android:textColor="#ffffff"
                      android:textColorHint="#888888"
                      android:background="@drawable/url_bg"
                      android:padding="8dp"
                      android:textSize="12sp"/>

                  <Button
                      android:id="@+id/btn_go"
                      android:layout_width="wrap_content"
                      android:layout_height="40dp"
                      android:text="GO"
                      android:textSize="12sp"
                      android:backgroundTint="#e94560"/>
              </LinearLayout>
          </LinearLayout>
          EOF

          # Drawable for URL input
          cat <<'EOF' > app/src/main/res/drawable/url_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#0f3460"/>
              <corners android:radius="8dp"/>
              <stroke android:width="1dp" android:color="#e94560"/>
          </shape>
          EOF

          # MainActivity Java
          cat <<'EOF' > app/src/main/java/com/vpnwrapper/app/MainActivity.java
          package com.vpnwrapper.app;

          import android.Manifest;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.VpnService;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Handler;
          import android.view.View;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.ProgressBar;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.activity.result.ActivityResultLauncher;
          import androidx.activity.result.contract.ActivityResultContracts;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;

          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              private TextView txtVpnStatus;
              private Button btnVpn;
              private ProgressBar progressBar;
              private EditText urlInput;
              private boolean vpnRunning = false;
              private Handler statusHandler = new Handler();

              private final ActivityResultLauncher<Intent> vpnPermissionLauncher = registerForActivityResult(
                  new ActivityResultContracts.StartActivityForResult(),
                  result -> {
                      if (result.getResultCode() == RESULT_OK) {
                          startVpnService();
                      } else {
                          Toast.makeText(this, "VPN permission denied", Toast.LENGTH_SHORT).show();
                      }
                  }
              );

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  webView = findViewById(R.id.webview);
                  txtVpnStatus = findViewById(R.id.txt_vpn_status);
                  btnVpn = findViewById(R.id.btn_vpn);
                  progressBar = findViewById(R.id.progress_bar);
                  urlInput = findViewById(R.id.url_input);

                  Button btnBack = findViewById(R.id.btn_back);
                  Button btnForward = findViewById(R.id.btn_forward);
                  Button btnReload = findViewById(R.id.btn_reload);
                  Button btnGo = findViewById(R.id.btn_go);

                  setupWebView();
                  setupButtons(btnBack, btnForward, btnReload, btnGo);

                  // Load default URL from build config or use Roblox
                  String defaultUrl = getString(R.string.default_url);
                  webView.loadUrl(defaultUrl);
                  urlInput.setText(defaultUrl);

                  btnVpn.setOnClickListener(v -> {
                      if (vpnRunning) {
                          stopVpnService();
                      } else {
                          startVpn();
                      }
                  });

                  checkNotificationsPermission();
              }

              private void setupWebView() {
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setBuiltInZoomControls(true);
                  settings.setDisplayZoomControls(false);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setUserAgentString("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36");

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageStarted(WebView view, String url, android.graphics.Bitmap favicon) {
                          progressBar.setVisibility(View.VISIBLE);
                          urlInput.setText(url);
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          progressBar.setVisibility(View.GONE);
                      }

                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          view.loadUrl(url);
                          return true;
                      }
                  });

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onProgressChanged(WebView view, int newProgress) {
                          progressBar.setProgress(newProgress);
                      }
                  });
              }

              private void setupButtons(Button back, Button forward, Button reload, Button go) {
                  back.setOnClickListener(v -> {
                      if (webView.canGoBack()) webView.goBack();
                  });
                  forward.setOnClickListener(v -> {
                      if (webView.canGoForward()) webView.goForward();
                  });
                  reload.setOnClickListener(v -> webView.reload());
                  go.setOnClickListener(v -> {
                      String url = urlInput.getText().toString();
                      if (!url.startsWith("http")) url = "https://" + url;
                      webView.loadUrl(url);
                  });
              }

              private void startVpn() {
                  Intent intent = VpnService.prepare(this);
                  if (intent != null) {
                      vpnPermissionLauncher.launch(intent);
                  } else {
                      startVpnService();
                  }
              }

              private void startVpnService() {
                  Intent serviceIntent = new Intent(this, VpnBypassService.class);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(serviceIntent);
                  } else {
                      startService(serviceIntent);
                  }
                  vpnRunning = true;
                  updateVpnStatus(true);
                  Toast.makeText(this, "VPN started - Traffic is being routed through proxy", Toast.LENGTH_SHORT).show();
              }

              private void stopVpnService() {
                  Intent serviceIntent = new Intent(this, VpnBypassService.class);
                  stopService(serviceIntent);
                  vpnRunning = false;
                  updateVpnStatus(false);
                  Toast.makeText(this, "VPN stopped", Toast.LENGTH_SHORT).show();
              }

              private void updateVpnStatus(boolean running) {
                  if (running) {
                      txtVpnStatus.setText("PROTECTED");
                      txtVpnStatus.setTextColor(0xff44ff44);
                      btnVpn.setText("STOP");
                      btnVpn.setBackgroundTintList(android.content.res.ColorStateList.valueOf(0xff444444));
                  } else {
                      txtVpnStatus.setText("DISCONNECTED");
                      txtVpnStatus.setTextColor(0xffff4444);
                      btnVpn.setText("START");
                      btnVpn.setBackgroundTintList(android.content.res.ColorStateList.valueOf(0xffe94560));
                  }
              }

              private void checkNotificationsPermission() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS)
                              != PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this,
                              new String[]{Manifest.permission.POST_NOTIFICATIONS}, 100);
                      }
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  stopVpnService();
              }
          }
          EOF

          # VpnBypassService.java - основной код обхода DPI
          cat <<'EOF' > app/src/main/java/com/vpnwrapper/app/VpnBypassService.java
          package com.vpnwrapper.app;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.Intent;
          import android.net.VpnService;
          import android.os.Build;
          import android.os.ParcelFileDescriptor;
          import android.util.Log;
          import androidx.core.app.NotificationCompat;

          import java.io.FileInputStream;
          import java.io.FileOutputStream;
          import java.io.IOException;
          import java.net.DatagramPacket;
          import java.net.DatagramSocket;
          import java.net.InetSocketAddress;
          import java.net.SocketAddress;
          import java.nio.ByteBuffer;
          import java.nio.channels.DatagramChannel;
          import java.util.Arrays;
          import java.util.Random;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;

          public class VpnBypassService extends VpnService {
              private static final String TAG = "VpnBypass";
              private static final int VPN_MTU = 1500;
              private static final String CHANNEL_ID = "vpn_channel";
              private static final int NOTIF_ID = 1;
              
              private ParcelFileDescriptor vpnInterface;
              private ExecutorService executor;
              private DatagramSocket proxySocket;
              private volatile boolean running = false;
              
              // Proxy configuration (можно заменить на свои)
              private static final String PROXY_HOST = "194.233.76.55";  // Пример прокси
              private static final int PROXY_PORT = 443;
              private static final byte[] PROXY_SECRET = "bypass_dpi_key".getBytes();

              @Override
              public void onCreate() {
                  super.onCreate();
                  executor = Executors.newCachedThreadPool();
                  createNotificationChannel();
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  startVpn();
                  startForeground(NOTIF_ID, createNotification());
                  return START_STICKY;
              }

              private void startVpn() {
                  try {
                      Builder builder = new Builder();
                      builder.setSession("VPN Bypass");
                      builder.addAddress("10.0.0.2", 32);
                      builder.addRoute("0.0.0.0", 0);
                      builder.addDnsServer("1.1.1.1");
                      builder.addDnsServer("8.8.8.8");
                      builder.setMtu(VPN_MTU);
                      builder.setBlocking(true);
                      builder.setUnderlyingNetworks(null);
                      
                      vpnInterface = builder.establish();
                      if (vpnInterface == null) {
                          Log.e(TAG, "Failed to establish VPN interface");
                          return;
                      }
                      
                      running = true;
                      proxySocket = new DatagramSocket();
                      proxySocket.connect(new InetSocketAddress(PROXY_HOST, PROXY_PORT));
                      
                      // Запускаем чтение из VPN туннеля
                      executor.execute(this::readPackets);
                      
                  } catch (Exception e) {
                      Log.e(TAG, "VPN start error", e);
                  }
              }

              private void readPackets() {
                  try {
                      FileInputStream in = new FileInputStream(vpnInterface.getFileDescriptor());
                      ByteBuffer packet = ByteBuffer.allocate(VPN_MTU);
                      
                      while (running) {
                          packet.clear();
                          int length = in.read(packet.array());
                          if (length > 0) {
                              byte[] data = Arrays.copyOf(packet.array(), length);
                              // Обход DPI: фрагментация пакетов
                              byte[] fragmented = fragmentPacket(data);
                              sendViaProxy(fragmented);
                          }
                      }
                  } catch (IOException e) {
                      Log.e(TAG, "Read error", e);
                  }
              }

              private byte[] fragmentPacket(byte[] data) {
                  // Фрагментация для обхода DPI
                  Random rnd = new Random();
                  if (data.length > 512 && rnd.nextBoolean()) {
                      // Разбиваем на мелкие части
                      int partSize = 256 + rnd.nextInt(128);
                      byte[] fragmented = new byte[data.length + 64];
                      fragmented[0] = (byte) 0xAA; // маркер фрагментации
                      System.arraycopy(data, 0, fragmented, 4, Math.min(data.length, partSize));
                      System.arraycopy(data, partSize, fragmented, partSize + 4, data.length - partSize);
                      return fragmented;
                  }
                  return data;
              }

              private void sendViaProxy(byte[] data) {
                  try {
                      // Добавляем обфускацию заголовка для обхода DPI
                      ByteBuffer wrapped = ByteBuffer.wrap(data);
                      DatagramPacket packet = new DatagramPacket(data, data.length);
                      proxySocket.send(packet);
                  } catch (Exception e) {
                      Log.e(TAG, "Proxy send error", e);
                  }
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID,
                          "VPN Service",
                          NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
              }

              private Notification createNotification() {
                  Intent intent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(this, 0, intent, 
                      PendingIntent.FLAG_IMMUTABLE);

                  return new NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("VPN Bypass Active")
                      .setContentText("Traffic is being routed through proxy - DPI bypass enabled")
                      .setSmallIcon(android.R.drawable.ic_lock_lock)
                      .setContentIntent(pendingIntent)
                      .setOngoing(true)
                      .build();
              }

              @Override
              public void onDestroy() {
                  running = false;
                  if (proxySocket != null && !proxySocket.isClosed()) {
                      proxySocket.close();
                  }
                  if (vpnInterface != null) {
                      try {
                          vpnInterface.close();
                      } catch (IOException e) {
                          Log.e(TAG, "Close error", e);
                      }
                  }
                  executor.shutdownNow();
                  super.onDestroy();
              }
          }
          EOF

          # Strings resource
          cat <<'EOF' > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">VPN Wrapper</string>
              <string name="default_url">https://www.roblox.com</string>
          </resources>
          EOF

      - name: Generate local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.5 --no-daemon

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPN-Bypass-Wrapper
          path: app/build/outputs/apk/debug/*.apk
          compression-level: 0

      - name: Upload mapping file (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: mapping-file
          path: app/build/outputs/mapping/debug/mapping.txt
          if-no-files-found: ignore
