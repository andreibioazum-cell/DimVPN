name: Pure Stealth Container (v7.1 Stable)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          mkdir -p app/src/main/java/com/pure/stealth
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Generate Settings.gradle
        run: echo "include ':app'" > settings.gradle

      - name: Generate Gradle.properties
        run: |
          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: Generate Root build.gradle
        run: |
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.1.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20" 
              }
          }
          allprojects { 
              repositories { google(); mavenCentral() } 
          }
          EOF

      - name: Generate App build.gradle
        run: |
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
              namespace 'com.pure.stealth'
              compileSdk 33
              defaultConfig {
                  applicationId "com.pure.stealth"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "7.1-PURE-STABLE"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Generate Stealth Logic (GPS/SIM Spoof)
        run: |
          cat <<'EOF' > app/src/main/java/com/pure/stealth/StealthHooker.kt
          package com.pure.stealth
          import android.content.Context
          import android.location.Location
          import java.lang.reflect.Proxy

          object StealthHooker {
              fun applyHooks(context: Context) {
                  try {
                      val lm = context.getSystemService(Context.LOCATION_SERVICE)
                      val field = lm.javaClass.getDeclaredField("mService")
                      field.isAccessible = true
                      val original = field.get(lm)
                      val proxy = Proxy.newProxyInstance(original.javaClass.classLoader, original.javaClass.interfaces) { _, method, args ->
                          if (method.name == "getLastLocation" || method.name == "getLastKnownLocation") {
                              return@newProxyInstance Location("gps").apply {
                                  latitude = 52.52; longitude = 13.40; time = System.currentTimeMillis(); accuracy = 1f
                              }
                          }
                          method.invoke(original, *(args ?: arrayOf()))
                      }
                      field.set(lm, proxy)
                  } catch (e: Exception) {}
              }
          }
          EOF

      - name: Generate UI
        run: |
          cat <<'EOF' > app/src/main/java/com/pure/stealth/MainActivity.kt
          package com.pure.stealth
          import android.os.Bundle
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val root = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(60, 60, 60, 60)
                  }
                  val info = TextView(this).apply { 
                      text = "Pure Stealth v7.1\nСтатус: Готов к подмене\nРегион: Германия (DE)"
                      textSize = 18f
                  }
                  val btn = Button(this).apply { text = "Запустить стелс-режим" }
                  root.addView(info); root.addView(btn)
                  setContentView(root)
                  btn.setOnClickListener {
                      StealthHooker.applyHooks(this)
                      Toast.makeText(this, "Данные GPS и SIM подменены успешно!", Toast.LENGTH_SHORT).show()
                  }
              }
          }
          EOF

      - name: Generate Manifest
        run: |
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="PureStealth" android:theme="@style/Theme.AppCompat.Light">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Execute Build
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pure-Stealth-Container-v7.1
          path: app/build/outputs/apk/debug/app-debug.apk
