// ==============================
// SYSTEM MONITOR APP
// ==============================
class SystemMonitorApp extends Application {
    
    public SystemMonitorApp(TitanOS os) {
        super(os);
    }
    
    @Override
    public String getDescription() {
        return "System resource monitor";
    }
    
    @Override
    public void run(int pid) {
        os.terminal.print("");
        os.terminal.print("SYSTEM MONITOR");
        os.terminal.print("");
        
        Runtime runtime = Runtime.getRuntime();
        long usedMemory = (runtime.totalMemory() - runtime.freeMemory()) / 1024 / 1024;
        long maxMemory = runtime.maxMemory() / 1024 / 1024;
        
        os.terminal.print("Memory Usage: " + usedMemory + " MB / " + maxMemory + " MB");
        os.terminal.print("Available Processors: " + runtime.availableProcessors());
        os.terminal.print("");
        
        os.terminal.print("File System Stats:");
        os.terminal.print("  Total files: " + countFiles("/"));
        os.terminal.print("  Total directories: " + countDirs("/"));
        os.terminal.print("");
        
        os.terminal.print("Running Apps: " + os.appManager.running.size());
        os.terminal.print("Installed Apps: " + os.appManager.apps.size());
        os.terminal.print("");
    }
    
    private int countFiles(String path) {
        int count = 0;
        for (String file : os.fs.list(path)) {
            String fullPath = path + "/" + file;
            if (!os.fs.isDirectory(fullPath)) {
                count++;
            } else {
                count += countFiles(fullPath);
            }
        }
        return count;
    }
    
    private int countDirs(String path) {
        int count = 0;
        for (String file : os.fs.list(path)) {
            String fullPath = path + "/" + file;
            if (os.fs.isDirectory(fullPath)) {
                count++;
                count += countDirs(fullPath);
            }
        }
        return count;
    }
}
