name: Real TinyOS VM APK
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build x86 Shell Kernel
        run: |
          cat > kernel.asm << 'KERNEL'
          [bits 16]
          [org 0x7c00]
          start:
              mov ax, 0x0003
              int 0x10
              mov si, msg_boot
              call print

          main_shell:
              mov si, msg_prompt
              call print
              mov di, cmd_buffer
              call get_string

              mov si, cmd_buffer
              mov di, cmd_help
              call strcmp
              jc do_help

              mov si, cmd_buffer
              mov di, cmd_cls
              call strcmp
              jc start

              mov si, cmd_buffer
              mov di, cmd_matrix
              call strcmp
              jc do_matrix

              mov si, cmd_buffer
              mov di, cmd_info
              call strcmp
              jc do_info

              mov si, msg_unknown
              call print
              jmp main_shell

          do_help:
              mov si, msg_help
              call print
              jmp main_shell

          do_info:
              mov si, msg_sys
              call print
              jmp main_shell

          do_matrix:
              mov cx, 100
          .l: mov al, '*'
              mov ah, 0x0E
              int 0x10
              loop .l
              jmp main_shell

          ; --- Сравнение строк ---
          strcmp:
          .loop:
              mov al, [si]
              mov bl, [di]
              cmp al, bl
              jne .not_equal
              or al, al
              jz .equal
              inc si
              inc di
              jmp .loop
          .equal: stc
              ret
          .not_equal: clc
              ret

          ; --- Чтение строки ---
          get_string:
              xor cl, cl
          .loop:
              mov ah, 0x00
              int 0x16
              cmp al, 13 ; Enter
              je .done
              cmp al, 8  ; Backspace
              je .loop
              mov [di], al
              inc di
              inc cl
              mov ah, 0x0E
              int 0x10
              jmp .loop
          .done:
              mov byte [di], 0
              mov al, 13
              mov ah, 0x0E
              int 0x10
              mov al, 10
              int 0x10
              ret

          print:
              lodsb
              or al, al
              jz .d
              mov ah, 0x0E
              int 0x10
              jmp print
          .d: ret

          msg_boot   db 'DimOS x86 Shell v6.0', 13, 10, 'Type help for commands', 13, 10, 0
          msg_prompt db 'DimOS> ', 0
          msg_unknown db 'Unknown command!', 13, 10, 0
          msg_help   db 'Commands: help, cls, matrix, info', 13, 10, 0
          msg_sys    db 'OS: DimOS, CPU: x86 Emulated, RAM: 64KB', 13, 10, 0
          
          cmd_help   db 'help', 0
          cmd_cls    db 'cls', 0
          cmd_matrix db 'matrix', 0
          cmd_info   db 'info', 0
          cmd_buffer rb 32

          times 1024-($-$$) db 0
          KERNEL
          nasm -f bin kernel.asm -o kernel.bin

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java/com/tinyos/vm app/src/main/res/layout app/src/main/res/values app/src/main/assets
          cp kernel.bin app/src/main/assets/kernel.bin

          cat > app/src/main/res/values/strings.xml << 'XML'
          <resources><string name="app_name">DimOS Terminal VM</string></resources>
          XML
          cat > app/src/main/res/values/themes.xml << 'XML'
          <resources><style name="AppTheme" parent="Theme.AppCompat.NoActionBar"><item name="android:windowFullscreen">true</item></style></resources>
          XML

          cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000">
            <SurfaceView android:id="@+id/screen" android:layout_width="match_parent" android:layout_height="match_parent"/>
            <EditText android:id="@+id/input" android:layout_width="1dp" android:layout_height="1dp" 
              android:background="#000" android:inputType="textNoSuggestions" android:focusable="true"/>
          </RelativeLayout>
          LAYOUT

          cat > app/src/main/java/com/tinyos/vm/MainActivity.java << 'JAVA'
          package com.tinyos.vm;
          import android.os.*;
          import android.graphics.*;
          import android.view.*;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.EditText;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.InputStream;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private X86Emulator emu;
              private Queue<Character> keyQueue = new LinkedList<>();

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  emu = new X86Emulator();
                  EditText input = findViewById(R.id.input);
                  
                  // Фокус на поле ввода и вызов клавиатуры
                  input.requestFocus();
                  input.setOnKeyListener((v, keyCode, event) -> {
                      if (event.getAction() == KeyEvent.ACTION_DOWN) {
                          char c = (char) event.getUnicodeChar();
                          if (keyCode == KeyEvent.KEYCODE_ENTER) c = (char)13;
                          if (c != 0) keyQueue.add(c);
                      }
                      return false;
                  });

                  SurfaceView sv = findViewById(R.id.screen);
                  sv.setOnClickListener(v -> {
                      InputMethodManager imm = (InputMethodManager) getSystemService(INPUT_METHOD_SERVICE);
                      imm.showSoftInput(input, InputMethodManager.SHOW_IMPLICIT);
                  });

                  sv.getHolder().addCallback(new SurfaceHolder.Callback() {
                      @Override public void surfaceCreated(SurfaceHolder h) {
                          new Thread(() -> {
                              while (true) {
                                  for(int i=0; i<500; i++) emu.step();
                                  Canvas c = h.lockCanvas();
                                  if(c != null) { emu.draw(c); h.unlockCanvasAndPost(c); }
                                  try { Thread.sleep(20); } catch(Exception e) {}
                              }
                          }).start();
                      }
                      @Override public void surfaceDestroyed(SurfaceHolder h) {}
                      @Override public void surfaceChanged(SurfaceHolder h, int f, int w, int h1) {}
                  });
              }

              class X86Emulator {
                  byte[] mem = new byte[65536];
                  int ax, bx, cx, dx, si, di, sp=0xFFF0, ip=0x7C00;
                  boolean zf = false, cf = false;
                  List<String> lines = new ArrayList<>(Collections.singletonList(""));

                  X86Emulator() {
                      try { InputStream is = getAssets().open("kernel.bin"); is.read(mem, 0x7C00, 1024); } catch(Exception e) {}
                  }

                  void step() {
                      int op = mem[ip] & 0xFF;
                      if(op == 0xB8) { ax = (mem[ip+1]&0xFF)|((mem[ip+2]&0xFF)<<8); ip+=3; }
                      else if(op == 0xBB) { bx = (mem[ip+1]&0xFF)|((mem[ip+2]&0xFF)<<8); ip+=3; }
                      else if(op == 0xB9) { cx = (mem[ip+1]&0xFF)|((mem[ip+2]&0xFF)<<8); ip+=3; }
                      else if(op == 0xBF) { di = (mem[ip+1]&0xFF)|((mem[ip+2]&0xFF)<<8); ip+=3; }
                      else if(op == 0xBE) { si = (mem[ip+1]&0xFF)|((mem[ip+2]&0xFF)<<8); ip+=3; }
                      else if(op == 0xB4) { ax = (ax & 0xFF) | ((mem[ip+1]&0xFF)<<8); ip+=2; }
                      else if(op == 0xB0) { ax = (ax & 0xFF00) | (mem[ip+1]&0xFF); ip+=2; }
                      else if(op == 0xAC) { ax = (ax&0xFF00)|(mem[si]&0xFF); si++; ip++; }
                      else if(op == 0x8A) { ax = (ax&0xFF00)|(mem[si]&0xFF); ip+=2; } // mov al, [si]
                      else if(op == 0x38) { zf = (ax&0xFF) == (bx&0xFF); ip+=2; } // cmp al, bl (simplified)
                      else if(op == 0x3C) { zf = (ax&0xFF) == (mem[ip+1]&0xFF); ip+=2; }
                      else if(op == 0x46) { si++; ip++; } // inc si
                      else if(op == 0x47) { di++; ip++; } // inc di
                      else if(op == 0xF9) { cf = true; ip++; } // stc
                      else if(op == 0xF8) { cf = false; ip++; } // clc
                      else if(op == 0xE2) { cx--; if(cx > 0) ip += (byte)mem[ip+1] + 2; else ip+=2; }
                      else if(op == 0xE8) { 
                          int rel = (mem[ip+1]&0xFF)|((mem[ip+2]&0xFF)<<8);
                          int r = ip + 3; mem[--sp] = (byte)(r >> 8); mem[--sp] = (byte)(r & 0xFF);
                          ip += 3 + rel;
                      }
                      else if(op == 0xC3) { ip = (mem[sp++]&0xFF) | ((mem[sp++]&0xFF)<<8); }
                      else if(op == 0x74) { if(zf) ip += (byte)mem[ip+1] + 2; else ip+=2; }
                      else if(op == 0x75) { if(!zf) ip += (byte)mem[ip+1] + 2; else ip+=2; }
                      else if(op == 0xCD) {
                          int n = mem[ip+1]&0xFF;
                          if(n == 0x10) {
                              int ah = (ax>>8)&0xFF;
                              if(ah == 0x0E) {
                                  char c = (char)(ax&0xFF);
                                  if(c==13) lines.add(""); else if(c>=32) lines.set(lines.size()-1, lines.get(lines.size()-1)+c);
                                  if(lines.size()>25) lines.remove(0);
                              } else if(ah==0x03) { lines.clear(); lines.add(""); }
                          } else if(n == 0x16) {
                              if(keyQueue.isEmpty()) return;
                              ax = (ax&0xFF00)|keyQueue.poll();
                          }
                          ip+=2;
                      } else { ip++; }
                  }

                  void draw(Canvas c) {
                      c.drawColor(Color.BLACK);
                      Paint p = new Paint(); p.setColor(Color.GREEN); p.setTextSize(35);
                      p.setTypeface(Typeface.MONOSPACE);
                      for(int i=0; i<lines.size(); i++) c.drawText(lines.get(i) + (i==lines.size()-1?"_":""), 20, 50+i*40, p);
                  }
              }
          }
          JAVA

          # Gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          cat > build.gradle << 'GRADLE'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE
          cat > app/build.gradle << 'APP'
          plugins { id 'com.android.application' }
          android { namespace 'com.tinyos.vm'; compileSdk 34; defaultConfig { applicationId "com.tinyos.vm"; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          APP

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip && unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5 && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DimOS-v6-Terminal
          path: app/build/outputs/apk/debug/app-debug.apk
