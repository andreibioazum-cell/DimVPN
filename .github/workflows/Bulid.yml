          package com.enjoer.game;
          import java.util.Locale;
          public class ScriptEngine {
              public interface Host { GameRenderer renderer(); void toast(String text); }
              public static void run(Host host, String script) throws Exception {
                  if(script == null) return;
                  for(String line : script.split("\\r?\\n")){
                      line = line.trim();
                      if(line.isEmpty() || line.startsWith("//")) continue;
                      exec(host, line);
                  }
              }
              private static void exec(Host host, String line) throws Exception {
                  GameRenderer ren = host.renderer();
                  if(line.equals("player.jump")){ ren.vY = 0.55f; return; }
                  if(line.startsWith("phone.toast(")){ host.toast(extract(line)); return; }
                  if(line.startsWith("player.teleport(")){
                      float[] a = args(line);
                      ren.pX = a[0]; ren.pY = a[1]; ren.pZ = a[2]; ren.vY = 0; return;
                  }
                  if(line.startsWith("world.place(")){
                      float[] a = args(line);
                      ren.blocks.add(new Block(a[0],a[1],a[2],a[3],a[4],a[5],a[6],a[7],a[8])); return;
                  }
              }
              private static float[] args(String s){
                  String b = s.substring(s.indexOf("(")+1, s.lastIndexOf(")"));
                  String[] split = b.split(",");
                  float[] res = new float[split.length];
                  for(int i=0; i<split.length; i++) res[i] = Float.parseFloat(split[i].trim());
                  return res;
              }
              private static String extract(String s){
                  return s.substring(s.indexOf("\"")+1, s.lastIndexOf("\""));
              }
          }
