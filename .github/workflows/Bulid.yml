name: TinyOS v26.1 Stable Build

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

# ==============================
# СБОРКА ЯДРА (SHELL)
# ==============================
      - name: Build OS Image
        run: |
          cat > kernel.asm << 'EOF'
          [bits 16]
          [org 0x7c00]
          start:
              mov ax, 0x0003
              int 0x10
              mov si, msg_welcome
              call print
          shell:
              mov si, msg_prompt
              call print
              mov di, buffer
              call get_string
              
              mov si, buffer
              mov di, cmd_help
              call strcmp
              jz .help
              mov si, buffer
              mov di, cmd_cls
              call strcmp
              jz start
              mov al, [buffer]
              or al, al
              jz shell
              mov si, msg_err
              call print
              jmp shell
          .help:
              mov si, msg_help
              call print
              jmp shell
          strcmp:
          .l: mov al, [si]
              mov bl, [di]
              cmp al, bl
              jne .ne
              or al, al
              jz .e
              inc si
              inc di
              jmp .l
          .e: mov al, 1
              ret
          .ne: mov al, 0
              ret
          get_string:
              xor cx, cx
          .l: mov ah, 0x00
              int 0x16
              cmp al, 13
              je .d
              mov [di], al
              inc di
              mov ah, 0x0E
              int 0x10
              jmp .l
          .d: mov byte [di], 0
              mov al, 13
              int 0x10
              mov al, 10
              int 0x10
              ret
          print:
              lodsb
              or al, al
              jz .d
              mov ah, 0x0E
              int 0x10
              jmp print
          .d: ret
          msg_welcome db 'DimOS v26.1 Stable', 13, 10, 0
          msg_prompt  db '~ $ ', 0
          msg_help    db 'help, cls', 13, 10, 0
          msg_err     db 'Error!', 13, 10, 0
          cmd_help    db 'help', 0
          cmd_cls     db 'cls', 0
          buffer      times 32 db 0
          times 510-($-$$) db 0
          dw 0xAA55
          EOF
          nasm -f bin kernel.asm -o kernel.img

# ==============================
# СОЗДАНИЕ ПРОЕКТА
# ==============================
      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/tinyos/vm app/src/main/res/layout app/src/main/res/values app/src/main/assets
          cp kernel.img app/src/main/assets/kernel.img
          
          # Root Settings
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          # Root Build File (ИСПРАВЛЯЕТ ОШИБКУ PLUGINS)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          
          # App Build File
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.tinyos.vm'
              compileSdk 34
              defaultConfig { 
                  applicationId "com.tinyos.vm"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.tinyos.vm">
              <application android:label="TinyOS Stable" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:windowSoftInputMode="adjustResize">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:orientation="vertical" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000">
              <SurfaceView android:id="@+id/s" android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" />
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:background="#111" android:padding="5dp">
                  <EditText android:id="@+id/e" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" 
                      android:hint="Command..." android:textColor="#FFF" android:background="#222" android:padding="10dp" android:textSize="14sp" />
                  <Button android:id="@+id/b" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="RUN" />
              </LinearLayout>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/tinyos/vm/MainActivity.java << 'EOF'
          package com.tinyos.vm;
          import android.os.*;
          import android.graphics.*;
          import android.view.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.*;
          import java.io.*;

          public class MainActivity extends AppCompatActivity {
              X86Emulator emu;
              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  emu = new X86Emulator();
                  EditText et = findViewById(R.id.e);
                  Button btn = findViewById(R.id.b);
                  
                  btn.setOnClickListener(v -> {
                      String cmd = et.getText().toString();
                      for (char c : cmd.toCharArray()) emu.keys.add(c);
                      emu.keys.add((char)13);
                      et.setText("");
                  });

                  SurfaceView sv = findViewById(R.id.s);
                  sv.getHolder().addCallback(new SurfaceHolder.Callback() {
                      public void surfaceCreated(SurfaceHolder h) {
                          new Thread(() -> {
                              while(true) {
                                  for(int i=0; i<3000; i++) emu.step();
                                  Canvas c = h.lockCanvas();
                                  if(c!=null) { emu.draw(c); h.unlockCanvasAndPost(c); }
                                  try { Thread.sleep(20); } catch(Exception ex) {}
                              }
                          }).start();
                      }
                      public void surfaceChanged(SurfaceHolder h, int f, int w, int h1) {}
                      public void surfaceDestroyed(SurfaceHolder h) {}
                  });
              }

              class X86Emulator {
                  byte[] m = new byte[65536]; 
                  int ax, si, di, ip=0x7C00, sp=0x9000;
                  boolean zf = false;
                  public Queue<Character> keys = new LinkedList<>();
                  List<String> lines = new ArrayList<>(Arrays.asList(""));

                  X86Emulator() {
                      try { InputStream is = getAssets().open("kernel.img"); is.read(m, 0x7C00, 512); } catch(Exception e){}
                  }
                  
                  void step() {
                      int op = m[ip] & 0xFF;
                      switch(op) {
                          case 0xB8: ax=(m[ip+1]&0xFF)|((m[ip+2]&0xFF)<<8); ip+=3; break;
                          case 0xB4: ax=(ax&0xFF)|((m[ip+1]&0xFF)<<8); ip+=2; break;
                          case 0xB0: ax=(ax&0xFF00)|(m[ip+1]&0xFF); ip+=2; break;
                          case 0xBE: si=(m[ip+1]&0xFF)|((m[ip+2]&0xFF)<<8); ip+=3; break;
                          case 0xAC: ax=(ax&0xFF00)|(m[si]&0xFF); si++; ip++; break;
                          case 0xE8: int r=ip+3; m[--sp]=(byte)(r>>8); m[--sp]=(byte)r; ip+=3+((short)((m[ip+1]&0xFF)|((m[ip+2]&0xFF)<<8))); break;
                          case 0xC3: ip=(m[sp++]&0xFF)|((m[sp++]&0xFF)<<8); break;
                          case 0xCD: handleInt(m[ip+1]&0xFF); ip+=2; break;
                          case 0x3C: zf=(ax&0xFF)==(m[ip+1]&0xFF); ip+=2; break;
                          case 0x74: if(zf) ip+=(byte)m[ip+1]+2; else ip+=2; break;
                          default: ip++; break;
                      }
                  }

                  void handleInt(int n) {
                      if(n==0x10) {
                          if(((ax>>8)&0xFF)==0x0E) {
                              char c=(char)(ax&0xFF);
                              if(c==13) lines.add(""); else if(c>=32) lines.set(lines.size()-1, lines.get(lines.size()-1)+c);
                              if(lines.size()>25) lines.remove(0);
                          } else { lines.clear(); lines.add(""); }
                      } else if(n==0x16) {
                          if(!keys.isEmpty()) ax=(ax&0xFF00)|keys.poll(); else ip-=2;
                      }
                  }

                  void draw(Canvas c) {
                      c.drawColor(Color.BLACK); Paint p = new Paint(); p.setColor(Color.WHITE); p.setTextSize(24);
                      p.setTypeface(Typeface.MONOSPACE);
                      for(int i=0; i<lines.size(); i++) c.drawText(lines.get(i)+(i==lines.size()-1?"█":""), 20, 50+i*35, p);
                  }
              }
          }
          EOF

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TinyOS-v26-Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
