          cat <<'JAVA' > app/src/main/java/com/d1m/app/MainActivity.java
          package com.d1m.app;

          import android.app.AlertDialog;
          import android.content.Intent;
          import android.os.Bundle;
          import android.view.MenuItem;
          import android.widget.TextView;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.ActionBarDrawerToggle;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import com.google.android.material.navigation.NavigationView;
          import com.d1m.app.Models.Chat;
          import com.d1m.app.databinding.ActivityMainBinding;
          import java.util.ArrayList;

          public class MainActivity extends AppCompatActivity implements NavigationView.OnNavigationItemSelectedListener {
              private ActivityMainBinding b;
              private ChatsAdapter adapter;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  if(!Prefs.isLogged(this)){
                      startActivity(new Intent(this, LoginActivity.class));
                      finish();
                      return;
                  }

                  Storage.ensureSeed(this);

                  b = ActivityMainBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());

                  setSupportActionBar(b.toolbar);
                  getSupportActionBar().setTitle("D1m");

                  ActionBarDrawerToggle toggle = new ActionBarDrawerToggle(
                      this, b.drawer, b.toolbar,
                      R.string.nav_open, R.string.nav_close
                  );
                  b.drawer.addDrawerListener(toggle);
                  toggle.syncState();

                  b.nav.setNavigationItemSelectedListener(this);
                  fillDrawerHeader();

                  adapter = new ChatsAdapter(chat -> {
                      Intent i = new Intent(this, ChatActivity.class);
                      i.putExtra("chatId", chat.id);
                      i.putExtra("title", chat.title);
                      startActivity(i);
                  });

                  b.rvChats.setLayoutManager(new LinearLayoutManager(this));
                  b.rvChats.setAdapter(adapter);

                  b.btnNewChat.setOnClickListener(v -> createChatDialog());

                  reloadChats();
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  reloadChats();
              }

              private void reloadChats(){
                  ArrayList<Chat> chats = Storage.loadChats(this);
                  adapter.setItems(chats);
              }

              private void fillDrawerHeader(){
                  TextView name = b.nav.getHeaderView(0).findViewById(R.id.h_name);
                  TextView phone = b.nav.getHeaderView(0).findViewById(R.id.h_phone);
                  TextView avatar = b.nav.getHeaderView(0).findViewById(R.id.h_avatar);

                  String n = Prefs.name(this);
                  String p = Prefs.phone(this);
                  name.setText(n);
                  phone.setText(p);
                  String a = (n == null || n.isEmpty()) ? "D" : (""+Character.toUpperCase(n.charAt(0)));
                  avatar.setText(a);
              }

              private void createChatDialog(){
                  final android.widget.EditText input = new android.widget.EditText(this);
                  input.setHint("Название чата");
                  new AlertDialog.Builder(this)
                      .setTitle("Новый чат")
                      .setView(input)
                      .setPositiveButton("Создать", (d,w) -> {
                          String t = input.getText().toString().trim();
                          if(t.isEmpty()) t = "Чат";
                          Storage.createChat(this, t);
                          reloadChats();
                      })
                      .setNegativeButton("Отмена", null)
                      .show();
              }

              @Override
              public boolean onNavigationItemSelected(@NonNull MenuItem item) {
                  int id = item.getItemId();

                  if(id == R.id.nav_chats){
                      // уже тут
                  } else if(id == R.id.nav_profile){
                      showProfile();
                  } else if(id == R.id.nav_settings){
                      toast("Настройки (заглушка)");
                  } else if(id == R.id.nav_about){
                      toast("D1m — офлайн демо в стиле Telegram");
                  } else if(id == R.id.nav_logout){
                      Prefs.logout(this);
                      startActivity(new Intent(this, LoginActivity.class));
                      finish();
                  }

                  b.drawer.closeDrawers();
                  return true;
              }

              private void showProfile(){
                  String msg = "Имя: " + Prefs.name(this) + "\nТелефон: " + Prefs.phone(this);
                  new AlertDialog.Builder(this)
                      .setTitle("Профиль")
                      .setMessage(msg)
                      .setPositiveButton("ОК", null)
                      .show();
              }

              private void toast(String s){
                  android.widget.Toast.makeText(this, s, android.widget.Toast.LENGTH_SHORT).show();
              }
          }
