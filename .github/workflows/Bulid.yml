          cat <<'JAVA' > app/src/main/java/com/gamescript/pro/PythonInterpreter.java
          package com.gamescript.pro;

          import android.content.Context;
          import android.graphics.*;
          import java.util.*;
          import java.util.regex.*;

          public class PythonInterpreter {
              Context context;
              GameView gameView;
              Map<String, Object> variables = new HashMap<>();
              Map<String, Function> functions = new HashMap<>();
              List<LoadedFile> loadedFiles = new ArrayList<>();
              
              Canvas currentCanvas;
              Paint currentPaint;
              Random random = new Random();

              public PythonInterpreter(Context ctx) {
                  this.context = ctx;
              }

              public void setGameView(GameView gv) {
                  this.gameView = gv;
              }

              public void setLoadedFiles(List<LoadedFile> files) {
                  this.loadedFiles = files;
              }

              public void execute(String code) {
                  String[] lines = code.split("\n");
                  
                  for (int i = 0; i < lines.length; i++) {
                      String line = lines[i];
                      
                      if (line.trim().isEmpty() || line.trim().startsWith("#")) continue;
                      
                      if (line.trim().startsWith("def ")) {
                          i = parseFunction(lines, i);
                      } else if (!line.startsWith(" ") && !line.startsWith("\t")) {
                          executeLine(line);
                      }
                  }
              }

              int parseFunction(String[] lines, int start) {
                  String header = lines[start].trim();
                  String funcName = header.substring(4, header.indexOf('(')).trim();
                  
                  List<String> body = new ArrayList<>();
                  int i = start + 1;
                  
                  while (i < lines.length) {
                      String line = lines[i];
                      if (!line.trim().isEmpty() && !line.startsWith(" ") && !line.startsWith("\t")) {
                          break;
                      }
                      if (!line.trim().isEmpty()) {
                          body.add(line.replaceFirst("^    ", "").replaceFirst("^\t", ""));
                      }
                      i++;
                  }
                  
                  Function func = new Function();
                  func.name = funcName;
                  func.body = body;
                  functions.put(funcName, func);
                  
                  return i - 1;
              }

              public void update() {
                  if (functions.containsKey("update")) {
                      executeFunction(functions.get("update"));
                  }
              }

              public void draw(Canvas canvas, Paint paint) {
                  currentCanvas = canvas;
                  currentPaint = paint;
                  
                  if (functions.containsKey("draw")) {
                      executeFunction(functions.get("draw"));
                  }
              }

              void executeFunction(Function func) {
                  for (String line : func.body) {
                      executeLine(line);
                  }
              }

              void executeLine(String line) {
                  line = line.trim();
                  if (line.isEmpty() || line.startsWith("#")) return;

                  // Variable assignment
                  if (line.matches(".*=.*") && !line.contains("==")) {
                      String[] parts = line.split("=", 2);
                      String left = parts[0].trim();
                      String right = parts[1].trim();
                      
                      // Multiple assignment: x, y = 100, 200
                      if (left.contains(",")) {
                          String[] vars = left.split(",");
                          String[] vals = right.split(",");
                          for (int i = 0; i < Math.min(vars.length, vals.length); i++) {
                              variables.put(vars[i].trim(), evaluateExpression(vals[i].trim()));
                          }
                      } else {
                          variables.put(left, evaluateExpression(right));
                      }
                  }
                  // If statement
                  else if (line.startsWith("if ")) {
                      executeIf(line);
                  }
                  // For loop
                  else if (line.startsWith("for ")) {
                      executeFor(line);
                  }
                  // While loop
                  else if (line.startsWith("while ")) {
                      executeWhile(line);
                  }
                  // Function call
                  else if (line.contains("(") && line.contains(")")) {
                      executeFunctionCall(line);
                  }
              }

              void executeIf(String line) {
                  Pattern p = Pattern.compile("if\\s+(.+):");
                  Matcher m = p.matcher(line);
                  if (m.find()) {
                      String condition = m.group(1).trim();
                      if (evaluateCondition(condition)) {
                          String stmt = line.substring(line.indexOf(':') + 1).trim();
                          if (!stmt.isEmpty()) {
                              executeLine(stmt);
                          }
                      }
                  }
              }

              void executeFor(String line) {
                  // for i in range(10):
                  Pattern p = Pattern.compile("for\\s+(\\w+)\\s+in\\s+range\\((\\d+)\\):");
                  Matcher m = p.matcher(line);
                  if (m.find()) {
                      String varName = m.group(1);
                      int count = Integer.parseInt(m.group(2));
                      String stmt = line.substring(line.indexOf(':') + 1).trim();
                      
                      for (int i = 0; i < count; i++) {
                          variables.put(varName, i);
                          if (!stmt.isEmpty()) {
                              executeLine(stmt);
                          }
                      }
                  }
              }

              void executeWhile(String line) {
                  Pattern p = Pattern.compile("while\\s+(.+):");
                  Matcher m = p.matcher(line);
                  if (m.find()) {
                      String condition = m.group(1).trim();
                      String stmt = line.substring(line.indexOf(':') + 1).trim();
                      
                      int safety = 0;
                      while (evaluateCondition(condition) && safety++ < 10000) {
                          if (!stmt.isEmpty()) {
                              executeLine(stmt);
                          }
                      }
                  }
              }

              boolean evaluateCondition(String cond) {
                  if (cond.equals("True")) return true;
                  if (cond.equals("False")) return false;
                  
                  // key('left')
                  if (cond.contains("key(")) {
                      Pattern p = Pattern.compile("key\\(['\"]?(\\w+)['\"]?\\)");
                      Matcher m = p.matcher(cond);
                      if (m.find() && gameView != null) {
                          return isKeyPressed(m.group(1));
                      }
                  }
                  
                  // touching()
                  if (cond.equals("touching()")) {
                      return gameView != null && gameView.isTouching();
                  }
                  
                  // Comparison operators
                  if (cond.contains("==")) {
                      String[] parts = cond.split("==");
                      return evaluateExpression(parts[0]).equals(evaluateExpression(parts[1]));
                  }
                  if (cond.contains(">")) {
                      String[] parts = cond.split(">");
                      return toFloat(evaluateExpression(parts[0])) > toFloat(evaluateExpression(parts[1]));
                  }
                  if (cond.contains("<")) {
                      String[] parts = cond.split("<");
                      return toFloat(evaluateExpression(parts[0])) < toFloat(evaluateExpression(parts[1]));
                  }
                  
                  return false;
              }

              void executeFunctionCall(String line) {
                  String funcName = line.substring(0, line.indexOf('(')).trim();
                  String params = line.substring(line.indexOf('(') + 1, line.lastIndexOf(')')).trim();
                  String[] args = params.isEmpty() ? new String[0] : params.split(",");
                  
                  for (int i = 0; i < args.length; i++) {
                      args[i] = args[i].trim();
                  }
                  
                  // Built-in functions
                  switch (funcName) {
                      case "print":
                          System.out.println(evaluateExpression(args[0]));
                          break;
                      case "clear":
                          drawClear(args);
                          break;
                      case "rect":
                          drawRect(args);
                          break;
                      case "circle":
                          drawCircle(args);
                          break;
                      case "line":
                          drawLine(args);
                          break;
                      case "text":
                          drawText(args);
                          break;
                      case "load_image":
                          loadImage(args);
                          break;
                      case "draw_image":
                          drawImage(args);
                          break;
                      case "play_sound":
                          playSound(args);
                          break;
                      default:
                          // User defined functions
                          if (functions.containsKey(funcName)) {
                              executeFunction(functions.get(funcName));
                          }
                          break;
                  }
              }

              Object evaluateExpression(String expr) {
                  expr = expr.trim();
                  
                  // String literal
                  if (expr.startsWith("'") || expr.startsWith("\"")) {
                      return expr.substring(1, expr.length() - 1);
                  }
                  
                  // List literal
                  if (expr.startsWith("[") && expr.endsWith("]")) {
                      String content = expr.substring(1, expr.length() - 1);
                      if (content.isEmpty()) return new ArrayList<>();
                      String[] items = content.split(",");
                      List<Object> list = new ArrayList<>();
                      for (String item : items) {
                          list.add(evaluateExpression(item.trim()));
                      }
                      return list;
                  }
                  
                  // Tuple literal
                  if (expr.startsWith("(") && expr.endsWith(")")) {
                      String content = expr.substring(1, expr.length() - 1);
                      String[] items = content.split(",");
                      List<Object> tuple = new ArrayList<>();
                      for (String item : items) {
                          tuple.add(evaluateExpression(item.trim()));
                      }
                      return tuple;
                  }
                  
                  // Function calls
                  if (expr.contains("(")) {
                      String funcName = expr.substring(0, expr.indexOf('(')).trim();
                      String params = expr.substring(expr.indexOf('(') + 1, expr.lastIndexOf(')')).trim();
                      
                      switch (funcName) {
                          case "str":
                              return String.valueOf(evaluateExpression(params));
                          case "int":
                              return (int) toFloat(evaluateExpression(params));
                          case "float":
                              return toFloat(evaluateExpression(params));
                          case "len":
                              Object obj = evaluateExpression(params);
                              if (obj instanceof List) return ((List) obj).size();
                              if (obj instanceof String) return ((String) obj).length();
                              return 0;
                          case "range":
                              int n = (int) toFloat(evaluateExpression(params));
                              List<Integer> range = new ArrayList<>();
                              for (int i = 0; i < n; i++) range.add(i);
                              return range;
                          case "width":
                              return gameView != null ? gameView.getWidth2() : 0;
                          case "height":
                              return gameView != null ? gameView.getHeight2() : 0;
                          case "touch_pos":
                              List<Float> pos = new ArrayList<>();
                              if (gameView != null) {
                                  pos.add(gameView.getTouchX());
                                  pos.add(gameView.getTouchY());
                              }
                              return pos;
                          case "random":
                              return random.nextFloat();
                          case "randint":
                              String[] rargs = params.split(",");
                              int min = (int) toFloat(evaluateExpression(rargs[0]));
                              int max = (int) toFloat(evaluateExpression(rargs[1]));
                              return min + random.nextInt(max - min + 1);
                      }
                  }
                  
                  // Arithmetic operations
                  if (expr.contains("+") && !expr.startsWith("+")) {
                      String[] parts = expr.split("\\+", 2);
                      float left = toFloat(evaluateExpression(parts[0]));
                      float right = toFloat(evaluateExpression(parts[1]));
                      return left + right;
                  }
                  if (expr.contains("-") && !expr.startsWith("-")) {
                      String[] parts = expr.split("-", 2);
                      float left = toFloat(evaluateExpression(parts[0]));
                      float right = toFloat(evaluateExpression(parts[1]));
                      return left - right;
                  }
                  if (expr.contains("*")) {
                      String[] parts = expr.split("\\*", 2);
                      float left = toFloat(evaluateExpression(parts[0]));
                      float right = toFloat(evaluateExpression(parts[1]));
                      return left * right;
                  }
                  if (expr.contains("/")) {
                      String[] parts = expr.split("/", 2);
                      float left = toFloat(evaluateExpression(parts[0]));
                      float right = toFloat(evaluateExpression(parts[1]));
                      return right != 0 ? left / right : 0;
                  }
                  
                  // List indexing
                  if (expr.contains("[") && expr.contains("]")) {
                      String varName = expr.substring(0, expr.indexOf('['));
                      String indexStr = expr.substring(expr.indexOf('[') + 1, expr.indexOf(']'));
                      int index = (int) toFloat(evaluateExpression(indexStr));
                      
                      Object var = variables.get(varName.trim());
                      if (var instanceof List) {
                          List list = (List) var;
                          if (index >= 0 && index < list.size()) {
                              return list.get(index);
                          }
                      }
                  }
                  
                  // Variable
                  if (variables.containsKey(expr)) {
                      return variables.get(expr);
                  }
                  
                  // Number literal
                  try {
                      if (expr.contains(".")) {
                          return Float.parseFloat(expr);
                      } else {
                          return Integer.parseInt(expr);
                      }
                  } catch (NumberFormatException e) {
                      return expr;
                  }
              }

              float toFloat(Object obj) {
                  if (obj instanceof Number) {
                      return ((Number) obj).floatValue();
                  }
                  try {
                      return Float.parseFloat(String.valueOf(obj));
                  } catch (Exception e) {
                      return 0;
                  }
              }

