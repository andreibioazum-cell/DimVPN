                  ViewGroup.LayoutParams sLp = staminaFill.getLayoutParams();
                  int max = dp(146);
                  int sw = (int)(max * (ren.stamina / 100f));
                  if (sw < 0) sw = 0;
                  sLp.width = sw;
                  staminaFill.setLayoutParams(sLp);

                  ViewGroup.LayoutParams hLp = hpFill.getLayoutParams();
                  int hw = (int)(max * (ren.playerHp / 100f));
                  if (hw < 0) hw = 0;
                  hLp.width = hw;
                  hpFill.setLayoutParams(hLp);

                  btnRun.setBackgroundResource(ren.runEnabled ? R.drawable.run_btn_active : R.drawable.run_btn);
                  btnRun.setTextColor(ren.runEnabled ? 0xFF111111 : 0xFFE0E0E0);

                  long now = System.currentTimeMillis();

                  if (ren.playerIsKiller) {
                      btnSkill2.setVisibility(View.VISIBLE);
                      btnSkill3.setVisibility(View.VISIBLE);
                      
                      if (ren.selectedKiller == Killer.DIMASI4EK229) {
                          btnSkill1.setText(now < ren.skill1CdUntil ? String.format(Locale.US, "%.1fs", (ren.skill1CdUntil - now)/1000f) : "HIT");
                          btnSkill2.setText(now < ren.skill2CdUntil ? String.format(Locale.US, "%.1fs", (ren.skill2CdUntil - now)/1000f) : "CUBE");
                          btnSkill3.setText(now < ren.skill3CdUntil ? "USED" : "BOOST");
                      } else if (ren.selectedKiller == Killer.DERKA) {
                          btnSkill1.setText(now < ren.skill1CdUntil ? String.format(Locale.US, "%.1fs", (ren.skill1CdUntil - now)/1000f) : "SLASH");
                          btnSkill2.setText(now < ren.skill2CdUntil ? String.format(Locale.US, "%.1fs", (ren.skill2CdUntil - now)/1000f) : "DASH");
                          btnSkill3.setText(now < ren.skill3CdUntil ? String.format(Locale.US, "%.1fs", (ren.skill3CdUntil - now)/1000f) : "STUN");
                      }
                  } else {
                      btnSkill1.setText(now < ren.skill1CdUntil ? String.format(Locale.US, "%.1fs", (ren.skill1CdUntil - now)/1000f) : "OINK");
                      btnSkill2.setVisibility(View.GONE);
                      btnSkill3.setVisibility(View.GONE);
                  }
              }

              private int dp(int v) {
                  return (int)(v * getResources().getDisplayMetrics().density);
              }

              private void setupJoy(View base, View stick) {
                  base.setOnTouchListener((v, e) -> {
                      float cx = v.getWidth() / 2f;
                      float cy = v.getHeight() / 2f;

                      if (e.getAction() == MotionEvent.ACTION_MOVE || e.getAction() == MotionEvent.ACTION_DOWN) {
                          float dx = e.getX() - cx;
                          float dy = e.getY() - cy;
                          float d = (float)Math.sqrt(dx * dx + dy * dy);
                          float lim = cx - stick.getWidth() / 2f;

                          if (lim <= 0f) return true;

                          if (d > lim) {
                              dx *= lim / d;
                              dy *= lim / d;
                          }

                          stick.setTranslationX(dx);
                          stick.setTranslationY(dy);
                          ren.jX = dx / lim;
                          ren.jY = dy / lim;
                      } else if (e.getAction() == MotionEvent.ACTION_UP || e.getAction() == MotionEvent.ACTION_CANCEL) {
                          stick.setTranslationX(0f);
                          stick.setTranslationY(0f);
                          ren.jX = 0f;
                          ren.jY = 0f;
                      }
                      return true;
                  });
              }

              private void setupLook(View zone) {
                  zone.setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_DOWN) {
                          lx = e.getX();
                          ly = e.getY();
                      } else if (e.getAction() == MotionEvent.ACTION_MOVE) {
                          ren.rY += (e.getX() - lx) * 0.25f;
                          ren.rX += (e.getY() - ly) * 0.18f;
                          if (ren.rX < -8f) ren.rX = -8f;
                          if (ren.rX > 45f) ren.rX = 45f;
                          lx = e.getX();
                          ly = e.getY();
                      }
                      return true;
                  });
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (staminaFill != null) staminaFill.removeCallbacks(updateUiRunnable);
              }
          }
          EOF

      - name: Create Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Verify APK exists
        run: |
          ls -R app/build/outputs || true
          test -f app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_7.1_LobbySelect_Fixes_APK
          path: app/build/outputs/apk/debug/app-debug.apk
