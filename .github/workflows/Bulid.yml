name: HORROR GAME BUILDER
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean Repository
        run: find . -maxdepth 1 ! -name '.git' ! -name 'README.md' ! -name '.' -exec rm -rf {} +

      - name: Create Folders
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

      - name: Generate Game Engine
        run: |
          # 1. ГЛАВНЫЙ КОД ИГРЫ
          cat <<'EOF' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.*;
          import java.nio.*;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private int prg; private FloatBuffer b;
              private float[] proj=new float[16], view=new float[16], model=new float[16];
              public float pX=0, pY=4.2f, pZ=10, rY=0, jX=0, jY=0;
              public boolean isKiller = false;
              public float enemyX=10, enemyZ=-10; // Позиция цели/врага

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs="#version 300 es\nlayout(location=0)in vec4 aP;layout(location=1)in vec3 aN;uniform mat4 uM;out vec3 vN,vP;void main(){vP=aP.xyz;vN=aN;gl_Position=uM*aP;}";
                  String fs="#version 300 es\nprecision highp float;in vec3 vN,vP;uniform vec4 uC;uniform vec3 sun;out vec4 fC;void main(){" +
                            "if(length(vP)>150.0){float h=normalize(vP).y*0.5+0.5;fC=vec4(mix(vec3(0.05,0.05,0.1),vec3(0.1,0.2,0.4),h),1.0);return;}" +
                            "float d=max(dot(normalize(vN),normalize(sun)),0.2);fC=vec4(uC.rgb*d,1.0);}";
                  int vsh=GLES30.glCreateShader(35633); GLES30.glShaderSource(vsh,vs); GLES30.glCompileShader(vsh);
                  int fsh=GLES30.glCreateShader(35632); GLES30.glShaderSource(fsh,fs); GLES30.glCompileShader(fsh);
                  prg=GLES30.glCreateProgram(); GLES30.glAttachShader(prg,vsh); GLES30.glAttachShader(prg,fsh); GLES30.glLinkProgram(prg);
                  float[] v={-.5f,.5f,.5f,0,0,1,-.5f,-.5f,.5f,0,0,1,.5f,.5f,.5f,0,0,1,.5f,-.5f,.5f,0,0,1,
                             -.5f,.5f,-.5f,0,0,-1,-.5f,-.5f,-.5f,0,0,-1,.5f,.5f,-.5f,0,0,-1,.5f,-.5f,-.5f,0,0,-1,
                             -.5f,0.5f,-0.5f,0,1,0,-0.5f,0.5f,0.5f,0,1,0,0.5f,0.5f,-0.5f,0,1,0,0.5f,0.5f,0.5f,0,1,0};
                  b=ByteBuffer.allocateDirect(v.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(v); b.position(0);
              }

              @Override public void onSurfaceChanged(GL10 gl,int w,int h){ GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,60,(float)w/h,0.1f,400f); }
              
              @Override public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClear(16640);
                  float rad=(float)Math.toRadians(rY);
                  // Камера от 3-го лица (чуть сзади и выше игрока)
                  Matrix.setLookAtM(view,0, pX-(float)Math.sin(rad)*8, pY+5, pZ+(float)Math.cos(rad)*8, pX,pY+1,pZ, 0,1,0);
                  
                  GLES30.glUseProgram(prg);
                  int uM=GLES30.glGetUniformLocation(prg,"uM"), uC=GLES30.glGetUniformLocation(prg,"uC");
                  GLES30.glUniform3f(GLES30.glGetUniformLocation(prg,"sun"), 10, 20, 10);
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,24,b); GLES30.glEnableVertexAttribArray(0);
                  b.position(3); GLES30.glVertexAttribPointer(1,3,GLES30.GL_FLOAT,false,24,b); GLES30.glEnableVertexAttribArray(1); b.position(0);
                  
                  draw(uM,uC,0,0,0,500,0.1f,500,0.1f,0.2f,0.1f); // Пол (темная трава)
                  draw(uM,uC,pX,pY,pZ,250,250,250,0,0,0);        // Небо
                  
                  // Игрок
                  if(isKiller) draw(uM,uC,pX,pY+1,pZ,1,2,1,0.8f,0,0); // Убийца красный
                  else draw(uM,uC,pX,pY+1,pZ,1,2,1,0,0.5f,1);        // Выживший синий
                  
                  // Враг (бот для теста)
                  draw(uM,uC,enemyX,pY+1,enemyZ,1,2,1,0.5f,0.5f,0.5f);
              }

              private void draw(int mLoc,int cLoc,float x,float y,float z,float sx,float sy,float sz,float r,float g,float bl){
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,x,y,z); Matrix.scaleM(model,0,sx,sy,sz);
                  float[] mvp=new float[16]; Matrix.multiplyMM(mvp,0,proj,0,view,0); Matrix.multiplyMM(mvp,0,mvp,0,model,0);
                  GLES30.glUniformMatrix4fv(mLoc,1,false,mvp,0); GLES30.glUniform4f(cLoc,r,g,bl,1);
                  for(int i=0;i<3;i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }

              private void update(){
                  float s=0.22f, rad=(float)Math.toRadians(rY);
                  pX+=((float)Math.sin(rad)*-jY+(float)Math.cos(rad)*jX)*s;
                  pZ+=((float)-Math.cos(rad)*-jY+(float)Math.sin(rad)*jX)*s;
              }
          }
          EOF

          # 2. ЛОГИКА MainActivity (Лобби + Таймер)
          cat <<'EOF' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.os.*;
          import android.view.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren; private float lx;
              private int timeLeft = 180;
              private Handler h = new Handler();

              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  showLobby();
              }

              void showLobby() {
                  setContentView(R.layout.lobby);
                  findViewById(R.id.btn_surv).setOnClickListener(v -> startGame(false));
                  findViewById(R.id.btn_kill).setOnClickListener(v -> startGame(true));
              }

              void startGame(boolean killer) {
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3); ren = new GameRenderer(); 
                  ren.isKiller = killer; gv.setRenderer(ren);

                  // Скрываем/показываем способности
                  findViewById(R.id.surv_skills).setVisibility(killer ? View.GONE : View.VISIBLE);
                  findViewById(R.id.kill_skills).setVisibility(killer ? View.VISIBLE : View.GONE);

                  // Таймер
                  timeLeft = 180;
                  h.postDelayed(new Runnable() {
                      @Override public void run() {
                          timeLeft--;
                          ((TextView)findViewById(R.id.timer)).setText("Time: " + timeLeft);
                          if(timeLeft <= 0) { Toast.makeText(MainActivity.this, "TIME OVER!", Toast.LENGTH_LONG).show(); showLobby(); }
                          else h.postDelayed(this, 1000);
                      }
                  }, 1000);

                  // Управление
                  findViewById(R.id.joy).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_MOVE){ren.jX=(e.getX()-v.getWidth()/2)/60f; ren.jY=(e.getY()-v.getHeight()/2)/60f;}
                      else {ren.jX=0; ren.jY=0;} return true;
                  });
                  gv.setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN) lx=e.getX();
                      if(e.getAction()==MotionEvent.ACTION_MOVE){ren.rY+=(e.getX()-lx)*0.4f; lx=e.getX();}
                      return true;
                  });
              }
          }
          EOF

      - name: Generate Layouts
        run: |
          # ЛОББИ
          cat <<'EOF' > app/src/main/res/layout/lobby.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="center" android:background="#111">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="CHOOSE YOUR ROLE" android:textColor="#FFF" android:textSize="30sp" android:layout_marginBottom="50dp"/>
              <Button android:id="@+id/btn_surv" android:layout_width="200dp" android:layout_height="60dp" android:text="SURVIVOR" android:backgroundTint="#00BFFF" android:layout_margin="10dp"/>
              <Button android:id="@+id/btn_kill" android:layout_width="200dp" android:layout_height="60dp" android:text="KILLER" android:backgroundTint="#FF4500" android:layout_margin="10dp"/>
          </LinearLayout>
          EOF

          # ИГРОВОЙ ЭКРАН
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view" android:layout_width="match_parent" android:layout_height="match_parent"/>
              <TextView android:id="@+id/timer" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Time: 180" android:textColor="#FFF" android:textSize="24sp" android:layout_gravity="top|center" android:layout_marginTop="20dp"/>
              <View android:id="@+id/joy" android:layout_width="140dp" android:layout_height="140dp" android:layout_gravity="bottom|left" android:layout_margin="30dp" android:background="@drawable/joy_bg"/>
              
              <LinearLayout android:id="@+id/surv_skills" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="bottom|right" android:orientation="horizontal" android:layout_margin="20dp">
                  <LinearLayout android:orientation="vertical" android:gravity="center" android:layout_margin="5dp">
                      <Button android:layout_width="60dp" android:layout_height="60dp" android:background="@drawable/btn_skill" android:text="⚡"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="DASH" android:textColor="#FFF" android:textSize="10sp"/>
                  </LinearLayout>
                  <LinearLayout android:orientation="vertical" android:gravity="center" android:layout_margin="5dp">
                      <Button android:layout_width="60dp" android:layout_height="60dp" android:background="@drawable/btn_skill" android:text="👁"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="SENSE" android:textColor="#FFF" android:textSize="10sp"/>
                  </LinearLayout>
                  <LinearLayout android:orientation="vertical" android:gravity="center" android:layout_margin="5dp">
                      <Button android:layout_width="60dp" android:layout_height="60dp" android:background="@drawable/btn_skill" android:text="🛡"/>
                      <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="HEAL" android:textColor="#FFF" android:textSize="10sp"/>
                  </LinearLayout>
              </LinearLayout>

              <LinearLayout android:id="@+id/kill_skills" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="bottom|right" android:layout_margin="20dp">
                  <Button android:layout_width="100dp" android:layout_height="100dp" android:background="@drawable/btn_kill_style" android:text="HIT" android:textColor="#FFF" android:textSize="20sp"/>
              </LinearLayout>
          </FrameLayout>
          EOF

      - name: Create Styles
        run: |
          echo "<resources><style name='AppTheme' parent='Theme.AppCompat.Light.NoActionBar'><item name='android:windowFullscreen'>true</item></style></resources>" > app/src/main/res/values/styles.xml
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android' android:shape='oval'><solid android:color='#44000000'/><stroke android:width='2dp' android:color='#00BFFF'/></shape>" > app/src/main/res/drawable/joy_bg.xml
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android'><corners android:radius='30dp'/><solid android:color='#CC00BFFF'/></shape>" > app/src/main/res/drawable/btn_skill.xml
          echo "<shape xmlns:android='http://schemas.android.com/apk/res/android'><corners android:radius='50dp'/><solid android:color='#CCFF4500'/><stroke android:width='3dp' android:color='#FFF'/></shape>" > app/src/main/res/drawable/btn_kill_style.xml
          
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:theme="@style/AppTheme">
          <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity></application></manifest>
          EOF

      - name: Build APK
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          echo "plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.game'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HorrorGame_V1
          path: app/build/outputs/apk/debug/app-debug.apk
