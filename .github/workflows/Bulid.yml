                      double rad=Math.toRadians(rY);
                      float px2=snap(pX+(float)Math.sin(rad)*placeDist),py2=snap(pY),pz2=snap(pZ+(float)-Math.cos(rad)*placeDist);
                      if(py2-blockSY/2f<FLOOR_Y)py2=FLOOR_Y+blockSY/2f;
                      Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px2,py2,pz2);Matrix.scaleM(model,0,blockSX,blockSY,blockSZ);
                      GLES30.glEnable(GLES30.GL_BLEND);GLES30.glBlendFunc(GLES30.GL_SRC_ALPHA,GLES30.GL_ONE_MINUS_SRC_ALPHA);
                      GLES30.glUniform1f(uSel,0f);drawM(prog,uM,uMVP,uC,blockR,blockG,blockB,.4f);
                      GLES30.glDisable(GLES30.GL_BLEND);
                  }

                  if(!(isEngineMode&&!isPlayingLevel)) drawChar(uM,uMVP,uC);
              }

              private void update(){
                  long now=System.nanoTime();
                  if(lastTimeNs==0L)lastTimeNs=now;
                  float dt=(now-lastTimeNs)/1_000_000_000f;lastTimeNs=now;

                  idlePhase+=dt*1.2f;flyPhase+=dt*1.5f;
                  moveMag=(float)Math.min(1.0,Math.sqrt(jX*jX+jY*jY));

                  float s=.42f;
                  double rad=Math.toRadians(rY);
                  if(isEngineMode&&!isPlayingLevel){
                      float fx=(float)Math.sin(rad),fz=(float)-Math.cos(rad);
                      pX+=(fx*-jY+(float)Math.cos(rad)*jX)*s;
                      pZ+=(fz*-jY+(float)Math.sin(rad)*jX)*s;
                      pY+=0;
                  } else {
                      float mX=((float)Math.sin(rad)*-jY+(float)Math.cos(rad)*jX)*s;
                      float mZ=((float)-Math.cos(rad)*-jY+(float)Math.sin(rad)*jX)*s;
                      vY-=.025f;
                      float nX=pX+mX,nY=pY+vY,nZ=pZ+mZ;
                      float fY=nY-PLAYER_HEIGHT,hY=nY;
                      if(fY<FLOOR_Y){nY=FLOOR_Y+PLAYER_HEIGHT;vY=0;}
                      for(Block b:blocks){
                          boolean ox=nX+PLAYER_RADIUS>b.minX()&&nX-PLAYER_RADIUS<b.maxX();
                          boolean oz=nZ+PLAYER_RADIUS>b.minZ()&&nZ-PLAYER_RADIUS<b.maxZ();
                          boolean oy=fY<b.maxY()-.1f&&hY>b.minY()+.1f;
                          boolean touch=ox&&oz&&(oy||Math.abs((nY-PLAYER_HEIGHT)-b.maxY())<.2f);
                          if(touch&&!b.touchingPlayer){b.touchingPlayer=true;if(eventHost!=null&&!b.onTouchScript.trim().isEmpty())eventHost.runBlockScript(b,b.onTouchScript);}
                          else if(!touch)b.touchingPlayer=false;
                          if(ox&&oz){
                              if(pY-PLAYER_HEIGHT>=b.maxY()-.15f&&fY<b.maxY()){nY=b.maxY()+PLAYER_HEIGHT;vY=0;}
                              else if(pY<b.minY()&&hY>b.minY()){nY=b.minY();vY=0;}
                              else if(oy){
                                  float o1=(nX+PLAYER_RADIUS)-b.minX(),o2=b.maxX()-(nX-PLAYER_RADIUS),o3=(nZ+PLAYER_RADIUS)-b.minZ(),o4=b.maxZ()-(nZ-PLAYER_RADIUS);
                                  float mo=Math.min(Math.min(o1,o2),Math.min(o3,o4));
                                  if(mo==o1)nX=b.minX()-PLAYER_RADIUS;else if(mo==o2)nX=b.maxX()+PLAYER_RADIUS;
                                  else if(mo==o3)nZ=b.minZ()-PLAYER_RADIUS;else nZ=b.maxZ()+PLAYER_RADIUS;
                              }
                          }
                      }
                      pX=nX;pY=nY;pZ=nZ;
                      if(moveMag>.05f){charRotation=(float)Math.toDegrees(Math.atan2(mX,mZ));walkPhase+=dt*3.85f*moveMag;}
                      // Отслеживаем прыжок
                      boolean onG=isOnGround();
                      if(!onG)wasInAir=true;
                      else if(wasInAir){wasInAir=false;}
                  }
              }

              private float[][] getPalette(){
                  return new float[][]{{1f,.85f,.15f},{.1f,.4f,1f},{.1f,.8f,.2f},{1f,.2f,.2f},{.9f,.9f,.9f},{.1f,.1f,.1f}};
              }

              private void drawChar(int uM,int uMVP,int uC){
                  if(animPack==ANIM_FLY)drawFlyChar(uM,uMVP,uC);
                  else drawDefaultChar(uM,uMVP,uC);
              }

              private void drawDefaultChar(int uM,int uMVP,int uC){
                  boolean onG=isOnGround();
                  float[][]pal=getPalette();
                  float[]sk=pal[Math.max(0,Math.min(5,skinColor))];
                  float[]to=pal[Math.max(0,Math.min(5,torsoColor))];
                  float[]le=pal[Math.max(0,Math.min(5,legsColor))];

                  final float legH=1.6f,legW=0.7f,legD=0.7f;
                  final float torsoH=1.8f,torsoW=1.4f,torsoD=0.8f;
                  final float headS=1.15f,armH=1.6f,armW=0.55f,armD=0.55f;
                  // Ноги ровно от Y=footY до footY+legH, чтобы не уходили в пол
                  float footY=pY-PLAYER_HEIGHT;

                  float armA=0f,legA=0f;

                  if(!onG){
                      // Прыжок: руки слегка согнуты вниз-назад, ноги слегка согнуты
                      armA=30f;   // руки немного назад
                      legA=-15f;  // ноги немного вперед
                  } else if(moveMag>.05f){
                      // Ходьба - БЕЗ боббинга
                      float w=walkPhase%(float)(Math.PI*2);
                      armA=(float)(Math.sin(w)*40f);
                      legA=(float)(-Math.sin(w)*40f);
                  } else {
                      // Idle: очень слабое покачивание рук
                      armA=(float)(Math.sin(idlePhase*.7f)*5f);
                      legA=0f;
                  }

                  GLES30.glUniform1f(GLES30.glGetUniformLocation(prog,"uSel"),0f);

                  // Торс
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);Matrix.rotateM(model,0,charRotation,0,1,0);
                  Matrix.translateM(model,0,0,legH+torsoH/2f,0);Matrix.scaleM(model,0,torsoW,torsoH,torsoD);
                  drawM(prog,uM,uMVP,uC,to[0],to[1],to[2],1f);

                  // Голова
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);Matrix.rotateM(model,0,charRotation,0,1,0);
                  Matrix.translateM(model,0,0,legH+torsoH+headS/2f,0);Matrix.scaleM(model,0,headS,headS,headS);
                  drawM(prog,uM,uMVP,uC,sk[0],sk[1],sk[2],1f);

                  drawFace(uM,uMVP,uC,footY,charRotation);

                  // Левая рука
                  float shY=legH+torsoH-0.2f;
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);Matrix.rotateM(model,0,charRotation,0,1,0);
                  Matrix.translateM(model,0,-(torsoW/2f+armW/2f),shY,0);Matrix.rotateM(model,0,armA,1,0,0);
                  Matrix.translateM(model,0,0,-armH/2f,0);Matrix.scaleM(model,0,armW,armH,armD);
                  drawM(prog,uM,uMVP,uC,sk[0],sk[1],sk[2],1f);

                  // Правая рука
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);Matrix.rotateM(model,0,charRotation,0,1,0);
                  Matrix.translateM(model,0,(torsoW/2f+armW/2f),shY,0);Matrix.rotateM(model,0,-armA,1,0,0);
                  Matrix.translateM(model,0,0,-armH/2f,0);Matrix.scaleM(model,0,armW,armH,armD);
                  drawM(prog,uM,uMVP,uC,sk[0],sk[1],sk[2],1f);

                  // Левая нога
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);Matrix.rotateM(model,0,charRotation,0,1,0);
                  Matrix.translateM(model,0,-0.35f,legH,0);Matrix.rotateM(model,0,legA,1,0,0);
                  Matrix.translateM(model,0,0,-legH/2f,0);Matrix.scaleM(model,0,legW,legH,legD);
                  drawM(prog,uM,uMVP,uC,le[0],le[1],le[2],1f);

                  // Правая нога
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);Matrix.rotateM(model,0,charRotation,0,1,0);
                  Matrix.translateM(model,0,0.35f,legH,0);Matrix.rotateM(model,0,-legA,1,0,0);
                  Matrix.translateM(model,0,0,-legH/2f,0);Matrix.scaleM(model,0,legW,legH,legD);
                  drawM(prog,uM,uMVP,uC,le[0],le[1],le[2],1f);
              }

              // FLY PACK - брутальный полёт, никаких крыльев
              private void drawFlyChar(int uM,int uMVP,int uC){
                  float[][]pal=getPalette();
                  float[]sk=pal[Math.max(0,Math.min(5,skinColor))];
                  float[]to=pal[Math.max(0,Math.min(5,torsoColor))];
                  float[]le=pal[Math.max(0,Math.min(5,legsColor))];

                  final float legH=1.6f,legW=0.7f,legD=0.7f;
                  final float torsoH=1.8f,torsoW=1.4f,torsoD=0.8f;
                  final float headS=1.15f,armH=1.6f,armW=0.55f,armD=0.55f;

                  boolean onG=isOnGround();
                  // Плавное зависание вверх-вниз
                  float flyBob=(float)(Math.sin(flyPhase)*0.3f);
                  float footY=pY-PLAYER_HEIGHT+flyBob;

                  // Наклон тела вперёд для брутального полёта
                  float bodyTiltX=0f;
                  float armA=0f,legA=0f;

                  if(!onG){
                      // В воздухе: тело наклонено вперёд, руки вдоль тела прямо, ноги прямо
                      bodyTiltX=-20f;
                      armA=0f;
                      legA=0f;
                  } else if(moveMag>.05f){
                      // Хождение с fly pack: лёгкий наклон, плавное движение рук
                      bodyTiltX=-10f;
                      float w=walkPhase%(float)(Math.PI*2);
                      armA=(float)(Math.sin(w)*25f);
                      legA=(float)(-Math.sin(w)*25f);
                  } else {
                      // Idle: просто зависает, руки вдоль тела
                      bodyTiltX=0f;
                      armA=(float)(Math.sin(flyPhase*.6f)*4f);
                      legA=0f;
                  }

                  GLES30.glUniform1f(GLES30.glGetUniformLocation(prog,"uSel"),0f);

                  // Торс с наклоном
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,charRotation,0,1,0);Matrix.rotateM(model,0,bodyTiltX,1,0,0);
                  Matrix.translateM(model,0,0,legH+torsoH/2f,0);Matrix.scaleM(model,0,torsoW,torsoH,torsoD);
                  drawM(prog,uM,uMVP,uC,to[0],to[1],to[2],1f);

                  // Голова
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,charRotation,0,1,0);Matrix.rotateM(model,0,bodyTiltX,1,0,0);
                  Matrix.translateM(model,0,0,legH+torsoH+headS/2f,0);Matrix.scaleM(model,0,headS,headS,headS);
                  drawM(prog,uM,uMVP,uC,sk[0],sk[1],sk[2],1f);

                  drawFaceWithTilt(uM,uMVP,uC,footY,charRotation,bodyTiltX);

                  float shY=legH+torsoH-0.2f;
                  // Левая рука
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,charRotation,0,1,0);Matrix.rotateM(model,0,bodyTiltX,1,0,0);
                  Matrix.translateM(model,0,-(torsoW/2f+armW/2f),shY,0);Matrix.rotateM(model,0,armA,1,0,0);
                  Matrix.translateM(model,0,0,-armH/2f,0);Matrix.scaleM(model,0,armW,armH,armD);
                  drawM(prog,uM,uMVP,uC,sk[0],sk[1],sk[2],1f);

                  // Правая рука
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,charRotation,0,1,0);Matrix.rotateM(model,0,bodyTiltX,1,0,0);
                  Matrix.translateM(model,0,(torsoW/2f+armW/2f),shY,0);Matrix.rotateM(model,0,-armA,1,0,0);
                  Matrix.translateM(model,0,0,-armH/2f,0);Matrix.scaleM(model,0,armW,armH,armD);
                  drawM(prog,uM,uMVP,uC,sk[0],sk[1],sk[2],1f);

                  // Левая нога
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,charRotation,0,1,0);Matrix.rotateM(model,0,bodyTiltX,1,0,0);
                  Matrix.translateM(model,0,-0.35f,legH,0);Matrix.rotateM(model,0,legA,1,0,0);
                  Matrix.translateM(model,0,0,-legH/2f,0);Matrix.scaleM(model,0,legW,legH,legD);
                  drawM(prog,uM,uMVP,uC,le[0],le[1],le[2],1f);

                  // Правая нога
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,charRotation,0,1,0);Matrix.rotateM(model,0,bodyTiltX,1,0,0);
                  Matrix.translateM(model,0,0.35f,legH,0);Matrix.rotateM(model,0,-legA,1,0,0);
                  Matrix.translateM(model,0,0,-legH/2f,0);Matrix.scaleM(model,0,legW,legH,legD);
                  drawM(prog,uM,uMVP,uC,le[0],le[1],le[2],1f);

                  // Джетпак на спине
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,charRotation,0,1,0);Matrix.rotateM(model,0,bodyTiltX,1,0,0);
                  Matrix.translateM(model,0,0,legH+torsoH/2f,-torsoD/2f-0.38f);Matrix.scaleM(model,0,1.1f,1.5f,0.55f);
                  drawM(prog,uM,uMVP,uC,0.18f,0.18f,0.22f,1f);

                  // Сопла джетпака (светящиеся)
                  GLES30.glEnable(GLES30.GL_BLEND);GLES30.glBlendFunc(GLES30.GL_SRC_ALPHA,GLES30.GL_ONE_MINUS_SRC_ALPHA);
                  float glowPulse=0.6f+0.4f*(float)Math.sin(flyPhase*7f);
                  // Левое сопло
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,charRotation,0,1,0);Matrix.rotateM(model,0,bodyTiltX,1,0,0);
                  Matrix.translateM(model,0,-0.3f,legH+torsoH/2f-0.65f,-torsoD/2f-0.68f);
