                  <EditText android:id="@+id/input" android:layout_width="0dp" android:layout_height="40dp" android:layout_weight="1" android:background="@null" android:hint="Message" android:paddingLeft="12dp" android:textSize="16sp"/>
                  <FrameLayout android:id="@+id/btn_send" android:layout_width="44dp" android:layout_height="44dp" android:background="@drawable/bg_send">
