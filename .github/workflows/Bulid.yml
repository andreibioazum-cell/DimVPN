                      float pS=HEAD_S*0.10f;
                      // Зрачки чёрные
                      Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,-HEAD_S*0.23f,eyeY,eyeZ-0.01f);Matrix.scaleM(model,0,pS,pS,eD);draw(vp,uM,uMVP,uC,0f,0f,0f,1f);
                      Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,HEAD_S*0.23f,eyeY,eyeZ-0.01f);Matrix.scaleM(model,0,pS,pS,eD);draw(vp,uM,uMVP,uC,0f,0f,0f,1f);
                  }
              }

              private void drawMouth(float[]vp,int uM,int uMVP,int uC,float px,float footY,float pz,float rot,int type){
                  float mY=LEG_H+TORSO_H+HEAD_S*0.28f;
                  float mZ=-HEAD_S*0.51f;
                  if(type==0){
                      // Рот свина - улыбка (горизонталь)
                      Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,0,mY,mZ);Matrix.scaleM(model,0,HEAD_S*0.30f,HEAD_S*0.06f,HEAD_S*0.06f);draw(vp,uM,uMVP,uC,0f,0f,0f,1f);
                  } else {
                      // Рот дима - просто линия
                      Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,0,mY,mZ);Matrix.scaleM(model,0,HEAD_S*0.28f,HEAD_S*0.055f,HEAD_S*0.055f);draw(vp,uM,uMVP,uC,0f,0f,0f,1f);
                  }
              }

              private void drawArms(float[]vp,int uM,int uMVP,int uC,float px,float footY,float pz,float rot,float swing,float r,float g,float b){
                  float sY=LEG_H+TORSO_H-0.15f;
                  // Левая рука: swing вперёд-назад (правильная ось X)
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,px,footY,pz);
                  Matrix.rotateM(model,0,rot,0,1,0);
                  Matrix.translateM(model,0,-(TORSO_W/2f+ARM_W/2f),sY,0);
                  Matrix.rotateM(model,0,swing,1,0,0);
                  Matrix.translateM(model,0,0,-ARM_H/2f,0);
                  Matrix.scaleM(model,0,ARM_W,ARM_H,ARM_D);
                  draw(vp,uM,uMVP,uC,r,g,b,1f);
                  // Правая рука: противофаза
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,px,footY,pz);
                  Matrix.rotateM(model,0,rot,0,1,0);
                  Matrix.translateM(model,0,(TORSO_W/2f+ARM_W/2f),sY,0);
                  Matrix.rotateM(model,0,-swing,1,0,0);
                  Matrix.translateM(model,0,0,-ARM_H/2f,0);
                  Matrix.scaleM(model,0,ARM_W,ARM_H,ARM_D);
                  draw(vp,uM,uMVP,uC,r,g,b,1f);
              }

              private void drawLegs(float[]vp,int uM,int uMVP,int uC,float px,float footY,float pz,float rot,float la,float r,float g,float b){
                  // Левая нога
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,px,footY,pz);
                  Matrix.rotateM(model,0,rot,0,1,0);
                  Matrix.translateM(model,0,-0.35f,LEG_H,0);
                  Matrix.rotateM(model,0,la,1,0,0);
                  Matrix.translateM(model,0,0,-LEG_H/2f,0);
                  Matrix.scaleM(model,0,LEG_W,LEG_H,LEG_D);
                  draw(vp,uM,uMVP,uC,r,g,b,1f);
                  // Правая нога: противофаза
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,px,footY,pz);
                  Matrix.rotateM(model,0,rot,0,1,0);
                  Matrix.translateM(model,0,0.35f,LEG_H,0);
                  Matrix.rotateM(model,0,-la,1,0,0);
                  Matrix.translateM(model,0,0,-LEG_H/2f,0);
                  Matrix.scaleM(model,0,LEG_W,LEG_H,LEG_D);
                  draw(vp,uM,uMVP,uC,r,g,b,1f);
              }

              private void drawBoots(float[]vp,int uM,int uMVP,int uC,float px,float footY,float pz,float rot,float la){
                  float bootH=0.35f;
                  // Левый ботинок
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,px,footY,pz);
                  Matrix.rotateM(model,0,rot,0,1,0);
                  Matrix.translateM(model,0,-0.35f,bootH/2f,0);
                  Matrix.rotateM(model,0,la,1,0,0);
                  Matrix.scaleM(model,0,LEG_W+0.1f,bootH,LEG_D+0.15f);
                  draw(vp,uM,uMVP,uC,0.05f,0.05f,0.05f,1f);
                  // Правый ботинок
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,px,footY,pz);
                  Matrix.rotateM(model,0,rot,0,1,0);
                  Matrix.translateM(model,0,0.35f,bootH/2f,0);
                  Matrix.rotateM(model,0,-la,1,0,0);
                  Matrix.scaleM(model,0,LEG_W+0.1f,bootH,LEG_D+0.15f);
                  draw(vp,uM,uMVP,uC,0.05f,0.05f,0.05f,1f);
              }

              private void draw(float[]vp,int uM,int uMVP,int uC,float r,float g,float b,float a){
                  GLES30.glUniformMatrix4fv(uM,1,false,model,0);
                  float[]res=new float[16];
                  Matrix.multiplyMM(res,0,vp,0,model,0);
                  GLES30.glUniformMatrix4fv(uMVP,1,false,res,0);
                  GLES30.glUniform4f(uC,r,g,b,a);
                  for(int i=0;i<6;i++)GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }

              private int mkProg(String v,String f){
                  int p=GLES30.glCreateProgram();
                  GLES30.glAttachShader(p,mkSh(GLES30.GL_VERTEX_SHADER,v));
                  GLES30.glAttachShader(p,mkSh(GLES30.GL_FRAGMENT_SHADER,f));
                  GLES30.glLinkProgram(p);
                  return p;
              }
              private int mkSh(int t,String s){
                  int sh=GLES30.glCreateShader(t);
                  GLES30.glShaderSource(sh,s);
                  GLES30.glCompileShader(sh);
                  return sh;
              }
          }
