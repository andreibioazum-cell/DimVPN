              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentRight="true" android:background="@drawable/bg_msg_out" android:maxWidth="280dp" android:orientation="horizontal" android:paddingLeft="10dp" android:paddingTop="6dp" android:paddingRight="8dp" android:paddingBottom="6dp">
                  <TextView android:id="@+id/text" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#000" android:textSize="15sp"/>
                  <TextView android:id="@+id/time" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="bottom" android:layout_marginLeft="6dp" android:textColor="#5DB050" android:textSize="11sp"/>
                  <ImageView android:layout_width="16dp" android:layout_height="16dp" android:layout_gravity="bottom" android:layout_marginLeft="2dp" android:src="@drawable/ic_check"/>
