          cat <<'JAVA' > app/src/main/java/com/d1m/app/ChatActivity.java
          package com.d1m.app;

          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.LinearLayoutManager;
          import com.d1m.app.Models.Msg;
          import com.d1m.app.databinding.ActivityChatBinding;
          import java.util.ArrayList;
          import java.util.UUID;

          public class ChatActivity extends AppCompatActivity {
              private ActivityChatBinding b;
              private MessagesAdapter adapter;
              private String chatId;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  b = ActivityChatBinding.inflate(getLayoutInflater());
                  setContentView(b.getRoot());

                  chatId = getIntent().getStringExtra("chatId");
                  String title = getIntent().getStringExtra("title");
                  if(title == null) title = "Чат";

                  setSupportActionBar(b.toolbar);
                  getSupportActionBar().setDisplayHomeAsUpEnabled(true);
                  getSupportActionBar().setTitle(title);
                  b.toolbar.setNavigationOnClickListener(v -> finish());

                  adapter = new MessagesAdapter();
                  b.rvMessages.setLayoutManager(new LinearLayoutManager(this));
                  b.rvMessages.setAdapter(adapter);

                  load();

                  b.btnSend.setOnClickListener(v -> send());
              }

              private void load(){
                  ArrayList<Msg> msgs = Storage.loadMessages(this, chatId);
                  adapter.setItems(msgs);
                  if(adapter.getItemCount() > 0) b.rvMessages.scrollToPosition(adapter.getItemCount()-1);
              }

              private void send(){
                  String t = b.edText.getText().toString().trim();
                  if(t.isEmpty()) return;
                  b.edText.setText("");

                  Msg m = new Msg(UUID.randomUUID().toString(), chatId, t, true);
                  Storage.addMessage(this, m);
                  adapter.add(m);
                  b.rvMessages.scrollToPosition(adapter.getItemCount()-1);
              }
          }
