name: TinyOS v28 Ultra-Stable

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
# ==============================
# CHECKOUT
# ==============================
      - name: Checkout
        uses: actions/checkout@v4

# ==============================
# INSTALL NASM
# ==============================
      - name: Install NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

# ==============================
# BOOTLOADER / KERNEL
# ==============================
      - name: Build OS Image
        run: |
          cat > kernel.asm << 'EOF'
          [bits 16]
          [org 0x7c00]

          start:
              xor ax, ax
              mov ds, ax
              mov es, ax
              mov ax, 0x0003
              int 0x10

              mov si, msg_welcome
              call print

          shell:
              mov si, msg_prompt
              call print

              mov di, buffer
              call get_string

              mov si, buffer
              mov di, cmd_help
              call strcmp
              jz do_help

              mov si, buffer
              mov di, cmd_cls
              call strcmp
              jz start

              mov al, [buffer]
              cmp al, 0
              je shell

              mov si, msg_err
              call print
              jmp shell

          do_help:
              mov si, msg_help
              call print
              jmp shell

          strcmp:
          .loop:
              mov al, [si]
              mov bl, [di]
              cmp al, bl
              jne .done
              cmp al, 0
              je .done
              inc si
              inc di
              jmp .loop
          .done:
              ret

          get_string:
              xor cx, cx
          .loop:
              mov ah, 0
              int 0x16
              cmp al, 13
              je .done
              cmp al, 8
              je .back
              mov [di], al
              inc di
              inc cx
              mov ah, 0x0E
              int 0x10
              jmp .loop
          .back:
              jcxz .loop
              dec di
              dec cx
              mov ah, 0x0E
              mov al, 8
              int 0x10
              mov al, ' '
              int 0x10
              mov al, 8
              int 0x10
              jmp .loop
          .done:
              mov byte [di], 0
              mov ah, 0x0E
              mov al, 13
              int 0x10
              mov al, 10
              int 0x10
              ret

          print:
              lodsb
              cmp al, 0
              je .d
              mov ah, 0x0E
              int 0x10
              jmp print
          .d:
              ret

          msg_welcome db 'DimOS v28 Ultra-Stable',13,10,'Ready.',13,10,0
          msg_prompt  db 'dim@os:~ $ ',0
          msg_help    db 'Commands: help, cls',13,10,0
          msg_err     db 'Unknown command.',13,10,0

          cmd_help db 'help',0
          cmd_cls  db 'cls',0

          buffer times 32 db 0

          times 510-($-$$) db 0
          dw 0xAA55
          EOF

          nasm -f bin kernel.asm -o kernel.img

# ==============================
# ANDROID PROJECT
# ==============================
      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/tinyos/vm
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/assets

          cp kernel.img app/src/main/assets/kernel.img

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.tinyos.vm'
              compileSdk 34
              defaultConfig {
                  applicationId "com.tinyos.vm"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="DimOS"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:orientation="vertical"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000">

              <SurfaceView
                  android:id="@+id/s"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"/>

              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#111">

                  <EditText
                      android:id="@+id/e"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:textColor="#FFF"
                      android:background="#222"
                      android:padding="10dp"
                      android:imeOptions="actionSend"/>

                  <Button
                      android:id="@+id/b"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="SEND"/>
              </LinearLayout>
          </LinearLayout>
          EOF

          cat > app/src/main/java/com/tinyos/vm/MainActivity.java << 'EOF'
          package com.tinyos.vm;

          import android.os.*;
          import android.graphics.*;
          import android.view.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.*;
          import java.io.*;

          public class MainActivity extends AppCompatActivity {

              X86Emulator emu;

              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);

                  emu = new X86Emulator();

                  EditText et = findViewById(R.id.e);
                  Button btn = findViewById(R.id.b);

                  btn.setOnClickListener(v -> {
                      String cmd = et.getText().toString();
                      for(char c: cmd.toCharArray())
                          emu.keys.add(c);
                      emu.keys.add((char)13);
                      et.setText("");
                  });

                  SurfaceView sv = findViewById(R.id.s);
                  sv.getHolder().addCallback(new SurfaceHolder.Callback() {
                      public void surfaceCreated(SurfaceHolder h) {
                          new Thread(() -> {
                              while(true) {
                                  emu.runCpuSlice();  // ✅ стабильный CPU
                                  Canvas c = h.lockCanvas();
                                  if(c!=null) {
                                      emu.draw(c);
                                      h.unlockCanvasAndPost(c);
                                  }
                                  try { Thread.sleep(16); } catch(Exception e){}
                              }
                          }).start();
                      }
                      public void surfaceChanged(SurfaceHolder h,int f,int w,int h1){}
                      public void surfaceDestroyed(SurfaceHolder h){}
                  });
              }

              class X86Emulator {

                  byte[] m = new byte[65536];
                  int ax,bx,cx,dx,si,di,ip=0x7C00,sp=0xFFF0;
                  boolean zf=false;

                  Queue<Character> keys = new LinkedList<>();
                  List<String> lines = new ArrayList<>(Arrays.asList(""));

                  X86Emulator() {
                      try {
                          getAssets().open("kernel.img").read(m,0x7C00,512);
                      } catch(Exception e){}
                  }

                  void runCpuSlice() {
                      for(int i=0;i<500;i++)
                          step();
                  }

                  void step() {
                      int op = m[ip]&0xFF;

                      switch(op) {

                          case 0xCD: // INT
                              handleInt(m[ip+1]&0xFF);
                              ip+=2;
                              return;

                          case 0xB8:
                              ax=(m[ip+1]&0xFF)|((m[ip+2]&0xFF)<<8);
                              ip+=3; return;

                          case 0xB4:
                              ax=(ax&0xFF)|((m[ip+1]&0xFF)<<8);
                              ip+=2; return;

                          case 0xB0:
                              ax=(ax&0xFF00)|(m[ip+1]&0xFF);
                              ip+=2; return;

                          default:
                              ip++;
                      }
                  }

                  void handleInt(int n) {

                      if(n==0x10) {
                          if(((ax>>8)&0xFF)==0x0E) {
                              char c=(char)(ax&0xFF);
                              if(c==13) lines.add("");
                              else if(c>=32)
                                  lines.set(lines.size()-1,
                                      lines.get(lines.size()-1)+c);
                              if(lines.size()>30) lines.remove(0);
                          } else if(((ax>>8)&0xFF)==0) {
                              lines.clear(); lines.add("");
                          }
                      }

                      else if(n==0x16) {
                          if(!keys.isEmpty())
                              ax=(ax&0xFF00)|keys.poll();
                          else
                              return; // ✅ больше нет ip-=2
                      }
                  }

                  void draw(Canvas c) {
                      c.drawColor(Color.BLACK);
                      Paint p=new Paint();
                      p.setColor(Color.GREEN);
                      p.setTextSize(26);
                      p.setTypeface(Typeface.MONOSPACE);

                      for(int i=0;i<lines.size();i++)
                          c.drawText(lines.get(i)+(i==lines.size()-1?"█":""),20,40+i*32,p);
                  }
              }
          }
          EOF

# ==============================
# BUILD APK
# ==============================
      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

# ==============================
# UPLOAD
# ==============================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TinyOS-v28-UltraStable
          path: app/build/outputs/apk/debug/app-debug.apk
