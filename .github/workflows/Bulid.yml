name: Real TinyOS VM APK
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm xxd

      - name: Build Real TinyOS Kernel
        run: |
          cat > kernel.asm << 'KERNEL'
          [bits 16]
          [org 0x7c00]
          
          start:
              mov ax, 0x0003
              int 0x10
              
              mov si, msg
              call print
          
          show_prompt:
              mov si, prompt
              call print
          
          main_loop:
              mov ah, 0x00
              int 0x16 ; Ждем клавишу (результат в AL)
              
              cmp al, '1'
              je clock_app
              cmp al, '2'
              je paint_app
              cmp al, 'h'
              je show_help
              cmp al, 'c'
              je clear_screen
              
              mov ah, 0x0E
              int 0x10 ; Эхо символа
              jmp main_loop
          
          show_help:
              mov si, help_msg
              call print
              jmp show_prompt
          
          clear_screen:
              mov ax, 0x0003
              int 0x10
              jmp show_prompt
          
          clock_app:
              mov si, clock_msg
              call print
              jmp show_prompt

          paint_app:
              mov si, paint_msg
              call print
              jmp show_prompt
          
          print:
              lodsb
              or al, al
              jz .done
              mov ah, 0x0E
              int 0x10
              jmp print
          .done:
              ret
          
          msg db 'Real TinyOS v3.0 - x86 VM Loaded', 13, 10, 0
          prompt db 13,10,'> ',0
          help_msg db 13,10,'1=clock 2=paint c=clear h=help',13,10,0
          clock_msg db 13,10,'[System Clock Active]',13,10,0
          paint_msg db 13,10,'[VGA Paint Mode Ready]',13,10,0
          
          times 510-($-$$) db 0
          dw 0xAA55
          KERNEL
          
          nasm -f bin kernel.asm -o tinyos.bin

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java/com/tinyos/vm
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # Конвертация бинарника ОС в Java-класс
          echo "package com.tinyos.vm;" > app/src/main/java/com/tinyos/vm/KernelBin.java
          echo "public class KernelBin {" >> app/src/main/java/com/tinyos/vm/KernelBin.java
          echo "    public static final byte[] KERNEL = {" >> app/src/main/java/com/tinyos/vm/KernelBin.java
          hexdump -v -e '1/1 " (byte)0x%02x,"' tinyos.bin >> app/src/main/java/com/tinyos/vm/KernelBin.java
          echo "    };" >> app/src/main/java/com/tinyos/vm/KernelBin.java
          echo "}" >> app/src/main/java/com/tinyos/vm/KernelBin.java

          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.tinyos.vm">
            <application android:label="Real TinyOS VM" android:theme="@style/Theme.AppCompat.NoActionBar">
              <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          MANIFEST

          cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000">
            <SurfaceView android:id="@+id/screen" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_above="@+id/kb"/>
            <LinearLayout android:id="@+id/kb" android:layout_width="match_parent" android:layout_height="60dp" android:layout_alignParentBottom="true" android:orientation="horizontal" android:background="#222">
              <Button android:id="@+id/btn_1" android:layout_width="0dp" android:layout_weight="1" android:layout_height="match_parent" android:text="1"/>
              <Button android:id="@+id/btn_2" android:layout_width="0dp" android:layout_weight="1" android:layout_height="match_parent" android:text="2"/>
              <Button android:id="@+id/btn_h" android:layout_width="0dp" android:layout_weight="1" android:layout_height="match_parent" android:text="H"/>
              <Button android:id="@+id/btn_c" android:layout_width="0dp" android:layout_weight="1" android:layout_height="match_parent" android:text="C"/>
              <Button android:id="@+id/btn_enter" android:layout_width="0dp" android:layout_weight="1" android:layout_height="match_parent" android:text="ENTER"/>
            </LinearLayout>
          </RelativeLayout>
          LAYOUT

          cat > app/src/main/java/com/tinyos/vm/MainActivity.java << 'JAVA'
          package com.tinyos.vm;
          
          import android.os.Bundle;
          import android.graphics.*;
          import android.view.*;
          import android.widget.Button;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.*;

          public class MainActivity extends AppCompatActivity {
              private X86Emulator emu;
              private boolean running = true;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  emu = new X86Emulator();
                  
                  findViewById(R.id.btn_1).setOnClickListener(v -> emu.keyPress('1'));
                  findViewById(R.id.btn_2).setOnClickListener(v -> emu.keyPress('2'));
                  findViewById(R.id.btn_h).setOnClickListener(v -> emu.keyPress('h'));
                  findViewById(R.id.btn_c).setOnClickListener(v -> emu.keyPress('c'));
                  findViewById(R.id.btn_enter).setOnClickListener(v -> emu.keyPress((char)13));
                  
                  SurfaceView sv = findViewById(R.id.screen);
                  sv.getHolder().addCallback(new SurfaceHolder.Callback() {
                      @Override public void surfaceCreated(SurfaceHolder h) {
                          new Thread(() -> {
                              while (running) {
                                  for(int i=0; i<500; i++) emu.step();
                                  emu.draw(h);
                                  try { Thread.sleep(20); } catch(Exception e) {}
                              }
                          }).start();
                      }
                      @Override public void surfaceDestroyed(SurfaceHolder h) { running = false; }
                      @Override public void surfaceChanged(SurfaceHolder h, int f, int w, int h1) {}
                  });
              }
              
              class X86Emulator {
                  byte[] ram = new byte[65536];
                  int[] reg = new int[8]; // AX, CX, DX, BX, SP, BP, SI, DI
                  int ip = 0x7C00, sp = 0x9000;
                  boolean zf = false;
                  char lastKey = 0;
                  List<String> lines = new ArrayList<>(Collections.singletonList(""));

                  X86Emulator() { System.arraycopy(KernelBin.KERNEL, 0, ram, 0x7C00, KernelBin.KERNEL.length); }
                  
                  void keyPress(char k) { lastKey = k; }

                  void step() {
                      int op = ram[ip] & 0xFF;
                      if (op == 0xB4) { // mov ah, imm8
                          reg[0] = (reg[0] & 0x00FF) | ((ram[ip+1] & 0xFF) << 8);
                          ip += 2;
                      } else if (op == 0xB0) { // mov al, imm8
                          reg[0] = (reg[0] & 0xFF00) | (ram[ip+1] & 0xFF);
                          ip += 2;
                      } else if (op == 0xBE) { // mov si, imm16
                          reg[6] = (ram[ip+1] & 0xFF) | ((ram[ip+2] & 0xFF) << 8);
                          ip += 3;
                      } else if (op == 0xAC) { // lodsb
                          reg[0] = (reg[0] & 0xFF00) | (ram[reg[6]] & 0xFF);
                          reg[6]++; ip++;
                      } else if (op == 0xCD) { // int
                          int n = ram[ip+1] & 0xFF;
                          if (n == 0x10) { // Video
                              int ah = (reg[0] >> 8) & 0xFF;
                              if (ah == 0x0E) {
                                  char c = (char)(reg[0] & 0xFF);
                                  if (c == 13) lines.add(""); else lines.set(lines.size()-1, lines.get(lines.size()-1) + c);
                                  if (lines.size() > 15) lines.remove(0);
                              } else if (ah == 0x03 || ah == 0x00) { lines.clear(); lines.add(""); }
                          } else if (n == 0x16) { // Keyboard
                              if (lastKey != 0) { reg[0] = (reg[0] & 0xFF00) | lastKey; lastKey = 0; }
                              else { ip -= 2; } // Ждать
                          }
                          ip += 2;
                      } else if (op == 0xE8) { // call
                          int rel = (ram[ip+1] & 0xFF) | ((ram[ip+2] & 0xFF) << 8);
                          ram[--sp] = (byte)((ip+3) >> 8); ram[--sp] = (byte)(ip+3);
                          ip += 3 + rel;
                      } else if (op == 0xC3) { // ret
                          ip = (ram[sp++] & 0xFF) | ((ram[sp++] & 0xFF) << 8);
                      } else if (op == 0x3C) { // cmp al, imm8
                          zf = (reg[0] & 0xFF) == (ram[ip+1] & 0xFF);
                          ip += 2;
                      } else if (op == 0x74) { // je
                          if (zf) ip += (byte)ram[ip+1] + 2; else ip += 2;
                      } else if (op == 0x08 || op == 0x0A) { // or / test al, al
                          zf = (reg[0] & 0xFF) == 0; ip += 2;
                      } else { ip++; }
                  }

                  void draw(SurfaceHolder h) {
                      Canvas c = h.lockCanvas();
                      if (c == null) return;
                      c.drawColor(Color.BLACK);
                      Paint p = new Paint(); p.setColor(Color.GREEN); p.setTextSize(40);
                      p.setTypeface(Typeface.MONOSPACE);
                      for (int i=0; i<lines.size(); i++) c.drawText(lines.get(i), 30, 60 + i*50, p);
                      h.unlockCanvasAndPost(c);
                  }
              }
          }
          JAVA

          echo "include ':app'" > settings.gradle
          echo "rootProject.name='TinyOSVM'" >> settings.gradle
          
          cat > build.gradle << 'GRADLE'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE
          
          cat > app/build.gradle << 'APP'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.tinyos.vm'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.tinyos.vm'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "3.0"
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          APP

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Real-TinyOS-V3
          path: app/build/outputs/apk/debug/app-debug.apk
