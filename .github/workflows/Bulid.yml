                      EditText et=findViewById(R.id.et_promo);String code=et.getText().toString().trim();
                      if(code.equals("Dimasi4ek229")){infiniteRidix=true;savePrefs();updRidix();et.setText("");Toast.makeText(this,"Infinite Ridix!",Toast.LENGTH_LONG).show();}
                      else Toast.makeText(this,"Invalid code",Toast.LENGTH_SHORT).show();
                  });
              }

              private int dpToPx(int dp){return(int)(dp*getResources().getDisplayMetrics().density);}
              private void buildColorRow(LinearLayout row,int[]colors,CP cb){
                  row.removeAllViews();int dp=dpToPx(8);
                  for(int i=0;i<colors.length;i++){final int ii=i;View dot=new View(this);LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(dp*5,dp*5);lp.setMargins(dp/2,0,dp/2,0);dot.setLayoutParams(lp);GradientDrawable gd=new GradientDrawable();gd.setShape(GradientDrawable.OVAL);gd.setColor(colors[i]);gd.setStroke(3,0xFF00BFFF);dot.setBackground(gd);dot.setOnClickListener(vv->{cb.pick(ii);Toast.makeText(this,"Applied",Toast.LENGTH_SHORT).show();});row.addView(dot);}
              }
              private void startRidixTimer(){
                  stopRidixTimer();
                  ridixTimer=new Runnable(){@Override public void run(){if(!infiniteRidix){ridix+=RIDIX_REWARD;savePrefs();}updRidix();Toast.makeText(MainActivity.this,"+"+RIDIX_REWARD+" Ridix",Toast.LENGTH_SHORT).show();handler.postDelayed(this,RIDIX_SEC*1000L);}};
                  handler.postDelayed(ridixTimer,RIDIX_SEC*1000L);
              }
              private void stopRidixTimer(){if(ridixTimer!=null){handler.removeCallbacks(ridixTimer);ridixTimer=null;}}
              private void updRidix(){String sv=infiniteRidix?"Inf":String.valueOf(ridix);if(txtRidixLobby!=null)txtRidixLobby.setText(sv);if(txtRidixShop!=null)txtRidixShop.setText(sv);}
              private void savePrefs(){
                  SharedPreferences.Editor ed=getSharedPreferences("enjoer",MODE_PRIVATE).edit();
                  ed.putInt("ridix",ridix);ed.putBoolean("infRidix",infiniteRidix);ed.putInt("face",selectedFace);
                  ed.putFloat("sR",ren!=null?ren.charSkinR:1f);ed.putFloat("sG",ren!=null?ren.charSkinG:0.82f);ed.putFloat("sB",ren!=null?ren.charSkinB:0.6f);
                  ed.putFloat("tR",ren!=null?ren.charTorsoR:0.1f);ed.putFloat("tG",ren!=null?ren.charTorsoG:0.4f);ed.putFloat("tB",ren!=null?ren.charTorsoB:1f);
                  ed.putFloat("lR",ren!=null?ren.charLegsR:0.1f);ed.putFloat("lG",ren!=null?ren.charLegsG:0.8f);ed.putFloat("lB",ren!=null?ren.charLegsB:0.2f);
                  ed.apply();
              }
              private void loadPrefs(){
                  SharedPreferences sp=getSharedPreferences("enjoer",MODE_PRIVATE);
                  ridix=sp.getInt("ridix",0);infiniteRidix=sp.getBoolean("infRidix",false);selectedFace=sp.getInt("face",0);
              }
              private void applyPrefsToRen(){
                  SharedPreferences sp=getSharedPreferences("enjoer",MODE_PRIVATE);
                  ren.charSkinR=sp.getFloat("sR",1f);ren.charSkinG=sp.getFloat("sG",0.82f);ren.charSkinB=sp.getFloat("sB",0.6f);
                  ren.charTorsoR=sp.getFloat("tR",0.1f);ren.charTorsoG=sp.getFloat("tG",0.4f);ren.charTorsoB=sp.getFloat("tB",1f);
                  ren.charLegsR=sp.getFloat("lR",0.1f);ren.charLegsG=sp.getFloat("lG",0.8f);ren.charLegsB=sp.getFloat("lB",0.2f);
                  ren.faceType=selectedFace;
              }
              @Override protected void onResume(){super.onResume();if(ren!=null)applyPrefsToRen();handler.postDelayed(this::updInventory,100);}
              @Override protected void onPause(){super.onPause();stopRidixTimer();savePrefs();}

              private void resetP(){ren.pX=0;ren.pY=7;ren.pZ=15;ren.vY=0;for(int i=0;i<ren.inventory.length;i++)ren.inventory[i]=null;}
              private void axisBtn(int id,float dx,float dy,float dz){findViewById(id).setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN||e.getAction()==MotionEvent.ACTION_MOVE){float step=ren.gridEnabled?ren.gridSize:0.5f;ren.moveSelected(dx*step,dy*step,dz*step);}return true;});}
              private void updAxis(){
                  runOnUiThread(()->{
                      boolean sel=ren.selectedIndex>=0;
                      axisPanel.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDeselect.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnHide.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDelete.setVisibility(sel?View.VISIBLE:View.GONE);
                      if(sel){
                          if(ren.selectedType==0&&ren.selectedIndex<ren.blocks.size()){Block b=ren.blocks.get(ren.selectedIndex);btnHide.setText(b.hidden?"Show":"Hide");}
                          else if(ren.selectedType==1&&ren.selectedIndex<ren.lights.size()){Light l=ren.lights.get(ren.selectedIndex);btnHide.setText(l.hidden?"Show":"Hide");}
                          else if(ren.selectedType==2&&ren.selectedIndex<ren.items.size()){Item it=ren.items.get(ren.selectedIndex);btnHide.setText(it.hidden?"Show":"Hide");}
                      }
                  });
              }
              private void updSizeInfo(){runOnUiThread(()->txtSizeInfo.setText(String.format(java.util.Locale.US,"%.1f x %.1f x %.1f",ren.blockSX,ren.blockSY,ren.blockSZ)));}
              private void updGridBtn(){runOnUiThread(()->{if(ren.gridEnabled){btnGrid.setText("Grid: On");btnGrid.setBackgroundResource(R.drawable.btn_blue_filled);btnGrid.setTextColor(0xFF000000);}else{btnGrid.setText("Grid: Off");btnGrid.setBackgroundResource(R.drawable.btn_blue);btnGrid.setTextColor(0xFF00BFFF);}});}
              private void setupJoy(View base,View stick){base.setOnTouchListener((v,e)->{float cx=v.getWidth()/2f,cy=v.getHeight()/2f;if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){float dx=e.getX()-cx,dy=e.getY()-cy,d=(float)Math.sqrt(dx*dx+dy*dy),lim=cx-stick.getWidth()/2f;if(d>lim){dx*=lim/d;dy*=lim/d;}stick.setTranslationX(dx);stick.setTranslationY(dy);ren.jX=dx/lim;ren.jY=dy/lim;}else if(e.getAction()==MotionEvent.ACTION_UP){stick.setTranslationX(0);stick.setTranslationY(0);ren.jX=0;ren.jY=0;}return true;});}
              private void setupLook(View z){z.setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}else if(e.getAction()==MotionEvent.ACTION_MOVE){ren.rY+=(e.getX()-lx)*0.25f;ren.rX=Math.max(-80,Math.min(80,ren.rX+(e.getY()-ly)*0.25f));lx=e.getX();ly=e.getY();}return true;});}
              private void updBtnGrp(Button[]btns,int sel){for(int i=0;i<btns.length;i++){if(i==sel){btns[i].setBackgroundResource(R.drawable.btn_blue_filled);btns[i].setTextColor(0xFF000000);}else{btns[i].setBackgroundResource(R.drawable.btn_blue);btns[i].setTextColor(0xFF00BFFF);}}}
              private void updColSel(int sel){for(int i=0;i<colorBtn.length;i++){try{GradientDrawable bg=(GradientDrawable)colorBtn[i].getBackground();if(i==sel)bg.setStroke(6,0xFFFFFFFF);else bg.setStroke(2,0xFF00BFFF);}catch(Exception ignored){}}}
          }
          ENDMAIN

