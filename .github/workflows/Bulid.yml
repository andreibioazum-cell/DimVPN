name: Native_Roblox_Final_Fix
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Native Engine
        run: |
          mkdir -p app/src/main/java/com/dimos/game
          mkdir -p app/src/main/res/values
          
          # 1. Файлы сборки (Минималистичные для стабильности)
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dimos.game'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimos.roblox.native"
                  minSdk 24
                  targetSdk 34
                  versionCode 5
                  versionName "5.0-Native-Fix"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # 2. Манифест (Ландшафт и Полный экран)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Roblox Native" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. 3D Рендерер (Замена Three.js)
          cat <<EOF > app/src/main/java/com/dimos/game/GameRenderer.java
          package com.dimos.game;
          import android.opengl.GLES20;
          import android.opengl.GLSurfaceView;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig config) {
                  // Цвет фона из твоего CSS (темно-синий градиент)
                  GLES20.glClearColor(0.05f, 0.08f, 0.15f, 1.0f);
              }

              @Override
              public void onSurfaceChanged(GL10 gl, int width, int height) {
                  GLES20.glViewport(0, 0, width, height);
              }

              @Override
              public void onDrawFrame(GL10 gl) {
                  GLES20.glClear(GLES20.GL_COLOR_BUFFER_BIT | GLES20.GL_DEPTH_BUFFER_BIT);
              }
          }
          EOF

          # 4. Главный экран и UI (Замена HTML/CSS/JS)
          cat <<EOF > app/src/main/java/com/dimos/game/MainActivity.java
          package com.dimos.game;
          import android.app.Activity;
          import android.opengl.GLSurfaceView;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // 3D Слой
                  GLSurfaceView glView = new GLSurfaceView(this);
                  glView.setEGLContextClientVersion(2);
                  glView.setRenderer(new GameRenderer());

                  // UI Слой
                  FrameLayout uiRoot = new FrameLayout(this);
                  uiRoot.addView(glView);

                  // Робуксы (Верхняя панель)
                  TextView robux = new TextView(this);
                  robux.setText("💎 15,847");
                  robux.setTextColor(Color.parseColor("#22C55E"));
                  robux.setTextSize(20);
                  robux.setPadding(40, 20, 0, 0);
                  uiRoot.addView(robux);

                  // Кнопка Чат (Справа вверху)
                  Button chat = new Button(this);
                  chat.setText("💬");
                  chat.setBackgroundColor(Color.TRANSPARENT);
                  FrameLayout.LayoutParams chatParams = new FrameLayout.LayoutParams(150, 150);
                  chatParams.gravity = Gravity.TOP | Gravity.RIGHT;
                  uiRoot.addView(chat, chatParams);

                  // Джойстик (Замена твоего JS джойстика)
                  View joystick = new View(this);
                  GradientDrawable circle = new GradientDrawable();
                  circle.setShape(GradientDrawable.OVAL);
                  circle.setColor(Color.argb(100, 255, 255, 255));
                  joystick.setBackground(circle);
                  FrameLayout.LayoutParams joyParams = new FrameLayout.LayoutParams(250, 250);
                  joyParams.gravity = Gravity.BOTTOM | Gravity.LEFT;
                  joyParams.setMargins(100, 0, 0, 100);
                  uiRoot.addView(joystick, joyParams);

                  // Кнопка прыжка (Справа внизу)
                  Button jump = new Button(this);
                  jump.setText("⬆");
                  jump.setTextSize(30);
                  jump.setTextColor(Color.WHITE);
                  GradientDrawable btnShape = new GradientDrawable();
                  btnShape.setShape(GradientDrawable.OVAL);
                  btnShape.setColor(Color.argb(120, 0, 0, 0));
                  jump.setBackground(btnShape);
                  FrameLayout.LayoutParams jumpParams = new FrameLayout.LayoutParams(200, 200);
                  jumpParams.gravity = Gravity.BOTTOM | Gravity.RIGHT;
                  jumpParams.setMargins(0, 0, 100, 100);
                  uiRoot.addView(jump, jumpParams);

                  setContentView(uiRoot);
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Roblox-Native-Fixed
          path: app/build/outputs/apk/debug/*.apk
