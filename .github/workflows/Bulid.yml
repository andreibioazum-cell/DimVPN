              private Button[]shapeBtn,distBtn;
              private View[]colorBtn;
              private View axisPanel,menuUI,gameUI,engineUI,playtestUI;
              private Button btnDeselect,btnHide,btnDelete,btnEvents,btnGrid;
              private TextView txtSizeInfo,txtRigids,txtMenuRigids,txtRigidNotify;
              private ActivityResultLauncher<Intent> saveLauncher,loadLauncher;
              private Handler handler=new Handler(Looper.getMainLooper());
              private int pendingMode=0;
              private long rigidTimer=0;

              @Override public GameRenderer renderer(){return ren;}
              @Override public void toast(String t){runOnUiThread(()->Toast.makeText(this,t,Toast.LENGTH_SHORT).show());}

              @Override
              public void runBlockScript(Block block,String script){
                  runOnUiThread(()->{
                      int old=ren.selectedIndex,idx=ren.blocks.indexOf(block);
                      if(idx>=0)ren.selectedIndex=idx;
                      try{ScriptEngine.run(this,script);}catch(Exception e){Toast.makeText(this,e.getMessage(),Toast.LENGTH_LONG).show();}
                      ren.selectedIndex=old;updAxis();
                  });
              }

              @SuppressLint("ClickableViewAccessibility")
              @Override
              protected void onCreate(Bundle savedInstanceState){
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  PlayerPrefs.init(this);

                  android.opengl.GLSurfaceView gv=findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren=new GameRenderer();ren.eventHost=this;
                  gv.setRenderer(ren);

                  menuUI=findViewById(R.id.menu_ui);gameUI=findViewById(R.id.game_ui);
                  engineUI=findViewById(R.id.engine_ui);playtestUI=findViewById(R.id.playtest_ui);
                  axisPanel=findViewById(R.id.axis_panel);
                  btnDeselect=findViewById(R.id.btn_deselect);btnHide=findViewById(R.id.btn_hide);
                  btnDelete=findViewById(R.id.btn_delete);btnEvents=findViewById(R.id.btn_block_events);
                  btnGrid=findViewById(R.id.btn_grid);txtSizeInfo=findViewById(R.id.txt_size_info);
                  txtRigids=findViewById(R.id.txt_rigids);txtMenuRigids=findViewById(R.id.txt_menu_rigids);
                  txtRigidNotify=findViewById(R.id.txt_rigid_notify);
                  updRigidDisplay();

                  saveLauncher=registerForActivityResult(new ActivityResultContracts.StartActivityForResult(),res->{
                      if(res.getResultCode()==RESULT_OK&&res.getData()!=null){
                          try{
                              OutputStream out=getContentResolver().openOutputStream(res.getData().getData());
                              JSONArray arr=new JSONArray();
                              for(Block b:ren.blocks){JSONObject o=new JSONObject();o.put("x",b.x);o.put("y",b.y);o.put("z",b.z);o.put("sx",b.sx);o.put("sy",b.sy);o.put("sz",b.sz);o.put("r",b.r);o.put("g",b.g);o.put("b",b.b);o.put("hidden",b.hidden);o.put("onStartScript",b.onStartScript);o.put("onTouchScript",b.onTouchScript);o.put("onTapScript",b.onTapScript);arr.put(o);}
                              JSONObject root=new JSONObject();root.put("blocks",arr);root.put("gridEnabled",ren.gridEnabled);
                              out.write(root.toString().getBytes());out.close();
                              Toast.makeText(this,"Exported!",Toast.LENGTH_SHORT).show();
                          }catch(Exception e){Toast.makeText(this,"Error",Toast.LENGTH_SHORT).show();}
                      }
                  });

                  loadLauncher=registerForActivityResult(new ActivityResultContracts.StartActivityForResult(),res->{
                      if(res.getResultCode()==RESULT_OK&&res.getData()!=null){
                          try{
                              InputStream in=getContentResolver().openInputStream(res.getData().getData());
                              BufferedReader rd=new BufferedReader(new InputStreamReader(in));
                              StringBuilder sb=new StringBuilder();String ln;
                              while((ln=rd.readLine())!=null)sb.append(ln);in.close();
                              JSONObject root=new JSONObject(sb.toString());
                              JSONArray arr=root.getJSONArray("blocks");
                              ren.blocks.clear();
                              for(int i=0;i<arr.length();i++){
                                  JSONObject o=arr.getJSONObject(i);
                                  Block b=new Block((float)o.getDouble("x"),(float)o.getDouble("y"),(float)o.getDouble("z"),(float)o.getDouble("sx"),(float)o.getDouble("sy"),(float)o.getDouble("sz"),(float)o.getDouble("r"),(float)o.getDouble("g"),(float)o.getDouble("b"));
                                  b.hidden=o.optBoolean("hidden",false);b.onStartScript=o.optString("onStartScript","");b.onTouchScript=o.optString("onTouchScript","");b.onTapScript=o.optString("onTapScript","");
                                  ren.blocks.add(b);
                              }
                              ren.gridEnabled=root.optBoolean("gridEnabled",true);updGridButton();
                              pendingMode=1;ren.isEngineMode=false;ren.isPlayingLevel=false;resetP();loadCustomization();
                              menuUI.setVisibility(View.GONE);gameUI.setVisibility(View.VISIBLE);
                              setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);
                              ren.runStartScripts();startRigidTimer();
                              Toast.makeText(this,"Loaded!",Toast.LENGTH_SHORT).show();
                          }catch(Exception e){Toast.makeText(this,"Invalid file",Toast.LENGTH_SHORT).show();}
                      }
                  });

                  findViewById(R.id.btn_play).setOnClickListener(v->{
                      pendingMode=1;ren.isEngineMode=false;ren.isPlayingLevel=false;
                      ren.loadBuiltInLevel();resetP();ren.selectedIndex=-1;loadCustomization();
                      menuUI.setVisibility(View.GONE);gameUI.setVisibility(View.VISIBLE);
                      engineUI.setVisibility(View.GONE);playtestUI.setVisibility(View.GONE);
                      ren.runStartScripts();startRigidTimer();
                      handler.postDelayed(()->setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE),50);
                  });

                  findViewById(R.id.btn_engine).setOnClickListener(v->{
                      pendingMode=2;ren.isEngineMode=true;ren.isPlayingLevel=false;
                      ren.blocks.clear();ren.pX=0;ren.pY=20;ren.pZ=35;ren.selectedIndex=-1;
                      menuUI.setVisibility(View.GONE);gameUI.setVisibility(View.GONE);
                      engineUI.setVisibility(View.VISIBLE);playtestUI.setVisibility(View.GONE);
                      updAxis();updSizeInfo();updGridButton();
                      handler.postDelayed(()->setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE),50);
                  });

                  findViewById(R.id.btn_customize).setOnClickListener(v->startActivity(new Intent(this,CustomizeActivity.class)));

                  findViewById(R.id.btn_load_file).setOnClickListener(v->{
                      Intent i=new Intent(Intent.ACTION_OPEN_DOCUMENT);i.addCategory(Intent.CATEGORY_OPENABLE);i.setType("*/*");loadLauncher.launch(i);
                  });

                  View.OnClickListener back=v->{
                      pendingMode=0;ren.isPlayingLevel=false;stopRigidTimer();
                      gameUI.setVisibility(View.GONE);engineUI.setVisibility(View.GONE);
                      playtestUI.setVisibility(View.GONE);menuUI.setVisibility(View.VISIBLE);
                      updRigidDisplay();setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_PORTRAIT);
                  };
                  findViewById(R.id.btn_menu).setOnClickListener(back);
                  findViewById(R.id.btn_engine_menu).setOnClickListener(back);

                  findViewById(R.id.btn_play_level).setOnClickListener(v->{
                      ren.isPlayingLevel=true;resetP();ren.selectedIndex=-1;loadCustomization();
                      engineUI.setVisibility(View.GONE);playtestUI.setVisibility(View.VISIBLE);
                      ren.runStartScripts();
                  });

                  findViewById(R.id.btn_stop_playtest).setOnClickListener(v->{
                      ren.isPlayingLevel=false;ren.pX=0;ren.pY=20;ren.pZ=35;
                      playtestUI.setVisibility(View.GONE);engineUI.setVisibility(View.VISIBLE);updAxis();
                  });

                  findViewById(R.id.btn_save).setOnClickListener(v->{
                      Intent i=new Intent(Intent.ACTION_CREATE_DOCUMENT);i.addCategory(Intent.CATEGORY_OPENABLE);
                      i.setType("application/json");i.putExtra(Intent.EXTRA_TITLE,"level.json");saveLauncher.launch(i);
                  });

                  btnGrid.setOnClickListener(v->{ren.gridEnabled=!ren.gridEnabled;updGridButton();});

                  // Прыжок - просто обычный прыжок
                  findViewById(R.id.btn_jump).setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN)ren.doJump();return true;});
                  findViewById(R.id.btn_playtest_jump).setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN)ren.doJump();return true;});

                  findViewById(R.id.btn_place).setOnClickListener(v->{if(ren.selectedIndex<0)ren.placeBlock();});
                  btnDelete.setOnClickListener(v->{ren.deleteSelected();updAxis();});
                  btnDeselect.setOnClickListener(v->{ren.selectedIndex=-1;updAxis();});
                  btnHide.setOnClickListener(v->{if(ren.selectedIndex>=0){ren.toggleHideSelected();updAxis();}});
                  btnEvents.setOnClickListener(v->showBlockEventsDialog());

                  axisBtn(R.id.axis_x_plus,1,0,0);axisBtn(R.id.axis_x_minus,-1,0,0);
                  axisBtn(R.id.axis_y_plus,0,1,0);axisBtn(R.id.axis_y_minus,0,-1,0);
                  axisBtn(R.id.axis_z_plus,0,0,1);axisBtn(R.id.axis_z_minus,0,0,-1);

                  shapeBtn=new Button[]{findViewById(R.id.shape_square),findViewById(R.id.shape_rectangle),findViewById(R.id.shape_triangle)};
                  findViewById(R.id.shape_square).setOnClickListener(v->setShapePreset(4,4,4,0));
                  findViewById(R.id.shape_rectangle).setOnClickListener(v->setShapePreset(8,4,4,1));
                  findViewById(R.id.shape_triangle).setOnClickListener(v->setShapePreset(4,4,4,2));

                  findViewById(R.id.size_x_minus).setOnClickListener(v->{ren.blockSX=Math.max(.5f,ren.blockSX-.5f);updSizeInfo();});
                  findViewById(R.id.size_x_plus).setOnClickListener(v->{ren.blockSX+=.5f;updSizeInfo();});
                  findViewById(R.id.size_y_minus).setOnClickListener(v->{ren.blockSY=Math.max(.5f,ren.blockSY-.5f);updSizeInfo();});
                  findViewById(R.id.size_y_plus).setOnClickListener(v->{ren.blockSY+=.5f;updSizeInfo();});
                  findViewById(R.id.size_z_minus).setOnClickListener(v->{ren.blockSZ=Math.max(.5f,ren.blockSZ-.5f);updSizeInfo();});
                  findViewById(R.id.size_z_plus).setOnClickListener(v->{ren.blockSZ+=.5f;updSizeInfo();});

                  distBtn=new Button[]{findViewById(R.id.dist_near),findViewById(R.id.dist_mid),findViewById(R.id.dist_far)};
                  float[]dists={3f,6f,12f};
                  for(int i=0;i<3;i++){final int idx=i;distBtn[i].setOnClickListener(v->{ren.placeDist=dists[idx];updBtnGrp(distBtn,idx);});}

                  colorBtn=new View[]{findViewById(R.id.color_red),findViewById(R.id.color_green),findViewById(R.id.color_blue),findViewById(R.id.color_yellow),findViewById(R.id.color_white),findViewById(R.id.color_black)};
                  float[][]colors={{1f,.2f,.2f},{.2f,1f,.2f},{.2f,.5f,1f},{1f,1f,.2f},{1f,1f,1f},{0f,0f,0f}};
                  for(int i=0;i<colors.length;i++){
                      final int idx=i;
                      colorBtn[i].setOnClickListener(v->{
                          ren.blockR=colors[idx][0];ren.blockG=colors[idx][1];ren.blockB=colors[idx][2];
                          if(ren.selectedIndex>=0&&ren.selectedIndex<ren.blocks.size()){Block b=ren.blocks.get(ren.selectedIndex);b.r=ren.blockR;b.g=ren.blockG;b.b=ren.blockB;}
                          updColSel(idx);
                      });
                  }

                  setupJoy(findViewById(R.id.joy_base),findViewById(R.id.joy_stick));
                  setupJoy(findViewById(R.id.engine_joy_base),findViewById(R.id.engine_joy_stick));
                  setupJoy(findViewById(R.id.playtest_joy_base),findViewById(R.id.playtest_joy_stick));
                  // Только горизонтальный поворот камеры
                  setupLookH(findViewById(R.id.look_zone));
                  setupLookH(findViewById(R.id.playtest_look_zone));

                  findViewById(R.id.engine_touch_zone).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}
                      else if(e.getAction()==MotionEvent.ACTION_UP){
                          if(Math.abs(e.getX()-lx)<25&&Math.abs(e.getY()-ly)<25){
                              int hit=ren.raycastBlock(e.getX(),e.getY());ren.selectedIndex=hit;
                              if(hit>=0){Block b=ren.blocks.get(hit);ren.blockR=b.r;ren.blockG=b.g;ren.blockB=b.b;ren.blockSX=b.sx;ren.blockSY=b.sy;ren.blockSZ=b.sz;ren.handleTapBlock(hit);updSizeInfo();}
                              updAxis();
                          }
                      }else if(e.getAction()==MotionEvent.ACTION_MOVE){
                          // Только горизонталь в редакторе тоже
                          ren.rY+=(e.getX()-lx)*.2f;
                          lx=e.getX();ly=e.getY();
                      }
                      return true;
                  });

                  updSizeInfo();updAxis();updGridButton();loadCustomization();
              }

              @Override protected void onResume(){super.onResume();loadCustomization();updRigidDisplay();}

              private void startRigidTimer(){rigidTimer=System.currentTimeMillis();handler.postDelayed(rigidRun,1000);}
              private void stopRigidTimer(){handler.removeCallbacks(rigidRun);}
              private final Runnable rigidRun=new Runnable(){@Override public void run(){
                  if(pendingMode==1&&!ren.isEngineMode){
                      if(System.currentTimeMillis()-rigidTimer>=180000){PlayerPrefs.addRigids(10);updRigidDisplay();showRigidNotify();rigidTimer=System.currentTimeMillis();}
                      handler.postDelayed(this,1000);
                  }
              }};

              private void showRigidNotify(){runOnUiThread(()->{txtRigidNotify.setVisibility(View.VISIBLE);handler.postDelayed(()->txtRigidNotify.setVisibility(View.GONE),3000);});}
              private void updRigidDisplay(){runOnUiThread(()->{int r=PlayerPrefs.getRigids();txtRigids.setText("💰 "+r+" Rigid's");txtMenuRigids.setText("💰 "+r+" Rigid's");});}
              private void loadCustomization(){ren.skinColor=PlayerPrefs.getSkinColor();ren.torsoColor=PlayerPrefs.getTorsoColor();ren.legsColor=PlayerPrefs.getLegsColor();ren.faceType=PlayerPrefs.getFaceType();ren.animPack=PlayerPrefs.getAnimPack();}

              private void showBlockEventsDialog(){
                  if(ren.selectedIndex<0||ren.selectedIndex>=ren.blocks.size())return;
                  Block b=ren.blocks.get(ren.selectedIndex);
                  LinearLayout root=new LinearLayout(this);root.setOrientation(LinearLayout.VERTICAL);
                  int pad=(int)(12*getResources().getDisplayMetrics().density);root.setPadding(pad,pad,pad,pad);
                  TextView t1=new TextView(this);t1.setText("On Start");EditText e1=new EditText(this);e1.setMinLines(3);e1.setText(b.onStartScript);
                  TextView t2=new TextView(this);t2.setText("On Touch");EditText e2=new EditText(this);e2.setMinLines(3);e2.setText(b.onTouchScript);
                  TextView t3=new TextView(this);t3.setText("On Tap");EditText e3=new EditText(this);e3.setMinLines(3);e3.setText(b.onTapScript);
                  root.addView(t1);root.addView(e1);root.addView(t2);root.addView(e2);root.addView(t3);root.addView(e3);
                  new AlertDialog.Builder(this).setTitle("Block Events").setView(root)
                      .setPositiveButton("Save",(d,w)->{b.onStartScript=e1.getText().toString();b.onTouchScript=e2.getText().toString();b.onTapScript=e3.getText().toString();})
                      .setNegativeButton("Close",null).show();
              }

              private void setShapePreset(float sx,float sy,float sz,int idx){ren.blockSX=sx;ren.blockSY=sy;ren.blockSZ=sz;updBtnGrp(shapeBtn,idx);updSizeInfo();}
              private void resetP(){ren.pX=0;ren.pY=7;ren.pZ=15;ren.vY=0;}

              private void axisBtn(int id,float dx,float dy,float dz){
                  findViewById(id).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN||e.getAction()==MotionEvent.ACTION_MOVE){float step=ren.gridEnabled?ren.gridSize:.5f;ren.moveSelected(dx*step,dy*step,dz*step);}
                      return true;
                  });
              }

              private void updAxis(){
                  runOnUiThread(()->{
                      boolean sel=ren.selectedIndex>=0;
                      axisPanel.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDeselect.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnHide.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDelete.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnEvents.setVisibility(sel?View.VISIBLE:View.GONE);
                      if(sel){Block b=ren.blocks.get(ren.selectedIndex);btnHide.setText(b.hidden?"Show":"Hide");}
                  });
              }

              private void updSizeInfo(){runOnUiThread(()->txtSizeInfo.setText(String.format(java.util.Locale.US,"%.1f x %.1f x %.1f",ren.blockSX,ren.blockSY,ren.blockSZ)));}
              private void updGridButton(){runOnUiThread(()->{if(ren.gridEnabled){btnGrid.setText("Grid: On");btnGrid.setBackgroundResource(R.drawable.btn_blue_filled);btnGrid.setTextColor(0xFF000000);}else{btnGrid.setText("Grid: Off");btnGrid.setBackgroundResource(R.drawable.btn_blue);btnGrid.setTextColor(0xFF00BFFF);}});}

              private void setupJoy(View base,View stick){
                  base.setOnTouchListener((v,e)->{
                      float cx=v.getWidth()/2f,cy=v.getHeight()/2f;
                      if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){
                          float dx=e.getX()-cx,dy=e.getY()-cy,d=(float)Math.sqrt(dx*dx+dy*dy),lim=cx-stick.getWidth()/2f;
                          if(d>lim){dx*=lim/d;dy*=lim/d;}
                          stick.setTranslationX(dx);stick.setTranslationY(dy);ren.jX=dx/lim;ren.jY=dy/lim;
                      }else if(e.getAction()==MotionEvent.ACTION_UP){stick.setTranslationX(0);stick.setTranslationY(0);ren.jX=0;ren.jY=0;}
                      return true;
                  });
              }

              // ТОЛЬКО горизонтальный поворот - вертикальный убран полностью
              private void setupLookH(View z){
                  z.setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();}
                      else if(e.getAction()==MotionEvent.ACTION_MOVE){ren.rY+=(e.getX()-lx)*.25f;lx=e.getX();}
                      return true;
                  });
              }

              private void updBtnGrp(Button[]btns,int sel){for(int i=0;i<btns.length;i++){if(i==sel){btns[i].setBackgroundResource(R.drawable.btn_blue_filled);btns[i].setTextColor(0xFF000000);}else{btns[i].setBackgroundResource(R.drawable.btn_blue);btns[i].setTextColor(0xFF00BFFF);}}}
              private void updColSel(int sel){for(int i=0;i<colorBtn.length;i++){try{GradientDrawable bg=(GradientDrawable)colorBtn[i].getBackground();if(i==sel)bg.setStroke(6,0xFFFFFFFF);else bg.setStroke(2,0xFF00BFFF);}catch(Exception ignored){}}}
          }
          MAINACT

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer 6.1" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <activity android:name="com.enjoer.game.CustomizeActivity" android:exported="false" android:configChanges="orientation|screenSize|keyboardHidden"/>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript{repositories{google();mavenCentral()}dependencies{classpath 'com.android.tools.build:gradle:8.2.2'}}
          allprojects{repositories{google();mavenCentral()}}
          EOF
          cat <<EOF > app/build.gradle
          plugins{id 'com.android.application'}
          android{namespace 'com.enjoer.game';compileSdk 34;defaultConfig{applicationId 'com.enjoer.game';minSdk 24;targetSdk 34};buildFeatures{buildConfig true}}
          dependencies{implementation 'androidx.appcompat:appcompat:1.6.1'}
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_6.1_Clean_Final
          path: app/build/outputs/apk/debug/app-debug.apk
