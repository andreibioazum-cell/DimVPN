name: Ultimate Stealth VPN (v10.0 Stable)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          mkdir -p app/src/main/java/com/stealth/vpn
          mkdir -p app/src/main/res/values

      - name: Generate Configs
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0" 
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

      - name: Generate App build.gradle
        run: |
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
              namespace 'com.stealth.vpn'
              compileSdk 34
              defaultConfig {
                  applicationId "com.stealth.vpn"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "10.0-FIXED"
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Generate VPN Engine (Stable Bypass)
        run: |
          cat <<'EOF' > app/src/main/java/com/stealth/vpn/StealthVpnService.kt
          package com.stealth.vpn
          import android.net.VpnService
          import android.os.ParcelFileDescriptor
          import android.content.Intent
          import java.net.InetAddress

          class StealthVpnService : VpnService() {
              private var vpnInterface: ParcelFileDescriptor? = null

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  if (intent?.action == "STOP") {
                      stopVpn()
                      return START_NOT_STICKY
                  }
                  startVpn()
                  return START_STICKY
              }

              private fun startVpn() {
                  val builder = Builder()
                  builder.setSession("StealthKey")
                      .setMtu(1500)
                      .addAddress("10.0.0.2", 24)
                      .addDnsServer("8.8.8.8")
                      .addDnsServer("1.1.1.1")
                      // Маршрутизируем только DNS трафик, чтобы не ломать скорость в играх
                      .addRoute("8.8.8.8", 32)
                      .addRoute("1.1.1.1", 32)

                  // Список приложений для "ключика"
                  val targetApps = listOf(
                      "com.google.android.youtube",
                      "com.roblox.client",
                      "com.supercell.brawlstars"
                  )

                  for (app in targetApps) {
                      try { builder.addAllowedApplication(app) } catch (e: Exception) {}
                  }

                  vpnInterface = builder.establish()
              }

              private fun stopVpn() {
                  vpnInterface?.close()
                  vpnInterface = null
                  stopSelf()
              }

              override fun onDestroy() {
                  stopVpn()
                  super.onDestroy()
              }
          }
          EOF

      - name: Generate MainActivity (Filtered View)
        run: |
          cat <<'EOF' > app/src/main/java/com/stealth/vpn/MainActivity.kt
          package com.stealth.vpn
          import android.content.Intent
          import android.content.pm.ApplicationInfo
          import android.net.VpnService
          import android.os.Bundle
          import android.widget.*
          import android.graphics.Color
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              private val packages = listOf("com.google.android.youtube", "com.roblox.client", "com.supercell.brawlstars")

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val root = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(60, 60, 60, 60)
                      setBackgroundColor(Color.parseColor("#121212"))
                  }

                  val status = TextView(this).apply {
                      text = "Ускоритель игр: Статус OFF"
                      setTextColor(Color.WHITE)
                      textSize = 18f
                      setPadding(0,0,0,50)
                  }
                  
                  val btn = Button(this).apply { text = "Включить обход и ключик" }
                  
                  root.addView(status)
                  root.addView(btn)

                  val listView = ListView(this)
                  root.addView(listView)
                  setContentView(root)

                  btn.setOnClickListener {
                      val intent = VpnService.prepare(this)
                      if (intent != null) startActivityForResult(intent, 0)
                      else {
                          startService(Intent(this, StealthVpnService::class.java))
                          status.text = "Ускоритель игр: Статус ON (Ключ)"
                          status.setTextColor(Color.GREEN)
                      }
                  }

                  val installedApps = packageManager.getInstalledApplications(0)
                      .filter { it.packageName in packages }
                  
                  val adapter = object : ArrayAdapter<ApplicationInfo>(this, android.R.layout.simple_list_item_1, installedApps) {
                      override fun getView(p: Int, v: android.view.View?, g: android.view.ViewGroup): android.view.View {
                          val tv = super.getView(p, v, g) as TextView
                          tv.text = installedApps[p].loadLabel(packageManager)
                          tv.setTextColor(Color.CYAN)
                          return tv
                      }
                  }
                  listView.adapter = adapter

                  listView.setOnItemClickListener { _, _, pos, _ ->
                      val launch = packageManager.getLaunchIntentForPackage(installedApps[pos].packageName)
                      if (launch != null) startActivity(launch)
                      else Toast.makeText(this, "Приложение не установлено", Toast.LENGTH_SHORT).show()
                  }
              }

              override fun onActivityResult(req: Int, res: Int, data: Intent?) {
                  super.onActivityResult(req, res, data)
                  if (res == RESULT_OK) startService(Intent(this, StealthVpnService::class.java))
              }
          }
          EOF

      - name: Generate Manifest
        run: |
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />
              <application android:label="Stealth Games" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <service android:name=".StealthVpnService" 
                      android:permission="android.permission.BIND_VPN_SERVICE"
                      android:foregroundServiceType="specialUse"
                      android:exported="false">
                      <intent-filter><action android:name="android.net.VpnService" /></intent-filter>
                  </service>
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Execute Build
        run: gradle assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: StealthVPN-v10-Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
