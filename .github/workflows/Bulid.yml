name: Build GodBlock 9.0 GOD EDITION

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - run: gradle wrapper --gradle-version 8.7

      # ---------------- SETTINGS ----------------

      - run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  maven { url = 'https://maven.fabricmc.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          rootProject.name = 'GodBlock'
          EOF

      - run: |
          cat << 'EOF' > build.gradle
          plugins { id 'fabric-loom' version '1.6.12' }

          group = 'me.godblock'
          version = '9.0'

          repositories {
              mavenCentral()
              maven { url 'https://maven.fabricmc.net/' }
          }

          dependencies {
              minecraft "com.mojang:minecraft:1.20.1"
              mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
              modImplementation "net.fabricmc:fabric-loader:0.15.11"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.1+1.20.1"
          }

          java { toolchain.languageVersion = JavaLanguageVersion.of(17) }
          EOF

      - run: |
          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx4G
          org.gradle.daemon=false
          EOF

      # ---------------- FOLDERS ----------------

      - run: |
          mkdir -p src/main/java/me/godblock
          mkdir -p src/main/resources/assets/godblock/{blockstates,models/block,models/item,lang,textures/block}
          mkdir -p src/main/resources/data/godblock/recipes

      # ---------------- TEXTURES ----------------

      - run: |
          sudo apt-get update && sudo apt-get install imagemagick -y
          convert -size 16x16 plasma:fractal -resize 16x16! \
          src/main/resources/assets/godblock/textures/block/god_block.png

          convert -size 16x16 plasma:fractal -resize 16x16! -colorize 100,100,0 \
          src/main/resources/assets/godblock/textures/block/god_block_charged.png

      # ---------------- MODELS ----------------

      - run: |
          cat << 'EOF' > src/main/resources/assets/godblock/blockstates/god_block.json
          { "variants": { "": { "model": "godblock:block/god_block" } } }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/blockstates/god_block_charged.json
          { "variants": { "": { "model": "godblock:block/god_block_charged" } } }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/models/block/god_block.json
          { "parent": "block/cube_all",
            "textures": { "all": "godblock:block/god_block" } }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/models/block/god_block_charged.json
          { "parent": "block/cube_all",
            "textures": { "all": "godblock:block/god_block_charged" } }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/models/item/god_block.json
          { "parent": "godblock:block/god_block" }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/models/item/god_block_charged.json
          { "parent": "godblock:block/god_block_charged" }
          EOF

      # ---------------- RECIPE ----------------

      - run: |
          cat << 'EOF' > src/main/resources/data/godblock/recipes/god_block.json
          {
            "type": "minecraft:crafting_shaped",
            "pattern": ["SSS","SCS","SSS"],
            "key": {
              "S": { "item": "minecraft:stone" },
              "C": { "item": "minecraft:coal" }
            },
            "result": { "item": "godblock:god_block" }
          }
          EOF

      # ---------------- MOD JSON ----------------

      - run: |
          cat << 'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "godblock",
            "version": "9.0",
            "name": "God Block GOD EDITION",
            "entrypoints": { "main": ["me.godblock.GodBlockMod"] },
            "depends": {
              "fabricloader": ">=0.15.0",
              "minecraft": "1.20.1",
              "fabric-api": "*"
            }
          }
          EOF

      # ---------------- JAVA ----------------

      - run: |
          cat << 'EOF' > src/main/java/me/godblock/GodBlockMod.java
          // FULL GOD EDITION WITH CHARGE + 4 MODES + TIME RIFT
          package me.godblock;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.itemgroup.v1.ItemGroupEvents;
          import net.minecraft.block.*;
          import net.minecraft.block.entity.*;
          import net.minecraft.entity.*;
          import net.minecraft.entity.mob.HostileEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.*;
          import net.minecraft.nbt.NbtCompound;
          import net.minecraft.particle.ParticleTypes;
          import net.minecraft.registry.*;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.sound.SoundCategory;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.state.StateManager;
          import net.minecraft.state.property.IntProperty;
          import net.minecraft.util.*;
          import net.minecraft.util.hit.BlockHitResult;
          import net.minecraft.util.math.*;
          import net.minecraft.world.World;

          import java.util.*;

          public class GodBlockMod implements ModInitializer {

              public static final String MOD_ID="godblock";
              public static final IntProperty CLICKS=IntProperty.of("clicks",0,30);
              public static final IntProperty MODE=IntProperty.of("mode",1,4);

              public static Block UNCHARGED;
              public static Block CHARGED;
              public static BlockEntityType<ChargedEntity> TYPE;

              @Override
              public void onInitialize(){

                  UNCHARGED=Registry.register(Registries.BLOCK,
                          new Identifier(MOD_ID,"god_block"),
                          new UnchargedBlock(AbstractBlock.Settings.copy(Blocks.STONE).strength(3f)));

                  CHARGED=Registry.register(Registries.BLOCK,
                          new Identifier(MOD_ID,"god_block_charged"),
                          new ChargedBlock(AbstractBlock.Settings.copy(Blocks.NETHERITE_BLOCK)
                                  .strength(5f).luminance(s->15)));

                  Registry.register(Registries.ITEM,
                          new Identifier(MOD_ID,"god_block"),
                          new BlockItem(UNCHARGED,new Item.Settings()));

                  Registry.register(Registries.ITEM,
                          new Identifier(MOD_ID,"god_block_charged"),
                          new BlockItem(CHARGED,new Item.Settings()));

                  TYPE=Registry.register(
                          Registries.BLOCK_ENTITY_TYPE,
                          new Identifier(MOD_ID,"god_block_entity"),
                          FabricBlockEntityTypeBuilder.create(ChargedEntity::new,CHARGED).build()
                  );

                  ItemGroupEvents.modifyEntriesEvent(ItemGroups.BUILDING_BLOCKS)
                          .register(e->{e.add(UNCHARGED);e.add(CHARGED);});
              }

              // ---------- UNCHARGED ----------

              public static class UnchargedBlock extends Block{
                  public UnchargedBlock(Settings s){
                      super(s);
                      setDefaultState(getStateManager().getDefaultState().with(CLICKS,0));
                  }
                  protected void appendProperties(StateManager.Builder<Block,BlockState>b){
                      b.add(CLICKS);
                  }
                  public ActionResult onUse(BlockState state,World world,BlockPos pos,
                                            PlayerEntity player,Hand hand,BlockHitResult hit){
                      if(world.isClient)return ActionResult.SUCCESS;
                      int clicks=state.get(CLICKS)+1;

                      ((ServerWorld)world).spawnParticles(
                              ParticleTypes.ENCHANT,pos.getX()+0.5,pos.getY()+1,pos.getZ()+0.5,
                              20,0.5,0.5,0.5,0.1);

                      if(clicks>=30){
                          world.setBlockState(pos,CHARGED.getDefaultState());
                          ((ServerWorld)world).spawnParticles(
                                  ParticleTypes.FLASH,pos.getX()+0.5,pos.getY()+1,pos.getZ()+0.5,
                                  80,1,1,1,0.2);
                      }else{
                          world.setBlockState(pos,state.with(CLICKS,clicks));
                      }
                      return ActionResult.SUCCESS;
                  }
              }

              // ---------- CHARGED ----------

              public static class ChargedBlock extends BlockWithEntity{
                  public ChargedBlock(Settings s){
                      super(s);
                      setDefaultState(getStateManager().getDefaultState().with(MODE,1));
                  }
                  protected void appendProperties(StateManager.Builder<Block,BlockState>b){
                      b.add(MODE);
                  }
                  public BlockEntity createBlockEntity(BlockPos pos,BlockState state){
                      return new ChargedEntity(pos,state);
                  }
                  public <T extends BlockEntity> BlockEntityTicker<T> getTicker(
                          World world,BlockState state,BlockEntityType<T> type){
                      return world.isClient?null:
                              checkType(type,TYPE,ChargedEntity::tick);
                  }
                  public ActionResult onUse(BlockState state,World world,BlockPos pos,
                                            PlayerEntity player,Hand hand,BlockHitResult hit){
                      if(!world.isClient && player.isSneaking()){
                          int m=state.get(MODE)+1;
                          if(m>4)m=1;
                          world.setBlockState(pos,state.with(MODE,m));
                      }
                      return ActionResult.SUCCESS;
                  }
              }

              // ---------- SNAPSHOT + MODES ----------

              static class Snapshot{
                  Map<BlockPos,BlockState> blocks=new HashMap<>();
                  List<NbtCompound> entities=new ArrayList<>();
                  long time;
              }

              public static class ChargedEntity extends BlockEntity{

                  static Snapshot snapshot=null;
                  static long lastSave=0;
                  static long lastRewind=-9999;

                  public ChargedEntity(BlockPos pos,BlockState state){
                      super(TYPE,pos,state);
                  }

                  static void tick(World world,BlockPos pos,
                                   BlockState state,ChargedEntity be){

                      if(!(world instanceof ServerWorld sw))return;

                      Box radius=new Box(pos).expand(150);
                      int mode=state.get(MODE);

                      sw.spawnParticles(ParticleTypes.END_ROD,
                              pos.getX()+0.5,pos.getY()+1,pos.getZ()+0.5,
                              4,0.3,0.5,0.3,0.01);

                      // MODE 1
                      if(mode==1 && sw.getTime()%40==0){
                          for(HostileEntity mob:
                              sw.getEntitiesByClass(HostileEntity.class,radius,e->true)){
                              mob.damage(sw.getDamageSources().magic(),2f);
                          }
                      }

                      // MODE 2
                      if(mode==2){
                          for(PlayerEntity p:
                              sw.getEntitiesByClass(PlayerEntity.class,radius,e->true)){
                              if(p.isDead()){
                                  p.requestRespawn();
                                  p.heal(p.getMaxHealth());
                              }
                          }
                      }

                      // MODE 3
                      if(mode==3){
                          for(PlayerEntity p:
                              sw.getEntitiesByClass(PlayerEntity.class,radius,e->true)){
                              if(p.hurtTime==1)p.heal(1f);
                          }
                      }

                      // SAVE
                      if(sw.getTime()-lastSave>=100){
                          lastSave=sw.getTime();
                          snapshot=new Snapshot();
                          snapshot.time=sw.getTimeOfDay();

                          for(BlockPos p:BlockPos.iterate(
                                  pos.add(-150,-150,-150),
                                  pos.add(150,150,150))){
                              if(p.isWithinDistance(pos,150))
                                  snapshot.blocks.put(p.toImmutable(),
                                          sw.getBlockState(p));
                          }

                          for(Entity e:sw.getOtherEntities(null,radius)){
                              NbtCompound n=new NbtCompound();
                              e.writeNbt(n);
                              snapshot.entities.add(n);
                          }
                      }

                      // MODE 4 TIME RIFT
                      if(mode==4 && snapshot!=null){

                          if(sw.getTime()-lastRewind<3600)return;
                          lastRewind=sw.getTime();

                          sw.spawnParticles(ParticleTypes.REVERSE_PORTAL,
                                  pos.getX()+0.5,pos.getY()+1,pos.getZ()+0.5,
                                  600,3,3,3,0.4);

                          sw.playSound(null,pos,
                                  SoundEvents.ENTITY_ENDER_DRAGON_GROWL,
                                  SoundCategory.BLOCKS,3f,0.5f);

                          sw.setTimeOfDay(snapshot.time);

                          snapshot.blocks.forEach(sw::setBlockState);

                          for(Entity e:sw.getOtherEntities(null,radius)){
                              e.discard();
                          }

                          for(NbtCompound n:snapshot.entities){
                              EntityType.loadEntityWithPassengers(n,sw,
                                      entity->{sw.spawnEntity(entity);return entity;});
                          }
                      }
                  }
              }
          }
          EOF

      - run: ./gradlew build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: GodBlock-9.0-GOD-EDITION
          path: build/libs/*.jar
