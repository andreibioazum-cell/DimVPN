name: Ultimate Stealth Container (Core Fix)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/stealth/container
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Generate Config Files
        run: |
          # Settings.gradle
          cat <<'EOF' > settings.gradle
          rootProject.name = "IsoContainer"
          include ':app'
          EOF

          # Gradle.properties
          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: Generate Root build.gradle
        run: |
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.1.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20" 
              }
          }
          allprojects { 
              repositories { 
                  google(); mavenCentral()
                  maven { url "https://jitpack.io" }
              } 
          }
          EOF

      - name: Generate App build.gradle
        run: |
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
              namespace 'com.stealth.container'
              compileSdk 33
              defaultConfig {
                  applicationId "com.stealth.container"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "6.0-STABLE"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              // Используем стабильный форк BlackBox
              implementation 'com.github.Milk-Way:BlackBox:1.0.3'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
          }
          EOF

      - name: Generate Source Code (Kotlin)
        run: |
          cat <<'EOF' > app/src/main/java/com/stealth/container/MainActivity.kt
          package com.stealth.container
          import android.content.Intent
          import android.content.pm.ApplicationInfo
          import android.net.Uri
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import android.view.View
          import android.view.ViewGroup

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val layout = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(40, 40, 40, 40)
                  }
                  val title = TextView(this).apply {
                      text = "Выберите приложение"
                      textSize = 18f
                      setPadding(0, 0, 0, 40)
                  }
                  layout.addView(title)
                  val listView = ListView(this)
                  layout.addView(listView)
                  setContentView(layout)

                  val apps = packageManager.getInstalledApplications(0)
                      .filter { it.flags and ApplicationInfo.FLAG_SYSTEM == 0 } 
                  
                  val adapter = object : ArrayAdapter<ApplicationInfo>(this, android.R.layout.simple_list_item_1, apps) {
                      override fun getView(position: Int, convertView: View?, parent: ViewGroup): View {
                          val view = super.getView(position, convertView, parent) as TextView
                          view.text = apps[position].loadLabel(packageManager)
                          return view
                      }
                  }
                  listView.adapter = adapter
                  listView.setOnItemClickListener { _, _, position, _ ->
                      val selectedApp = apps[position]
                      startStealthMode(selectedApp.packageName, selectedApp.loadLabel(packageManager).toString())
                  }
              }

              private fun startStealthMode(packageName: String, label: String) {
                  if (!Settings.canDrawOverlays(this)) {
                      val intent = Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:$packageName"))
                      startActivityForResult(intent, 100)
                      return
                  }
                  startService(Intent(this, FloatingService::class.java))
                  Toast.makeText(this, "Запуск $label в стелс-режиме...", Toast.LENGTH_LONG).show()
              }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/stealth/container/FloatingService.kt
          package com.stealth.container
          import android.app.*
          import android.content.*
          import android.graphics.*
          import android.os.*
          import android.view.*
          import android.widget.*

          class FloatingService : Service() {
              override fun onBind(intent: Intent?) = null
              override fun onCreate() {
                  super.onCreate()
                  val wm = getSystemService(WINDOW_SERVICE) as WindowManager
                  val view = TextView(this).apply {
                      text = "● Iso-режим: Германия"
                      setTextColor(Color.GREEN)
                      setBackgroundColor(Color.parseColor("#AA000000"))
                      setPadding(15, 5, 15, 5)
                      textSize = 11f
                  }
                  val params = WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                      PixelFormat.TRANSLUCENT
                  ).apply { gravity = Gravity.TOP or Gravity.END; x = 30; y = 30 }
                  wm.addView(view, params)
                  
                  val channelId = "iso_channel"
                  if (Build.VERSION.SDK_INT >= 26) {
                      val chan = NotificationChannel(channelId, "Iso-Service", NotificationManager.IMPORTANCE_LOW)
                      (getSystemService(NOTIFICATION_SERVICE) as NotificationManager).createNotificationChannel(chan)
                  }
                  startForeground(1, Notification.Builder(this, channelId)
                      .setContentTitle("IsoContainer активен")
                      .setSmallIcon(android.R.drawable.ic_lock_idle_lock)
                      .build())
              }
          }
          EOF

      - name: Generate Manifest
        run: |
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <application android:label="IsoContainer" android:theme="@style/Theme.AppCompat.Light">
                  <service android:name=".FloatingService" android:exported="false" />
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Execute Build
        run: gradle assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stealth-Container-v6.0
          path: app/build/outputs/apk/debug/app-debug.apk
