name: TinyOS App Platform
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib nasm qemu-system-x86

      - name: Build Kernel with App Support
        run: |
          cat > kernel.asm << 'KERNEL'
          [bits 32]
          [org 0x10000]
          
          ; ============== СИСТЕМНЫЕ ВЫЗОВЫ (API) ==============
          ; Номер вызова в AH:
          ; 0x01 - print_string
          ; 0x02 - print_int
          ; 0x03 - put_pixel
          ; 0x04 - draw_rect
          ; 0x05 - get_key
          ; 0x06 - sleep
          ; 0x07 - exec_app
          ; 0x08 - exit
          
          syscall_handler:
              cmp ah, 0x01
              je sys_print_string
              cmp ah, 0x02
              je sys_print_int
              cmp ah, 0x03
              je sys_put_pixel
              cmp ah, 0x04
              je sys_draw_rect
              cmp ah, 0x05
              je sys_get_key
              cmp ah, 0x06
              je sys_sleep
              cmp ah, 0x07
              je sys_exec_app
              cmp ah, 0x08
              je sys_exit
              iret
          
          sys_print_string:
              push es
              push ds
              pop es
              mov bp, ebx
              mov cx, 0xFFFF
              mov ax, 0x1301
              mov bx, 0x000F
              int 0x10
              pop es
              iret
          
          sys_print_int:
              push eax
              push ebx
              push ecx
              mov eax, ebx
              mov ebx, 10
              xor ecx, ecx
          .div_loop:
              xor edx, edx
              div ebx
              push dx
              inc ecx
              test eax, eax
              jnz .div_loop
          .print_loop:
              pop ax
              add al, '0'
              mov ah, 0x0E
              int 0x10
              loop .print_loop
              pop ecx
              pop ebx
              pop eax
              iret
          
          sys_put_pixel:
              mov edi, 0xA0000
              add edi, ebx
              mov al, cl
              stosb
              iret
          
          sys_draw_rect:
              pusha
              mov ecx, edx
          .rect_y:
              push ecx
              mov ebp, ebx
              mov ecx, esi
          .rect_x:
              mov edi, 0xA0000
              add edi, ebp
              add edi, ecx
              mov al, [color]
              stosb
              dec ecx
              jnz .rect_x
              pop ecx
              add ebx, 320
              dec ecx
              jnz .rect_y
              popa
              iret
          
          sys_get_key:
              xor ax, ax
              int 0x16
              mov eax, ebx
              mov [ebx], al
              iret
          
          sys_sleep:
              push eax
              push ecx
              mov ecx, ebx
              xor eax, eax
          .delay:
              inc eax
              cmp eax, 0xFFFFF
              jne .delay
              loop .delay
              pop ecx
              pop eax
              iret
          
          sys_exec_app:
              pusha
              ; Загрузка программы
              mov esi, ebx
              mov edi, 0x20000
          .load:
              lodsb
              stosb
              cmp al, 0
              jnz .load
              jmp 0x20000
              popa
              iret
          
          sys_exit:
              mov word [current_app], 0
              iret
          
          ; ============== ЯДРО ==============
          start:
              mov ax, 0x0013
              int 0x10
              
              call draw_desktop
              
              mov esi, welcome_msg
              call print_string
              
              call load_apps
              
              jmp shell_start
          
          draw_desktop:
              ; Фон
              mov ecx, 200
          .sky:
              push ecx
              mov ecx, 320
          .horizon:
              mov eax, ecx
              mov ebx, 320
              xor edx, edx
              div ebx
              add al, 16
              push ecx
              mov ebx, [offset]
              add ebx, ecx
              mov edi, 0xA0000
              add edi, ebx
              stosb
              pop ecx
              loop .horizon
              add dword [offset], 320
              pop ecx
              loop .sky
              
              ; Трава
              mov ecx, 60
          .ground:
              push ecx
              mov ecx, 320
          .ground_row:
              mov ebx, [offset2]
              add ebx, ecx
              mov edi, 0xA0000
              add edi, ebx
              mov al, 0x02
              stosb
              loop .ground_row
              add dword [offset2], 320
              pop ecx
              loop .ground
              ret
          
          load_apps:
              mov esi, app1_data
              mov edi, app1_start
              call copy_app
              
              mov esi, app2_data
              mov edi, app2_start
              call copy_app
              
              mov esi, app3_data
              mov edi, app3_start
              call copy_app
              ret
          
          copy_app:
          .loop:
              lodsb
              stosb
              cmp al, 0
              jnz .loop
              ret
          
          ; ============== ОБОЛОЧКА ==============
          shell_start:
              call draw_shell
          
          shell_loop:
              mov esi, prompt
              call print_string
              
              mov edi, cmd_buffer
              xor ebx, ebx
          
          read_cmd:
              xor ax, ax
              int 0x16
              
              cmp al, 0x0D
              je exec_cmd
              
              cmp al, 0x08
              je backspace
              
              mov [edi + ebx], al
              inc ebx
              mov ah, 0x0E
              int 0x10
              jmp read_cmd
          
          backspace:
              cmp ebx, 0
              je read_cmd
              dec ebx
              mov al, 0x08
              mov ah, 0x0E
              int 0x10
              mov al, ' '
              int 0x10
              mov al, 0x08
              int 0x10
              jmp read_cmd
          
          exec_cmd:
              call newline
              mov byte [edi + ebx], 0
              
              mov esi, cmd_buffer
              
              mov edi, cmd_run
              call strcmp
              cmp eax, 1
              je run_app
              
              mov edi, cmd_ls
              call strcmp
              cmp eax, 1
              je list_apps
              
              mov edi, cmd_help
              call strcmp
              cmp eax, 1
              je show_help
              
              mov edi, cmd_clear
              call strcmp
              cmp eax, 1
              je clear_screen
              
              mov esi, unknown_msg
              call print_string
              
          shell_cont:
              jmp shell_loop
          
          run_app:
              mov esi, cmd_buffer
              add esi, 4
              
              mov edi, app1_name
              call strcmp
              cmp eax, 1
              je start_app1
              
              mov edi, app2_name
              call strcmp
              cmp eax, 1
              je start_app2
              
              mov edi, app3_name
              call strcmp
              cmp eax, 1
              je start_app3
              
              mov esi, app_not_found
              call print_string
              jmp shell_cont
          
          start_app1:
              call clear_screen
              jmp app1_start
          
          start_app2:
              call clear_screen
              jmp app2_start
          
          start_app3:
              call clear_screen
              jmp app3_start
          
          list_apps:
              mov esi, app_list
              call print_string
              jmp shell_cont
          
          show_help:
              mov esi, help_msg
              call print_string
              jmp shell_cont
          
          clear_screen:
              mov ax, 0x0003
              int 0x10
              mov ax, 0x0013
              int 0x10
              call draw_desktop
              ret
          
          draw_shell:
              mov ax, 0x1301
              mov bx, 0x000F
              mov cx, 30
              mov dx, 0x1700
              push ds
              pop es
              mov bp, shell_bar
              int 0x10
              ret
          
          ; ============== ПРИЛОЖЕНИЕ 1: Часы ==============
          app1_start:
              mov esi, app1_title
              call print_string
              
              mov dword [counter], 0
          clock_loop:
              mov ah, 0x06
              mov ebx, 50
              call syscall_handler
              
              mov ax, 0x1301
              mov bx, 0x000F
              mov cx, 15
              mov dx, 0x0A08
              push ds
              pop es
              mov bp, time_msg
              int 0x10
              
              inc dword [counter]
              mov ebx, [counter]
              mov ah, 0x02
              call syscall_handler
              
              mov ah, 0x05
              mov ebx, key_buffer
              call syscall_handler
              
              cmp byte [key_buffer], 'q'
              je exit_app1
              cmp byte [key_buffer], 'r'
              je refresh_clock
              
              jmp clock_loop
          
          refresh_clock:
              mov dword [counter], 0
              jmp clock_loop
          
          exit_app1:
              call clear_screen
              call draw_desktop
              jmp shell_cont
          
          ; ============== ПРИЛОЖЕНИЕ 2: Графический редактор ==============
          app2_start:
              mov esi, app2_title
              call print_string
              
              mov dword [pen_x], 160
              mov dword [pen_y], 100
              mov byte [pen_color], 0x0F
          
          editor_loop:
              mov ah, 0x05
              mov ebx, key_buffer
              call syscall_handler
              
              mov al, [key_buffer]
              
              cmp al, 'w'
              je move_up
              cmp al, 's'
              je move_down
              cmp al, 'a'
              je move_left
              cmp al, 'd'
              je move_right
              cmp al, 'c'
              je change_color
              cmp al, 'q'
              je exit_app2
              
              ; Рисование
              mov ebx, [pen_y]
              imul ebx, 320
              add ebx, [pen_x]
              mov cl, [pen_color]
              mov ah, 0x03
              call syscall_handler
              
              jmp editor_loop
          
          move_up:
              sub dword [pen_y], 1
              cmp dword [pen_y], 0
              jge editor_loop
              mov dword [pen_y], 0
              jmp editor_loop
          
          move_down:
              add dword [pen_y], 1
              cmp dword [pen_y], 199
              jle editor_loop
              mov dword [pen_y], 199
              jmp editor_loop
          
          move_left:
              sub dword [pen_x], 1
              cmp dword [pen_x], 0
              jge editor_loop
              mov dword [pen_x], 0
              jmp editor_loop
          
          move_right:
              add dword [pen_x], 1
              cmp dword [pen_x], 319
              jle editor_loop
              mov dword [pen_x], 319
              jmp editor_loop
          
          change_color:
              inc byte [pen_color]
              cmp byte [pen_color], 0xFF
              jne editor_loop
              mov byte [pen_color], 0
              jmp editor_loop
          
          exit_app2:
              call clear_screen
              call draw_desktop
              jmp shell_cont
          
          ; ============== ПРИЛОЖЕНИЕ 3: Игра Змейка ==============
          app3_start:
              mov esi, app3_title
              call print_string
              
              ; Инициализация змейки
              mov dword [snake_x], 160
              mov dword [snake_y], 100
              mov dword [dir_x], 1
              mov dword [dir_y], 0
              mov dword [food_x], 50
              mov dword [food_y], 50
              mov dword [score], 0
          
          snake_loop:
              ; Управление
              mov ah, 0x05
              mov ebx, key_buffer
              call syscall_handler
              
              mov al, [key_buffer]
              cmp al, 'w'
              je set_up
              cmp al, 's'
              je set_down
              cmp al, 'a'
              je set_left
              cmp al, 'd'
              je set_right
              cmp al, 'q'
              je exit_app3
              
              ; Движение
              add dword [snake_x], [dir_x]
              add dword [snake_y], [dir_y]
              
              ; Проверка границ
              cmp dword [snake_x], 0
              jl snake_die
              cmp dword [snake_x], 319
              jg snake_die
              cmp dword [snake_y], 0
              jl snake_die
              cmp dword [snake_y], 199
              jg snake_die
              
              ; Рисование еды
              mov ebx, [food_y]
              imul ebx, 320
              add ebx, [food_x]
              mov cl, 0x0C
              mov ah, 0x03
              call syscall_handler
              
              ; Проверка съедания
              mov eax, [snake_x]
              cmp eax, [food_x]
              jne check_eat
              mov eax, [snake_y]
              cmp eax, [food_y]
              jne check_eat
              
              inc dword [score]
              call random_food
              
          check_eat:
              ; Рисование змейки
              mov ebx, [snake_y]
              imul ebx, 320
              add ebx, [snake_x]
              mov cl, 0x0A
              mov ah, 0x03
              call syscall_handler
              
              ; Показать счёт
              mov ax, 0x1301
              mov bx, 0x000F
              mov cx, 7
              mov dx, 0x0000
              push ds
              pop es
              mov bp, score_text
              int 0x10
              
              mov ebx, [score]
              mov ah, 0x02
              call syscall_handler
              
              mov ah, 0x06
              mov ebx, 30
              call syscall_handler
              
              jmp snake_loop
          
          set_up:
              mov dword [dir_x], 0
              mov dword [dir_y], -1
              jmp snake_loop
          
          set_down:
              mov dword [dir_x], 0
              mov dword [dir_y], 1
              jmp snake_loop
          
          set_left:
              mov dword [dir_x], -1
              mov dword [dir_y], 0
              jmp snake_loop
          
          set_right:
              mov dword [dir_x], 1
              mov dword [dir_y], 0
              jmp snake_loop
          
          snake_die:
              mov esi, game_over_msg
              call print_string
              mov ah, 0x06
              mov ebx, 100
              call syscall_handler
              jmp exit_app3
          
          random_food:
              push eax
              push ebx
              in al, 0x40
              xor ah, ah
              mov ebx, 300
              xor edx, edx
              div ebx
              mov [food_x], dx
              in al, 0x40
              xor ah, ah
              mov ebx, 180
              xor edx, edx
              div ebx
              mov [food_y], dx
              pop ebx
              pop eax
              ret
          
          exit_app3:
              call clear_screen
              call draw_desktop
              jmp shell_cont
          
          ; ============== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==============
          print_string:
              lodsb
              or al, al
              jz .done
              mov ah, 0x0E
              int 0x10
              jmp print_string
          .done:
              ret
          
          newline:
              mov al, 13
              mov ah, 0x0E
              int 0x10
              mov al, 10
              int 0x10
              ret
          
          strcmp:
              push esi
              push edi
          .loop:
              mov al, [esi]
              mov bl, [edi]
              cmp al, bl
              jne .not_equal
              cmp al, 0
              je .equal
              inc esi
              inc edi
              jmp .loop
          .equal:
              pop edi
              pop esi
              mov eax, 1
              ret
          .not_equal:
              pop edi
              pop esi
              mov eax, 0
              ret
          
          ; ============== ДАННЫЕ ==============
          welcome_msg db 13,10,'TinyOS App Platform v4.0',13,10,'Type "help" for commands',13,10,0
          prompt db 13,10,'tinyos> ',0
          unknown_msg db 'Command not found',13,10,0
          app_not_found db 'App not found',13,10,0
          
          cmd_run db 'run',0
          cmd_ls db 'ls',0
          cmd_help db 'help',0
          cmd_clear db 'clear',0
          
          app1_name db 'clock',0
          app2_name db 'paint',0
          app3_name db 'snake',0
          
          app_list db 'Available apps:',13,10
                    db '  clock - Digital clock',13,10
                    db '  paint - Drawing app (WASD + C)',13,10
                    db '  snake - Snake game',13,10,0
          
          help_msg db 'Commands:',13,10
                    db '  run <app> - Start application',13,10
                    db '  ls         - List apps',13,10
                    db '  clear      - Clear screen',13,10
                    db '  help       - Show help',13,10
                    db '',13,10
                    db 'Press Q to exit app',13,10,0
          
          shell_bar db 'TinyOS - App Platform',0
          app1_title db 13,10,'=== Clock App ===',13,10,'Press R to reset, Q to quit',13,10,0
          app2_title db 13,10,'=== Paint App ===',13,10,'WASD to move, C to change color, Q to quit',13,10,0
          app3_title db 13,10,'=== Snake Game ===',13,10,'WASD to move, Q to quit',13,10,0
          
          time_msg db 'Ticks: ',0
          score_text db 'Score: ',0
          game_over_msg db 13,10,'GAME OVER!',13,10,0
          
          offset dd 0
          offset2 dd 19200
          
          key_buffer db 0
          counter dd 0
          pen_x dd 0
          pen_y dd 0
          pen_color db 0
          snake_x dd 0
          snake_y dd 0
          dir_x dd 0
          dir_y dd 0
          food_x dd 0
          food_y dd 0
          score dd 0
          
          cmd_buffer times 64 db 0
          
          ; Приложения (бинарные данные)
          app1_data:
              incbin "app_clock.bin"
              db 0
          app2_data:
              incbin "app_paint.bin"
              db 0
          app3_data:
              incbin "app_snake.bin"
              db 0
          
          app1_start equ 0x20000
          app2_start equ 0x21000
          app3_start equ 0x22000
          
          times 32768-($-$$) db 0
          KERNEL

      - name: Create App Binaries
        run: |
          # Просто заглушки для приложений (код уже в ядре)
          echo > app_clock.bin
          echo > app_paint.bin
          echo > app_snake.bin

      - name: Build
        run: |
          nasm -f bin kernel.asm -o tinyos.bin
          truncate -s 1474560 tinyos.bin

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TinyOS-Apps
          path: tinyos.bin
