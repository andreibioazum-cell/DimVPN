name: Build JARVIS with PocketSphinx

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/jarvis/sphinx
          mkdir -p app/src/main/assets/sync
          mkdir -p app/src/main/res/layout

      - name: Create dummy grammar file
        run: |
          cat > app/src/main/assets/sync/commands.gram << 'EOF'
          #JSGF V1.0;
          grammar commands;
          public <command> = open youtube | open telegram | open whatsapp | open instagram | open maps | open chrome | open spotify | open settings | time | weather | vibrate | type <anything> | stop;
          <anything> = (hello world | test message | hi jarvis);
          EOF

      - name: Download PocketSphinx model files
        run: |
          cd app/src/main/assets/sync
          # Скачиваем файлы с резервных URL (если основные недоступны)
          wget --no-check-certificate -O en-us-ptm.lm https://raw.githubusercontent.com/cmusphinx/pocketsphinx-android-demo/master/app/src/main/assets/sync/en-us-ptm.lm
          wget --no-check-certificate -O en-us.dict https://raw.githubusercontent.com/cmusphinx/pocketsphinx-android-demo/master/app/src/main/assets/sync/en-us.dict
          wget --no-check-certificate -O zero_ru_cont_8k_v2.dict https://raw.githubusercontent.com/cmusphinx/pocketsphinx-android-demo/master/app/src/main/assets/sync/zero_ru_cont_8k_v2.dict
          echo "PocketSphinx files downloaded"

      - name: Generate gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Generate AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.jarvis.sphinx">
              
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              
              <application
                  android:label="J.A.R.V.I.S"
                  android:theme="@android:style/Theme.DeviceDefault.Light"
                  android:allowBackup="false"
                  android:usesCleartextTraffic="true">
                  
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <service
                      android:name=".ListeningService"
                      android:exported="false"
                      android:foregroundServiceType="microphone" />
              </application>
          </manifest>
          EOF

      - name: Generate MainActivity.java
        run: |
          cat > app/src/main/java/com/jarvis/sphinx/MainActivity.java << 'EOF'
          package com.jarvis.sphinx;
          
          import android.app.Activity;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.ScrollView;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import android.graphics.Color;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          
          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST_CODE = 100;
              private LinearLayout logPanel;
              private TextView statusText;
              private Button startBtn, stopBtn;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  ScrollView scroll = new ScrollView(this);
                  LinearLayout main = new LinearLayout(this);
                  main.setOrientation(LinearLayout.VERTICAL);
                  main.setPadding(40, 40, 40, 40);
                  
                  TextView title = new TextView(this);
                  title.setText("=== J.A.R.V.I.S with PocketSphinx ===");
                  title.setTextSize(22);
                  title.setTextColor(Color.rgb(0, 100, 200));
                  
                  statusText = new TextView(this);
                  statusText.setText("Status: Stopped");
                  statusText.setPadding(0, 20, 0, 20);
                  
                  LinearLayout buttonRow = new LinearLayout(this);
                  buttonRow.setOrientation(LinearLayout.HORIZONTAL);
                  
                  startBtn = new Button(this);
                  startBtn.setText("ACTIVATE");
                  startBtn.setBackgroundColor(Color.rgb(0, 150, 0));
                  startBtn.setTextColor(Color.WHITE);
                  
                  stopBtn = new Button(this);
                  stopBtn.setText("DEACTIVATE");
                  stopBtn.setBackgroundColor(Color.rgb(150, 0, 0));
                  stopBtn.setTextColor(Color.WHITE);
                  stopBtn.setEnabled(false);
                  
                  buttonRow.addView(startBtn);
                  buttonRow.addView(stopBtn);
                  
                  logPanel = new LinearLayout(this);
                  logPanel.setOrientation(LinearLayout.VERTICAL);
                  logPanel.setBackgroundColor(Color.LTGRAY);
                  logPanel.setPadding(20, 20, 20, 20);
                  
                  main.addView(title);
                  main.addView(statusText);
                  main.addView(buttonRow);
                  main.addView(logPanel);
                  scroll.addView(main);
                  setContentView(scroll);
                  
                  createNotificationChannel();
                  checkPermissions();
                  
                  startBtn.setOnClickListener(v -> startService());
                  stopBtn.setOnClickListener(v -> stopService());
                  
                  addLog("[*] J.A.R.V.I.S with PocketSphinx (offline)");
                  addLog("[*] Commands: open youtube, open telegram, time, weather, vibrate, type, stop");
              }
              
              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          "jarvis_channel",
                          "J.A.R.V.I.S",
                          NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
              }
              
              private void checkPermissions() {
                  if (ContextCompat.checkSelfPermission(this, android.Manifest.permission.RECORD_AUDIO)
                          != PackageManager.PERMISSION_GRANTED) {
                      ActivityCompat.requestPermissions(this, 
                          new String[]{android.Manifest.permission.RECORD_AUDIO}, 
                          PERMISSION_REQUEST_CODE);
                  }
              }
              
              private void startService() {
                  Intent intent = new Intent(this, ListeningService.class);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(intent);
                  } else {
                      startService(intent);
                  }
                  statusText.setText("Status: Active (listening)");
                  statusText.setTextColor(Color.GREEN);
                  startBtn.setEnabled(false);
                  stopBtn.setEnabled(true);
                  addLog("[+] J.A.R.V.I.S activated");
              }
              
              private void stopService() {
                  Intent intent = new Intent(this, ListeningService.class);
                  stopService(intent);
                  statusText.setText("Status: Stopped");
                  statusText.setTextColor(Color.GRAY);
                  startBtn.setEnabled(true);
                  stopBtn.setEnabled(false);
                  addLog("[-] J.A.R.V.I.S deactivated");
              }
              
              private void addLog(String msg) {
                  runOnUiThread(() -> {
                      TextView tv = new TextView(this);
                      tv.setText(msg);
                      tv.setTextSize(12);
                      tv.setTextColor(Color.BLACK);
                      tv.setPadding(0, 3, 0, 3);
                      logPanel.addView(tv);
                  });
              }
              
              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      if (grantResults[0] != PackageManager.PERMISSION_GRANTED) {
                          Toast.makeText(this, "Microphone permission required!", Toast.LENGTH_LONG).show();
                      }
                  }
              }
          }
          EOF

      - name: Generate ListeningService.java
        run: |
          cat > app/src/main/java/com/jarvis/sphinx/ListeningService.java << 'EOF'
          package com.jarvis.sphinx;
          
          import android.app.Notification;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.ClipboardManager;
          import android.content.ClipData;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.os.Build;
          import android.os.IBinder;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          import android.speech.tts.TextToSpeech;
          import androidx.core.app.NotificationCompat;
          import edu.cmu.pocketsphinx.Assets;
          import edu.cmu.pocketsphinx.Recognizer;
          import java.io.File;
          import java.io.IOException;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;
          
          public class ListeningService extends Service {
              private Recognizer recognizer;
              private boolean isListening = true;
              private Handler mainHandler;
              private Vibrator vibrator;
              private TextToSpeech tts;
              
              @Override
              public void onCreate() {
                  super.onCreate();
                  mainHandler = new Handler(Looper.getMainLooper());
                  vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);
                  
                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) {
                          tts.setLanguage(Locale.US);
                          tts.setSpeechRate(0.9f);
                      }
                  });
                  
                  try {
                      Assets assets = new Assets(this);
                      File assetDir = assets.syncAssets();
                      recognizer = new Recognizer(assetDir);
                      recognizer.addKeywordSearch("commands", "open youtube|open telegram|open whatsapp|open instagram|open maps|open chrome|open spotify|open settings|time|weather|vibrate|type|stop");
                      recognizer.startListening("commands");
                  } catch (IOException e) {
                      speak("Init failed");
                  }
                  
                  startListening();
              }
              
              private void startListening() {
                  Thread thread = new Thread(() -> {
                      while (isListening) {
                          if (recognizer != null) {
                              recognizer.startListening("commands");
                              String hypothesis = recognizer.getHypothesis();
                              if (hypothesis != null && !hypothesis.isEmpty()) {
                                  String finalHyp = hypothesis;
                                  mainHandler.post(() -> executeCommand(finalHyp));
                              }
                          }
                          try { Thread.sleep(100); } catch (Exception e) {}
                      }
                  });
                  thread.start();
              }
              
              private void speak(String text) {
                  if (tts != null && text != null) {
                      tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, null);
                  }
              }
              
              private void copyToClipboard(String text) {
                  ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                  ClipData clip = ClipData.newPlainText("Jarvis", text);
                  clipboard.setPrimaryClip(clip);
                  speak("Text copied to clipboard");
              }
              
              private void executeCommand(String command) {
                  String lower = command.toLowerCase();
                  
                  if (lower.contains("open youtube")) { speak("Opening YouTube"); openApp("com.google.android.youtube"); }
                  else if (lower.contains("open telegram")) { speak("Opening Telegram"); openApp("org.telegram.messenger"); }
                  else if (lower.contains("open whatsapp")) { speak("Opening WhatsApp"); openApp("com.whatsapp"); }
                  else if (lower.contains("open instagram")) { speak("Opening Instagram"); openApp("com.instagram.android"); }
                  else if (lower.contains("open maps")) { speak("Opening Maps"); openApp("com.google.android.apps.maps"); }
                  else if (lower.contains("open chrome")) { speak("Opening Chrome"); openApp("com.android.chrome"); }
                  else if (lower.contains("open spotify")) { speak("Opening Spotify"); openApp("com.spotify.music"); }
                  else if (lower.contains("open settings")) { speak("Opening Settings"); openApp("com.android.settings"); }
                  else if (lower.contains("time")) {
                      String time = new SimpleDateFormat("HH:mm", Locale.getDefault()).format(new Date());
                      speak("Current time is " + time);
                  }
                  else if (lower.contains("weather")) { speak("Today is sunny, 22 degrees"); }
                  else if (lower.contains("vibrate")) { speak("Vibrating"); vibrate(300); }
                  else if (lower.startsWith("type")) {
                      String text = command.substring(4).trim();
                      if (text.isEmpty()) text = "text from Jarvis";
                      speak("Typing: " + text);
                      copyToClipboard(text);
                  }
                  else if (lower.contains("stop")) { speak("Goodbye"); stopSelf(); }
              }
              
              private void openApp(String packageName) {
                  try {
                      Intent intent = getPackageManager().getLaunchIntentForPackage(packageName);
                      if (intent != null) {
                          intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          startActivity(intent);
                      }
                  } catch (Exception e) {}
              }
              
              private void vibrate(long ms) {
                  if (vibrator != null) {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          vibrator.vibrate(VibrationEffect.createOneShot(ms, VibrationEffect.DEFAULT_AMPLITUDE));
                      } else {
                          vibrator.vibrate(ms);
                      }
                  }
              }
              
              private Notification createNotification() {
                  Intent intent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(this, 0, intent, PendingIntent.FLAG_IMMUTABLE);
                  return new NotificationCompat.Builder(this, "jarvis_channel")
                      .setContentTitle("J.A.R.V.I.S")
                      .setContentText("Listening...")
                      .setSmallIcon(android.R.drawable.ic_btn_speak_now)
                      .setContentIntent(pendingIntent)
                      .build();
              }
              
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  startForeground(1, createNotification());
                  return START_STICKY;
              }
              
              @Override
              public void onDestroy() {
                  isListening = false;
                  if (recognizer != null) recognizer.cancel();
                  if (tts != null) tts.shutdown();
                  super.onDestroy();
              }
              
              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

      - name: Generate build.gradle (app)
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "com.jarvis.sphinx"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              namespace 'com.jarvis.sphinx'
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'edu.cmu.pocketsphinx:pocketsphinx-android:5prealpha@aar'
          }
          EOF

      - name: Generate top-level build.gradle
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

      - name: Generate settings.gradle
        run: echo "include ':app'" > settings.gradle

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          ./gradle-8.0/bin/gradle wrapper
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-PocketSphinx
          path: app/build/outputs/apk/debug/app-debug.apk
