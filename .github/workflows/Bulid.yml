                              android:textSize="14sp"
                              android:textStyle="bold"/>
                          
                          <TextView
                              android:id="@+id/txt_multiplier"
                              android:layout_width="wrap_content"
                              android:layout_height="wrap_content"
                              android:text="✨ Множ: x1"
                              android:textColor="#4FC3F7"
                              android:textSize="14sp"
                              android:textStyle="bold"
                              android:layout_marginTop="4dp"/>
                      </LinearLayout>
                  </LinearLayout>
              </LinearLayout>

              <!-- Область клика -->
              <FrameLayout
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:layout_marginVertical="8dp">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:gravity="center"
                      android:orientation="vertical">

                      <TextView
                          android:id="@+id/txt_float_gold"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text=""
                          android:textColor="#FFD700"
                          android:textSize="32sp"
                          android:textStyle="bold"
                          android:alpha="0"
                          android:layout_marginBottom="16dp"/>

                      <Button
                          android:id="@+id/btn_click"
                          android:layout_width="200dp"
                          android:layout_height="200dp"
                          android:background="@drawable/click_button_bg"
                          android:text="ТАП"
                          android:textColor="#FFFFFF"
                          android:textSize="28sp"
                          android:textStyle="bold"
                          android:elevation="12dp"/>

                      <TextView
                          android:id="@+id/txt_total_earned"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="Всего заработано: 0 🪙"
                          android:textColor="#888"
                          android:textSize="12sp"
                          android:layout_marginTop="12dp"/>
                  </LinearLayout>
              </FrameLayout>

              <!-- Улучшения -->
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="📦 УЛУЧШЕНИЯ"
                  android:textColor="#7C4DFF"
                  android:textSize="16sp"
                  android:textStyle="bold"
                  android:layout_marginBottom="8dp"/>

              <ScrollView
                  android:layout_width="match_parent"
                  android:layout_height="220dp"
                  android:background="@drawable/panel_bg"
                  android:padding="8dp">

                  <LinearLayout
                      android:id="@+id/upgrades_container"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"/>
              </ScrollView>

              <!-- Кнопка Престижа -->
              <Button
                  android:id="@+id/btn_prestige"
                  android:layout_width="match_parent"
                  android:layout_height="56dp"
                  android:layout_marginTop="8dp"
                  android:background="@drawable/prestige_button"
                  android:text="🌟 ПЕРЕРОЖДЕНИЕ (Сброс для x2 бонуса)"
                  android:textColor="#1A1A2E"
                  android:textSize="14sp"
                  android:textStyle="bold"/>
          </LinearLayout>
          LAYOUT

          cat > app/src/main/java/com/clicker/game/Upgrade.java << 'EOF'
          package com.clicker.game;

          public class Upgrade {
              public String name;
              public String description;
              public long baseCost;
              public long costMultiplier;
              public long gpsIncrease;
              public long clickIncrease;
              public int level;
              public int maxLevel;

              public Upgrade(String name, String description, long baseCost, long costMultiplier, 
                           long gpsIncrease, long clickIncrease, int maxLevel) {
                  this.name = name;
                  this.description = description;
                  this.baseCost = baseCost;
                  this.costMultiplier = costMultiplier;
                  this.gpsIncrease = gpsIncrease;
                  this.clickIncrease = clickIncrease;
                  this.level = 0;
                  this.maxLevel = maxLevel;
              }

              public long getCurrentCost() {
                  if (level >= maxLevel) return Long.MAX_VALUE;
                  return baseCost * (long)Math.pow(costMultiplier, level);
              }

              public boolean canBuy() {
                  return level < maxLevel;
              }

              public void levelUp() {
                  if (canBuy()) level++;
              }
          }
          EOF

          cat > app/src/main/java/com/clicker/game/GameManager.java << 'EOF'
          package com.clicker.game;

          import java.util.ArrayList;
          import java.util.List;

          public class GameManager {
              public long gold = 0;
              public long totalGoldEarned = 0;
              public long goldPerSecond = 0;
              public long clickValue = 1;
              public long prestigeMultiplier = 1;
              public int prestigeCount = 0;
              public List<Upgrade> upgrades;
              public long lastUpdateTime;
              public static final long PRESTIGE_COST = 100000;

              public GameManager() {
                  upgrades = new ArrayList<>();
                  initializeUpgrades();
                  lastUpdateTime = System.currentTimeMillis();
              }

              private void initializeUpgrades() {
                  upgrades.add(new Upgrade("💪 Сила клика", "Увеличивает силу клика на 1", 10, 2, 0, 1, 100));
                  upgrades.add(new Upgrade("⛏ Шахтёр", "Добывает 1 золота в секунду", 25, 2, 1, 0, 50));
                  upgrades.add(new Upgrade("⚒ Кирка", "Увеличивает силу клика на 5", 100, 3, 0, 5, 75));
                  upgrades.add(new Upgrade("🏭 Фабрика", "Производит 5 золота в секунду", 250, 3, 5, 0, 50));
                  upgrades.add(new Upgrade("✨ Золотое касание", "Увеличивает силу клика на 25", 1000, 4, 0, 25, 50));
                  upgrades.add(new Upgrade("⚡ Электростанция", "Производит 25 золота в секунду", 2500, 4, 25, 0, 40));
                  upgrades.add(new Upgrade("💎 Алмазная кирка", "Увеличивает силу клика на 100", 5000, 5, 0, 100, 30));
                  upgrades.add(new Upgrade("🚀 Космическая станция", "Производит 100 золота в секунду", 10000, 5, 100, 0, 25));
                  upgrades.add(new Upgrade("🌌 Квантовый клик", "Увеличивает силу клика на 500", 25000, 6, 0, 500, 20));
                  upgrades.add(new Upgrade("🤖 ИИ Властелин", "Производит 500 золота в секунду", 50000, 6, 500, 0, 15));
              }

              public void click() {
                  long earned = clickValue * prestigeMultiplier;
                  gold += earned;
                  totalGoldEarned += earned;
              }

              public void update() {
                  long now = System.currentTimeMillis();
                  long deltaTime = (now - lastUpdateTime) / 1000;
                  if (deltaTime > 0) {
                      long earned = goldPerSecond * deltaTime * prestigeMultiplier;
                      gold += earned;
                      totalGoldEarned += earned;
                      lastUpdateTime = now;
                  }
              }

              public boolean buyUpgrade(int index) {
                  if (index < 0 || index >= upgrades.size()) return false;
                  Upgrade upgrade = upgrades.get(index);
                  if (!upgrade.canBuy()) return false;
                  
                  long cost = upgrade.getCurrentCost();
                  if (gold >= cost) {
                      gold -= cost;
                      upgrade.levelUp();
                      
                      if (upgrade.gpsIncrease > 0) {
                          goldPerSecond += upgrade.gpsIncrease;
                      }
                      if (upgrade.clickIncrease > 0) {
                          clickValue += upgrade.clickIncrease;
                      }
                      return true;
                  }
                  return false;
              }

              public boolean canPrestige() {
                  return gold >= PRESTIGE_COST;
              }

              public void prestige() {
                  if (!canPrestige()) return;
                  
                  prestigeCount++;
                  prestigeMultiplier *= 2;
                  gold = 0;
                  goldPerSecond = 0;
                  clickValue = 1;
                  
                  for (Upgrade upgrade : upgrades) {
                      upgrade.level = 0;
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/clicker/game/MainActivity.java << 'ENDMAIN'
          package com.clicker.game;

          import android.animation.Animator;
          import android.animation.AnimatorListenerAdapter;
          import android.animation.ObjectAnimator;
          import android.animation.ValueAnimator;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.drawable.GradientDrawable;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.View;
          import android.view.animation.Animation;
          import android.view.animation.AnimationUtils;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;

          import androidx.appcompat.app.AppCompatActivity;

          import java.text.NumberFormat;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity {
              private GameManager gameManager;
              private TextView txtGold, txtGPS, txtClickPower, txtPrestige, txtMultiplier, txtFloatGold, txtTotalEarned;
              private Button btnClick, btnPrestige;
              private LinearLayout upgradesContainer;
              private Handler handler;
              private Runnable updateRunnable;
              private SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  gameManager = new GameManager();
                  prefs = getSharedPreferences("clicker_prefs", MODE_PRIVATE);
                  
                  initViews();
                  loadGame();
                  setupClickButton();
                  setupPrestigeButton();
                  createUpgradeButtons();
                  startGameLoop();
              }

              private void initViews() {
                  txtGold = findViewById(R.id.txt_gold);
                  txtGPS = findViewById(R.id.txt_gps);
                  txtClickPower = findViewById(R.id.txt_click_power);
                  txtPrestige = findViewById(R.id.txt_prestige);
                  txtMultiplier = findViewById(R.id.txt_multiplier);
                  txtFloatGold = findViewById(R.id.txt_float_gold);
                  txtTotalEarned = findViewById(R.id.txt_total_earned);
                  btnClick = findViewById(R.id.btn_click);
                  btnPrestige = findViewById(R.id.btn_prestige);
                  upgradesContainer = findViewById(R.id.upgrades_container);
                  handler = new Handler(Looper.getMainLooper());
              }

              private void setupClickButton() {
                  btnClick.setOnClickListener(v -> {
                      gameManager.click();
                      showFloatingText();
                      animateClick();
                      updateUI();
                      saveGame();
                  });
              }

              private void setupPrestigeButton() {
                  btnPrestige.setOnClickListener(v -> {
                      if (gameManager.canPrestige()) {
                          gameManager.prestige();
                          updateUI();
                          createUpgradeButtons();
                          saveGame();
                          Toast.makeText(this, "🌟 Перерождение успешно! Множитель x" + gameManager.prestigeMultiplier, 
                              Toast.LENGTH_LONG).show();
                      } else {
                          Toast.makeText(this, "Нужно " + formatNumber(GameManager.PRESTIGE_COST) + " золота для перерождения", 
                              Toast.LENGTH_SHORT).show();
                      }
                  });
              }

              private void animateClick() {
                  Animation anim = AnimationUtils.loadAnimation(this, R.anim.click_animation);
                  btnClick.startAnimation(anim);
              }

              private void showFloatingText() {
                  long earned = gameManager.clickValue * gameManager.prestigeMultiplier;
                  txtFloatGold.setText("+" + formatNumber(earned));
                  txtFloatGold.setAlpha(1f);
                  txtFloatGold.setTranslationY(0);

                  ObjectAnimator fadeOut = ObjectAnimator.ofFloat(txtFloatGold, "alpha", 1f, 0f);
                  fadeOut.setDuration(1000);
                  
                  ObjectAnimator moveUp = ObjectAnimator.ofFloat(txtFloatGold, "translationY", 0f, -100f);
                  moveUp.setDuration(1000);

                  fadeOut.start();
                  moveUp.start();
              }

              private void createUpgradeButtons() {
                  upgradesContainer.removeAllViews();
                  
                  for (int i = 0; i < gameManager.upgrades.size(); i++) {
                      final int index = i;
                      Upgrade upgrade = gameManager.upgrades.get(i);
                      
                      LinearLayout upgradeItem = new LinearLayout(this);
                      upgradeItem.setOrientation(LinearLayout.HORIZONTAL);
                      upgradeItem.setPadding(12, 8, 12, 8);
                      
                      LinearLayout textLayout = new LinearLayout(this);
                      textLayout.setOrientation(LinearLayout.VERTICAL);
                      textLayout.setLayoutParams(new LinearLayout.LayoutParams(
                          0, LinearLayout.LayoutParams.WRAP_CONTENT, 1));
                      
                      TextView nameText = new TextView(this);
                      nameText.setText(upgrade.name + " (Ур." + upgrade.level + "/" + upgrade.maxLevel + ")");
                      nameText.setTextColor(Color.WHITE);
                      nameText.setTextSize(14);
                      
                      TextView descText = new TextView(this);
                      descText.setTextSize(11);
                      descText.setTextColor(Color.parseColor("#AAAAAA"));
                      
                      if (!upgrade.canBuy()) {
                          descText.setText("Максимальный уровень!");
                      } else {
                          String cost = formatNumber(upgrade.getCurrentCost());
                          if (upgrade.clickIncrease > 0) {
                              descText.setText(upgrade.description + " | Стоимость: " + cost + " 🪙");
                          } else {
                              descText.setText(upgrade.description + " | Стоимость: " + cost + " 🪙");
                          }
                      }
                      
                      textLayout.addView(nameText);
                      textLayout.addView(descText);
                      
                      Button buyButton = new Button(this);
                      buyButton.setText(upgrade.canBuy() ? "Купить" : "Макс");
                      buyButton.setTextColor(Color.WHITE);
                      buyButton.setTextSize(12);
                      
                      GradientDrawable drawable = new GradientDrawable();
                      drawable.setCornerRadius(12);
                      
                      if (upgrade.canBuy() && gameManager.gold >= upgrade.getCurrentCost()) {
                          drawable.setColor(Color.parseColor("#4CAF50"));
                      } else if (upgrade.canBuy()) {
                          drawable.setColor(Color.parseColor("#7C4DFF"));
                      } else {
                          drawable.setColor(Color.parseColor("#666666"));
                      }
                      
                      buyButton.setBackground(drawable);
                      buyButton.setPadding(16, 8, 16, 8);
                      
                      LinearLayout.LayoutParams btnParams = new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.WRAP_CONTENT, LinearLayout.LayoutParams.WRAP_CONTENT);
                      btnParams.setMargins(12, 0, 0, 0);
                      buyButton.setLayoutParams(btnParams);
                      
                      buyButton.setOnClickListener(v -> {
                          if (gameManager.buyUpgrade(index)) {
                              updateUI();
                              createUpgradeButtons();
                              saveGame();
                              Toast.makeText(this, "✅ " + upgrade.name + " улучшен!", Toast.LENGTH_SHORT).show();
                          } else {
                              Toast.makeText(this, "❌ Недостаточно золота!", Toast.LENGTH_SHORT).show();
                          }
                      });
                      
                      upgradeItem.addView(textLayout);
                      upgradeItem.addView(buyButton);
                      
                      View divider = new View(this);
                      divider.setLayoutParams(new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT, 1));
                      divider.setBackgroundColor(Color.parseColor("#3A3A6A"));
                      
                      upgradesContainer.addView(upgradeItem);
                      if (i < gameManager.upgrades.size() - 1) {
                          upgradesContainer.addView(divider);
                      }
                  }
              }

              private void startGameLoop() {
                  updateRunnable = new Runnable() {
                      @Override
                      public void run() {
                          gameManager.update();
                          updateUI();
                          saveGame();
                          handler.postDelayed(this, 1000);
                      }
                  };
                  handler.post(updateRunnable);
              }

              private void updateUI() {
                  txtGold.setText("🪙 Золото: " + formatNumber(gameManager.gold));
                  txtGPS.setText("⚡ В сек: " + formatNumber(gameManager.goldPerSecond * gameManager.prestigeMultiplier));
                  txtClickPower.setText("💪 Сила клика: " + formatNumber(gameManager.clickValue * gameManager.prestigeMultiplier));
                  txtPrestige.setText("🌟 Престиж: " + gameManager.prestigeCount);
                  txtMultiplier.setText("✨ Множ: x" + gameManager.prestigeMultiplier);
                  txtTotalEarned.setText("Всего заработано: " + formatNumber(gameManager.totalGoldEarned) + " 🪙");
                  
                  btnPrestige.setEnabled(gameManager.canPrestige());
                  if (gameManager.canPrestige()) {
                      btnPrestige.setAlpha(1f);
                  } else {
                      btnPrestige.setAlpha(0.6f);
                  }
              }

              private String formatNumber(long number) {
                  if (number < 1000) return String.valueOf(number);
                  if (number < 1000000) return String.format("%.1fK", number / 1000.0);
                  if (number < 1000000000) return String.format("%.1fM", number / 1000000.0);
                  return String.format("%.1fB", number / 1000000000.0);
              }

              private void saveGame() {
                  SharedPreferences.Editor editor = prefs.edit();
                  editor.putLong("gold", gameManager.gold);
                  editor.putLong("totalGold", gameManager.totalGoldEarned);
                  editor.putLong("gps", gameManager.goldPerSecond);
                  editor.putLong("clickValue", gameManager.clickValue);
                  editor.putLong("multiplier", gameManager.prestigeMultiplier);
                  editor.putInt("prestige", gameManager.prestigeCount);
                  
                  for (int i = 0; i < gameManager.upgrades.size(); i++) {
                      editor.putInt("upgrade_" + i, gameManager.upgrades.get(i).level);
                  }
                  
                  editor.apply();
              }

              private void loadGame() {
                  gameManager.gold = prefs.getLong("gold", 0);
                  gameManager.totalGoldEarned = prefs.getLong("totalGold", 0);
                  gameManager.goldPerSecond = prefs.getLong("gps", 0);
                  gameManager.clickValue = prefs.getLong("clickValue", 1);
                  gameManager.prestigeMultiplier = prefs.getLong("multiplier", 1);
                  gameManager.prestigeCount = prefs.getInt("prestige", 0);
                  
                  for (int i = 0; i < gameManager.upgrades.size(); i++) {
                      int level = prefs.getInt("upgrade_" + i, 0);
                      Upgrade upgrade = gameManager.upgrades.get(i);
                      for (int j = 0; j < level; j++) {
                          if (upgrade.canBuy()) {
                              upgrade.levelUp();
                              if (upgrade.gpsIncrease > 0) {
                                  gameManager.goldPerSecond += upgrade.gpsIncrease;
                              }
                              if (upgrade.clickIncrease > 0) {
                                  gameManager.clickValue += upgrade.clickIncrease;
                              }
                          }
                      }
                  }
                  
                  updateUI();
                  createUpgradeButtons();
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  saveGame();
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  handler.removeCallbacks(updateRunnable);
              }
          }
          ENDMAIN

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Кликер Золота" android:theme="@style/AppTheme">
                  <activity android:name="com.clicker.game.MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.clicker.game'
              compileSdk 34
              defaultConfig { applicationId 'com.clicker.game'; minSdk 24; targetSdk 34 }
              buildFeatures { buildConfig true }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Russian_Clicker_Game
          path: app/build/outputs/apk/debug/app-debug.apk
