          cat <<'EOF' > app/src/main/res/layout/item_chat.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="72dp" android:background="?selectableItemBackground" android:paddingLeft="16dp" android:paddingRight="16dp">
              <FrameLayout android:id="@+id/av_wrap" android:layout_width="52dp" android:layout_height="52dp" android:layout_centerVertical="true">
                  <TextView android:id="@+id/avatar" android:layout_width="52dp" android:layout_height="52dp" android:background="@drawable/bg_avatar" android:gravity="center" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold"/>
                  <View android:id="@+id/online" android:layout_width="14dp" android:layout_height="14dp" android:layout_gravity="bottom|right" android:background="@drawable/bg_online" android:visibility="gone"/>
