          cat <<'SCRIPT' > app/src/main/java/com/enjoer/game/ScriptEngine.java
          package com.enjoer.game;

          import java.util.Locale;

          public class ScriptEngine {
              public interface Host {
                  GameRenderer renderer();
                  void toast(String text);
              }

              public static void run(Host host, String script) throws Exception {
                  if(script == null) return;
                  String[] lines = script.split("\\r?\\n");
                  for(String raw : lines){
                      String line = raw.trim();
                      if(line.isEmpty()) continue;
                      if(line.startsWith("//") || line.startsWith("#")) continue;
                      exec(host, line);
                  }
              }

              private static void exec(Host host, String line) throws Exception {
                  GameRenderer ren = host.renderer();

                  if(line.equals("player.jump")){ ren.vY = 0.55f; return; }
                  if(line.equals("block.hide")){ Block b = ren.getSelectedBlock(); if(b != null) b.hidden = true; return; }
                  if(line.equals("block.show")){ Block b = ren.getSelectedBlock(); if(b != null) b.hidden = false; return; }
                  if(line.equals("block.delete")){ ren.deleteSelected(); return; }

                  if(line.startsWith("player.teleport(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("player.teleport requires 3 args");
                      ren.pX = f(a[0]); ren.pY = f(a[1]); ren.pZ = f(a[2]); ren.vY = 0f; return;
                  }

                  if(line.startsWith("player.rotate(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 2) throw new Exception("player.rotate requires 2 args");
                      ren.rY = f(a[0]); ren.rX = f(a[1]); return;
                  }

                  if(line.startsWith("phone.toast(") && line.endsWith(")")){
                      String[] a = argsText(line);
                      if(a.length != 1) throw new Exception("phone.toast requires 1 arg");
                      host.toast(stripQuotes(a[0])); return;
                  }

                  if(line.startsWith("phone.grid(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 1) throw new Exception("phone.grid requires 1 arg");
                      ren.gridEnabled = parseBool(a[0]); return;
                  }

                  if(line.startsWith("block.color(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("block.color requires 3 args");
                      Block b = ren.getSelectedBlock();
                      if(b == null) throw new Exception("No selected block");
                      b.r = clamp01(f(a[0])); b.g = clamp01(f(a[1])); b.b = clamp01(f(a[2])); return;
                  }

                  if(line.startsWith("block.move(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("block.move requires 3 args");
                      ren.moveSelected(f(a[0]), f(a[1]), f(a[2])); return;
                  }

                  if(line.startsWith("block.size(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("block.size requires 3 args");
                      Block b = ren.getSelectedBlock();
                      if(b == null) throw new Exception("No selected block");
                      b.sx = Math.max(0.5f, f(a[0])); b.sy = Math.max(0.5f, f(a[1])); b.sz = Math.max(0.5f, f(a[2]));
                      if(b.y - b.sy / 2f < 0f) b.y = b.sy / 2f; return;
                  }

                  if(line.startsWith("block.teleport(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("block.teleport requires 3 args");
                      Block b = ren.getSelectedBlock();
                      if(b == null) throw new Exception("No selected block");
                      b.x = f(a[0]); b.y = f(a[1]); b.z = f(a[2]);
                      if(b.y - b.sy / 2f < 0f) b.y = b.sy / 2f; return;
                  }

                  if(line.startsWith("world.place(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 9) throw new Exception("world.place requires 9 args");
                      Block b = new Block(f(a[0]),f(a[1]),f(a[2]),Math.max(0.5f,f(a[3])),Math.max(0.5f,f(a[4])),Math.max(0.5f,f(a[5])),clamp01(f(a[6])),clamp01(f(a[7])),clamp01(f(a[8])));
                      ren.blocks.add(b); return;
                  }

                  throw new Exception("Unknown command: " + line);
              }

              private static boolean parseBool(String s){ s=s.trim().toLowerCase(Locale.US); return s.equals("true")||s.equals("1")||s.equals("on"); }
              private static String[] args(String line){ int s=line.indexOf('('),e=line.lastIndexOf(')'); String body=line.substring(s+1,e).trim(); if(body.isEmpty())return new String[0]; String[] arr=body.split(","); for(int i=0;i<arr.length;i++)arr[i]=arr[i].trim(); return arr; }
              private static String[] argsText(String line){ int s=line.indexOf('('),e=line.lastIndexOf(')'); String body=line.substring(s+1,e).trim(); if(body.isEmpty())return new String[0]; return new String[]{body}; }
              private static String stripQuotes(String s){ s=s.trim(); if((s.startsWith("\"")||s.startsWith("'"))&&(s.endsWith("\"")||s.endsWith("'")))return s.substring(1,s.length()-1); return s; }
              private static float f(String s){ return Float.parseFloat(s.trim()); }
              private static float clamp01(float v){ return Math.max(0f,Math.min(1f,v)); }
          }
          SCRIPT

          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;

          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              public interface EventHost {
                  void runBlockScript(Block block, String script);
              }

              // ANIM PACKS: 0=Default, 1=Fly Pack
              public static final int ANIM_DEFAULT = 0;
              public static final int ANIM_FLY     = 1;

              private final float[] proj=new float[16], view=new float[16], model=new float[16], vp=new float[16];
              public float pX=0, pY=6, pZ=15, rY=0, rX=0, jX=0, jY=0, vY=0;
              public boolean isEngineMode=false, isPlayingLevel=false;
              public boolean gridEnabled=true;
              private int prog, skyProg;
              private FloatBuffer vBuf, nBuf, skyBuf;
              public float blockR=0.8f, blockG=0.3f, blockB=0.3f, blockSX=4, blockSY=4, blockSZ=4, placeDist=6f;
              public final float gridSize = 2f;
              public CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              public int selectedIndex = -1;
              public float screenW=1, screenH=1;
              public EventHost eventHost;

              private static final float FLOOR_Y=0f, PLAYER_HEIGHT=5.2f, PLAYER_RADIUS=0.85f;

              private float camX=0, camY=0, camZ=0;
              private long lastTimeNs = 0L;
              private float walkPhase = 0f;
              private float idlePhase = 0f;
              private float flyPhase  = 0f;
              private float moveMag = 0f;
              private float charRotation = 0f;

              // Jump animation
              private float jumpPhase = 0f;
              private boolean wasOnGround = true;
              private float saltoAngle = 0f;
              private boolean doingSalto = false;

              public int skinColor = 0;
              public int torsoColor = 1;
              public int legsColor = 2;
              public int faceType = 0;
              public int animPack = 0;

              public Block getSelectedBlock(){
                  if(selectedIndex>=0 && selectedIndex<blocks.size()) return blocks.get(selectedIndex);
                  return null;
              }

              private float snap(float v){
                  if(!gridEnabled) return v;
                  return Math.round(v / gridSize) * gridSize;
              }

              public void loadBuiltInLevel() {
                  blocks.clear();
                  blocks.add(new Block(0,2,-10, 8,4,8, 0.9f,0.2f,0.2f));
              }

              public void runStartScripts(){
                  for(Block b: blocks){
                      if(!b.started){
                          b.started = true;
                          if(eventHost != null && b.onStartScript != null && !b.onStartScript.trim().isEmpty()){
                              eventHost.runBlockScript(b, b.onStartScript);
                          }
                      }
                  }
              }

              public void handleTapBlock(int index){
                  if(index>=0 && index<blocks.size()){
                      Block b = blocks.get(index);
                      if(eventHost != null && b.onTapScript != null && !b.onTapScript.trim().isEmpty()){
                          eventHost.runBlockScript(b, b.onTapScript);
                      }
                  }
              }

              public void placeBlock() {
                  double rad = Math.toRadians(rY);
                  double pitch = Math.toRadians(rX);
                  float vx=(float)(Math.sin(rad)*Math.cos(pitch));
                  float vy=(float)Math.sin(pitch);
                  float vz=(float)(-Math.cos(rad)*Math.cos(pitch));
                  float nx=pX+vx*placeDist, ny=pY+vy*placeDist, nz=pZ+vz*placeDist;
                  nx=snap(nx); ny=snap(ny); nz=snap(nz);
                  if(ny-blockSY/2f<FLOOR_Y) ny=FLOOR_Y+blockSY/2f;
                  blocks.add(new Block(nx,ny,nz, blockSX,blockSY,blockSZ, blockR,blockG,blockB));
              }

              public void deleteSelected() {
                  if(selectedIndex>=0 && selectedIndex<blocks.size()) {
                      blocks.remove(selectedIndex);
                      selectedIndex=-1;
                  }
              }

              public void moveSelected(float dx, float dy, float dz) {
                  if(selectedIndex>=0 && selectedIndex<blocks.size()) {
                      Block b=blocks.get(selectedIndex);
                      b.x=snap(b.x+dx); b.y=snap(b.y+dy); b.z=snap(b.z+dz);
                      if(b.y-b.sy/2f<FLOOR_Y) b.y=FLOOR_Y+b.sy/2f;
                  }
              }

              public void toggleHideSelected() {
                  if(selectedIndex>=0 && selectedIndex<blocks.size())
                      blocks.get(selectedIndex).hidden = !blocks.get(selectedIndex).hidden;
              }

              public int raycastBlock(float tx, float ty) {
                  float ndcX=(2f*tx/screenW)-1f, ndcY=1f-(2f*ty/screenH);
                  float[] invP=new float[16], invV=new float[16];
                  Matrix.invertM(invP,0,proj,0); Matrix.invertM(invV,0,view,0);
                  float[] n={ndcX,ndcY,-1,1}, f={ndcX,ndcY,1,1}, t=new float[4];
                  Matrix.multiplyMV(t,0,invP,0,n,0);
                  for(int i=0;i<4;i++) t[i]/=t[3];
                  float[] nW=new float[4]; Matrix.multiplyMV(nW,0,invV,0,t,0);
                  Matrix.multiplyMV(t,0,invP,0,f,0);
                  for(int i=0;i<4;i++) t[i]/=t[3];
                  float[] fW=new float[4]; Matrix.multiplyMV(fW,0,invV,0,t,0);
                  float dx=fW[0]-nW[0], dy=fW[1]-nW[1], dz=fW[2]-nW[2];
                  float len=(float)Math.sqrt(dx*dx+dy*dy+dz*dz);
                  dx/=len; dy/=len; dz/=len;
                  int closest=-1; float cDist=Float.MAX_VALUE;
                  for(int i=0;i<blocks.size();i++){
                      Block b=blocks.get(i);
                      float tmin=(b.minX()-nW[0])/(dx==0?0.0001f:dx), tmax=(b.maxX()-nW[0])/(dx==0?0.0001f:dx);
                      if(tmin>tmax){float tmp=tmin;tmin=tmax;tmax=tmp;}
                      float tymin=(b.minY()-nW[1])/(dy==0?0.0001f:dy), tymax=(b.maxY()-nW[1])/(dy==0?0.0001f:dy);
                      if(tymin>tymax){float tmp=tymin;tymin=tymax;tymax=tmp;}
                      if(tmin>tymax||tymin>tmax) continue;
                      if(tymin>tmin)tmin=tymin; if(tymax<tmax)tmax=tymax;
                      float tzmin=(b.minZ()-nW[2])/(dz==0?0.0001f:dz), tzmax=(b.maxZ()-nW[2])/(dz==0?0.0001f:dz);
                      if(tzmin>tzmax){float tmp=tzmin;tzmin=tzmax;tzmax=tmp;}
                      if(tmin>tzmax||tzmin>tmax) continue;
                      if(tzmin>tmin)tmin=tzmin;
                      if(tmin>0&&tmin<cDist){cDist=tmin;closest=i;}
                  }
                  return closest;
              }

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  GLES30.glDepthFunc(GLES30.GL_LEQUAL);

                  String vs="#version 300 es\n"+
                      "layout(location=0)in vec4 aP;layout(location=1)in vec3 aN;"+
                      "uniform mat4 uMVP,uM;out vec3 vN,vP;"+
                      "void main(){vP=vec3(uM*aP);vN=normalize(mat3(uM)*aN);gl_Position=uMVP*aP;}";

