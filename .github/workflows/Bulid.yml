name: GameScriptPro
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create GameScript Pro
        run: |
          mkdir -p app/src/main/java/com/gamescript/pro
          mkdir -p app/src/main/res/{layout,values,drawable,menu,xml}
          mkdir -p app/src/main/assets

          cat <<'EOF' > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { 
              id 'com.android.application'
          }
          android {
              namespace 'com.gamescript.pro'
              compileSdk 34
              defaultConfig { 
                  applicationId 'com.gamescript.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.documentfile:documentfile:1.0.1'
          }
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#2196F3</item>
                  <item name="colorPrimaryDark">#1976D2</item>
                  <item name="colorAccent">#FF5722</item>
              </style>
              <style name="GameTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:statusBarColor">#000000</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="primary">#2196F3</color>
              <color name="primary_dark">#1976D2</color>
              <color name="accent">#FF5722</color>
              <color name="white">#FFFFFF</color>
              <color name="black">#000000</color>
              <color name="editor_bg">#1E1E1E</color>
              <color name="debug_bg">#CC000000</color>
              <color name="debug_text">#00FF00</color>
          </resources>
          EOF

          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical">
              
              <com.google.android.material.tabs.TabLayout
                  android:id="@+id/tabs"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:background="@color/primary"
                  android:theme="@style/ThemeOverlay.AppCompat.Dark"/>
              
              <FrameLayout
                  android:id="@+id/container"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"/>
          </LinearLayout>
          EOF

          cat <<'EOF' > app/src/main/res/layout/fragment_editor.xml
