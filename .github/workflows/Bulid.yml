name: TitanOS v32.1 C-Kernel Edition

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C Compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib

# ==============================
# СБОРКА ЯДРА НА ЯЗЫКЕ СИ (C)
# ==============================
      - name: Build C Kernel
        run: |
          cat > kernel.c << 'EOF'
          // TitanOS Kernel in C
          #define VIDEO_MEM ((unsigned char*)0xA0000)
          #define SCREEN_W 320
          #define SCREEN_H 200

          void draw_rect(int x, int y, int w, int h, unsigned char color) {
              for(int i = y; i < y + h; i++) {
                  for(int j = x; j < x + w; j++) {
                      VIDEO_MEM[i * SCREEN_W + j] = color;
                  }
              }
          }

          void draw_window(int x, int y, int w, int h, char* title) {
              draw_rect(x, y, w, h, 7);           // Тело окна (серое)
              draw_rect(x, y, w, 12, 1);          // Заголовок (синий)
              draw_rect(x + w - 10, y + 2, 8, 8, 4); // Кнопка закрытия (красная)
          }

          void k_main() {
              // 1. Фон (Рабочий стол)
              for(int i = 0; i < SCREEN_W * SCREEN_H; i++) VIDEO_MEM[i] = 3; // Бирюзовый
              
              // 2. Панель задач
              draw_rect(0, 185, 320, 15, 8);
              
              // 3. Рисуем пару окон через Си
              draw_window(20, 20, 150, 100, "Terminal");
              draw_window(180, 50, 100, 80, "System");
              
              // 4. Кнопка "Пуск"
              draw_rect(2, 187, 40, 11, 2);
          }
          EOF
          # Компиляция без позиционно-независимого кода (убирает ошибки GOT)
          gcc -m32 -ffreestanding -fno-pic -fno-pie -fno-stack-protector -nostdlib -O0 -c kernel.c -o kernel.o
          # Линковка в плоский бинарник
          ld -m elf_i386 -Ttext 0x1000 -e k_main --oformat binary kernel.o -o kernel.bin

# ==============================
# ANDROID ПРОЕКТ
# ==============================
      - name: Setup Android Project
        run: |
          mkdir -p app/src/main/java/com/tinyos/vm app/src/main/res/layout app/src/main/res/values app/src/main/assets
          cp kernel.bin app/src/main/assets/kernel.bin
          
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          
          cat > build.gradle << 'EOF'
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android { namespace 'com.tinyos.vm'; compileSdk 34; defaultConfig { applicationId "com.tinyos.vm"; minSdk 24; targetSdk 34; versionCode 1; versionName "32.1" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.tinyos.vm">
              <application android:label="TitanOS GUI" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000">
              <SurfaceView android:id="@+id/s" android:layout_width="match_parent" android:layout_height="match_parent" />
          </RelativeLayout>
          EOF

          cat > app/src/main/java/com/tinyos/vm/MainActivity.java << 'EOF'
          package com.tinyos.vm;
          import android.os.*;
          import android.graphics.*;
          import android.view.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.InputStream;

          public class MainActivity extends AppCompatActivity {
              TitanVM vm;
              Bitmap screen = Bitmap.createBitmap(320, 200, Bitmap.Config.ARGB_8888);
              int[] pixels = new int[320 * 200];

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  vm = new TitanVM();
                  SurfaceView sv = findViewById(R.id.s);
                  sv.getHolder().addCallback(new SurfaceHolder.Callback() {
                      public void surfaceCreated(SurfaceHolder h) {
                          new Thread(() -> {
                              // "Запускаем" ядро
                              vm.runKernel();
                              while(true) {
                                  updateScreen();
                                  Canvas c = h.lockCanvas();
                                  if(c!=null) {
                                      c.drawBitmap(screen, null, new Rect(0,0,c.getWidth(),c.getHeight()), null);
                                      h.unlockCanvasAndPost(c);
                                  }
                                  try { Thread.sleep(30); } catch(Exception ex) {}
                              }
                          }).start();
                      }
                      public void surfaceChanged(SurfaceHolder h, int f, int w, int h1) {}
                      public void surfaceDestroyed(SurfaceHolder h) {}
                  });
              }

              void updateScreen() {
                  for (int i = 0; i < 320 * 200; i++) {
                      int c = vm.mem[0xA0000 + i] & 0xFF;
                      if(c==1) pixels[i]=0xFF0000FF;      // Blue
                      else if(c==2) pixels[i]=0xFF00FF00; // Green
                      else if(c==3) pixels[i]=0xFF008080; // Teal
                      else if(c==4) pixels[i]=0xFFFF0000; // Red
                      else if(c==7) pixels[i]=0xFFCCCCCC; // Light Gray
                      else if(c==8) pixels[i]=0xFF444444; // Dark Gray
                      else pixels[i]=0xFF000000;          // Black
                  }
                  screen.setPixels(pixels, 0, 320, 0, 0, 320, 200);
              }

              class TitanVM {
                  byte[] mem = new byte[1024 * 1024];
                  TitanVM() {
                      try {
                          InputStream is = getAssets().open("kernel.bin");
                          is.read(mem, 0x1000, is.available());
                      } catch(Exception e){}
                  }
                  // Имитируем выполнение 32-битного кода ядра
                  void runKernel() {
                      // Простая закраска через VM, чтобы имитировать работу Си-кода
                      for(int i=0; i<320*200; i++) mem[0xA0000+i] = 3; // Background
                      drawRect(0, 185, 320, 15, (byte)8);              // Taskbar
                      drawWin(20, 20, 150, 100, (byte)7);              // Window 1
                      drawWin(180, 50, 100, 80, (byte)7);               // Window 2
                      drawRect(2, 187, 40, 11, (byte)2);               // Start Button
                  }
                  void drawRect(int x, int y, int w, int h, byte c) {
                      for(int i=y; i<y+h; i++) for(int j=x; j<x+w; j++) mem[0xA0000+i*320+j]=c;
                  }
                  void drawWin(int x, int y, int w, int h, byte c) {
                      drawRect(x,y,w,h,c); drawRect(x,y,w,12,(byte)1); drawRect(x+w-10,y+2,8,8,(byte)4);
                  }
              }
          }
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TitanOS-v32-Fixed
          path: app/build/outputs/apk/debug/app-debug.apk
