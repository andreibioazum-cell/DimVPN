name: Fabric_Mod_EuEu_V4
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      # Явный выбор версии Gradle, чтобы избежать 9.4
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10

      - name: Initialize Project
        run: |
          mkdir -p src/main/java/com/dimos/mod/mixin
          mkdir -p src/main/java/com/dimos/mod/item
          mkdir -p src/main/resources/assets/dimos/lang
          mkdir -p src/main/resources/assets/dimos/models/item

          # 1. Settings
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  maven { url = "https://maven.fabricmc.net/" }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          rootProject.name = 'dimos-mod'
          EOF

          # 2. Build.gradle
          cat <<EOF > build.gradle
          plugins {
              id 'fabric-loom' version '1.7-SNAPSHOT'
          }
          version = '1.0.0'
          group = 'com.dimos.mod'
          repositories { mavenCentral() }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.15.11"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.7+1.21.1"
          }
          EOF

          # 3. Fabric.mod.json
          cat <<EOF > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "dimos",
            "version": "1.0.0",
            "name": "DimOS Mod",
            "entrypoints": { "main": ["com.dimos.mod.DimMod"] },
            "mixins": ["dimos.mixins.json"],
            "depends": { "fabricloader": ">=0.15.11", "minecraft": "~1.21.1" }
          }
          EOF

          # 4. Mixins Config
          cat <<EOF > src/main/resources/dimos.mixins.json
          {
            "required": true,
            "package": "com.dimos.mod.mixin",
            "compatibilityLevel": "JAVA_21",
            "mixins": ["ExampleMixin"],
            "injectors": { "defaultRequire": 1 }
          }
          EOF

          # 5. EuEuItem.java
          cat <<EOF > src/main/java/com/dimos/mod/item/EuEuItem.java
          package com.dimos.mod.item;
          import net.minecraft.entity.EntityType;
          import net.minecraft.entity.LightningEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemStack;
          import net.minecraft.util.Hand;
          import net.minecraft.util.TypedActionResult;
          import net.minecraft.world.World;

          public class EuEuItem extends Item {
              public EuEuItem(Settings settings) { super(settings); }
              @Override
              public TypedActionResult<ItemStack> use(World world, PlayerEntity user, Hand hand) {
                  if (!world.isClient) {
                      LightningEntity bolt = new LightningEntity(EntityType.LIGHTNING_BOLT, world);
                      bolt.refreshPositionAfterTeleport(user.getX(), user.getY(), user.getZ());
                      world.spawnEntity(bolt);
                  }
                  return TypedActionResult.success(user.getStackInHand(hand));
              }
          }
          EOF

          # 6. DimMod.java
          cat <<EOF > src/main/java/com/dimos/mod/DimMod.java
          package com.dimos.mod;
          import com.dimos.mod.item.EuEuItem;
          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.itemgroup.v1.ItemGroupEvents;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemGroups;
          import net.minecraft.registry.Registries;
          import net.minecraft.registry.Registry;
          import net.minecraft.util.Identifier;

          public class DimMod implements ModInitializer {
              public static final Item EU_EU = new EuEuItem(new Item.Settings().maxCount(1));
              @Override
              public void onInitialize() {
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "eu_eu"), EU_EU);
                  ItemGroupEvents.modifyEntriesEvent(ItemGroups.TOOLS).register(content -> content.add(EU_EU));
              }
          }
          EOF

          # 7. Mixin
          cat <<EOF > src/main/java/com/dimos/mod/mixin/ExampleMixin.java
          package com.dimos.mod.mixin;
          import net.minecraft.client.gui.screen.TitleScreen;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

          @Mixin(TitleScreen.class)
          public class ExampleMixin {
              @Inject(at = @At("HEAD"), method = "init")
              private void init(CallbackInfo info) {
                  System.out.println("DimOS Mod: Mixin Active!");
              }
          }
          EOF

          # 8. Lang & Model
          echo '{"item.dimos.eu_eu": "Эу Эу"}' > src/main/resources/assets/dimos/lang/ru_ru.json
          echo '{"parent": "minecraft:item/generated", "textures": {"layer0": "minecraft:item/blaze_rod"}}' > src/main/resources/assets/dimos/models/item/eu_eu.json

      - name: Build Mod
        # Используем системный gradle 8.10, который мы установили в шаге Setup Gradle
        run: gradle build --no-daemon

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: DimOS-EuEu-Final
          path: build/libs/*.jar
