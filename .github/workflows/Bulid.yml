                  drawM(prog,uM,uMVP,uC,0f,0.5f+0.5f*glowPulse,1f,0.8f*glowPulse);
                  // Правое сопло
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,charRotation,0,1,0);Matrix.rotateM(model,0,bodyTiltX,1,0,0);
                  Matrix.translateM(model,0,0.3f,legH+torsoH/2f-0.65f,-torsoD/2f-0.68f);
                  Matrix.scaleM(model,0,0.3f,0.3f+0.1f*(float)Math.sin(flyPhase*8f+1f),0.3f);
                  drawM(prog,uM,uMVP,uC,0f,0.5f+0.5f*glowPulse,1f,0.8f*glowPulse);
                  GLES30.glDisable(GLES30.GL_BLEND);
              }

              private void drawFace(int uM,int uMVP,int uC,float footY,float rot){
                  drawFaceWithTilt(uM,uMVP,uC,footY,rot,0f);
              }

              private void drawFaceWithTilt(int uM,int uMVP,int uC,float footY,float rot,float tiltX){
                  final float legH=1.6f,torsoH=1.8f,headS=1.15f;
                  float faceZ=headS/2f+0.01f;
                  float eyeS=headS*0.15f,eyeY=legH+torsoH+headS/2f+headS*0.15f;
                  float eyeX=headS*0.18f,mouthY=legH+torsoH+headS/2f-headS*0.15f;

                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,rot,0,1,0);Matrix.rotateM(model,0,tiltX,1,0,0);
                  Matrix.translateM(model,0,-eyeX,eyeY,faceZ);Matrix.scaleM(model,0,eyeS,eyeS,0.02f);
                  drawM(prog,uM,uMVP,uC,0,0,0,1f);

                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,rot,0,1,0);Matrix.rotateM(model,0,tiltX,1,0,0);
                  Matrix.translateM(model,0,eyeX,eyeY,faceZ);Matrix.scaleM(model,0,eyeS,eyeS,0.02f);
                  drawM(prog,uM,uMVP,uC,0,0,0,1f);

                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,pX,footY,pZ);
                  Matrix.rotateM(model,0,rot,0,1,0);Matrix.rotateM(model,0,tiltX,1,0,0);
                  Matrix.translateM(model,0,0,mouthY,faceZ);
                  if(faceType==0){Matrix.scaleM(model,0,headS*.4f,headS*.08f,.02f);drawM(prog,uM,uMVP,uC,0,0,0,1f);}
                  else if(faceType==1){Matrix.scaleM(model,0,headS*.5f,headS*.12f,.02f);drawM(prog,uM,uMVP,uC,1f,0,0,1f);}
                  else{Matrix.scaleM(model,0,headS*.1f,headS*.1f,.02f);drawM(prog,uM,uMVP,uC,0,0,0,1f);}
              }

              private void drawM(int p2,int uM,int uMVP,int uC,float r,float g,float b,float a){
                  GLES30.glUniformMatrix4fv(uM,1,false,model,0);
                  float[]res=new float[16];Matrix.multiplyMM(res,0,proj,0,view,0);Matrix.multiplyMM(res,0,res,0,model,0);
                  GLES30.glUniformMatrix4fv(uMVP,1,false,res,0);
                  GLES30.glUniform4f(uC,r,g,b,a);
                  for(int i=0;i<6;i++)GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }

              private int mkProg(String v,String f){int p=GLES30.glCreateProgram();GLES30.glAttachShader(p,mkSh(35633,v));GLES30.glAttachShader(p,mkSh(35632,f));GLES30.glLinkProgram(p);return p;}
              private int mkSh(int t,String s){int sh=GLES30.glCreateShader(t);GLES30.glShaderSource(sh,s);GLES30.glCompileShader(sh);return sh;}
          }
