name: Build JARVIS Silent

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/jarvis/silent
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/assets

      - name: Download Vosk model
        run: |
          cd app/src/main/assets
          wget -q https://alphacephei.com/vosk/models/vosk-model-small-ru-0.22.zip
          unzip -q vosk-model-small-ru-0.22.zip
          mv vosk-model-small-ru-0.22 model
          rm vosk-model-small-ru-0.22.zip

      - name: Generate gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

      - name: Generate AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.jarvis.silent">
              
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              
              <application
                  android:label="J.A.R.V.I.S"
                  android:theme="@android:style/Theme.DeviceDefault.Light"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="false">
                  
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <service
                      android:name=".JarvisService"
                      android:exported="false"
                      android:foregroundServiceType="microphone" />
              </application>
          </manifest>
          EOF

      - name: Generate MainActivity.java
        run: |
          cat > app/src/main/java/com/jarvis/silent/MainActivity.java << 'EOF'
          package com.jarvis.silent;
          
          import android.app.Activity;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.ScrollView;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import android.graphics.Color;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          
          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST_CODE = 100;
              private LinearLayout logPanel;
              private TextView statusText;
              private Button startBtn, stopBtn;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  ScrollView scroll = new ScrollView(this);
                  LinearLayout main = new LinearLayout(this);
                  main.setOrientation(LinearLayout.VERTICAL);
                  main.setPadding(40, 40, 40, 40);
                  
                  TextView title = new TextView(this);
                  title.setText("=== J.A.R.V.I.S SILENT ===");
                  title.setTextSize(24);
                  title.setTextColor(Color.rgb(0, 100, 200));
                  title.setPadding(0, 0, 0, 20);
                  
                  statusText = new TextView(this);
                  statusText.setText("Статус: Остановлен");
                  statusText.setTextSize(16);
                  statusText.setTextColor(Color.GRAY);
                  statusText.setPadding(0, 0, 0, 20);
                  
                  LinearLayout buttonRow = new LinearLayout(this);
                  buttonRow.setOrientation(LinearLayout.HORIZONTAL);
                  
                  startBtn = new Button(this);
                  startBtn.setText("АКТИВИРОВАТЬ");
                  startBtn.setBackgroundColor(Color.rgb(0, 150, 0));
                  startBtn.setTextColor(Color.WHITE);
                  
                  stopBtn = new Button(this);
                  stopBtn.setText("ДЕАКТИВИРОВАТЬ");
                  stopBtn.setBackgroundColor(Color.rgb(150, 0, 0));
                  stopBtn.setTextColor(Color.WHITE);
                  stopBtn.setEnabled(false);
                  
                  buttonRow.addView(startBtn);
                  buttonRow.addView(stopBtn);
                  
                  logPanel = new LinearLayout(this);
                  logPanel.setOrientation(LinearLayout.VERTICAL);
                  logPanel.setBackgroundColor(Color.LTGRAY);
                  logPanel.setPadding(20, 20, 20, 20);
                  
                  main.addView(title);
                  main.addView(statusText);
                  main.addView(buttonRow);
                  main.addView(logPanel);
                  scroll.addView(main);
                  setContentView(scroll);
                  
                  createNotificationChannel();
                  checkPermissions();
                  
                  startBtn.setOnClickListener(v -> startService());
                  stopBtn.setOnClickListener(v -> stopService());
                  
                  addLog("[*] J.A.R.V.I.S SILENT");
                  addLog("[*] На нераспознанные команды - молчит");
              }
              
              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          "jarvis_channel",
                          "J.A.R.V.I.S",
                          NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) manager.createNotificationChannel(channel);
                  }
              }
              
              private void checkPermissions() {
                  String[] permissions = {
                      android.Manifest.permission.RECORD_AUDIO,
                      android.Manifest.permission.POST_NOTIFICATIONS
                  };
                  
                  boolean allGranted = true;
                  for (String perm : permissions) {
                      if (ContextCompat.checkSelfPermission(this, perm) != PackageManager.PERMISSION_GRANTED) {
                          allGranted = false;
                          break;
                      }
                  }
                  
                  if (!allGranted) {
                      ActivityCompat.requestPermissions(this, permissions, PERMISSION_REQUEST_CODE);
                  }
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      if (!Settings.canDrawOverlays(this)) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                              Uri.parse("package:" + getPackageName()));
                          startActivity(intent);
                      }
                  }
              }
              
              private void startService() {
                  Intent intent = new Intent(this, JarvisService.class);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(intent);
                  } else {
                      startService(intent);
                  }
                  statusText.setText("Статус: Активен (слушаю)");
                  statusText.setTextColor(Color.GREEN);
                  startBtn.setEnabled(false);
                  stopBtn.setEnabled(true);
                  addLog("[+] J.A.R.V.I.S активирован");
              }
              
              private void stopService() {
                  Intent intent = new Intent(this, JarvisService.class);
                  stopService(intent);
                  statusText.setText("Статус: Остановлен");
                  statusText.setTextColor(Color.GRAY);
                  startBtn.setEnabled(true);
                  stopBtn.setEnabled(false);
                  addLog("[-] J.A.R.V.I.S деактивирован");
              }
              
              private void addLog(String msg) {
                  runOnUiThread(() -> {
                      TextView tv = new TextView(this);
                      tv.setText(msg);
                      tv.setTextSize(12);
                      tv.setTextColor(Color.BLACK);
                      tv.setPadding(0, 3, 0, 3);
                      logPanel.addView(tv);
                  });
              }
              
              @Override
              public void onRequestPermissionsResult(int requestCode, String[] permissions, int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      for (int i = 0; i < grantResults.length; i++) {
                          if (grantResults[i] != PackageManager.PERMISSION_GRANTED) {
                              Toast.makeText(this, "Разрешение " + permissions[i] + " необходимо!", Toast.LENGTH_LONG).show();
                          }
                      }
                  }
              }
          }
          EOF

      - name: Generate JarvisService.java (Vosk + молчание)
        run: |
          cat > app/src/main/java/com/jarvis/silent/JarvisService.java << 'EOF'
          package com.jarvis.silent;
          
          import android.app.Notification;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.media.AudioFormat;
          import android.media.AudioRecord;
          import android.media.MediaRecorder;
          import android.os.Build;
          import android.os.IBinder;
          import android.os.Handler;
          import android.os.Looper;
          import android.os.VibrationEffect;
          import android.os.Vibrator;
          import android.speech.tts.TextToSpeech;
          import androidx.core.app.NotificationCompat;
          import org.json.JSONObject;
          import org.vosk.Model;
          import org.vosk.Recognizer;
          import java.io.*;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;
          
          public class JarvisService extends Service {
              private AudioRecord audioRecord;
              private boolean isListening = true;
              private Handler mainHandler;
              private Vibrator vibrator;
              private TextToSpeech tts;
              private Model voskModel;
              private Recognizer recognizer;
              private int sampleRate = 16000;
              private int bufferSize;
              
              @Override
              public void onCreate() {
                  super.onCreate();
                  mainHandler = new Handler(Looper.getMainLooper());
                  vibrator = (Vibrator) getSystemService(Context.VIBRATOR_SERVICE);
                  bufferSize = AudioRecord.getMinBufferSize(sampleRate, 
                      AudioFormat.CHANNEL_IN_MONO, 
                      AudioFormat.ENCODING_PCM_16BIT) * 4;
                  
                  // TTS
                  tts = new TextToSpeech(this, status -> {
                      if (status == TextToSpeech.SUCCESS) {
                          tts.setLanguage(new Locale("ru", "RU"));
                          tts.setSpeechRate(0.9f);
                      }
                  });
                  
                  // Vosk
                  try {
                      File modelDir = new File(getFilesDir(), "model");
                      if (!modelDir.exists()) {
                          copyAssets("model", modelDir);
                      }
                      voskModel = new Model(modelDir.getPath());
                      recognizer = new Recognizer(voskModel, sampleRate);
                  } catch (Exception e) {}
              }
              
              private void copyAssets(String assetDir, File targetDir) throws IOException {
                  targetDir.mkdirs();
                  String[] files = getAssets().list(assetDir);
                  if (files != null) {
                      for (String file : files) {
                          InputStream in = getAssets().open(assetDir + "/" + file);
                          File outFile = new File(targetDir, file);
                          FileOutputStream out = new FileOutputStream(outFile);
                          byte[] buffer = new byte[8192];
                          int read;
                          while ((read = in.read(buffer)) != -1) out.write(buffer, 0, read);
                          in.close();
                          out.close();
                      }
                  }
              }
              
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  startForeground(1, createNotification());
                  startListening();
                  return START_STICKY;
              }
              
              private Notification createNotification() {
                  Intent intent = new Intent(this, MainActivity.class);
                  PendingIntent pendingIntent = PendingIntent.getActivity(this, 0, intent, 
                      PendingIntent.FLAG_UPDATE_CURRENT | PendingIntent.FLAG_IMMUTABLE);
                  
                  return new NotificationCompat.Builder(this, "jarvis_channel")
                      .setContentTitle("J.A.R.V.I.S")
                      .setContentText("Активен. Слушаю...")
                      .setSmallIcon(android.R.drawable.ic_btn_speak_now)
                      .setContentIntent(pendingIntent)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .build();
              }
              
              private void startListening() {
                  audioRecord = new AudioRecord(MediaRecorder.AudioSource.VOICE_RECOGNITION, sampleRate,
                      AudioFormat.CHANNEL_IN_MONO, AudioFormat.ENCODING_PCM_16BIT, bufferSize);
                  audioRecord.startRecording();
                  
                  Thread listenThread = new Thread(() -> {
                      byte[] buffer = new byte[bufferSize];
                      while (isListening) {
                          int read = audioRecord.read(buffer, 0, bufferSize);
                          if (read > 0 && recognizer != null) {
                              if (recognizer.acceptWaveform(buffer, read)) {
                                  String result = recognizer.getResult();
                                  try {
                                      JSONObject json = new JSONObject(result);
                                      String text = json.getString("text");
                                      if (!text.isEmpty()) {
                                          mainHandler.post(() -> executeCommand(text));
                                      }
                                  } catch (Exception e) {}
                              }
                          }
                          try { Thread.sleep(10); } catch (Exception e) {}
                      }
                  });
                  listenThread.start();
              }
              
              private void speak(String text) {
                  if (tts != null && text != null && !text.isEmpty()) {
                      tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, null);
                  }
              }
              
              private void openApp(String packageName) {
                  try {
                      Intent intent = getPackageManager().getLaunchIntentForPackage(packageName);
                      if (intent != null) {
                          intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                          startActivity(intent);
                      }
                  } catch (Exception e) {}
              }
              
              private void typeText(String text) {
                  try {
                      android.content.ClipboardManager clipboard = (android.content.ClipboardManager) 
                          getSystemService(Context.CLIPBOARD_SERVICE);
                      android.content.ClipData clip = android.content.ClipData.newPlainText("Jarvis", text);
                      clipboard.setPrimaryClip(clip);
                      speak("Текст скопирован");
                  } catch (Exception e) {}
              }
              
              private void vibrate(long ms) {
                  if (vibrator != null) {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          vibrator.vibrate(VibrationEffect.createOneShot(ms, VibrationEffect.DEFAULT_AMPLITUDE));
                      } else {
                          vibrator.vibrate(ms);
                      }
                  }
              }
              
              private void executeCommand(String command) {
                  String lower = command.toLowerCase().trim();
                  
                  // ОТКРЫТИЕ ПРИЛОЖЕНИЙ
                  if (lower.contains("ютуб") || lower.contains("youtube")) {
                      speak("Открываю YouTube");
                      openApp("com.google.android.youtube");
                  }
                  else if (lower.contains("телеграм") || lower.contains("telegram")) {
                      speak("Открываю Telegram");
                      openApp("org.telegram.messenger");
                  }
                  else if (lower.contains("вотсап") || lower.contains("whatsapp")) {
                      speak("Открываю WhatsApp");
                      openApp("com.whatsapp");
                  }
                  else if (lower.contains("инстаграм") || lower.contains("instagram")) {
                      speak("Открываю Instagram");
                      openApp("com.instagram.android");
                  }
                  else if (lower.contains("карты") || lower.contains("навигатор")) {
                      speak("Открываю Карты");
                      openApp("com.google.android.apps.maps");
                  }
                  else if (lower.contains("хром") || lower.contains("chrome")) {
                      speak("Открываю Chrome");
                      openApp("com.android.chrome");
                  }
                  else if (lower.contains("спотифай") || lower.contains("spotify") || lower.contains("музыка")) {
                      speak("Открываю Spotify");
                      openApp("com.spotify.music");
                  }
                  else if (lower.contains("настройки") || lower.contains("settings")) {
                      speak("Открываю Настройки");
                      openApp("com.android.settings");
                  }
                  else if (lower.contains("калькулятор")) {
                      speak("Открываю Калькулятор");
                      openApp("com.google.android.calculator");
                  }
                  
                  // НАПИСАТЬ ТЕКСТ
                  else if (lower.startsWith("напиши") || lower.startsWith("напечатай") || lower.startsWith("введи")) {
                      String textToType = command.replaceFirst("напиши|напечатай|введи", "").trim();
                      if (textToType.isEmpty()) textToType = "текст от Jarvis";
                      speak("Пишу: " + textToType);
                      typeText(textToType);
                  }
                  
                  // ВРЕМЯ
                  else if (lower.contains("время") || lower.contains("сколько времени") || lower.contains("который час")) {
                      String time = new SimpleDateFormat("HH:mm", Locale.getDefault()).format(new Date());
                      speak("Сейчас " + time);
                  }
                  
                  // ПОГОДА
                  else if (lower.contains("погода") || lower.contains("какая погода")) {
                      speak("Сегодня солнечно, 22 градуса");
                  }
                  
                  // ВИБРАЦИЯ
                  else if (lower.contains("вибрация") || lower.contains("завибрируй")) {
                      speak("Вибрация");
                      vibrate(300);
                  }
                  
                  // ПОМОЩЬ
                  else if (lower.contains("помощь") || lower.contains("команды")) {
                      speak("Я умею: открывать приложения, писать текст, показывать время и погоду, вибрировать. Скажите стоп чтобы выключить");
                  }
                  
                  // СТОП
                  else if (lower.contains("стоп") || lower.contains("выключись") || lower.contains("деактивируй")) {
                      speak("До свидания");
                      stopSelf();
                  }
                  
                  // НЕРАСПОЗНАННЫЕ КОМАНДЫ - МОЛЧИМ
                  else {
                      // Ничего не говорим
                  }
              }
              
              @Override
              public void onDestroy() {
                  isListening = false;
                  if (audioRecord != null) audioRecord.release();
                  if (recognizer != null) recognizer.close();
                  if (voskModel != null) voskModel.close();
                  if (tts != null) tts.shutdown();
                  super.onDestroy();
              }
              
              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

      - name: Generate build.gradle (app) - с JitPack
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.jarvis.silent"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }
              
              namespace 'com.jarvis.silent'
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core:1.12.0'
              implementation 'com.alphacephei:vosk-android:0.9.0'
          }
          EOF

      - name: Generate top-level build.gradle (с JitPack)
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.4'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          EOF

      - name: Generate settings.gradle
        run: echo "include ':app'" > settings.gradle

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q gradle-8.0-bin.zip
          ./gradle-8.0/bin/gradle wrapper
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-Silent
          path: app/build/outputs/apk/debug/app-debug.apk
