                      "in vec3 vN,vP;uniform vec3 camP;uniform vec4 uC;uniform float uSel;out vec4 fC;"+
                      "void main(){"+
                      "vec3 n=normalize(vN),vD=normalize(camP-vP),lD=normalize(vec3(.4,1.,.2));"+
                      "float diff=max(dot(n,lD),0.),ao=clamp(vP.y*.08+.6,.3,1.);"+
                      "vec3 h=normalize(lD+vD);float spec=pow(max(dot(n,h),0.),48.)*.6;"+
                      "vec3 col=uC.rgb;if(uSel>.5)col+=vec3(0.,.5,.8);"+
                      "vec3 amb=vec3(.05,.08,.13)*ao;vec3 fin=col*(diff*vec3(1.,.97,.92)+amb)+spec;"+
                      "float dist=length(camP-vP),fog=1.-exp(-dist*.006);"+
                      "vec3 fogCol=vec3(.02,.06,.14);"+
                      "vec3 c=mix(fin,fogCol,clamp(fog,0.,.82));"+
