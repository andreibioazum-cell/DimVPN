name: Enjoer_7.2_Megafix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat > app/src/main/res/values/themes.xml << 'THEMES'
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          THEMES

          cat > app/src/main/res/drawable/btn_blue.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#101820"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/btn_blue_filled.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#00BFFF"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/btn_red.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#101820"/>
            <stroke android:width="2dp" android:color="#FF4444"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/btn_green.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#101820"/>
            <stroke android:width="2dp" android:color="#44FF44"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/joy_base.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#CC101820"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/joy_stick.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#00BFFF"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/panel_bg.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#E6101820"/>
            <stroke android:width="1dp" android:color="#00BFFF"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/color_btn.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#FFF"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/crosshair.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#FF00BFFF"/>
            <size android:width="10dp" android:height="10dp"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/ridix_bg.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#CC0A1428"/>
            <stroke android:width="2dp" android:color="#FFD700"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/inv_slot.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="6dp"/>
            <solid android:color="#DD101820"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          ENDF

          cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#02050A">

              <android.opengl.GLSurfaceView
                  android:id="@+id/gl_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>

              <RelativeLayout android:id="@+id/game_ui" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/look_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <Button android:id="@+id/btn_menu" android:layout_width="80dp" android:layout_height="50dp" android:layout_margin="10dp" android:text="Menu" android:textSize="13sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                  
                  <LinearLayout android:id="@+id/inventory_bar" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_centerHorizontal="true" android:layout_marginBottom="120dp" android:orientation="horizontal" android:background="@drawable/panel_bg" android:padding="6dp">
                      <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:layout_margin="2dp">
                          <TextView android:id="@+id/inv_slot_0" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/inv_slot" android:gravity="center" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold"/>
                          <TextView android:layout_width="50dp" android:layout_height="wrap_content" android:text="1" android:gravity="center" android:textColor="#00BFFF" android:textSize="10sp" android:layout_marginTop="2dp"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:layout_margin="2dp">
                          <TextView android:id="@+id/inv_slot_1" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/inv_slot" android:gravity="center" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold"/>
                          <TextView android:layout_width="50dp" android:layout_height="wrap_content" android:text="2" android:gravity="center" android:textColor="#00BFFF" android:textSize="10sp" android:layout_marginTop="2dp"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:layout_margin="2dp">
                          <TextView android:id="@+id/inv_slot_2" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/inv_slot" android:gravity="center" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold"/>
                          <TextView android:layout_width="50dp" android:layout_height="wrap_content" android:text="3" android:gravity="center" android:textColor="#00BFFF" android:textSize="10sp" android:layout_marginTop="2dp"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:layout_margin="2dp">
                          <TextView android:id="@+id/inv_slot_3" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/inv_slot" android:gravity="center" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold"/>
                          <TextView android:layout_width="50dp" android:layout_height="wrap_content" android:text="4" android:gravity="center" android:textColor="#00BFFF" android:textSize="10sp" android:layout_marginTop="2dp"/>
                      </LinearLayout>
                  </LinearLayout>
                  
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="126dp" android:layout_height="126dp" android:layout_alignParentBottom="true" android:layout_alignParentLeft="true" android:layout_marginLeft="36dp" android:layout_marginBottom="36dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/joy_stick" android:layout_width="54dp" android:layout_height="54dp" android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base" android:layout_marginLeft="36dp" android:layout_marginTop="36dp" android:background="@drawable/joy_stick"/>
                  <Button android:id="@+id/btn_jump" android:layout_width="90dp" android:layout_height="90dp" android:layout_alignParentRight="true" android:layout_alignParentBottom="true" android:layout_marginRight="40dp" android:layout_marginBottom="40dp" android:text="Jump" android:textSize="14sp" android:background="@drawable/btn_blue" android:textColor="#FFF"/>
                  <View android:id="@+id/crosshair_game" android:layout_width="10dp" android:layout_height="10dp" android:layout_centerInParent="true" android:background="@drawable/crosshair"/>
              </RelativeLayout>

              <RelativeLayout android:id="@+id/engine_ui" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/engine_touch_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentTop="true" android:orientation="horizontal" android:padding="10dp">
                      <Button android:id="@+id/btn_engine_menu" android:layout_width="80dp" android:layout_height="50dp" android:text="Menu" android:textSize="13sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                      <View android:layout_width="0dp" android:layout_height="1dp" android:layout_weight="1"/>
                      <Button android:id="@+id/btn_scripts" android:layout_width="90dp" android:layout_height="50dp" android:text="Scripts" android:textSize="12sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginRight="8dp"/>
                      <Button android:id="@+id/btn_save" android:layout_width="90dp" android:layout_height="50dp" android:text="Export" android:textSize="12sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginRight="8dp"/>
                      <Button android:id="@+id/btn_play_level" android:layout_width="80dp" android:layout_height="50dp" android:text="Play" android:textSize="13sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                  </LinearLayout>
                  <FrameLayout android:id="@+id/engine_joy_base" android:layout_width="108dp" android:layout_height="108dp" android:layout_alignParentBottom="true" android:layout_alignParentLeft="true" android:layout_marginLeft="27dp" android:layout_marginBottom="27dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/engine_joy_stick" android:layout_width="45dp" android:layout_height="45dp" android:layout_alignLeft="@id/engine_joy_base" android:layout_alignTop="@id/engine_joy_base" android:layout_marginLeft="31dp" android:layout_marginTop="31dp" android:background="@drawable/joy_stick"/>
                  <ScrollView android:layout_width="220dp" android:layout_height="match_parent" android:layout_alignParentRight="true" android:layout_marginTop="70dp" android:layout_marginRight="10dp" android:layout_marginBottom="10dp">
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:background="@drawable/panel_bg" android:padding="10dp">
                          <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Object Type" android:textColor="#FFF" android:textStyle="bold" android:textSize="14sp"/>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="6dp">
                              <Button android:id="@+id/type_block" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Block" android:textSize="11sp" android:background="@drawable/btn_blue_filled" android:textColor="#000"/>
                              <Button android:id="@+id/type_light" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Light" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="4dp">
                              <Button android:id="@+id/type_item" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Item" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                          </LinearLayout>
                          
                          <TextView android:id="@+id/lbl_shape" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Shape" android:textColor="#FFF" android:textStyle="bold" android:layout_marginTop="10dp" android:textSize="14sp"/>
                          <LinearLayout android:id="@+id/shape_panel" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:layout_marginTop="6dp">
                              <Button android:id="@+id/shape_cube" android:layout_width="match_parent" android:layout_height="36dp" android:text="Cube" android:textSize="11sp" android:background="@drawable/btn_blue_filled" android:textColor="#000"/>
                          </LinearLayout>
                          
                          <LinearLayout android:id="@+id/light_panel" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:layout_marginTop="6dp" android:visibility="gone">
                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                                  <Button android:id="@+id/light_point" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Point" android:textSize="11sp" android:background="@drawable/btn_blue_filled" android:textColor="#000"/>
                                  <Button android:id="@+id/light_spot" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Spot" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                              </LinearLayout>
                          </LinearLayout>
                          
                          <LinearLayout android:id="@+id/item_panel" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:layout_marginTop="6dp" android:visibility="gone">
                              <Button android:id="@+id/item_sword" android:layout_width="match_parent" android:layout_height="36dp" android:text="Sword" android:textSize="11sp" android:background="@drawable/btn_blue_filled" android:textColor="#000"/>
                          </LinearLayout>
                          
                          <TextView android:id="@+id/lbl_size" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Size X/Y/Z" android:textColor="#FFF" android:textStyle="bold" android:layout_marginTop="10dp" android:textSize="14sp"/>
                          <LinearLayout android:id="@+id/size_panel" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:layout_marginTop="6dp">
                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                                  <Button android:id="@+id/size_x_minus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="X-" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                                  <Button android:id="@+id/size_x_plus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="X+" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                              </LinearLayout>
                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="4dp">
                                  <Button android:id="@+id/size_y_minus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Y-" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                                  <Button android:id="@+id/size_y_plus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Y+" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                              </LinearLayout>
                              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="4dp">
                                  <Button android:id="@+id/size_z_minus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Z-" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                                  <Button android:id="@+id/size_z_plus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Z+" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                              </LinearLayout>
                              <TextView android:id="@+id/txt_size_info" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="4 x 4 x 4" android:textColor="#AEEBFF" android:layout_marginTop="6dp" android:textSize="12sp"/>
                          </LinearLayout>
                          
                          <TextView android:id="@+id/lbl_intensity" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Intensity" android:textColor="#FFF" android:textStyle="bold" android:layout_marginTop="10dp" android:visibility="gone" android:textSize="14sp"/>
                          <EditText android:id="@+id/et_intensity" android:layout_width="match_parent" android:layout_height="40dp" android:background="@drawable/panel_bg" android:padding="8dp" android:textColor="#FFF" android:textColorHint="#666" android:hint="10" android:inputType="numberDecimal" android:textSize="14sp" android:layout_marginTop="6dp" android:visibility="gone"/>
                          
                          <Button android:id="@+id/btn_grid" android:layout_width="match_parent" android:layout_height="36dp" android:text="Grid: On" android:textSize="11sp" android:background="@drawable/btn_blue_filled" android:textColor="#000" android:layout_marginTop="8dp"/>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center" android:layout_marginTop="8dp">
                              <View android:id="@+id/color_red" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#FF2222"/>
                              <View android:id="@+id/color_green" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#22FF22" android:layout_marginLeft="5dp"/>
                              <View android:id="@+id/color_blue2" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#2288FF" android:layout_marginLeft="5dp"/>
                              <View android:id="@+id/color_yellow" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#FFFF22" android:layout_marginLeft="5dp"/>
                              <View android:id="@+id/color_white" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#FFFFFF" android:layout_marginLeft="5dp"/>
                              <View android:id="@+id/color_black" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#222222" android:layout_marginLeft="5dp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="8dp">
                              <Button android:id="@+id/dist_far" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="12" android:textSize="11sp" android:background="@drawable/btn_blue_filled" android:textColor="#000"/>
                              <Button android:id="@+id/dist_vfar" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="15" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          <Button android:id="@+id/btn_place" android:layout_width="match_parent" android:layout_height="44dp" android:text="+ Place" android:textSize="12sp" android:background="@drawable/btn_blue_filled" android:textColor="#000" android:layout_marginTop="12dp"/>
                          <Button android:id="@+id/btn_hide" android:layout_width="match_parent" android:layout_height="36dp" android:text="Hide" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginTop="8dp" android:visibility="gone"/>
                          <Button android:id="@+id/btn_delete" android:layout_width="match_parent" android:layout_height="36dp" android:text="Delete" android:textSize="11sp" android:background="@drawable/btn_red" android:textColor="#FF4444" android:layout_marginTop="8dp" android:visibility="gone"/>
                          <Button android:id="@+id/btn_deselect" android:layout_width="match_parent" android:layout_height="36dp" android:text="Deselect" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginTop="8dp" android:visibility="gone"/>
                      </LinearLayout>
                  </ScrollView>
                  <LinearLayout android:id="@+id/axis_panel" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_centerHorizontal="true" android:layout_marginBottom="20dp" android:orientation="horizontal" android:background="@drawable/panel_bg" android:padding="6dp" android:visibility="gone">
                      <Button android:id="@+id/axis_x_minus" android:layout_width="44dp" android:layout_height="44dp" android:text="X-" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#FF4444"/>
                      <Button android:id="@+id/axis_x_plus" android:layout_width="44dp" android:layout_height="44dp" android:text="X+" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#FF4444" android:layout_marginLeft="4dp"/>
                      <Button android:id="@+id/axis_y_minus" android:layout_width="44dp" android:layout_height="44dp" android:text="Y-" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#44FF44" android:layout_marginLeft="10dp"/>
                      <Button android:id="@+id/axis_y_plus" android:layout_width="44dp" android:layout_height="44dp" android:text="Y+" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#44FF44" android:layout_marginLeft="4dp"/>
                      <Button android:id="@+id/axis_z_minus" android:layout_width="44dp" android:layout_height="44dp" android:text="Z-" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#4488FF" android:layout_marginLeft="10dp"/>
                      <Button android:id="@+id/axis_z_plus" android:layout_width="44dp" android:layout_height="44dp" android:text="Z+" android:textSize="11sp" android:background="@drawable/btn_blue" android:textColor="#4488FF" android:layout_marginLeft="4dp"/>
                  </LinearLayout>
                  <View android:id="@+id/crosshair_engine" android:layout_width="10dp" android:layout_height="10dp" android:layout_centerInParent="true" android:background="@drawable/crosshair"/>
              </RelativeLayout>

              <RelativeLayout android:id="@+id/playtest_ui" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/playtest_look_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <Button android:id="@+id/btn_stop_playtest" android:layout_width="80dp" android:layout_height="50dp" android:layout_margin="10dp" android:text="Stop" android:textSize="13sp" android:background="@drawable/btn_red" android:textColor="#FF4444"/>
                  
                  <LinearLayout android:id="@+id/playtest_inventory_bar" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_centerHorizontal="true" android:layout_marginBottom="120dp" android:orientation="horizontal" android:background="@drawable/panel_bg" android:padding="6dp">
                      <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:layout_margin="2dp">
                          <TextView android:id="@+id/playtest_inv_slot_0" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/inv_slot" android:gravity="center" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold"/>
                          <TextView android:layout_width="50dp" android:layout_height="wrap_content" android:text="1" android:gravity="center" android:textColor="#00BFFF" android:textSize="10sp" android:layout_marginTop="2dp"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:layout_margin="2dp">
                          <TextView android:id="@+id/playtest_inv_slot_1" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/inv_slot" android:gravity="center" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold"/>
                          <TextView android:layout_width="50dp" android:layout_height="wrap_content" android:text="2" android:gravity="center" android:textColor="#00BFFF" android:textSize="10sp" android:layout_marginTop="2dp"/>
                      </LinearLayout>
                      <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:layout_margin="2dp">
                          <TextView android:id="@+id/playtest_inv_slot_2" android:layout_width="50dp" android:layout_height="50dp" android:background="@drawable/inv_slot" android:gravity="center" android:textColor="#FFF" android:textSize="20sp" android:textStyle="bold"/>
