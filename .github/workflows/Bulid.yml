              <TextView android:id="@+id/avatar" android:layout_width="44dp" android:layout_height="44dp" android:background="@drawable/bg_avatar" android:gravity="center" android:textColor="#FFF" android:textSize="18sp" android:textStyle="bold"/>
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_marginLeft="16dp" android:orientation="vertical">
                  <TextView android:id="@+id/name" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#000" android:textSize="16sp"/>
                  <TextView android:id="@+id/status" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#4CAF50" android:textSize="13sp" android:visibility="gone"/>
