name: TinyOS Simple
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm qemu-system-x86

      - name: Build Kernel
        run: |
          cat > kernel.asm << 'KERNEL'
          [bits 32]
          [org 0x10000]
          
          start:
              mov ax, 0x0013
              int 0x10
              
              mov esi, msg
              call print
              
              mov esi, prompt
              call print
          
          main_loop:
              xor ax, ax
              int 0x16
              
              cmp al, 0x0D
              je process_cmd
              
              cmp al, 0x08
              je backspace
              
              mov [buffer], al
              mov ah, 0x0E
              int 0x10
              inc byte [buf_len]
              jmp main_loop
          
          backspace:
              cmp byte [buf_len], 0
              je main_loop
              dec byte [buf_len]
              mov al, 0x08
              mov ah, 0x0E
              int 0x10
              mov al, ' '
              int 0x10
              mov al, 0x08
              int 0x10
              jmp main_loop
          
          process_cmd:
              call newline
              
              mov al, [buffer]
              cmp al, 'h'
              je show_help
              cmp al, 'c'
              je clear_screen
              cmp al, '1'
              je app_clock
              cmp al, '2'
              je app_paint
              cmp al, '3'
              je app_snake
              
              mov esi, unknown
              call print
              jmp after_cmd
          
          show_help:
              mov esi, help_msg
              call print
              jmp after_cmd
          
          clear_screen:
              mov ax, 0x0003
              int 0x10
              mov ax, 0x0013
              int 0x10
              mov esi, prompt
              call print
              jmp main_loop
          
          app_clock:
              call clear_screen
              mov esi, clock_msg
              call print
              mov dword [counter], 0
          clock_loop:
              call wait_short
              inc dword [counter]
              
              mov ax, 0x1301
              mov bx, 0x000F
              mov cx, 15
              mov dx, 0x0A08
              push ds
              pop es
              mov bp, time_text
              int 0x10
              
              mov eax, [counter]
              call print_num
              
              xor ax, ax
              int 0x16
              cmp al, 'q'
              je exit_app
              jmp clock_loop
          
          app_paint:
              call clear_screen
              mov esi, paint_msg
              call print
              mov byte [px], 160
              mov byte [py], 100
              mov byte [pcol], 15
          paint_loop:
              xor ax, ax
              int 0x16
              
              cmp al, 'w'
              je paint_up
              cmp al, 's'
              je paint_down
              cmp al, 'a'
              je paint_left
              cmp al, 'd'
              je paint_right
              cmp al, 'c'
              je paint_color
              cmp al, 'q'
              je exit_app
              
              call draw_pixel
              jmp paint_loop
          
          paint_up:
              dec byte [py]
              jmp paint_loop
          paint_down:
              inc byte [py]
              jmp paint_loop
          paint_left:
              dec byte [px]
              jmp paint_loop
          paint_right:
              inc byte [px]
              jmp paint_loop
          paint_color:
              inc byte [pcol]
              jmp paint_loop
          
          draw_pixel:
              pusha
              movzx eax, byte [py]
              mov ebx, 320
              mul ebx
              movzx ecx, byte [px]
              add eax, ecx
              mov edi, 0xA0000
              add edi, eax
              mov al, [pcol]
              stosb
              popa
              ret
          
          app_snake:
              call clear_screen
              mov esi, snake_msg
              call print
              mov byte [sx], 160
              mov byte [sy], 100
              mov byte [dx], 1
              mov byte [dy], 0
              mov byte [fx], 50
              mov byte [fy], 50
              mov dword [score], 0
          
          snake_loop:
              xor ax, ax
              int 0x16
              
              cmp al, 'w'
              je snake_up
              cmp al, 's'
              je snake_down
              cmp al, 'a'
              je snake_left
              cmp al, 'd'
              je snake_right
              cmp al, 'q'
              je exit_app
              
              mov al, [dx]
              add [sx], al
              mov al, [dy]
              add [sy], al
              
              call draw_food
              call draw_snake
              call show_score
              call wait_short
              jmp snake_loop
          
          snake_up:
              mov byte [dx], 0
              mov byte [dy], -1
              jmp snake_loop
          snake_down:
              mov byte [dx], 0
              mov byte [dy], 1
              jmp snake_loop
          snake_left:
              mov byte [dx], -1
              mov byte [dy], 0
              jmp snake_loop
          snake_right:
              mov byte [dx], 1
              mov byte [dy], 0
              jmp snake_loop
          
          draw_food:
              pusha
              movzx eax, byte [fy]
              mov ebx, 320
              mul ebx
              movzx ecx, byte [fx]
              add eax, ecx
              mov edi, 0xA0000
              add edi, eax
              mov al, 12
              stosb
              popa
              ret
          
          draw_snake:
              pusha
              movzx eax, byte [sy]
              mov ebx, 320
              mul ebx
              movzx ecx, byte [sx]
              add eax, ecx
              mov edi, 0xA0000
              add edi, eax
              mov al, 10
              stosb
              popa
              ret
          
          show_score:
              mov ax, 0x1301
              mov bx, 0x000F
              mov cx, 7
              mov dx, 0x0000
              push ds
              pop es
              mov bp, score_text
              int 0x10
              mov eax, [score]
              call print_num
              ret
          
          exit_app:
              call clear_screen
              mov ax, 0x0013
              int 0x10
          
          after_cmd:
              mov byte [buffer], 0
              mov byte [buf_len], 0
              mov esi, prompt
              call print
              jmp main_loop
          
          print_num:
              pusha
              mov ecx, 10
              xor ebx, ebx
          .div:
              xor edx, edx
              div ecx
              push dx
              inc ebx
              test eax, eax
              jnz .div
          .print:
              pop ax
              add al, '0'
              mov ah, 0x0E
              int 0x10
              dec ebx
              jnz .print
              popa
              ret
          
          wait_short:
              push ecx
              mov ecx, 0x1FFFF
          .wait:
              dec ecx
              jnz .wait
              pop ecx
              ret
          
          newline:
              mov al, 13
              mov ah, 0x0E
              int 0x10
              mov al, 10
              int 0x10
              ret
          
          print:
              lodsb
              or al, al
              jz .done
              mov ah, 0x0E
              int 0x10
              jmp print
          .done:
              ret
          
          msg db 'TinyOS v1.0', 13, 10, 0
          prompt db 13,10,'> ',0
          unknown db 'Unknown command',13,10,0
          help_msg db 'Commands: h=help c=clear 1=clock 2=paint 3=snake',13,10,0
          clock_msg db 'CLOCK - press Q to exit',13,10,0
          paint_msg db 'PAINT - WASD move, C color, Q exit',13,10,0
          snake_msg db 'SNAKE - WASD move, Q exit',13,10,0
          time_text db 'Ticks: ',0
          score_text db 'Score: ',0
          
          buffer db 0
          buf_len db 0
          counter dd 0
          px db 160
          py db 100
          pcol db 15
          sx db 160
          sy db 100
          dx db 1
          dy db 0
          fx db 50
          fy db 50
          score dd 0
          
          times 8192-($-$$) db 0
          KERNEL

      - name: Build
        run: |
          nasm -f bin kernel.asm -o tinyos.bin
          truncate -s 1474560 tinyos.bin

      - name: Test
        run: |
          timeout 10 qemu-system-x86_64 -drive format=raw,file=tinyos.bin -nographic -no-reboot 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TinyOS
          path: tinyos.bin
