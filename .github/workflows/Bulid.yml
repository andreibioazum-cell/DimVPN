                  btnEvents.setOnClickListener(v->showBlockEventsDialog());
                  axisBtn(R.id.axis_x_plus,1,0,0);axisBtn(R.id.axis_x_minus,-1,0,0);
                  axisBtn(R.id.axis_y_plus,0,1,0);axisBtn(R.id.axis_y_minus,0,-1,0);
                  axisBtn(R.id.axis_z_plus,0,0,1);axisBtn(R.id.axis_z_minus,0,0,-1);
                  shapeBtn=new Button[]{findViewById(R.id.shape_square),findViewById(R.id.shape_rectangle),findViewById(R.id.shape_circle),findViewById(R.id.shape_triangle)};
                  findViewById(R.id.shape_square).setOnClickListener(v->setShape("square",4,4,4,0));
                  findViewById(R.id.shape_rectangle).setOnClickListener(v->setShape("rectangle",8,4,4,1));
                  findViewById(R.id.shape_circle).setOnClickListener(v->setShape("circle",4,4,4,2));
                  findViewById(R.id.shape_triangle).setOnClickListener(v->setShape("triangle",4,4,4,3));
                  findViewById(R.id.size_x_minus).setOnClickListener(v->{ren.blockSX=Math.max(.5f,ren.blockSX-.5f);updSizeInfo();});
                  findViewById(R.id.size_x_plus).setOnClickListener(v->{ren.blockSX+=.5f;updSizeInfo();});
                  findViewById(R.id.size_y_minus).setOnClickListener(v->{ren.blockSY=Math.max(.5f,ren.blockSY-.5f);updSizeInfo();});
                  findViewById(R.id.size_y_plus).setOnClickListener(v->{ren.blockSY+=.5f;updSizeInfo();});
                  findViewById(R.id.size_z_minus).setOnClickListener(v->{ren.blockSZ=Math.max(.5f,ren.blockSZ-.5f);updSizeInfo();});
                  findViewById(R.id.size_z_plus).setOnClickListener(v->{ren.blockSZ=Math.max(.5f,ren.blockSZ+.5f);updSizeInfo();});
                  distBtn=new Button[]{findViewById(R.id.dist_near),findViewById(R.id.dist_mid),findViewById(R.id.dist_far)};
                  float[]dists={3f,6f,12f};
                  for(int i=0;i<3;i++){final int ii=i;distBtn[i].setOnClickListener(v->{ren.placeDist=dists[ii];updBtnGrp(distBtn,ii);});}
                  colorBtn=new View[]{findViewById(R.id.color_red),findViewById(R.id.color_green),findViewById(R.id.color_blue),findViewById(R.id.color_yellow),findViewById(R.id.color_white),findViewById(R.id.color_black)};
                  float[][]cols={{1f,.2f,.2f},{.2f,1f,.2f},{.2f,.5f,1f},{1f,1f,.2f},{1f,1f,1f},{0f,0f,0f}};
                  for(int i=0;i<cols.length;i++){final int ii=i;colorBtn[i].setOnClickListener(v->{ren.blockR=cols[ii][0];ren.blockG=cols[ii][1];ren.blockB=cols[ii][2];if(ren.selectedIndex>=0&&ren.selectedIndex<ren.blocks.size()){Block b=ren.blocks.get(ren.selectedIndex);b.r=ren.blockR;b.g=ren.blockG;b.b=ren.blockB;}updColSel(ii);});}
                  setupJoy(findViewById(R.id.joy_base),findViewById(R.id.joy_stick));
                  setupJoy(findViewById(R.id.engine_joy_base),findViewById(R.id.engine_joy_stick));
                  setupJoy(findViewById(R.id.playtest_joy_base),findViewById(R.id.playtest_joy_stick));
                  setupLook(findViewById(R.id.look_zone));
                  setupLook(findViewById(R.id.playtest_look_zone));
                  findViewById(R.id.engine_touch_zone).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}
                      else if(e.getAction()==MotionEvent.ACTION_UP){if(Math.abs(e.getX()-lx)<25&&Math.abs(e.getY()-ly)<25){int hit=ren.raycastBlock(e.getX(),e.getY());ren.selectedIndex=hit;if(hit>=0){Block b=ren.blocks.get(hit);ren.blockR=b.r;ren.blockG=b.g;ren.blockB=b.b;ren.blockSX=b.sx;ren.blockSY=b.sy;ren.blockSZ=b.sz;ren.blockShape=b.shape;ren.handleTapBlock(hit);updSizeInfo();}updAxis();}}
                      else if(e.getAction()==MotionEvent.ACTION_MOVE){ren.rY+=(e.getX()-lx)*.2f;ren.rX=Math.max(-85,Math.min(85,ren.rX-(e.getY()-ly)*.2f));lx=e.getX();ly=e.getY();}
                      return true;
                  });
                  updSizeInfo();updAxis();updGridBtn();
