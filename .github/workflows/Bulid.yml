                  dialogs.put(21,new Dialog("Настя","Каждую ночь один и тот же кошмар. Бесконечные коридоры, шёпот..."));
                  dialogs.put(22,new Dialog("Настя","Там что-то есть. Оно следит. Оно приходит за нами.",new String[]{"Успокойся, всё будет хорошо","Расскажи подробнее"},new int[]{23,24}));
                  dialogs.put(23,new Dialog("Настя","Нет! Ты не понимаешь! Это реально! Я видела следы!"));
                  dialogs.put(24,new Dialog("Настя","В снах я вижу тебя, Изума, других людей... все мы там."));
                  dialogs.put(25,new Dialog("Настя","Мне нужно лечь. Я так устала. Не оставляй меня..."));
                  dialogs.put(100,new Dialog("Азум","Где я?.. Это не деревня. Это... что?"));
                  dialogs.put(101,new Dialog("???","Добро пожаловать в Лимбо, Азум..."));
                  dialogs.put(102,new Dialog("???","Здесь твои страхи. Здесь твои воспоминания. Здесь твоя вечность."));
                  dialogs.put(103,new Dialog("Настя","Азум?! Ты тоже здесь?! Как выбраться?!"));
