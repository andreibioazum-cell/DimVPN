name: Auto Build Memory Search & Edit Cheat

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Create Android project
      run: |
        mkdir -p app/src/main/java/com/example/memsearch
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper
        
        cat > app/src/main/java/com/example/memsearch/MainActivity.kt << 'MAINACTIVITY'
        package com.example.memsearch

        import android.app.ActivityManager
        import android.content.Context
        import android.os.*
        import android.widget.*
        import androidx.appcompat.app.AppCompatActivity
        import android.graphics.Color
        import android.view.View
        import java.io.RandomAccessFile

        class MainActivity : AppCompatActivity() {
            
            private lateinit var resultsLayout: LinearLayout
            private lateinit var pidText: TextView
            private var targetPid = 0
            
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                val layout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setPadding(30, 30, 30, 30)
                }
                
                val title = TextView(this).apply {
                    text = "Memory Search Tool"
                    textSize = 18f
                    setPadding(10, 10, 10, 10)
                    setBackgroundColor(Color.parseColor("#E3F2FD"))
                }
                layout.addView(title)
                
                pidText = TextView(this).apply {
                    text = "Not connected"
                    textSize = 14f
                    setPadding(10, 10, 10, 10)
                }
                layout.addView(pidText)
                
                val spinner = Spinner(this)
                val processList = getProcesses()
                val adapter = ArrayAdapter(this, android.R.layout.simple_spinner_item, processList)
                adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item)
                spinner.adapter = adapter
                layout.addView(spinner)
                
                val connectBtn = Button(this).apply {
                    text = "Connect"
                    setOnClickListener {
                        val selected = spinner.selectedItem.toString()
                        val pid = selected.substringAfter("PID:").substringBefore(")").trim().toIntOrNull()
                        if (pid != null) {
                            targetPid = pid
                            pidText.text = "Connected to PID: $pid"
                            pidText.setBackgroundColor(Color.parseColor("#C8E6C9"))
                        }
                    }
                }
                layout.addView(connectBtn)
                
                val searchLabel = TextView(this).apply {
                    text = "Search value:"
                    setPadding(10, 20, 10, 5)
                }
                layout.addView(searchLabel)
                
                val searchInput = EditText(this)
                layout.addView(searchInput)
                
                val searchBtn = Button(this).apply {
                    text = "Search"
                    setOnClickListener {
                        val value = searchInput.text.toString().toLongOrNull()
                        if (value != null && targetPid != 0) {
                            searchMemory(value)
                        } else {
                            Toast.makeText(this@MainActivity, "Connect and enter a number", Toast.LENGTH_SHORT).show()
                        }
                    }
                }
                layout.addView(searchBtn)
                
                resultsLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                }
                layout.addView(resultsLayout)
                
                setContentView(layout)
            }
            
            private fun getProcesses(): List<String> {
                val am = getSystemService(Context.ACTIVITY_SERVICE) as ActivityManager
                val list = mutableListOf<String>()
                try {
                    am.runningAppProcesses?.forEach { proc ->
                        if (!proc.processName.contains(packageName)) {
                            list.add("${proc.processName} (PID:${proc.pid})")
                        }
                    }
                } catch (e: Exception) { }
                return list.sorted()
            }
            
            private fun searchMemory(target: Long) {
                Thread {
                    val results = mutableListOf<Pair<Long, Long>>()
                    val memFile = java.io.File("/proc/$targetPid/mem")
                    
                    if (memFile.canRead()) {
                        RandomAccessFile(memFile, "r").use { raf ->
                            var addr = 0x70000000L
                            val end = 0x80000000L
                            val buf = ByteArray(4)
                            
                            while (addr < end) {
                                try {
                                    raf.seek(addr)
                                    if (raf.read(buf) == 4) {
                                        val v = ((buf[0].toLong() and 0xFF) or
                                                ((buf[1].toLong() and 0xFF) shl 8) or
                                                ((buf[2].toLong() and 0xFF) shl 16) or
                                                ((buf[3].toLong() and 0xFF) shl 24))
                                        if (v == target) {
                                            results.add(Pair(addr, v))
                                        }
                                    }
                                    addr += 4
                                } catch (e: Exception) {
                                    addr += 4096
                                }
                            }
                        }
                    }
                    
                    runOnUiThread {
                        showResults(results)
                    }
                }.start()
            }
            
            private fun showResults(results: List<Pair<Long, Long>>) {
                resultsLayout.removeAllViews()
                
                if (results.isEmpty()) {
                    val tv = TextView(this)
                    tv.text = "No results found"
                    tv.setPadding(10, 10, 10, 10)
                    resultsLayout.addView(tv)
                    return
                }
                
                for ((addr, value) in results) {
                    val card = LinearLayout(this).apply {
                        orientation = LinearLayout.HORIZONTAL
                        setPadding(10, 10, 10, 10)
                        setBackgroundColor(Color.parseColor("#F0F0F0"))
                    }
                    
                    val text = TextView(this).apply {
                        text = "0x${addr.toString(16)} = $value"
                        layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f)
                    }
                    card.addView(text)
                    
                    val editBtn = Button(this).apply {
                        text = "Edit"
                        setOnClickListener {
                            val input = EditText(this@MainActivity)
                            val dialog = android.app.AlertDialog.Builder(this@MainActivity)
                            dialog.setTitle("Edit at 0x${addr.toString(16)}")
                            dialog.setView(input)
                            dialog.setPositiveButton("Save") { _, _ ->
                                val newVal = input.text.toString().toLongOrNull()
                                if (newVal != null) {
                                    writeMemory(addr, newVal)
                                }
                            }
                            dialog.setNegativeButton("Cancel", null)
                            dialog.show()
                        }
                    }
                    card.addView(editBtn)
                    resultsLayout.addView(card)
                }
            }
            
            private fun writeMemory(address: Long, newValue: Long) {
                Thread {
                    var success = false
                    val memFile = java.io.File("/proc/$targetPid/mem")
                    if (memFile.canWrite()) {
                        try {
                            RandomAccessFile(memFile, "rw").use { raf ->
                                raf.seek(address)
                                raf.write(byteArrayOf(
                                    (newValue and 0xFF).toByte(),
                                    ((newValue shr 8) and 0xFF).toByte(),
                                    ((newValue shr 16) and 0xFF).toByte(),
                                    ((newValue shr 24) and 0xFF).toByte()
                                ))
                                success = true
                            }
                        } catch (e: Exception) {
                            success = false
                        }
                    }
                    val msg = if (success) "Changed to $newValue" else "Failed to write"
                    runOnUiThread {
                        Toast.makeText(this@MainActivity, msg, Toast.LENGTH_SHORT).show()
                    }
                }.start()
            }
        }
        MAINACTIVITY
        
        cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
            <application
                android:allowBackup="true"
                android:label="MemSearch"
                android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        MANIFEST
        
        cat > app/src/main/res/values/strings.xml << 'STRINGS'
        <resources>
            <string name="app_name">MemSearch</string>
        </resources>
        STRINGS
        
        cat > app/build.gradle << 'APPGRADLE'
        plugins {
            id 'com.android.application'
            id 'kotlin-android'
        }
        android {
            namespace 'com.example.memsearch'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.memsearch"
                minSdk 28
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
                debug {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.core:core-ktx:1.12.0'
        }
        APPGRADLE
        
        cat > build.gradle << 'ROOTGRADLE'
        buildscript {
            ext.kotlin_version = '1.9.0'
            repositories { google(); mavenCentral() }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        ROOTGRADLE
        
        cat > settings.gradle << 'SETTINGS'
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "MemSearch"
        include ':app'
        SETTINGS
        
        cat > gradle.properties << 'PROPERTIES'
        org.gradle.jvmargs=-Xmx2048m
        android.useAndroidX=true
        PROPERTIES
        
        cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        WRAPPER
        
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew
        chmod +x gradlew
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: gradle-cache
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: memsearch.apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
