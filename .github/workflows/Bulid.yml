name: CubeBattle_2D
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/cubebattle/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="16dp"/>
            <solid android:color="#1A1A2E"/>
            <stroke android:width="3dp" android:color="#00D4FF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue_filled.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="16dp"/>
            <solid android:color="#00D4FF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#AA1A1A2E"/>
            <stroke android:width="3dp" android:color="#00D4FF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_stick.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#00D4FF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/attack_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#AA1A1A2E"/>
            <stroke android:width="3dp" android:color="#FF4444"/>
          </shape>
          EOF

          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#0F0F1E">

              <com.cubebattle.game.GameView
                  android:id="@+id/game_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>

              <View
                  android:id="@+id/fade_overlay"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:background="#000000"
                  android:alpha="0"
                  android:visibility="gone"/>

              <RelativeLayout
                  android:id="@+id/game_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone">

                  <FrameLayout
                      android:id="@+id/joy_base"
                      android:layout_width="160dp"
                      android:layout_height="160dp"
                      android:layout_alignParentBottom="true"
                      android:layout_alignParentLeft="true"
                      android:layout_marginLeft="30dp"
                      android:layout_marginBottom="30dp"
                      android:background="@drawable/joy_base"/>

                  <View
                      android:id="@+id/joy_stick"
                      android:layout_width="70dp"
                      android:layout_height="70dp"
                      android:layout_alignLeft="@id/joy_base"
                      android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="45dp"
                      android:layout_marginTop="45dp"
                      android:background="@drawable/joy_stick"/>

                  <FrameLayout
                      android:id="@+id/attack_btn"
                      android:layout_width="120dp"
                      android:layout_height="120dp"
                      android:layout_alignParentRight="true"
                      android:layout_alignParentBottom="true"
                      android:layout_marginRight="30dp"
                      android:layout_marginBottom="30dp"
                      android:background="@drawable/attack_btn">

                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_gravity="center"
                          android:text="⚔"
                          android:textSize="48sp"
                          android:textColor="#FF4444"/>
                  </FrameLayout>

                  <Button
                      android:id="@+id/btn_pause"
                      android:layout_width="60dp"
                      android:layout_height="60dp"
                      android:layout_margin="15dp"
                      android:text="| |"
                      android:textSize="20sp"
                      android:background="@drawable/btn_blue"
                      android:textColor="#00D4FF"/>

                  <TextView
                      android:id="@+id/txt_score"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_alignParentTop="true"
                      android:layout_alignParentRight="true"
                      android:layout_margin="20dp"
                      android:text="Score: 0"
                      android:textSize="24sp"
                      android:textColor="#00D4FF"
                      android:textStyle="bold"/>
              </RelativeLayout>

              <LinearLayout
                  android:id="@+id/menu_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:gravity="center"
                  android:background="#0F0F1E">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="CUBE"
                      android:textSize="64sp"
                      android:textColor="#FF4444"
                      android:textStyle="bold"
                      android:shadowColor="#000000"
                      android:shadowDx="4"
                      android:shadowDy="4"
                      android:shadowRadius="8"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="BATTLE"
                      android:textSize="64sp"
                      android:textColor="#00D4FF"
                      android:textStyle="bold"
                      android:layout_marginBottom="100dp"
                      android:shadowColor="#000000"
                      android:shadowDx="4"
                      android:shadowDy="4"
                      android:shadowRadius="8"/>

                  <Button
                      android:id="@+id/btn_play"
                      android:layout_width="280dp"
                      android:layout_height="70dp"
                      android:text="PLAY"
                      android:textSize="24sp"
                      android:textColor="#000"
                      android:background="@drawable/btn_blue_filled"
                      android:layout_marginBottom="20dp"/>

                  <Button
                      android:id="@+id/btn_exit"
                      android:layout_width="280dp"
                      android:layout_height="70dp"
                      android:text="EXIT"
                      android:textSize="24sp"
                      android:textColor="#00D4FF"
                      android:background="@drawable/btn_blue"/>
              </LinearLayout>

              <LinearLayout
                  android:id="@+id/pause_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:gravity="center"
                  android:background="#CC0F0F1E"
                  android:visibility="gone">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="PAUSED"
                      android:textSize="56sp"
                      android:textColor="#00D4FF"
                      android:textStyle="bold"
                      android:layout_marginBottom="80dp"/>

                  <Button
                      android:id="@+id/btn_resume"
                      android:layout_width="280dp"
                      android:layout_height="70dp"
                      android:text="RESUME"
                      android:textSize="24sp"
                      android:textColor="#000"
                      android:background="@drawable/btn_blue_filled"
                      android:layout_marginBottom="20dp"/>

                  <Button
                      android:id="@+id/btn_menu"
                      android:layout_width="280dp"
                      android:layout_height="70dp"
                      android:text="MENU"
                      android:textSize="24sp"
                      android:textColor="#00D4FF"
                      android:background="@drawable/btn_blue"/>
              </LinearLayout>
          </FrameLayout>
          LAYOUT

          cat <<'GAMEVIEW' > app/src/main/java/com/cubebattle/game/GameView.java
          package com.cubebattle.game;

          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.View;
          import java.util.ArrayList;
          import java.util.Random;

          public class GameView extends View {
              private Paint playerPaint, enemyPaint, aimPaint, bgPaint, gridPaint;
              public float playerX = 500, playerY = 500;
              public float playerAngle = 0;
              public float joyX = 0, joyY = 0;
              public boolean isAiming = false;
              public ArrayList<Enemy> enemies = new ArrayList<>();
              private Random rand = new Random();
              private long lastSpawn = 0;
              public int score = 0;

              public GameView(Context ctx, AttributeSet attrs) {
                  super(ctx, attrs);
                  init();
              }

              private void init() {
                  playerPaint = new Paint();
                  playerPaint.setColor(0xFFFF4444);
                  playerPaint.setStyle(Paint.Style.FILL);
                  playerPaint.setAntiAlias(true);

                  enemyPaint = new Paint();
                  enemyPaint.setColor(0xFF44FF44);
                  enemyPaint.setStyle(Paint.Style.FILL);
                  enemyPaint.setAntiAlias(true);

                  aimPaint = new Paint();
                  aimPaint.setColor(0xAAFF4444);
                  aimPaint.setStyle(Paint.Style.FILL);
                  aimPaint.setAntiAlias(true);

                  bgPaint = new Paint();
                  bgPaint.setColor(0xFF0F0F1E);

                  gridPaint = new Paint();
                  gridPaint.setColor(0x22FFFFFF);
                  gridPaint.setStrokeWidth(2);
              }

              public void resetGame() {
                  playerX = getWidth() / 2f;
                  playerY = getHeight() / 2f;
                  enemies.clear();
                  score = 0;
                  lastSpawn = System.currentTimeMillis();
              }

              public void update() {
                  long now = System.currentTimeMillis();

                  if (joyX != 0 || joyY != 0) {
                      float speed = 6f;
                      playerX += joyX * speed;
                      playerY += joyY * speed;

                      playerX = Math.max(50, Math.min(getWidth() - 50, playerX));
                      playerY = Math.max(50, Math.min(getHeight() - 50, playerY));

                      playerAngle = (float) Math.toDegrees(Math.atan2(joyY, joyX));
                  }

                  if (now - lastSpawn > 2000 && enemies.size() < 8) {
                      spawnEnemy();
                      lastSpawn = now;
                  }

                  for (int i = enemies.size() - 1; i >= 0; i--) {
                      Enemy e = enemies.get(i);
                      e.update(playerX, playerY);

                      float dist = (float) Math.sqrt(Math.pow(e.x - playerX, 2) + Math.pow(e.y - playerY, 2));
                      if (dist < 100) {
                          e.chase(playerX, playerY);
                      }

                      if (e.hp <= 0) {
                          enemies.remove(i);
                          score += 10;
                      }
                  }

                  invalidate();
              }

              private void spawnEnemy() {
                  float x, y;
                  int side = rand.nextInt(4);
                  switch (side) {
                      case 0: x = rand.nextFloat() * getWidth(); y = -50; break;
                      case 1: x = getWidth() + 50; y = rand.nextFloat() * getHeight(); break;
                      case 2: x = rand.nextFloat() * getWidth(); y = getHeight() + 50; break;
                      default: x = -50; y = rand.nextFloat() * getHeight(); break;
                  }
                  enemies.add(new Enemy(x, y));
              }

              public void attack() {
                  float aimDist = 300;
                  float aimX = playerX + (float) Math.cos(Math.toRadians(playerAngle)) * aimDist;
                  float aimY = playerY + (float) Math.sin(Math.toRadians(playerAngle)) * aimDist;

                  for (Enemy e : enemies) {
                      float dist = (float) Math.sqrt(Math.pow(e.x - aimX, 2) + Math.pow(e.y - aimY, 2));
                      if (dist < 100) {
                          e.hp--;
                      }
                  }
              }

              @Override
              protected void onDraw(Canvas canvas) {
                  super.onDraw(canvas);

                  canvas.drawRect(0, 0, getWidth(), getHeight(), bgPaint);

                  for (int i = 0; i < getWidth(); i += 50) {
                      canvas.drawLine(i, 0, i, getHeight(), gridPaint);
                  }
                  for (int i = 0; i < getHeight(); i += 50) {
                      canvas.drawLine(0, i, getWidth(), i, gridPaint);
                  }

                  for (Enemy e : enemies) {
                      canvas.save();
                      canvas.translate(e.x, e.y);
                      canvas.drawRect(-25, -25, 25, 25, enemyPaint);

                      Paint hpPaint = new Paint();
                      hpPaint.setColor(0xFFFF4444);
                      hpPaint.setStrokeWidth(4);
                      canvas.drawLine(-25, -35, -25 + (50 * e.hp / 3f), -35, hpPaint);
                      canvas.restore();
                  }

                  canvas.save();
                  canvas.translate(playerX, playerY);
                  canvas.rotate(playerAngle);
                  canvas.drawRect(-30, -30, 30, 30, playerPaint);

                  Paint eyePaint = new Paint();
                  eyePaint.setColor(0xFFFFFFFF);
                  canvas.drawCircle(15, 0, 8, eyePaint);
                  canvas.restore();

                  if (isAiming) {
                      float aimDist = 300;
                      float aimX = playerX + (float) Math.cos(Math.toRadians(playerAngle)) * aimDist;
                      float aimY = playerY + (float) Math.sin(Math.toRadians(playerAngle)) * aimDist;

                      canvas.drawCircle(aimX, aimY, 100, aimPaint);

                      Paint crossPaint = new Paint();
                      crossPaint.setColor(0xFFFF4444);
                      crossPaint.setStrokeWidth(4);
                      canvas.drawLine(aimX - 80, aimY, aimX + 80, aimY, crossPaint);
                      canvas.drawLine(aimX, aimY - 80, aimX, aimY + 80, crossPaint);
                  }
              }

              public static class Enemy {
                  public float x, y;
                  public int hp = 3;
                  private float vx = 0, vy = 0;

                  public Enemy(float x, float y) {
                      this.x = x;
                      this.y = y;
                  }

                  public void update(float px, float py) {
                      x += vx;
                      y += vy;
                      vx *= 0.95f;
                      vy *= 0.95f;
                  }

                  public void chase(float px, float py) {
                      float dx = px - x;
                      float dy = py - y;
                      float dist = (float) Math.sqrt(dx * dx + dy * dy);
                      if (dist > 0) {
                          vx += (dx / dist) * 0.3f;
                          vy += (dy / dist) * 0.3f;
                      }
                  }
              }
          }
          GAMEVIEW

          cat <<'MAINACT' > app/src/main/java/com/cubebattle/game/MainActivity.java
          package com.cubebattle.game;

          import android.animation.ObjectAnimator;
          import android.annotation.SuppressLint;
          import android.os.Bundle;
          import android.os.Handler;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameView gameView;
              private View menuUI, gameUI, pauseUI, fadeOverlay;
              private View joyBase, joyStick, attackBtn;
              private TextView txtScore;
              private Handler handler = new Handler();
              private Runnable gameLoop;
              private boolean isRunning = false;

              @SuppressLint("ClickableViewAccessibility")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  gameView = findViewById(R.id.game_view);
                  menuUI = findViewById(R.id.menu_ui);
                  gameUI = findViewById(R.id.game_ui);
                  pauseUI = findViewById(R.id.pause_ui);
                  fadeOverlay = findViewById(R.id.fade_overlay);
                  joyBase = findViewById(R.id.joy_base);
                  joyStick = findViewById(R.id.joy_stick);
                  attackBtn = findViewById(R.id.attack_btn);
                  txtScore = findViewById(R.id.txt_score);

                  findViewById(R.id.btn_play).setOnClickListener(v -> startGame());
                  findViewById(R.id.btn_exit).setOnClickListener(v -> finish());
                  findViewById(R.id.btn_pause).setOnClickListener(v -> pauseGame());
                  findViewById(R.id.btn_resume).setOnClickListener(v -> resumeGame());
                  findViewById(R.id.btn_menu).setOnClickListener(v -> goToMenu());

                  setupJoystick();
                  setupAttackButton();

                  gameLoop = new Runnable() {
                      @Override
                      public void run() {
                          if (isRunning) {
                              gameView.update();
                              txtScore.setText("Score: " + gameView.score);
                              handler.postDelayed(this, 16);
                          }
                      }
                  };
              }

              private void startGame() {
                  fadeOut(() -> {
                      menuUI.setVisibility(View.GONE);
                      gameUI.setVisibility(View.VISIBLE);
                      gameView.resetGame();
                      isRunning = true;
                      handler.post(gameLoop);
                      fadeIn(null);
                  });
              }

              private void pauseGame() {
                  isRunning = false;
                  pauseUI.setVisibility(View.VISIBLE);
              }

              private void resumeGame() {
                  pauseUI.setVisibility(View.GONE);
                  isRunning = true;
                  handler.post(gameLoop);
              }

              private void goToMenu() {
                  isRunning = false;
                  fadeOut(() -> {
                      pauseUI.setVisibility(View.GONE);
                      gameUI.setVisibility(View.GONE);
                      menuUI.setVisibility(View.VISIBLE);
                      fadeIn(null);
                  });
              }

              private void fadeOut(Runnable onComplete) {
                  fadeOverlay.setVisibility(View.VISIBLE);
                  ObjectAnimator anim = ObjectAnimator.ofFloat(fadeOverlay, "alpha", 0f, 1f);
                  anim.setDuration(300);
                  anim.start();
                  handler.postDelayed(() -> {
                      if (onComplete != null) onComplete.run();
                  }, 300);
              }

              private void fadeIn(Runnable onComplete) {
                  ObjectAnimator anim = ObjectAnimator.ofFloat(fadeOverlay, "alpha", 1f, 0f);
                  anim.setDuration(300);
                  anim.start();
                  handler.postDelayed(() -> {
                      fadeOverlay.setVisibility(View.GONE);
                      if (onComplete != null) onComplete.run();
                  }, 300);
              }

              private void setupJoystick() {
                  joyBase.setOnTouchListener((v, e) -> {
                      float cx = v.getWidth() / 2f;
                      float cy = v.getHeight() / 2f;

                      if (e.getAction() == MotionEvent.ACTION_MOVE || e.getAction() == MotionEvent.ACTION_DOWN) {
                          float dx = e.getX() - cx;
                          float dy = e.getY() - cy;
                          float dist = (float) Math.sqrt(dx * dx + dy * dy);
                          float limit = cx - joyStick.getWidth() / 2f;

                          if (dist > limit) {
                              dx *= limit / dist;
                              dy *= limit / dist;
                          }

                          joyStick.setTranslationX(dx);
                          joyStick.setTranslationY(dy);
                          gameView.joyX = dx / limit;
                          gameView.joyY = dy / limit;

                      } else if (e.getAction() == MotionEvent.ACTION_UP) {
                          joyStick.setTranslationX(0);
                          joyStick.setTranslationY(0);
                          gameView.joyX = 0;
                          gameView.joyY = 0;
                      }
                      return true;
                  });
              }

              private void setupAttackButton() {
                  attackBtn.setOnTouchListener((v, e) -> {
                      if (e.getAction() == MotionEvent.ACTION_DOWN) {
                          gameView.isAiming = true;
                      } else if (e.getAction() == MotionEvent.ACTION_UP) {
                          gameView.isAiming = false;
                          gameView.attack();
                      }
                      return true;
                  });
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  if (isRunning && gameUI.getVisibility() == View.VISIBLE) {
                      pauseGame();
                  }
              }
          }
          MAINACT

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Cube Battle"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name="com.cubebattle.game.MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.cubebattle.game'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.cubebattle.game'
                  minSdk 24
                  targetSdk 34
              }

              buildFeatures {
                  buildConfig true
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle --version
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CubeBattle_2D
          path: app/build/outputs/apk/debug/app-debug.apk
