name: Auto Build Memory Search & Edit Cheat

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Create Android project with Memory Search & Edit
      run: |
        mkdir -p app/src/main/java/com/example/memoryedit
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper
        mkdir -p app/src/main/res/layout
        
        cat > app/src/main/java/com/example/memoryedit/MainActivity.kt << 'MAINACTIVITY'
        package com.example.memoryedit

        import android.app.ActivityManager
        import android.content.Context
        import android.media.MediaDrm
        import android.os.*
        import android.widget.*
        import androidx.appcompat.app.AppCompatActivity
        import android.graphics.Color
        import android.view.View
        import java.io.RandomAccessFile
        import java.util.*

        class MainActivity : AppCompatActivity() {
            
            private lateinit var resultsContainer: LinearLayout
            private lateinit var searchInput: EditText
            private lateinit var statusText: TextView
            private lateinit var progressBar: ProgressBar
            
            private var targetPid = 0
            private var memoryAccessor: MemoryAccessor? = null
            private var isSearching = false
            
            private data class SearchResult(
                val address: Long,
                val value: Long,
                val valueType: String,
                val timestamp: Long = System.currentTimeMillis()
            )
            
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                val scrollView = ScrollView(this)
                val mainLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setPadding(20, 20, 20, 20)
                }
                
                val title = TextView(this).apply {
                    text = "🔍 Memory Search & Edit\nUID: ${android.os.Process.myUid()}"
                    textSize = 16f
                    setPadding(15, 15, 15, 15)
                    setBackgroundColor(Color.parseColor("#E3F2FD"))
                }
                mainLayout.addView(title)
                
                statusText = TextView(this).apply {
                    text = "⚪ Status: not connected"
                    textSize = 14f
                    setPadding(15, 10, 15, 10)
                }
                mainLayout.addView(statusText)
                
                progressBar = ProgressBar(this).apply {
                    visibility = View.GONE
                }
                mainLayout.addView(progressBar)
                
                val appLabel = TextView(this).apply {
                    text = "📱 Select process:"
                    textSize = 14f
                    setPadding(15, 20, 15, 5)
                }
                mainLayout.addView(appLabel)
                
                val appSpinner = Spinner(this)
                mainLayout.addView(appSpinner)
                
                val processList = getRunningProcesses()
                val processNames = processList.map { "${it.name} (PID: ${it.pid})" }.toTypedArray()
                val appAdapter = ArrayAdapter(this, android.R.layout.simple_spinner_item, processNames)
                appAdapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item)
                appSpinner.adapter = appAdapter
                
                var selectedPid = 0
                appSpinner.onItemSelectedListener = object : AdapterView.OnItemSelectedListener {
                    override fun onItemSelected(parent: AdapterView<*>, view: View?, pos: Int, id: Long) {
                        selectedPid = processList[pos].pid
                    }
                    override fun onNothingSelected(parent: AdapterView<*>) {}
                }
                
                val connectButton = Button(this).apply {
                    text = "🔌 Connect to process"
                    setBackgroundColor(Color.parseColor("#2196F3"))
                    setTextColor(Color.WHITE)
                    setOnClickListener {
                        if (selectedPid != 0) {
                            connectToProcess(selectedPid)
                        } else {
                            Toast.makeText(this@MainActivity, "Select a process", Toast.LENGTH_SHORT).show()
                        }
                    }
                }
                mainLayout.addView(connectButton)
                
                val divider = View(this).apply {
                    layoutParams = LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, 2)
                    setBackgroundColor(Color.parseColor("#CCCCCC"))
                }
                mainLayout.addView(divider)
                
                val searchLabel = TextView(this).apply {
                    text = "🔎 Search values:"
                    textSize = 14f
                    setPadding(15, 20, 15, 5)
                }
                mainLayout.addView(searchLabel)
                
                val searchLayout = LinearLayout(this).apply {
                    orientation = LinearLayout.HORIZONTAL
                }
                
                searchInput = EditText(this).apply {
                    hint = "Number to search (e.g., 100)"
                    textSize = 14f
                    layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f)
                }
                searchLayout.addView(searchInput)
                
                val searchTypeSpinner = Spinner(this)
                val searchTypes = arrayOf("int (4 bytes)", "float", "double (8 bytes)", "short (2 bytes)")
                val typeAdapter = ArrayAdapter(this, android.R.layout.simple_spinner_item, searchTypes)
                typeAdapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item)
                searchTypeSpinner.adapter = typeAdapter
                searchLayout.addView(searchTypeSpinner)
                
                mainLayout.addView(searchLayout)
                
                val searchButton = Button(this).apply {
                    text = "🔍 Start search"
                    setBackgroundColor(Color.parseColor("#4CAF50"))
                    setTextColor(Color.WHITE)
                    setOnClickListener {
                        if (memoryAccessor != null && targetPid != 0) {
                            val valueStr = searchInput.text.toString()
                            if (valueStr.isNotBlank()) {
                                startSearch(valueStr, searchTypeSpinner.selectedItemPosition)
                            } else {
                                Toast.makeText(this@MainActivity, "Enter a number to search", Toast.LENGTH_SHORT).show()
                            }
                        } else {
                            Toast.makeText(this@MainActivity, "Connect to a process first", Toast.LENGTH_SHORT).show()
                        }
                    }
                }
                mainLayout.addView(searchButton)
                
                val resultsLabel = TextView(this).apply {
                    text = "📋 Found values (newest first):"
                    textSize = 14f
                    setPadding(15, 25, 15, 5)
                }
                mainLayout.addView(resultsLabel)
                
                resultsContainer = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                }
                mainLayout.addView(resultsContainer)
                
                scrollView.addView(mainLayout)
                setContentView(scrollView)
            }
            
            data class ProcessInfo(val name: String, val pid: Int)
            
            private fun getRunningProcesses(): List<ProcessInfo> {
                val activityManager = getSystemService(Context.ACTIVITY_SERVICE) as ActivityManager
                val processes = mutableListOf<ProcessInfo>()
                try {
                    val runningProcesses = activityManager.runningAppProcesses
                    runningProcesses?.forEach { process ->
                        if (process.processName.contains(packageName).not()) {
                            processes.add(ProcessInfo(process.processName, process.pid))
                        }
                    }
                } catch (e: Exception) { }
                return processes.sortedBy { it.name }
            }
            
            private fun connectToProcess(pid: Int) {
                Thread {
                    try {
                        val drmUUID = UUID.fromString("edef8ba9-79d6-4ace-a3c8-27dcd51d21ed")
                        val mediaDrm = MediaDrm(drmUUID)
                        
                        val binder = getDrmBinder(mediaDrm)
                        val transaction = Parcel.obtain()
                        transaction.writeInterfaceToken("android.media.IDrmManagerService")
                        transaction.writeInt(pid)
                        
                        try {
                            binder.transact(0xdeadfeed, transaction, null, 0)
                        } catch (e: Exception) { }
                        
                        targetPid = pid
                        memoryAccessor = MemoryAccessor(pid)
                        
                        runOnUiThread {
                            statusText.text = "🟢 Connected to PID: $pid"
                            statusText.setBackgroundColor(Color.parseColor("#C8E6C9"))
                            Toast.makeText(this@MainActivity, "Connected to process $pid", Toast.LENGTH_SHORT).show()
                        }
                        
                    } catch (e: Exception) {
                        runOnUiThread {
                            Toast.makeText(this@MainActivity, "Error: ${e.message}", Toast.LENGTH_SHORT).show()
                        }
                    }
                }.start()
            }
            
            private fun getDrmBinder(mediaDrm: MediaDrm): IBinder {
                val field = mediaDrm.javaClass.getDeclaredField("mBinder")
                field.isAccessible = true
                return field.get(mediaDrm) as IBinder
            }
            
            private fun startSearch(valueStr: String, typeIndex: Int) {
                if (isSearching) return
                isSearching = true
                
                runOnUiThread {
                    progressBar.visibility = View.VISIBLE
                    statusText.text = "🔍 Searching..."
                }
                
                Thread {
                    try {
                        val value = valueStr.toLongOrNull()
                        val floatValue = valueStr.toFloatOrNull()
                        
                        val results = when (typeIndex) {
                            0 -> memoryAccessor?.searchInt(value ?: 0) ?: emptyList()
                            1 -> memoryAccessor?.searchFloat(floatValue ?: 0f) ?: emptyList()
                            2 -> memoryAccessor?.searchDouble(valueStr.toDoubleOrNull() ?: 0.0) ?: emptyList()
                            3 -> memoryAccessor?.searchShort((value ?: 0).toInt()) ?: emptyList()
                            else -> emptyList()
                        }
                        
                        val typeName = when (typeIndex) {
                            0 -> "int"
                            1 -> "float"
                            2 -> "double"
                            3 -> "short"
                            else -> "int"
                        }
                        
                        val sortedResults = results.sortedByDescending { it.timestamp }
                        
                        runOnUiThread {
                            displayResults(sortedResults, typeName)
                            statusText.text = "✅ Found ${sortedResults.size} values"
                            progressBar.visibility = View.GONE
                        }
                        
                    } catch (e: Exception) {
                        runOnUiThread {
                            statusText.text = "❌ Error: ${e.message}"
                            progressBar.visibility = View.GONE
                        }
                    }
                    isSearching = false
                }.start()
            }
            
            private fun displayResults(results: List<SearchResult>, valueType: String) {
                resultsContainer.removeAllViews()
                
                if (results.isEmpty()) {
                    val emptyText = TextView(this).apply {
                        text = "Nothing found.\nTry a different value."
                        textSize = 14f
                        setPadding(20, 30, 20, 30)
                        setTextColor(Color.GRAY)
                        gravity = android.view.Gravity.CENTER
                    }
                    resultsContainer.addView(emptyText)
                    return
                }
                
                results.forEach { result ->
                    val card = LinearLayout(this).apply {
                        orientation = LinearLayout.VERTICAL
                        setPadding(15, 12, 15, 12)
                        setBackgroundColor(Color.parseColor("#FAFAFA"))
                        layoutParams = LinearLayout.LayoutParams(
                            LinearLayout.LayoutParams.MATCH_PARENT,
                            LinearLayout.LayoutParams.WRAP_CONTENT
                        ).apply { setMargins(0, 5, 0, 5) }
                    }
                    
                    val topRow = LinearLayout(this).apply {
                        orientation = LinearLayout.HORIZONTAL
                    }
                    
                    val infoText = TextView(this).apply {
                        text = "📍 0x${result.address.toString(16)}\n📊 ${result.value} ($valueType)"
                        textSize = 13f
                        layoutParams = LinearLayout.LayoutParams(0, LinearLayout.LayoutParams.WRAP_CONTENT, 1f)
                    }
                    topRow.addView(infoText)
                    
                    val editButton = Button(this).apply {
                        text = "Edit"
                        textSize = 11f
                        setBackgroundColor(Color.parseColor("#FF9800"))
                        setTextColor(Color.WHITE)
                        setOnClickListener {
                            showEditDialog(result.address, result.value, valueType)
                        }
                    }
                    topRow.addView(editButton)
                    
                    card.addView(topRow)
                    resultsContainer.addView(card)
                }
            }
            
            private fun showEditDialog(address: Long, currentValue: Long, valueType: String) {
                val input = EditText(this)
                input.hint = "New value"
                
                android.app.AlertDialog.Builder(this)
                    .setTitle("Edit at 0x${address.toString(16)}")
                    .setMessage("Current: $currentValue\nType: $valueType")
                    .setView(input)
                    .setPositiveButton("Save") { _, _ ->
                        val newValue = input.text.toString().toLongOrNull()
                        if (newValue != null) {
                            writeMemory(address, newValue, valueType)
                        }
                    }
                    .setNegativeButton("Cancel", null)
                    .show()
            }
            
            private fun writeMemory(address: Long, newValue: Long, valueType: String) {
                Thread {
                    val success = memoryAccessor?.writeValue(address, newValue, valueType) ?: false
                    runOnUiThread {
                        if (success) {
                            Toast.makeText(this, "✅ Changed to $newValue", Toast.LENGTH_SHORT).show()
                        } else {
                            Toast.makeText(this, "❌ Failed", Toast.LENGTH_SHORT).show()
                        }
                    }
                }.start()
            }
            
            inner class MemoryAccessor(private val targetPid: Int) {
                
                fun searchInt(target: Long): List<SearchResult> {
                    val results = mutableListOf<SearchResult>()
                    val memFile = java.io.File("/proc/$targetPid/mem")
                    if (!memFile.canRead()) return results
                    
                    RandomAccessFile(memFile, "r").use { raf ->
                        var address = 0x70000000L
                        val endAddress = 0x80000000L
                        val buffer = ByteArray(4)
                        
                        while (address < endAddress) {
                            try {
                                raf.seek(address)
                                if (raf.read(buffer) == 4) {
                                    val value = ((buffer[0].toLong() and 0xFF) or
                                            ((buffer[1].toLong() and 0xFF) shl 8) or
                                            ((buffer[2].toLong() and 0xFF) shl 16) or
                                            ((buffer[3].toLong() and 0xFF) shl 24))
                                    
                                    if (value == target) {
                                        results.add(SearchResult(address, value, "int"))
                                    }
                                }
                                address += 4
                            } catch (e: Exception) {
                                address += 4096
                            }
                        }
                    }
                    return results
                }
                
                fun searchFloat(target: Float): List<SearchResult> {
                    val results = mutableListOf<SearchResult>()
                    val memFile = java.io.File("/proc/$targetPid/mem")
                    if (!memFile.canRead()) return results
                    
                    RandomAccessFile(memFile, "r").use { raf ->
                        var address = 0x70000000L
                        val endAddress = 0x80000000L
                        val buffer = ByteArray(4)
                        
                        while (address < endAddress) {
                            try {
                                raf.seek(address)
                                if (raf.read(buffer) == 4) {
                                    val intBits = ((buffer[0].toInt() and 0xFF) or
                                                  ((buffer[1].toInt() and 0xFF) shl 8) or
                                                  ((buffer[2].toInt() and 0xFF) shl 16) or
                                                  ((buffer[3].toInt() and 0xFF) shl 24))
                                    val value = java.lang.Float.intBitsToFloat(intBits)
                                    
                                    if (kotlin.math.abs(value - target) < 0.001f) {
                                        results.add(SearchResult(address, value.toLong(), "float"))
                                    }
                                }
                                address += 4
                            } catch (e: Exception) {
                                address += 4096
                            }
                        }
                    }
                    return results
                }
                
                fun searchDouble(target: Double): List<SearchResult> {
                    val results = mutableListOf<SearchResult>()
                    val memFile = java.io.File("/proc/$targetPid/mem")
                    if (!memFile.canRead()) return results
                    
                    RandomAccessFile(memFile, "r").use { raf ->
                        var address = 0x70000000L
                        val endAddress = 0x80000000L
                        val buffer = ByteArray(8)
                        
                        while (address < endAddress) {
                            try {
                                raf.seek(address)
                                if (raf.read(buffer) == 8) {
                                    val longBits = ((buffer[0].toLong() and 0xFF) or
                                                   ((buffer[1].toLong() and 0xFF) shl 8) or
                                                   ((buffer[2].toLong() and 0xFF) shl 16) or
                                                   ((buffer[3].toLong() and 0xFF) shl 24) or
                                                   ((buffer[4].toLong() and 0xFF) shl 32) or
                                                   ((buffer[5].toLong() and 0xFF) shl 40) or
                                                   ((buffer[6].toLong() and 0xFF) shl 48) or
                                                   ((buffer[7].toLong() and 0xFF) shl 56))
                                    val value = java.lang.Double.longBitsToDouble(longBits)
                                    
                                    if (kotlin.math.abs(value - target) < 0.0001) {
                                        results.add(SearchResult(address, value.toLong(), "double"))
                                    }
                                }
                                address += 8
                            } catch (e: Exception) {
                                address += 4096
                            }
                        }
                    }
                    return results
                }
                
                fun searchShort(target: Int): List<SearchResult> {
                    val results = mutableListOf<SearchResult>()
                    val memFile = java.io.File("/proc/$targetPid/mem")
                    if (!memFile.canRead()) return results
                    
                    RandomAccessFile(memFile, "r").use { raf ->
                        var address = 0x70000000L
                        val endAddress = 0x80000000L
                        val buffer = ByteArray(2)
                        
                        while (address < endAddress) {
                            try {
                                raf.seek(address)
                                if (raf.read(buffer) == 2) {
                                    val value = ((buffer[0].toInt() and 0xFF) or
                                                ((buffer[1].toInt() and 0xFF) shl 8))
                                    
                                    if (value == target) {
                                        results.add(SearchResult(address, value.toLong(), "short"))
                                    }
                                }
                                address += 2
                            } catch (e: Exception) {
                                address += 4096
                            }
                        }
                    }
                    return results
                }
                
                fun writeValue(address: Long, newValue: Long, valueType: String): Boolean {
                    val memFile = java.io.File("/proc/$targetPid/mem")
                    if (!memFile.canWrite()) return false
                    
                    RandomAccessFile(memFile, "rw").use { raf ->
                        raf.seek(address)
                        val bytes = when (valueType) {
                            "int", "float" -> byteArrayOf(
                                (newValue and 0xFF).toByte(),
                                ((newValue shr 8) and 0xFF).toByte(),
                                ((newValue shr 16) and 0xFF).toByte(),
                                ((newValue shr 24) and 0xFF).toByte()
                            )
                            "short" -> byteArrayOf(
                                (newValue and 0xFF).toByte(),
                                ((newValue shr 8) and 0xFF).toByte()
                            )
                            else -> return false
                        }
                        raf.write(bytes)
                        return true
                    }
                }
            }
        }
        MAINACTIVITY
        
        cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
            
            <application
                android:allowBackup="true"
                android:label="Memory Search Edit"
                android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTask">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        MANIFEST
        
        cat > app/src/main/res/values/strings.xml << 'STRINGS'
        <resources>
            <string name="app_name">Memory Search Edit</string>
        </resources>
        STRINGS
        
        cat > app/build.gradle << 'APPGRADLE'
        plugins {
            id 'com.android.application'
            id 'kotlin-android'
        }
        android {
            namespace 'com.example.memoryedit'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.memoryedit"
                minSdk 28
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
                debug {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.core:core-ktx:1.12.0'
        }
        APPGRADLE
        
        cat > build.gradle << 'ROOTGRADLE'
        buildscript {
            ext.kotlin_version = '1.9.0'
            repositories { google(); mavenCentral() }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        ROOTGRADLE
        
        cat > settings.gradle << 'SETTINGS'
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "MemoryEdit"
        include ':app'
        SETTINGS
        
        cat > gradle.properties << 'PROPERTIES'
        org.gradle.jvmargs=-Xmx2048m
        android.useAndroidX=true
        PROPERTIES
        
        cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        WRAPPER
        
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew
        chmod +x gradlew
        
        echo "✅ Project created"
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: gradle-cache-${{ hashFiles('**/*.gradle*') }}
        restore-keys: gradle-cache-
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: memory-search-edit.apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
