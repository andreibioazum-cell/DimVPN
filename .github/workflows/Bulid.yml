name: D1m
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Create Project (D1m offline)
        run: |
          mkdir -p app/src/main/java/com/d1m/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/menu

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > settings.gradle
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.d1m.app'
              compileSdk 34

              defaultConfig {
                  applicationId 'com.d1m.app'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildFeatures {
                  viewBinding true
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.12.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.drawerlayout:drawerlayout:1.2.0'
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="D1m"
                  android:theme="@style/Theme.D1m">
                  <activity
                      android:name=".ChatActivity"
                      android:exported="false" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="false" />
                  <activity
                      android:name=".LoginActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">D1m</string>
              <string name="nav_open">Открыть меню</string>
              <string name="nav_close">Закрыть меню</string>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="d1m_bg">#F2F8FD</color>
              <color name="d1m_primary">#4C97FF</color>
              <color name="d1m_primary_dark">#2D678F</color>
              <color name="d1m_panel">#FFFFFF</color>
              <color name="d1m_text">#0E1621</color>
              <color name="d1m_hint">#6A7B8C</color>

              <color name="bubble_out">#CFE6FF</color>
              <color name="bubble_in">#FFFFFF</color>
              <color name="bubble_stroke">#D6E6F2</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.D1m" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/d1m_primary</item>
                  <item name="colorPrimaryVariant">@color/d1m_primary</item>
                  <item name="colorOnPrimary">@android:color/white</item>
                  <item name="android:statusBarColor">@color/d1m_primary</item>
                  <item name="android:windowBackground">@color/d1m_bg</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/panel_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/d1m_panel"/>
              <corners android:radius="16dp"/>
              <stroke android:width="1dp" android:color="#D6E6F2"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/avatar_circle.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#4C97FF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bubble_out.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/bubble_out"/>
              <corners android:radius="14dp"/>
              <stroke android:width="1dp" android:color="@color/bubble_stroke"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/bubble_in.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/bubble_in"/>
              <corners android:radius="14dp"/>
              <stroke android:width="1dp" android:color="@color/bubble_stroke"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_primary.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="@color/d1m_primary"/>
              <corners android:radius="14dp"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/menu/drawer_menu.xml
