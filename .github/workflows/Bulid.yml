name: Fabric_Mod_Emeraldball_V11_Projectile
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Initialize Project Structure
        run: |
          mkdir -p src/main/java/com/dimos/mod/mixin
          mkdir -p src/main/java/com/dimos/mod/item
          mkdir -p src/main/resources/assets/dimos/lang
          mkdir -p src/main/resources/assets/dimos/models/item
          mkdir -p src/main/resources/assets/dimos/textures/item
          mkdir -p src/main/resources/data/dimos/recipe

          # Копируем твою текстуру (строго в лоуеркейс!)
          if [ -f "fireballhh.png" ]; then
              cp fireballhh.png src/main/resources/assets/dimos/textures/item/emeraldball.png
          else
              echo "Файл fireballhh.png не найден!" && exit 1
          fi

          # 1. Build.gradle
          cat <<EOF > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          version = '1.1.0'
          group = 'com.dimos.mod'
          repositories { mavenCentral(); maven { url = "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.16.5"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.1+1.21.1"
          }
          EOF

          # 2. НОВАЯ ЛОГИКА: EmeraldballItem.java
          cat <<EOF > src/main/java/com/dimos/mod/item/EmeraldballItem.java
          package com.dimos.mod.item;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.entity.projectile.thrown.SnowballEntity;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemStack;
          import net.minecraft.sound.SoundCategory;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.stat.Stats;
          import net.minecraft.util.Hand;
          import net.minecraft.util.TypedActionResult;
          import net.minecraft.world.World;
          import net.minecraft.world.World.ExplosionSourceType;

          public class EmeraldballItem extends Item {
              public EmeraldballItem(Settings settings) { super(settings); }

              @Override
              public TypedActionResult<ItemStack> use(World world, PlayerEntity user, Hand hand) {
                  ItemStack itemStack = user.getStackInHand(hand);
                  world.playSound(null, user.getX(), user.getY(), user.getZ(), 
                      SoundEvents.ENTITY_SNOWBALL_THROW, SoundCategory.NEUTRAL, 0.5F, 0.4F / (world.getRandom().nextFloat() * 0.4F + 0.8F));
                  
                  if (!world.isClient) {
                      // Создаем снежок, но даем ему внешний вид нашего предмета
                      SnowballEntity projectile = new SnowballEntity(world, user);
                      projectile.setItem(itemStack);
                      projectile.setVelocity(user, user.getPitch(), user.getYaw(), 0.0F, 1.5F, 1.0F);
                      
                      // Хак: добавляем логику взрыва при ударе через лямбду (в 1.21.1 это проще сделать через Mixin или кастомную сущность, 
                      // но для краткости мы заставим его взорваться сразу, если нужно "бросить и взорвать")
                      // Однако для полноценного взрыва ПРИ УДАРЕ нам нужен Mixin на SnowballEntity.
                      world.spawnEntity(projectile);
                  }

                  user.incrementStat(Stats.USED.getOrCreateStat(this));
                  if (!user.getAbilities().creativeMode) {
                      itemStack.decrement(1);
                  }
                  return TypedActionResult.success(itemStack, world.isClient());
              }
          }
          EOF

          # 3. МИКСИН ДЛЯ ВЗРЫВА ПРИ УДАРЕ:
          cat <<EOF > src/main/java/com/dimos/mod/mixin/ProjectileExplosionMixin.java
          package com.dimos.mod.mixin;
          import com.dimos.mod.DimMod;
          import net.minecraft.entity.projectile.thrown.SnowballEntity;
          import net.minecraft.util.hit.HitResult;
          import org.spongepowered.asm.mixin.Mixin;
          import org.spongepowered.asm.mixin.injection.At;
          import org.spongepowered.asm.mixin.injection.Inject;
          import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;
          import net.minecraft.world.World.ExplosionSourceType;

          @Mixin(SnowballEntity.class)
          public abstract class ProjectileExplosionMixin {
              @Inject(at = @At("TAIL"), method = "onCollision")
              private void onHit(HitResult hitResult, CallbackInfo ci) {
                  SnowballEntity self = (SnowballEntity) (Object) this;
                  if (self.getItem().isOf(DimMod.EMERALD_BALL) && !self.getWorld().isClient) {
                      self.getWorld().createExplosion(self, self.getX(), self.getY(), self.getZ(), 3.0f, ExplosionSourceType.NONE);
                      self.discard(); // Убираем снежок после взрыва
                  }
              }
          }
          EOF

          # 4. Настройки проекта
          echo "pluginManagement { repositories { maven { url = 'https://maven.fabricmc.net/' }; mavenCentral(); gradlePluginPortal() } }; rootProject.name = 'dimos-mod'" > settings.gradle
          cat <<EOF > src/main/resources/fabric.mod.json
          { "schemaVersion": 1, "id": "dimos", "version": "1.1.0", "name": "DimOS", "entrypoints": { "main": ["com.dimos.mod.DimMod"] }, "mixins": ["dimos.mixins.json"], "depends": { "fabricloader": ">=0.16.5", "minecraft": "~1.21.1" } }
          EOF
          cat <<EOF > src/main/resources/dimos.mixins.json
          { "required": true, "package": "com.dimos.mod.mixin", "compatibilityLevel": "JAVA_21", "mixins": ["ProjectileExplosionMixin"], "injectors": { "defaultRequire": 1 } }
          EOF

          # 5. DimMod.java
          cat <<EOF > src/main/java/com/dimos/mod/DimMod.java
          package com.dimos.mod;
          import com.dimos.mod.item.EmeraldballItem;
          import net.fabricmc.api.ModInitializer;
          import net.minecraft.item.Item;
          import net.minecraft.registry.Registries;
          import net.minecraft.registry.Registry;
          import net.minecraft.util.Identifier;
          public class DimMod implements ModInitializer {
              public static final Item EMERALD_BALL = new EmeraldballItem(new Item.Settings().maxCount(16));
              @Override
              public void onInitialize() {
                  Registry.register(Registries.ITEM, Identifier.of("dimos", "emeraldball"), EMERALD_BALL);
              }
          }
          EOF

          # 6. МОДЕЛЬ (Исправляем текстуру)
          cat <<EOF > src/main/resources/assets/dimos/models/item/emeraldball.json
          {
            "parent": "minecraft:item/generated",
            "textures": { "layer0": "dimos:item/emeraldball" }
          }
          EOF
          
          echo '{"item.dimos.emeraldball": "Emeraldball"}' > src/main/resources/assets/dimos/lang/en_us.json
          echo '{"item.dimos.emeraldball": "Изумрудный шар"}' > src/main/resources/assets/dimos/lang/ru_ru.json

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: DimOS-Emeraldball-V11
          path: build/libs/*.jar
