name: Enjoer_6.1_Clean_Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat > app/src/main/res/values/themes.xml << 'THEMES'
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          THEMES

          cat > app/src/main/res/drawable/btn_blue.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#101820"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/btn_blue_filled.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/btn_red.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#101820"/>
            <stroke android:width="2dp" android:color="#FF4444"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/btn_green.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#44FF44"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/joy_base.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#CC101820"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/joy_stick.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/panel_bg.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#E6101820"/>
            <stroke android:width="1dp" android:color="#00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/color_btn.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#FFF"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/crosshair.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <size android:width="6dp" android:height="6dp"/>
            <solid android:color="#FF00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/rigid_bg.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#DD101820"/>
            <stroke android:width="2dp" android:color="#FFD700"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/tab_selected.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/tab_normal.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#1A2A3A"/>
            <stroke android:width="1dp" android:color="#00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/item_card.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#111C28"/>
            <stroke android:width="1dp" android:color="#1E4060"/>
          </shape>
          XML

          cat > app/src/main/res/drawable/item_card_selected.xml << 'XML'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#0A2040"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          XML

          cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#02050A">

              <android.opengl.GLSurfaceView
                  android:id="@+id/gl_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>

              <RelativeLayout
                  android:id="@+id/game_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone">
                  <View android:id="@+id/look_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentTop="true" android:layout_alignParentLeft="true" android:layout_margin="10dp" android:orientation="horizontal">
                      <Button android:id="@+id/btn_menu" android:layout_width="50dp" android:layout_height="50dp" android:text="&#8801;" android:textSize="24sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                      <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:background="@drawable/rigid_bg" android:padding="8dp" android:layout_marginLeft="10dp">
                          <TextView android:id="@+id/txt_rigids" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0 Rigids" android:textColor="#FFD700" android:textSize="16sp" android:textStyle="bold"/>
                      </LinearLayout>
                  </LinearLayout>
                  <TextView android:id="@+id/txt_rigid_notify" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentTop="true" android:layout_alignParentRight="true" android:layout_margin="10dp" android:background="@drawable/rigid_bg" android:padding="12dp" android:text="Rigids delivered!" android:textColor="#FFD700" android:textSize="14sp" android:textStyle="bold" android:visibility="gone"/>
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="126dp" android:layout_height="126dp" android:layout_alignParentBottom="true" android:layout_alignParentLeft="true" android:layout_marginLeft="40dp" android:layout_marginBottom="40dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/joy_stick" android:layout_width="54dp" android:layout_height="54dp" android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base" android:layout_marginLeft="36dp" android:layout_marginTop="36dp" android:background="@drawable/joy_stick"/>
                  <Button android:id="@+id/btn_jump" android:layout_width="90dp" android:layout_height="90dp" android:layout_alignParentRight="true" android:layout_alignParentBottom="true" android:layout_marginRight="40dp" android:layout_marginBottom="40dp" android:text="&#9650;" android:textSize="28sp" android:background="@drawable/btn_blue" android:textColor="#FFF"/>
              </RelativeLayout>

              <RelativeLayout
                  android:id="@+id/engine_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone">
                  <View android:id="@+id/engine_touch_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_alignParentTop="true" android:orientation="horizontal" android:padding="10dp">
                      <Button android:id="@+id/btn_engine_menu" android:layout_width="50dp" android:layout_height="50dp" android:text="&#8801;" android:textSize="24sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                      <View android:layout_width="0dp" android:layout_height="1dp" android:layout_weight="1"/>
                      <Button android:id="@+id/btn_save" android:layout_width="90dp" android:layout_height="50dp" android:text="Export" android:textSize="12sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="8dp"/>
                      <Button android:id="@+id/btn_play_level" android:layout_width="50dp" android:layout_height="50dp" android:text="&#9654;" android:textSize="20sp" android:background="@drawable/btn_green" android:textColor="#000" android:layout_marginLeft="10dp"/>
                  </LinearLayout>
                  <FrameLayout android:id="@+id/engine_joy_base" android:layout_width="108dp" android:layout_height="108dp" android:layout_alignParentBottom="true" android:layout_alignParentLeft="true" android:layout_marginLeft="30dp" android:layout_marginBottom="30dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/engine_joy_stick" android:layout_width="45dp" android:layout_height="45dp" android:layout_alignLeft="@id/engine_joy_base" android:layout_alignTop="@id/engine_joy_base" android:layout_marginLeft="31dp" android:layout_marginTop="31dp" android:background="@drawable/joy_stick"/>
                  <ScrollView android:id="@+id/tools_scroll" android:layout_width="210dp" android:layout_height="match_parent" android:layout_alignParentRight="true" android:layout_marginRight="10dp" android:layout_marginTop="70dp" android:layout_marginBottom="10dp">
                      <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:background="@drawable/panel_bg" android:padding="10dp">
                          <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Shape" android:textColor="#FFF" android:textStyle="bold"/>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="6dp">
                              <Button android:id="@+id/shape_square" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Square" android:background="@drawable/btn_blue_filled" android:textColor="#000"/>
                              <Button android:id="@+id/shape_rectangle" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Rect" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          <Button android:id="@+id/shape_triangle" android:layout_width="match_parent" android:layout_height="36dp" android:text="Triangle" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginTop="4dp"/>
                          <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Size X/Y/Z" android:textColor="#FFF" android:textStyle="bold" android:layout_marginTop="10dp"/>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="6dp">
                              <Button android:id="@+id/size_x_minus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="X-" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                              <Button android:id="@+id/size_x_plus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="X+" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="4dp">
                              <Button android:id="@+id/size_y_minus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Y-" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                              <Button android:id="@+id/size_y_plus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Y+" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="4dp">
                              <Button android:id="@+id/size_z_minus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Z-" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                              <Button android:id="@+id/size_z_plus" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="Z+" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          <TextView android:id="@+id/txt_size_info" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="4x4x4" android:textColor="#AEEBFF" android:layout_marginTop="6dp"/>
                          <Button android:id="@+id/btn_grid" android:layout_width="match_parent" android:layout_height="36dp" android:text="Grid: On" android:background="@drawable/btn_blue_filled" android:textColor="#000" android:layout_marginTop="8dp"/>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center" android:layout_marginTop="8dp">
                              <View android:id="@+id/color_red" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#FF2222"/>
                              <View android:id="@+id/color_green" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#22FF22" android:layout_marginLeft="5dp"/>
                              <View android:id="@+id/color_blue" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#2288FF" android:layout_marginLeft="5dp"/>
                              <View android:id="@+id/color_yellow" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#FFFF22" android:layout_marginLeft="5dp"/>
                              <View android:id="@+id/color_white" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#FFFFFF" android:layout_marginLeft="5dp"/>
                              <View android:id="@+id/color_black" android:layout_width="26dp" android:layout_height="26dp" android:background="@drawable/color_btn" android:backgroundTint="#000000" android:layout_marginLeft="5dp"/>
                          </LinearLayout>
                          <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:layout_marginTop="8dp">
                              <Button android:id="@+id/dist_near" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="3" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                              <Button android:id="@+id/dist_mid" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="6" android:background="@drawable/btn_blue_filled" android:textColor="#000" android:layout_marginLeft="4dp"/>
                              <Button android:id="@+id/dist_far" android:layout_width="0dp" android:layout_height="36dp" android:layout_weight="1" android:text="12" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginLeft="4dp"/>
                          </LinearLayout>
                          <Button android:id="@+id/btn_place" android:layout_width="match_parent" android:layout_height="44dp" android:text="+ Place" android:background="@drawable/btn_blue_filled" android:textColor="#000" android:layout_marginTop="12dp"/>
                          <Button android:id="@+id/btn_block_events" android:layout_width="match_parent" android:layout_height="36dp" android:text="Events" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginTop="8dp" android:visibility="gone"/>
                          <Button android:id="@+id/btn_hide" android:layout_width="match_parent" android:layout_height="36dp" android:text="Hide" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginTop="8dp" android:visibility="gone"/>
                          <Button android:id="@+id/btn_delete" android:layout_width="match_parent" android:layout_height="36dp" android:text="Delete" android:background="@drawable/btn_red" android:textColor="#FF4444" android:layout_marginTop="8dp" android:visibility="gone"/>
                          <Button android:id="@+id/btn_deselect" android:layout_width="match_parent" android:layout_height="36dp" android:text="Deselect" android:background="@drawable/btn_blue" android:textColor="#00BFFF" android:layout_marginTop="8dp" android:visibility="gone"/>
                      </LinearLayout>
                  </ScrollView>
                  <LinearLayout android:id="@+id/axis_panel" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_alignParentBottom="true" android:layout_centerHorizontal="true" android:layout_marginBottom="20dp" android:orientation="horizontal" android:background="@drawable/panel_bg" android:padding="6dp" android:visibility="gone">
                      <Button android:id="@+id/axis_x_minus" android:layout_width="44dp" android:layout_height="44dp" android:text="X-" android:background="@drawable/btn_blue" android:textColor="#FF4444" android:textSize="12sp"/>
                      <Button android:id="@+id/axis_x_plus" android:layout_width="44dp" android:layout_height="44dp" android:text="X+" android:background="@drawable/btn_blue" android:textColor="#FF4444" android:textSize="12sp" android:layout_marginLeft="4dp"/>
                      <Button android:id="@+id/axis_y_minus" android:layout_width="44dp" android:layout_height="44dp" android:text="Y-" android:background="@drawable/btn_blue" android:textColor="#44FF44" android:textSize="12sp" android:layout_marginLeft="10dp"/>
                      <Button android:id="@+id/axis_y_plus" android:layout_width="44dp" android:layout_height="44dp" android:text="Y+" android:background="@drawable/btn_blue" android:textColor="#44FF44" android:textSize="12sp" android:layout_marginLeft="4dp"/>
                      <Button android:id="@+id/axis_z_minus" android:layout_width="44dp" android:layout_height="44dp" android:text="Z-" android:background="@drawable/btn_blue" android:textColor="#4488FF" android:textSize="12sp" android:layout_marginLeft="10dp"/>
                      <Button android:id="@+id/axis_z_plus" android:layout_width="44dp" android:layout_height="44dp" android:text="Z+" android:background="@drawable/btn_blue" android:textColor="#4488FF" android:textSize="12sp" android:layout_marginLeft="4dp"/>
                  </LinearLayout>
              </RelativeLayout>

              <RelativeLayout
                  android:id="@+id/playtest_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone">
                  <View android:id="@+id/playtest_look_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <Button android:id="@+id/btn_stop_playtest" android:layout_width="50dp" android:layout_height="50dp" android:layout_margin="10dp" android:text="&#9632;" android:textSize="20sp" android:background="@drawable/btn_red" android:textColor="#FFF"/>
                  <FrameLayout android:id="@+id/playtest_joy_base" android:layout_width="126dp" android:layout_height="126dp" android:layout_alignParentBottom="true" android:layout_alignParentLeft="true" android:layout_marginLeft="40dp" android:layout_marginBottom="40dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/playtest_joy_stick" android:layout_width="54dp" android:layout_height="54dp" android:layout_alignLeft="@id/playtest_joy_base" android:layout_alignTop="@id/playtest_joy_base" android:layout_marginLeft="36dp" android:layout_marginTop="36dp" android:background="@drawable/joy_stick"/>
                  <Button android:id="@+id/btn_playtest_jump" android:layout_width="90dp" android:layout_height="90dp" android:layout_alignParentRight="true" android:layout_alignParentBottom="true" android:layout_marginRight="40dp" android:layout_marginBottom="40dp" android:text="&#9650;" android:textSize="28sp" android:background="@drawable/btn_blue" android:textColor="#FFF"/>
              </RelativeLayout>

              <LinearLayout
                  android:id="@+id/menu_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:gravity="center"
                  android:background="#02050A">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="ENJOER" android:textSize="52sp" android:textColor="#00BFFF" android:textStyle="bold"/>
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="ENGINE 6.1" android:textSize="18sp" android:textColor="#0088CC" android:layout_marginBottom="40dp"/>
                  <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="vertical" android:background="@drawable/rigid_bg" android:padding="12dp" android:layout_marginBottom="40dp">
                      <TextView android:id="@+id/txt_menu_rigids" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="0 Rigids" android:textColor="#FFD700" android:textSize="20sp" android:textStyle="bold"/>
                  </LinearLayout>
                  <Button android:id="@+id/btn_play" android:layout_width="240dp" android:layout_height="60dp" android:text="Play" android:textSize="18sp" android:textColor="#000" android:background="@drawable/btn_blue_filled" android:layout_marginBottom="16dp"/>
                  <Button android:id="@+id/btn_engine" android:layout_width="240dp" android:layout_height="60dp" android:text="Editor" android:textSize="18sp" android:textColor="#00BFFF" android:background="@drawable/btn_blue" android:layout_marginBottom="16dp"/>
                  <Button android:id="@+id/btn_customize" android:layout_width="240dp" android:layout_height="60dp" android:text="Customize" android:textSize="18sp" android:textColor="#00BFFF" android:background="@drawable/btn_blue" android:layout_marginBottom="16dp"/>
                  <Button android:id="@+id/btn_load_file" android:layout_width="240dp" android:layout_height="60dp" android:text="Import .json" android:textSize="16sp" android:textColor="#00BFFF" android:background="@drawable/btn_blue"/>
              </LinearLayout>
          </FrameLayout>
          LAYOUT

          cat > app/src/main/java/com/enjoer/game/Block.java << 'EOF'
          package com.enjoer.game;
          public class Block {
              public float x,y,z,sx,sy,sz,r,g,b;
              public boolean hidden=false;
              public String onStartScript="",onTouchScript="",onTapScript="";
              public boolean started=false,touchingPlayer=false;
              public Block(float x,float y,float z,float sx,float sy,float sz,float r,float g,float b){
                  this.x=x;this.y=y;this.z=z;this.sx=sx;this.sy=sy;this.sz=sz;this.r=r;this.g=g;this.b=b;
              }
              public float minX(){return x-sx/2f;}public float maxX(){return x+sx/2f;}
              public float minY(){return y-sy/2f;}public float maxY(){return y+sy/2f;}
              public float minZ(){return z-sz/2f;}public float maxZ(){return z+sz/2f;}
          }
          EOF

          cat > app/src/main/java/com/enjoer/game/PlayerPrefs.java << 'EOF'
          package com.enjoer.game;
          import android.content.Context;
          import android.content.SharedPreferences;
          public class PlayerPrefs {
              private static SharedPreferences p;
              public static void init(Context c){p=c.getSharedPreferences("enjoer_prefs",Context.MODE_PRIVATE);}
              public static int getRigids(){return p.getInt("rigids",0);}
              public static void setRigids(int v){p.edit().putInt("rigids",v).apply();}
              public static void addRigids(int v){setRigids(getRigids()+v);}
              public static int getSkinColor(){return p.getInt("skinColor",0);}
              public static void setSkinColor(int v){p.edit().putInt("skinColor",v).apply();}
              public static int getTorsoColor(){return p.getInt("torsoColor",1);}
              public static void setTorsoColor(int v){p.edit().putInt("torsoColor",v).apply();}
              public static int getLegsColor(){return p.getInt("legsColor",2);}
              public static void setLegsColor(int v){p.edit().putInt("legsColor",v).apply();}
              public static int getFaceType(){return p.getInt("faceType",0);}
              public static void setFaceType(int v){p.edit().putInt("faceType",v).apply();}
              public static int getAnimPack(){return p.getInt("animPack",0);}
              public static void setAnimPack(int v){p.edit().putInt("animPack",v).apply();}
              public static boolean isAnimPackOwned(int i){if(i==0)return true;return p.getBoolean("ap_own_"+i,false);}
              public static void setAnimPackOwned(int i){p.edit().putBoolean("ap_own_"+i,true).apply();}
              public static boolean isSkinOwned(int i){if(i==0)return true;return p.getBoolean("sk_own_"+i,false);}
              public static void setSkinOwned(int i){p.edit().putBoolean("sk_own_"+i,true).apply();}
