          package com.enjoer.game;
          import java.util.Locale;
          public class ScriptEngine {
              public interface Host { GameRenderer renderer(); void toast(String text); }
              public static void run(Host host,String script) throws Exception {
                  if(script==null)return;
                  for(String raw:script.split("\\r?\\n")){
                      String line=raw.trim();
                      if(line.isEmpty()||line.startsWith("//")||line.startsWith("#"))continue;
                      exec(host,line);
                  }
              }
              private static void exec(Host host,String line) throws Exception {
                  GameRenderer ren=host.renderer();
                  if(line.equals("player.jump")){ren.vY=0.55f;return;}
                  if(line.equals("block.hide")){Block b=ren.getSelectedBlock();if(b!=null)b.hidden=true;return;}
                  if(line.equals("block.show")){Block b=ren.getSelectedBlock();if(b!=null)b.hidden=false;return;}
                  if(line.equals("block.delete")){ren.deleteSelected();return;}
                  if(line.startsWith("player.teleport(")&&line.endsWith(")")){String[]a=args(line);ren.pX=f(a[0]);ren.pY=f(a[1]);ren.pZ=f(a[2]);ren.vY=0;return;}
                  if(line.startsWith("player.rotate(")&&line.endsWith(")")){String[]a=args(line);ren.rY=f(a[0]);ren.rX=f(a[1]);return;}
                  if(line.startsWith("phone.toast(")&&line.endsWith(")")){host.toast(stripQ(argsText(line)[0]));return;}
                  if(line.startsWith("phone.grid(")&&line.endsWith(")")){ren.gridEnabled=parseBool(args(line)[0]);return;}
                  if(line.startsWith("block.color(")&&line.endsWith(")")){String[]a=args(line);Block b=ren.getSelectedBlock();if(b==null)throw new Exception("No block");b.r=c(f(a[0]));b.g=c(f(a[1]));b.b=c(f(a[2]));return;}
                  if(line.startsWith("block.move(")&&line.endsWith(")")){String[]a=args(line);ren.moveSelected(f(a[0]),f(a[1]),f(a[2]));return;}
                  if(line.startsWith("block.size(")&&line.endsWith(")")){String[]a=args(line);Block b=ren.getSelectedBlock();if(b==null)throw new Exception("No block");b.sx=Math.max(.5f,f(a[0]));b.sy=Math.max(.5f,f(a[1]));b.sz=Math.max(.5f,f(a[2]));if(b.y-b.sy/2f<0)b.y=b.sy/2f;return;}
                  if(line.startsWith("block.teleport(")&&line.endsWith(")")){String[]a=args(line);Block b=ren.getSelectedBlock();if(b==null)throw new Exception("No block");b.x=f(a[0]);b.y=f(a[1]);b.z=f(a[2]);if(b.y-b.sy/2f<0)b.y=b.sy/2f;return;}
                  if(line.startsWith("block.shape(")&&line.endsWith(")")){Block b=ren.getSelectedBlock();if(b==null)throw new Exception("No block");b.shape=stripQ(argsText(line)[0]).toLowerCase(Locale.US);return;}
                  if(line.startsWith("world.place(")&&line.endsWith(")")){String[]a=args(line);ren.blocks.add(new Block(f(a[0]),f(a[1]),f(a[2]),Math.max(.5f,f(a[3])),Math.max(.5f,f(a[4])),Math.max(.5f,f(a[5])),c(f(a[6])),c(f(a[7])),c(f(a[8]))));return;}
                  throw new Exception("Unknown: "+line);
              }
              private static boolean parseBool(String s){s=s.trim().toLowerCase(Locale.US);return s.equals("true")||s.equals("1")||s.equals("on");}
              private static String[]args(String l){int s=l.indexOf('('),e=l.lastIndexOf(')');String b=l.substring(s+1,e).trim();if(b.isEmpty())return new String[0];String[]a=b.split(",");for(int i=0;i<a.length;i++)a[i]=a[i].trim();return a;}
              private static String[]argsText(String l){int s=l.indexOf('('),e=l.lastIndexOf(')');return new String[]{l.substring(s+1,e).trim()};}
              private static String stripQ(String s){s=s.trim();if(s.length()>1&&(s.charAt(0)=='"'||s.charAt(0)=='\''))return s.substring(1,s.length()-1);return s;}
              private static float f(String s){return Float.parseFloat(s.trim());}
              private static float c(float v){return Math.max(0,Math.min(1,v));}
          }
