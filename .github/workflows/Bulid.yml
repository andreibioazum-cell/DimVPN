              private void runScript(){
                  String code=scriptEditor.getText().toString();
                  Context ctx=Context.enter();ctx.setOptimizationLevel(-1);
                  try{
                      Scriptable scope=ctx.initStandardObjects();
                      ScriptableObject.putProperty(scope,"player",Context.javaToJS(new ScriptPlayer(),scope));
                      ScriptableObject.putProperty(scope,"blocks",Context.javaToJS(ren.blocks,scope));
                      ScriptableObject.putProperty(scope,"lights",Context.javaToJS(ren.lights,scope));
                      ScriptableObject.putProperty(scope,"items",Context.javaToJS(ren.items,scope));
                      Object result=ctx.evaluateString(scope,code,"script",1,null);
                      scriptOutput.setText("✓ "+Context.toString(result));
                  }catch(Exception e){scriptOutput.setText("✗ "+e.getMessage());}
                  finally{Context.exit();}
              }

              public class ScriptPlayer{
                  public void setPosition(float x,float y,float z){ren.pX=x;ren.pY=y;ren.pZ=z;}
                  public float getX(){return ren.pX;}
                  public float getY(){return ren.pY;}
                  public float getZ(){return ren.pZ;}
              }

