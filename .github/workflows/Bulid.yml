          cat <<EOF > app/src/main/java/com/enjoer/game/Block.java
          package com.enjoer.game;

          public class Block {
              public float x, y, z, sx, sy, sz, r, g, b;

              public Block(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b) {
                  this.x = x;
                  this.y = y;
                  this.z = z;
                  this.sx = sx;
                  this.sy = sy;
                  this.sz = sz;
                  this.r = r;
                  this.g = g;
                  this.b = b;
              }

              public float minX(){ return x - sx / 2f; }
              public float maxX(){ return x + sx / 2f; }
              public float minY(){ return y - sy / 2f; }
              public float maxY(){ return y + sy / 2f; }
              public float minZ(){ return z - sz / 2f; }
              public float maxZ(){ return z + sz / 2f; }
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/Survivor.java
          package com.enjoer.game;

          public class Survivor {
              public static final int AGENT_SVIN = 0;
              public static final int GRAY_GUY = 1;
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/Killer.java
          package com.enjoer.game;

          public class Killer {
              public static final int DIMASI4EK229 = 0;
              public static final int DERKA = 1;
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/Bot.java
          package com.enjoer.game;

          public class Bot {
              public float x, y, z;
              public float yaw;
              public float hp = 100f;
              public boolean alive = true;
              public boolean killer;
              public int survivorType = Survivor.GRAY_GUY;
              public int killerType = Killer.DIMASI4EK229;
              public float anim = 0f;
              public float swing = 0f;
              public float hpBar = 100f;
              public long stunnedUntil = 0L;

              public Bot(float x, float y, float z, boolean killer) {
                  this.x = x;
                  this.y = y;
                  this.z = z;
                  this.killer = killer;
              }
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/Projectile.java
          package com.enjoer.game;

          public class Projectile {
              public float x, y, z;
              public float vx, vy, vz;
              public boolean active = true;
              public float life = 180f;
              public boolean fromPlayer = true;

              public Projectile(float x, float y, float z, float vx, float vy, float vz, boolean fromPlayer) {
                  this.x = x;
                  this.y = y;
                  this.z = z;
                  this.vx = vx;
                  this.vy = vy;
                  this.vz = vz;
                  this.fromPlayer = fromPlayer;
              }
          }
          EOF

          cat <<'EOF' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;

          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.ByteBuffer;
          import java.nio.ByteOrder;
          import java.nio.FloatBuffer;
          import java.util.Random;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] proj = new float[16];
              private final float[] view = new float[16];
              private final float[] model = new float[16];
              private final Random rnd = new Random();

              public float pX = 0f, pY = 1f, pZ = 0f;
              public float rY = 180f, rX = 15f;
              public float jX = 0f, jY = 0f;
              public float bodyYaw = 180f;
              public float walkTime = 0f;
              public float moveAmount = 0f;

              public boolean runEnabled = false;
              public float stamina = 100f;
              public long staminaCooldownUntil = 0L;
              public boolean staminaBroken = false;

              public boolean inLobby = false;
              public long phaseEndTimeMs = 0L;
              public boolean inMenu = true;

              public int selectedSurvivor = Survivor.AGENT_SVIN;
              public int selectedKiller = Killer.DIMASI4EK229;

              public boolean playerIsKiller = false;
              public float playerHp = 100f;
              public long playerStunnedUntil = 0L;
              public long derkaDashUntil = 0L;

              public long skill1CdUntil = 0L;
              public long skill2CdUntil = 0L;
              public long skill3CdUntil = 0L;
              public boolean killerBoostUsed = false;

              public float playerArmAnim = 0f;
              public float playerBodyAnim = 0f;

              private int prog3d, prog2d;
              private FloatBuffer vBuf, nBuf;

              public CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              public CopyOnWriteArrayList<Bot> bots = new CopyOnWriteArrayList<>();
              public CopyOnWriteArrayList<Projectile> projectiles = new CopyOnWriteArrayList<>();

              private static final float FLOOR_Y = 0f;
              private static final float PLAYER_RADIUS = 0.38f;
              private static final float PLAYER_HEIGHT = 2.4f;
              private static final float PLAYER_SCALE = 0.68f;

              public static final long ROUND_MS = 70000L;
              public static final long LOBBY_MS = 30000L;

              public GameRenderer() {
                  startLobby();
              }

              public void toggleRun() { runEnabled = !runEnabled; }
              public void setSurvivor(int s) { selectedSurvivor = s; }
              public void setKiller(int k) { selectedKiller = k; }

              public void startGameFromMenu() {
                  inMenu = false;
                  startLobby();
              }

              public void backToMenu() {
                  inMenu = true;
                  bots.clear();
                  projectiles.clear();
              }

              public void startRound() {
                  inLobby = false;
                  phaseEndTimeMs = System.currentTimeMillis() + ROUND_MS;
                  pX = 0f; pY = 1f; pZ = 8f;
                  bodyYaw = 180f; rY = 180f; rX = 15f;
                  playerHp = 100f;
                  playerStunnedUntil = 0L;
                  derkaDashUntil = 0L;
                  skill1CdUntil = 0L;
                  skill2CdUntil = 0L;
                  skill3CdUntil = 0L;
                  killerBoostUsed = false;
                  stamina = 100f;
                  staminaBroken = false;
                  runEnabled = false;
                  loadRoundMap();
                  spawnRoundBots();
              }

              public void startLobby() {
                  inLobby = true;
                  phaseEndTimeMs = System.currentTimeMillis() + LOBBY_MS;
                  pX = 0f; pY = 1f; pZ = 20f;
                  bodyYaw = 180f; rY = 180f; rX = 15f;
                  playerHp = 100f;
                  loadLobbyMap();
                  spawnLobbyBots();
              }

              private void spawnLobbyBots() {
                  bots.clear();
                  projectiles.clear();
                  bots.add(new Bot(-6f, 1f, 14f, false));
                  bots.add(new Bot(6f, 1f, 10f, false));
              }

              private void spawnRoundBots() {
                  bots.clear();
                  projectiles.clear();

                  int killerIndex = rnd.nextInt(4);
                  playerIsKiller = killerIndex == 0;

                  for (int i = 1; i <= 3; i++) {
                      boolean isKiller = killerIndex == i;
                      Bot b = new Bot(-8f + i * 6f, 1f, -2f - i * 4f, isKiller);
                      b.survivorType = (i % 2 == 0) ? Survivor.AGENT_SVIN : Survivor.GRAY_GUY;
                      b.killerType = (rnd.nextBoolean()) ? Killer.DIMASI4EK229 : Killer.DERKA;
                      if(isKiller && playerIsKiller) b.killerType = selectedKiller; // Keep consistency if bot was killer
                      bots.add(b);
                  }
              }

              public long getTimeLeftMs() {
                  return Math.max(0L, phaseEndTimeMs - System.currentTimeMillis());
              }

              public void updatePhase() {
                  if (inMenu) return;
                  if (System.currentTimeMillis() >= phaseEndTimeMs) {
                      if (inLobby) startRound(); else startLobby();
                  }
              }

              public void useSkill1() {
                  long now = System.currentTimeMillis();
                  if (now < skill1CdUntil || inMenu) return;

                  if (!playerIsKiller) {
                      Bot nearest = null;
                      float best = 99999f;
                      for (Bot b : bots) {
                          if (!b.alive || !b.killer) continue;
                          float dx = b.x - pX, dz = b.z - pZ;
                          float d = dx*dx + dz*dz;
                          if (d < best && d < 36f) { best = d; nearest = b; }
                      }
                      if (nearest != null) {
                          nearest.anim = -120f;
                          playerBodyAnim = 16f;
                          skill1CdUntil = now + 8000L;
                      }
                  } else {
                      playerArmAnim = 28f;
                      float range = (selectedKiller == Killer.DERKA) ? 6.5f : 4f;
                      float dmg = (selectedKiller == Killer.DERKA) ? 35f : 30f;
                      for (Bot b : bots) {
                          if (!b.alive || b.killer) continue;
                          float dx = b.x - pX, dz = b.z - pZ;
                          if (dx*dx + dz*dz < range) {
                              b.hp -= dmg;
                              if (b.hp <= 0f) b.alive = false;
                          }
                      }
                      skill1CdUntil = now + 2500L;
                  }
              }

              public void useSkill2() {
                  long now = System.currentTimeMillis();
                  if (now < skill2CdUntil || inMenu) return;

                  if (playerIsKiller) {
                      if (selectedKiller == Killer.DIMASI4EK229) {
                          float yawRad = (float)Math.toRadians(bodyYaw);
                          float vx = (float)Math.sin(yawRad) * 0.45f;
                          float vz = (float)Math.cos(yawRad) * 0.45f;
                          projectiles.add(new Projectile(pX, pY + 1.7f, pZ, vx, 0f, vz, true));
                          playerArmAnim = 22f;
                          skill2CdUntil = now + 5000L;
                      } else if (selectedKiller == Killer.DERKA) {
                          derkaDashUntil = now + 350L;
                          skill2CdUntil = now + 6000L;
                      }
                  }
              }

              public void useSkill3() {
                  long now = System.currentTimeMillis();
                  if (now < skill3CdUntil || inMenu) return;

                  if (playerIsKiller) {
                      if (selectedKiller == Killer.DIMASI4EK229 && !killerBoostUsed) {
                          stamina += 35f;
                          if (stamina > 100f) stamina = 100f;
                          killerBoostUsed = true;
                          skill3CdUntil = now + 9999999L;
                      } else if (selectedKiller == Killer.DERKA) {
                          playerArmAnim = 20f;
                          for (Bot b : bots) {
                              if (!b.alive || b.killer) continue;
                              float dx = b.x - pX, dz = b.z - pZ;
                              if (dx*dx + dz*dz < 64f) {
                                  b.stunnedUntil = now + 3000L;
                              }
                          }
                          skill3CdUntil = now + 12000L;
                      }
                  }
              }

