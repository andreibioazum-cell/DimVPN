name: Build GodBlock 9.6 FULL FIXED

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: settings.gradle
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  maven { url = 'https://maven.fabricmc.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          rootProject.name = "GodBlock"
          EOF

      - name: build.gradle
        run: |
          cat << 'EOF' > build.gradle
          plugins {
              id 'fabric-loom' version '1.6.12'
          }

          group = 'me.godblock'
          version = '9.6'

          repositories {
              mavenCentral()
              maven { url 'https://maven.fabricmc.net/' }
          }

          dependencies {
              minecraft "com.mojang:minecraft:1.20.1"
              mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
              modImplementation "net.fabricmc:fabric-loader:0.15.11"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.1+1.20.1"
          }

          java {
              toolchain.languageVersion = JavaLanguageVersion.of(17)
          }
          EOF

      - run: echo "org.gradle.jvmargs=-Xmx4G" > gradle.properties
      - run: echo "org.gradle.daemon=false" >> gradle.properties

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - run: mkdir -p src/main/java/me/godblock
      - run: mkdir -p src/main/resources

      - name: fabric.mod.json
        run: |
          cat << 'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "godblock",
            "version": "9.6",
            "name": "God Block 9.6",
            "entrypoints": { "main": ["me.godblock.GodBlockMod"] },
            "depends": {
              "fabricloader": ">=0.15.0",
              "minecraft": "1.20.1",
              "fabric-api": "*"
            }
          }
          EOF

      - name: Java Source
        run: |
          cat << 'EOF' > src/main/java/me/godblock/GodBlockMod.java
          package me.godblock;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.object.builder.v1.block.entity.FabricBlockEntityTypeBuilder;
          import net.fabricmc.fabric.api.itemgroup.v1.ItemGroupEvents;
          import net.minecraft.block.*;
          import net.minecraft.block.entity.*;
          import net.minecraft.entity.*;
          import net.minecraft.entity.mob.HostileEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.*;
          import net.minecraft.nbt.NbtCompound;
          import net.minecraft.registry.*;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.sound.SoundCategory;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.state.StateManager;
          import net.minecraft.state.property.IntProperty;
          import net.minecraft.util.*;
          import net.minecraft.util.hit.BlockHitResult;
          import net.minecraft.util.math.*;
          import net.minecraft.world.World;

          import java.util.*;

          public class GodBlockMod implements ModInitializer {

              public static final String MOD_ID="godblock";
              public static final IntProperty CLICKS=IntProperty.of("clicks",0,30);
              public static final IntProperty MODE=IntProperty.of("mode",1,4);

              public static Block UNCHARGED;
              public static Block CHARGED;
              public static BlockEntityType<ChargedEntity> TYPE;

              @Override
              public void onInitialize(){

                  UNCHARGED=Registry.register(Registries.BLOCK,
                          new Identifier(MOD_ID,"god_block"),
                          new UnchargedBlock(AbstractBlock.Settings.copy(Blocks.STONE).strength(3f)));

                  CHARGED=Registry.register(Registries.BLOCK,
                          new Identifier(MOD_ID,"god_block_charged"),
                          new ChargedBlock(AbstractBlock.Settings.copy(Blocks.NETHERITE_BLOCK)
                                  .strength(5f).luminance(s->15)));

                  Registry.register(Registries.ITEM,new Identifier(MOD_ID,"god_block"),
                          new BlockItem(UNCHARGED,new Item.Settings()));
                  Registry.register(Registries.ITEM,new Identifier(MOD_ID,"god_block_charged"),
                          new BlockItem(CHARGED,new Item.Settings()));

                  TYPE=Registry.register(
                          Registries.BLOCK_ENTITY_TYPE,
                          new Identifier(MOD_ID,"god_entity"),
                          FabricBlockEntityTypeBuilder.create(ChargedEntity::new,CHARGED).build()
                  );

                  ItemGroupEvents.modifyEntriesEvent(ItemGroups.BUILDING_BLOCKS)
                          .register(e->{e.add(UNCHARGED);e.add(CHARGED);});
              }

              public static class UnchargedBlock extends Block{
                  public UnchargedBlock(Settings s){
                      super(s);
                      setDefaultState(getStateManager().getDefaultState().with(CLICKS,0));
                  }
                  protected void appendProperties(StateManager.Builder<Block,BlockState>b){b.add(CLICKS);}
                  public ActionResult onUse(BlockState state,World world,BlockPos pos,
                                            PlayerEntity player,Hand hand,BlockHitResult hit){
                      if(world.isClient)return ActionResult.SUCCESS;
                      int c=state.get(CLICKS)+1;
                      if(c>=30){
                          world.setBlockState(pos,CHARGED.getDefaultState());
                      }else world.setBlockState(pos,state.with(CLICKS,c));
                      return ActionResult.SUCCESS;
                  }
              }

              static class Snapshot{
                  Map<BlockPos,BlockState> blocks=new HashMap<>();
                  Map<BlockPos,NbtCompound> blockEntities=new HashMap<>();
                  Map<UUID,NbtCompound> entities=new HashMap<>();
                  long time;
              }

              public static class ChargedBlock extends BlockWithEntity{
                  public ChargedBlock(Settings s){
                      super(s);
                      setDefaultState(getStateManager().getDefaultState().with(MODE,1));
                  }
                  protected void appendProperties(StateManager.Builder<Block,BlockState>b){b.add(MODE);}
                  public BlockEntity createBlockEntity(BlockPos pos,BlockState state){
                      return new ChargedEntity(pos,state);
                  }
                  public <T extends BlockEntity> BlockEntityTicker<T> getTicker(
                          World world,BlockState state,BlockEntityType<T> type){
                      return world.isClient?null:checkType(type,TYPE,ChargedEntity::tick);
                  }
              }

              public static class ChargedEntity extends BlockEntity{

                  static Snapshot snapshot=null;
                  static long lastSave=0;
                  static long lastRewind=-9999;

                  public ChargedEntity(BlockPos pos,BlockState state){
                      super(TYPE,pos,state);
                  }

                  static void tick(World world,BlockPos pos,
                                   BlockState state,ChargedEntity be){

                      if(!(world instanceof ServerWorld sw))return;

                      Box radius=new Box(pos).expand(150);
                      int mode=state.get(MODE);

                      if(mode==1 && sw.getTime()%40==0){
                          for(HostileEntity mob:
                              sw.getEntitiesByClass(HostileEntity.class,radius,e->true)){
                              mob.damage(sw.getDamageSources().magic(),2f);
                          }
                      }

                      if(sw.getTime()-lastSave>=100){
                          lastSave=sw.getTime();
                          snapshot=new Snapshot();
                          snapshot.time=sw.getTimeOfDay();
                      }

                      if(mode==4 && snapshot!=null){
                          if(sw.getTime()-lastRewind<3600)return;
                          lastRewind=sw.getTime();
                          sw.setTimeOfDay(snapshot.time);
                      }
                  }
              }
          }
          EOF

      - name: Build
        run: gradle build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: GodBlock-9.6-FULL
          path: build/libs/*.jar
