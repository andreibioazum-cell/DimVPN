name: L-OS_Autonomous_Mesh_Edition
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build L-OS Autonomous
        run: |
          mkdir -p src qml apps
          
          # --- 1. ЯДРО АВТОНОМНОГО РЕТРАНСЛЯТОРА (C++) ---
          cat <<EOF > src/core.h
          #include <QObject>
          #include <QUdpSocket>
          #include <QNetworkDatagram>
          #include <QRandomGenerator>

          class LOS_Core : public QObject {
              Q_OBJECT
          public:
              QString myNodeID;
              explicit LOS_Core(QObject *parent = nullptr) : QObject(parent) {
                  myNodeID = QString::number(QRandomGenerator::global()->generate() % 1000);
                  udp = new QUdpSocket(this);
                  // Слушаем порт автономной сети
                  udp->bind(QHostAddress::Any, 10001, QUdpSocket::ShareAddress);
                  connect(udp, &QUdpSocket::readyRead, this, &LOS_Core::handleMeshTraffic);
              }

              // Отправка данных в эфир (через Wi-Fi Direct / Ad-Hoc)
              Q_INVOKABLE void broadcastData(QString type, QString payload, QString targetID = "ALL") {
                  // Формат: ТИП | ОТПРАВИТЕЛЬ | ЦЕЛЬ | ПРЫЖКИ | ДАННЫЕ
                  QString raw = QString("%1|%2|%3|%4|%5")
                                  .arg(type).arg(myNodeID).arg(targetID).arg(0).arg(payload);
                  
                  QByteArray packet = raw.toUtf8();
                  // L-Stealth XOR шифрование
                  for(int i=0; i<packet.size(); i++) packet[i] = packet[i] ^ 0xAF;
                  
                  udp->writeDatagram(packet, QHostAddress::Broadcast, 10001);
              }

              void handleMeshTraffic() {
                  while (udp->hasPendingDatagrams()) {
                      QNetworkDatagram dg = udp->receiveDatagram();
                      QByteArray packet = dg.data();
                      for(int i=0; i<packet.size(); i++) packet[i] = packet[i] ^ 0xAF; // Дешифровка
                      
                      QStringList parts = QString(packet).split("|");
                      if(parts.size() < 5) return;

                      QString type = parts[0];
                      QString sender = parts[1];
                      QString target = parts[2];
                      int hops = parts[3].toInt();
                      QString data = parts[4];

                      if(sender == myNodeID) return; // Игнорим свои же пакеты

                      if(target == myNodeID || target == "ALL") {
                          if(type == "DRAW") emit remoteDrawReceived(data);
                          if(type == "CHAT") emit remoteMessageReceived(sender, data);
                      }

                      // РЕТРАНСЛЯЦИЯ (MESH LOGIC)
                      if(hops < 5) { // Ограничение 5 прыжков чтобы не заспамить эфир
                          parts[3] = QString::number(hops + 1);
                          QString relayStr = parts.join("|");
                          QByteArray relayPacket = relayStr.toUtf8();
                          for(int i=0; i<relayPacket.size(); i++) relayPacket[i] = relayPacket[i] ^ 0xAF;
                          udp->writeDatagram(relayPacket, QHostAddress::Broadcast, 10001);
                      }
                  }
              }

          signals:
              void remoteDrawReceived(QString data);
              void remoteMessageReceived(QString from, QString text);
              void statusChanged(QString s);

          private:
              QUdpSocket *udp;
          };
          EOF

          cat <<EOF > src/main.cpp
          #include <QGuiApplication>
          #include <QQmlApplicationEngine>
          #include <QQmlContext>
          #include "core.h"

          int main(int argc, char *argv[]) {
              QGuiApplication app(argc, argv);
              QQmlApplicationEngine engine;
              LOS_Core core;
              engine.rootContext()->setContextProperty("OS", &core);
              engine.load(QUrl(QStringLiteral("qrc:/qt/qml/Main.qml")));
              return app.exec();
          }
          EOF

          # --- 2. ИНТЕРФЕЙС СО СТАТУСОМ АВТОНОМНОЙ СЕТИ ---
          cat <<EOF > qml/Main.qml
          import QtQuick
          import QtQuick.Controls

          ApplicationWindow {
              id: window; visible: true; width: 360; height: 720
              property string currentApp: "Home"

              Rectangle { anchors.fill: parent; color: "#000" }

              Loader { 
                  id: mainLoader; anchors.fill: parent
                  source: currentApp == "Home" ? "Launcher.qml" : "apps/" + currentApp + ".qml"
              }

              // ШТОРКА "АВТОНОМНЫЙ РЕЖИМ"
              Rectangle {
                  id: curtain; z: 100; width: parent.width; height: 420
                  y: -height + 40; color: "#0a0a0a"; border.color: "#00ff00"
                  
                  Column {
                      anchors.fill: parent; anchors.margins: 20; spacing: 15
                      Text { text: "L-NET: АВТОНОМНЫЙ РЕТРАНСЛЯТОР"; color: "#00ff00"; font.bold: true }
                      
                      Rectangle {
                          width: parent.width; height: 120; color: "#111"; radius: 10
                          Text {
                              anchors.fill: parent; anchors.margins: 10; color: "#00ff00"
                              text: "📡 РЕЖИМ 'БАШНЯ': Включен.\n" +
                                    "Ваш телефон передает пакеты других людей.\n" +
                                    "ДИСТАНЦИЯ: Зависит от цепочки людей.\n" +
                                    "ИНТЕРНЕТ: НЕ ИСПОЛЬЗУЕТСЯ."
                              font.pixelSize: 12; wrapMode: Text.WordWrap
                          }
                      }
                      
                      Text { text: "ID вашего узла: " + (OS ? OS.myNodeID : "..."); color: "gray" }
                  }
                  
                  MouseArea {
                      anchors.fill: parent; property real ly
                      onPressed: ly = mouseY
                      onPositionChanged: { let d = mouseY-ly; if(curtain.y+d <= 0 && curtain.y+d >= -380) curtain.y+=d }
                      onReleased: curtain.y = (curtain.y > -190) ? 0 : -380
                  }
              }
          }
          EOF

          # --- 3. ПРИЛОЖЕНИЕ L-PAINT MESH ---
          cat <<EOF > qml/apps/LPaint.qml
          import QtQuick
          import QtQuick.Controls

          Rectangle {
              color: "#000"
              Canvas {
                  id: canvas; anchors.fill: parent
                  function draw(x, y, col, isNew) {
                      var ctx = getContext("2d"); if(isNew) ctx.beginPath();
                      ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.lineTo(x, y); ctx.stroke();
                      requestPaint();
                  }
              }
              MouseArea {
                  anchors.fill: parent
                  onPositionChanged: {
                      canvas.draw(mouse.x, mouse.y, "#00ff00", false);
                      OS.broadcastData("DRAW", mouse.x + "," + mouse.y + ",#00ff00,0");
                  }
              }
              Connections {
                  target: OS
                  onRemoteDrawReceived: (data) => {
                      let p = data.split(",");
                      canvas.draw(p[0], p[1], p[2], p[3]=="1");
                  }
              }
          }
          EOF

          cat <<EOF > CMakeLists.txt
          cmake_minimum_required(VERSION 3.16)
          project(L-OS LANGUAGES CXX)
          find_package(Qt6 REQUIRED COMPONENTS Core Gui Qml Quick Network)
          qt_add_executable(L-OS src/main.cpp)
          qt_add_qml_module(L-OS URI VirtualOS FILES qml/Main.qml qml/Launcher.qml qml/apps/LPaint.qml)
          target_link_libraries(L-OS PRIVATE Qt6::Core Qt6::Gui Qt6::Qml Qt6::Quick Qt6::Network)
          EOF

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          target: 'android'
          arch: 'android_arm64_v8a'

      - name: Build APK
        run: |
          mkdir build && cd build
          qt-cmake .. -DQT_ANDROID_BUILD_ALL_ABIS=OFF
          cmake --build . --target apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: L-OS-Autonomous-Mesh
          path: build/android-build/*.apk
