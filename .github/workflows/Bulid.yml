name: TinyOS App Platform
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib nasm qemu-system-x86

      - name: Build Kernel
        run: |
          cat > kernel.asm << 'KERNEL'
          [bits 32]
          [org 0x10000]
          
          ; ============== СИСТЕМНЫЕ ВЫЗОВЫ ==============
          syscall_handler:
              cmp ah, 0x01
              je sys_print_string
              cmp ah, 0x02
              je sys_print_int
              cmp ah, 0x03
              je sys_put_pixel
              cmp ah, 0x04
              je sys_draw_rect
              cmp ah, 0x05
              je sys_get_key
              cmp ah, 0x06
              je sys_sleep
              cmp ah, 0x07
              je sys_exec_app
              cmp ah, 0x08
              je sys_exit
              iret
          
          sys_print_string:
              push es
              push ds
              pop es
              mov bp, bx
              mov cx, 0xFFFF
              mov ax, 0x1301
              mov bx, 0x000F
              int 0x10
              pop es
              iret
          
          sys_print_int:
              push eax
              push ebx
              push ecx
              push edx
              mov eax, ebx
              mov ebx, 10
              xor ecx, ecx
          .div_loop:
              xor edx, edx
              div ebx
              push dx
              inc ecx
              test eax, eax
              jnz .div_loop
          .print_loop:
              pop ax
              add al, '0'
              mov ah, 0x0E
              int 0x10
              loop .print_loop
              pop edx
              pop ecx
              pop ebx
              pop eax
              iret
          
          sys_put_pixel:
              mov edi, 0xA0000
              add edi, ebx
              mov al, cl
              stosb
              iret
          
          sys_draw_rect:
              pusha
              mov ecx, edx
          .rect_y:
              push ecx
              mov ebp, ebx
              mov ecx, esi
          .rect_x:
              mov edi, 0xA0000
              add edi, ebp
              add edi, ecx
              mov al, [color_tmp]
              stosb
              dec ecx
              jnz .rect_x
              pop ecx
              add ebx, 320
              dec ecx
              jnz .rect_y
              popa
              iret
          
          sys_get_key:
              pusha
              xor ax, ax
              int 0x16
              mov ebx, [esp+32]
              mov [ebx], al
              popa
              iret
          
          sys_sleep:
              push eax
              push ecx
              mov ecx, ebx
              xor eax, eax
          .delay:
              inc eax
              cmp eax, 0xFFFFF
              jne .delay
              loop .delay
              pop ecx
              pop eax
              iret
          
          sys_exec_app:
              pusha
              mov esi, ebx
              mov edi, 0x20000
          .load:
              lodsb
              stosb
              cmp al, 0
              jnz .load
              mov word [current_app], 1
              jmp 0x20000
              popa
              iret
          
          sys_exit:
              mov word [current_app], 0
              iret
          
          ; ============== ЯДРО ==============
          start:
              mov ax, 0x0013
              int 0x10
              
              call draw_desktop
              
              mov esi, welcome_msg
              call print_string
              
              jmp shell_start
          
          draw_desktop:
              mov ecx, 200
              mov dword [offset_sky], 0
          .sky:
              push ecx
              mov ecx, 320
          .horizon:
              mov eax, ecx
              mov ebx, 320
              xor edx, edx
              div ebx
              add al, 16
              push ecx
              mov ebx, [offset_sky]
              add ebx, ecx
              mov edi, 0xA0000
              add edi, ebx
              stosb
              pop ecx
              loop .horizon
              add dword [offset_sky], 320
              pop ecx
              loop .sky
              
              mov ecx, 60
              mov dword [offset_ground], 19200
          .ground:
              push ecx
              mov ecx, 320
          .ground_row:
              mov ebx, [offset_ground]
              add ebx, ecx
              mov edi, 0xA0000
              add edi, ebx
              mov al, 0x02
              stosb
              loop .ground_row
              add dword [offset_ground], 320
              pop ecx
              loop .ground
              ret
          
          ; ============== ОБОЛОЧКА ==============
          shell_start:
              call draw_shell
          
          shell_loop:
              mov esi, prompt
              call print_string
              
              mov edi, cmd_buffer
              xor ebx, ebx
          
          read_cmd:
              xor ax, ax
              int 0x16
              
              cmp al, 0x0D
              je exec_cmd
              
              cmp al, 0x08
              je backspace
              
              mov [edi + ebx], al
              inc ebx
              mov ah, 0x0E
              int 0x10
              jmp read_cmd
          
          backspace:
              cmp ebx, 0
              je read_cmd
              dec ebx
              mov al, 0x08
              mov ah, 0x0E
              int 0x10
              mov al, ' '
              int 0x10
              mov al, 0x08
              int 0x10
              jmp read_cmd
          
          exec_cmd:
              call newline
              mov byte [edi + ebx], 0
              
              mov esi, cmd_buffer
              
              mov edi, cmd_run
              call strcmp
              cmp eax, 1
              je run_app
              
              mov edi, cmd_ls
              call strcmp
              cmp eax, 1
              je list_apps
              
              mov edi, cmd_help
              call strcmp
              cmp eax, 1
              je show_help
              
              mov edi, cmd_clear
              call strcmp
              cmp eax, 1
              je clear_screen
              
              mov esi, unknown_msg
              call print_string
              
          shell_cont:
              jmp shell_loop
          
          run_app:
              mov esi, cmd_buffer
              add esi, 4
              
              mov edi, app1_name
              call strcmp
              cmp eax, 1
              je run_app1
              
              mov edi, app2_name
              call strcmp
              cmp eax, 1
              je run_app2
              
              mov edi, app3_name
              call strcmp
              cmp eax, 1
              je run_app3
              
              mov esi, app_not_found
              call print_string
              jmp shell_cont
          
          run_app1:
              call clear_screen
              call app1_main
              call clear_screen
              call draw_desktop
              jmp shell_cont
          
          run_app2:
              call clear_screen
              call app2_main
              call clear_screen
              call draw_desktop
              jmp shell_cont
          
          run_app3:
              call clear_screen
              call app3_main
              call clear_screen
              call draw_desktop
              jmp shell_cont
          
          list_apps:
              mov esi, app_list
              call print_string
              jmp shell_cont
          
          show_help:
              mov esi, help_msg
              call print_string
              jmp shell_cont
          
          clear_screen:
              mov ax, 0x0003
              int 0x10
              mov ax, 0x0013
              int 0x10
              ret
          
          draw_shell:
              mov ax, 0x1301
              mov bx, 0x000F
              mov cx, 30
              mov dx, 0x1700
              push ds
              pop es
              mov bp, shell_bar
              int 0x10
              ret
          
          ; ============== ПРИЛОЖЕНИЕ 1 ==============
          app1_main:
              mov esi, app1_title
              call print_string
              mov dword [counter], 0
          clock_loop:
              mov ebx, 20
              mov ah, 0x06
              call syscall_handler
              
              mov ax, 0x1301
              mov bx, 0x000F
              mov cx, 15
              mov dx, 0x0A08
              push ds
              pop es
              mov bp, time_msg
              int 0x10
              
              inc dword [counter]
              mov ebx, [counter]
              mov ah, 0x02
              call syscall_handler
              
              mov ebx, key_buffer
              mov ah, 0x05
              call syscall_handler
              
              cmp byte [key_buffer], 'q'
              je clock_exit
              cmp byte [key_buffer], 'r'
              je clock_reset
              jmp clock_loop
          
          clock_reset:
              mov dword [counter], 0
              jmp clock_loop
          clock_exit:
              ret
          
          ; ============== ПРИЛОЖЕНИЕ 2 ==============
          app2_main:
              mov esi, app2_title
              call print_string
              mov dword [pen_x], 160
              mov dword [pen_y], 100
              mov byte [pen_color], 0x0F
          paint_loop:
              mov ebx, key_buffer
              mov ah, 0x05
              call syscall_handler
              
              mov al, [key_buffer]
              cmp al, 'w'
              je paint_up
              cmp al, 's'
              je paint_down
              cmp al, 'a'
              je paint_left
              cmp al, 'd'
              je paint_right
              cmp al, 'c'
              je paint_color
              cmp al, 'q'
              je paint_exit
              
              ; Рисование пикселя без imul
              push eax
              mov eax, [pen_y]
              mov ebx, 320
              mul ebx
              add eax, [pen_x]
              mov ebx, eax
              mov cl, [pen_color]
              mov ah, 0x03
              call syscall_handler
              pop eax
              
              jmp paint_loop
          
          paint_up:
              sub dword [pen_y], 1
              cmp dword [pen_y], 0
              jge paint_loop
              mov dword [pen_y], 0
              jmp paint_loop
          
          paint_down:
              add dword [pen_y], 1
              cmp dword [pen_y], 199
              jle paint_loop
              mov dword [pen_y], 199
              jmp paint_loop
          
          paint_left:
              sub dword [pen_x], 1
              cmp dword [pen_x], 0
              jge paint_loop
              mov dword [pen_x], 0
              jmp paint_loop
          
          paint_right:
              add dword [pen_x], 1
              cmp dword [pen_x], 319
              jle paint_loop
              mov dword [pen_x], 319
              jmp paint_loop
          
          paint_color:
              inc byte [pen_color]
              cmp byte [pen_color], 0xFF
              jne paint_loop
              mov byte [pen_color], 0
              jmp paint_loop
          paint_exit:
              ret
          
          ; ============== ПРИЛОЖЕНИЕ 3 ==============
          app3_main:
              mov esi, app3_title
              call print_string
              mov dword [snake_x], 160
              mov dword [snake_y], 100
              mov dword [dir_x], 1
              mov dword [dir_y], 0
              mov dword [food_x], 50
              mov dword [food_y], 50
              mov dword [score_val], 0
          snake_main:
              mov ebx, key_buffer
              mov ah, 0x05
              call syscall_handler
              
              mov al, [key_buffer]
              cmp al, 'w'
              je snake_up
              cmp al, 's'
              je snake_down
              cmp al, 'a'
              je snake_left
              cmp al, 'd'
              je snake_right
              cmp al, 'q'
              je snake_exit
              
              add dword [snake_x], [dir_x]
              add dword [snake_y], [dir_y]
              
              cmp dword [snake_x], 0
              jl snake_die
              cmp dword [snake_x], 319
              jg snake_die
              cmp dword [snake_y], 0
              jl snake_die
              cmp dword [snake_y], 199
              jg snake_die
              
              ; Рисование еды
              push eax
              mov eax, [food_y]
              mov ebx, 320
              mul ebx
              add eax, [food_x]
              mov ebx, eax
              mov cl, 0x0C
              mov ah, 0x03
              call syscall_handler
              pop eax
              
              mov eax, [snake_x]
              cmp eax, [food_x]
              jne snake_draw
              mov eax, [snake_y]
              cmp eax, [food_y]
              jne snake_draw
              inc dword [score_val]
              call random_food
          
          snake_draw:
              push eax
              mov eax, [snake_y]
              mov ebx, 320
              mul ebx
              add eax, [snake_x]
              mov ebx, eax
              mov cl, 0x0A
              mov ah, 0x03
              call syscall_handler
              pop eax
              
              mov ax, 0x1301
              mov bx, 0x000F
              mov cx, 7
              mov dx, 0x0000
              push ds
              pop es
              mov bp, score_text
              int 0x10
              
              mov ebx, [score_val]
              mov ah, 0x02
              call syscall_handler
              
              mov ebx, 30
              mov ah, 0x06
              call syscall_handler
              jmp snake_main
          
          snake_up:
              mov dword [dir_x], 0
              mov dword [dir_y], -1
              jmp snake_main
          snake_down:
              mov dword [dir_x], 0
              mov dword [dir_y], 1
              jmp snake_main
          snake_left:
              mov dword [dir_x], -1
              mov dword [dir_y], 0
              jmp snake_main
          snake_right:
              mov dword [dir_x], 1
              mov dword [dir_y], 0
              jmp snake_main
          
          snake_die:
              mov esi, game_over_msg
              call print_string
              mov ebx, 100
              mov ah, 0x06
              call syscall_handler
          snake_exit:
              ret
          
          random_food:
              push eax
              push ebx
              push edx
              in al, 0x40
              mov ah, 0
              mov ebx, 300
              xor edx, edx
              div ebx
              mov [food_x], dx
              in al, 0x40
              mov ah, 0
              mov ebx, 180
              xor edx, edx
              div ebx
              mov [food_y], dx
              pop edx
              pop ebx
              pop eax
              ret
          
          ; ============== ВСПОМОГАТЕЛЬНЫЕ ==============
          print_string:
              lodsb
              or al, al
              jz .done
              mov ah, 0x0E
              int 0x10
              jmp print_string
          .done:
              ret
          
          newline:
              mov al, 13
              mov ah, 0x0E
              int 0x10
              mov al, 10
              int 0x10
              ret
          
          strcmp:
              push esi
              push edi
          .loop:
              mov al, [esi]
              mov bl, [edi]
              cmp al, bl
              jne .not_equal
              cmp al, 0
              je .equal
              inc esi
              inc edi
              jmp .loop
          .equal:
              pop edi
              pop esi
              mov eax, 1
              ret
          .not_equal:
              pop edi
              pop esi
              mov eax, 0
              ret
          
          ; ============== ДАННЫЕ ==============
          welcome_msg db 13,10,'TinyOS v4.0',13,10,'Type "help"',13,10,0
          prompt db 13,10,'tinyos> ',0
          unknown_msg db 'Command not found',13,10,0
          app_not_found db 'App not found',13,10,0
          
          cmd_run db 'run',0
          cmd_ls db 'ls',0
          cmd_help db 'help',0
          cmd_clear db 'clear',0
          
          app1_name db 'clock',0
          app2_name db 'paint',0
          app3_name db 'snake',0
          
          app_list db 'Apps: clock paint snake',13,10,0
          help_msg db 'Commands: run <app>, ls, clear, help',13,10,0
          
          shell_bar db 'TinyOS',0
          app1_title db 13,10,'CLOCK - R=reset Q=quit',13,10,0
          app2_title db 13,10,'PAINT - WASD C Q',13,10,0
          app3_title db 13,10,'SNAKE - WASD Q',13,10,0
          
          time_msg db 'Ticks: ',0
          score_text db 'Score: ',0
          game_over_msg db 13,10,'GAME OVER!',13,10,0
          
          offset_sky dd 0
          offset_ground dd 19200
          color_tmp db 0
          key_buffer db 0
          current_app dw 0
          counter dd 0
          pen_x dd 0
          pen_y dd 0
          pen_color db 0
          snake_x dd 0
          snake_y dd 0
          dir_x dd 0
          dir_y dd 0
          food_x dd 0
          food_y dd 0
          score_val dd 0
          
          cmd_buffer times 64 db 0
          
          times 16384-($-$$) db 0
          KERNEL

      - name: Build
        run: |
          nasm -f bin kernel.asm -o tinyos.bin
          truncate -s 1474560 tinyos.bin
          ls -la tinyos.bin

      - name: Test
        run: |
          timeout 10 qemu-system-x86_64 -drive format=raw,file=tinyos.bin -nographic -no-reboot 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TinyOS
          path: tinyos.bin
