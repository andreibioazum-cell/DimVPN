                      android:id="@+id/btn_play"
                      android:layout_width="240dp"
                      android:layout_height="60dp"
                      android:text="Play"
                      android:textSize="18sp"
                      android:textColor="#000"
                      android:background="@drawable/btn_blue_filled"
                      android:layout_marginBottom="16dp"/>

                  <Button
                      android:id="@+id/btn_engine"
                      android:layout_width="240dp"
                      android:layout_height="60dp"
                      android:text="Editor"
                      android:textSize="18sp"
                      android:textColor="#00BFFF"
                      android:background="@drawable/btn_blue"
                      android:layout_marginBottom="16dp"/>

                  <Button
                      android:id="@+id/btn_load_file"
                      android:layout_width="240dp"
                      android:layout_height="60dp"
                      android:text="Import .json"
                      android:textSize="16sp"
                      android:textColor="#00BFFF"
                      android:background="@drawable/btn_blue"/>
              </LinearLayout>
          </FrameLayout>
          LAYOUT

          cat <<EOF > app/src/main/java/com/enjoer/game/Block.java
          package com.enjoer.game;
          public class Block {
              public float x, y, z, sx, sy, sz, r, g, b;
              public boolean hidden = false;
              public String shape = "square";
              public String onStartScript = "", onTouchScript = "", onTapScript = "";
              public boolean started = false, touchingPlayer = false;
              public Block(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b) {
                  this.x=x; this.y=y; this.z=z; this.sx=sx; this.sy=sy; this.sz=sz; this.r=r; this.g=g; this.b=b;
              }
              public float minX(){return x-sx/2f;} public float maxX(){return x+sx/2f;}
              public float minY(){return y-sy/2f;} public float maxY(){return y+sy/2f;}
              public float minZ(){return z-sz/2f;} public float maxZ(){return z+sz/2f;}
          }
          EOF

          # ОПТИМИЗИРОВАННЫЙ СКРИПТОВЫЙ ДВИЖОК
          cat <<'SCRIPT' > app/src/main/java/com/enjoer/game/ScriptEngine.java
          package com.enjoer.game;
          import java.util.Locale;
          public class ScriptEngine {
              public interface Host { GameRenderer renderer(); void toast(String text); }
              public static void run(Host host, String script) throws Exception {
                  if(script == null || script.trim().isEmpty()) return;
                  for(String raw : script.split("\\r?\\n")){
                      String line = raw.trim();
                      if(line.isEmpty() || line.startsWith("//") || line.startsWith("#")) continue;
                      exec(host, line);
                  }
              }
              private static void exec(Host host, String line) throws Exception {
                  GameRenderer ren = host.renderer();
                  if(line.equals("player.jump")){ ren.vY = 0.55f; return; }
                  if(line.startsWith("phone.toast(")){ host.toast(arg(line)); return; }
                  if(line.startsWith("player.teleport(")){
                      float[] a = fargs(line);
                      ren.pX = a[0]; ren.pY = a[1]; ren.pZ = a[2]; ren.vY = 0;
                      return;
                  }
                  if(line.startsWith("block.color(")){
                      float[] a = fargs(line); Block b = ren.getSelectedBlock();
                      if(b!=null){ b.r=a[0]; b.g=a[1]; b.b=a[2]; }
                      return;
                  }
              }
              private static String arg(String s){
                  return s.substring(s.indexOf("(")+1, s.lastIndexOf(")")).replace("\"","").replace("'","").trim();
              }
              private static float[] fargs(String s){
                  String[] split = arg(s).split(",");
                  float[] res = new float[split.length];
                  for(int i=0; i<split.length; i++) res[i] = Float.parseFloat(split[i].trim());
                  return res;
              }
          }
          SCRIPT

          # ОПТИМИЗИРОВАННЫЙ РЕНДЕРЕР: ОДИН ВЫЗОВ НА КУБ, НОВАЯ КАМЕРА
          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              public interface EventHost { void runBlockScript(Block block, String script); }
              private final float[] proj=new float[16], view=new float[16], model=new float[16], vp=new float[16];
              public float pX=0, pY=6, pZ=15, rY=0, rX=0, jX=0, jY=0, vY=0;
              public boolean isEngineMode=false, isPlayingLevel=false, gridEnabled=true;
              private int prog, skyProg;
              private FloatBuffer vBuf, nBuf, skyBuf;
              public float blockR=0.8f, blockG=0.3f, blockB=0.3f, blockSX=4, blockSY=4, blockSZ=4, placeDist=10f;
              public String blockShape="square";
              public final float gridSize = 2f;
              public CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              public int selectedIndex = -1;
              public float screenW=1, screenH=1;
              public EventHost eventHost;
              private float camX, camY, camZ, walkPhase, moveMag, charRotation;
              private long lastTimeNs = 0L;
              private static final float FLOOR_Y=0f, PLAYER_HEIGHT=5.2f, PLAYER_RADIUS=0.85f;

              public Block getSelectedBlock(){ return (selectedIndex>=0 && selectedIndex<blocks.size()) ? blocks.get(selectedIndex) : null; }
              private float snap(float v){ return gridEnabled ? Math.round(v / gridSize) * gridSize : v; }

              public void loadBuiltInLevel() {
                  blocks.clear();
                  blocks.add(new Block(0,2,-10, 8,4,8, 0.9f,0.2f,0.2f));
              }

              public void runStartScripts(){
                  for(Block b: blocks){
                      if(!b.started && eventHost != null && b.onStartScript != null && !b.onStartScript.isEmpty()){
                          b.started = true; eventHost.runBlockScript(b, b.onStartScript);
                      }
                  }
              }

              public void handleTapBlock(int index){
                  if(index>=0 && index<blocks.size()){
                      Block b = blocks.get(index);
                      if(eventHost != null && !b.onTapScript.isEmpty()) eventHost.runBlockScript(b, b.onTapScript);
                  }
              }

              public void placeBlock() {
                  float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  float vy=(float)Math.sin(Math.toRadians(rX));
                  float vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  float nx=snap(pX+vx*placeDist), ny=snap(pY+vy*placeDist), nz=snap(pZ+vz*placeDist);
                  if(ny-blockSY/2f<FLOOR_Y) ny=FLOOR_Y+blockSY/2f;
                  blocks.add(new Block(nx,ny,nz, blockSX,blockSY,blockSZ, blockR,blockG,blockB));
              }

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs="#version 300 es\nlayout(location=0)in vec4 aP;layout(location=1)in vec3 aN;uniform mat4 uMVP,uM;out vec3 vN,vP;void main(){vP=vec3(uM*aP);vN=normalize(mat3(uM)*aN);gl_Position=uMVP*aP;}";
                  String fs="#version 300 es\nprecision highp float;in vec3 vN,vP;uniform vec3 camP;uniform vec4 uC;uniform float uSel,isFloor;out vec4 fC;void main(){vec3 n=normalize(vN),vD=normalize(camP-vP),lD=normalize(vec3(.4,1.,.2));float diff=max(dot(n,lD),0.);vec3 col=uC.rgb;if(uSel>.5)col+=vec3(0.,.4,.8);vec3 fin=col*(diff+0.2);if(isFloor>.5){vec2 g=fract(vP.xz*.2);if(g.x>.97||g.y>.97)fin=vec3(0.,.3,.6);}fC=vec4(fin,uC.a);}";
                  prog=mkProg(vs,fs);

                  // ГЕОМЕТРИЯ: ОДИН МАССИВ НА 36 ВЕРШИН (КУБ)
                  float[] vc={
                      -0.5f,-0.5f,-0.5f, 0.5f,-0.5f,-0.5f, 0.5f, 0.5f,-0.5f, 0.5f, 0.5f,-0.5f, -0.5f, 0.5f,-0.5f, -0.5f,-0.5f,-0.5f,
                      -0.5f,-0.5f, 0.5f, 0.5f,-0.5f, 0.5f, 0.5f, 0.5f, 0.5f, 0.5f, 0.5f, 0.5f, -0.5f, 0.5f, 0.5f, -0.5f,-0.5f, 0.5f,
                      -0.5f, 0.5f, 0.5f, -0.5f, 0.5f,-0.5f, -0.5f,-0.5f,-0.5f, -0.5f,-0.5f,-0.5f, -0.5f,-0.5f, 0.5f, -0.5f, 0.5f, 0.5f,
                       0.5f, 0.5f, 0.5f,  0.5f, 0.5f,-0.5f,  0.5f,-0.5f,-0.5f,  0.5f,-0.5f,-0.5f,  0.5f,-0.5f, 0.5f,  0.5f, 0.5f, 0.5f,
                      -0.5f,-0.5f,-0.5f,  0.5f,-0.5f,-0.5f,  0.5f,-0.5f, 0.5f,  0.5f,-0.5f, 0.5f, -0.5f,-0.5f, 0.5f, -0.5f,-0.5f,-0.5f,
                      -0.5f, 0.5f,-0.5f,  0.5f, 0.5f,-0.5f,  0.5f, 0.5f, 0.5f,  0.5f, 0.5f, 0.5f, -0.5f, 0.5f, 0.5f, -0.5f, 0.5f,-0.5f
                  };
                  vBuf=ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc); vBuf.position(0);
                  
                  String skyVs="#version 300 es\nlayout(location=0)in vec3 aP;out vec3 vD;void main(){vD=aP;gl_Position=vec4(aP,1.);}";
                  String skyFs="#version 300 es\nprecision lowp float;in vec3 vD;out vec4 fC;void main(){fC=vec4(0.01,0.02,0.05,1.);}";
                  skyProg=mkProg(skyVs,skyFs);
                  float[] sq={-1,-1,0, 1,-1,0, -1,1,0, 1,1,0};
                  skyBuf=ByteBuffer.allocateDirect(sq.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(sq); skyBuf.position(0);
              }

              @Override
              public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT|GLES30.GL_DEPTH_BUFFER_BIT);
                  float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                  float vy=(float)Math.sin(Math.toRadians(rX));
                  float vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));

                  if(isEngineMode && !isPlayingLevel){
                      camX=pX; camY=pY; camZ=pZ;
                      Matrix.setLookAtM(view,0, camX,camY,camZ, pX+vx,pY+vy,pZ+vz, 0,1,0);
                  } else {
                      // ИСПРАВЛЕННАЯ ОРБИТАЛЬНАЯ КАМЕРА (БЕЗ ЗУМА ПРИ НАКЛОНЕ)
                      float dist = 14.0f;
                      camX = pX - vx * dist;
                      camY = (pY + 2.0f) - vy * dist;
                      camZ = pZ - vz * dist;
                      camY = Math.max(0.8f, camY);
                      Matrix.setLookAtM(view,0, camX,camY,camZ, pX, pY-1.5f, pZ, 0,1,0);
                  }
                  Matrix.multiplyMM(vp,0,proj,0,view,0);
                  drawWorld(vx,vy,vz);
              }

              private void drawWorld(float vx,float vy,float vz){
                  GLES30.glUseProgram(prog);
                  int uMVP=GLES30.glGetUniformLocation(prog,"uMVP"), uM=GLES30.glGetUniformLocation(prog,"uM"), uC=GLES30.glGetUniformLocation(prog,"uC"), uSel=GLES30.glGetUniformLocation(prog,"uSel"), uF=GLES30.glGetUniformLocation(prog,"isFloor");
                  GLES30.glUniform3f(GLES30.glGetUniformLocation(prog,"camP"),camX,camY,camZ);
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBuf); GLES30.glEnableVertexAttribArray(0);

                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,0,-0.1f,0); Matrix.scaleM(model,0,1000,0.2f,1000);
                  GLES30.glUniform1f(uF,1f); draw(uM,uMVP,uC,0.05f,0.05f,0.1f,1f); GLES30.glUniform1f(uF,0f);

                  for(int i=0; i<blocks.size(); i++){
                      Block b = blocks.get(i); if(b.hidden) continue;
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,b.x,b.y,b.z); Matrix.scaleM(model,0,b.sx,b.sy,b.sz);
                      GLES30.glUniform1f(uSel, (i==selectedIndex&&isEngineMode)?1f:0f);
                      draw(uM,uMVP,uC,b.r,b.g,b.b,1f);
                  }
                  if(!(isEngineMode && !isPlayingLevel)) drawChar(uM,uMVP,uC);
              }

              private void drawChar(int uM, int uMVP, int uC){
                  boolean ground = isOnGround();
                  float swing = (float)Math.sin(walkPhase)*45f*moveMag;
                  float armA = ground ? swing : -160f; // РУКИ ВВЕРХ В ПРЫЖКЕ
                  float bob = 0f; // БЕЗ ТРЯСКИ

                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,pX,pY-PLAYER_HEIGHT,pZ); Matrix.rotateM(model,0,charRotation,0,1,0);
                  
                  // Torso
                  Matrix.translateM(model,0,0,1.6f+0.9f+bob,0); Matrix.scaleM(model,0,1.4f,1.8f,0.8f); draw(uM,uMVP,uC,0.1f,0.4f,1f,1f);
                  // Head (re-identity for simplicity)
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,pX,pY-PLAYER_HEIGHT,pZ); Matrix.rotateM(model,0,charRotation,0,1,0);
                  Matrix.translateM(model,0,0,1.6f+1.8f+0.6f+bob,0); Matrix.scaleM(model,0,1.1f,1.1f,1.1f); draw(uM,uMVP,uC,1,0.8f,0.6f,1f);
                  // Arms
                  drawLimb(uM,uMVP,uC,pX,pY-PLAYER_HEIGHT,pZ,charRotation, -1f, 3.2f, armA, 0.5f,1.6f);
                  drawLimb(uM,uMVP,uC,pX,pY-PLAYER_HEIGHT,pZ,charRotation, 1f, 3.2f, -armA, 0.5f,1.6f);
              }

              private void drawLimb(int uM,int uMVP,int uC,float px,float py,float pz,float rot,float side,float h,float angle,float w,float lh){
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,px,py,pz); Matrix.rotateM(model,0,rot,0,1,0);
                  Matrix.translateM(model,0,side*0.9f,h,0); Matrix.rotateM(model,0,angle,1,0,0); Matrix.translateM(model,0,0,-lh/2f,0);
                  Matrix.scaleM(model,0,w,lh,w); draw(uM,uMVP,uC,1,0.8f,0.6f,1f);
              }

              private void draw(int uM,int uMVP,int uC,float r,float g,float b,float a){
                  GLES30.glUniformMatrix4fv(uM,1,false,model,0);
                  float[] res=new float[16]; Matrix.multiplyMM(res,0,vp,0,model,0);
                  GLES30.glUniformMatrix4fv(uMVP,1,false,res,0);
                  GLES30.glUniform4f(uC,r,g,b,a);
                  GLES30.glDrawArrays(GLES30.GL_TRIANGLES,0,36); // ОПТИМИЗИРОВАНО: ОДИН ВЫЗОВ
              }

              private void update(){
                  long now = System.nanoTime(); float dt = (lastTimeNs==0)?0:(now-lastTimeNs)/1e9f; lastTimeNs=now;
                  moveMag = (float)Math.min(1.0, Math.sqrt(jX*jX+jY*jY));
                  float s=0.45f, rad=(float)Math.toRadians(rY);
                  if(isEngineMode&&!isPlayingLevel){
                      pX+=(Math.sin(rad)*-jY+Math.cos(rad)*jX)*s; pZ+=(-Math.cos(rad)*-jY+Math.sin(rad)*jX)*s; pY+=(Math.sin(Math.toRadians(rX))*-jY)*s;
                  } else {
                      float mx=((float)Math.sin(rad)*-jY+(float)Math.cos(rad)*jX)*s, mz=((float)-Math.cos(rad)*-jY+(float)Math.sin(rad)*jX)*s;
                      vY-=0.025f; float nx=pX+mx, ny=pY+vY, nz=pZ+mz;
                      if(ny-PLAYER_HEIGHT<FLOOR_Y){ny=FLOOR_Y+PLAYER_HEIGHT; vY=0;}
                      for(Block b:blocks){
                          if(nx+PLAYER_RADIUS>b.minX()&&nx-PLAYER_RADIUS<b.maxX()&&nz+PLAYER_RADIUS>b.minZ()&&nz-PLAYER_RADIUS<b.maxZ()){
                              if(pY-PLAYER_HEIGHT>=b.maxY()-0.2f&&ny-PLAYER_HEIGHT<b.maxY()){ny=b.maxY()+PLAYER_HEIGHT; vY=0;}
                          }
                      }
                      pX=nx; pY=ny; pZ=nz;
                      if(moveMag>0.1f){ charRotation=(float)Math.toDegrees(Math.atan2(mx,mz)); walkPhase+=dt*10f; }
                  }
              }
              public boolean isOnGround(){ if(pY-PLAYER_HEIGHT<=FLOOR_Y+0.1f) return true; for(Block b:blocks) if(pX+PLAYER_RADIUS>b.minX()&&pX-PLAYER_RADIUS<b.maxX()&&pZ+PLAYER_RADIUS>b.minZ()&&pZ-PLAYER_RADIUS<b.maxZ()&&Math.abs(pY-PLAYER_HEIGHT-b.maxY())<0.2f) return true; return false; }
              @Override public void onSurfaceChanged(GL10 gl,int w,int h){ GLES30.glViewport(0,0,w,h); Matrix.perspectiveM(proj,0,60,(float)w/h,0.1f,500f); screenW=w; screenH=h; }
              private int mkProg(String v,String f){ int p=GLES30.glCreateProgram(),vs=mkSh(GLES30.GL_VERTEX_SHADER,v),fs=mkSh(GLES30.GL_FRAGMENT_SHADER,f); GLES30.glAttachShader(p,vs); GLES30.glAttachShader(p,fs); GLES30.glLinkProgram(p); return p; }
              private int mkSh(int t,String s){ int sh=GLES30.glCreateShader(t); GLES30.glShaderSource(sh,s); GLES30.glCompileShader(sh); return sh; }
          }
          RENDERER

          cat <<'MAINACT' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.annotation.SuppressLint;
          import android.content.Intent;
          import android.content.pm.ActivityInfo;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity implements ScriptEngine.Host, GameRenderer.EventHost {
              private GameRenderer ren;
              private View menuUI, gameUI, engineUI, playtestUI;
              private float lx, ly;

              @Override public GameRenderer renderer() { return ren; }
              @Override public void toast(String t) { runOnUiThread(()->Toast.makeText(this,t,Toast.LENGTH_SHORT).show()); }
              @Override public void runBlockScript(Block b, String s) { try{ScriptEngine.run(this,s);}catch(Exception e){toast(e.getMessage());} }

              @SuppressLint("ClickableViewAccessibility")
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv=findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3); ren=new GameRenderer(); ren.eventHost=this; gv.setRenderer(ren);

                  menuUI=findViewById(R.id.menu_ui); gameUI=findViewById(R.id.game_ui);
                  engineUI=findViewById(R.id.engine_ui); playtestUI=findViewById(R.id.playtest_ui);

                  findViewById(R.id.btn_play).setOnClickListener(v->{
                      ren.isEngineMode=false; ren.loadBuiltInLevel(); resetP();
                      menuUI.setVisibility(View.GONE); gameUI.setVisibility(View.VISIBLE);
                      setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);
                  });

                  findViewById(R.id.btn_engine).setOnClickListener(v->{
                      ren.isEngineMode=true; ren.blocks.clear(); ren.pY=20;
                      menuUI.setVisibility(View.GONE); engineUI.setVisibility(View.VISIBLE);
                      setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);
                  });

                  setupJoy(findViewById(R.id.joy_base), findViewById(R.id.joy_stick), 1);
                  setupJoy(findViewById(R.id.engine_joy_base), findViewById(R.id.engine_joy_stick), 1);
                  setupJoy(findViewById(R.id.playtest_joy_base), findViewById(R.id.playtest_joy_stick), 1);

                  findViewById(R.id.look_zone).setOnTouchListener(this::handleLook);
                  findViewById(R.id.playtest_look_zone).setOnTouchListener(this::handleLook);
                  findViewById(R.id.engine_touch_zone).setOnTouchListener(this::handleLook);

                  findViewById(R.id.btn_jump).setOnClickListener(v->{ if(ren.isOnGround()) ren.vY=0.55f; });
                  findViewById(R.id.btn_playtest_jump).setOnClickListener(v->{ if(ren.isOnGround()) ren.vY=0.55f; });
                  findViewById(R.id.btn_place).setOnClickListener(v->ren.placeBlock());
              }

              private void resetP(){ ren.pX=0; ren.pY=7; ren.pZ=15; ren.vY=0; }

              private boolean handleLook(View v, MotionEvent e){
                  if(e.getAction()==MotionEvent.ACTION_DOWN){ lx=e.getX(); ly=e.getY(); }
                  else if(e.getAction()==MotionEvent.ACTION_MOVE){
                      ren.rY+=(e.getX()-lx)*0.25f; ren.rX=Math.max(-85,Math.min(85,ren.rX-(e.getY()-ly)*0.25f));
                      lx=e.getX(); ly=e.getY();
                  }
                  return true;
              }

              private void setupJoy(View base, View stick, float scale){
                  base.setOnTouchListener((v,e)->{
                      float cx=v.getWidth()/2f, cy=v.getHeight()/2f;
                      if(e.getAction()==MotionEvent.ACTION_MOVE || e.getAction()==MotionEvent.ACTION_DOWN){
                          float dx=e.getX()-cx, dy=e.getY()-cy, d=(float)Math.sqrt(dx*dx+dy*dy), lim=cx-stick.getWidth()/2f;
                          if(d>lim){ dx*=lim/d; dy*=lim/d; }
                          stick.setTranslationX(dx); stick.setTranslationY(dy);
                          ren.jX=dx/lim; ren.jY=dy/lim;
                      } else { stick.setTranslationX(0); stick.setTranslationY(0); ren.jX=0; ren.jY=0; }
                      return true;
                  });
              }
          }
