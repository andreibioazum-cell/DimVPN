name: Azum_Game_Mod_V1.2.1_Build
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1'

      - name: Initialize Project Structure
        run: |
          mkdir -p src/main/java/com/dimos/mod/item
          mkdir -p src/main/resources/assets/dimos/lang
          mkdir -p src/main/resources/assets/dimos/models/item
          mkdir -p src/main/resources/data/dimos/recipes

          # 1. Build.gradle
          cat <<EOF > build.gradle
          plugins { id 'fabric-loom' version '1.2-SNAPSHOT' }
          version = '1.2.1'
          group = 'com.dimos.mod'
          repositories { mavenCentral(); maven { url = "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.20.1"
              mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
              modImplementation "net.fabricmc:fabric-loader:0.14.22"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.83.0+1.20.1"
          }
          EOF

          # 2. AzumKnifeItem.java
          cat <<EOF > src/main/java/com/dimos/mod/item/AzumKnifeItem.java
          package com.dimos.mod.item;
          import com.dimos.mod.DimMod;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.ItemStack;
          import net.minecraft.item.SwordItem;
          import net.minecraft.item.ToolMaterials;

          public class AzumKnifeItem extends SwordItem {
              public AzumKnifeItem(Settings settings) { super(ToolMaterials.IRON, 3, -2.4f, settings); }
              @Override
              public boolean postHit(ItemStack stack, LivingEntity target, LivingEntity attacker) {
                  if (attacker instanceof PlayerEntity player && (target.getHealth() <= 0 || target.isDead())) {
                      DimMod.giveSecondLife(player);
                      stack.setCount(0); 
                  }
                  return super.postHit(stack, target, attacker);
              }
          }
          EOF

          # 3. NastyaLaserItem.java (Красный луч)
          cat <<EOF > src/main/java/com/dimos/mod/item/NastyaLaserItem.java
          package com.dimos.mod.item;
          import net.minecraft.entity.Entity;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemStack;
          import net.minecraft.particle.DustParticleEffect;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.util.Hand;
          import net.minecraft.util.TypedActionResult;
          import net.minecraft.util.math.Box;
          import net.minecraft.util.math.Vec3d;
          import net.minecraft.world.World;
          import org.joml.Vector3f;
          import java.util.Random;

          public class NastyaLaserItem extends Item {
              public NastyaLaserItem(Settings settings) { super(settings); }
              private final Random random = new Random();

              @Override
              public TypedActionResult<ItemStack> use(World world, PlayerEntity user, Hand hand) {
                  ItemStack stack = user.getStackInHand(hand);
                  if (world.isClient) return TypedActionResult.success(stack);

                  double chance = random.nextDouble();
                  if (chance < 0.05) { 
                      user.playSound(SoundEvents.BLOCK_DISPENSER_FAIL, 1.0f, 1.2f);
                  } else if (chance < 0.15) { 
                      world.createExplosion(user, user.getX(), user.getY(), user.getZ(), 0.0f, World.ExplosionSourceType.NONE);
                      user.damage(world.getDamageSources().explosion(null, null), 6.0f);
                      stack.decrement(1);
                  } else { 
                      shootLaser(world, user);
                  }
                  return TypedActionResult.consume(stack);
              }

              private void shootLaser(World world, PlayerEntity user) {
                  Vec3d start = user.getEyePos();
                  Vec3d look = user.getRotationVec(1.0f);
                  DustParticleEffect redDust = new DustParticleEffect(new Vector3f(1.0f, 0.0f, 0.0f), 1.5f);
                  
                  for (int i = 1; i < 25; i++) {
                      Vec3d point = start.add(look.multiply(i));
                      ((ServerWorld)world).spawnParticles(redDust, point.x, point.y, point.z, 4, 0.05, 0.05, 0.05, 0.0);
                      Box box = new Box(point.add(-0.5,-0.5,-0.5), point.add(0.5,0.5,0.5));
                      for (Entity target : world.getOtherEntities(user, box)) {
                          if (target instanceof LivingEntity) target.damage(world.getDamageSources().playerAttack(user), 4.0f);
                      }
                  }
                  user.playSound(SoundEvents.ENTITY_ZOMBIE_VILLAGER_CONVERTED, 0.6f, 2.0f);
              }
          }
          EOF

          # 4. CodeCrackerWatch.java
          cat <<EOF > src/main/java/com/dimos/mod/item/CodeCrackerWatch.java
          package com.dimos.mod.item;
          import com.dimos.mod.DimMod;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemStack;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.util.Hand;
          import net.minecraft.util.TypedActionResult;
          import net.minecraft.world.World;

          public class CodeCrackerWatch extends Item {
              public CodeCrackerWatch(Settings settings) { super(settings); }
              @Override
              public TypedActionResult<ItemStack> use(World world, PlayerEntity user, Hand hand) {
                  if (!world.isClient) {
                      DimMod.freezeTime(300);
                      user.getItemCooldownManager().set(this, 600);
                      user.playSound(SoundEvents.BLOCK_BELL_RESONATE, 1.0f, 0.5f);
                  }
                  return TypedActionResult.success(user.getStackInHand(hand));
              }
          }
          EOF

          # 5. DimMod.java
          cat <<EOF > src/main/java/com/dimos/mod/DimMod.java
          package com.dimos.mod;
          import com.dimos.mod.item.*;
          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.entity.event.v1.ServerLivingEntityEvents;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerTickEvents;
          import net.fabricmc.fabric.api.itemgroup.v1.ItemGroupEvents;
          import net.minecraft.entity.EntityType;
          import net.minecraft.entity.LightningEntity;
          import net.minecraft.entity.LivingEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.Item;
          import net.minecraft.item.ItemGroups;
          import net.minecraft.particle.ParticleTypes;
          import net.minecraft.registry.Registries;
          import net.minecraft.registry.Registry;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.util.Identifier;
          import java.util.HashSet;
          import java.util.Set;
          import java.util.UUID;

          public class DimMod implements ModInitializer {
              public static final Item AZUM_KNIFE = new AzumKnifeItem(new Item.Settings());
              public static final Item NASTYA_LASER = new NastyaLaserItem(new Item.Settings().maxCount(1));
              public static final Item CODE_CRACKER_WATCH = new CodeCrackerWatch(new Item.Settings().maxCount(1));
              private static final Set<UUID> SECOND_LIFE_PLAYERS = new HashSet<>();
              private static int freezeTicks = 0;

              @Override
              public void onInitialize() {
                  Registry.register(Registries.ITEM, new Identifier("dimos", "azum_knife"), AZUM_KNIFE);
                  Registry.register(Registries.ITEM, new Identifier("dimos", "nastya_laser"), NASTYA_LASER);
                  Registry.register(Registries.ITEM, new Identifier("dimos", "codecracker_watch"), CODE_CRACKER_WATCH);

                  ItemGroupEvents.modifyEntriesEvent(ItemGroups.COMBAT).register(c -> {
                      c.add(AZUM_KNIFE); c.add(NASTYA_LASER); c.add(CODE_CRACKER_WATCH);
                  });

                  ServerLivingEntityEvents.ALLOW_DEATH.register((entity, source, amount) -> {
                      if (entity instanceof PlayerEntity player && SECOND_LIFE_PLAYERS.contains(player.getUuid())) {
                          SECOND_LIFE_PLAYERS.remove(player.getUuid());
                          player.setHealth(player.getMaxHealth());
                          ServerWorld world = (ServerWorld) player.getWorld();
                          LightningEntity bolt = EntityType.LIGHTNING_BOLT.create(world);
                          if (bolt != null) { bolt.refreshPositionAfterTeleport(player.getPos()); world.spawnEntity(bolt); }
                          world.spawnParticles(ParticleTypes.TOTEM_OF_UNDYING, player.getX(), player.getY(), player.getZ(), 60, 0.5, 1, 0.5, 0.2);
                          return false;
                      }
                      return true;
                  });

                  ServerTickEvents.END_WORLD_TICK.register(world -> {
                      if (freezeTicks > 0) {
                          freezeTicks--;
                          for (net.minecraft.entity.Entity e : world.iterateEntities()) {
                              if (!(e instanceof PlayerEntity)) {
                                  e.setVelocity(0, 0, 0);
                                  if (e instanceof LivingEntity le) le.setNoAi(true);
                              }
                          }
                      } else if (freezeTicks == 0) {
                          for (net.minecraft.entity.Entity e : world.iterateEntities()) {
                              if (e instanceof LivingEntity le) le.setNoAi(false);
                          }
                          freezeTicks = -1;
                      }
                  });
              }
              public static void giveSecondLife(PlayerEntity player) { SECOND_LIFE_PLAYERS.add(player.getUuid()); }
              public static void freezeTime(int ticks) { freezeTicks = ticks; }
          }
          EOF

          # 6. Рецепты
          cat <<EOF > src/main/resources/data/dimos/recipes/nastya_laser.json
          { "type": "minecraft:crafting_shaped", "pattern": [ "   ", " SC", "   " ], "key": { "S": { "item": "minecraft:stone" }, "C": { "item": "minecraft:coal" } }, "result": { "item": "dimos:nastya_laser" } }
          EOF
          cat <<EOF > src/main/resources/data/dimos/recipes/watch.json
          { "type": "minecraft:crafting_shaped", "pattern": [ " G ", "GRG", " G " ], "key": { "G": { "item": "minecraft:gold_ingot" }, "R": { "item": "minecraft:redstone" } }, "result": { "item": "dimos:codecracker_watch" } }
          EOF
          cat <<EOF > src/main/resources/data/dimos/recipes/azum_knife.json
          { "type": "minecraft:crafting_shaped", "pattern": [ "  I", " I ", "S  " ], "key": { "I": { "item": "minecraft:iron_ingot" }, "S": { "item": "minecraft:stick" } }, "result": { "item": "dimos:azum_knife" } }
          EOF

          # 7. Ресурсы
          echo '{"schemaVersion": 1, "id": "dimos", "version": "1.2.1", "name": "AzumGame", "entrypoints": { "main": ["com.dimos.mod.DimMod"] }, "depends": { "fabricloader": ">=0.14.0", "minecraft": "~1.20.1", "fabric-api": "*" } }' > src/main/resources/fabric.mod.json
          echo '{"parent":"minecraft:item/handheld","textures":{"layer0":"minecraft:item/iron_sword"}}' > src/main/resources/assets/dimos/models/item/azum_knife.json
          echo '{"parent":"minecraft:item/handheld","textures":{"layer0":"minecraft:item/crossbow"}}' > src/main/resources/assets/dimos/models/item/nastya_laser.json
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/clock"}}' > src/main/resources/assets/dimos/models/item/codecracker_watch.json
          echo '{"item.dimos.azum_knife":"Нож Азума","item.dimos.nastya_laser":"Лазер Насти","item.dimos.codecracker_watch":"Часы CodeCracker"}' > src/main/resources/assets/dimos/lang/ru_ru.json
          echo "pluginManagement { repositories { maven { url = 'https://maven.fabricmc.net/' }; mavenCentral() } }; rootProject.name = 'dimos-mod'" > settings.gradle

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: AzumGame-V1.2.1-1.20.1
          path: build/libs/*.jar
