name: Fabric_Mod_JustFart_V19
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Initialize Project
        run: |
          mkdir -p src/main/java/com/dimos/mod
          mkdir -p src/main/resources

          # 1. Build.gradle
          cat <<EOF > build.gradle
          plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
          version = '1.9.0'
          group = 'com.dimos.mod'
          repositories { mavenCentral(); maven { url = "https://maven.fabricmc.net/" } }
          dependencies {
              minecraft "com.mojang:minecraft:1.21.1"
              mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
              modImplementation "net.fabricmc:fabric-loader:0.16.5"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.102.1+1.21.1"
          }
          EOF

          # 2. DimMod.java (Только логика пердежа)
          cat <<EOF > src/main/java/com/dimos/mod/DimMod.java
          package com.dimos.mod;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.event.lifecycle.v1.ServerTickEvents;
          import net.minecraft.particle.ParticleTypes;
          import net.minecraft.server.network.ServerPlayerEntity;
          import net.minecraft.sound.SoundCategory;
          import net.minecraft.sound.SoundEvents;
          import java.util.WeakHashMap;

          public class DimMod implements ModInitializer {
              // Храним кулдаун для каждого игрока
              private final WeakHashMap<ServerPlayerEntity, Integer> cooldowns = new WeakHashMap<>();

              @Override
              public void onInitialize() {
                  ServerTickEvents.END_SERVER_TICK.register(server -> {
                      for (ServerPlayerEntity player : server.getPlayerManager().getPlayerList()) {
                          // Если игрок присел
                          if (player.isSneaking()) {
                              int currentCd = cooldowns.getOrDefault(player, 0);
                              
                              if (currentCd <= 0) {
                                  // Генерируем частицы сзади игрока
                                  player.getServerWorld().spawnParticles(
                                      ParticleTypes.CAMPFIRE_COSY_SMOKE,
                                      player.getX(), player.getY() + 0.2, player.getZ(),
                                      8, 0.1, 0.1, 0.1, 0.02
                                  );

                                  // Характерный звук (осел + низкий тон)
                                  player.getServerWorld().playSound(null, 
                                      player.getX(), player.getY(), player.getZ(), 
                                      SoundEvents.ENTITY_DONKEY_EAT, SoundCategory.PLAYERS, 
                                      1.0f, 0.5f);

                                  // Ставим кулдаун на 25 тиков (~1.2 сек)
                                  cooldowns.put(player, 25);
                              }
                          }

                          // Уменьшаем кулдаун каждый тик
                          if (cooldowns.containsKey(player) && cooldowns.get(player) > 0) {
                              cooldowns.put(player, cooldowns.get(player) - 1);
                          }
                      }
                  });
              }
          }
          EOF

          # 3. Fabric.mod.json
          cat <<EOF > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "dimos_fart",
            "version": "1.9.0",
            "name": "Dimos Fart Mod",
            "description": "Press Shift to Fart!",
            "entrypoints": { "main": ["com.dimos.mod.DimMod"] },
            "depends": { "fabricloader": ">=0.16.5", "minecraft": "~1.21.1", "fabric-api": "*" }
          }
          EOF

          echo "pluginManagement { repositories { maven { url = 'https://maven.fabricmc.net/' }; mavenCentral() } }; rootProject.name = 'dimos-fart'" > settings.gradle

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: JustFart-V19
          path: build/libs/*.jar
