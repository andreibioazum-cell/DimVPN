          cat > app/src/main/java/com/enjoer/game/Block.java << 'EOF'
          package com.enjoer.game;
          public class Block {
              public float x,y,z,sx,sy,sz,r,g,b;
              public boolean hidden=false;
              public int ridixPrice=0;
              public boolean purchased=false;
              public String itemName="";
              public Block(float x,float y,float z,float sx,float sy,float sz,float r,float g,float b){
                  this.x=x;this.y=y;this.z=z;this.sx=sx;this.sy=sy;this.sz=sz;this.r=r;this.g=g;this.b=b;
              }
              public float minX(){return x-sx/2f;}
              public float maxX(){return x+sx/2f;}
              public float minY(){return y-sy/2f;}
              public float maxY(){return y+sy/2f;}
              public float minZ(){return z-sz/2f;}
              public float maxZ(){return z+sz/2f;}
          }
          EOF

          cat > app/src/main/java/com/enjoer/game/Light.java << 'EOF'
          package com.enjoer.game;
          public class Light {
              public float x,y,z,r,g,b,intensity;
              public boolean isSpot;
              public boolean hidden=false;
              public int ridixPrice=0;
              public boolean purchased=false;
              public String itemName="";
              public Light(float x,float y,float z,float r,float g,float b,float intensity,boolean isSpot){
                  this.x=x;this.y=y;this.z=z;this.r=r;this.g=g;this.b=b;this.intensity=intensity;this.isSpot=isSpot;
              }
          }
          EOF

