          cat <<'SCRIPT' > app/src/main/java/com/enjoer/game/ScriptEngine.java
          package com.enjoer.game;

          import java.util.Locale;

          public class ScriptEngine {
              public interface Host {
                  GameRenderer renderer();
                  void toast(String text);
              }

              public static void run(Host host, String script) throws Exception {
                  if(script == null) return;
                  String[] lines = script.split("\\r?\\n");
                  for(String raw : lines){
                      String line = raw.trim();
                      if(line.isEmpty()) continue;
                      if(line.startsWith("//") || line.startsWith("#")) continue;
                      exec(host, line);
                  }
              }

              private static void exec(Host host, String line) throws Exception {
                  GameRenderer ren = host.renderer();

                  if(line.equals("player.jump")){
                      ren.vY = 0.55f;
                      return;
                  }

                  if(line.equals("block.hide")){
                      Block b = ren.getSelectedBlock();
                      if(b != null) b.hidden = true;
                      return;
                  }

                  if(line.equals("block.show")){
                      Block b = ren.getSelectedBlock();
                      if(b != null) b.hidden = false;
                      return;
                  }

                  if(line.equals("block.delete")){
                      ren.deleteSelected();
                      return;
                  }

                  if(line.startsWith("player.teleport(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("player.teleport requires 3 args");
                      ren.pX = f(a[0]);
                      ren.pY = f(a[1]);
                      ren.pZ = f(a[2]);
                      ren.vY = 0f;
                      return;
                  }

                  if(line.startsWith("player.rotate(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 2) throw new Exception("player.rotate requires 2 args");
                      ren.rY = f(a[0]);
                      ren.rX = f(a[1]);
                      return;
                  }

                  if(line.startsWith("phone.toast(") && line.endsWith(")")){
                      String[] a = argsText(line);
                      if(a.length != 1) throw new Exception("phone.toast requires 1 arg");
                      host.toast(stripQuotes(a[0]));
                      return;
                  }

                  if(line.startsWith("phone.grid(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 1) throw new Exception("phone.grid requires 1 arg");
                      ren.gridEnabled = parseBool(a[0]);
                      return;
                  }

                  if(line.startsWith("block.color(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("block.color requires 3 args");
                      Block b = ren.getSelectedBlock();
                      if(b == null) throw new Exception("No selected block");
                      b.r = clamp01(f(a[0]));
                      b.g = clamp01(f(a[1]));
                      b.b = clamp01(f(a[2]));
                      return;
                  }

                  if(line.startsWith("block.move(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("block.move requires 3 args");
                      ren.moveSelected(f(a[0]), f(a[1]), f(a[2]));
                      return;
                  }

                  if(line.startsWith("block.size(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("block.size requires 3 args");
                      Block b = ren.getSelectedBlock();
                      if(b == null) throw new Exception("No selected block");
                      b.sx = Math.max(0.5f, f(a[0]));
                      b.sy = Math.max(0.5f, f(a[1]));
                      b.sz = Math.max(0.5f, f(a[2]));
                      if(b.y - b.sy / 2f < 0f) b.y = b.sy / 2f;
                      return;
                  }

                  if(line.startsWith("block.teleport(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 3) throw new Exception("block.teleport requires 3 args");
                      Block b = ren.getSelectedBlock();
                      if(b == null) throw new Exception("No selected block");
                      b.x = f(a[0]);
                      b.y = f(a[1]);
                      b.z = f(a[2]);
                      if(b.y - b.sy / 2f < 0f) b.y = b.sy / 2f;
                      return;
                  }

                  if(line.startsWith("block.shape(") && line.endsWith(")")){
                      String[] a = argsText(line);
                      if(a.length != 1) throw new Exception("block.shape requires 1 arg");
                      Block b = ren.getSelectedBlock();
                      if(b == null) throw new Exception("No selected block");
                      b.shape = stripQuotes(a[0]).toLowerCase(Locale.US);
                      return;
                  }

                  if(line.startsWith("world.place(") && line.endsWith(")")){
                      String[] a = args(line);
                      if(a.length != 9) throw new Exception("world.place requires 9 args");
                      Block b = new Block(
                          f(a[0]), f(a[1]), f(a[2]),
                          Math.max(0.5f, f(a[3])), Math.max(0.5f, f(a[4])), Math.max(0.5f, f(a[5])),
                          clamp01(f(a[6])), clamp01(f(a[7])), clamp01(f(a[8]))
                      );
                      ren.blocks.add(b);
                      return;
                  }

                  throw new Exception("Unknown command: " + line);
              }

              private static boolean parseBool(String s){
                  s = s.trim().toLowerCase(Locale.US);
                  return s.equals("true") || s.equals("1") || s.equals("on");
              }

              private static String[] args(String line){
                  int s = line.indexOf('(');
                  int e = line.lastIndexOf(')');
                  String body = line.substring(s + 1, e).trim();
                  if(body.isEmpty()) return new String[0];
                  String[] arr = body.split(",");
                  for(int i=0;i<arr.length;i++) arr[i] = arr[i].trim();
                  return arr;
              }

              private static String[] argsText(String line){
                  int s = line.indexOf('(');
                  int e = line.lastIndexOf(')');
                  String body = line.substring(s + 1, e).trim();
                  if(body.isEmpty()) return new String[0];
                  return new String[]{body};
              }

              private static String stripQuotes(String s){
                  s = s.trim();
                  if((s.startsWith("\"") && s.endsWith("\"")) || (s.startsWith("'") && s.endsWith("'"))){
                      return s.substring(1, s.length()-1);
                  }
                  return s;
              }

              private static float f(String s){
                  return Float.parseFloat(s.trim());
              }

              private static float clamp01(float v){
                  return Math.max(0f, Math.min(1f, v));
              }
          }
