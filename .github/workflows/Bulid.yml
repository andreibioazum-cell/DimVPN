name: Build GodBlock Ultimate

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - run: echo "" > build.gradle
      - run: gradle wrapper --gradle-version 8.7

      - run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  maven { url = 'https://maven.fabricmc.net/' }
                  gradlePluginPortal()
                  mavenCentral()
              }
          }
          rootProject.name = 'GodBlock'
          EOF

      - run: |
          cat << 'EOF' > build.gradle
          plugins {
              id 'fabric-loom' version '1.6.12'
          }

          group = 'me.godblock'
          version = 'ULTIMATE'

          repositories {
              mavenCentral()
              maven { url 'https://maven.fabricmc.net/' }
          }

          dependencies {
              minecraft "com.mojang:minecraft:1.20.1"
              mappings "net.fabricmc:yarn:1.20.1+build.10:v2"
              modImplementation "net.fabricmc:fabric-loader:0.15.11"
              modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.1+1.20.1"
          }

          java {
              toolchain.languageVersion = JavaLanguageVersion.of(17)
          }
          EOF

      - run: |
          cat << 'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G
          org.gradle.daemon=false
          org.gradle.caching=true
          EOF

      - run: |
          mkdir -p src/main/java/me/godblock
          mkdir -p src/main/resources/assets/godblock/{blockstates,models/block,models/item,lang,textures/block}
          mkdir -p src/main/resources/data/godblock/recipes

      - run: |
          cat << 'EOF' > src/main/resources/fabric.mod.json
          {
            "schemaVersion": 1,
            "id": "godblock",
            "version": "ULTIMATE",
            "name": "God Block Ultimate",
            "entrypoints": {
              "main": ["me.godblock.GodBlockMod"]
            },
            "depends": {
              "fabricloader": ">=0.15.0",
              "minecraft": "1.20.1",
              "fabric-api": "*"
            }
          }
          EOF

      - run: |
          cat << 'EOF' > src/main/resources/assets/godblock/lang/en_us.json
          {
            "block.godblock.god_block": "Charged God Block",
            "block.godblock.god_block_uncharged": "Uncharged God Block"
          }
          EOF

      - run: |
          cat << 'EOF' > src/main/resources/data/godblock/recipes/god_block_uncharged.json
          {
            "type": "minecraft:crafting_shaped",
            "pattern": [
              "SSS",
              "SCS",
              "SSS"
            ],
            "key": {
              "S": { "item": "minecraft:stone" },
              "C": { "item": "minecraft:coal" }
            },
            "result": {
              "item": "godblock:god_block_uncharged"
            }
          }
          EOF

      - run: |
          sudo apt-get update && sudo apt-get install imagemagick -y

          convert -size 16x16 plasma:fractal -resize 16x16! -colorspace gray \
          src/main/resources/assets/godblock/textures/block/god_block_uncharged.png

          convert -size 16x16 plasma:fractal -resize 16x16! -colorize 70,70,0 \
          src/main/resources/assets/godblock/textures/block/god_block.png

      - run: |
          cat << 'EOF' > src/main/resources/assets/godblock/blockstates/god_block_uncharged.json
          { "variants": { "": { "model": "godblock:block/god_block_uncharged" } } }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/blockstates/god_block.json
          { "variants": { "": { "model": "godblock:block/god_block" } } }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/models/block/god_block_uncharged.json
          {
            "parent": "block/cube_all",
            "textures": {
              "all": "godblock:block/god_block_uncharged"
            }
          }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/models/block/god_block.json
          {
            "parent": "block/cube_all",
            "textures": {
              "all": "godblock:block/god_block"
            }
          }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/models/item/god_block_uncharged.json
          {
            "parent": "godblock:block/god_block_uncharged"
          }
          EOF

          cat << 'EOF' > src/main/resources/assets/godblock/models/item/god_block.json
          {
            "parent": "godblock:block/god_block"
          }
          EOF      - run: |
          cat << 'EOF' > src/main/java/me/godblock/GodBlockMod.java
          package me.godblock;

          import net.fabricmc.api.ModInitializer;
          import net.fabricmc.fabric.api.object.builder.v1.block.entity.FabricBlockEntityTypeBuilder;
          import net.fabricmc.fabric.api.itemgroup.v1.ItemGroupEvents;

          import net.minecraft.block.*;
          import net.minecraft.block.entity.*;
          import net.minecraft.entity.*;
          import net.minecraft.entity.mob.HostileEntity;
          import net.minecraft.entity.mob.MobEntity;
          import net.minecraft.entity.player.PlayerEntity;
          import net.minecraft.item.*;
          import net.minecraft.nbt.NbtCompound;
          import net.minecraft.registry.*;
          import net.minecraft.server.world.ServerWorld;
          import net.minecraft.sound.SoundCategory;
          import net.minecraft.sound.SoundEvents;
          import net.minecraft.state.StateManager;
          import net.minecraft.state.property.IntProperty;
          import net.minecraft.text.Text;
          import net.minecraft.util.*;
          import net.minecraft.util.hit.BlockHitResult;
          import net.minecraft.util.math.*;
          import net.minecraft.world.World;

          import java.util.*;

          public class GodBlockMod implements ModInitializer {

              public static final String MOD_ID = "godblock";
              public static final IntProperty MODE = IntProperty.of("mode", 1, 4);

              public static Block GOD_BLOCK;
              public static Block GOD_BLOCK_UNCHARGED;
              public static BlockEntityType<ChargeEntity> CHARGE_ENTITY;

              @Override
              public void onInitialize() {

                  GOD_BLOCK = Registry.register(Registries.BLOCK,
                          new Identifier(MOD_ID,"god_block"),
                          new ChargedBlock(AbstractBlock.Settings.copy(Blocks.NETHERITE_BLOCK)
                                  .strength(5f)
                                  .luminance(s->12)));

                  GOD_BLOCK_UNCHARGED = Registry.register(Registries.BLOCK,
                          new Identifier(MOD_ID,"god_block_uncharged"),
                          new UnchargedBlock(AbstractBlock.Settings.copy(Blocks.STONE)
                                  .strength(3f)));

                  Registry.register(Registries.ITEM,
                          new Identifier(MOD_ID,"god_block"),
                          new BlockItem(GOD_BLOCK,new Item.Settings()));

                  Registry.register(Registries.ITEM,
                          new Identifier(MOD_ID,"god_block_uncharged"),
                          new BlockItem(GOD_BLOCK_UNCHARGED,new Item.Settings()));

                  CHARGE_ENTITY = Registry.register(
                          Registries.BLOCK_ENTITY_TYPE,
                          new Identifier(MOD_ID,"charge_entity"),
                          FabricBlockEntityTypeBuilder.create(ChargeEntity::new,GOD_BLOCK_UNCHARGED).build()
                  );

                  ItemGroupEvents.modifyEntriesEvent(ItemGroups.BUILDING_BLOCKS)
                          .register(entries -> {
                              entries.add(GOD_BLOCK_UNCHARGED);
                              entries.add(GOD_BLOCK);
                          });
              }

              // ================== НЕЗАРЯЖЕННЫЙ ==================

              public static class UnchargedBlock extends BlockWithEntity {

                  public UnchargedBlock(Settings settings){
                      super(settings);
                  }

                  @Override
                  public BlockEntity createBlockEntity(BlockPos pos, BlockState state){
                      return new ChargeEntity(pos,state);
                  }

                  @Override
                  public ActionResult onUse(BlockState state, World world,
                                            BlockPos pos, PlayerEntity player,
                                            Hand hand, BlockHitResult hit){

                      if(world.isClient) return ActionResult.SUCCESS;

                      BlockEntity be = world.getBlockEntity(pos);

                      if(be instanceof ChargeEntity charge){

                          charge.clicks++;

                          player.sendMessage(
                                  Text.literal("Charging: "+charge.clicks+"/50"),
                                  true);

                          world.playSound(null,pos,
                                  SoundEvents.BLOCK_AMETHYST_BLOCK_HIT,
                                  SoundCategory.BLOCKS,0.6f,1f);

                          if(charge.clicks>=50){
                              world.breakBlock(pos,false);
                              ItemScatterer.spawn(world,pos,
                                      DefaultedList.ofSize(1,
                                              new ItemStack(GOD_BLOCK)));
                          }
                      }

                      return ActionResult.SUCCESS;
                  }
              }

              public static class ChargeEntity extends BlockEntity {

                  int clicks=0;

                  public ChargeEntity(BlockPos pos, BlockState state){
                      super(CHARGE_ENTITY,pos,state);
                  }

                  @Override
                  public void writeNbt(NbtCompound nbt){
                      super.writeNbt(nbt);
                      nbt.putInt("Clicks",clicks);
                  }

                  @Override
                  public void readNbt(NbtCompound nbt){
                      super.readNbt(nbt);
                      clicks = nbt.getInt("Clicks");
                  }
              }

              // ================== ЗАРЯЖЕННЫЙ ==================

              public static class ChargedBlock extends Block {

                  public ChargedBlock(Settings settings){
                      super(settings);
                  }

                  @Override
                  public ActionResult onUse(BlockState state, World world,
                                            BlockPos pos, PlayerEntity player,
                                            Hand hand, BlockHitResult hit){

                      if(world.isClient) return ActionResult.SUCCESS;

                      int mode = state.contains(MODE) ? state.get(MODE) : 1;
                      mode++;
                      if(mode>4) mode=1;

                      world.setBlockState(pos,state.with(MODE,mode));
                      player.sendMessage(Text.literal("Mode: "+mode),false);

                      return ActionResult.SUCCESS;
                  }
              }
          }
          EOF

      - run: ./gradlew build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: GodBlockUltimate
          path: build/libs/*.jar
