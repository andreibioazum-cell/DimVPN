              private void setupCustomize(){
                  buildColorRow(findViewById(R.id.skin_colors),SKIN_I,i->{ren.charSkinR=SKIN_C[i][0];ren.charSkinG=SKIN_C[i][1];ren.charSkinB=SKIN_C[i][2];savePrefs();});
                  buildColorRow(findViewById(R.id.torso_colors),TORSO_I,i->{ren.charTorsoR=TORSO_C[i][0];ren.charTorsoG=TORSO_C[i][1];ren.charTorsoB=TORSO_C[i][2];savePrefs();});
                  buildColorRow(findViewById(R.id.legs_colors),LEGS_I,i->{ren.charLegsR=LEGS_C[i][0];ren.charLegsG=LEGS_C[i][1];ren.charLegsB=LEGS_C[i][2];savePrefs();});
                  findViewById(R.id.btn_pack_default).setOnClickListener(v->{equippedPack=0;applyPack();savePrefs();updCustPacks();Toast.makeText(this,"Default equipped",Toast.LENGTH_SHORT).show();});
                  findViewById(R.id.btn_pack_fly).setOnClickListener(v->buyOrEquip(1,"Fly"));
                  findViewById(R.id.btn_pack_combat).setOnClickListener(v->buyOrEquip(2,"Combat"));
                  findViewById(R.id.btn_pack_dance).setOnClickListener(v->buyOrEquip(3,"Dance"));
              }

              private void buildColorRow(LinearLayout row,int[]colors,CP cb){
                  row.removeAllViews();int dp=(int)(8*getResources().getDisplayMetrics().density);
                  for(int i=0;i<colors.length;i++){final int ii=i;View dot=new View(this);LinearLayout.LayoutParams lp=new LinearLayout.LayoutParams(dp*5,dp*5);lp.setMargins(dp/2,0,dp/2,0);dot.setLayoutParams(lp);GradientDrawable gd=new GradientDrawable();gd.setShape(GradientDrawable.OVAL);gd.setColor(colors[i]);gd.setStroke(4,0xFF00BFFF);dot.setBackground(gd);dot.setOnClickListener(v->{cb.pick(ii);Toast.makeText(this,"Applied",Toast.LENGTH_SHORT).show();});row.addView(dot);}
              }

              private void updCustPacks(){
                  Button bd=findViewById(R.id.btn_pack_default),bf=findViewById(R.id.btn_pack_fly),bc=findViewById(R.id.btn_pack_combat),bda=findViewById(R.id.btn_pack_dance);
                  TextView tf=findViewById(R.id.txt_fly_price),tc=findViewById(R.id.txt_combat_price),td=findViewById(R.id.txt_dance_price);
                  bd.setText(equippedPack==0?"Equipped":"Equip");bd.setBackgroundResource(equippedPack==0?R.drawable.btn_blue_filled:R.drawable.btn_blue);bd.setTextColor(equippedPack==0?0xFF000000:0xFF00BFFF);
                  updPackBtn(bf,tf,1);updPackBtn(bc,tc,2);updPackBtn(bda,td,3);
              }

              private void updPackBtn(Button btn,TextView price,int pack){
                  if(getOwned(pack)){btn.setText(equippedPack==pack?"Equipped":"Equip");btn.setBackgroundResource(equippedPack==pack?R.drawable.btn_blue_filled:R.drawable.btn_blue);btn.setTextColor(equippedPack==pack?0xFF000000:0xFF00BFFF);price.setText("Owned");}
                  else{btn.setText("Buy");btn.setBackgroundResource(R.drawable.btn_blue);btn.setTextColor(0xFF00BFFF);price.setText(PACK_PRICE+" Ridix");}
              }

              private void applyPack(){if(ren!=null)ren.animPack=equippedPack;}

              private void startRidixTimer(){
                  stopRidixTimer();
                  ridixTimer=new Runnable(){@Override public void run(){ridix+=RIDIX_REWARD;savePrefs();updRidix();Toast.makeText(MainActivity.this,"+"+RIDIX_REWARD+" Ridix",Toast.LENGTH_SHORT).show();handler.postDelayed(this,RIDIX_SEC*1000L);}};
                  handler.postDelayed(ridixTimer,RIDIX_SEC*1000L);
              }
              private void stopRidixTimer(){if(ridixTimer!=null){handler.removeCallbacks(ridixTimer);ridixTimer=null;}}
              private void updRidix(){String s=String.valueOf(ridix);if(txtRidixLobby!=null)txtRidixLobby.setText(s);if(txtRidixShop!=null)txtRidixShop.setText(s);}
              private void savePrefs(){SharedPreferences.Editor ed=getSharedPreferences("enjoer",MODE_PRIVATE).edit();ed.putInt("ridix",ridix);ed.putBoolean("fly",ownedFly);ed.putBoolean("combat",ownedCombat);ed.putBoolean("dance",ownedDance);ed.putInt("pack",equippedPack);ed.putFloat("sR",ren!=null?ren.charSkinR:1f);ed.putFloat("sG",ren!=null?ren.charSkinG:.85f);ed.putFloat("sB",ren!=null?ren.charSkinB:.15f);ed.putFloat("tR",ren!=null?ren.charTorsoR:.1f);ed.putFloat("tG",ren!=null?ren.charTorsoG:.4f);ed.putFloat("tB",ren!=null?ren.charTorsoB:1f);ed.putFloat("lR",ren!=null?ren.charLegsR:.1f);ed.putFloat("lG",ren!=null?ren.charLegsG:.8f);ed.putFloat("lB",ren!=null?ren.charLegsB:.2f);ed.apply();}
              private void loadPrefs(){SharedPreferences sp=getSharedPreferences("enjoer",MODE_PRIVATE);ridix=sp.getInt("ridix",0);ownedFly=sp.getBoolean("fly",false);ownedCombat=sp.getBoolean("combat",false);ownedDance=sp.getBoolean("dance",false);equippedPack=sp.getInt("pack",0);}
              private void applyPrefsToRen(){SharedPreferences sp=getSharedPreferences("enjoer",MODE_PRIVATE);ren.charSkinR=sp.getFloat("sR",1f);ren.charSkinG=sp.getFloat("sG",.85f);ren.charSkinB=sp.getFloat("sB",.15f);ren.charTorsoR=sp.getFloat("tR",.1f);ren.charTorsoG=sp.getFloat("tG",.4f);ren.charTorsoB=sp.getFloat("tB",1f);ren.charLegsR=sp.getFloat("lR",.1f);ren.charLegsG=sp.getFloat("lG",.8f);ren.charLegsB=sp.getFloat("lB",.2f);ren.animPack=equippedPack;}
              @Override protected void onResume(){super.onResume();if(ren!=null)applyPrefsToRen();}
              @Override protected void onPause(){super.onPause();stopRidixTimer();savePrefs();}

              private void showScriptDialog(){
                  EditText et=new EditText(this);et.setMinLines(8);et.setText("phone.toast(\"Hello\")\nplayer.jump\n");et.setInputType(InputType.TYPE_CLASS_TEXT|InputType.TYPE_TEXT_FLAG_MULTI_LINE);
                  new AlertDialog.Builder(this).setTitle("Script").setView(et).setPositiveButton("Run",(d,w)->{try{ScriptEngine.run(this,et.getText().toString());updAxis();updSizeInfo();updGridBtn();Toast.makeText(this,"Done",Toast.LENGTH_SHORT).show();}catch(Exception ex){Toast.makeText(this,ex.getMessage(),Toast.LENGTH_LONG).show();}}).setNegativeButton("Close",null).show();
              }

              private void showBlockEventsDialog(){
                  if(ren.selectedIndex<0||ren.selectedIndex>=ren.blocks.size())return;
                  Block b=ren.blocks.get(ren.selectedIndex);
                  LinearLayout root=new LinearLayout(this);root.setOrientation(LinearLayout.VERTICAL);int p=(int)(12*getResources().getDisplayMetrics().density);root.setPadding(p,p,p,p);
                  TextView t1=new TextView(this);t1.setText("On Start");EditText e1=new EditText(this);e1.setMinLines(3);e1.setText(b.onStartScript);
                  TextView t2=new TextView(this);t2.setText("On Touch");EditText e2=new EditText(this);e2.setMinLines(3);e2.setText(b.onTouchScript);
                  TextView t3=new TextView(this);t3.setText("On Tap");EditText e3=new EditText(this);e3.setMinLines(3);e3.setText(b.onTapScript);
                  root.addView(t1);root.addView(e1);root.addView(t2);root.addView(e2);root.addView(t3);root.addView(e3);
                  new AlertDialog.Builder(this).setTitle("Events").setView(root).setPositiveButton("Save",(d,w)->{b.onStartScript=e1.getText().toString();b.onTouchScript=e2.getText().toString();b.onTapScript=e3.getText().toString();Toast.makeText(this,"Saved",Toast.LENGTH_SHORT).show();}).setNegativeButton("Close",null).show();
              }

              private void setShape(String sh,float sx,float sy,float sz,int i){ren.blockShape=sh;ren.blockSX=sx;ren.blockSY=sy;ren.blockSZ=sz;updBtnGrp(shapeBtn,i);updSizeInfo();}
              private void resetP(){ren.pX=0;ren.pY=7;ren.pZ=15;ren.vY=0;}
              private void axisBtn(int id,float dx,float dy,float dz){findViewById(id).setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN||e.getAction()==MotionEvent.ACTION_MOVE){float step=ren.gridEnabled?ren.gridSize:.5f;ren.moveSelected(dx*step,dy*step,dz*step);}return true;});}
              private void updAxis(){runOnUiThread(()->{boolean sel=ren.selectedIndex>=0;axisPanel.setVisibility(sel?View.VISIBLE:View.GONE);btnDeselect.setVisibility(sel?View.VISIBLE:View.GONE);btnHide.setVisibility(sel?View.VISIBLE:View.GONE);btnDelete.setVisibility(sel?View.VISIBLE:View.GONE);btnEvents.setVisibility(sel?View.VISIBLE:View.GONE);if(sel){Block b=ren.blocks.get(ren.selectedIndex);btnHide.setText(b.hidden?"Show":"Hide");}});}
              private void updSizeInfo(){runOnUiThread(()->txtSizeInfo.setText(String.format(java.util.Locale.US,"%.1f x %.1f x %.1f",ren.blockSX,ren.blockSY,ren.blockSZ)));}
              private void updGridBtn(){runOnUiThread(()->{if(ren.gridEnabled){btnGrid.setText("Grid: On");btnGrid.setBackgroundResource(R.drawable.btn_blue_filled);btnGrid.setTextColor(0xFF000000);}else{btnGrid.setText("Grid: Off");btnGrid.setBackgroundResource(R.drawable.btn_blue);btnGrid.setTextColor(0xFF00BFFF);}});}
              private void setupJoy(View base,View stick){base.setOnTouchListener((v,e)->{float cx=v.getWidth()/2f,cy=v.getHeight()/2f;if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){float dx=e.getX()-cx,dy=e.getY()-cy,d=(float)Math.sqrt(dx*dx+dy*dy),lim=cx-stick.getWidth()/2f;if(d>lim){dx*=lim/d;dy*=lim/d;}stick.setTranslationX(dx);stick.setTranslationY(dy);ren.jX=dx/lim;ren.jY=dy/lim;}else if(e.getAction()==MotionEvent.ACTION_UP){stick.setTranslationX(0);stick.setTranslationY(0);ren.jX=0;ren.jY=0;}return true;});}
              private void setupLook(View z){z.setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}else if(e.getAction()==MotionEvent.ACTION_MOVE){ren.rY+=(e.getX()-lx)*.25f;ren.rX=Math.max(-80,Math.min(80,ren.rX-(e.getY()-ly)*.25f));lx=e.getX();ly=e.getY();}return true;});}
              private void updBtnGrp(Button[]btns,int sel){for(int i=0;i<btns.length;i++){if(i==sel){btns[i].setBackgroundResource(R.drawable.btn_blue_filled);btns[i].setTextColor(0xFF000000);}else{btns[i].setBackgroundResource(R.drawable.btn_blue);btns[i].setTextColor(0xFF00BFFF);}}}
              private void updColSel(int sel){for(int i=0;i<colorBtn.length;i++){try{GradientDrawable bg=(GradientDrawable)colorBtn[i].getBackground();if(i==sel)bg.setStroke(6,0xFFFFFFFF);else bg.setStroke(2,0xFF00BFFF);}catch(Exception ignored){}}}
          }
          EOF

