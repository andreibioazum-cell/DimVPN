name: Ultimate VPN Stealth (Android 14 Ready)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Structure
        run: |
          mkdir -p app/src/main/java/com/iso/vpn
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Generate Configs
        run: |
          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          cat <<'EOF' > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0" 
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

      - name: Generate App build.gradle
        run: |
          cat <<'EOF' > app/build.gradle
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
              namespace 'com.iso.vpn'
              compileSdk 34
              defaultConfig {
                  applicationId "com.iso.vpn"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "9.0-VPN-BYPASS"
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Generate VPN Engine (The Bypass Logic)
        run: |
          cat <<'EOF' > app/src/main/java/com/iso/vpn/LocalVpnService.kt
          package com.iso.vpn
          import android.net.VpnService
          import android.os.ParcelFileDescriptor
          import android.content.Intent
          import android.util.Log

          class LocalVpnService : VpnService() {
              private var vpnInterface: ParcelFileDescriptor? = null

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  val action = intent?.action
                  if (action == "STOP") {
                      stopVpn()
                      return START_NOT_STICKY
                  }
                  startVpn()
                  return START_STICKY
              }

              private fun startVpn() {
                  val builder = Builder()
                  builder.setSession("StealthVpn")
                      .addAddress("10.0.0.2", 24)
                      .addDnsServer("8.8.8.8")
                      .addRoute("0.0.0.0", 0)
                  
                  // Принудительно направляем только нужные приложения
                  try {
                      builder.addAllowedApplication("com.google.android.youtube")
                      builder.addAllowedApplication("com.roblox.client")
                      builder.addAllowedApplication("com.supercell.brawlstars")
                  } catch (e: Exception) {}

                  vpnInterface = builder.establish()
                  Log.d("VPN", "VPN Started - Key Icon should be visible")
              }

              private fun stopVpn() {
                  vpnInterface?.close()
                  vpnInterface = null
                  stopSelf()
              }

              override fun onDestroy() {
                  stopVpn()
                  super.onDestroy()
              }
          }
          EOF

      - name: Generate MainActivity (Filtered List)
        run: |
          cat <<'EOF' > app/src/main/java/com/iso/vpn/MainActivity.kt
          package com.iso.vpn
          import android.content.Intent
          import android.content.pm.ApplicationInfo
          import android.net.VpnService
          import android.os.Bundle
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              private val targetApps = listOf(
                  "com.google.android.youtube",
                  "com.roblox.client",
                  "com.supercell.brawlstars"
              )

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  val layout = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(50, 50, 50, 50)
                  }

                  val title = TextView(this).apply {
                      text = "Ускоритель: YouTube, Roblox, Brawl"
                      textSize = 20f
                      setPadding(0,0,0,50)
                  }
                  layout.addView(title)

                  val btnVpn = Button(this).apply { text = "Включить VPN (Обход блокировок)" }
                  layout.addView(btnVpn)

                  val listView = ListView(this)
                  layout.addView(listView)
                  setContentView(layout)

                  btnVpn.setOnClickListener {
                      val intent = VpnService.prepare(this)
                      if (intent != null) startActivityForResult(intent, 0)
                      else startService(Intent(this, LocalVpnService::class.java))
                  }

                  // Фильтруем только 3 нужных приложения
                  val apps = packageManager.getInstalledApplications(0)
                      .filter { it.packageName in targetApps }
                  
                  val adapter = object : ArrayAdapter<ApplicationInfo>(this, android.R.layout.simple_list_item_1, apps) {
                      override fun getView(p: Int, v: android.view.View?, gr: android.view.ViewGroup): android.view.View {
                          val view = super.getView(p, v, gr) as TextView
                          view.text = apps[p].loadLabel(packageManager)
                          return view
                      }
                  }
                  listView.adapter = adapter
                  
                  listView.setOnItemClickListener { _, _, position, _ ->
                      val pkg = apps[position].packageName
                      val launchIntent = packageManager.getLaunchIntentForPackage(pkg)
                      startActivity(launchIntent)
                  }
              }

              override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                  super.onActivityResult(requestCode, resultCode, data)
                  if (resultCode == RESULT_OK) startService(Intent(this, LocalVpnService::class.java))
              }
          }
          EOF

      - name: Generate Manifest
        run: |
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />
              <application android:label="Stealth Key" android:theme="@style/Theme.AppCompat.Light">
                  <service android:name=".LocalVpnService" 
                      android:permission="android.permission.BIND_VPN_SERVICE"
                      android:foregroundServiceType="specialUse"
                      android:exported="false">
                      <intent-filter>
                          <action android:name="android.net.VpnService" />
                      </intent-filter>
                  </service>
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Execute Build
        run: gradle assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: StealthVPN-A14
          path: app/build/outputs/apk/debug/app-debug.apk
