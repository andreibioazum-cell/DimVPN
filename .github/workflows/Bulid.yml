name: Enjoer_Menu_Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ---------------- CREATE STRUCTURE ----------------

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/enjoer/menu
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

      # ---------------- ROOT FILES ----------------

      - name: Create Gradle root
        run: |
          echo "rootProject.name='Enjoer_Menu'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.2.2"
              }
          }
          EOF

          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      # ---------------- APP BUILD ----------------

      - name: Create app build.gradle
        run: |
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.enjoer.menu'
              compileSdk 34

              defaultConfig {
                  applicationId "com.enjoer.menu"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release { minifyEnabled false }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      # ---------------- MANIFEST ----------------

      - name: Create Manifest
        run: |
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Enjoer"
                  android:theme="@style/AppTheme">

                  <activity
                      android:name="com.enjoer.menu.MainActivity"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>

                  </activity>
              </application>
          </manifest>
          EOF

      # ---------------- THEME ----------------

      - name: Create Theme
        run: |
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowBackground">#0A0F1C</item>
              </style>
          </resources>
          EOF

      # ---------------- BUTTON STYLE ----------------

      - name: Create button drawable
        run: |
          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <corners android:radius="14dp"/>
              <solid android:color="#00BFFF"/>
          </shape>
          EOF

      # ---------------- LAYOUT ----------------

      - name: Create activity_main.xml
        run: |
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:background="#0A0F1C">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="ENJOER"
                  android:textSize="42sp"
                  android:textStyle="bold"
                  android:textColor="#00BFFF"
                  android:layout_marginBottom="60dp"/>

              <Button
                  android:id="@+id/btn_play"
                  android:layout_width="240dp"
                  android:layout_height="60dp"
                  android:text="Play"
                  android:textSize="18sp"
                  android:background="@drawable/btn_blue"
                  android:textColor="#000"
                  android:layout_marginBottom="16dp"/>

              <Button
                  android:id="@+id/btn_settings"
                  android:layout_width="240dp"
                  android:layout_height="60dp"
                  android:text="Settings"
                  android:textSize="18sp"
                  android:background="@drawable/btn_blue"
                  android:textColor="#000"
                  android:layout_marginBottom="16dp"/>

              <Button
                  android:id="@+id/btn_exit"
                  android:layout_width="240dp"
                  android:layout_height="60dp"
                  android:text="Exit"
                  android:textSize="18sp"
                  android:background="@drawable/btn_blue"
                  android:textColor="#000"/>

          </LinearLayout>
          EOF

      # ---------------- MAIN ACTIVITY ----------------

      - name: Create MainActivity.java
        run: |
          cat <<EOF > app/src/main/java/com/enjoer/menu/MainActivity.java
          package com.enjoer.menu;

          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  Button play = findViewById(R.id.btn_play);
                  Button settings = findViewById(R.id.btn_settings);
                  Button exit = findViewById(R.id.btn_exit);

                  play.setOnClickListener(v ->
                          Toast.makeText(this,"Play pressed",Toast.LENGTH_SHORT).show()
                  );

                  settings.setOnClickListener(v ->
                          Toast.makeText(this,"Settings pressed",Toast.LENGTH_SHORT).show()
                  );

                  exit.setOnClickListener(v -> finish());
              }
          }
          EOF

      # ---------------- BUILD APK ----------------

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Menu_APK
          path: app/build/outputs/apk/debug/app-debug.apk
