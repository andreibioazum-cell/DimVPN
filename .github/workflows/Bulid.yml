name: Ultimate Stealth Container Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установка JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Убрали кэш, так как файлы создаются позже

      - name: Инициализация Gradle Wrapper
        run: gradle wrapper

      - name: Создание структуры проекта
        run: |
          mkdir -p app/src/main/java/com/stealth/container
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Конфигурация Gradle (Root)
        run: |
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1'; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20" }
          }
          allprojects { repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } } }
          EOF

      - name: Конфигурация Gradle (App)
        run: |
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'kotlin-android' }
          android {
              namespace 'com.stealth.container'
              compileSdk 33
              defaultConfig {
                  applicationId "com.stealth.container"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "5.3-FIXED"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.github.pika-linux:BlackBox:1.5.0'
              implementation 'androidx.recyclerview:recyclerview:1.3.0'
          }
          EOF

      - name: Основной интерфейс
        run: |
          cat <<EOF > app/src/main/java/com/stealth/container/MainActivity.kt
          package com.stealth.container

          import android.content.Intent
          import android.content.pm.ApplicationInfo
          import android.net.Uri
          import android.os.Bundle
          import android.provider.Settings
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          import android.view.View
          import android.view.ViewGroup

          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  
                  val layout = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(40, 40, 40, 40)
                  }

                  val title = TextView(this).apply {
                      text = "Выберите приложение для запуска"
                      textSize = 18f
                      setPadding(0, 0, 0, 40)
                  }
                  layout.addView(title)

                  val listView = ListView(this)
                  layout.addView(listView)
                  setContentView(layout)

                  val apps = packageManager.getInstalledApplications(0)
                      .filter { it.flags and ApplicationInfo.FLAG_SYSTEM == 0 } 
                  
                  val adapter = object : ArrayAdapter<ApplicationInfo>(this, android.R.layout.simple_list_item_1, apps) {
                      override fun getView(position: Int, convertView: View?, parent: ViewGroup): View {
                          val view = super.getView(position, convertView, parent) as TextView
                          view.text = apps[position].loadLabel(packageManager)
                          return view
                      }
                  }
                  listView.adapter = adapter

                  listView.setOnItemClickListener { _, _, position, _ ->
                      val selectedApp = apps[position]
                      val name = selectedApp.loadLabel(packageManager)
                      startStealthMode(selectedApp.packageName, name.toString())
                  }
              }

              private fun startStealthMode(packageName: String, label: String) {
                  if (!Settings.canDrawOverlays(this)) {
                      val intent = Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:\$packageName"))
                      startActivityForResult(intent, 100)
                      return
                  }
                  startService(Intent(this, FloatingService::class.java))
                  Toast.makeText(this, "Запуск \$label...", Toast.LENGTH_LONG).show()
              }
          }
          EOF

      - name: Фоновый сервис и Оверлей
        run: |
          cat <<EOF > app/src/main/java/com/stealth/container/FloatingService.kt
          package com.stealth.container
          import android.app.*
          import android.content.*
          import android.graphics.*
          import android.os.*
          import android.view.*
          import android.widget.*

          class FloatingService : Service() {
              override fun onBind(intent: Intent?) = null
              override fun onCreate() {
                  super.onCreate()
                  val wm = getSystemService(WINDOW_SERVICE) as WindowManager
                  val view = TextView(this).apply {
                      text = "● Iso-режим активен (Германия)"
                      setTextColor(Color.GREEN)
                      setBackgroundColor(Color.parseColor("#AA000000"))
                      setPadding(15, 5, 15, 5)
                      textSize = 11f
                  }
                  val params = WindowManager.LayoutParams(
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.WRAP_CONTENT,
                      WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
                      WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
                      PixelFormat.TRANSLUCENT
                  ).apply { gravity = Gravity.TOP or Gravity.END; x = 30; y = 30 }
                  wm.addView(view, params)
                  
                  val channelId = "iso_channel"
                  if (Build.VERSION.SDK_INT >= 26) {
                      val chan = NotificationChannel(channelId, "Iso-Service", NotificationManager.IMPORTANCE_LOW)
                      (getSystemService(NOTIFICATION_SERVICE) as NotificationManager).createNotificationChannel(chan)
                  }
                  startForeground(1, Notification.Builder(this, channelId)
                      .setContentTitle("Стелс-контейнер работает")
                      .setSmallIcon(android.R.drawable.ic_lock_idle_lock)
                      .build())
              }
          }
          EOF

      - name: Манифест
        run: |
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
              <application android:label="IsoContainer" android:theme="@style/Theme.AppCompat.Light">
                  <service android:name=".FloatingService" android:foregroundServiceType="specialUse" android:exported="false" />
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Сборка APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Загрузка результата
        uses: actions/upload-artifact@v4
        with:
          name: Stealth-Container-App
          path: app/build/outputs/apk/debug/app-debug.apk
