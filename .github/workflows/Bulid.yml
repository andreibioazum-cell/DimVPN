name: Enjoer_Horror_Edition_6.1
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # Стили без рамок
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
              <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>
            </style>
          </resources>
          EOF

          # UI элементы (Хоррор стиль: красный/черный)
          cat <<EOF > app/src/main/res/drawable/btn_blood.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <corners android:radius="2dp"/>
            <solid android:color="#220000"/>
            <stroke android:width="1dp" android:color="#FF0000"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#88000000"/>
            <stroke android:width="1dp" android:color="#440000"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/crosshair.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <size android:width="4dp" android:height="4dp"/>
            <solid android:color="#FF0000"/>
          </shape>
          EOF

          # Макет (Интерфейс почти пустой для погружения)
          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000">

              <android.opengl.GLSurfaceView
                  android:id="@+id/gl_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>

              <RelativeLayout
                  android:id="@+id/game_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent">

                  <View
                      android:id="@+id/look_zone"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"/>

                  <FrameLayout
                      android:id="@+id/joy_base"
                      android:layout_width="120dp"
                      android:layout_height="120dp"
                      android:layout_alignParentBottom="true"
                      android:layout_alignParentLeft="true"
                      android:layout_marginLeft="30dp"
                      android:layout_marginBottom="30dp"
                      android:background="@drawable/joy_base"/>

                  <View
                      android:id="@+id/joy_stick"
                      android:layout_width="50dp"
                      android:layout_height="50dp"
                      android:layout_alignLeft="@id/joy_base"
                      android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="35dp"
                      android:layout_marginTop="35dp"
                      android:background="@drawable/btn_blood"/>

                  <Button
                      android:id="@+id/btn_action"
                      android:layout_width="80dp"
                      android:layout_height="80dp"
                      android:layout_alignParentRight="true"
                      android:layout_alignParentBottom="true"
                      android:layout_marginRight="30dp"
                      android:layout_marginBottom="30dp"
                      android:text="STAY"
                      android:textColor="#F00"
                      android:background="@drawable/btn_blood"/>

                  <View
                      android:layout_width="4dp"
                      android:layout_height="4dp"
                      android:layout_centerInParent="true"
                      android:background="@drawable/crosshair"/>
                  
                  <TextView
                      android:id="@+id/status_text"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_centerHorizontal="true"
                      android:layout_marginTop="20dp"
                      android:textColor="#FF0000"
                      android:text="[ IN_MENU ]"
                      android:fontFamily="monospace"/>
              </RelativeLayout>
          </FrameLayout>
          LAYOUT

          # Класс Block (с триггерами)
          cat <<EOF > app/src/main/java/com/enjoer/game/Block.java
          package com.enjoer.game;
          public class Block {
              public float x, y, z, sx, sy, sz, r, g, b;
              public String name = "";
              public boolean hidden = false;
              public Block(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b, String name) {
                  this.x=x; this.y=y; this.z=z; this.sx=sx; this.sy=sy; this.sz=sz; this.r=r; this.g=g; this.b=b; this.name=name;
              }
              public float minX(){return x-sx/2f;} public float maxX(){return x+sx/2f;}
              public float minY(){return y-sy/2f;} public float maxY(){return y+sy/2f;}
              public float minZ(){return z-sz/2f;} public float maxZ(){return z+sz/2f;}
          }
          EOF

          # Рендерер (Хоррор шейдеры)
          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;

          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              public float pX=0, pY=5.2f, pZ=10, rY=0, rX=0, jX=0, jY=0, vY=0;
              public final CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              private int prog;
              private FloatBuffer vBuf, nBuf;
              private final float[] proj=new float[16], view=new float[16], model=new float[16], vp=new float[16];
              public boolean isMenu = true;
              private float glitchTimer = 0;

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  
                  String vs = "#version 300 es\n" +
                      "layout(location=0) in vec4 aP; layout(location=1) in vec3 aN;\n" +
                      "uniform mat4 uMVP, uM; out vec3 vN, vP;\n" +
                      "void main(){ vP=vec3(uM*aP); vN=mat3(uM)*aN; gl_Position=uMVP*aP; }";

                  String fs = "#version 300 es\nprecision highp float;\n" +
                      "in vec3 vN, vP; uniform vec3 camP; uniform vec4 uC; uniform float uGlitch; out vec4 fC;\n" +
                      "void main(){\n" +
                      "  vec3 n=normalize(vN); vec3 lD=normalize(vec3(0.5, 1.0, 0.3));\n" +
                      "  float diff=max(dot(n, lD), 0.1);\n" +
                      "  float dist=length(camP-vP);\n" +
                      "  float fog=clamp(exp(-dist*0.07), 0.0, 1.0);\n" +
                      "  vec3 col=uC.rgb * (diff + 0.1);\n" +
                      "  if(uGlitch > 0.8) col.r *= 2.0;\n" + // Эффект глюка
                      "  fC=vec4(mix(vec3(0.01, 0.0, 0.0), col, fog), 1.0);\n" +
                      "}";
                  prog = mkProg(vs, fs);
                  setupGeometry();
                  loadMenu();
              }

              private void setupGeometry() {
                  float[] vc = { -.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,.5f, .5f,-.5f,.5f, -.5f,.5f,-.5f, -.5f,-.5f,-.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f,
                                -.5f,.5f,-.5f, -.5f,.5f,.5f, .5f,.5f,-.5f, .5f,.5f,.5f, -.5f,-.5f,-.5f, -.5f,-.5f,.5f, .5f,-.5f,-.5f, .5f,-.5f,.5f,
                                -.5f,.5f,-.5f, -.5f,-.5f,-.5f, -.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f, .5f,.5f,.5f, .5f,-.5f,.5f };
                  vBuf = ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc); vBuf.position(0);
                  nBuf = ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc); nBuf.position(0);
              }

              public void loadMenu() {
                  blocks.clear();
                  isMenu = true;
                  pX=0; pY=5.2f; pZ=10; rY=0; rX=0;
                  // Пол
                  blocks.add(new Block(0, 0, 0, 50, 0.2f, 50, 0.1f, 0.1f, 0.1f, "floor"));
                  // Кнопка ПУСК (Красная)
                  blocks.add(new Block(-4, 1.5f, -5, 2, 2, 2, 0.8f, 0, 0, "btn_start"));
                  // Кнопка ВЫХОД (Черная)
                  blocks.add(new Block(4, 1.5f, -5, 2, 2, 2, 0.05f, 0.05f, 0.05f, "btn_exit"));
                  // Стены
                  blocks.add(new Block(0, 5, -15, 30, 10, 1, 0.2f, 0.2f, 0.2f, "wall"));
              }

              public void startGame() {
                  isMenu = false;
                  blocks.clear();
                  blocks.add(new Block(0, 0, 0, 200, 0.2f, 200, 0.05f, 0.05f, 0.05f, "world_floor"));
                  // Лабиринт ужаса
                  for(int i=0; i<20; i++) {
                      float rx = (float)Math.random()*100-50;
                      float rz = (float)Math.random()*100-50;
                      blocks.add(new Block(rx, 5, rz, 4, 10, 4, 0.1f, 0.1f, 0.15f, "pillar"));
                  }
              }

              @Override
              public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClearColor(0,0,0,1);
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT);
                  GLES30.glUseProgram(prog);

                  float radY = (float)Math.toRadians(rY);
                  float radX = (float)Math.toRadians(rX);
                  float vx = (float)(Math.sin(radY)*Math.cos(radX));
                  float vy = (float)Math.sin(radX);
                  float vz = (float)(-Math.cos(radY)*Math.cos(radX));

                  Matrix.setLookAtM(view, 0, pX, pY, pZ, pX+vx, pY+vy, pZ+vz, 0, 1, 0);
                  Matrix.multiplyMM(vp, 0, proj, 0, view, 0);

                  int uMVP = GLES30.glGetUniformLocation(prog, "uMVP");
                  int uM = GLES30.glGetUniformLocation(prog, "uM");
                  int uC = GLES30.glGetUniformLocation(prog, "uC");
                  int uG = GLES30.glGetUniformLocation(prog, "uGlitch");
                  
                  glitchTimer += 0.1f;
                  GLES30.glUniform1f(uG, (Math.sin(glitchTimer*5) > 0.9) ? 1.0f : 0.0f);
                  GLES30.glUniform3f(GLES30.glGetUniformLocation(prog, "camP"), pX, pY, pZ);

                  GLES30.glVertexAttribPointer(0, 3, GLES30.GL_FLOAT, false, 0, vBuf);
                  GLES30.glEnableVertexAttribArray(0);

                  for(Block b : blocks) {
                      Matrix.setIdentityM(model, 0);
                      Matrix.translateM(model, 0, b.x, b.y, b.z);
                      Matrix.scaleM(model, 0, b.sx, b.sy, b.sz);
                      Matrix.multiplyMM(vp, 0, proj, 0, view, 0); // Reset VP
                      float[] mvp = new float[16];
                      Matrix.multiplyMM(mvp, 0, vp, 0, model, 0);
                      GLES30.glUniformMatrix4fv(uMVP, 1, false, mvp, 0);
                      GLES30.glUniformMatrix4fv(uM, 1, false, model, 0);
                      GLES30.glUniform4f(uC, b.r, b.g, b.b, 1.0f);
                      for(int i=0; i<6; i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP, i*4, 4);
                  }
              }

              private void update() {
                  float s = 0.15f;
                  float rad = (float)Math.toRadians(rY);
                  pX += (Math.sin(rad)*-jY + Math.cos(rad)*jX) * s;
                  pZ += (-Math.cos(rad)*-jY + Math.sin(rad)*jX) * s;
                  
                  // Коллизия с кнопками в меню
                  if(isMenu) {
                      for(Block b : blocks) {
                          if(b.name.startsWith("btn_")) {
                              float dx = pX - b.x; float dz = pZ - b.z;
                              if(Math.abs(dx) < 2 && Math.abs(dz) < 2) {
                                  if(b.name.equals("btn_start")) startGame();
                                  if(b.name.equals("btn_exit")) System.exit(0);
                              }
                          }
                      }
                  }
              }

              @Override
              public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0, 0, w, h);
                  Matrix.perspectiveM(proj, 0, 65, (float)w/h, 0.1f, 100f);
              }

              private int mkProg(String v, String f){
                  int p=GLES30.glCreateProgram();
                  GLES30.glAttachShader(p,mkSh(GLES30.GL_VERTEX_SHADER,v));
                  GLES30.glAttachShader(p,mkSh(GLES30.GL_FRAGMENT_SHADER,f));
                  GLES30.glLinkProgram(p);
                  return p;
              }
              private int mkSh(int t, String s){
                  int sh=GLES30.glCreateShader(t);
                  GLES30.glShaderSource(sh,s); GLES30.glCompileShader(sh);
                  return sh;
              }
          }
          RENDERER

          # Главная активность
          cat <<'MAIN' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.annotation.SuppressLint;
          import android.os.Bundle;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lx, ly;

              @SuppressLint("ClickableViewAccessibility")
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer();
                  gv.setRenderer(ren);

                  setupJoy(findViewById(R.id.joy_base), findViewById(R.id.joy_stick));
                  
                  findViewById(R.id.look_zone).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){ lx=e.getX(); ly=e.getY(); }
                      else if(e.getAction()==MotionEvent.ACTION_MOVE){
                          ren.rY += (e.getX()-lx)*0.2f;
                          ren.rX = Math.max(-80, Math.min(80, ren.rX - (e.getY()-ly)*0.2f));
                          lx=e.getX(); ly=e.getY();
                      }
                      return true;
                  });

                  // Цикл обновления статуса
                  final TextView status = findViewById(R.id.status_text);
                  new Thread(() -> {
                      while(true) {
                          try { Thread.sleep(500); } catch(Exception e){}
                          runOnUiThread(() -> {
                              if(ren.isMenu) status.setText("[ MODE: SELECTION_VOID ]\nWalk to RED cube to Start");
                              else status.setText("[ MODE: SURVIVAL ]\nDon't look back.");
                          });
                      }
                  }).start();
              }

              private void setupJoy(View base, View stick){
                  base.setOnTouchListener((v,e)->{
                      float cx=v.getWidth()/2f, cy=v.getHeight()/2f;
                      if(e.getAction()==MotionEvent.ACTION_MOVE || e.getAction()==MotionEvent.ACTION_DOWN){
                          float dx=e.getX()-cx, dy=e.getY()-cy, d=(float)Math.sqrt(dx*dx+dy*dy), lim=cx-stick.getWidth()/2f;
                          if(d>lim){ dx*=lim/d; dy*=lim/d; }
                          stick.setTranslationX(dx); stick.setTranslationY(dy);
                          ren.jX=dx/lim; ren.jY=dy/lim;
                      } else { stick.setTranslationX(0); stick.setTranslationY(0); ren.jX=0; ren.jY=0; }
                      return true;
                  });
              }
          }
          MAIN

          # Манифест и сборка
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.enjoer.game">
              <application android:label="Enjoer 6.1: Horror" android:theme="@style/AppTheme">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.enjoer.game'
              compileSdk 34
              defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_Horror_Final
          path: app/build/outputs/apk/debug/app-debug.apk
