          cat > app/src/main/java/com/enjoer/game/MainActivity.java << 'EOF'
          package com.enjoer.game;
          import android.annotation.SuppressLint;
          import android.content.pm.ActivityInfo;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.MotionEvent;
          import android.view.View;
          import android.widget.Button;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;
          import org.json.JSONObject;

          public class MainActivity extends AppCompatActivity {
              private GameRenderer ren;
              private float lx,ly;
              private Handler handler=new Handler(Looper.getMainLooper());
              private MultiplayerClient mpClient;
              private boolean connected=false;
              private TextView txtStatus,txtPlayers;
              private Button btnConnect,btnCharPig,btnCharDima;
              private Runnable sendPositionTask;
              private static final int SEND_INTERVAL_MS=100;

              @SuppressLint("ClickableViewAccessibility")
              @Override
              protected void onCreate(Bundle s){
                  super.onCreate(s);
                  setContentView(R.layout.activity_main);
                  setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);

                  android.opengl.GLSurfaceView gv=findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren=new GameRenderer();
                  gv.setRenderer(ren);

                  txtStatus=findViewById(R.id.txt_status);
                  txtPlayers=findViewById(R.id.txt_players);
                  btnConnect=findViewById(R.id.btn_connect);
                  btnCharPig=findViewById(R.id.btn_char_pig);
                  btnCharDima=findViewById(R.id.btn_char_dima);

                  // Выбор персонажа
                  btnCharPig.setOnClickListener(v->{
                      ren.charType=0;
                      btnCharPig.setBackgroundResource(R.drawable.btn_char_sel);
                      btnCharPig.setTextColor(0xFFFFD700);
                      btnCharDima.setBackgroundResource(R.drawable.btn_char);
                      btnCharDima.setTextColor(0xFF00BFFF);
                  });
                  btnCharDima.setOnClickListener(v->{
                      ren.charType=1;
                      btnCharDima.setBackgroundResource(R.drawable.btn_char_sel);
                      btnCharDima.setTextColor(0xFFFFD700);
                      btnCharPig.setBackgroundResource(R.drawable.btn_char);
                      btnCharPig.setTextColor(0xFF00BFFF);
                  });

                  // Мультиплеер
                  btnConnect.setOnClickListener(v->{
                      if(connected){disconnect();}
                      else{connectMP();}
                  });

                  // Прыжок
                  findViewById(R.id.btn_jump).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN)ren.doJump();
                      return true;
                  });

                  // Джойстик
                  setupJoy(findViewById(R.id.joy_base),findViewById(R.id.joy_stick));

                  // Взгляд
                  setupLook(findViewById(R.id.look_zone));
              }

              private void connectMP(){
                  txtStatus.setText("Connecting...");
                  txtStatus.setTextColor(0xFFFFFF00);
                  btnConnect.setText("Cancel");

                  mpClient=new MultiplayerClient(new MultiplayerClient.Listener(){
                      @Override public void onConnected(){
                          connected=true;
                          txtStatus.setText("Online: "+mpClient.myId);
                          txtStatus.setTextColor(0xFF44FF44);
                          btnConnect.setText("Disconnect");
                          txtPlayers.setVisibility(View.VISIBLE);
                          startSendingPosition();
                      }
                      @Override public void onMessage(String msg){
                          handleMessage(msg);
                      }
                      @Override public void onDisconnected(String reason){
                          connected=false;
                          txtStatus.setText("Offline");
                          txtStatus.setTextColor(0xFFFF6666);
                          btnConnect.setText("Connect");
                          txtPlayers.setVisibility(View.GONE);
                          stopSendingPosition();
                      }
                  });
                  mpClient.connect();
              }

              private void disconnect(){
                  if(mpClient!=null)mpClient.close();
                  connected=false;
                  txtStatus.setText("Offline");
                  txtStatus.setTextColor(0xFFFF6666);
                  btnConnect.setText("Connect");
                  txtPlayers.setVisibility(View.GONE);
                  stopSendingPosition();
              }

              private void startSendingPosition(){
                  stopSendingPosition();
                  sendPositionTask=new Runnable(){
                      @Override public void run(){
                          if(connected&&mpClient!=null){
                              try{
                                  JSONObject o=new JSONObject();
                                  o.put("id",mpClient.myId);
                                  o.put("x",ren.pX);
                                  o.put("y",ren.pY-ren.PLAYER_HEIGHT_CONST);
                                  o.put("z",ren.pZ);
                                  o.put("r",ren.rY);
                                  o.put("c",ren.charType);
                                  mpClient.send(o.toString());
                              }catch(Exception ignored){}
                          }
                          handler.postDelayed(this,SEND_INTERVAL_MS);
                      }
                  };
                  handler.postDelayed(sendPositionTask,SEND_INTERVAL_MS);
              }

              private void stopSendingPosition(){
                  if(sendPositionTask!=null){handler.removeCallbacks(sendPositionTask);sendPositionTask=null;}
              }

              private void handleMessage(String msg){
                  try{
                      JSONObject o=new JSONObject(msg);
                      if(!o.has("id"))return;
                      String id=o.getString("id");
                      if(mpClient!=null&&id.equals(mpClient.myId))return; // свои сообщения игнорируем
                      RemotePlayer rp=ren.remotePlayers.get(id);
                      if(rp==null){rp=new RemotePlayer(id);ren.remotePlayers.put(id,rp);}
                      rp.x=(float)o.getDouble("x");
                      rp.y=(float)o.getDouble("y");
                      rp.z=(float)o.getDouble("z");
                      rp.rotY=(float)o.getDouble("r");
                      rp.charType=o.optInt("c",0);
                      rp.lastSeen=System.currentTimeMillis();
                      // Обновить список игроков
                      updatePlayersList();
                  }catch(Exception ignored){}
              }

              private void updatePlayersList(){
                  int count=0;
                  long now=System.currentTimeMillis();
                  StringBuilder sb=new StringBuilder("Игроки:\n");
                  for(RemotePlayer rp:ren.remotePlayers.values()){
                      if(now-rp.lastSeen<8000){
                          count++;
                          sb.append(rp.id).append(" [").append(rp.charType==0?"Свин":"Дима").append("]\n");
                      }
                  }
                  if(count==0)sb.append("(нет других)");
                  final String txt=sb.toString();
                  txtPlayers.setText(txt);
              }

              @SuppressLint("ClickableViewAccessibility")
              private void setupJoy(View base,View stick){
                  base.setOnTouchListener((v,e)->{
                      float cx=v.getWidth()/2f,cy=v.getHeight()/2f;
                      if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){
                          float dx=e.getX()-cx,dy=e.getY()-cy;
                          float d=(float)Math.sqrt(dx*dx+dy*dy);
                          float lim=cx-stick.getWidth()/2f;
                          if(d>lim){dx*=lim/d;dy*=lim/d;}
                          stick.setTranslationX(dx);stick.setTranslationY(dy);
                          ren.jX=dx/lim;ren.jY=dy/lim;
                      }else if(e.getAction()==MotionEvent.ACTION_UP||e.getAction()==MotionEvent.ACTION_CANCEL){
                          stick.setTranslationX(0);stick.setTranslationY(0);
                          ren.jX=0;ren.jY=0;
                      }
                      return true;
                  });
              }

              @SuppressLint("ClickableViewAccessibility")
              private void setupLook(View z){
                  z.setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}
                      else if(e.getAction()==MotionEvent.ACTION_MOVE){
                          ren.rY+=(e.getX()-lx)*0.25f;
                          ren.rX=Math.max(-75,Math.min(75,ren.rX+(e.getY()-ly)*0.25f));
                          lx=e.getX();ly=e.getY();
                      }
                      return true;
                  });
              }

              @Override protected void onPause(){super.onPause();}
              @Override protected void onDestroy(){super.onDestroy();disconnect();}
          }
