              private void drawBodyPart(int uM,int uMVP,int uC,float bx,float by,float bz,float yaw,
                                        float localX,float localY,float localZ,float sx,float sy,float sz,float r,float g,float b){
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,bx,by,bz);
                  Matrix.rotateM(model,0,yaw,0f,1f,0f);
                  Matrix.scaleM(model,0,PLAYER_SCALE,PLAYER_SCALE,PLAYER_SCALE);
                  Matrix.translateM(model,0,localX,localY,localZ);
                  Matrix.scaleM(model,0,sx,sy,sz);
                  draw(uM,uMVP,uC,r,g,b,1f);
              }

              private void drawLimb(int uM,int uMVP,int uC,float bx,float by,float bz,float yaw,
                                    float localX,float localY,float localZ,float sx,float sy,float sz,float r,float g,float b,float rotX){
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,bx,by,bz);
                  Matrix.rotateM(model,0,yaw,0f,1f,0f);
                  Matrix.scaleM(model,0,PLAYER_SCALE,PLAYER_SCALE,PLAYER_SCALE);
                  Matrix.translateM(model,0,localX,localY + sy * 0.5f,localZ);
                  Matrix.rotateM(model,0,rotX,1f,0f,0f);
                  Matrix.translateM(model,0,0f,-sy * 0.5f,0f);
                  Matrix.scaleM(model,0,sx,sy,sz);
                  draw(uM,uMVP,uC,r,g,b,1f);
              }

              private void drawFacePart(int uM,int uMVP,int uC,float bx,float by,float bz,float yaw,
                                        float localX,float localY,float localZ,float sx,float sy,float sz,float r,float g,float b){
                  Matrix.setIdentityM(model,0);
                  Matrix.translateM(model,0,bx,by,bz);
                  Matrix.rotateM(model,0,yaw,0f,1f,0f);
                  Matrix.scaleM(model,0,PLAYER_SCALE,PLAYER_SCALE,PLAYER_SCALE);
                  Matrix.translateM(model,0,localX,localY,localZ);
                  Matrix.scaleM(model,0,sx,sy,sz);
                  draw(uM,uMVP,uC,r,g,b,1f);
              }

              private void draw(int uM,int uMVP,int uC,float r,float g,float b,float a){
                  GLES30.glUniformMatrix4fv(uM,1,false,model,0);
                  float[] pv=new float[16];
                  float[] mvp=new float[16];
                  Matrix.multiplyMM(pv,0,proj,0,view,0);
                  Matrix.multiplyMM(mvp,0,pv,0,model,0);
                  GLES30.glUniformMatrix4fv(uMVP,1,false,mvp,0);
                  GLES30.glUniform4f(uC,r,g,b,a);
                  for(int i=0;i<6;i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }

              private int mkProg(String v,String f){
                  int p=GLES30.glCreateProgram();
                  GLES30.glAttachShader(p,mkSh(GLES30.GL_VERTEX_SHADER,v));
                  GLES30.glAttachShader(p,mkSh(GLES30.GL_FRAGMENT_SHADER,f));
                  GLES30.glLinkProgram(p);
                  return p;
              }

              private int mkSh(int type,String src){
                  int sh=GLES30.glCreateShader(type);
                  GLES30.glShaderSource(sh,src);
                  GLES30.glCompileShader(sh);
                  return sh;
              }
          }
