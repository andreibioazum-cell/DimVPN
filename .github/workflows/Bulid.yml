          cat <<'EOF' > app/src/main/res/layout/item_msg_in.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:paddingTop="2dp" android:paddingBottom="2dp">
              <LinearLayout android:layout_width="wrap_content" android:layout_height="wrap_content" android:background="@drawable/bg_msg_in" android:maxWidth="280dp" android:orientation="horizontal" android:paddingLeft="10dp" android:paddingTop="6dp" android:paddingRight="8dp" android:paddingBottom="6dp">
                  <TextView android:id="@+id/text" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#000" android:textSize="15sp"/>
                  <TextView android:id="@+id/time" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="bottom" android:layout_marginLeft="6dp" android:textColor="#8E8E93" android:textSize="11sp"/>
              </LinearLayout>
          </RelativeLayout>
          EOF

          cat <<'JAVA' > app/src/main/java/com/ttt/app/MainActivity.java
          package com.ttt.app;
          import android.os.Bundle;
          import android.text.*;
          import android.view.*;
          import android.widget.*;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.*;
          import com.google.firebase.database.*;
          import java.text.SimpleDateFormat;
          import java.util.*;
          public class MainActivity extends AppCompatActivity {
              FrameLayout root;
              DatabaseReference db;
              String uid,uname;
              Map<String,User> users=new HashMap<>();
              Map<String,Chat> chats=new HashMap<>();
              List<Message> msgs=new ArrayList<>();
              RecyclerView.Adapter<?> chatAd,msgAd,userAd;
              String curChatId="",curUserId="";
              int[] avBg={R.drawable.bg_avatar,R.drawable.bg_avatar_g,R.drawable.bg_avatar_o,R.drawable.bg_avatar_p};
              
              @Override protected void onCreate(Bundle b){
                  super.onCreate(b);
                  setContentView(R.layout.activity_main);
                  root=findViewById(R.id.container);
                  db=FirebaseDatabase.getInstance().getReference();
                  uid=UUID.randomUUID().toString().substring(0,8);
                  showLogin();
              }
              
              void showLogin(){
                  View v=LayoutInflater.from(this).inflate(R.layout.screen_login,root,false);
                  root.removeAllViews();root.addView(v);
                  EditText inp=v.findViewById(R.id.input_name);
                  v.findViewById(R.id.btn_start).setOnClickListener(x->{
                      uname=inp.getText().toString().trim();
                      if(!uname.isEmpty()){
                          db.child("users").child(uid).child("name").setValue(uname);
                          db.child("users").child(uid).child("online").setValue(true);
                          db.child("users").child(uid).child("last").setValue(System.currentTimeMillis());
                          showChats();
                      }else toast("Enter name");
                  });
              }
              
              void showChats(){
                  View v=LayoutInflater.from(this).inflate(R.layout.screen_chats,root,false);
                  root.removeAllViews();root.addView(v);
                  RecyclerView rv=v.findViewById(R.id.list);
                  rv.setLayoutManager(new LinearLayoutManager(this));
                  chatAd=new RecyclerView.Adapter<VH>(){
                      List<String> keys=new ArrayList<>();
                      @Override public VH onCreateViewHolder(ViewGroup p,int t){return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_chat,p,false));}
                      @Override public void onBindViewHolder(VH h,int i){
                          String k=keys.get(i);Chat c=chats.get(k);if(c==null)return;
                          String otherId=c.u1.equals(uid)?c.u2:c.u1;
                          User u=users.get(otherId);
                          if(u==null)return;
                          ((TextView)h.v.findViewById(R.id.name)).setText(u.name);
                          ((TextView)h.v.findViewById(R.id.msg)).setText(c.lastMsg);
                          ((TextView)h.v.findViewById(R.id.time)).setText(fmt(c.lastTime));
                          TextView av=h.v.findViewById(R.id.avatar);
                          av.setText(u.name.substring(0,1).toUpperCase());
                          av.setBackgroundResource(avBg[Math.abs(otherId.hashCode())%4]);
                          h.v.findViewById(R.id.online).setVisibility(u.online?View.VISIBLE:View.GONE);
                          TextView bd=h.v.findViewById(R.id.badge);
                          if(c.unread>0){bd.setVisibility(View.VISIBLE);bd.setText(String.valueOf(c.unread));}else bd.setVisibility(View.GONE);
                          h.v.setOnClickListener(x->openChat(k,otherId));
                      }
                      @Override public int getItemCount(){keys.clear();keys.addAll(chats.keySet());Collections.sort(keys,(a,b)->Long.compare(chats.get(b).lastTime,chats.get(a).lastTime));return keys.size();}
                  };
                  rv.setAdapter(chatAd);
                  v.findViewById(R.id.fab).setOnClickListener(x->showUsers());
                  listenUsers();
                  listenChats();
              }
              
              void listenUsers(){
                  db.child("users").addValueEventListener(new ValueEventListener(){
                      @Override public void onDataChange(@NonNull DataSnapshot s){
                          users.clear();
                          for(DataSnapshot d:s.getChildren()){
                              String id=d.getKey();
                              User u=new User();
                              u.name=d.child("name").getValue(String.class);
                              u.online=Boolean.TRUE.equals(d.child("online").getValue(Boolean.class));
                              u.last=d.child("last").getValue(Long.class);
                              if(u.name!=null)users.put(id,u);
                          }
                          if(chatAd!=null)chatAd.notifyDataSetChanged();
                          if(userAd!=null)userAd.notifyDataSetChanged();
                      }
                      @Override public void onCancelled(@NonNull DatabaseError e){}
                  });
              }
              
              void listenChats(){
                  db.child("chats").orderByChild("users/"+uid).equalTo(true).addValueEventListener(new ValueEventListener(){
                      @Override public void onDataChange(@NonNull DataSnapshot s){
                          chats.clear();
                          for(DataSnapshot d:s.getChildren()){
                              String id=d.getKey();Chat c=new Chat();
                              c.u1=d.child("u1").getValue(String.class);
                              c.u2=d.child("u2").getValue(String.class);
                              c.lastMsg=d.child("lastMsg").getValue(String.class);
                              Long lt=d.child("lastTime").getValue(Long.class);
                              c.lastTime=lt!=null?lt:0;
                              Long ur=d.child("unread").child(uid).getValue(Long.class);
                              c.unread=ur!=null?ur.intValue():0;
                              if(c.u1!=null&&c.u2!=null)chats.put(id,c);
                          }
                          if(chatAd!=null)chatAd.notifyDataSetChanged();
                      }
                      @Override public void onCancelled(@NonNull DatabaseError e){}
                  });
              }
              
              void showUsers(){
                  View v=LayoutInflater.from(this).inflate(R.layout.screen_users,root,false);
                  root.removeAllViews();root.addView(v);
                  v.findViewById(R.id.btn_back).setOnClickListener(x->showChats());
                  RecyclerView rv=v.findViewById(R.id.users_list);
                  rv.setLayoutManager(new LinearLayoutManager(this));
                  userAd=new RecyclerView.Adapter<VH>(){
                      List<String> keys=new ArrayList<>();
                      @Override public VH onCreateViewHolder(ViewGroup p,int t){return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_user,p,false));}
                      @Override public void onBindViewHolder(VH h,int i){
                          String k=keys.get(i);User u=users.get(k);
                          if(u==null)return;
                          ((TextView)h.v.findViewById(R.id.name)).setText(u.name);
                          TextView av=h.v.findViewById(R.id.avatar);
                          av.setText(u.name.substring(0,1).toUpperCase());
                          av.setBackgroundResource(avBg[Math.abs(k.hashCode())%4]);
                          TextView st=h.v.findViewById(R.id.status);
                          if(u.online){st.setText("online");st.setVisibility(View.VISIBLE);}else st.setVisibility(View.GONE);
                          h.v.setOnClickListener(x->startChat(k));
                      }
                      @Override public int getItemCount(){keys.clear();for(String k:users.keySet())if(!k.equals(uid))keys.add(k);Collections.sort(keys,(a,b)->users.get(b).name.compareToIgnoreCase(users.get(a).name));return keys.size();}
                  };
                  rv.setAdapter(userAd);
              }
              
              void startChat(String otherId){
                  String[] ids={uid,otherId};Arrays.sort(ids);
                  String chatId=ids[0]+"_"+ids[1];
                  db.child("chats").child(chatId).child("u1").setValue(ids[0]);
                  db.child("chats").child(chatId).child("u2").setValue(ids[1]);
                  db.child("chats").child(chatId).child("users").child(uid).setValue(true);
                  db.child("chats").child(chatId).child("users").child(otherId).setValue(true);
                  openChat(chatId,otherId);
              }
              
              void openChat(String chatId,String otherId){
                  curChatId=chatId;curUserId=otherId;
                  db.child("chats").child(chatId).child("unread").child(uid).setValue(0);
                  msgs.clear();
                  View v=LayoutInflater.from(this).inflate(R.layout.screen_chat,root,false);
                  root.removeAllViews();root.addView(v);
                  User u=users.get(otherId);
                  if(u!=null){
                      ((TextView)v.findViewById(R.id.t_name)).setText(u.name);
                      TextView st=v.findViewById(R.id.t_status);
                      st.setText(u.online?"online":"last seen "+fmt(u.last));
                      TextView av=v.findViewById(R.id.av);
                      av.setText(u.name.substring(0,1).toUpperCase());
                      av.setBackgroundResource(avBg[Math.abs(otherId.hashCode())%4]);
                  }
                  v.findViewById(R.id.btn_back).setOnClickListener(x->{curChatId="";showChats();});
                  RecyclerView mrv=v.findViewById(R.id.msgs);
                  LinearLayoutManager lm=new LinearLayoutManager(this);lm.setStackFromEnd(true);
                  mrv.setLayoutManager(lm);
                  msgAd=new RecyclerView.Adapter<VH>(){
                      @Override public int getItemViewType(int p){return msgs.get(p).from.equals(uid)?1:0;}
                      @Override public VH onCreateViewHolder(ViewGroup p,int t){return new VH(LayoutInflater.from(p.getContext()).inflate(t==1?R.layout.item_msg_out:R.layout.item_msg_in,p,false));}
                      @Override public void onBindViewHolder(VH h,int p){
                          Message m=msgs.get(p);
                          ((TextView)h.v.findViewById(R.id.text)).setText(m.text);
                          ((TextView)h.v.findViewById(R.id.time)).setText(fmt(m.time));
                      }
                      @Override public int getItemCount(){return msgs.size();}
                  };
                  mrv.setAdapter(msgAd);
                  EditText inp=v.findViewById(R.id.input);
                  v.findViewById(R.id.btn_send).setOnClickListener(x->{
                      String txt=inp.getText().toString().trim();
                      if(!txt.isEmpty()){
                          long now=System.currentTimeMillis();
                          String mid=UUID.randomUUID().toString();
                          db.child("messages").child(chatId).child(mid).child("from").setValue(uid);
                          db.child("messages").child(chatId).child(mid).child("text").setValue(txt);
                          db.child("messages").child(chatId).child(mid).child("time").setValue(now);
                          db.child("chats").child(chatId).child("lastMsg").setValue(txt);
                          db.child("chats").child(chatId).child("lastTime").setValue(now);
                          db.child("chats").child(chatId).child("unread").child(otherId).setValue(ServerValue.increment(1));
                          inp.setText("");
                      }
                  });
                  listenMessages(chatId,mrv);
              }
              
              void listenMessages(String chatId,RecyclerView rv){
                  db.child("messages").child(chatId).orderByChild("time").addValueEventListener(new ValueEventListener(){
                      @Override public void onDataChange(@NonNull DataSnapshot s){
                          msgs.clear();
                          for(DataSnapshot d:s.getChildren()){
                              Message m=new Message();
                              m.from=d.child("from").getValue(String.class);
                              m.text=d.child("text").getValue(String.class);
                              Long t=d.child("time").getValue(Long.class);
                              m.time=t!=null?t:0;
                              if(m.from!=null&&m.text!=null)msgs.add(m);
                          }
                          if(msgAd!=null){msgAd.notifyDataSetChanged();rv.scrollToPosition(msgs.size()-1);}
                      }
                      @Override public void onCancelled(@NonNull DatabaseError e){}
                  });
              }
              
              String fmt(long t){
                  long d=(System.currentTimeMillis()-t)/1000;
                  if(d<60)return "now";
                  if(d<3600)return (d/60)+"m";
                  if(d<86400)return new SimpleDateFormat("HH:mm",Locale.getDefault()).format(new Date(t));
                  return new SimpleDateFormat("dd MMM",Locale.getDefault()).format(new Date(t));
              }
              
              void toast(String s){Toast.makeText(this,s,Toast.LENGTH_SHORT).show();}
              
              @Override public void onBackPressed(){
                  if(!curChatId.isEmpty()){curChatId="";showChats();}
                  else super.onBackPressed();
              }
              
              @Override protected void onDestroy(){
                  super.onDestroy();
                  if(uid!=null)db.child("users").child(uid).child("online").setValue(false);
              }
              
              class VH extends RecyclerView.ViewHolder{View v;VH(View x){super(x);v=x;}}
              class User{String name;boolean online;Long last;}
              class Chat{String u1,u2,lastMsg;long lastTime;int unread;}
              class Message{String from,text;long time;}
          }
          JAVA

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="Telegram" android:theme="@style/AppTheme" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true" android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TelegramFirebase
          path: app/build/outputs/apk/debug/app-debug.apk
