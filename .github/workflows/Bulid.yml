name: TelegramFirebase
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/ttt/app
          mkdir -p app/src/main/res/{layout,values,drawable}

          cat <<'EOF' > app/google-services.json
          {
            "project_info": {
              "project_number": "471748069314",
              "firebase_url": "https://t-t-t-9865c-default-rtdb.firebaseio.com",
              "project_id": "t-t-t-9865c",
              "storage_bucket": "t-t-t-9865c.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:471748069314:android:bb2d46ce73a3a55e52785b",
                  "android_client_info": {
                    "package_name": "com.ttt.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyBsIVnBF838b0HyabxSJQpOj2dnfxNmg6o"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google(); mavenCentral() }
          }
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath 'com.google.gms:google-services:4.4.0'
              }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { 
              id 'com.android.application'
              id 'com.google.gms.google-services'
          }
          android {
              namespace 'com.ttt.app'
              compileSdk 34
              defaultConfig { 
                  applicationId 'com.ttt.app'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.recyclerview:recyclerview:1.3.2'
              implementation platform('com.google.firebase:firebase-bom:32.7.0')
              implementation 'com.google.firebase:firebase-database'
