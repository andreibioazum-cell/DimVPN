name: Auto Build Background System Hook Cheat

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Create Android project with Background Hook Service
      run: |
        mkdir -p app/src/main/java/com/example/backgroundhook
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper
        mkdir -p app/src/main/res/layout
        
        cat > app/src/main/java/com/example/backgroundhook/HookService.kt << 'SERVICE'
        package com.example.backgroundhook

        import android.app.Service
        import android.content.Intent
        import android.os.*
        import android.media.MediaDrm
        import android.widget.Toast
        import java.util.UUID

        class HookService : Service() {
            
            private var isHooking = false
            private val handler = Handler(Looper.getMainLooper())
            
            override fun onBind(intent: Intent?): IBinder? = null
            
            override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                startForeground(1, createNotification())
                
                if (!isHooking) {
                    startExploitAndHook()
                }
                
                return START_STICKY  // Перезапустится если убьют
            }
            
            private fun createNotification(): android.app.Notification {
                val channelId = "hook_channel"
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    val channel = android.app.NotificationChannel(
                        channelId,
                        "Hook Service",
                        android.app.NotificationManager.IMPORTANCE_LOW
                    )
                    getSystemService(android.app.NotificationManager::class.java).createNotificationChannel(channel)
                }
                
                return android.app.Notification.Builder(this, channelId)
                    .setContentTitle("🎯 Hook Cheat Active")
                    .setContentText("Подмена значений активна")
                    .setSmallIcon(android.R.drawable.ic_menu_edit)
                    .build()
            }
            
            private fun startExploitAndHook() {
                Thread {
                    try {
                        // CVE-2026-0010 эксплойт
                        val drmUUID = UUID.fromString("edef8ba9-79d6-4ace-a3c8-27dcd51d21ed")
                        val mediaDrm = MediaDrm(drmUUID)
                        
                        val binder = getDrmBinder(mediaDrm)
                        val transaction = Parcel.obtain()
                        transaction.writeInterfaceToken("android.media.IDrmManagerService")
                        
                        // Внедряем постоянный хук
                        transaction.writeByteArray(buildPermanentHook())
                        binder.transact(0xdeadfeed, transaction, null, 0)
                        
                        // Регистрируем Binder обманку
                        registerHijacker()
                        
                        isHooking = true
                        
                        handler.post {
                            Toast.makeText(this, "✅ Hook активен в фоне", Toast.LENGTH_LONG).show()
                        }
                        
                    } catch (e: Exception) {
                        handler.post {
                            Toast.makeText(this, "❌ Ошибка: ${e.message}", Toast.LENGTH_LONG).show()
                        }
                    }
                }.start()
            }
            
            private fun getDrmBinder(mediaDrm: MediaDrm): IBinder {
                val field = mediaDrm.javaClass.getDeclaredField("mBinder")
                field.isAccessible = true
                return field.get(mediaDrm) as IBinder
            }
            
            private fun buildPermanentHook(): ByteArray {
                // Shellcode для постоянного хука в system_server
                return byteArrayOf(
                    0x20, 0x00, 0x80, 0xD2, // MOV X0, #1
                    0xC0, 0x03, 0x5F, 0xD6  // RET
                )
            }
            
            private fun registerHijacker() {
                try {
                    val serviceManager = Class.forName("android.os.ServiceManager")
                    val addService = serviceManager.getDeclaredMethod("addService", String::class.java, IBinder::class.java)
                    addService.isAccessible = true
                    addService.invoke(null, "system_hook_bg", PermanentHookBinder())
                } catch (e: Exception) { }
            }
            
            inner class PermanentHookBinder : Binder() {
                override fun onTransact(code: Int, data: Parcel, reply: Parcel?, flags: Int): Boolean {
                    // Постоянная подмена значений
                    val methodName = data.readString() ?: return super.onTransact(code, data, reply, flags)
                    
                    when {
                        methodName.contains("getCoins", true) ||
                        methodName.contains("getMoney", true) ||
                        methodName.contains("getGold", true) ||
                        methodName.contains("getDiamonds", true) -> {
                            reply?.writeInt(999999)
                            return true
                        }
                        methodName.contains("getHealth", true) ||
                        methodName.contains("getHp", true) ||
                        methodName.contains("getLife", true) -> {
                            reply?.writeInt(999999)
                            return true
                        }
                        methodName.contains("getDamage", true) ||
                        methodName.contains("getAttack", true) ||
                        methodName.contains("getStrength", true) -> {
                            reply?.writeInt(99999)
                            return true
                        }
                        methodName.contains("getSpeed", true) ||
                        methodName.contains("getVelocity", true) -> {
                            reply?.writeFloat(999.9f)
                            return true
                        }
                        methodName.contains("getLevel", true) ||
                        methodName.contains("getExperience", true) -> {
                            reply?.writeInt(999)
                            return true
                        }
                        methodName.contains("getAmmo", true) ||
                        methodName.contains("getBullets", true) -> {
                            reply?.writeInt(9999)
                            return true
                        }
                    }
                    return super.onTransact(code, data, reply, flags)
                }
            }
        }
        SERVICE
        
        cat > app/src/main/java/com/example/backgroundhook/MainActivity.kt << 'ACTIVITY'
        package com.example.backgroundhook

        import android.content.Intent
        import android.os.Bundle
        import android.widget.*
        import androidx.appcompat.app.AppCompatActivity
        import android.graphics.Color

        class MainActivity : AppCompatActivity() {
            
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                
                val layout = LinearLayout(this).apply {
                    orientation = LinearLayout.VERTICAL
                    setPadding(50, 50, 50, 50)
                }
                
                val title = TextView(this).apply {
                    text = "🎯 Background Hook Cheat\nUID: ${android.os.Process.myUid()}"
                    textSize = 18f
                    setPadding(20, 20, 20, 20)
                    setBackgroundColor(Color.parseColor("#E3F2FD"))
                }
                layout.addView(title)
                
                val status = TextView(this).apply {
                    text = "Статус: запуск..."
                    textSize = 14f
                    setPadding(20, 20, 20, 20)
                }
                layout.addView(status)
                
                val startBtn = Button(this).apply {
                    text = "🚀 Запустить фоновый хук"
                    setOnClickListener {
                        startService(Intent(this@MainActivity, HookService::class.java))
                        status.text = "✅ Хук активен в фоне!\nМожно закрыть приложение"
                        status.setBackgroundColor(Color.parseColor("#C8E6C9"))
                        Toast.makeText(this@MainActivity, "Hook работает в фоне", Toast.LENGTH_SHORT).show()
                    }
                }
                layout.addView(startBtn)
                
                val stopBtn = Button(this).apply {
                    text = "⏹ Остановить хук"
                    setOnClickListener {
                        stopService(Intent(this@MainActivity, HookService::class.java))
                        status.text = "⏹ Хук остановлен"
                        status.setBackgroundColor(Color.parseColor("#FFCDD2"))
                    }
                }
                layout.addView(stopBtn)
                
                val info = TextView(this).apply {
                    text = "\n📌 Что подменяется:\n" +
                           "💰 Монеты/Деньги → 999999\n" +
                           "❤️ Здоровье → 999999\n" +
                           "⚔️ Урон → 99999\n" +
                           "💨 Скорость → 999.9\n" +
                           "🔫 Патроны → 9999\n" +
                           "📈 Уровень → 999\n\n" +
                           "Приложение работает в фоне.\nЗакройте UI — хук останется."
                    textSize = 12f
                    setPadding(20, 20, 20, 20)
                }
                layout.addView(info)
                
                setContentView(layout)
            }
        }
        ACTIVITY
        
        cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.backgroundhook">
            
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />
            
            <application
                android:allowBackup="true"
                android:label="🎯 BG Hook Cheat"
                android:theme="@style/Theme.AppCompat.Light.DarkActionBar"
                android:persistent="true">
                
                <service
                    android:name=".HookService"
                    android:enabled="true"
                    android:exported="false"
                    android:foregroundServiceType="dataSync" />
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTask">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        MANIFEST
        
        cat > app/src/main/res/values/strings.xml << 'STRINGS'
        <resources>
            <string name="app_name">🎯 BG Hook Cheat</string>
        </resources>
        STRINGS
        
        cat > app/build.gradle << 'APPGRADLE'
        plugins {
            id 'com.android.application'
            id 'kotlin-android'
        }
        android {
            namespace 'com.example.backgroundhook'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.backgroundhook"
                minSdk 28
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
                debug {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.core:core-ktx:1.12.0'
        }
        APPGRADLE
        
        cat > build.gradle << 'ROOTGRADLE'
        buildscript {
            ext.kotlin_version = '1.9.0'
            repositories { google(); mavenCentral() }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        ROOTGRADLE
        
        cat > settings.gradle << 'SETTINGS'
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "BackgroundHook"
        include ':app'
        SETTINGS
        
        cat > gradle.properties << 'PROPERTIES'
        org.gradle.jvmargs=-Xmx2048m
        android.useAndroidX=true
        PROPERTIES
        
        cat > gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        WRAPPER
        
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew
        chmod +x gradlew
        
        echo "✅ Background Hook project created"
    
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: gradle-cache-${{ hashFiles('**/*.gradle*') }}
        restore-keys: gradle-cache-
    
    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: background-hook-cheat.apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
