              @Override public GameRenderer renderer(){return ren;}
              @Override public void toast(String t){runOnUiThread(()->Toast.makeText(this,t,Toast.LENGTH_SHORT).show());}

              @Override
              public void runBlockScript(Block block,String script){
                  runOnUiThread(()->{
                      int old=ren.selectedIndex,idx=ren.blocks.indexOf(block);
                      if(idx>=0)ren.selectedIndex=idx;
                      try{ScriptEngine.run(this,script);}catch(Exception e){Toast.makeText(this,e.getMessage(),Toast.LENGTH_LONG).show();}
                      ren.selectedIndex=old;updAxis();
                  });
              }

              private boolean getOwned(int pack){if(pack==1)return ownedFly;if(pack==2)return ownedCombat;if(pack==3)return ownedDance;return true;}
              private void setOwned(int pack,boolean v){if(pack==1)ownedFly=v;else if(pack==2)ownedCombat=v;else if(pack==3)ownedDance=v;}

              private void buyOrEquip(int pack,String name){
                  if(getOwned(pack)){equippedPack=pack;applyPack();savePrefs();updCustPacks();Toast.makeText(this,name+" equipped",Toast.LENGTH_SHORT).show();}
                  else if(ridix>=PACK_PRICE){ridix-=PACK_PRICE;setOwned(pack,true);equippedPack=pack;applyPack();savePrefs();updRidix();updCustPacks();Toast.makeText(this,name+" purchased!",Toast.LENGTH_SHORT).show();}
                  else Toast.makeText(this,"Need "+PACK_PRICE+" Ridix",Toast.LENGTH_SHORT).show();
              }

              interface CP{void pick(int i);}

              @SuppressLint("ClickableViewAccessibility")
