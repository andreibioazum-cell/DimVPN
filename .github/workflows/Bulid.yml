name: L-OS_Final_CrossCompile_Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Project Files
        run: |
          mkdir -p src qml/apps
          
          # 1. ЯДРО (C++)
          cat <<EOF > src/core.h
          #ifndef CORE_H
          #define CORE_H
          #include <QObject>
          #include <QUdpSocket>
          #include <QNetworkDatagram>
          #include <QRandomGenerator>

          class LOS_Core : public QObject {
              Q_OBJECT
          public:
              QString myNodeID;
              explicit LOS_Core(QObject *parent = nullptr) : QObject(parent) {
                  myNodeID = QString::number(QRandomGenerator::global()->generate() % 1000);
                  udp = new QUdpSocket(this);
                  udp->bind(QHostAddress::Any, 10001, QUdpSocket::ShareAddress);
                  connect(udp, &QUdpSocket::readyRead, this, &LOS_Core::handleMeshTraffic);
              }

              Q_INVOKABLE void broadcastData(QString type, QString payload) {
                  QString raw = QString("%1|%2|ALL|0|%3").arg(type).arg(myNodeID).arg(payload);
                  QByteArray packet = raw.toUtf8();
                  for(int i=0; i<packet.size(); i++) packet[i] = packet[i] ^ 0xAF;
                  udp->writeDatagram(packet, QHostAddress::Broadcast, 10001);
              }

              void handleMeshTraffic() {
                  while (udp->hasPendingDatagrams()) {
                      QNetworkDatagram dg = udp->receiveDatagram();
                      QByteArray packet = dg.data();
                      for(int i=0; i<packet.size(); i++) packet[i] = packet[i] ^ 0xAF;
                      QStringList parts = QString(packet).split("|");
                      if(parts.size() >= 5 && parts[1] != myNodeID) {
                          if(parts[0] == "DRAW") emit remoteDrawReceived(parts[4]);
                      }
                  }
              }

          signals:
              void remoteDrawReceived(QString data);
          private:
              QUdpSocket *udp;
          };
          #endif
          EOF

          cat <<EOF > src/main.cpp
          #include <QGuiApplication>
          #include <QQmlApplicationEngine>
          #include <QQmlContext>
          #include "core.h"

          int main(int argc, char *argv[]) {
              QGuiApplication app(argc, argv);
              QQmlApplicationEngine engine;
              LOS_Core core;
              engine.rootContext()->setContextProperty("OS", &core);
              engine.load(QUrl(QStringLiteral("qrc:/qt/qml/Main.qml")));
              return app.exec();
          }
          EOF

          # 2. ИНТЕРФЕЙС (QML)
          cat <<EOF > qml/Main.qml
          import QtQuick
          import QtQuick.Controls
          ApplicationWindow {
              id: window; visible: true; width: 360; height: 720
              property string currentApp: "Home"
              Rectangle { anchors.fill: parent; color: "#000" }
              Loader { id: mainLoader; anchors.fill: parent; source: currentApp == "Home" ? "Launcher.qml" : "apps/" + currentApp + ".qml" }
              Rectangle {
                  id: curtain; z: 100; width: parent.width; height: 80; y: -50; color: "#111"; border.color: "#0f0"
                  Text { text: "L-OS MESH ID: " + (OS ? OS.myNodeID : "..."); color: "#0f0"; anchors.centerIn: parent }
                  MouseArea { anchors.fill: parent; onClicked: curtain.y = (curtain.y == 0 ? -50 : 0) }
              }
          }
          EOF

          cat <<EOF > qml/Launcher.qml
          import QtQuick
          import QtQuick.Controls
          GridView {
              anchors.fill: parent; anchors.topMargin: 50; cellWidth: 120; cellHeight: 120
              model: ListModel { ListElement { n: "L-Paint"; i: "🎨"; c: "LPaint" } }
              delegate: Button { 
                  width: 100; height: 100; text: model.i + "\n" + model.n
                  onClicked: window.currentApp = model.c 
              }
          }
          EOF

          cat <<EOF > qml/apps/LPaint.qml
          import QtQuick
          Rectangle {
              color: "#000"
              Canvas {
                  id: canvas; anchors.fill: parent
                  function draw(x, y, isNew) {
                      var ctx = getContext("2d"); if(isNew) ctx.beginPath();
                      ctx.strokeStyle = "#0f0"; ctx.lineWidth = 3; ctx.lineTo(x, y); ctx.stroke();
                      requestPaint();
                  }
              }
              MouseArea {
                  anchors.fill: parent
                  onPositionChanged: { canvas.draw(mouse.x, mouse.y, false); OS.broadcastData("DRAW", mouse.x + "," + mouse.y); }
              }
              Connections { target: OS; onRemoteDrawReceived: (d) => { let p=d.split(","); canvas.draw(p[0],p[1],false); } }
          }
          EOF

          # 3. CMAKE (Добавили AUTOMOC)
          cat <<EOF > CMakeLists.txt
          cmake_minimum_required(VERSION 3.21)
          project(L-OS LANGUAGES CXX)
          set(CMAKE_AUTOMOC ON)
          find_package(Qt6 REQUIRED COMPONENTS Core Gui Qml Quick Network)
          qt_add_executable(L-OS src/main.cpp src/core.h)
          qt_add_qml_module(L-OS
              URI VirtualOS
              VERSION 1.0
              QML_FILES qml/Main.qml qml/Launcher.qml qml/apps/LPaint.qml
          )
          target_link_libraries(L-OS PRIVATE Qt6::Core Qt6::Gui Qt6::Qml Qt6::Quick Qt6::Network)
          EOF

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev python3-pip ninja-build
          python3 -m pip install aqtinstall

      - name: Install Qt (Desktop & Android)
        run: |
          python3 -m aqt install-qt linux desktop 6.7.2 linux_gcc_64 --outputdir ${{ github.workspace }}/Qt
          python3 -m aqt install-qt linux android 6.7.2 android_arm64_v8a --outputdir ${{ github.workspace }}/Qt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          mkdir build && cd build
          export QT_DIR=${{ github.workspace }}/Qt/6.7.2
          # Форсируем использование SDK 33 и NDK 25 для стабильности
          export ANDROID_NDK_PATH=${ANDROID_SDK_ROOT}/ndk/25.2.9519653
          
          $QT_DIR/android_arm64_v8a/bin/qt-cmake .. \
            -G Ninja \
            -DQT_HOST_PATH=$QT_DIR/gcc_64 \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_PATH \
            -DQT_ANDROID_API_VERSION=33 \
            -DQT_ANDROID_BUILD_ALL_ABIS=OFF
          
          ninja apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: L-OS-Final-Fixed-APK
          path: build/android-build/*.apk
