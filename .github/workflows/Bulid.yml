name: TinyOS Simple
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm qemu-system-x86

      - name: Build Kernel
        run: |
          cat > kernel.asm << 'KERNEL'
          [bits 32]
          [org 0x10000]
          
          start:
              mov ax, 0x0013
              int 0x10
              
              mov esi, msg
              call print
              mov esi, prompt
              call print
          
          main:
              xor ax, ax
              int 0x16
              
              cmp al, '1'
              je app1
              cmp al, '2'
              je app2
              cmp al, 'c'
              je clear
              cmp al, 'h'
              je help
              
              mov esi, unknown
              call print
              jmp main
          
          help:
              mov esi, help_msg
              call print
              jmp main
          
          clear:
              mov ax, 0x0003
              int 0x10
              mov ax, 0x0013
              int 0x10
              mov esi, prompt
              call print
              jmp main
          
          app1:
              call clear
              mov esi, clock_msg
              call print
              mov dword [count], 0
          clock:
              call delay
              inc dword [count]
              
              mov ax, 0x1301
              mov bx, 0x000F
              mov cx, 10
              mov dx, 0x0A05
              push ds
              pop es
              mov bp, tick_msg
              int 0x10
              
              mov eax, [count]
              call print_num
              
              xor ax, ax
              int 0x16
              cmp al, 'q'
              je back
              jmp clock
          
          app2:
              call clear
              mov esi, paint_msg
              call print
              mov byte [px], 160
              mov byte [py], 100
              mov byte [pcol], 15
          paint:
              xor ax, ax
              int 0x16
              
              cmp al, 'w'
              je p_up
              cmp al, 's'
              je p_down
              cmp al, 'a'
              je p_left
              cmp al, 'd'
              je p_right
              cmp al, 'c'
              je p_col
              cmp al, 'q'
              je back
              
              call draw
              jmp paint
          
          p_up:
              dec byte [py]
              jmp paint
          p_down:
              inc byte [py]
              jmp paint
          p_left:
              dec byte [px]
              jmp paint
          p_right:
              inc byte [px]
              jmp paint
          p_col:
              inc byte [pcol]
              jmp paint
          
          draw:
              pusha
              mov al, [pcol]
              mov ah, [py]
              mov bh, 320
              mul bh
              add al, [px]
              adc ah, 0
              mov bx, ax
              mov byte [0xA0000 + bx], al
              popa
              ret
          
          back:
              mov ax, 0x0013
              int 0x10
              mov esi, prompt
              call print
              jmp main
          
          print_num:
              pusha
              mov ecx, 10
              xor ebx, ebx
          .div:
              xor edx, edx
              div ecx
              push dx
              inc ebx
              test eax, eax
              jnz .div
          .pr:
              pop ax
              add al, '0'
              mov ah, 0x0E
              int 0x10
              dec ebx
              jnz .pr
              popa
              ret
          
          delay:
              push ecx
              mov ecx, 0xFFFFF
          .wait:
              dec ecx
              jnz .wait
              pop ecx
              ret
          
          print:
              lodsb
              or al, al
              jz .done
              mov ah, 0x0E
              int 0x10
              jmp print
          .done:
              ret
          
          msg db 'TinyOS v1.0', 13, 10, 0
          prompt db 13,10,'> ',0
          unknown db '?',13,10,0
          help_msg db '1=clock 2=paint c=clear h=help',13,10,0
          clock_msg db 'CLOCK - Q=quit',13,10,0
          paint_msg db 'PAINT - WASD C Q',13,10,0
          tick_msg db 'Tick: ',0
          
          count dd 0
          px db 160
          py db 100
          pcol db 15
          
          times 5120-($-$$) db 0
          KERNEL

      - name: Build
        run: |
          nasm -f bin kernel.asm -o tinyos.bin
          truncate -s 1474560 tinyos.bin

      - name: Test
        run: |
          timeout 8 qemu-system-x86_64 -drive format=raw,file=tinyos.bin -nographic -no-reboot 2>/dev/null || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TinyOS
          path: tinyos.bin
