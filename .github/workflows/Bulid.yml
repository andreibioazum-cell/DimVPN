          cat <<'JAVA' > app/src/main/java/com/gamescript/pro/MainActivity.java
          package com.gamescript.pro;

          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.fragment.app.Fragment;
          import com.google.android.material.tabs.TabLayout;

          public class MainActivity extends AppCompatActivity {
              EditorFragment editorFrag;
              FilesFragment filesFrag;
              GameFragment gameFrag;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  editorFrag = new EditorFragment();
                  filesFrag = new FilesFragment();
                  gameFrag = new GameFragment();

                  getSupportFragmentManager().beginTransaction()
                      .replace(R.id.container, editorFrag)
                      .commit();

                  TabLayout tabs = findViewById(R.id.tabs);
                  tabs.addTab(tabs.newTab().setText("📝 Editor"));
                  tabs.addTab(tabs.newTab().setText("📁 Files"));
                  tabs.addTab(tabs.newTab().setText("🎮 Game"));

                  tabs.addOnTabSelectedListener(new TabLayout.OnTabSelectedListener() {
                      @Override
                      public void onTabSelected(TabLayout.Tab tab) {
                          Fragment frag = null;
                          switch (tab.getPosition()) {
                              case 0: frag = editorFrag; break;
                              case 1: frag = filesFrag; break;
                              case 2: frag = gameFrag; break;
                          }
                          if (frag != null) {
                              getSupportFragmentManager().beginTransaction()
                                  .replace(R.id.container, frag)
                                  .commit();
                          }
                      }
                      @Override public void onTabUnselected(TabLayout.Tab tab) {}
                      @Override public void onTabReselected(TabLayout.Tab tab) {}
                  });
              }

              public FilesFragment getFilesFragment() {
                  return filesFrag;
              }

              public GameFragment getGameFragment() {
                  return gameFrag;
              }
          }
          JAVA

          cat <<'JAVA' > app/src/main/java/com/gamescript/pro/EditorFragment.java
          package com.gamescript.pro;

          import android.os.Bundle;
          import android.text.*;
          import android.view.*;
          import android.widget.*;
          import androidx.fragment.app.Fragment;
          import java.io.*;
          import java.util.*;

          public class EditorFragment extends Fragment {
              EditText codeEditor;
              TextView console, lineNumbers;
              Spinner fileSpinner;
              List<CodeFile> files = new ArrayList<>();
              int currentFileIndex = 0;

              @Override
              public View onCreateView(LayoutInflater inflater, ViewGroup container, Bundle savedInstanceState) {
                  View v = inflater.inflate(R.layout.fragment_editor, container, false);

                  codeEditor = v.findViewById(R.id.codeEditor);
                  console = v.findViewById(R.id.console);
                  lineNumbers = v.findViewById(R.id.lineNumbers);
                  fileSpinner = v.findViewById(R.id.fileSpinner);

                  // Default file
                  files.add(new CodeFile("main.gs", getDefaultCode()));
                  updateFileSpinner();

                  codeEditor.setText(files.get(0).content);

                  codeEditor.addTextChangedListener(new TextWatcher() {
                      @Override
                      public void beforeTextChanged(CharSequence s, int start, int count, int after) {}
                      @Override
                      public void onTextChanged(CharSequence s, int start, int before, int count) {
                          updateLineNumbers();
                          syntaxHighlight();
                      }
                      @Override
                      public void afterTextChanged(Editable s) {}
                  });

                  v.findViewById(R.id.btnNew).setOnClickListener(x -> newFile());
                  v.findViewById(R.id.btnSave).setOnClickListener(x -> saveFile());
                  v.findViewById(R.id.btnRun).setOnClickListener(x -> runCode());

                  setupCodeButtons(v);

                  fileSpinner.setOnItemSelectedListener(new AdapterView.OnItemSelectedListener() {
                      @Override
                      public void onItemSelected(AdapterView<?> parent, View view, int position, long id) {
                          if (currentFileIndex < files.size()) {
                              files.get(currentFileIndex).content = codeEditor.getText().toString();
                          }
                          currentFileIndex = position;
                          codeEditor.setText(files.get(position).content);
                      }
                      @Override public void onNothingSelected(AdapterView<?> parent) {}
                  });

                  updateLineNumbers();
                  return v;
              }

              void setupCodeButtons(View v) {
                  v.findViewById(R.id.btn_if).setOnClickListener(x -> insertCode("if condition:\n    "));
                  v.findViewById(R.id.btn_for).setOnClickListener(x -> insertCode("for i in range(10):\n    "));
                  v.findViewById(R.id.btn_while).setOnClickListener(x -> insertCode("while True:\n    "));
                  v.findViewById(R.id.btn_def).setOnClickListener(x -> insertCode("def function():\n    "));
                  v.findViewById(R.id.btn_class).setOnClickListener(x -> insertCode("class MyClass:\n    "));
                  v.findViewById(R.id.btn_import).setOnClickListener(x -> insertCode("import "));
                  v.findViewById(R.id.btn_print).setOnClickListener(x -> insertCode("print()"));
                  v.findViewById(R.id.btn_input).setOnClickListener(x -> insertCode("input()"));
                  v.findViewById(R.id.btn_len).setOnClickListener(x -> insertCode("len()"));
                  v.findViewById(R.id.btn_range).setOnClickListener(x -> insertCode("range()"));
                  v.findViewById(R.id.btn_list).setOnClickListener(x -> insertCode("[]"));
                  v.findViewById(R.id.btn_dict).setOnClickListener(x -> insertCode("{}"));
              }

              void insertCode(String code) {
                  int pos = codeEditor.getSelectionStart();
                  codeEditor.getText().insert(pos, code);
              }

              void updateLineNumbers() {
                  String text = codeEditor.getText().toString();
                  int lines = text.split("\n").length;
                  StringBuilder nums = new StringBuilder();
                  for (int i = 1; i <= lines; i++) {
                      nums.append(i).append("\n");
                  }
                  lineNumbers.setText(nums.toString());
              }

              void syntaxHighlight() {
                  // Simple syntax highlighting would go here
                  // For full implementation, use Spannable with ForegroundColorSpan
              }

              void newFile() {
                  String name = "file" + (files.size() + 1) + ".gs";
                  files.add(new CodeFile(name, "# New file\n"));
                  updateFileSpinner();
                  fileSpinner.setSelection(files.size() - 1);
              }

              void saveFile() {
                  files.get(currentFileIndex).content = codeEditor.getText().toString();
                  try {
                      File file = new File(getContext().getFilesDir(), files.get(currentFileIndex).name);
                      FileWriter writer = new FileWriter(file);
                      writer.write(files.get(currentFileIndex).content);
                      writer.close();
                      log("✓ Saved: " + files.get(currentFileIndex).name);
                  } catch (IOException e) {
                      log("✗ Error saving file: " + e.getMessage());
                  }
              }

              void runCode() {
                  console.setText("");
                  saveFile();
                  
                  String code = codeEditor.getText().toString();
                  GameFragment gameFrag = ((MainActivity)getActivity()).getGameFragment();
                  if (gameFrag != null) {
                      gameFrag.runCode(code, files, ((MainActivity)getActivity()).getFilesFragment().getLoadedFiles());
                      getActivity().getSupportFragmentManager().beginTransaction()
                          .replace(R.id.container, gameFrag)
                          .commit();
                      ((TabLayout)getActivity().findViewById(R.id.tabs)).getTabAt(2).select();
                  }
              }

              void updateFileSpinner() {
                  ArrayAdapter<String> adapter = new ArrayAdapter<>(getContext(), 
                      android.R.layout.simple_spinner_item,
                      files.stream().map(f -> f.name).toArray(String[]::new));
                  adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);
                  fileSpinner.setAdapter(adapter);
              }

              void log(String msg) {
                  console.append(msg + "\n");
              }

              String getDefaultCode() {
                  return "# GameScript Pro - Full Python for Games\n" +
                         "# Load images in Files tab, then use:\n" +
                         "# img = load_image('filename.png')\n\n" +
                         "# Variables\n" +
                         "x, y = 100, 100\n" +
                         "speed = 5\n" +
                         "score = 0\n" +
                         "colors = [(255,0,0), (0,255,0), (0,0,255)]\n\n" +
                         "# Game loop\n" +
                         "def update():\n" +
                         "    global x, y, score\n" +
                         "    \n" +
                         "    # Movement\n" +
                         "    if key('left'):\n" +
                         "        x -= speed\n" +
                         "    if key('right'):\n" +
                         "        x += speed\n" +
                         "    if key('up'):\n" +
                         "        y -= speed\n" +
                         "    if key('down'):\n" +
                         "        y += speed\n" +
                         "    \n" +
                         "    # Touch/Click\n" +
                         "    if touching():\n" +
                         "        tx, ty = touch_pos()\n" +
                         "        x, y = tx - 25, ty - 25\n" +
                         "    \n" +
                         "    score += 1\n\n" +
                         "def draw():\n" +
                         "    # Clear screen\n" +
                         "    clear(30, 30, 30)\n" +
                         "    \n" +
                         "    # Draw player\n" +
                         "    rect(x, y, 50, 50, 255, 100, 0)\n" +
                         "    \n" +
                         "    # Draw score\n" +
                         "    text('Score: ' + str(score), 20, 50, 255, 255, 255, 30)\n" +
                         "    \n" +
                         "    # Example: circles\n" +
                         "    for i in range(5):\n" +
                         "        circle(100 + i*100, 300, 30, *colors[i % 3])\n" +
                         "    \n" +
                         "    # Example: lines\n" +
                         "    line(0, 0, width(), height(), 255, 255, 0, 2)\n";
              }

              class CodeFile {
                  String name;
                  String content;
                  CodeFile(String n, String c) { name = n; content = c; }
              }
          }
          JAVA

          cat <<'JAVA' > app/src/main/java/com/gamescript/pro/FilesFragment.java
          package com.gamescript.pro;

          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.graphics.BitmapFactory;
          import android.net.Uri;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;
          import androidx.activity.result.ActivityResultLauncher;
          import androidx.activity.result.contract.ActivityResultContracts;
          import androidx.fragment.app.Fragment;
          import androidx.recyclerview.widget.*;
          import java.io.*;
          import java.util.*;

          public class FilesFragment extends Fragment {
              RecyclerView filesList;
              TextView fileInfo;
              List<LoadedFile> loadedFiles = new ArrayList<>();
              FilesAdapter adapter;

              ActivityResultLauncher<Intent> imageLauncher;
              ActivityResultLauncher<Intent> audioLauncher;
              ActivityResultLauncher<Intent> fileLauncher;

              @Override
              public View onCreateView(LayoutInflater inflater, ViewGroup container, Bundle savedInstanceState) {
                  View v = inflater.inflate(R.layout.fragment_files, container, false);

                  filesList = v.findViewById(R.id.filesList);
                  fileInfo = v.findViewById(R.id.fileInfo);

                  filesList.setLayoutManager(new LinearLayoutManager(getContext()));
                  adapter = new FilesAdapter();
                  filesList.setAdapter(adapter);

                  setupLaunchers();

                  v.findViewById(R.id.btnLoadImage).setOnClickListener(x -> loadImage());
                  v.findViewById(R.id.btnLoadAudio).setOnClickListener(x -> loadAudio());
                  v.findViewById(R.id.btnLoadFile).setOnClickListener(x -> loadFile());

                  updateInfo();
                  return v;
              }

              void setupLaunchers() {
                  imageLauncher = registerForActivityResult(
                      new ActivityResultContracts.StartActivityForResult(),
                      result -> {
                          if (result.getResultCode() == getActivity().RESULT_OK && result.getData() != null) {
                              handleImageUri(result.getData().getData());
                          }
                      }
                  );

                  audioLauncher = registerForActivityResult(
                      new ActivityResultContracts.StartActivityForResult(),
                      result -> {
                          if (result.getResultCode() == getActivity().RESULT_OK && result.getData() != null) {
                              handleAudioUri(result.getData().getData());
                          }
                      }
                  );

                  fileLauncher = registerForActivityResult(
                      new ActivityResultContracts.StartActivityForResult(),
                      result -> {
                          if (result.getResultCode() == getActivity().RESULT_OK && result.getData() != null) {
                              handleFileUri(result.getData().getData());
                          }
                      }
                  );
              }

              void loadImage() {
                  Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                  intent.setType("image/*");
                  imageLauncher.launch(intent);
              }

              void loadAudio() {
                  Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                  intent.setType("audio/*");
                  audioLauncher.launch(intent);
              }

              void loadFile() {
                  Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                  intent.setType("*/*");
                  fileLauncher.launch(intent);
              }

              void handleImageUri(Uri uri) {
                  try {
                      InputStream input = getContext().getContentResolver().openInputStream(uri);
                      Bitmap bitmap = BitmapFactory.decodeStream(input);
                      
                      String fileName = "image_" + System.currentTimeMillis() + ".png";
                      File file = new File(getContext().getFilesDir(), fileName);
                      
                      FileOutputStream out = new FileOutputStream(file);
                      bitmap.compress(Bitmap.CompressFormat.PNG, 100, out);
                      out.close();
                      input.close();

                      LoadedFile lf = new LoadedFile();
                      lf.name = fileName;
                      lf.type = "image";
                      lf.path = file.getAbsolutePath();
                      lf.size = file.length();
                      lf.bitmap = bitmap;
                      
                      loadedFiles.add(lf);
                      adapter.notifyDataSetChanged();
                      updateInfo();
                      
                      Toast.makeText(getContext(), "Image loaded: " + fileName, Toast.LENGTH_SHORT).show();
                  } catch (Exception e) {
                      Toast.makeText(getContext(), "Error: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                  }
              }

              void handleAudioUri(Uri uri) {
                  try {
                      InputStream input = getContext().getContentResolver().openInputStream(uri);
                      
                      String fileName = "audio_" + System.currentTimeMillis() + ".mp3";
                      File file = new File(getContext().getFilesDir(), fileName);
                      
                      FileOutputStream out = new FileOutputStream(file);
                      byte[] buffer = new byte[1024];
                      int read;
                      while ((read = input.read(buffer)) != -1) {
                          out.write(buffer, 0, read);
                      }
                      out.close();
                      input.close();

                      LoadedFile lf = new LoadedFile();
                      lf.name = fileName;
                      lf.type = "audio";
                      lf.path = file.getAbsolutePath();
                      lf.size = file.length();
                      
                      loadedFiles.add(lf);
                      adapter.notifyDataSetChanged();
                      updateInfo();
                      
                      Toast.makeText(getContext(), "Audio loaded: " + fileName, Toast.LENGTH_SHORT).show();
                  } catch (Exception e) {
                      Toast.makeText(getContext(), "Error: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                  }
              }

              void handleFileUri(Uri uri) {
                  try {
                      InputStream input = getContext().getContentResolver().openInputStream(uri);
                      
                      String fileName = "file_" + System.currentTimeMillis() + ".dat";
                      File file = new File(getContext().getFilesDir(), fileName);
                      
                      FileOutputStream out = new FileOutputStream(file);
                      byte[] buffer = new byte[1024];
                      int read;
                      while ((read = input.read(buffer)) != -1) {
                          out.write(buffer, 0, read);
                      }
                      out.close();
                      input.close();

                      LoadedFile lf = new LoadedFile();
                      lf.name = fileName;
                      lf.type = "file";
                      lf.path = file.getAbsolutePath();
                      lf.size = file.length();
                      
                      loadedFiles.add(lf);
                      adapter.notifyDataSetChanged();
                      updateInfo();
                      
                      Toast.makeText(getContext(), "File loaded: " + fileName, Toast.LENGTH_SHORT).show();
                  } catch (Exception e) {
                      Toast.makeText(getContext(), "Error: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                  }
              }

              void updateInfo() {
                  long totalSize = 0;
                  for (LoadedFile f : loadedFiles) totalSize += f.size;
                  fileInfo.setText(String.format("Files: %d | Total size: %.2f MB", 
                      loadedFiles.size(), totalSize / 1048576.0));
              }

              public List<LoadedFile> getLoadedFiles() {
                  return loadedFiles;
              }

              class FilesAdapter extends RecyclerView.Adapter<FileViewHolder> {
                  @Override
                  public FileViewHolder onCreateViewHolder(ViewGroup parent, int viewType) {
                      View v = LayoutInflater.from(parent.getContext())
                          .inflate(R.layout.item_file, parent, false);
                      return new FileViewHolder(v);
                  }

                  @Override
                  public void onBindViewHolder(FileViewHolder h, int pos) {
                      LoadedFile f = loadedFiles.get(pos);
                      h.fileName.setText(f.name);
                      h.fileSize.setText(String.format("%.2f KB | %s", f.size / 1024.0, f.type));
                      
                      if (f.bitmap != null) {
                          h.fileIcon.setImageBitmap(f.bitmap);
                      } else {
                          h.fileIcon.setImageResource(android.R.drawable.ic_menu_gallery);
                      }

                      h.btnDelete.setOnClickListener(v -> {
                          loadedFiles.remove(pos);
                          notifyDataSetChanged();
                          updateInfo();
                      });
                  }

                  @Override
                  public int getItemCount() {
                      return loadedFiles.size();
                  }
              }

              class FileViewHolder extends RecyclerView.ViewHolder {
                  TextView fileName, fileSize;
                  ImageView fileIcon;
                  Button btnDelete;

                  FileViewHolder(View v) {
                      super(v);
                      fileName = v.findViewById(R.id.fileName);
                      fileSize = v.findViewById(R.id.fileSize);
                      fileIcon = v.findViewById(R.id.fileIcon);
                      btnDelete = v.findViewById(R.id.btnDelete);
                  }
              }
          }
