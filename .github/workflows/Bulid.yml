                      int oldJump = PlayerPrefs.getJumpPack();

                      int newWalk = spinnerWalkPack.getSelectedItemPosition();
                      int newJump = spinnerJumpPack.getSelectedItemPosition();

                      if(newWalk != oldWalk) cost += 150;
                      if(newJump != oldJump) cost += 150;

                      if(cost > PlayerPrefs.getRigids()){
                          Toast.makeText(this,"Not enough Rigid's!",Toast.LENGTH_SHORT).show();
                          return;
                      }

                      PlayerPrefs.addRigids(-cost);
                      PlayerPrefs.setWalkPack(newWalk);
                      PlayerPrefs.setJumpPack(newJump);
                      loadCustomization();
                      updRigidDisplay();
                      Toast.makeText(this,"Animation packs applied!",Toast.LENGTH_SHORT).show();
                  });
              }

              private void startRigidTimer(){
                  rigidTimer = System.currentTimeMillis();
                  handler.postDelayed(rigidCheckRunnable, 1000);
              }

              private void stopRigidTimer(){
                  handler.removeCallbacks(rigidCheckRunnable);
              }

              private final Runnable rigidCheckRunnable = new Runnable() {
                  @Override
                  public void run() {
                      if(pendingMode == 1 && !ren.isEngineMode){
                          long elapsed = System.currentTimeMillis() - rigidTimer;
                          if(elapsed >= 180000){
                              PlayerPrefs.addRigids(10);
                              updRigidDisplay();
                              showRigidNotification();
                              rigidTimer = System.currentTimeMillis();
                          }
                          handler.postDelayed(this, 1000);
                      }
                  }
              };

              private void showRigidNotification(){
                  runOnUiThread(()->{
                      txtRigidNotify.setVisibility(View.VISIBLE);
                      handler.postDelayed(()->txtRigidNotify.setVisibility(View.GONE), 3000);
                  });
              }

              private void updRigidDisplay(){
                  runOnUiThread(()->{
                      int r = PlayerPrefs.getRigids();
                      txtRigids.setText("💰 " + r + " Rigid's");
                      txtMenuRigids.setText("💰 " + r + " Rigid's");
                      txtCustomizeRigids.setText("💰 " + r);
                  });
              }

              private void loadCustomization(){
                  ren.skinColor = PlayerPrefs.getSkinColor();
                  ren.torsoColor = PlayerPrefs.getTorsoColor();
                  ren.legsColor = PlayerPrefs.getLegsColor();
                  ren.faceType = PlayerPrefs.getFaceType();
                  ren.walkPack = PlayerPrefs.getWalkPack();
                  ren.jumpPack = PlayerPrefs.getJumpPack();
              }

              private void showScriptDialog(){
                  EditText input = new EditText(this);
                  input.setMinLines(10);
                  input.setText(
                      "phone.toast(\"Hello\")\n" +
                      "player.teleport(0, 8, 10)\n" +
                      "player.jump\n"
                  );
                  input.setInputType(InputType.TYPE_CLASS_TEXT | InputType.TYPE_TEXT_FLAG_MULTI_LINE);

                  new android.app.AlertDialog.Builder(this)
                      .setTitle("Script")
                      .setView(input)
                      .setPositiveButton("Run", (d,w)->{
                          try{
                              ScriptEngine.run(this, input.getText().toString());
                              updAxis();
                              updSizeInfo();
                              updGridButton();
                              Toast.makeText(this,"Script done",Toast.LENGTH_SHORT).show();
                          }catch(Exception ex){
                              Toast.makeText(this, ex.getMessage(), Toast.LENGTH_LONG).show();
                          }
                      })
                      .setNegativeButton("Close", null)
                      .show();
              }

              private void showBlockEventsDialog(){
                  if(ren.selectedIndex < 0 || ren.selectedIndex >= ren.blocks.size()) return;
                  Block b = ren.blocks.get(ren.selectedIndex);

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  int pad = (int)(12 * getResources().getDisplayMetrics().density);
                  root.setPadding(pad,pad,pad,pad);

                  TextView t1 = new TextView(this); t1.setText("On Start");
                  EditText e1 = new EditText(this); e1.setMinLines(4); e1.setText(b.onStartScript);
                  TextView t2 = new TextView(this); t2.setText("On Player Touch");
                  EditText e2 = new EditText(this); e2.setMinLines(4); e2.setText(b.onTouchScript);
                  TextView t3 = new TextView(this); t3.setText("On Block Tap");
                  EditText e3 = new EditText(this); e3.setMinLines(4); e3.setText(b.onTapScript);

                  root.addView(t1); root.addView(e1);
                  root.addView(t2); root.addView(e2);
                  root.addView(t3); root.addView(e3);

                  new android.app.AlertDialog.Builder(this)
                      .setTitle("Block Events")
                      .setView(root)
                      .setPositiveButton("Save", (d,w)->{
                          b.onStartScript = e1.getText().toString();
                          b.onTouchScript = e2.getText().toString();
                          b.onTapScript = e3.getText().toString();
                          Toast.makeText(this,"Events saved",Toast.LENGTH_SHORT).show();
                      })
                      .setNegativeButton("Close", null)
                      .show();
              }

              private void setShapePreset(float sx,float sy,float sz,int idx){
                  ren.blockSX=sx;
                  ren.blockSY=sy;
                  ren.blockSZ=sz;
                  updBtnGrp(shapeBtn,idx);
                  updSizeInfo();
              }

              private void resetP(){ ren.pX=0; ren.pY=7; ren.pZ=15; ren.vY=0; }

              private void axisBtn(int id,float dx,float dy,float dz){
                  findViewById(id).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN||e.getAction()==MotionEvent.ACTION_MOVE){
                          float step = ren.gridEnabled ? ren.gridSize : 0.5f;
                          ren.moveSelected(dx*step,dy*step,dz*step);
                      }
                      return true;
                  });
              }

              private void updAxis(){
                  runOnUiThread(()->{
                      boolean sel = ren.selectedIndex>=0;
                      axisPanel.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDeselect.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnHide.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDelete.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnEvents.setVisibility(sel?View.VISIBLE:View.GONE);
                      if(sel){
                          Block b = ren.blocks.get(ren.selectedIndex);
                          btnHide.setText(b.hidden ? "Show" : "Hide");
                      }
                  });
              }

              private void updSizeInfo(){
                  runOnUiThread(() -> txtSizeInfo.setText(
                      String.format(java.util.Locale.US, "%.1f x %.1f x %.1f", ren.blockSX, ren.blockSY, ren.blockSZ)
                  ));
              }

              private void updGridButton(){
                  runOnUiThread(() -> {
                      if(ren.gridEnabled){
                          btnGrid.setText("Grid: On");
                          btnGrid.setBackgroundResource(R.drawable.btn_blue_filled);
                          btnGrid.setTextColor(0xFF000000);
                      }else{
                          btnGrid.setText("Grid: Off");
                          btnGrid.setBackgroundResource(R.drawable.btn_blue);
                          btnGrid.setTextColor(0xFF00BFFF);
                      }
                  });
              }

              private void setupJoy(View base,View stick){
                  base.setOnTouchListener((v,e)->{
                      float cx=v.getWidth()/2f,cy=v.getHeight()/2f;
                      if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){
                          float dx=e.getX()-cx,dy=e.getY()-cy,d=(float)Math.sqrt(dx*dx+dy*dy),lim=cx-stick.getWidth()/2f;
                          if(d>lim){dx*=lim/d;dy*=lim/d;}
                          stick.setTranslationX(dx);stick.setTranslationY(dy);
                          ren.jX=dx/lim;ren.jY=dy/lim;
                      }else if(e.getAction()==MotionEvent.ACTION_UP){
                          stick.setTranslationX(0);stick.setTranslationY(0);
                          ren.jX=0;ren.jY=0;
                      }
                      return true;
                  });
              }

              private void setupLook(View z){
                  z.setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){
                          lx=e.getX();ly=e.getY();
                      }else if(e.getAction()==MotionEvent.ACTION_MOVE){
                          ren.rY+=(e.getX()-lx)*.25f;
                          ren.rX+=(ly-e.getY())*.25f;
                          lx=e.getX();ly=e.getY();
                      }
                      return true;
                  });
              }

              private void updBtnGrp(Button[] btns,int sel){
                  for(int i=0;i<btns.length;i++){
                      if(i==sel){
                          btns[i].setBackgroundResource(R.drawable.btn_blue_filled);
                          btns[i].setTextColor(0xFF000000);
                      }else{
                          btns[i].setBackgroundResource(R.drawable.btn_blue);
                          btns[i].setTextColor(0xFF00BFFF);
                      }
                  }
              }

              private void updColSel(int sel){
                  for(int i=0;i<colorBtn.length;i++){
                      try{
                          GradientDrawable bg=(GradientDrawable)colorBtn[i].getBackground();
                          if(i==sel) bg.setStroke(6,0xFFFFFFFF);
                          else bg.setStroke(2,0xFF00BFFF);
                      }catch(Exception ignored){}
                  }
              }
          }
