              private void update(){
                  long now=System.nanoTime();
                  if(lastTimeNs==0L)lastTimeNs=now;
                  float dt=Math.min((now-lastTimeNs)/1e9f,0.05f);lastTimeNs=now;
                  moveMag=(float)Math.min(1.0,Math.sqrt(jX*jX+jY*jY));
                  blinkTimer+=dt;
                  if(!blinking&&blinkTimer>nextBlink){blinking=true;blinkDur=0.12f;blinkTimer=0;nextBlink=2f+(float)(Math.random()*4f);}
                  if(blinking){blinkDur-=dt;if(blinkDur<=0)blinking=false;}
                  if(isAttacking){
                      attackAnim+=dt*12f;
                      if(attackAnim>1f){attackAnim=0f;isAttacking=false;}
                  }
                  float s=0.42f,rYr=(float)Math.toRadians(rY);
                  if(isEngineMode&&!isPlayingLevel){
                      float rXr=(float)Math.toRadians(rX);
                      float fx=(float)Math.sin(rYr),fz=(float)-Math.cos(rYr),fy=(float)Math.sin(rXr);
                      pX+=(fx*-jY+(float)Math.cos(rYr)*jX)*s;pZ+=(fz*-jY+(float)Math.sin(rYr)*jX)*s;pY+=fy*-jY*s;
                  } else {
                      float mX=((float)Math.sin(rYr)*-jY+(float)Math.cos(rYr)*jX)*s;
                      float mZ=((float)-Math.cos(rYr)*-jY+(float)Math.sin(rYr)*jX)*s;
                      vY-=0.025f;
                      float nX=pX+mX,nY=pY+vY,nZ=pZ+mZ,fY=nY-PLAYER_HEIGHT;
                      if(fY<FLOOR_Y){nY=FLOOR_Y+PLAYER_HEIGHT;vY=0;}
                      for(Block b:blocks){
                          if(!isEngineMode&&!isPlayingLevel&&b.ridixPrice>0&&!b.purchased)continue;
                          boolean oxz=nX+PLAYER_RADIUS>b.minX()&&nX-PLAYER_RADIUS<b.maxX()&&nZ+PLAYER_RADIUS>b.minZ()&&nZ-PLAYER_RADIUS<b.maxZ();
                          boolean oy=fY<b.maxY()-0.1f&&nY>b.minY()+0.1f;
                          if(oxz){
                              if(pY-PLAYER_HEIGHT>=b.maxY()-0.15f&&fY<b.maxY()){nY=b.maxY()+PLAYER_HEIGHT;vY=0;}
                              else if(pY<b.minY()&&nY>b.minY()){nY=b.minY();vY=0;}
                              else if(oy){
                                  float ox1=(nX+PLAYER_RADIUS)-b.minX(),ox2=b.maxX()-(nX-PLAYER_RADIUS),oz1=(nZ+PLAYER_RADIUS)-b.minZ(),oz2=b.maxZ()-(nZ-PLAYER_RADIUS);
                                  float mo=Math.min(Math.min(ox1,ox2),Math.min(oz1,oz2));
                                  if(mo==ox1)nX=b.minX()-PLAYER_RADIUS;else if(mo==ox2)nX=b.maxX()+PLAYER_RADIUS;
                                  else if(mo==oz1)nZ=b.minZ()-PLAYER_RADIUS;else nZ=b.maxZ()+PLAYER_RADIUS;
                              }
                          }
                      }
                      pX=nX;pY=nY;pZ=nZ;
                      boolean og=isOnGround();
                      if(!og&&wasOnGround)jumpPhase=0f;
                      if(!og)jumpPhase=Math.min(1f,jumpPhase+dt*5f);
                      else jumpPhase=Math.max(0f,jumpPhase-dt*8f);
                      wasOnGround=og;
                      if(moveMag>0.05f){charRotation=(float)Math.toDegrees(Math.atan2(mX,mZ));if(og)walkPhase+=dt*9.5f*moveMag;}
                      
                      for(int i=0;i<items.size();i++){
                          Item it=items.get(i);
                          if(!it.collected&&pX+PLAYER_RADIUS>it.minX()&&pX-PLAYER_RADIUS<it.maxX()&&pY-PLAYER_HEIGHT<it.maxY()&&pY>it.minY()&&pZ+PLAYER_RADIUS>it.minZ()&&pZ-PLAYER_RADIUS<it.maxZ()){
                              if(it.ridixPrice>0&&!it.purchased&&pendingPurchaseType!=2){
                                  pendingPurchaseType=2;pendingPurchaseIndex=i;
                                  if(purchaseCallback!=null)purchaseCallback.onPurchaseRequest(it.itemName.isEmpty()?it.type:it.itemName,it.ridixPrice,2,i);
                              }else if(it.ridixPrice==0||it.purchased){
                                  boolean hasEmptySlot=false;
                                  for(int j=0;j<inventory.length;j++){
                                      if(inventory[j]==null||inventory[j].isEmpty()){
                                          String nm=it.itemName.isEmpty()?it.type:it.itemName;
                                          inventory[j]=nm;
                                          it.collected=true;
                                          hasEmptySlot=true;
                                          hasStick=true;
                                          break;
                                      }
                                  }
                                  if(!hasEmptySlot){
                                      for(int j=0;j<inventory.length;j++){
                                          if(inventory[j]!=null&&!inventory[j].isEmpty()){
                                              inventory[j]=it.itemName.isEmpty()?it.type:it.itemName;
                                              it.collected=true;
                                              hasStick=true;
                                              break;
                                          }
                                      }
                                  }
                              }
                          }
                      }
                      for(int i=0;i<blocks.size();i++){
                          Block b=blocks.get(i);
                          if(b.ridixPrice>0&&!b.purchased&&pendingPurchaseType!=0){
                              float dx=b.x-pX,dy=b.y-pY,dz=b.z-pZ;
                              float dist=(float)Math.sqrt(dx*dx+dy*dy+dz*dz);
                              if(dist<placeDist+2f&&pX+PLAYER_RADIUS>b.minX()&&pX-PLAYER_RADIUS<b.maxX()&&pY-PLAYER_HEIGHT<b.maxY()&&pY>b.minY()&&pZ+PLAYER_RADIUS>b.minZ()&&pZ-PLAYER_RADIUS<b.maxZ()){
                                  pendingPurchaseType=0;pendingPurchaseIndex=i;
                                  if(purchaseCallback!=null)purchaseCallback.onPurchaseRequest(b.itemName.isEmpty()?"Block":b.itemName,b.ridixPrice,0,i);
                              }
                          }
                      }
                      if(isAttacking&&hasStick){
                          for(int i=0;i<blocks.size();i++){
                              Block b=blocks.get(i);
                              float dx=b.x-pX,dy=b.y-(pY-PLAYER_HEIGHT/2f),dz=b.z-pZ;
                              float dist=(float)Math.sqrt(dx*dx+dy*dy+dz*dz);
                              if(dist<3f){
                                  b.hidden=true;
                              }
                          }
                      }
                  }
              }

              public void completePurchase(int type,int index){
                  if(type==0&&index>=0&&index<blocks.size())blocks.get(index).purchased=true;
                  else if(type==2&&index>=0&&index<items.size())items.get(index).purchased=true;
                  pendingPurchaseType=-1;pendingPurchaseIndex=-1;
              }

              public void cancelPurchase(){pendingPurchaseType=-1;pendingPurchaseIndex=-1;}

              public boolean isOnGround(){
                  if(pY-PLAYER_HEIGHT<=FLOOR_Y+0.1f)return true;
                  for(Block b:blocks){
                      if(!isEngineMode&&!isPlayingLevel&&b.ridixPrice>0&&!b.purchased)continue;
                      if(pX+PLAYER_RADIUS>b.minX()&&pX-PLAYER_RADIUS<b.maxX()&&pZ+PLAYER_RADIUS>b.minZ()&&pZ-PLAYER_RADIUS<b.maxZ()&&Math.abs((pY-PLAYER_HEIGHT)-b.maxY())<0.15f)return true;
                  }
                  return false;
              }

              public void doJump(){
                  if(isOnGround())vY=0.55f;
              }

