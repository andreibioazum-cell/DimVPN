name: Enjoer_v1.0_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#101820"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue_filled.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_red.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#101820"/>
            <stroke android:width="2dp" android:color="#FF4444"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_green.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#44FF44"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#CC101820"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_stick.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/panel_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#E6101820"/>
            <stroke android:width="1dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/crosshair.xml
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
            <item>
              <shape android:shape="oval">
                <size android:width="18dp" android:height="18dp"/>
                <stroke android:width="2dp" android:color="#8000BFFF"/>
              </shape>
            </item>
            <item android:gravity="center">
              <shape android:shape="oval">
                <size android:width="4dp" android:height="4dp"/>
                <solid android:color="#FF00BFFF"/>
              </shape>
            </item>
          </layer-list>
          EOF

          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#02050A">
              <android.opengl.GLSurfaceView android:id="@+id/gl_view" android:layout_width="match_parent" android:layout_height="match_parent"/>
              <RelativeLayout android:id="@+id/game_ui" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/look_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <Button android:id="@+id/btn_menu" android:layout_width="50dp" android:layout_height="50dp" android:layout_margin="10dp" android:text="≡" android:textSize="24sp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
                  <FrameLayout android:id="@+id/joy_base" android:layout_width="126dp" android:layout_height="126dp" android:layout_alignParentBottom="true" android:layout_alignParentLeft="true" android:layout_marginLeft="40dp" android:layout_marginBottom="40dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/joy_stick" android:layout_width="54dp" android:layout_height="54dp" android:layout_alignLeft="@id/joy_base" android:layout_alignTop="@id/joy_base" android:layout_marginLeft="36dp" android:layout_marginTop="36dp" android:background="@drawable/joy_stick"/>
                  <Button android:id="@+id/btn_jump" android:layout_width="90dp" android:layout_height="90dp" android:layout_alignParentRight="true" android:layout_alignParentBottom="true" android:layout_marginRight="40dp" android:layout_marginBottom="40dp" android:text="▲" android:textSize="28sp" android:background="@drawable/btn_blue" android:textColor="#FFF"/>
                  <View android:layout_width="22dp" android:layout_height="22dp" android:layout_centerInParent="true" android:background="@drawable/crosshair"/>
              </RelativeLayout>
              <RelativeLayout android:id="@+id/engine_ui" android:layout_width="match_parent" android:layout_height="match_parent" android:visibility="gone">
                  <View android:id="@+id/engine_touch_zone" android:layout_width="match_parent" android:layout_height="match_parent"/>
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="10dp"><Button android:id="@+id/btn_engine_menu" android:layout_width="50dp" android:layout_height="50dp" android:text="≡" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/><View android:layout_width="0dp" android:layout_height="1dp" android:layout_weight="1"/><Button android:id="@+id/btn_play_level" android:layout_width="50dp" android:layout_height="50dp" android:text="▶" android:background="@drawable/btn_green"/></LinearLayout>
                  <FrameLayout android:id="@+id/engine_joy_base" android:layout_width="108dp" android:layout_height="108dp" android:layout_alignParentBottom="true" android:layout_alignParentLeft="true" android:layout_marginLeft="30dp" android:layout_marginBottom="30dp" android:background="@drawable/joy_base"/>
                  <View android:id="@+id/engine_joy_stick" android:layout_width="45dp" android:layout_height="45dp" android:layout_alignLeft="@id/engine_joy_base" android:layout_alignTop="@id/engine_joy_base" android:layout_marginLeft="31dp" android:layout_marginTop="31dp" android:background="@drawable/joy_stick"/>
                  <Button android:id="@+id/btn_place" android:layout_width="120dp" android:layout_height="50dp" android:layout_alignParentRight="true" android:layout_alignParentBottom="true" android:layout_margin="20dp" android:text="PLACE" android:background="@drawable/btn_blue_filled"/>
              </RelativeLayout>
              <LinearLayout android:id="@+id/menu_ui" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:gravity="center" android:background="#02050A">
                  <TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="ENJOER" android:textSize="52sp" android:textColor="#00BFFF" android:textStyle="bold"/>
                  <Button android:id="@+id/btn_play" android:layout_width="240dp" android:layout_height="60dp" android:text="Play" android:layout_marginTop="20dp" android:background="@drawable/btn_blue_filled"/>
                  <Button android:id="@+id/btn_engine" android:layout_width="240dp" android:layout_height="60dp" android:text="Editor" android:layout_marginTop="15dp" android:background="@drawable/btn_blue" android:textColor="#00BFFF"/>
              </LinearLayout>
          </FrameLayout>
          LAYOUT

          cat <<EOF > app/src/main/java/com/enjoer/game/Block.java
          package com.enjoer.game;
          public class Block {
              public float x, y, z, sx, sy, sz, r, g, b;
              public boolean hidden = false;
              public String shape = "square";
              public String onStartScript = "", onTouchScript = "", onTapScript = "";
              public boolean started = false, touchingPlayer = false;
              public Block(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b) {
                  this.x=x; this.y=y; this.z=z; this.sx=sx; this.sy=sy; this.sz=sz; this.r=r; this.g=g; this.b=b;
              }
              public float minX(){return x-sx/2f;} public float maxX(){return x+sx/2f;}
              public float minY(){return y-sy/2f;} public float maxY(){return y+sy/2f;}
              public float minZ(){return z-sz/2f;} public float maxZ(){return z+sz/2f;}
          }
          EOF

          cat <<'SCRIPT' > app/src/main/java/com/enjoer/game/ScriptEngine.java
          package com.enjoer.game;
          public class ScriptEngine {
              public interface Host { GameRenderer renderer(); void toast(String text); }
              public static void run(Host host, String script) throws Exception {}
          }
          SCRIPT

          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              public interface EventHost { void runBlockScript(Block block, String script); }
              private final float[] proj=new float[16], view=new float[16], model=new float[16], vp=new float[16];
              public float pX=0, pY=6, pZ=15, rY=0, rX=0, jX=0, jY=0, vY=0;
              public boolean isEngineMode=false, isPlayingLevel=false, gridEnabled=true;
              private int prog, skyProg;
              private FloatBuffer vBuf, nBuf, skyBuf;
              public CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              public int selectedIndex = -1;
              public float screenW=1, screenH=1;
              public EventHost eventHost;
              private static final float FLOOR_Y=0f, PLAYER_HEIGHT=5.2f, PLAYER_RADIUS=0.85f;
              private float charRotation = 0f, walkPhase = 0f, lastTime = 0f;

              @Override public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs="#version 300 es\nlayout(location=0)in vec4 aP;layout(location=1)in vec3 aN;uniform mat4 uMVP,uM;out vec3 vN,vP;void main(){vP=vec3(uM*aP);vN=normalize(mat3(uM)*aN);gl_Position=uMVP*aP;}";
                  String fs="#version 300 es\nprecision highp float;in vec3 vN,vP;uniform vec3 camP;uniform vec4 uC;uniform float uSel,isFloor;out vec4 fC;void main(){vec3 n=normalize(vN),vD=normalize(camP-vP),lD=normalize(vec3(.4,1.,.2));float diff=max(dot(n,lD),0.);vec3 col=uC.rgb;if(isFloor>.5){vec2 g=fract(vP.xz*.2);if(g.x>.97||g.y>.97)col=vec3(0,.4,.8);}fC=vec4(col*diff,uC.a);}";
                  prog=mkProg(vs,fs);
                  String svs="#version 300 es\nlayout(location=0)in vec3 aP;out vec3 vDir;void main(){vDir=aP;gl_Position=vec4(aP,1.0);}";
                  String sfs="#version 300 es\nprecision highp float;in vec3 vDir;out vec4 fC;float h(vec3 p){return fract(sin(dot(p,vec2(12.9,78.2)))*43758.5);}void main(){vec3 d=normalize(vDir);float s=step(.996,h(d*120.0));fC=vec4(mix(vec3(0,0,.05),vec3(1),s),1.0);}";
                  skyProg=mkProg(svs,sfs);
                  float[] vc={-.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,.5f, .5f,-.5f,.5f, -.5f,.5f,-.5f, -.5f,-.5f,-.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f, -.5f,.5f,-.5f, -.5f,.5f,.5f, .5f,.5f,-.5f, .5f,.5f,.5f, -.5f,-.5f,-.5f, -.5f,-.5f,.5f, .5f,-.5f,-.5f, .5f,-.5f,.5f, -.5f,.5f,-.5f, -.5f,-.5f,-.5f, -.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f, .5f,.5f,.5f, .5f,-.5f,.5f};
                  vBuf=ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc);vBuf.position(0);
                  float[] sky={-1,1,0,-1,-1,0,1,1,0,1,-1,0};
                  skyBuf=ByteBuffer.allocateDirect(sky.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(sky);skyBuf.position(0);
                  blocks.add(new Block(0,2,-10,8,4,8,0.8f,0.3f,0.3f));
              }

              @Override public void onDrawFrame(GL10 gl) {
                  update();
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT|GLES30.GL_DEPTH_BUFFER_BIT);
                  float ry=(float)Math.toRadians(rY), rx=(float)Math.toRadians(rX);
                  if(isEngineMode && !isPlayingLevel){
                      Matrix.setLookAtM(view,0, pX,pY,pZ, pX+(float)(Math.sin(ry)*Math.cos(rx)), pY+(float)Math.sin(rx), pZ-(float)(Math.cos(ry)*Math.cos(rx)), 0,1,0);
                  } else {
                      float dist = 16.0f;
                      float cx = pX - (float)(Math.sin(ry)*Math.cos(rx)) * dist;
                      float cy = pY - (float)Math.sin(rx) * dist + 2.5f;
                      float cz = pZ + (float)(Math.cos(ry)*Math.cos(rx)) * dist;
                      cy = Math.max(1.2f, cy); 
                      Matrix.setLookAtM(view,0, cx,cy,cz, pX,pY,pZ, 0,1,0);
                  }
                  Matrix.multiplyMM(vp,0,proj,0,view,0);
                  GLES30.glDisable(GLES30.GL_DEPTH_TEST); GLES30.glUseProgram(skyProg);
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,skyBuf); GLES30.glEnableVertexAttribArray(0);
                  GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,0,4); GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  GLES30.glUseProgram(prog);
                  int uM=GLES30.glGetUniformLocation(prog,"uM"), uMVP=GLES30.glGetUniformLocation(prog,"uMVP"), uC=GLES30.glGetUniformLocation(prog,"uC"), uF=GLES30.glGetUniformLocation(prog,"isFloor");
                  GLES30.glUniform3f(GLES30.glGetUniformLocation(prog,"camP"),pX,pY,pZ);
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBuf); GLES30.glEnableVertexAttribArray(0);
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,0,-0.1f,0); Matrix.scaleM(model,0,1000,.2f,1000);
                  GLES30.glUniform1f(uF,1.0f); draw(uM,uMVP,uC,0.1f,0.1f,0.15f); GLES30.glUniform1f(uF,0.0f);
                  for(Block b:blocks){ Matrix.setIdentityM(model,0); Matrix.translateM(model,0,b.x,b.y,b.z); Matrix.scaleM(model,0,b.sx,b.sy,b.sz); draw(uM,uMVP,uC,b.r,b.g,b.b); }
                  if(!isEngineMode || isPlayingLevel) drawPlayer(uM,uMVP,uC);
              }

              private void update(){
                  long now=System.nanoTime(); float dt=lastTime==0?0.016f:(now-lastTime)/1e9f; lastTime=now;
                  if(dt>.1f)dt=.1f;
                  float speed=18f*dt, ry=(float)Math.toRadians(rY);
                  float mx=(float)(Math.sin(ry)*jY+Math.cos(ry)*jX)*speed, mz=(float)(-Math.cos(ry)*jY+Math.sin(ry)*jX)*speed;
                  if(isEngineMode && !isPlayingLevel){ pX+=mx; pZ+=mz; pY+=(float)Math.sin(Math.toRadians(rX))*jY*speed; }
                  else {
                      vY-=1.4f*dt; pY+=vY; if(pY-PLAYER_HEIGHT<0){pY=PLAYER_HEIGHT;vY=0;}
                      pX+=mx; pZ+=mz; if(Math.abs(jX)>.1f||Math.abs(jY)>.1f){charRotation=(float)Math.toDegrees(Math.atan2(mx,mz)); walkPhase+=dt*10f;}
                  }
              }

              private void drawPlayer(int uM, int uMVP, int uC){
                  float fy=pY-PLAYER_HEIGHT, s=(float)Math.sin(walkPhase);
                  float armA=vY==0?s*40f:-150f;
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,pX,fy+2.6f,pZ); Matrix.rotateM(model,0,charRotation,0,1,0); Matrix.scaleM(model,0,1.4f,2.0f,0.8f); draw(uM,uMVP,uC,0.1f,0.5f,0.9f);
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,pX,fy+4.2f,pZ); Matrix.rotateM(model,0,charRotation,0,1,0); Matrix.scaleM(model,0,1.1f,1.1f,1.1f); draw(uM,uMVP,uC,1,0.8f,0.2f);
                  for(int i:new int[]{-1,1}){ Matrix.setIdentityM(model,0); Matrix.translateM(model,0,pX,fy+3.4f,pZ); Matrix.rotateM(model,0,charRotation,0,1,0); Matrix.translateM(model,0,i*1.1f,0,0); Matrix.rotateM(model,0,i*armA,1,0,0); Matrix.translateM(model,0,0,-0.7f,0); Matrix.scaleM(model,0,0.6f,1.4f,0.6f); draw(uM,uMVP,uC,1,0.8f,0.2f); }
              }

              private void draw(int uM,int uMVP,int uC,float r,float g,float b){
                  GLES30.glUniformMatrix4fv(uM,1,false,model,0); Matrix.multiplyMM(vp,0,proj,0,view,0); Matrix.multiplyMM(vp,0,vp,0,model,0);
                  GLES30.glUniformMatrix4fv(uMVP,1,false,vp,0); GLES30.glUniform4f(uC,r,g,b,1);
                  for(int i=0;i<6;i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }
              @Override public void onSurfaceChanged(GL10 gl,int w,int h){GLES30.glViewport(0,0,w,h);Matrix.perspectiveM(proj,0,60,(float)w/h,0.1f,1000f);}
              private int mkSh(int t,String s){int sh=GLES30.glCreateShader(t);GLES30.glShaderSource(sh,s);GLES30.glCompileShader(sh);return sh;}
              private int mkProg(String v,String f){int p=GLES30.glCreateProgram();GLES30.glAttachShader(p,mkSh(35633,v));GLES30.glAttachShader(p,mkSh(35632,f));GLES30.glLinkProgram(p);return p;}
          }
          RENDERER

          cat <<'MAIN' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;

          public class MainActivity extends Activity {
              private GameRenderer ren;
              private float lx, ly;
              private View menuUI, gameUI, engineUI;
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv=findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3); ren=new GameRenderer(); gv.setRenderer(ren);
                  menuUI=findViewById(R.id.menu_ui); gameUI=findViewById(R.id.game_ui); engineUI=findViewById(R.id.engine_ui);
                  findViewById(R.id.btn_play).setOnClickListener(v->{menuUI.setVisibility(View.GONE);gameUI.setVisibility(View.VISIBLE);ren.isPlayingLevel=true;});
                  findViewById(R.id.btn_engine).setOnClickListener(v->{menuUI.setVisibility(View.GONE);engineUI.setVisibility(View.VISIBLE);ren.isEngineMode=true;});
                  setupJoy(findViewById(R.id.joy_base), findViewById(R.id.joy_stick));
                  setupJoy(findViewById(R.id.engine_joy_base), findViewById(R.id.engine_joy_stick));
                  findViewById(R.id.look_zone).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}
                      else if(e.getAction()==MotionEvent.ACTION_MOVE){ren.rY+=(e.getX()-lx)*0.25f;ren.rX=Math.max(-80,Math.min(80,ren.rX-(e.getY()-ly)*0.25f));lx=e.getX();ly=e.getY();}
                      return true;
                  });
                  findViewById(R.id.btn_jump).setOnClickListener(v->{if(ren.vY==0)ren.vY=0.55f;});
                  findViewById(R.id.btn_place).setOnClickListener(v->ren.blocks.add(new Block(ren.pX,ren.pY,ren.pZ-10,4,4,4,0.8f,0.3f,0.3f)));
              }
              private void setupJoy(View b,View s){
                  b.setOnTouchListener((v,e)->{
                      float cx=v.getWidth()/2f,cy=v.getHeight()/2f,dx=e.getX()-cx,dy=e.getY()-cy,dist=(float)Math.sqrt(dx*dx+dy*dy),lim=cx-s.getWidth()/2f;
                      if(e.getAction()==MotionEvent.ACTION_UP){s.setTranslationX(0);s.setTranslationY(0);ren.jX=0;ren.jY=0;}
                      else{if(dist>lim){dx*=lim/dist;dy*=lim/dist;}s.setTranslationX(dx);s.setTranslationY(dy);ren.jX=dx/lim;ren.jY=-dy/lim;}
                      return true;
                  });
              }
          }
          MAIN

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Enjoer" android:theme="@style/AppTheme">
                  <activity android:name="com.enjoer.game.MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace 'com.enjoer.game'
              compileSdk 34 
              defaultConfig { 
                  applicationId 'com.enjoer.game'
                  minSdk 24 
                  targetSdk 34 
                  versionCode 1 
                  versionName "1.0" 
              } 
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename and Upload
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Enjoer_v1.0.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_v1.0
          path: app/build/outputs/apk/debug/Enjoer_v1.0.apk
