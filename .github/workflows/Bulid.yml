              private void resetP(){ren.pX=0;ren.pY=7;ren.pZ=15;ren.vY=0;}
              private void axBtn(int id,float dx,float dy,float dz){findViewById(id).setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN||e.getAction()==MotionEvent.ACTION_MOVE){float step=ren.gridEnabled?ren.gridSize:.5f;ren.moveSelected(dx*step,dy*step,dz*step);}return true;});}
              private void updAxis(){runOnUiThread(()->{boolean sel=ren.selectedIndex>=0;axisPanel.setVisibility(sel?View.VISIBLE:View.GONE);btnDeselect.setVisibility(sel?View.VISIBLE:View.GONE);btnHide.setVisibility(sel?View.VISIBLE:View.GONE);btnDelete.setVisibility(sel?View.VISIBLE:View.GONE);btnEvents.setVisibility(sel?View.VISIBLE:View.GONE);if(sel){Block b=ren.blocks.get(ren.selectedIndex);btnHide.setText(b.hidden?"Show":"Hide");}});}
              private void updSI(){runOnUiThread(()->txtSizeInfo.setText(String.format(java.util.Locale.US,"%.1fx%.1fx%.1f",ren.blockSX,ren.blockSY,ren.blockSZ)));}
              private void updGB(){runOnUiThread(()->{if(ren.gridEnabled){btnGrid.setText("Grid:On");btnGrid.setBackgroundResource(R.drawable.btn_blue_filled);btnGrid.setTextColor(0xFF000000);}else{btnGrid.setText("Grid:Off");btnGrid.setBackgroundResource(R.drawable.btn_blue);btnGrid.setTextColor(0xFF00BFFF);}});}
              private void setupJ(View base,View stick){base.setOnTouchListener((v,e)->{float cx=v.getWidth()/2f,cy=v.getHeight()/2f;if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){float dx=e.getX()-cx,dy=e.getY()-cy,d=(float)Math.sqrt(dx*dx+dy*dy),lim=cx-stick.getWidth()/2f;if(d>lim){dx*=lim/d;dy*=lim/d;}stick.setTranslationX(dx);stick.setTranslationY(dy);ren.jX=dx/lim;ren.jY=dy/lim;}else if(e.getAction()==MotionEvent.ACTION_UP){stick.setTranslationX(0);stick.setTranslationY(0);ren.jX=0;ren.jY=0;}return true;});}
              private void setupLH(View z){z.setOnTouchListener((v,e)->{if(e.getAction()==MotionEvent.ACTION_DOWN)lx=e.getX();else if(e.getAction()==MotionEvent.ACTION_MOVE){ren.rY+=(e.getX()-lx)*.25f;lx=e.getX();}return true;});}
              private void updBG(Button[]b,int sel){for(int i=0;i<b.length;i++){if(i==sel){b[i].setBackgroundResource(R.drawable.btn_blue_filled);b[i].setTextColor(0xFF000000);}else{b[i].setBackgroundResource(R.drawable.btn_blue);b[i].setTextColor(0xFF00BFFF);}}}
              private void updCS(int sel){for(int i=0;i<colorBtn.length;i++){try{GradientDrawable bg=(GradientDrawable)colorBtn[i].getBackground();if(i==sel)bg.setStroke(6,0xFFFFFFFF);else bg.setStroke(2,0xFF00BFFF);}catch(Exception ignored){}}}
          }
