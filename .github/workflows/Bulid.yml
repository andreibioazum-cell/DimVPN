name: Liminal_Dreams_Enhanced
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/liminal/dreams
          mkdir -p app/src/main/res/{layout,values,drawable}

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/joy_base.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#AA000000"/>
            <stroke android:width="2dp" android:color="#666666"/>
          </shape>
          EOF

          cat > app/src/main/res/drawable/joy_stick.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#555555"/>
          </shape>
          EOF

          cat > app/src/main/res/drawable/dialog_bg.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="4dp"/>
            <solid android:color="#DD000000"/>
            <stroke android:width="1dp" android:color="#333333"/>
          </shape>
          EOF

          cat > app/src/main/res/drawable/btn_choice.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="4dp"/>
            <solid android:color="#AA1A1A1A"/>
            <stroke android:width="1dp" android:color="#555555"/>
          </shape>
          EOF

          cat > app/src/main/res/drawable/crosshair.xml << 'EOF'
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
            <item>
              <shape android:shape="rectangle">
                <size android:width="2dp" android:height="12dp"/>
                <solid android:color="#AAFFFFFF"/>
              </shape>
            </item>
            <item android:top="5dp">
              <shape android:shape="rectangle">
                <size android:width="12dp" android:height="2dp"/>
                <solid android:color="#AAFFFFFF"/>
              </shape>
            </item>
          </layer-list>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#000000">

              <android.opengl.GLSurfaceView
                  android:id="@+id/gl_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>

              <RelativeLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent">

                  <View
                      android:id="@+id/look_zone"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"/>

                  <TextView
                      android:id="@+id/txt_interact"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_alignParentTop="true"
                      android:layout_centerHorizontal="true"
                      android:layout_marginTop="80dp"
                      android:background="@drawable/dialog_bg"
                      android:padding="8dp"
                      android:text="[E] Взаимодействовать"
                      android:textColor="#CCCCCC"
                      android:textSize="12sp"
                      android:visibility="gone"/>

                  <TextView
                      android:id="@+id/txt_subtitle"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_alignParentTop="true"
                      android:layout_marginTop="20dp"
                      android:gravity="center"
                      android:textColor="#AAAAAA"
                      android:textSize="14sp"
                      android:visibility="gone"/>

                  <View
                      android:id="@+id/crosshair"
                      android:layout_width="12dp"
                      android:layout_height="12dp"
                      android:layout_centerInParent="true"
                      android:background="@drawable/crosshair"/>

                  <FrameLayout
                      android:id="@+id/joy_base"
                      android:layout_width="130dp"
                      android:layout_height="130dp"
                      android:layout_alignParentBottom="true"
                      android:layout_alignParentLeft="true"
                      android:layout_marginLeft="30dp"
                      android:layout_marginBottom="30dp"
                      android:background="@drawable/joy_base"/>

                  <View
                      android:id="@+id/joy_stick"
                      android:layout_width="55dp"
                      android:layout_height="55dp"
                      android:layout_alignLeft="@id/joy_base"
                      android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="37dp"
                      android:layout_marginTop="37dp"
                      android:background="@drawable/joy_stick"/>

                  <LinearLayout
                      android:id="@+id/dialog_panel"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_alignParentBottom="true"
                      android:layout_margin="20dp"
                      android:orientation="vertical"
                      android:background="@drawable/dialog_bg"
                      android:padding="15dp"
                      android:visibility="gone">

                      <TextView
                          android:id="@+id/txt_dialog_name"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:textColor="#FFFFFF"
                          android:textSize="16sp"
                          android:textStyle="bold"/>

                      <TextView
                          android:id="@+id/txt_dialog_text"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:layout_marginTop="8dp"
                          android:textColor="#DDDDDD"
                          android:textSize="14sp"/>

                      <LinearLayout
                          android:id="@+id/choices_container"
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:layout_marginTop="10dp"
                          android:orientation="vertical"
                          android:visibility="gone"/>
                  </LinearLayout>

                  <View
                      android:id="@+id/fade_overlay"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:background="#000000"
                      android:alpha="0"
                      android:visibility="gone"/>

                  <TextView
                      android:id="@+id/txt_dream_warning"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_centerInParent="true"
                      android:text="Сон..."
                      android:textColor="#FFFFFF"
                      android:textSize="24sp"
                      android:textStyle="bold"
                      android:visibility="gone"/>
              </RelativeLayout>
          </FrameLayout>
          EOF

          cat > app/src/main/java/com/liminal/dreams/GameObject.java << 'EOF'
          package com.liminal.dreams;
          public class GameObject {
              public float x,y,z,sx,sy,sz,r,g,b;
              public String type;
              public boolean interactable;
              public String interactData;
              public float rotY=0;
              public boolean isDoorOpen=false;
              public GameObject(float x,float y,float z,float sx,float sy,float sz,float r,float g,float b,String type){
                  this.x=x;this.y=y;this.z=z;this.sx=sx;this.sy=sy;this.sz=sz;this.r=r;this.g=g;this.b=b;this.type=type;
              }
              public float minX(){return x-sx/2f;}
              public float maxX(){return x+sx/2f;}
              public float minY(){return y-sy/2f;}
              public float maxY(){return y+sy/2f;}
              public float minZ(){return z-sz/2f;}
              public float maxZ(){return z+sz/2f;}
              public boolean isInRange(float px,float pz,float range){
                  float dx=x-px,dz=z-pz;
                  return(dx*dx+dz*dz)<(range*range);
              }
          }
          EOF

          cat > app/src/main/java/com/liminal/dreams/GameData.java << 'EOF'
          package com.liminal.dreams;
          import android.content.Context;
          import android.content.SharedPreferences;
          public class GameData {
              private static SharedPreferences prefs;
              public static void init(Context ctx){prefs=ctx.getSharedPreferences("liminal_save",Context.MODE_PRIVATE);}
              public static boolean isInDream(){return prefs.getBoolean("inDream",false);}
              public static void setInDream(boolean val){prefs.edit().putBoolean("inDream",val).apply();}
              public static float getPlayerX(){return prefs.getFloat("playerX",0f);}
              public static float getPlayerZ(){return prefs.getFloat("playerZ",15f);}
              public static void savePlayerPos(float x,float z){prefs.edit().putFloat("playerX",x).putFloat("playerZ",z).apply();}
              public static int getStoryProgress(){return prefs.getInt("story",0);}
              public static void setStoryProgress(int v){prefs.edit().putInt("story",v).apply();}
          }
          EOF

          cat > app/src/main/java/com/liminal/dreams/DialogSystem.java << 'EOF'
          package com.liminal.dreams;
          import java.util.*;
