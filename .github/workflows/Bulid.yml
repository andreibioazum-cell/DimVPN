name: Clicker_Game_Russian
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/clicker/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/anim

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat > app/src/main/res/values/themes.xml << 'THEMES'
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:statusBarColor">#1A1A2E</item>
              <item name="android:navigationBarColor">#1A1A2E</item>
              <item name="android:windowLightStatusBar">false</item>
            </style>
          </resources>
          THEMES

          cat > app/src/main/res/anim/click_animation.xml << 'ANIM'
          <?xml version="1.0" encoding="utf-8"?>
          <set xmlns:android="http://schemas.android.com/apk/res/android">
              <scale
                  android:duration="100"
                  android:fromXScale="1.0"
                  android:fromYScale="1.0"
                  android:toXScale="0.95"
                  android:toYScale="0.95"
                  android:pivotX="50%"
                  android:pivotY="50%"/>
              <scale
                  android:duration="100"
                  android:fromXScale="0.95"
                  android:fromYScale="0.95"
                  android:toXScale="1.0"
                  android:toYScale="1.0"
                  android:pivotX="50%"
                  android:pivotY="50%"
                  android:startOffset="100"/>
          </set>
          ANIM

          cat > app/src/main/res/drawable/click_button_bg.xml << 'ENDF'
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape android:shape="oval">
                      <gradient
                          android:startColor="#FF6B35"
                          android:endColor="#FF8C42"
                          android:type="radial"
                          android:gradientRadius="90"/>
                  </shape>
              </item>
              <item>
                  <shape android:shape="oval">
                      <stroke android:width="3dp" android:color="#FFD700"/>
                      <solid android:color="#00000000"/>
                  </shape>
              </item>
          </layer-list>
          ENDF

          cat > app/src/main/res/drawable/upgrade_button.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/>
              <gradient
                  android:startColor="#2D1B4E"
                  android:endColor="#1A1A2E"
                  android:angle="45"/>
              <stroke android:width="2dp" android:color="#7C4DFF"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/prestige_button.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="16dp"/>
              <gradient
                  android:startColor="#FFD700"
                  android:endColor="#FFA000"
                  android:angle="90"/>
              <stroke android:width="2dp" android:color="#FFECB3"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/panel_bg.xml << 'ENDF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="16dp"/>
              <solid android:color="#CC16213E"/>
              <stroke android:width="1dp" android:color="#3A3A6A"/>
          </shape>
          ENDF

          cat > app/src/main/res/drawable/star_decoration.xml << 'ENDF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FFD700"
                  android:pathData="M12,2l3.09,6.26L22,9.27l-5,4.87 1.18,6.88L12,17.77l-6.18,3.25L7,14.14 2,9.27l6.91-1.01L12,2z"/>
          </vector>
          ENDF

          cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#1A1A2E"
              android:padding="16dp">

              <!-- Верхняя панель статистики -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:background="@drawable/panel_bg"
                  android:padding="16dp"
                  android:layout_marginBottom="12dp">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal"
                      android:gravity="center_vertical"
                      android:layout_marginBottom="8dp">
                      
                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="🪙"
                          android:textSize="24sp"/>
                      
                      <TextView
                          android:id="@+id/txt_gold"
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:text="Золото: 0"
                          android:textColor="#FFD700"
                          android:textSize="20sp"
                          android:textStyle="bold"
                          android:layout_marginLeft="8dp"/>
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="horizontal">

                      <LinearLayout
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:orientation="vertical">
                          
                          <TextView
                              android:id="@+id/txt_gps"
                              android:layout_width="wrap_content"
                              android:layout_height="wrap_content"
                              android:text="⚡ В сек: 0"
                              android:textColor="#7C4DFF"
                              android:textSize="14sp"
                              android:textStyle="bold"/>
                          
                          <TextView
                              android:id="@+id/txt_click_power"
                              android:layout_width="wrap_content"
                              android:layout_height="wrap_content"
                              android:text="💪 Сила клика: 1"
                              android:textColor="#FF6B35"
                              android:textSize="14sp"
                              android:textStyle="bold"
                              android:layout_marginTop="4dp"/>
                      </LinearLayout>

                      <LinearLayout
                          android:layout_width="0dp"
                          android:layout_height="wrap_content"
                          android:layout_weight="1"
                          android:orientation="vertical"
                          android:gravity="end">
                          
                          <TextView
                              android:id="@+id/txt_prestige"
                              android:layout_width="wrap_content"
                              android:layout_height="wrap_content"
                              android:text="🌟 Престиж: 0"
