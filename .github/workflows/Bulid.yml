              private void drawEyesPig(float[]vp,int uM,int uMVP,int uC,float px,float footY,float pz,float rot,boolean blink){
                  float eyeY=LEG_H+TORSO_H+HEAD_S*0.6f;
                  float eyeZ=-HEAD_S*0.51f;
                  float eW=HEAD_S*0.14f;
                  float eH=blink&&blinking?(HEAD_S*0.03f):(HEAD_S*0.14f);
                  float eD=HEAD_S*0.07f;
                  // Белки
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,-HEAD_S*0.22f,eyeY,eyeZ);Matrix.scaleM(model,0,eW,eH,eD);draw(vp,uM,uMVP,uC,1f,1f,1f,1f);
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,HEAD_S*0.22f,eyeY,eyeZ);Matrix.scaleM(model,0,eW,eH,eD);draw(vp,uM,uMVP,uC,1f,1f,1f,1f);
                  if(!(blink&&blinking)){
                      // Зрачки чёрные
                      float pS=HEAD_S*0.09f;
                      Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,-HEAD_S*0.22f,eyeY,eyeZ-0.01f);Matrix.scaleM(model,0,pS,pS,eD);draw(vp,uM,uMVP,uC,0f,0f,0f,1f);
                      Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,HEAD_S*0.22f,eyeY,eyeZ-0.01f);Matrix.scaleM(model,0,pS,pS,eD);draw(vp,uM,uMVP,uC,0f,0f,0f,1f);
                  }
              }

              private void drawEyesDima(float[]vp,int uM,int uMVP,int uC,float px,float footY,float pz,float rot,boolean blink){
                  float eyeY=LEG_H+TORSO_H+HEAD_S*0.55f;
                  float eyeZ=-HEAD_S*0.51f;
                  float eW=HEAD_S*0.15f;
                  float eH=blink&&blinking?(HEAD_S*0.03f):(HEAD_S*0.15f);
                  float eD=HEAD_S*0.07f;
                  // Белки
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,-HEAD_S*0.23f,eyeY,eyeZ);Matrix.scaleM(model,0,eW,eH,eD);draw(vp,uM,uMVP,uC,1f,1f,1f,1f);
                  Matrix.setIdentityM(model,0);Matrix.translateM(model,0,px,footY,pz);Matrix.rotateM(model,0,rot,0,1,0);Matrix.translateM(model,0,HEAD_S*0.23f,eyeY,eyeZ);Matrix.scaleM(model,0,eW,eH,eD);draw(vp,uM,uMVP,uC,1f,1f,1f,1f);
