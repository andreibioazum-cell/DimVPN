          import java.text.SimpleDateFormat;
          import java.util.ArrayList;
          import java.util.Date;
          import java.util.Locale;

          public class MessagesAdapter extends RecyclerView.Adapter<MessagesAdapter.VH> {
              private final ArrayList<Msg> items = new ArrayList<>();
              private final SimpleDateFormat fmt = new SimpleDateFormat("HH:mm", Locale.getDefault());

              public void setItems(ArrayList<Msg> list){
                  items.clear();
                  items.addAll(list);
                  notifyDataSetChanged();
              }

              public void add(Msg m){
                  items.add(m);
                  notifyItemInserted(items.size()-1);
              }

              @NonNull @Override
              public VH onCreateViewHolder(@NonNull ViewGroup parent, int viewType) {
                  ItemMessageBinding b = ItemMessageBinding.inflate(LayoutInflater.from(parent.getContext()), parent, false);
                  return new VH(b);
              }

              @Override
              public void onBindViewHolder(@NonNull VH h, int position) {
                  Msg m = items.get(position);
                  h.b.text.setText(m.text);
                  h.b.time.setText(fmt.format(new Date(m.time)));

                  FrameLayout.LayoutParams lp = (FrameLayout.LayoutParams) h.b.bubble.getLayoutParams();
                  if(m.outgoing){
                      lp.gravity = Gravity.END;
                      h.b.bubble.setBackgroundResource(R.drawable.bubble_out);
                  } else {
                      lp.gravity = Gravity.START;
                      h.b.bubble.setBackgroundResource(R.drawable.bubble_in);
                  }
                  h.b.bubble.setLayoutParams(lp);
              }

              @Override
              public int getItemCount() { return items.size(); }

              static class VH extends RecyclerView.ViewHolder{
                  ItemMessageBinding b;
                  VH(ItemMessageBinding b){
                      super(b.getRoot());
                      this.b = b;
                  }
              }
          }
