          cat > app/src/main/java/com/enjoer/game/MultiplayerClient.java << 'EOF'
          package com.enjoer.game;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Log;
          import java.net.URI;
          import java.util.concurrent.ExecutorService;
          import java.util.concurrent.Executors;
          import java.net.InetSocketAddress;
          import java.nio.ByteBuffer;
          import java.nio.channels.SocketChannel;
          import java.nio.charset.StandardCharsets;
          import java.security.MessageDigest;
          import java.util.Arrays;
          import java.util.Base64;
          import java.util.Random;
          import java.util.concurrent.ConcurrentHashMap;
          import java.util.concurrent.atomic.AtomicBoolean;

          /**
           * Простой WebSocket клиент без внешних библиотек.
           * Подключается к публичному WebSocket echo/relay серверу.
           * Использует wss://socketsbay.com/wss/v2/1/demo/ (публичный, работает с любого IP)
           */
          public class MultiplayerClient {
              private static final String TAG="MP";
              // Публичный WS сервер (echo+broadcast в одной комнате)
              private static final String HOST="socketsbay.com";
              private static final int PORT=443;
              private static final String PATH="/wss/v2/1/demo/";
              private static final boolean USE_SSL=true;

              public interface Listener {
                  void onConnected();
                  void onMessage(String msg);
                  void onDisconnected(String reason);
              }

              private final Listener listener;
              private final Handler mainHandler=new Handler(Looper.getMainLooper());
              private final ExecutorService exec=Executors.newSingleThreadExecutor();
              private final AtomicBoolean running=new AtomicBoolean(false);
              private javax.net.ssl.SSLSocket sslSocket;
              private java.io.OutputStream out;
              private java.io.InputStream in;
              public final String myId;

              public MultiplayerClient(Listener l){
                  this.listener=l;
                  this.myId="p"+new Random().nextInt(99999);
              }

              public void connect(){
                  running.set(true);
                  exec.execute(()->{
                      try{
                          javax.net.ssl.SSLSocketFactory sf=(javax.net.ssl.SSLSocketFactory)javax.net.ssl.SSLSocketFactory.getDefault();
                          sslSocket=(javax.net.ssl.SSLSocket)sf.createSocket(HOST,PORT);
                          sslSocket.setSoTimeout(15000);
                          sslSocket.startHandshake();
                          out=sslSocket.getOutputStream();
                          in=sslSocket.getInputStream();

                          // WebSocket handshake
                          String key=Base64.getEncoder().encodeToString(("enjoer"+System.currentTimeMillis()).getBytes());
                          String hs="GET "+PATH+" HTTP/1.1\r\n"+
                                  "Host: "+HOST+"\r\n"+
                                  "Upgrade: websocket\r\n"+
                                  "Connection: Upgrade\r\n"+
                                  "Sec-WebSocket-Key: "+key+"==\r\n"+
                                  "Sec-WebSocket-Version: 13\r\n\r\n";
                          out.write(hs.getBytes(StandardCharsets.UTF_8));
                          out.flush();

                          // Read HTTP response
                          StringBuilder resp=new StringBuilder();
                          int prev=-1;
                          while(true){
                              int c=in.read();
                              if(c<0)throw new Exception("Closed during handshake");
                              resp.append((char)c);
                              if(prev=='\n'&&c=='\r'){
                                  int n=in.read();
                                  if(n=='\n')break;
                                  resp.append((char)n);
                              }
                              prev=c;
                          }
                          if(!resp.toString().contains("101")){
                              throw new Exception("WS handshake failed: "+resp.toString().substring(0,Math.min(80,resp.length())));
                          }

                          sslSocket.setSoTimeout(30000);
                          mainHandler.post(listener::onConnected);

                          // Read loop
                          while(running.get()){
                              String msg=readFrame();
                              if(msg==null)break;
                              mainHandler.post(()->listener.onMessage(msg));
                          }
                      }catch(Exception e){
                          Log.w(TAG,"WS error: "+e.getMessage());
                          mainHandler.post(()->listener.onDisconnected(e.getMessage()));
                      }finally{
                          close();
                      }
                  });
              }

              public void send(String text){
                  exec.execute(()->{
                      try{
                          if(out==null)return;
                          byte[]payload=text.getBytes(StandardCharsets.UTF_8);
                          int len=payload.length;
                          byte[]mask=new byte[]{(byte)0x37,(byte)0x42,(byte)0x11,(byte)0x88};
                          byte[]frame;
                          if(len<=125){
                              frame=new byte[6+len];
                              frame[0]=(byte)0x81;frame[1]=(byte)(0x80|len);
                          } else if(len<=65535){
                              frame=new byte[8+len];
                              frame[0]=(byte)0x81;frame[1]=(byte)(0x80|126);
                              frame[2]=(byte)((len>>8)&0xFF);frame[3]=(byte)(len&0xFF);
                              System.arraycopy(mask,0,frame,4,4);
                              for(int i=0;i<len;i++)frame[8+i]=(byte)(payload[i]^mask[i%4]);
                              out.write(frame);out.flush();return;
                          } else {
                              frame=new byte[14+len];
                              frame[0]=(byte)0x81;frame[1]=(byte)(0x80|127);
                              for(int i=0;i<8;i++)frame[2+i]=(byte)((len>>(56-i*8))&0xFF);
                              System.arraycopy(mask,0,frame,10,4);
                              for(int i=0;i<len;i++)frame[14+i]=(byte)(payload[i]^mask[i%4]);
                              out.write(frame);out.flush();return;
                          }
                          System.arraycopy(mask,0,frame,2,4);
                          for(int i=0;i<len;i++)frame[6+i]=(byte)(payload[i]^mask[i%4]);
                          out.write(frame);out.flush();
                      }catch(Exception e){Log.w(TAG,"send err: "+e.getMessage());}
                  });
              }

              private String readFrame() throws Exception {
                  int b0=in.read();if(b0<0)return null;
                  int b1=in.read();if(b1<0)return null;
                  boolean masked=(b1&0x80)!=0;
                  int opcode=b0&0x0F;
                  long pLen=b1&0x7F;
                  if(pLen==126){pLen=((in.read()&0xFF)<<8)|(in.read()&0xFF);}
                  else if(pLen==127){pLen=0;for(int i=0;i<8;i++)pLen=(pLen<<8)|(in.read()&0xFF);}
                  byte[]msk=masked?new byte[]{(byte)in.read(),(byte)in.read(),(byte)in.read(),(byte)in.read()}:null;
                  byte[]data=new byte[(int)pLen];
                  int read=0;while(read<data.length){int r=in.read(data,read,data.length-read);if(r<0)return null;read+=r;}
                  if(masked)for(int i=0;i<data.length;i++)data[i]^=msk[i%4];
                  if(opcode==8)return null; // close
                  if(opcode==9){sendPong(data);return readFrame();} // ping
                  return new String(data,StandardCharsets.UTF_8);
              }

              private void sendPong(byte[]data) throws Exception {
                  byte[]frame=new byte[2+data.length];frame[0]=(byte)0x8A;frame[1]=(byte)data.length;
                  System.arraycopy(data,0,frame,2,data.length);out.write(frame);out.flush();
              }

              public void close(){
                  running.set(false);
                  try{if(sslSocket!=null)sslSocket.close();}catch(Exception ignored){}
              }
          }
