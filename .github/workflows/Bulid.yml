                  <item android:id="@+id/nav_chats" android:title="Чаты" />
                  <item android:id="@+id/nav_profile" android:title="Профиль" />
                  <item android:id="@+id/nav_settings" android:title="Настройки" />
                  <item android:id="@+id/nav_about" android:title="О приложении" />
                  <item android:id="@+id/nav_logout" android:title="Выйти" />
              </group>
          </menu>
          EOF

