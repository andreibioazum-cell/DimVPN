name: Enjoer_6.1_Stars_Fixed
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#101820"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_blue_filled.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_red.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#101820"/>
            <stroke android:width="2dp" android:color="#FF4444"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/btn_green.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="12dp"/>
            <solid android:color="#44FF44"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#CC101820"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_stick.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/panel_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
            <corners android:radius="8dp"/>
            <solid android:color="#E6101820"/>
            <stroke android:width="1dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/color_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#FFF"/>
            <stroke android:width="2dp" android:color="#00BFFF"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/crosshair.xml
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
            <item android:gravity="center">
              <shape android:shape="rectangle">
                <size android:width="22dp" android:height="2dp"/>
                <solid android:color="#FF00BFFF"/>
              </shape>
            </item>
            <item android:gravity="center">
              <shape android:shape="rectangle">
                <size android:width="2dp" android:height="22dp"/>
                <solid android:color="#FF00BFFF"/>
              </shape>
            </item>
            <item android:gravity="center">
              <shape android:shape="oval">
                <size android:width="4dp" android:height="4dp"/>
                <solid android:color="#FF7FDBFF"/>
              </shape>
            </item>
          </layer-list>
          EOF

          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#02050A">

              <android.opengl.GLSurfaceView
                  android:id="@+id/gl_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>

              <RelativeLayout
                  android:id="@+id/game_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone">

                  <View
                      android:id="@+id/look_zone"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"/>

                  <Button
                      android:id="@+id/btn_menu"
                      android:layout_width="50dp"
                      android:layout_height="50dp"
                      android:layout_margin="10dp"
                      android:text="≡"
                      android:textSize="24sp"
                      android:background="@drawable/btn_blue"
                      android:textColor="#00BFFF"/>

                  <FrameLayout
                      android:id="@+id/joy_base"
                      android:layout_width="140dp"
                      android:layout_height="140dp"
                      android:layout_alignParentBottom="true"
                      android:layout_alignParentLeft="true"
                      android:layout_marginLeft="40dp"
                      android:layout_marginBottom="40dp"
                      android:background="@drawable/joy_base"/>

                  <View
                      android:id="@+id/joy_stick"
                      android:layout_width="60dp"
                      android:layout_height="60dp"
                      android:layout_alignLeft="@id/joy_base"
                      android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="40dp"
                      android:layout_marginTop="40dp"
                      android:background="@drawable/joy_stick"/>

                  <Button
                      android:id="@+id/btn_jump"
                      android:layout_width="90dp"
                      android:layout_height="90dp"
                      android:layout_alignParentRight="true"
                      android:layout_alignParentBottom="true"
                      android:layout_marginRight="40dp"
                      android:layout_marginBottom="40dp"
                      android:text="▲"
                      android:textSize="28sp"
                      android:background="@drawable/btn_blue"
                      android:textColor="#FFF"/>

                  <View
                      android:id="@+id/crosshair_game"
                      android:layout_width="22dp"
                      android:layout_height="22dp"
                      android:layout_centerInParent="true"
                      android:background="@drawable/crosshair"/>
              </RelativeLayout>

              <RelativeLayout
                  android:id="@+id/engine_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone">

                  <View
                      android:id="@+id/engine_touch_zone"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"/>

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:layout_alignParentTop="true"
                      android:orientation="horizontal"
                      android:padding="10dp">

                      <Button
                          android:id="@+id/btn_engine_menu"
                          android:layout_width="50dp"
                          android:layout_height="50dp"
                          android:text="≡"
                          android:textSize="24sp"
                          android:background="@drawable/btn_blue"
                          android:textColor="#00BFFF"/>

                      <View
                          android:layout_width="0dp"
                          android:layout_height="1dp"
                          android:layout_weight="1"/>

                      <Button
                          android:id="@+id/btn_run_script"
                          android:layout_width="90dp"
                          android:layout_height="50dp"
                          android:text="Script"
                          android:textSize="12sp"
                          android:background="@drawable/btn_blue"
                          android:textColor="#00BFFF"/>

                      <Button
                          android:id="@+id/btn_save"
                          android:layout_width="90dp"
                          android:layout_height="50dp"
                          android:text="Export"
                          android:textSize="12sp"
                          android:background="@drawable/btn_blue"
                          android:textColor="#00BFFF"
                          android:layout_marginLeft="8dp"/>

                      <Button
                          android:id="@+id/btn_play_level"
                          android:layout_width="50dp"
                          android:layout_height="50dp"
                          android:text="▶"
                          android:textSize="20sp"
                          android:background="@drawable/btn_green"
                          android:textColor="#000"
                          android:layout_marginLeft="10dp"/>
                  </LinearLayout>

                  <FrameLayout
                      android:id="@+id/engine_joy_base"
                      android:layout_width="120dp"
                      android:layout_height="120dp"
                      android:layout_alignParentBottom="true"
                      android:layout_alignParentLeft="true"
                      android:layout_marginLeft="30dp"
                      android:layout_marginBottom="30dp"
                      android:background="@drawable/joy_base"/>

                  <View
                      android:id="@+id/engine_joy_stick"
                      android:layout_width="50dp"
                      android:layout_height="50dp"
                      android:layout_alignLeft="@id/engine_joy_base"
                      android:layout_alignTop="@id/engine_joy_base"
                      android:layout_marginLeft="35dp"
                      android:layout_marginTop="35dp"
                      android:background="@drawable/joy_stick"/>

                  <ScrollView
                      android:id="@+id/tools_scroll"
                      android:layout_width="210dp"
                      android:layout_height="match_parent"
                      android:layout_alignParentRight="true"
                      android:layout_marginRight="10dp"
                      android:layout_marginTop="70dp"
                      android:layout_marginBottom="10dp">

                      <LinearLayout
                          android:layout_width="match_parent"
                          android:layout_height="wrap_content"
                          android:orientation="vertical"
                          android:background="@drawable/panel_bg"
                          android:padding="10dp">

                          <TextView
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="Shape"
                              android:textColor="#FFFFFF"
                              android:textStyle="bold"/>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal"
                              android:layout_marginTop="6dp">

                              <Button
                                  android:id="@+id/shape_square"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="Square"
                                  android:background="@drawable/btn_blue_filled"
                                  android:textColor="#000"/>

                              <Button
                                  android:id="@+id/shape_rectangle"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="Rectangle"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"
                                  android:layout_marginLeft="4dp"/>
                          </LinearLayout>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal"
                              android:layout_marginTop="4dp">

                              <Button
                                  android:id="@+id/shape_circle"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="Circle"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"/>

                              <Button
                                  android:id="@+id/shape_triangle"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="Triangle"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"
                                  android:layout_marginLeft="4dp"/>
                          </LinearLayout>

                          <TextView
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="Size X / Y / Z"
                              android:textColor="#FFFFFF"
                              android:textStyle="bold"
                              android:layout_marginTop="10dp"/>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal"
                              android:layout_marginTop="6dp">

                              <Button
                                  android:id="@+id/size_x_minus"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="X-"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"/>

                              <Button
                                  android:id="@+id/size_x_plus"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="X+"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"
                                  android:layout_marginLeft="4dp"/>
                          </LinearLayout>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal"
                              android:layout_marginTop="4dp">

                              <Button
                                  android:id="@+id/size_y_minus"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="Y-"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"/>

                              <Button
                                  android:id="@+id/size_y_plus"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="Y+"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"
                                  android:layout_marginLeft="4dp"/>
                          </LinearLayout>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal"
                              android:layout_marginTop="4dp">

                              <Button
                                  android:id="@+id/size_z_minus"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="Z-"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"/>

                              <Button
                                  android:id="@+id/size_z_plus"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="Z+"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"
                                  android:layout_marginLeft="4dp"/>
                          </LinearLayout>

                          <TextView
                              android:id="@+id/txt_size_info"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:text="4 x 4 x 4"
                              android:textColor="#AEEBFF"
                              android:layout_marginTop="6dp"/>

                          <Button
                              android:id="@+id/btn_grid"
                              android:layout_width="match_parent"
                              android:layout_height="36dp"
                              android:text="Grid: On"
                              android:background="@drawable/btn_blue_filled"
                              android:textColor="#000"
                              android:layout_marginTop="8dp"/>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal"
                              android:gravity="center"
                              android:layout_marginTop="8dp">

                              <View
                                  android:id="@+id/color_red"
                                  android:layout_width="26dp"
                                  android:layout_height="26dp"
                                  android:background="@drawable/color_btn"
                                  android:backgroundTint="#FF2222"/>

                              <View
                                  android:id="@+id/color_green"
                                  android:layout_width="26dp"
                                  android:layout_height="26dp"
                                  android:background="@drawable/color_btn"
                                  android:backgroundTint="#22FF22"
                                  android:layout_marginLeft="5dp"/>

                              <View
                                  android:id="@+id/color_blue"
                                  android:layout_width="26dp"
                                  android:layout_height="26dp"
                                  android:background="@drawable/color_btn"
                                  android:backgroundTint="#2288FF"
                                  android:layout_marginLeft="5dp"/>

                              <View
                                  android:id="@+id/color_yellow"
                                  android:layout_width="26dp"
                                  android:layout_height="26dp"
                                  android:background="@drawable/color_btn"
                                  android:backgroundTint="#FFFF22"
                                  android:layout_marginLeft="5dp"/>

                              <View
                                  android:id="@+id/color_white"
                                  android:layout_width="26dp"
                                  android:layout_height="26dp"
                                  android:background="@drawable/color_btn"
                                  android:backgroundTint="#FFFFFF"
                                  android:layout_marginLeft="5dp"/>

                              <View
                                  android:id="@+id/color_black"
                                  android:layout_width="26dp"
                                  android:layout_height="26dp"
                                  android:background="@drawable/color_btn"
                                  android:backgroundTint="#000000"
                                  android:layout_marginLeft="5dp"/>
                          </LinearLayout>

                          <LinearLayout
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:orientation="horizontal"
                              android:layout_marginTop="8dp">

                              <Button
                                  android:id="@+id/dist_near"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="3"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"/>

                              <Button
                                  android:id="@+id/dist_mid"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="6"
                                  android:background="@drawable/btn_blue_filled"
                                  android:textColor="#000"
                                  android:layout_marginLeft="4dp"/>

                              <Button
                                  android:id="@+id/dist_far"
                                  android:layout_width="0dp"
                                  android:layout_height="36dp"
                                  android:layout_weight="1"
                                  android:text="12"
                                  android:background="@drawable/btn_blue"
                                  android:textColor="#00BFFF"
                                  android:layout_marginLeft="4dp"/>
                          </LinearLayout>

                          <Button
                              android:id="@+id/btn_place"
                              android:layout_width="match_parent"
                              android:layout_height="44dp"
                              android:text="+ Place"
                              android:background="@drawable/btn_blue_filled"
                              android:textColor="#000"
                              android:layout_marginTop="12dp"/>

                          <Button
                              android:id="@+id/btn_block_events"
                              android:layout_width="match_parent"
                              android:layout_height="36dp"
                              android:text="Events"
                              android:background="@drawable/btn_blue"
                              android:textColor="#00BFFF"
                              android:layout_marginTop="8dp"
                              android:visibility="gone"/>

                          <Button
                              android:id="@+id/btn_hide"
                              android:layout_width="match_parent"
                              android:layout_height="36dp"
                              android:text="Hide"
                              android:background="@drawable/btn_blue"
                              android:textColor="#00BFFF"
                              android:layout_marginTop="8dp"
                              android:visibility="gone"/>

                          <Button
                              android:id="@+id/btn_delete"
                              android:layout_width="match_parent"
                              android:layout_height="36dp"
                              android:text="Delete"
                              android:background="@drawable/btn_red"
                              android:textColor="#FF4444"
                              android:layout_marginTop="8dp"
                              android:visibility="gone"/>

                          <Button
                              android:id="@+id/btn_deselect"
                              android:layout_width="match_parent"
                              android:layout_height="36dp"
                              android:text="Deselect"
                              android:background="@drawable/btn_blue"
                              android:textColor="#00BFFF"
                              android:layout_marginTop="8dp"
                              android:visibility="gone"/>
                      </LinearLayout>
                  </ScrollView>

                  <LinearLayout
                      android:id="@+id/axis_panel"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_alignParentBottom="true"
                      android:layout_centerHorizontal="true"
                      android:layout_marginBottom="20dp"
                      android:orientation="horizontal"
                      android:background="@drawable/panel_bg"
                      android:padding="6dp"
                      android:visibility="gone">

                      <Button
                          android:id="@+id/axis_x_minus"
                          android:layout_width="44dp"
                          android:layout_height="44dp"
                          android:text="X-"
                          android:background="@drawable/btn_blue"
                          android:textColor="#FF4444"
                          android:textSize="12sp"/>

                      <Button
                          android:id="@+id/axis_x_plus"
                          android:layout_width="44dp"
                          android:layout_height="44dp"
                          android:text="X+"
                          android:background="@drawable/btn_blue"
                          android:textColor="#FF4444"
                          android:textSize="12sp"
                          android:layout_marginLeft="4dp"/>

                      <Button
                          android:id="@+id/axis_y_minus"
                          android:layout_width="44dp"
                          android:layout_height="44dp"
                          android:text="Y-"
                          android:background="@drawable/btn_blue"
                          android:textColor="#44FF44"
                          android:textSize="12sp"
                          android:layout_marginLeft="10dp"/>

                      <Button
                          android:id="@+id/axis_y_plus"
                          android:layout_width="44dp"
                          android:layout_height="44dp"
                          android:text="Y+"
                          android:background="@drawable/btn_blue"
                          android:textColor="#44FF44"
                          android:textSize="12sp"
                          android:layout_marginLeft="4dp"/>

                      <Button
                          android:id="@+id/axis_z_minus"
                          android:layout_width="44dp"
                          android:layout_height="44dp"
                          android:text="Z-"
                          android:background="@drawable/btn_blue"
                          android:textColor="#4488FF"
                          android:textSize="12sp"
                          android:layout_marginLeft="10dp"/>

                      <Button
                          android:id="@+id/axis_z_plus"
                          android:layout_width="44dp"
                          android:layout_height="44dp"
                          android:text="Z+"
                          android:background="@drawable/btn_blue"
                          android:textColor="#4488FF"
                          android:textSize="12sp"
                          android:layout_marginLeft="4dp"/>
                  </LinearLayout>

                  <View
                      android:id="@+id/crosshair_engine"
                      android:layout_width="22dp"
                      android:layout_height="22dp"
                      android:layout_centerInParent="true"
                      android:background="@drawable/crosshair"/>
              </RelativeLayout>

              <RelativeLayout
                  android:id="@+id/playtest_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone">

                  <View
                      android:id="@+id/playtest_look_zone"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"/>

                  <Button
                      android:id="@+id/btn_stop_playtest"
                      android:layout_width="50dp"
                      android:layout_height="50dp"
                      android:layout_margin="10dp"
                      android:text="■"
                      android:textSize="20sp"
                      android:background="@drawable/btn_red"
                      android:textColor="#FFF"/>

                  <FrameLayout
                      android:id="@+id/playtest_joy_base"
                      android:layout_width="140dp"
                      android:layout_height="140dp"
                      android:layout_alignParentBottom="true"
                      android:layout_alignParentLeft="true"
                      android:layout_marginLeft="40dp"
                      android:layout_marginBottom="40dp"
                      android:background="@drawable/joy_base"/>

                  <View
                      android:id="@+id/playtest_joy_stick"
                      android:layout_width="60dp"
                      android:layout_height="60dp"
                      android:layout_alignLeft="@id/playtest_joy_base"
                      android:layout_alignTop="@id/playtest_joy_base"
                      android:layout_marginLeft="40dp"
                      android:layout_marginTop="40dp"
                      android:background="@drawable/joy_stick"/>

                  <Button
                      android:id="@+id/btn_playtest_jump"
                      android:layout_width="90dp"
                      android:layout_height="90dp"
                      android:layout_alignParentRight="true"
                      android:layout_alignParentBottom="true"
                      android:layout_marginRight="40dp"
                      android:layout_marginBottom="40dp"
                      android:text="▲"
                      android:textSize="28sp"
                      android:background="@drawable/btn_blue"
                      android:textColor="#FFF"/>

                  <View
                      android:id="@+id/crosshair_playtest"
                      android:layout_width="22dp"
                      android:layout_height="22dp"
                      android:layout_centerInParent="true"
                      android:background="@drawable/crosshair"/>
              </RelativeLayout>

              <LinearLayout
                  android:id="@+id/menu_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:gravity="center"
                  android:background="#02050A">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="ENJOER"
                      android:textSize="52sp"
                      android:textColor="#00BFFF"
                      android:textStyle="bold"/>

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="ENGINE 6.1"
                      android:textSize="18sp"
                      android:textColor="#0088CC"
                      android:layout_marginBottom="80dp"/>

                  <Button
                      android:id="@+id/btn_play"
                      android:layout_width="240dp"
                      android:layout_height="60dp"
                      android:text="Play"
                      android:textSize="18sp"
                      android:textColor="#000"
