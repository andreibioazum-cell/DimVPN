                              ren.blocks.clear();
                              for(int i=0;i<arr.length();i++){JSONObject o=arr.getJSONObject(i);Block b=new Block((float)o.getDouble("x"),(float)o.getDouble("y"),(float)o.getDouble("z"),(float)o.getDouble("sx"),(float)o.getDouble("sy"),(float)o.getDouble("sz"),(float)o.getDouble("r"),(float)o.getDouble("g"),(float)o.getDouble("b"));b.hidden=o.optBoolean("hidden",false);b.shape=o.optString("shape","square");b.onStartScript=o.optString("onStartScript","");b.onTouchScript=o.optString("onTouchScript","");b.onTapScript=o.optString("onTapScript","");ren.blocks.add(b);}
                              ren.gridEnabled=root.optBoolean("gridEnabled",true);updGridBtn();
                              pendingMode=1;ren.isEngineMode=false;ren.isPlayingLevel=false;resetP();applyPack();
