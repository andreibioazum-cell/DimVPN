name: Native_Roblox_Core_Build
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Project Structure
        run: |
          mkdir -p app/src/main/java/com/dimos/engine
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          # 1. Настройки сборки
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dimos.engine'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dimos.nativegame"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-Native"
              }
          }
          EOF

          # 2. Манифест (Fullscreen)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Native Roblox" android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 3. Native 3D Renderer (Замена Three.js)
          cat <<EOF > app/src/main/java/com/dimos/engine/GameRenderer.java
          package com.dimos.engine;

          import android.opengl.GLES20;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] vPMatrix = new float[16];
              private final float[] projectionMatrix = new float[16];
              private final float[] viewMatrix = new float[16];

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig config) {
                  // Цвет неба (как в твоем CSS)
                  GLES20.glClearColor(0.1f, 0.16f, 0.29f, 1.0f);
              }

              @Override
              public void onSurfaceChanged(GL10 gl, int width, int height) {
                  GLES20.glViewport(0, 0, width, height);
                  float ratio = (float) width / height;
                  Matrix.frustumM(projectionMatrix, 0, -ratio, ratio, -1, 1, 3, 7);
              }

              @Override
              public void onDrawFrame(GL10 gl) {
                  GLES20.glClear(GLES20.GL_COLOR_BUFFER_BIT | GLES20.GL_DEPTH_BUFFER_BIT);
                  
                  // Установка камеры
                  Matrix.setLookAtM(viewMatrix, 0, 0, 0, -3, 0f, 0f, 0f, 0f, 1.0f, 0.0f);
                  Matrix.multiplyMM(vPMatrix, 0, projectionMatrix, 0, viewMatrix, 0);
              }
          }
          EOF

          # 4. Основная логика (MainActivity.java)
          cat <<EOF > app/src/main/java/com/dimos/engine/MainActivity.java
          package com.dimos.engine;

          import android.app.Activity;
          import android.opengl.GLSurfaceView;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;
          import android.graphics.Color;

          public class MainActivity extends Activity {
              private GLSurfaceView gLView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // Инициализация 3D Движка
                  gLView = new GLSurfaceView(this);
                  gLView.setEGLContextClientVersion(2);
                  gLView.setRenderer(new GameRenderer());

                  // Создаем UI поверх 3D мира (нативные кнопки вместо HTML)
                  FrameLayout layout = new FrameLayout(this);
                  layout.addView(gLView);

                  // Интерфейс: Джойстик (простая реализация)
                  Button joy = new Button(this);
                  joy.setText("🕹️");
                  FrameLayout.LayoutParams lp = new FrameLayout.LayoutParams(250, 250);
                  lp.gravity = Gravity.BOTTOM | Gravity.LEFT;
                  lp.leftMargin = 50;
                  lp.bottomMargin = 50;
                  layout.addView(joy, lp);

                  // Кнопка прыжка
                  Button jump = new Button(this);
                  jump.setText("UP");
                  FrameLayout.LayoutParams jlp = new FrameLayout.LayoutParams(200, 200);
                  jlp.gravity = Gravity.BOTTOM | Gravity.RIGHT;
                  jlp.rightMargin = 50;
                  jlp.bottomMargin = 50;
                  layout.addView(jump, jlp);
                  
                  // Статус бар (как ты просил)
                  TextView status = new TextView(this);
                  status.setText("DimOS Native Engine | Robux: 15,847 | Ping: 24ms");
                  status.setTextColor(Color.GREEN);
                  status.setBackgroundColor(Color.argb(150, 0, 0, 0));
                  layout.addView(status);

                  setContentView(layout);
              }
          }
          EOF

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload Native Game
        uses: actions/upload-artifact@v4
        with:
          name: Native-Roblox-Alpha
          path: app/build/outputs/apk/debug/*.apk
