                  if(line.equals("player.jump")){ren.vY=0.55f;return;}
                  if(line.equals("block.hide")){Block b=ren.getSelectedBlock();if(b!=null)b.hidden=true;return;}
                  if(line.equals("block.show")){Block b=ren.getSelectedBlock();if(b!=null)b.hidden=false;return;}
                  if(line.equals("block.delete")){ren.deleteSelected();return;}
                  if(line.startsWith("player.teleport(")&&line.endsWith(")")){String[]a=args(line);if(a.length!=3)throw new Exception("need 3 args");ren.pX=f(a[0]);ren.pY=f(a[1]);ren.pZ=f(a[2]);ren.vY=0;return;}
                  if(line.startsWith("phone.toast(")&&line.endsWith(")")){String[]a=argsT(line);host.toast(strip(a[0]));return;}
                  if(line.startsWith("block.color(")&&line.endsWith(")")){String[]a=args(line);if(a.length!=3)throw new Exception("need 3 args");Block b=ren.getSelectedBlock();if(b==null)throw new Exception("no block");b.r=c(f(a[0]));b.g=c(f(a[1]));b.b=c(f(a[2]));return;}
                  if(line.startsWith("block.move(")&&line.endsWith(")")){String[]a=args(line);if(a.length!=3)throw new Exception("need 3 args");ren.moveSelected(f(a[0]),f(a[1]),f(a[2]));return;}
                  if(line.startsWith("block.teleport(")&&line.endsWith(")")){String[]a=args(line);if(a.length!=3)throw new Exception("need 3 args");Block b=ren.getSelectedBlock();if(b==null)throw new Exception("no block");b.x=f(a[0]);b.y=f(a[1]);b.z=f(a[2]);return;}
                  if(line.startsWith("world.place(")&&line.endsWith(")")){String[]a=args(line);if(a.length!=9)throw new Exception("need 9 args");ren.blocks.add(new Block(f(a[0]),f(a[1]),f(a[2]),Math.max(.5f,f(a[3])),Math.max(.5f,f(a[4])),Math.max(.5f,f(a[5])),c(f(a[6])),c(f(a[7])),c(f(a[8]))));return;}
                  throw new Exception("Unknown: "+line);
              }
              private static String[]args(String l){int s=l.indexOf('('),e=l.lastIndexOf(')');String b=l.substring(s+1,e).trim();if(b.isEmpty())return new String[0];String[]a=b.split(",");for(int i=0;i<a.length;i++)a[i]=a[i].trim();return a;}
              private static String[]argsT(String l){int s=l.indexOf('('),e=l.lastIndexOf(')');String b=l.substring(s+1,e).trim();return new String[]{b};}
              private static String strip(String s){s=s.trim();if(s.length()>=2&&(s.startsWith("\"")||s.startsWith("'")))return s.substring(1,s.length()-1);return s;}
              private static float f(String s){return Float.parseFloat(s.trim());}
              private static float c(float v){return Math.max(0f,Math.min(1f,v));}
