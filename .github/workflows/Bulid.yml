                  }
              }

              private void draw(float[]vp,int uM,int uMVP,int uC,float r,float g,float b,float a){
                  GLES30.glUniformMatrix4fv(uM,1,false,model,0);
                  float[]res=new float[16];Matrix.multiplyMM(res,0,vp,0,model,0);
                  GLES30.glUniformMatrix4fv(uMVP,1,false,res,0);
                  GLES30.glUniform4f(uC,r,g,b,a);
                  for(int i=0;i<6;i++)GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }

              private int mkProg(String v,String f){int p=GLES30.glCreateProgram();GLES30.glAttachShader(p,mkSh(GLES30.GL_VERTEX_SHADER,v));GLES30.glAttachShader(p,mkSh(GLES30.GL_FRAGMENT_SHADER,f));GLES30.glLinkProgram(p);return p;}
              private int mkSh(int t,String s){int sh=GLES30.glCreateShader(t);GLES30.glShaderSource(sh,s);GLES30.glCompileShader(sh);return sh;}
          }
