                  btnApply.setLayoutParams(new LinearLayout.LayoutParams(0,dp(50),1f));
                  btnApply.setOnClickListener(v->applyChanges());
                  bot.addView(btnApply);
                  root.addView(bot);

                  buildTab();

                  // Вращение превью по свайпу
                  float[]lastX={0};
                  glView.setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN)lastX[0]=e.getX();
                      else if(e.getAction()==MotionEvent.ACTION_MOVE){previewRen.rotY+=(e.getX()-lastX[0])*.8f;lastX[0]=e.getX();}
                      return true;
                  });
              }

              private void applyChanges(){
                  int cost=0;
                  if(pendingSkin!=PlayerPrefs.getSkinColor()&&!PlayerPrefs.isSkinOwned(pendingSkin))cost+=SKIN_PRICES[pendingSkin];
                  if(pendingTorso!=PlayerPrefs.getTorsoColor()&&!PlayerPrefs.isTorsoOwned(pendingTorso))cost+=TORSO_PRICES[pendingTorso];
                  if(pendingLegs!=PlayerPrefs.getLegsColor()&&!PlayerPrefs.isLegsOwned(pendingLegs))cost+=LEGS_PRICES[pendingLegs];
                  if(pendingFace!=PlayerPrefs.getFaceType()&&!PlayerPrefs.isFaceOwned(pendingFace))cost+=FACE_PRICES[pendingFace];
                  if(pendingAnim!=PlayerPrefs.getAnimPack()&&!PlayerPrefs.isAnimPackOwned(pendingAnim))cost+=ANIM_PRICES[pendingAnim];
                  if(cost>PlayerPrefs.getRigids()){Toast.makeText(this,"Нужно "+cost+" Rigid's!",Toast.LENGTH_SHORT).show();return;}
                  PlayerPrefs.addRigids(-cost);
                  if(!PlayerPrefs.isSkinOwned(pendingSkin))PlayerPrefs.setSkinOwned(pendingSkin);
                  if(!PlayerPrefs.isTorsoOwned(pendingTorso))PlayerPrefs.setTorsoOwned(pendingTorso);
                  if(!PlayerPrefs.isLegsOwned(pendingLegs))PlayerPrefs.setLegsOwned(pendingLegs);
                  if(!PlayerPrefs.isFaceOwned(pendingFace))PlayerPrefs.setFaceOwned(pendingFace);
                  if(!PlayerPrefs.isAnimPackOwned(pendingAnim))PlayerPrefs.setAnimPackOwned(pendingAnim);
                  PlayerPrefs.setSkinColor(pendingSkin);PlayerPrefs.setTorsoColor(pendingTorso);
                  PlayerPrefs.setLegsColor(pendingLegs);PlayerPrefs.setFaceType(pendingFace);
                  PlayerPrefs.setAnimPack(pendingAnim);
                  updRigids();buildTab();
                  Toast.makeText(this,"Применено!",Toast.LENGTH_SHORT).show();
              }

              private void updTabBtns(Button[]btns,int sel){
                  for(int i=0;i<btns.length;i++){
                      if(i==sel){btns[i].setBackgroundResource(R.drawable.tab_selected);btns[i].setTextColor(0xFF000000);}
                      else{btns[i].setBackgroundResource(R.drawable.tab_normal);btns[i].setTextColor(0xFF00BFFF);}
                  }
              }

              private void updRigids(){txtRigids.setText("💰 "+PlayerPrefs.getRigids());}

              private void buildTab(){
                  tabContent.removeAllViews();
                  // Обновляем превью
                  glView.queueEvent(()->{
                      previewRen.skinColor=pendingSkin;previewRen.torsoColor=pendingTorso;
                      previewRen.legsColor=pendingLegs;previewRen.faceType=pendingFace;previewRen.animPack=pendingAnim;
                  });
                  if(currentTab==0)buildColorTab("Skin Color",SKIN_PRICES,pendingSkin,PlayerPrefs::isSkinOwned,i->{pendingSkin=i;buildTab();});
                  else if(currentTab==1)buildColorTab("Torso Color",TORSO_PRICES,pendingTorso,PlayerPrefs::isTorsoOwned,i->{pendingTorso=i;buildTab();});
                  else if(currentTab==2)buildColorTab("Legs Color",LEGS_PRICES,pendingLegs,PlayerPrefs::isLegsOwned,i->{pendingLegs=i;buildTab();});
                  else if(currentTab==3)buildFaceTab();
                  else buildAnimTab();
              }

