name: L-OS_Polyglot_VM
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/los/vm
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # --- 1. ДИЗАЙН: ТЕРМИНАЛЬНЫЕ КНОПКИ ---
          cat <<EOF > app/src/main/res/drawable/btn_v.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#000"/>
            <stroke android:width="2dp" android:color="#0F0"/>
            <padding android:top="20dp" android:bottom="20dp"/>
          </shape>
          EOF

          # --- 2. ИНТЕРФЕЙС: УНИКАЛЬНЫЙ ВЕРТИКАЛЬНЫЙ СТЕК ---
          cat <<'LAYOUT' > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#000" android:orientation="vertical" android:padding="15dp">

              <Button android:id="@+id/sys_top"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:background="@drawable/btn_v" android:text="[ SYSTEM_CORE: ACTIVE ]"
                  android:textColor="#0F0" android:textStyle="bold" android:fontFamily="monospace"/>

              <ScrollView android:layout_width="match_parent" android:layout_height="0dp"
                  android:layout_weight="1" android:layout_marginTop="10dp">
                  <LinearLayout android:id="@+id/app_stack"
                      android:layout_width="match_parent" android:layout_height="wrap_content"
                      android:orientation="vertical"/>
              </ScrollView>

              <Button android:id="@+id/btn_template"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:background="@drawable/btn_v" android:text="> GET_PYTHON_TEMPLATE"
                  android:textColor="#0F0" android:layout_marginBottom="10dp"/>

              <Button android:id="@+id/btn_import"
                  android:layout_width="match_parent" android:layout_height="wrap_content"
                  android:background="@drawable/btn_v" android:text="> IMPORT_LAPP_PACKAGE"
                  android:textColor="#0F0"/>

              <android.webkit.WebView android:id="@+id/vm_runtime"
                  android:layout_width="match_parent" android:layout_height="match_parent"
                  android:visibility="gone"/>
          </LinearLayout>
          LAYOUT

          # --- 3. ЯДРО ДИСПЕТЧЕР ЯЗЫКОВ (Java) ---
          cat <<'JAVA' > app/src/main/java/com/los/vm/MainActivity.java
          package com.los.vm;

          import android.os.Bundle;
          import android.view.View;
          import android.webkit.WebView;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import org.json.JSONObject;
          import java.io.File;

          public class MainActivity extends AppCompatActivity {
              private LinearLayout appStack;
              private WebView runtime;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  appStack = findViewById(R.id.app_stack);
                  runtime = findViewById(R.id.vm_runtime);
                  runtime.getSettings().setJavaScriptEnabled(true);
                  runtime.addJavascriptInterface(new PolyglotBridge(this), "LOS");

                  // Создаем тестовое Python приложение
                  addAppButton("SPACE_COLONY (Python)", "python");
                  addAppButton("DPI_BYPASS_UTIL (JS)", "javascript");
              }

              private void addAppButton(String name, String lang) {
                  Button b = new Button(this);
                  b.setText("> EXEC: " + name.toUpperCase());
                  b.setTextColor(0xFF00FF00);
                  b.setBackgroundResource(R.drawable.btn_v);
                  b.setOnClickListener(v -> runPolyglotApp(name, lang));
                  LinearLayout.LayoutParams lp = new LinearLayout.LayoutParams(-1, -2);
                  lp.setMargins(0,0,0,15);
                  b.setLayoutParams(lp);
                  appStack.addView(b);
              }

              private void runPolyglotApp(String name, String lang) {
                  appStack.setVisibility(View.GONE);
                  findViewById(R.id.sys_top).setVisibility(View.GONE);
                  runtime.setVisibility(View.VISIBLE);

                  String bootCode = "";
                  if(lang.equals("python")) {
                      // Подключаем Brython для исполнения Python прямо в виртуалке
                      bootCode = "<html><head><script src='https://cdn.jsdelivr.net/npm/brython@3/brython.min.js'></script></head>" +
                                 "<body onload='brython()'><script type='text/python'>" +
                                 "from browser import window\n" +
                                 "window.LOS.toast('Python Engine Active!')\n" +
                                 "print('Python Game Running...')</script></body></html>";
                  } else {
                      bootCode = "<html><body style='background:#000;color:#0f0'><h1>JS Runtime</h1>" +
                                 "<button onclick='LOS.exit()'>STOP</button></body></html>";
                  }
                  runtime.loadData(bootCode, "text/html", "UTF-8");
              }

              public void closeApp() {
                  runtime.setVisibility(View.GONE);
                  appStack.setVisibility(View.VISIBLE);
                  findViewById(R.id.sys_top).setVisibility(View.VISIBLE);
              }
          }
          JAVA

          # --- 4. BRIDGE API ---
          cat <<'JAVA' > app/src/main/java/com/los/vm/PolyglotBridge.java
          package com.los.vm;
          import android.webkit.JavascriptInterface;
          import android.widget.Toast;

          public class PolyglotBridge {
              MainActivity a;
              public PolyglotBridge(MainActivity activity) { this.a = activity; }
              
              @JavascriptInterface
              public void toast(String m) { Toast.makeText(a, m, Toast.LENGTH_SHORT).show(); }
              
              @JavascriptInterface
              public void exit() { a.runOnUiThread(() -> a.closeApp()); }
          }
          JAVA

          # --- 5. BUILD SCRIPTS ---
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.los.vm'; compileSdk 34
              defaultConfig { applicationId "com.los.vm"; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF
          echo "include ':app'" > settings.gradle
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="L-OS Polyglot" android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/>
                      <category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: L-OS-Polyglot-VM
          path: app/build/outputs/apk/debug/app-debug.apk
