name: Azum_Game_Forge_1.20.1_Build
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4G"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1'

      - name: Initialize Forge Project
        run: |
          mkdir -p src/main/java/com/dimos/mod/item
          mkdir -p src/main/resources/assets/dimos/lang
          mkdir -p src/main/resources/assets/dimos/models/item
          mkdir -p src/main/resources/data/dimos/recipes
          mkdir -p src/main/resources/META-INF

          # 1. Build.gradle (Forge 1.20.1)
          cat <<EOF > build.gradle
          buildscript {
              repositories { maven { url = 'https://maven.minecraftforge.net' }; mavenCentral() }
              dependencies { classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle', version: '6.0.+', changing: true }
          }
          apply plugin: 'net.minecraftforge.gradle'
          version = '1.0.0'
          group = 'com.dimos.mod'
          archivesBaseName = 'azumgame'
          java.toolchain.languageVersion = JavaLanguageVersion.of(17)
          minecraft {
              mappings channel: 'official', version: '1.20.1'
              runs { client { workingDirectory project.file('run') } }
          }
          repositories { mavenCentral() }
          dependencies {
              minecraft 'net.minecraftforge:forge:1.20.1-47.2.0'
          }
          EOF

          # 2. Мод-файл (mods.toml)
          cat <<EOF > src/main/resources/META-INF/mods.toml
          modLoader="javafml"
          loaderVersion="[47,)"
          license="MIT"
          [[mods]]
          modId="dimos"
          version="1.0.0"
          displayName="Azum Game Mod"
          authors="Dimos"
          description="Weapons from Azum Game"
          EOF

          # 3. AzumKnifeItem.java (Forge)
          cat <<EOF > src/main/java/com/dimos/mod/item/AzumKnifeItem.java
          package com.dimos.mod.item;
          import com.dimos.mod.DimMod;
          import net.minecraft.world.entity.LivingEntity;
          import net.minecraft.world.entity.player.PlayerEntity;
          import net.minecraft.world.item.ItemStack;
          import net.minecraft.world.item.SwordItem;
          import net.minecraft.world.item.Tiers;
          public class AzumKnifeItem extends SwordItem {
              public AzumKnifeItem() { super(Tiers.IRON, 3, -2.4f, new Properties()); }
              @Override
              public boolean hurtEnemy(ItemStack stack, LivingEntity target, LivingEntity attacker) {
                  if (attacker instanceof PlayerEntity player && !target.isAlive()) {
                      DimMod.giveSecondLife(player);
                      stack.setCount(0);
                  }
                  return super.hurtEnemy(stack, target, attacker);
              }
          }
          EOF

          # 4. NastyaLaserItem.java (Forge)
          cat <<EOF > src/main/java/com/dimos/mod/item/NastyaLaserItem.java
          package com.dimos.mod.item;
          import net.minecraft.core.particles.DustParticleOptions;
          import net.minecraft.server.level.ServerLevel;
          import net.minecraft.sounds.SoundEvents;
          import net.minecraft.sounds.SoundSource;
          import net.minecraft.world.InteractionHand;
          import net.minecraft.world.InteractionResultHolder;
          import net.minecraft.world.entity.LivingEntity;
          import net.minecraft.world.entity.player.PlayerEntity;
          import net.minecraft.world.item.Item;
          import net.minecraft.world.item.ItemStack;
          import net.minecraft.world.level.Level;
          import net.minecraft.world.phys.AABB;
          import net.minecraft.world.phys.Vec3;
          import org.joml.Vector3f;
          import java.util.Random;
          public class NastyaLaserItem extends Item {
              public NastyaLaserItem() { super(new Properties().stacksTo(1)); }
              private final Random rnd = new Random();
              @Override
              public InteractionResultHolder<ItemStack> use(Level world, PlayerEntity user, InteractionHand hand) {
                  ItemStack stack = user.getItemInHand(hand);
                  if (world.isClientSide) return InteractionResultHolder.success(stack);
                  double chance = rnd.nextDouble();
                  if (chance < 0.05) { world.playSound(null, user.getX(), user.getY(), user.getZ(), SoundEvents.DISPENSER_FAIL, SoundSource.PLAYERS, 1f, 1.2f); }
                  else if (chance < 0.15) { 
                      world.explode(user, user.getX(), user.getY(), user.getZ(), 0f, Level.ExplosionInteraction.NONE);
                      user.hurt(world.damageSources().explosion(null, null), 6f);
                      stack.shrink(1);
                  } else {
                      Vec3 start = user.getEyePosition();
                      Vec3 look = user.getLookAngle();
                      DustParticleOptions red = new DustParticleOptions(new Vector3f(1f, 0f, 0f), 1.5f);
                      for (int i = 1; i < 25; i++) {
                          Vec3 p = start.add(look.scale(i));
                          ((ServerLevel)world).sendParticles(red, p.x, p.y, p.z, 4, 0.05, 0.05, 0.05, 0);
                          AABB box = new AABB(p.x-0.5, p.y-0.5, p.z-0.5, p.x+0.5, p.y+0.5, p.z+0.5);
                          world.getEntities(user, box).forEach(e -> { if (e instanceof LivingEntity le) le.hurt(world.damageSources().playerAttack(user), 4f); });
                      }
                      world.playSound(null, user.getX(), user.getY(), user.getZ(), SoundEvents.ZOMBIE_VILLAGER_CONVERTED, SoundSource.PLAYERS, 0.6f, 2f);
                  }
                  return InteractionResultHolder.consume(stack);
              }
          }
          EOF

          # 5. DimMod.java (Глобальная логика Forge)
          cat <<EOF > src/main/java/com/dimos/mod/DimMod.java
          package com.dimos.mod;
          import com.dimos.mod.item.*;
          import net.minecraft.core.registries.Registries;
          import net.minecraft.server.level.ServerLevel;
          import net.minecraft.world.entity.EntityType;
          import net.minecraft.world.entity.LightningBolt;
          import net.minecraft.world.entity.player.PlayerEntity;
          import net.minecraft.world.item.CreativeModeTabs;
          import net.minecraft.world.item.Item;
          import net.minecraft.core.particles.ParticleTypes;
          import net.minecraftforge.common.MinecraftForge;
          import net.minecraftforge.event.BuildCreativeModeTabContentsEvent;
          import net.minecraftforge.event.TickEvent;
          import net.minecraftforge.event.entity.living.LivingDeathEvent;
          import net.minecraftforge.eventbus.api.IEventBus;
          import net.minecraftforge.fml.common.Mod;
          import net.minecraftforge.fml.javafmlmod.FMLJavaModLoadingContext;
          import net.minecraftforge.registries.DeferredRegister;
          import net.minecraftforge.registries.ForgeRegistries;
          import net.minecraftforge.registries.RegistryObject;
          import java.util.HashSet;
          import java.util.Set;
          import java.util.UUID;

          @Mod("dimos")
          public class DimMod {
              public static final DeferredRegister<Item> ITEMS = DeferredRegister.create(ForgeRegistries.ITEMS, "dimos");
              public static final RegistryObject<Item> AZUM_KNIFE = ITEMS.register("azum_knife", AzumKnifeItem::new);
              public static final RegistryObject<Item> NASTYA_LASER = ITEMS.register("nastya_laser", NastyaLaserItem::new);
              public static final RegistryObject<Item> WATCH = ITEMS.register("codecracker_watch", () -> new Item(new Item.Properties().stacksTo(1)) {
                  @Override
                  public net.minecraft.world.InteractionResultHolder<net.minecraft.world.item.ItemStack> use(net.minecraft.world.level.Level w, PlayerEntity p, net.minecraft.world.InteractionHand h) {
                      if (!w.isClientSide) { freezeTicks = 300; p.getCooldowns().addCooldown(this, 600); }
                      return net.minecraft.world.InteractionResultHolder.success(p.getItemInHand(h));
                  }
              });

              private static final Set<UUID> LIFE = new HashSet<>();
              private static int freezeTicks = 0;

              public DimMod() {
                  IEventBus bus = FMLJavaModLoadingContext.get().getModEventBus();
                  ITEMS.register(bus);
                  bus.addListener(this::addCreative);
                  MinecraftForge.EVENT_BUS.register(this);
              }

              private void addCreative(BuildCreativeModeTabContentsEvent e) {
                  if (e.getTabKey() == CreativeModeTabs.COMBAT) { e.accept(AZUM_KNIFE); e.accept(NASTYA_LASER); e.accept(WATCH); }
              }

              public static void giveSecondLife(PlayerEntity p) { LIFE.add(p.getUUID()); }

              @net.minecraftforge.eventbus.api.SubscribeEvent
              public void onDeath(LivingDeathEvent e) {
                  if (e.getEntity() instanceof PlayerEntity p && LIFE.contains(p.getUUID())) {
                      LIFE.remove(p.getUUID());
                      e.setCanceled(true);
                      p.setHealth(p.getMaxHealth());
                      ServerLevel sl = (ServerLevel) p.level();
                      LightningBolt lb = EntityType.LIGHTNING_BOLT.create(sl);
                      if (lb != null) { lb.moveTo(p.position()); sl.addFreshEntity(lb); }
                      sl.sendParticles(ParticleTypes.TOTEM_OF_UNDYING, p.getX(), p.getY(), p.getZ(), 50, 0.5, 0.5, 0.5, 0.1);
                  }
              }

              @net.minecraftforge.eventbus.api.SubscribeEvent
              public void onTick(TickEvent.LevelTickEvent e) {
                  if (e.phase == TickEvent.Phase.END && freezeTicks > 0) {
                      freezeTicks--;
                      e.level.getEntities((net.minecraft.world.entity.Entity)null, new net.minecraft.world.phys.AABB(-1000,-1000,-1000,1000,1000,1000), ent -> !(ent instanceof PlayerEntity))
                      .forEach(ent -> { ent.setDeltaMovement(0,0,0); if (ent instanceof net.minecraft.world.entity.Mob mob) mob.setNoAi(true); });
                  } else if (freezeTicks == 0) {
                      e.level.getEntities((net.minecraft.world.entity.Entity)null, new net.minecraft.world.phys.AABB(-1000,-1000,-1000,1000,1000,1000), ent -> ent instanceof net.minecraft.world.entity.Mob mob)
                      .forEach(ent -> ((net.minecraft.world.entity.Mob)ent).setNoAi(false));
                      freezeTicks = -1;
                  }
              }
          }
          EOF

          # 6. Рецепты и ресурсы (Forge)
          cat <<EOF > src/main/resources/data/dimos/recipes/nastya_laser.json
          { "type": "minecraft:crafting_shaped", "pattern": ["   ", " SC", "   "], "key": { "S": {"item": "minecraft:stone"}, "C": {"item": "minecraft:coal"} }, "result": {"item": "dimos:nastya_laser"} }
          EOF
          cat <<EOF > src/main/resources/data/dimos/recipes/watch.json
          { "type": "minecraft:crafting_shaped", "pattern": [" G ", "GRG", " G "], "key": { "G": {"item": "minecraft:gold_ingot"}, "R": {"item": "minecraft:redstone"} }, "result": {"item": "dimos:codecracker_watch"} }
          EOF
          cat <<EOF > src/main/resources/data/dimos/recipes/azum_knife.json
          { "type": "minecraft:crafting_shaped", "pattern": ["  I", " I ", "S  "], "key": { "I": {"item": "minecraft:iron_ingot"}, "S": {"item": "minecraft:stick"} }, "result": {"item": "dimos:azum_knife"} }
          EOF

          echo '{"parent":"minecraft:item/handheld","textures":{"layer0":"minecraft:item/iron_sword"}}' > src/main/resources/assets/dimos/models/item/azum_knife.json
          echo '{"parent":"minecraft:item/handheld","textures":{"layer0":"minecraft:item/crossbow"}}' > src/main/resources/assets/dimos/models/item/nastya_laser.json
          echo '{"parent":"minecraft:item/generated","textures":{"layer0":"minecraft:item/clock"}}' > src/main/resources/assets/dimos/models/item/codecracker_watch.json
          echo '{"item.dimos.azum_knife":"Нож Азума","item.dimos.nastya_laser":"Лазер Насти","item.dimos.codecracker_watch":"Часы CodeCracker"}' > src/main/resources/assets/dimos/lang/ru_ru.json
          echo "rootProject.name = 'dimos-mod'" > settings.gradle

      - name: Build with Gradle
        run: gradle build --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzumGame-Forge-1.20.1
          path: build/libs/*.jar
