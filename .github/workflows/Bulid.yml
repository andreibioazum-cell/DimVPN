                      ren.isEngineMode=false;ren.isPlayingLevel=false;
                      ren.loadBuiltInLevel();
                      resetP();ren.selectedIndex=-1;
                      loadCustomization();
                      menuUI.setVisibility(View.GONE);
                      gameUI.setVisibility(View.VISIBLE);
                      engineUI.setVisibility(View.GONE);
                      playtestUI.setVisibility(View.GONE);
                      ren.runStartScripts();
                      startRigidTimer();
                      handler.postDelayed(()->setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE),50);
                  });

                  findViewById(R.id.btn_engine).setOnClickListener(v->{
                      pendingMode=2;
                      ren.isEngineMode=true;ren.isPlayingLevel=false;
                      ren.blocks.clear();
                      ren.pX=0;ren.pY=20;ren.pZ=35;
                      ren.selectedIndex=-1;
                      menuUI.setVisibility(View.GONE);
                      gameUI.setVisibility(View.GONE);
                      engineUI.setVisibility(View.VISIBLE);
                      playtestUI.setVisibility(View.GONE);
                      updAxis();updSizeInfo();updGridButton();
                      handler.postDelayed(()->setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE),50);
                  });

                  findViewById(R.id.btn_customize).setOnClickListener(v->{
                      Intent i=new Intent(this,CustomizeActivity.class);
                      startActivity(i);
                  });

                  findViewById(R.id.btn_load_file).setOnClickListener(v->{
                      Intent i=new Intent(Intent.ACTION_OPEN_DOCUMENT);
                      i.addCategory(Intent.CATEGORY_OPENABLE);
                      i.setType("*/*");
                      loadLauncher.launch(i);
                  });

                  View.OnClickListener back=v->{
                      pendingMode=0;
                      ren.isPlayingLevel=false;
                      stopRigidTimer();
                      gameUI.setVisibility(View.GONE);
                      engineUI.setVisibility(View.GONE);
                      playtestUI.setVisibility(View.GONE);
                      menuUI.setVisibility(View.VISIBLE);
                      updRigidDisplay();
                      setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_PORTRAIT);
                  };
                  findViewById(R.id.btn_menu).setOnClickListener(back);
                  findViewById(R.id.btn_engine_menu).setOnClickListener(back);

                  findViewById(R.id.btn_play_level).setOnClickListener(v->{
                      ren.isPlayingLevel=true;
                      resetP();ren.selectedIndex=-1;
                      loadCustomization();
                      engineUI.setVisibility(View.GONE);
                      playtestUI.setVisibility(View.VISIBLE);
                      ren.runStartScripts();
                  });

                  findViewById(R.id.btn_stop_playtest).setOnClickListener(v->{
                      ren.isPlayingLevel=false;
                      ren.pX=0;ren.pY=20;ren.pZ=35;
                      playtestUI.setVisibility(View.GONE);
                      engineUI.setVisibility(View.VISIBLE);
                      updAxis();
                  });

                  findViewById(R.id.btn_save).setOnClickListener(v->{
                      Intent i=new Intent(Intent.ACTION_CREATE_DOCUMENT);
                      i.addCategory(Intent.CATEGORY_OPENABLE);
                      i.setType("application/json");
                      i.putExtra(Intent.EXTRA_TITLE,"level.json");
                      saveLauncher.launch(i);
                  });

                  findViewById(R.id.btn_run_script).setOnClickListener(v->showScriptDialog());

                  btnGrid.setOnClickListener(v->{ ren.gridEnabled=!ren.gridEnabled; updGridButton(); });

                  // Jump buttons: game mode = salto, playtest = salto
                  findViewById(R.id.btn_jump).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN) ren.doSaltoJump();
                      return true;
                  });
                  findViewById(R.id.btn_playtest_jump).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN) ren.doSaltoJump();
                      return true;
                  });

                  findViewById(R.id.btn_place).setOnClickListener(v->{ if(ren.selectedIndex<0)ren.placeBlock(); });
                  btnDelete.setOnClickListener(v->{ ren.deleteSelected();updAxis(); });
                  btnDeselect.setOnClickListener(v->{ ren.selectedIndex=-1;updAxis(); });
                  btnHide.setOnClickListener(v->{ if(ren.selectedIndex>=0){ren.toggleHideSelected();updAxis();} });
                  btnEvents.setOnClickListener(v->showBlockEventsDialog());

                  axisBtn(R.id.axis_x_plus,1,0,0);axisBtn(R.id.axis_x_minus,-1,0,0);
                  axisBtn(R.id.axis_y_plus,0,1,0);axisBtn(R.id.axis_y_minus,0,-1,0);
                  axisBtn(R.id.axis_z_plus,0,0,1);axisBtn(R.id.axis_z_minus,0,0,-1);

                  shapeBtn=new Button[]{findViewById(R.id.shape_square),findViewById(R.id.shape_rectangle),findViewById(R.id.shape_triangle)};
                  findViewById(R.id.shape_square).setOnClickListener(v->setShapePreset(4,4,4,0));
                  findViewById(R.id.shape_rectangle).setOnClickListener(v->setShapePreset(8,4,4,1));
                  findViewById(R.id.shape_triangle).setOnClickListener(v->setShapePreset(4,4,4,2));

                  findViewById(R.id.size_x_minus).setOnClickListener(v->{ren.blockSX=Math.max(0.5f,ren.blockSX-0.5f);updSizeInfo();});
                  findViewById(R.id.size_x_plus).setOnClickListener(v->{ren.blockSX+=0.5f;updSizeInfo();});
                  findViewById(R.id.size_y_minus).setOnClickListener(v->{ren.blockSY=Math.max(0.5f,ren.blockSY-0.5f);updSizeInfo();});
                  findViewById(R.id.size_y_plus).setOnClickListener(v->{ren.blockSY+=0.5f;updSizeInfo();});
                  findViewById(R.id.size_z_minus).setOnClickListener(v->{ren.blockSZ=Math.max(0.5f,ren.blockSZ-0.5f);updSizeInfo();});
                  findViewById(R.id.size_z_plus).setOnClickListener(v->{ren.blockSZ+=0.5f;updSizeInfo();});

                  distBtn=new Button[]{findViewById(R.id.dist_near),findViewById(R.id.dist_mid),findViewById(R.id.dist_far)};
                  float[] dists={3f,6f,12f};
                  for(int i=0;i<3;i++){final int idx=i;distBtn[i].setOnClickListener(v->{ren.placeDist=dists[idx];updBtnGrp(distBtn,idx);});}

                  colorBtn=new View[]{
                      findViewById(R.id.color_red),findViewById(R.id.color_green),
                      findViewById(R.id.color_blue),findViewById(R.id.color_yellow),
                      findViewById(R.id.color_white),findViewById(R.id.color_black)
                  };
                  float[][] colors={{1f,.2f,.2f},{.2f,1f,.2f},{.2f,.5f,1f},{1f,1f,.2f},{1f,1f,1f},{0f,0f,0f}};
                  for(int i=0;i<colors.length;i++){
                      final int idx=i;
                      colorBtn[i].setOnClickListener(v->{
                          ren.blockR=colors[idx][0];ren.blockG=colors[idx][1];ren.blockB=colors[idx][2];
                          if(ren.selectedIndex>=0&&ren.selectedIndex<ren.blocks.size()){
                              Block b=ren.blocks.get(ren.selectedIndex);
                              b.r=ren.blockR;b.g=ren.blockG;b.b=ren.blockB;
                          }
                          updColSel(idx);
                      });
                  }

                  setupJoy(findViewById(R.id.joy_base),findViewById(R.id.joy_stick));
                  setupJoy(findViewById(R.id.engine_joy_base),findViewById(R.id.engine_joy_stick));
                  setupJoy(findViewById(R.id.playtest_joy_base),findViewById(R.id.playtest_joy_stick));
                  setupLook(findViewById(R.id.look_zone));
                  setupLook(findViewById(R.id.playtest_look_zone));

                  findViewById(R.id.engine_touch_zone).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}
                      else if(e.getAction()==MotionEvent.ACTION_UP){
                          if(Math.abs(e.getX()-lx)<25&&Math.abs(e.getY()-ly)<25){
                              int hit=ren.raycastBlock(e.getX(),e.getY());
                              ren.selectedIndex=hit;
                              if(hit>=0){
                                  Block b=ren.blocks.get(hit);
                                  ren.blockR=b.r;ren.blockG=b.g;ren.blockB=b.b;
                                  ren.blockSX=b.sx;ren.blockSY=b.sy;ren.blockSZ=b.sz;
                                  ren.handleTapBlock(hit);
                                  updSizeInfo();
                              }
                              updAxis();
                          }
                      } else if(e.getAction()==MotionEvent.ACTION_MOVE){
                          ren.rY+=(e.getX()-lx)*.2f;
                          // No vertical camera rotation in engine touch
                          lx=e.getX();ly=e.getY();
                      }
                      return true;
                  });

                  updSizeInfo();updAxis();updGridButton();
                  loadCustomization();
              }

              @Override
              protected void onResume(){
                  super.onResume();
                  loadCustomization();
                  updRigidDisplay();
              }

              private void startRigidTimer(){
                  rigidTimer=System.currentTimeMillis();
                  handler.postDelayed(rigidCheckRunnable,1000);
              }

              private void stopRigidTimer(){ handler.removeCallbacks(rigidCheckRunnable); }

              private final Runnable rigidCheckRunnable=new Runnable(){
                  @Override public void run(){
                      if(pendingMode==1&&!ren.isEngineMode){
                          long elapsed=System.currentTimeMillis()-rigidTimer;
                          if(elapsed>=180000){
                              PlayerPrefs.addRigids(10);
                              updRigidDisplay();
                              showRigidNotification();
                              rigidTimer=System.currentTimeMillis();
                          }
                          handler.postDelayed(this,1000);
                      }
                  }
              };

              private void showRigidNotification(){
                  runOnUiThread(()->{
                      txtRigidNotify.setVisibility(View.VISIBLE);
                      handler.postDelayed(()->txtRigidNotify.setVisibility(View.GONE),3000);
                  });
              }

              private void updRigidDisplay(){
                  runOnUiThread(()->{
                      int r=PlayerPrefs.getRigids();
                      txtRigids.setText("💰 "+r+" Rigid's");
                      txtMenuRigids.setText("💰 "+r+" Rigid's");
                  });
              }

              private void loadCustomization(){
                  ren.skinColor=PlayerPrefs.getSkinColor();
                  ren.torsoColor=PlayerPrefs.getTorsoColor();
                  ren.legsColor=PlayerPrefs.getLegsColor();
                  ren.faceType=PlayerPrefs.getFaceType();
                  ren.animPack=PlayerPrefs.getAnimPack();
              }

              private void showScriptDialog(){
                  EditText input=new EditText(this);
                  input.setMinLines(10);
                  input.setText("phone.toast(\"Hello\")\nplayer.teleport(0, 8, 10)\nplayer.jump\n");
                  input.setInputType(InputType.TYPE_CLASS_TEXT|InputType.TYPE_TEXT_FLAG_MULTI_LINE);
                  new AlertDialog.Builder(this)
                      .setTitle("Script").setView(input)
                      .setPositiveButton("Run",(d,w)->{
                          try{ScriptEngine.run(this,input.getText().toString());updAxis();updSizeInfo();updGridButton();Toast.makeText(this,"Script done",Toast.LENGTH_SHORT).show();}
                          catch(Exception ex){Toast.makeText(this,ex.getMessage(),Toast.LENGTH_LONG).show();}
                      })
                      .setNegativeButton("Close",null).show();
              }

              private void showBlockEventsDialog(){
                  if(ren.selectedIndex<0||ren.selectedIndex>=ren.blocks.size())return;
                  Block b=ren.blocks.get(ren.selectedIndex);
                  LinearLayout root=new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  int pad=(int)(12*getResources().getDisplayMetrics().density);
                  root.setPadding(pad,pad,pad,pad);
                  TextView t1=new TextView(this);t1.setText("On Start");
                  EditText e1=new EditText(this);e1.setMinLines(4);e1.setText(b.onStartScript);
                  TextView t2=new TextView(this);t2.setText("On Player Touch");
                  EditText e2=new EditText(this);e2.setMinLines(4);e2.setText(b.onTouchScript);
                  TextView t3=new TextView(this);t3.setText("On Block Tap");
                  EditText e3=new EditText(this);e3.setMinLines(4);e3.setText(b.onTapScript);
                  root.addView(t1);root.addView(e1);root.addView(t2);root.addView(e2);root.addView(t3);root.addView(e3);
                  new AlertDialog.Builder(this)
                      .setTitle("Block Events").setView(root)
                      .setPositiveButton("Save",(d,w)->{b.onStartScript=e1.getText().toString();b.onTouchScript=e2.getText().toString();b.onTapScript=e3.getText().toString();Toast.makeText(this,"Events saved",Toast.LENGTH_SHORT).show();})
                      .setNegativeButton("Close",null).show();
              }

              private void setShapePreset(float sx,float sy,float sz,int idx){
                  ren.blockSX=sx;ren.blockSY=sy;ren.blockSZ=sz;
                  updBtnGrp(shapeBtn,idx);updSizeInfo();
              }

              private void resetP(){ ren.pX=0;ren.pY=7;ren.pZ=15;ren.vY=0; }

              private void axisBtn(int id,float dx,float dy,float dz){
                  findViewById(id).setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN||e.getAction()==MotionEvent.ACTION_MOVE){
                          float step=ren.gridEnabled?ren.gridSize:0.5f;
                          ren.moveSelected(dx*step,dy*step,dz*step);
                      }
                      return true;
                  });
              }

              private void updAxis(){
                  runOnUiThread(()->{
                      boolean sel=ren.selectedIndex>=0;
                      axisPanel.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDeselect.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnHide.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnDelete.setVisibility(sel?View.VISIBLE:View.GONE);
                      btnEvents.setVisibility(sel?View.VISIBLE:View.GONE);
                      if(sel){Block b=ren.blocks.get(ren.selectedIndex);btnHide.setText(b.hidden?"Show":"Hide");}
                  });
              }

              private void updSizeInfo(){
                  runOnUiThread(()->txtSizeInfo.setText(String.format(java.util.Locale.US,"%.1f x %.1f x %.1f",ren.blockSX,ren.blockSY,ren.blockSZ)));
              }

              private void updGridButton(){
                  runOnUiThread(()->{
                      if(ren.gridEnabled){btnGrid.setText("Grid: On");btnGrid.setBackgroundResource(R.drawable.btn_blue_filled);btnGrid.setTextColor(0xFF000000);}
                      else{btnGrid.setText("Grid: Off");btnGrid.setBackgroundResource(R.drawable.btn_blue);btnGrid.setTextColor(0xFF00BFFF);}
                  });
              }

              private void setupJoy(View base,View stick){
                  base.setOnTouchListener((v,e)->{
                      float cx=v.getWidth()/2f,cy=v.getHeight()/2f;
                      if(e.getAction()==MotionEvent.ACTION_MOVE||e.getAction()==MotionEvent.ACTION_DOWN){
                          float dx=e.getX()-cx,dy=e.getY()-cy,d=(float)Math.sqrt(dx*dx+dy*dy),lim=cx-stick.getWidth()/2f;
                          if(d>lim){dx*=lim/d;dy*=lim/d;}
                          stick.setTranslationX(dx);stick.setTranslationY(dy);
                          ren.jX=dx/lim;ren.jY=dy/lim;
                      } else if(e.getAction()==MotionEvent.ACTION_UP){
                          stick.setTranslationX(0);stick.setTranslationY(0);
                          ren.jX=0;ren.jY=0;
                      }
                      return true;
                  });
              }

              private void setupLook(View z){
                  z.setOnTouchListener((v,e)->{
                      if(e.getAction()==MotionEvent.ACTION_DOWN){lx=e.getX();ly=e.getY();}
                      else if(e.getAction()==MotionEvent.ACTION_MOVE){
                          // Only horizontal rotation (no vertical up/down)
                          ren.rY+=(e.getX()-lx)*.25f;
                          lx=e.getX();ly=e.getY();
                      }
                      return true;
                  });
              }

              private void updBtnGrp(Button[] btns,int sel){
                  for(int i=0;i<btns.length;i++){
                      if(i==sel){btns[i].setBackgroundResource(R.drawable.btn_blue_filled);btns[i].setTextColor(0xFF000000);}
                      else{btns[i].setBackgroundResource(R.drawable.btn_blue);btns[i].setTextColor(0xFF00BFFF);}
                  }
              }

              private void updColSel(int sel){
                  for(int i=0;i<colorBtn.length;i++){
                      try{
                          GradientDrawable bg=(GradientDrawable)colorBtn[i].getBackground();
                          if(i==sel)bg.setStroke(6,0xFFFFFFFF);
                          else bg.setStroke(2,0xFF00BFFF);
                      }catch(Exception ignored){}
                  }
              }
          }
          MAINACT

