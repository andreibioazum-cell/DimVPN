name: Enjoer_7.2_DebugBuild
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p out

          cat <<EOF > gradle.properties
          org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Enjoer"
          include(":app")
          EOF

          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.enjoer.game'
              compileSdk 34

              defaultConfig {
                  applicationId "com.enjoer.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  debug { minifyEnabled false }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat <<EOF > app/proguard-rules.pro
          # empty
          EOF

          cat <<EOF > local.properties
          sdk.dir=$ANDROID_HOME
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Enjoer 7.2"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#AA202020"/>
              <stroke android:width="2dp" android:color="#707070"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_stick.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#D0D0D0"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/run_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#CC2A2A2A"/>
              <stroke android:width="2dp" android:color="#9A9A9A"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/run_btn_active.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#E0E0E0"/>
              <stroke android:width="2dp" android:color="#5A5A5A"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/stamina_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="6dp"/>
              <solid android:color="#AA111111"/>
              <stroke android:width="2dp" android:color="#666666"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/stamina_fill.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="4dp"/>
              <solid android:color="#C8C8C8"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/hp_fill.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="4dp"/>
              <solid android:color="#E34B4B"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/time_panel.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="8dp"/>
              <solid android:color="#98101010"/>
              <stroke android:width="2dp" android:color="#5C5C5C"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/top_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="10dp"/>
              <solid android:color="#B01A1A1A"/>
              <stroke android:width="2dp" android:color="#707070"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/panel.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/>
              <solid android:color="#E0101010"/>
              <stroke android:width="2dp" android:color="#606060"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/menu_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/>
              <solid android:color="#FF2A2A2A"/>
              <stroke android:width="2dp" android:color="#B0B0B0"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/Block.java
          package com.enjoer.game;
          public class Block {
              public float x, y, z, sx, sy, sz, r, g, b;
              public Block(float x, float y, float z, float sx, float sy, float sz, float r, float g, float b) {
                  this.x=x; this.y=y; this.z=z; this.sx=sx; this.sy=sy; this.sz=sz; this.r=r; this.g=g; this.b=b;
              }
              public float minX(){ return x - sx / 2f; }
              public float maxX(){ return x + sx / 2f; }
              public float minY(){ return y - sy / 2f; }
              public float maxY(){ return y + sy / 2f; }
              public float minZ(){ return z - sz / 2f; }
              public float maxZ(){ return z + sz / 2f; }
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/Survivor.java
          package com.enjoer.game;
          public class Survivor {
              public static final int AGENT_SVIN = 0;
              public static final int GRAY_GUY = 1;
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/Killer.java
          package com.enjoer.game;
          public class Killer {
              public static final int DIMASI4EK229 = 0;
              public static final int DERKA = 1;
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/Bot.java
          package com.enjoer.game;
          public class Bot {
              public float x, y, z;
              public float yaw;
              public float hp = 100f;
              public boolean alive = true;
              public boolean killer;
              public int survivorType = Survivor.GRAY_GUY;
              public int killerType = Killer.DIMASI4EK229;
              public float anim = 0f;
              public float swing = 0f;
              public float hpBar = 100f;
              public Bot(float x, float y, float z, boolean killer) {
                  this.x=x; this.y=y; this.z=z; this.killer=killer;
              }
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/Projectile.java
          package com.enjoer.game;
          public class Projectile {
              public float x, y, z, vx, vy, vz;
              public boolean active = true;
              public float life = 180f;
              public boolean fromPlayer = true;
              public Projectile(float x, float y, float z, float vx, float vy, float vz, boolean fromPlayer) {
                  this.x=x; this.y=y; this.z=z; this.vx=vx; this.vy=vy; this.vz=vz; this.fromPlayer=fromPlayer;
              }
          }
          EOF

          cat <<EOF > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;

          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  android.widget.TextView tv = new android.widget.TextView(this);
                  tv.setText("Debug build placeholder");
                  tv.setTextColor(0xFFFFFFFF);
                  tv.setBackgroundColor(0xFF111111);
                  setContentView(tv);
              }
          }
          EOF

      - name: Create Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK with log capture
        continue-on-error: true
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace --no-daemon 2>&1 | tee out/gradle_build.log
          echo $? > out/gradle_exit_code.txt

      - name: Show last log lines
        if: always()
        run: |
          echo "===== LAST 300 LINES OF LOG ====="
          tail -n 300 out/gradle_build.log || true

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p out
          echo "=== APP BUILD TREE ===" > out/build_tree.txt
          find app/build -maxdepth 8 -type f >> out/build_tree.txt || true
          echo "=== ROOT TREE ===" >> out/build_tree.txt
          find . -maxdepth 5 -type f >> out/build_tree.txt || true

          find . -type f -name "*.apk" -exec cp {} out/ \; || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_7.2_Debug_Output
          path: out
