          # JAVA - RENDERER (FULL OPTIMIZED)
          cat <<'RENDERER' > app/src/main/java/com/enjoer/game/GameRenderer.java
          package com.enjoer.game;
          import android.opengl.GLES30;
          import android.opengl.GLSurfaceView;
          import android.opengl.Matrix;
          import java.nio.*;
          import java.util.concurrent.CopyOnWriteArrayList;
          import javax.microedition.khronos.egl.EGLConfig;
          import javax.microedition.khronos.opengles.GL10;

          public class GameRenderer implements GLSurfaceView.Renderer {
              private final float[] proj=new float[16], view=new float[16], model=new float[16], vp=new float[16];
              public float pX=0, pY=7, pZ=15, rY=0, rX=0, jX=0, jY=0, vY=0;
              public boolean isEngineMode=false, isPlayingLevel=false;
              public CopyOnWriteArrayList<Block> blocks = new CopyOnWriteArrayList<>();
              public int selectedIndex = -1;
              private int prog, skyProg;
              private FloatBuffer vBuf;
              public float fps = 0;
              private long lastT = 0;
              private float walkPhase = 0, charRot = 0;

              @Override
              public void onSurfaceCreated(GL10 gl, EGLConfig cfg) {
                  GLES30.glEnable(GLES30.GL_DEPTH_TEST);
                  String vs = "#version 300 es\nlayout(location=0)in vec4 aP;layout(location=1)in vec3 aN;uniform mat4 uMVP,uM;out vec3 vN,vP;void main(){vP=vec3(uM*aP);vN=mat3(uM)*aN;gl_Position=uMVP*aP;}";
                  String fs = "#version 300 es\nprecision highp float;in vec3 vN,vP;uniform vec4 uC;out vec4 fC;void main(){vec3 l=normalize(vec3(0.5,1.0,0.3));float d=max(dot(normalize(vN),l),0.2);fC=vec4(uC.rgb*d,uC.a);}";
                  prog = mkProg(vs, fs);
                  float[] vc = {-.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,.5f, .5f,-.5f,.5f, -.5f,.5f,-.5f, -.5f,-.5f,-.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f, -.5f,.5f,-.5f, -.5f,.5f,.5f, .5f,.5f,-.5f, .5f,.5f,.5f, -.5f,-.5f,-.5f, -.5f,-.5f,.5f, .5f,-.5f,-.5f, .5f,-.5f,.5f, -.5f,.5f,-.5f, -.5f,-.5f,-.5f, -.5f,.5f,.5f, -.5f,-.5f,.5f, .5f,.5f,-.5f, .5f,-.5f,-.5f, .5f,.5f,.5f, .5f,-.5f,.5f};
                  vBuf = ByteBuffer.allocateDirect(vc.length*4).order(ByteOrder.nativeOrder()).asFloatBuffer().put(vc); vBuf.position(0);
                  blocks.add(new Block(0, 2, -10, 8, 4, 8, 0.8f, 0.2f, 0.2f));
              }

              @Override
              public void onSurfaceChanged(GL10 gl, int w, int h) {
                  GLES30.glViewport(0,0,w,h);
                  Matrix.perspectiveM(proj, 0, 60, (float)w/h, 0.1f, 500f);
              }

              @Override
              public void onDrawFrame(GL10 gl) {
                  long now = System.nanoTime();
                  if(lastT>0) fps = 1e9f/(now-lastT); lastT=now;
                  update((now-lastT)/1e9f);
                  GLES30.glClearColor(0.01f, 0.05f, 0.12f, 1.0f);
                  GLES30.glClear(GLES30.GL_COLOR_BUFFER_BIT | GLES30.GL_DEPTH_BUFFER_BIT);

                  if(isEngineMode && !isPlayingLevel){
                      float vx=(float)(Math.sin(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                      float vy=(float)Math.sin(Math.toRadians(rX));
                      float vz=(float)(-Math.cos(Math.toRadians(rY))*Math.cos(Math.toRadians(rX)));
                      Matrix.setLookAtM(view, 0, pX, pY, pZ, pX+vx, pY+vy, pZ+vz, 0, 1, 0);
                  } else {
                      // ИСПРАВЛЕННАЯ КАМЕРА: Фиксированная высота, без приближения
                      float dist = 12.0f, height = 5.5f;
                      float radY = (float)Math.toRadians(rY);
                      float cx = pX - (float)Math.sin(radY)*dist, cz = pZ + (float)Math.cos(radY)*dist;
                      Matrix.setLookAtM(view, 0, cx, pY+height, cz, pX, pY-1f, pZ, 0, 1, 0);
                  }

                  GLES30.glUseProgram(prog);
                  int uMVP=GLES30.glGetUniformLocation(prog,"uMVP"), uM=GLES30.glGetUniformLocation(prog,"uM"), uC=GLES30.glGetUniformLocation(prog,"uC");
                  GLES30.glVertexAttribPointer(0,3,GLES30.GL_FLOAT,false,0,vBuf); GLES30.glEnableVertexAttribArray(0);

                  // Floor
                  Matrix.setIdentityM(model,0); Matrix.scaleM(model,0,1000,0.1f,1000);
                  drawObj(uM,uMVP,uC,0.1f,0.15f,0.25f);

                  for(int i=0; i<blocks.size(); i++){
                      Block b = blocks.get(i);
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,b.x,b.y,b.z); Matrix.scaleM(model,0,b.sx,b.sy,b.sz);
                      drawObj(uM,uMVP,uC,b.r,b.g,b.b);
                  }
                  
                  if(!isEngineMode || isPlayingLevel) drawCharacter(uM,uMVP,uC);
              }

              private void update(float dt){
                  float s=0.42f, rad=(float)Math.toRadians(rY);
                  float mx=((float)Math.sin(rad)*-jY+(float)Math.cos(rad)*jX)*s;
                  float mz=((float)-Math.cos(rad)*-jY+(float)Math.sin(rad)*jX)*s;
                  if(isEngineMode && !isPlayingLevel){
                      pX+=mx; pZ+=mz; pY+=(float)Math.sin(Math.toRadians(rX))*-jY*s;
                  } else {
                      vY-=0.025f; pY+=vY; if(pY<5.2f){pY=5.2f;vY=0;}
                      pX+=mx; pZ+=mz;
                      if(Math.abs(jX)>0.1f || Math.abs(jY)>0.1f){
                          charRot = (float)Math.toDegrees(Math.atan2(mx, mz));
                          walkPhase += 0.15f;
                      }
                  }
              }

              private void drawCharacter(int uM, int uMVP, int uC){
                  boolean onGround = pY <= 5.3f;
                  float armAng = onGround ? (float)Math.sin(walkPhase)*40f : -175f; // Руки вверх в прыжке
                  // Bobbing убран (bob=0)
                  
                  // Torso
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,pX,pY-3.2f,pZ); Matrix.rotateM(model,0,charRot,0,1,0); Matrix.scaleM(model,0,1.4f,2f,0.8f);
                  drawObj(uM,uMVP,uC,0.2f,0.4f,0.9f);
                  // Head
                  Matrix.setIdentityM(model,0); Matrix.translateM(model,0,pX,pY-1.8f,pZ); Matrix.rotateM(model,0,charRot,0,1,0); Matrix.scaleM(model,0,1.1f,1.1f,1.1f);
                  drawObj(uM,uMVP,uC,1f,0.8f,0.6f);
                  // Arms
                  for(int i : new int[]{-1, 1}){
                      Matrix.setIdentityM(model,0); Matrix.translateM(model,0,pX,pY-3f,pZ); Matrix.rotateM(model,0,charRot,0,1,0);
                      Matrix.translateM(model,0,i*1f,0.8f,0); Matrix.rotateM(model,0,i*armAng,1,0,0); Matrix.translateM(model,0,0,-0.6f,0); Matrix.scaleM(model,0,0.5f,1.2f,0.5f);
                      drawObj(uM,uMVP,uC,1f,0.8f,0.6f);
                  }
              }

              private void drawObj(int uM, int uMVP, int uC, float r, float g, float b){
                  GLES30.glUniformMatrix4fv(uM,1,false,model,0);
                  Matrix.multiplyMM(vp,0,proj,0,view,0); Matrix.multiplyMM(vp,0,vp,0,model,0);
                  GLES30.glUniformMatrix4fv(uMVP,1,false,vp,0); GLES30.glUniform4f(uC,r,g,b,1);
                  for(int i=0;i<6;i++) GLES30.glDrawArrays(GLES30.GL_TRIANGLE_STRIP,i*4,4);
              }
              private int mkProg(String v, String f){
                  int p=GLES30.glCreateProgram(), vs=GLES30.glCreateShader(35633), fs=GLES30.glCreateShader(35632);
                  GLES30.glShaderSource(vs,v); GLES30.glCompileShader(vs); GLES30.glShaderSource(fs,f); GLES30.glCompileShader(fs);
                  GLES30.glAttachShader(p,vs); GLES30.glAttachShader(p,fs); GLES30.glLinkProgram(p); return p;
              }
          }
          RENDERER

          # JAVA - MAIN ACTIVITY
          cat <<'MAIN' > app/src/main/java/com/enjoer/game/MainActivity.java
          package com.enjoer.game;
          import android.app.AlertDialog;
          import android.os.Bundle;
          import android.view.*;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity implements ScriptEngine.Host {
              private GameRenderer ren;
              private View menuUI, gameUI, engineUI;
              private TextView fpsText;
              private Button debugCircle;
              private boolean debugMode = false;

              @Override public GameRenderer renderer() { return ren; }
              @Override public void toast(String t) { runOnUiThread(()->Toast.makeText(this,t,Toast.LENGTH_SHORT).show()); }

              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  android.opengl.GLSurfaceView gv = findViewById(R.id.gl_view);
                  gv.setEGLContextClientVersion(3);
                  ren = new GameRenderer(); gv.setRenderer(ren);

                  menuUI=findViewById(R.id.menu_ui); gameUI=findViewById(R.id.game_ui); engineUI=findViewById(R.id.engine_ui);
                  fpsText=findViewById(R.id.fps_text); debugCircle=findViewById(R.id.debug_circle_btn);

                  findViewById(R.id.btn_play).setOnClickListener(v->{
                      menuUI.setVisibility(View.GONE); gameUI.setVisibility(View.VISIBLE);
                      ren.isEngineMode=false; ren.pX=0; ren.pY=7; ren.pZ=15;
                      if(debugMode) debugCircle.setVisibility(View.VISIBLE);
                  });

                  findViewById(R.id.btn_engine).setOnClickListener(v->{
                      menuUI.setVisibility(View.GONE); engineUI.setVisibility(View.VISIBLE);
                      ren.isEngineMode=true; ren.pX=0; ren.pY=20; ren.pZ=30;
                  });

                  findViewById(R.id.btn_settings).setOnClickListener(v->showSettings());
                  
                  debugCircle.setOnClickListener(v->{
                      fpsText.setVisibility(fpsText.getVisibility()==View.VISIBLE ? View.GONE : View.VISIBLE);
                  });

                  setupJoy(findViewById(R.id.joy_base), findViewById(R.id.joy_stick));
                  setupJoy(findViewById(R.id.engine_joy_base), findViewById(R.id.engine_joy_stick));
                  setupLook(findViewById(R.id.look_zone));
                  setupLook(findViewById(R.id.engine_touch_zone));

                  findViewById(R.id.btn_jump).setOnClickListener(v->{ if(ren.pY<=5.3f) ren.vY=0.55f; });
                  findViewById(R.id.btn_menu).setOnClickListener(v->back());
                  findViewById(R.id.btn_engine_menu).setOnClickListener(v->back());
                  findViewById(R.id.btn_place).setOnClickListener(v->ren.blocks.add(new Block(ren.pX,ren.pY,ren.pZ,4,4,4,0.8f,0.3f,0.3f)));

                  new android.os.Handler().postDelayed(new Runnable() {
                      public void run() {
                          fpsText.setText("FPS: " + (int)ren.fps);
                          new android.os.Handler().postDelayed(this, 500);
                      }
                  }, 500);
              }

              private void showSettings(){
                  String[] items = {"Debug Mode: " + (debugMode?"ON":"OFF")};
                  new AlertDialog.Builder(this).setTitle("Settings").setItems(items, (d,i)->{
                      debugMode = !debugMode; toast("Debug mode changed!");
                  }).show();
              }

              private void back(){
                  menuUI.setVisibility(View.VISIBLE); gameUI.setVisibility(View.GONE); engineUI.setVisibility(View.GONE);
                  debugCircle.setVisibility(View.GONE); fpsText.setVisibility(View.GONE);
              }

              private void setupJoy(View b, View s){
                  b.setOnTouchListener((v,e)->{
                      float cx=v.getWidth()/2f, cy=v.getHeight()/2f, dx=e.getX()-cx, dy=e.getY()-cy, dist=(float)Math.sqrt(dx*dx+dy*dy), lim=cx-s.getWidth()/2f;
                      if(e.getAction()==MotionEvent.ACTION_UP){ ren.jX=0; ren.jY=0; s.setTranslationX(0); s.setTranslationY(0); }
                      else { if(dist>lim){dx*=lim/dist; dy*=lim/dist;} s.setTranslationX(dx); s.setTranslationY(dy); ren.jX=dx/lim; ren.jY=dy/lim; }
                      return true;
                  });
              }

              private void setupLook(View v){
                  v.setOnTouchListener(new View.OnTouchListener(){
                      float lx, ly;
                      public boolean onTouch(View view, MotionEvent e){
                          if(e.getAction()==MotionEvent.ACTION_DOWN){ lx=e.getX(); ly=e.getY(); }
                          else if(e.getAction()==MotionEvent.ACTION_MOVE){
                              ren.rY+=(e.getX()-lx)*0.25f; ren.rX=Math.max(-85,Math.min(85,ren.rX-(e.getY()-ly)*0.25f));
                              lx=e.getX(); ly=e.getY();
                          }
                          return true;
                      }
                  });
              }
          }
          MAIN

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.enjoer.game">
              <application android:label="Enjoer 6.2 Final" android:theme="@style/AppTheme" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape" android:configChanges="orientation|screenSize">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace 'com.enjoer.game'; compileSdk 34; defaultConfig { applicationId 'com.enjoer.game'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Enjoer_6.2_Stars_Final
          path: app/build/outputs/apk/debug/app-debug.apk
