name: Titan Archive APK Builder
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Project
        run: |
          mkdir -p app/src/main/java/com/titan/archiver
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          echo "android.useAndroidX=true" > gradle.properties

          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.titan.archiver">
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
            <application android:allowBackup="true" android:theme="@style/AppTheme">
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          MANIFEST

          cat > app/src/main/res/values/themes.xml << 'THEMES'
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>
          THEMES

          cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent" android:layout_height="match_parent"
            android:orientation="vertical" android:background="#02050A" android:padding="20dp">
            
            <TextView android:layout_width="match_parent" android:layout_height="wrap_content"
              android:text="Titan Archiver" android:textSize="28sp" android:textColor="#00BFFF"
              android:gravity="center" android:layout_marginTop="30dp"/>
            
            <EditText android:id="@+id/et_path" android:layout_width="match_parent"
              android:layout_height="wrap_content" android:hint="Путь к файлу"
              android:textColor="#FFF" android:textColorHint="#666" android:background="#222"
              android:padding="12dp" android:layout_marginTop="30dp" android:textSize="12sp"/>
            
            <Button android:id="@+id/btn_compress" android:layout_width="match_parent"
              android:layout_height="55dp" android:text="Сжать (оригинал удалится)"
              android:textSize="14sp" android:background="#101820" android:textColor="#00BFFF"
              android:layout_marginTop="20dp"/>
            
            <Button android:id="@+id/btn_decompress" android:layout_width="match_parent"
              android:layout_height="55dp" android:text="Распаковать .titz"
              android:textSize="14sp" android:background="#101820" android:textColor="#00BFFF"
              android:layout_marginTop="10dp"/>
            
            <TextView android:id="@+id/tv_status" android:layout_width="match_parent"
              android:layout_height="wrap_content" android:text="Готов"
              android:textColor="#44FF44" android:gravity="center"
              android:layout_marginTop="30dp" android:textSize="12sp"/>
            
          </LinearLayout>
          LAYOUT

          cat > app/src/main/java/com/titan/archiver/MainActivity.java << 'JAVA'
          package com.titan.archiver;
          
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.*;
          
          public class MainActivity extends AppCompatActivity {
              private EditText etPath;
              private TextView tvStatus;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  
                  etPath = findViewById(R.id.et_path);
                  tvStatus = findViewById(R.id.tv_status);
                  
                  findViewById(R.id.btn_compress).setOnClickListener(v -> compress());
                  findViewById(R.id.btn_decompress).setOnClickListener(v -> decompress());
              }
              
              private void compress() {
                  String path = etPath.getText().toString().trim();
                  File file = new File(path);
                  if (!file.exists()) {
                      Toast.makeText(this, "Файл не найден", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  
                  try {
                      byte[] data = readFile(file);
                      tvStatus.setText("Сжатие: " + data.length + " байт");
                      
                      byte[] compressed = compressData(data);
                      writeFile(new File(path + ".titz"), compressed);
                      file.delete();
                      
                      tvStatus.setText("Готово! " + compressed.length + " байт (" + 
                          (compressed.length * 100 / data.length) + "%)");
                      Toast.makeText(this, "Оригинал удалён", Toast.LENGTH_SHORT).show();
                  } catch (Exception e) {
                      tvStatus.setText("Ошибка: " + e.getMessage());
                  }
              }
              
              private void decompress() {
                  String path = etPath.getText().toString().trim();
                  if (!path.endsWith(".titz")) {
                      Toast.makeText(this, "Нужен .titz файл", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  
                  File file = new File(path);
                  if (!file.exists()) {
                      Toast.makeText(this, "Файл не найден", Toast.LENGTH_SHORT).show();
                      return;
                  }
                  
                  try {
                      byte[] data = readFile(file);
                      tvStatus.setText("Распаковка...");
                      
                      byte[] decompressed = decompressData(data);
                      String outPath = path.substring(0, path.length() - 5);
                      writeFile(new File(outPath), decompressed);
                      file.delete();
                      
                      tvStatus.setText("Восстановлено: " + decompressed.length + " байт");
                      Toast.makeText(this, "Архив удалён", Toast.LENGTH_SHORT).show();
                  } catch (Exception e) {
                      tvStatus.setText("Ошибка: " + e.getMessage());
                  }
              }
              
              private byte[] compressData(byte[] data) {
                  ByteArrayOutputStream out = new ByteArrayOutputStream();
                  int i = 0;
                  
                  while (i < data.length) {
                      int matchPos = -1, matchLen = 0;
                      int start = Math.max(0, i - 4096);
                      
                      for (int j = start; j < i; j++) {
                          if (data[j] == data[i]) {
                              int len = 0;
                              while (i + len < data.length && j + len < i && 
                                     data[j + len] == data[i + len] && len < 255) len++;
                              if (len > matchLen) {
                                  matchLen = len;
                                  matchPos = i - j;
                              }
                          }
                      }
                      
                      if (matchLen >= 3) {
                          out.write(0x80 | (matchLen - 3));
                          out.write(matchPos & 0xFF);
                          out.write((matchPos >> 8) & 0xFF);
                          i += matchLen;
                      } else {
                          out.write(data[i]);
                          i++;
                      }
                  }
                  return out.toByteArray();
              }
              
              private byte[] decompressData(byte[] data) {
                  ByteArrayOutputStream out = new ByteArrayOutputStream();
                  int i = 0;
                  
                  while (i < data.length) {
                      if ((data[i] & 0x80) != 0) {
                          int matchLen = (data[i] & 0x7F) + 3;
                          i++;
                          if (i + 1 >= data.length) break;
                          int matchPos = (data[i] & 0xFF) | ((data[i+1] & 0xFF) << 8);
                          i += 2;
                          
                          byte[] result = out.toByteArray();
                          for (int j = 0; j < matchLen; j++) {
                              out.write(result[result.length - matchPos + j]);
                          }
                      } else {
                          out.write(data[i]);
                          i++;
                      }
                  }
                  return out.toByteArray();
              }
              
              private byte[] readFile(File file) throws IOException {
                  byte[] data = new byte[(int) file.length()];
                  FileInputStream fis = new FileInputStream(file);
                  fis.read(data);
                  fis.close();
                  return data;
              }
              
              private void writeFile(File file, byte[] data) throws IOException {
                  FileOutputStream fos = new FileOutputStream(file);
                  fos.write(data);
                  fos.close();
              }
          }
          JAVA

          echo "include ':app'" > settings.gradle
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.titan.archiver'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.titan.archiver'
                  minSdk 24
                  targetSdk 34
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

      - name: Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Titan-Archiver
          path: app/build/outputs/apk/debug/app-debug.apk
