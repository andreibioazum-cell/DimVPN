name: Enjoer_7.1_LobbySelect_Fixes
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Create Android project
        run: |
          mkdir -p app/src/main/java/com/enjoer/game
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat <<EOF > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "Enjoer"
          include(":app")
          EOF

          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.enjoer.game'
              compileSdk 34

              defaultConfig {
                  applicationId "com.enjoer.game"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  debug { minifyEnabled false }
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat <<EOF > app/proguard-rules.pro
          # empty
          EOF

          cat <<EOF > local.properties
          sdk.dir=$ANDROID_HOME
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Enjoer 7.1"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_base.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#AA202020"/>
              <stroke android:width="2dp" android:color="#707070"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/joy_stick.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#D0D0D0"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/run_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#CC2A2A2A"/>
              <stroke android:width="2dp" android:color="#9A9A9A"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/run_btn_active.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
              <solid android:color="#E0E0E0"/>
              <stroke android:width="2dp" android:color="#5A5A5A"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/stamina_bg.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="6dp"/>
              <solid android:color="#AA111111"/>
              <stroke android:width="2dp" android:color="#666666"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/stamina_fill.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="4dp"/>
              <solid android:color="#C8C8C8"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/hp_fill.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="4dp"/>
              <solid android:color="#E34B4B"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/time_panel.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="8dp"/>
              <solid android:color="#98101010"/>
              <stroke android:width="2dp" android:color="#5C5C5C"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/top_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="10dp"/>
              <solid android:color="#B01A1A1A"/>
              <stroke android:width="2dp" android:color="#707070"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/panel.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/>
              <solid android:color="#E0101010"/>
              <stroke android:width="2dp" android:color="#606060"/>
          </shape>
          EOF

          cat <<EOF > app/src/main/res/drawable/menu_btn.xml
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <corners android:radius="12dp"/>
              <solid android:color="#FF2A2A2A"/>
              <stroke android:width="2dp" android:color="#B0B0B0"/>
          </shape>
          EOF

          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#050505">

              <android.opengl.GLSurfaceView
                  android:id="@+id/gl_view"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"/>

              <LinearLayout
                  android:id="@+id/menu_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:gravity="center"
                  android:background="#E0050505">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="ENJOER"
                      android:textColor="#FFFFFF"
                      android:textStyle="bold"
                      android:textSize="42sp"/>

                  <TextView
                      android:id="@+id/txt_selected_survivor"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="SURVIVOR: AGENT SVIN"
                      android:textColor="#D0D0D0"
                      android:textSize="16sp"
                      android:layout_marginTop="16dp"/>

                  <TextView
                      android:id="@+id/txt_selected_killer"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="KILLER: DIMASI4EK229"
                      android:textColor="#D0D0D0"
                      android:textSize="16sp"
                      android:layout_marginTop="6dp"
                      android:layout_marginBottom="30dp"/>

                  <Button
                      android:id="@+id/btn_play"
                      android:layout_width="260dp"
                      android:layout_height="56dp"
                      android:text="PLAY"
                      android:textStyle="bold"
                      android:textColor="#FFFFFF"
                      android:background="@drawable/menu_btn"
                      android:layout_marginBottom="12dp"/>

                  <Button
                      android:id="@+id/btn_open_survivors"
                      android:layout_width="260dp"
                      android:layout_height="56dp"
                      android:text="CHOOSE SURVIVOR"
                      android:textStyle="bold"
                      android:textColor="#FFFFFF"
                      android:background="@drawable/menu_btn"
                      android:layout_marginBottom="12dp"/>

                  <Button
                      android:id="@+id/btn_open_killers"
                      android:layout_width="260dp"
                      android:layout_height="56dp"
                      android:text="CHOOSE KILLER"
                      android:textStyle="bold"
                      android:textColor="#FFFFFF"
                      android:background="@drawable/menu_btn"/>
              </LinearLayout>

              <RelativeLayout
                  android:id="@+id/game_ui"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:visibility="gone">

                  <View
                      android:id="@+id/look_zone"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"/>

                  <LinearLayout
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:layout_centerHorizontal="true"
                      android:layout_marginTop="14dp"
                      android:orientation="vertical"
                      android:gravity="center"
                      android:background="@drawable/time_panel"
                      android:paddingLeft="12dp"
                      android:paddingTop="6dp"
                      android:paddingRight="12dp"
                      android:paddingBottom="6dp">

                      <TextView
                          android:id="@+id/txt_timer"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="1:10"
                          android:textColor="#FFFFFF"
                          android:textStyle="bold"
                          android:textSize="18sp"/>
                  </LinearLayout>

                  <Button
                      android:id="@+id/btn_back_menu"
                      android:layout_width="90dp"
                      android:layout_height="42dp"
                      android:layout_alignParentTop="true"
                      android:layout_alignParentStart="true"
                      android:layout_marginStart="12dp"
                      android:layout_marginTop="12dp"
                      android:background="@drawable/top_btn"
                      android:text="MENU"
                      android:textColor="#FFFFFF"
                      android:textStyle="bold"/>

                  <FrameLayout
                      android:id="@+id/joy_base"
                      android:layout_width="140dp"
                      android:layout_height="140dp"
                      android:layout_alignParentBottom="true"
                      android:layout_alignParentStart="true"
                      android:layout_marginStart="40dp"
                      android:layout_marginBottom="40dp"
                      android:background="@drawable/joy_base"/>

                  <View
                      android:id="@+id/joy_stick"
                      android:layout_width="60dp"
                      android:layout_height="60dp"
                      android:layout_alignLeft="@id/joy_base"
                      android:layout_alignTop="@id/joy_base"
                      android:layout_marginLeft="40dp"
                      android:layout_marginTop="40dp"
                      android:background="@drawable/joy_stick"/>

                  <Button
                      android:id="@+id/btn_run"
                      android:layout_width="92dp"
                      android:layout_height="92dp"
                      android:layout_alignParentEnd="true"
                      android:layout_alignParentBottom="true"
                      android:layout_marginEnd="30dp"
                      android:layout_marginBottom="42dp"
                      android:background="@drawable/run_btn"
                      android:text="RUN"
                      android:textColor="#E0E0E0"
                      android:textStyle="bold"
                      android:textSize="18sp"/>

                  <LinearLayout
                      android:id="@+id/skill_panel"
                      android:layout_width="100dp"
                      android:layout_height="wrap_content"
                      android:layout_above="@id/btn_run"
                      android:layout_alignParentEnd="true"
                      android:layout_marginEnd="26dp"
                      android:layout_marginBottom="18dp"
                      android:orientation="vertical">

                      <Button
                          android:id="@+id/btn_skill_1"
                          android:layout_width="100dp"
                          android:layout_height="48dp"
                          android:background="@drawable/top_btn"
                          android:text="SKILL 1"
                          android:textColor="#FFFFFF"/>

                      <Button
                          android:id="@+id/btn_skill_2"
                          android:layout_width="100dp"
                          android:layout_height="48dp"
                          android:layout_marginTop="8dp"
                          android:background="@drawable/top_btn"
                          android:text="SKILL 2"
                          android:textColor="#FFFFFF"/>

                      <Button
                          android:id="@+id/btn_skill_3"
                          android:layout_width="100dp"
                          android:layout_height="48dp"
                          android:layout_marginTop="8dp"
                          android:background="@drawable/top_btn"
                          android:text="SKILL 3"
                          android:textColor="#FFFFFF"/>
                  </LinearLayout>

                  <LinearLayout
                      android:layout_width="150dp"
                      android:layout_height="wrap_content"
                      android:layout_alignParentStart="true"
                      android:layout_alignParentBottom="true"
                      android:layout_marginStart="28dp"
                      android:layout_marginBottom="188dp"
                      android:orientation="vertical">

                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="STAMINA"
                          android:textColor="#D0D0D0"
                          android:textSize="11sp"
                          android:textStyle="bold"
                          android:layout_marginBottom="4dp"/>

                      <FrameLayout
                          android:layout_width="150dp"
                          android:layout_height="16dp"
                          android:background="@drawable/stamina_bg"
                          android:padding="2dp">

                          <View
                              android:id="@+id/stamina_fill"
                              android:layout_width="146dp"
                              android:layout_height="match_parent"
                              android:background="@drawable/stamina_fill"/>
                      </FrameLayout>

                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="HP"
                          android:textColor="#D0D0D0"
                          android:textSize="11sp"
                          android:textStyle="bold"
                          android:layout_marginTop="8dp"
                          android:layout_marginBottom="4dp"/>

                      <FrameLayout
                          android:layout_width="150dp"
                          android:layout_height="16dp"
                          android:background="@drawable/stamina_bg"
                          android:padding="2dp">

                          <View
                              android:id="@+id/hp_fill"
                              android:layout_width="146dp"
                              android:layout_height="match_parent"
                              android:background="@drawable/hp_fill"/>
                      </FrameLayout>
                  </LinearLayout>

              </RelativeLayout>

              <LinearLayout
                  android:id="@+id/survivor_menu"
                  android:layout_width="280dp"
                  android:layout_height="wrap_content"
                  android:layout_gravity="center"
                  android:orientation="vertical"
                  android:background="@drawable/panel"
                  android:padding="14dp"
                  android:visibility="gone">

                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="CHOOSE SURVIVOR"
                      android:textColor="#FFFFFF"
                      android:textStyle="bold"
                      android:textSize="18sp"
                      android:layout_gravity="center_horizontal"
          
