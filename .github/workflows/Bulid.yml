name: Virus Deep Evolution

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android Project
        run: |
          mkdir -p app/src/main/java/com/spruce/virus
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          echo "include ':app'" > settings.gradle
          echo "android.useAndroidX=true" > gradle.properties

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace "com.spruce.virus"
              compileSdk 34
              defaultConfig {
                  applicationId "com.spruce.virus"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "2.0-EVOLUTION"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Virus Evolution" android:theme="@style/Theme.AppCompat.NoActionBar.FullScreen">
                  <activity android:name=".GameActivity" android:exported="true" android:screenOrientation="landscape">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
              <style name="Theme.AppCompat.NoActionBar.FullScreen" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
          </manifest>
          EOF

      - name: Create Game Logic
        run: |
          cat > app/src/main/java/com/spruce/virus/Country.java << 'EOF'
          package com.spruce.virus;
          import android.widget.Button;

          public class Country {
              public String name;
              public long pop, inf = 0, dead = 0;
              public boolean isCold = false;
              public Button btn;
              
              public Country(String n, long p, boolean cold) { 
                  this.name = n; this.pop = p; this.isCold = cold;
              }
              
              public void updateVisual() {
                  if (dead >= pop) {
                      btn.setBackgroundColor(0xFF000000); // Мертвая страна
                      btn.setText(name + "\nDEAD");
                  } else if (inf > 0) {
                      float p = (float)inf / pop;
                      if (p > 0.5f) btn.setBackgroundColor(0xFFFF0000); // 50%+ заражено
                      else btn.setBackgroundColor(0xFF880000); // Мало заражено
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/spruce/virus/GameActivity.java << 'EOF'
          package com.spruce.virus;
          import android.os.*;
          import android.view.View;
          import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.*;

          public class GameActivity extends AppCompatActivity {
              private Map<String, Country> world = new HashMap<>();
              private int dna = 10;
              private float spread = 0.04f, lethal = 0.0f, resist = 1.0f, coldResist = 1.0f;
              private float cure = 0;
              private boolean active = false;
              private Handler handler = new Handler();
              private TextView stats, dnaView, cureView;
              private LinearLayout tabTrans, tabSymp, tabAbil;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_game);
                  
                  stats = findViewById(R.id.globalStats);
                  dnaView = findViewById(R.id.dnaText);
                  cureView = findViewById(R.id.cureText);
                  tabTrans = findViewById(R.id.tabTransmission);
                  tabSymp = findViewById(R.id.tabSymptoms);
                  tabAbil = findViewById(R.id.tabAbilities);

                  createCountry("Canada", 38000000, true, R.id.c_canada);
                  createCountry("Russia", 144000000, true, R.id.c_russia);
                  createCountry("USA", 331000000, false, R.id.c_usa);
                  createCountry("China", 1400000000, false, R.id.c_china);
                  createCountry("Brazil", 212000000, false, R.id.c_brazil);
                  createCountry("Egypt", 102000000, false, R.id.c_egypt);
                  createCountry("Australia", 25000000, false, R.id.c_australia);

                  setupUpgradeSystem();
                  
                  handler.postDelayed(new Runnable() {
                      @Override public void run() {
                          if(active) tick();
                          handler.postDelayed(this, 1000);
                      }
                  }, 1000);
              }

              private void createCountry(String name, long pop, boolean cold, int id) {
                  Country c = new Country(name, pop, cold);
                  c.btn = findViewById(id);
                  c.btn.setOnClickListener(v -> { if(!active) { c.inf = 1; active = true; } });
                  world.put(name, c);
              }

              private void setupUpgradeSystem() {
                  findViewById(R.id.evolveBtn).setOnClickListener(v -> {
                      View p = findViewById(R.id.upgradePanel);
                      p.setVisibility(p.getVisibility() == View.VISIBLE ? View.GONE : View.VISIBLE);
                  });

                  // Переключение вкладок
                  findViewById(R.id.btnShowTrans).setOnClickListener(v -> showTab(tabTrans));
                  findViewById(R.id.btnShowSymp).setOnClickListener(v -> showTab(tabSymp));
                  findViewById(R.id.btnShowAbil).setOnClickListener(v -> showTab(tabAbil));

                  // Кнопки прокачки
                  findViewById(R.id.upAir).setOnClickListener(v -> buy(10, () -> spread += 0.05f));
                  findViewById(R.id.upWater).setOnClickListener(v -> buy(15, () -> spread += 0.08f));
                  findViewById(R.id.upCough).setOnClickListener(v -> buy(10, () -> lethal += 0.005f));
                  findViewById(R.id.upOrgan).setOnClickListener(v -> buy(40, () -> lethal += 0.05f));
                  findViewById(R.id.upCold).setOnClickListener(v -> buy(20, () -> coldResist += 1.5f));
                  findViewById(R.id.upDrug).setOnClickListener(v -> buy(30, () -> resist += 1.0f));
              }

              private void showTab(View tab) {
                  tabTrans.setVisibility(View.GONE);
                  tabSymp.setVisibility(View.GONE);
                  tabAbil.setVisibility(View.GONE);
                  tab.setVisibility(View.VISIBLE);
              }

              private void buy(int cost, Runnable action) {
                  if (dna >= cost) { dna -= cost; action.run(); updateUI(); }
              }

              private void tick() {
                  long totalI = 0, totalD = 0;
                  for(Country c : world.values()) {
                      if(c.inf > 0 && c.dead < c.pop) {
                          float localSpread = spread;
                          if (c.isCold) localSpread *= (coldResist / 2.0f); // Холод замедляет без резиста
                          
                          long n = (long)(c.inf * (1 + localSpread));
                          if(n > c.pop - c.dead) n = c.pop - c.dead;
                          c.inf = n;
                          long d = (long)(c.inf * lethal);
                          c.inf -= d; c.dead += d;
                          if(new Random().nextInt(10) > 7) dna++;
                      }
                      c.updateVisual();
                      totalI += c.inf; totalD += c.dead;
                  }
                  if(totalI > 1000000) cure += (0.15f * (1 + lethal * 200)) / resist;
                  if(cure >= 100) active = false;
                  updateUI();
              }

              private void updateUI() {
                  runOnUiThread(() -> {
                      dnaView.setText("DNA: " + dna);
                      cureView.setText("CURE: " + (int)cure + "%");
                  });
              }
          }
          EOF

      - name: Create Complex UI Layout
        run: |
          cat > app/src/main/res/layout/activity_game.xml << 'EOF'
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#0A0A0A" android:padding="8dp">

              <LinearLayout android:id="@+id/header" android:layout_width="match_parent"
                  android:layout_height="wrap_content" android:background="#1A1A1A" android:padding="5dp">
                  <TextView android:id="@+id/globalStats" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:textColor="#FF3333" android:text="WORLD STATUS: ACTIVE" android:fontFamily="monospace"/>
                  <TextView android:id="@+id/dnaText" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#FFCC00" android:text="DNA: 10" android:layout_marginEnd="20dp"/>
                  <TextView android:id="@+id/cureText" android:layout_width="wrap_content" android:layout_height="wrap_content" android:textColor="#00AAFF" android:text="CURE: 0%"/>
              </LinearLayout>

              <GridLayout android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:layout_centerInParent="true" android:columnCount="4" android:rowCount="3">
                  <Button android:id="@+id/c_canada" android:layout_width="90dp" android:layout_height="90dp" android:text="CANADA" android:textSize="9sp" android:layout_margin="4dp" android:backgroundTint="#2A2A2A"/>
                  <Button android:id="@+id/c_russia" android:layout_width="90dp" android:layout_height="90dp" android:text="RUSSIA" android:textSize="9sp" android:layout_margin="4dp" android:backgroundTint="#2A2A2A"/>
                  <Button android:id="@+id/c_china" android:layout_width="90dp" android:layout_height="90dp" android:text="CHINA" android:textSize="9sp" android:layout_margin="4dp" android:backgroundTint="#2A2A2A"/>
                  <Space android:layout_width="90dp" android:layout_height="90dp"/>
                  <Button android:id="@+id/c_usa" android:layout_width="90dp" android:layout_height="90dp" android:text="USA" android:textSize="9sp" android:layout_margin="4dp" android:backgroundTint="#2A2A2A"/>
                  <Button android:id="@+id/c_egypt" android:layout_width="90dp" android:layout_height="90dp" android:text="EGYPT" android:textSize="9sp" android:layout_margin="4dp" android:backgroundTint="#2A2A2A"/>
                  <Space android:layout_width="90dp" android:layout_height="90dp"/>
                  <Space android:layout_width="90dp" android:layout_height="90dp"/>
                  <Button android:id="@+id/c_brazil" android:layout_width="90dp" android:layout_height="90dp" android:text="BRAZIL" android:textSize="9sp" android:layout_margin="4dp" android:backgroundTint="#2A2A2A"/>
                  <Space android:layout_width="90dp" android:layout_height="90dp"/>
                  <Space android:layout_width="90dp" android:layout_height="90dp"/>
                  <Button android:id="@+id/c_australia" android:layout_width="90dp" android:layout_height="90dp" android:text="AUSTRALIA" android:textSize="9sp" android:layout_margin="4dp" android:backgroundTint="#2A2A2A"/>
              </GridLayout>

              <Button android:id="@+id/evolveBtn" android:layout_width="wrap_content"
                  android:layout_height="wrap_content" android:layout_alignParentBottom="true"
                  android:text="DNA EVOLVE" android:backgroundTint="#550000"/>

              <LinearLayout android:id="@+id/upgradePanel" android:layout_width="300dp"
                  android:layout_height="220dp" android:layout_above="@id/evolveBtn"
                  android:background="#EE050505" android:orientation="vertical"
                  android:padding="5dp" android:visibility="gone" android:elevation="10dp">
                  
                  <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal">
                      <Button android:id="@+id/btnShowTrans" android:layout_width="0dp" android:layout_height="40dp" android:layout_weight="1" android:text="Trans" android:textSize="8sp"/>
                      <Button android:id="@+id/btnShowSymp" android:layout_width="0dp" android:layout_height="40dp" android:layout_weight="1" android:text="Symp" android:textSize="8sp"/>
                      <Button android:id="@+id/btnShowAbil" android:layout_width="0dp" android:layout_height="40dp" android:layout_weight="1" android:text="Abil" android:textSize="8sp"/>
                  </LinearLayout>

                  <!-- Tab 1: Transmission -->
                  <LinearLayout android:id="@+id/tabTransmission" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical">
                      <Button android:id="@+id/upAir" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Air Transmission (10 DNA)" android:textSize="9sp"/>
                      <Button android:id="@+id/upWater" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Water Transmission (15 DNA)" android:textSize="9sp"/>
                  </LinearLayout>

                  <!-- Tab 2: Symptoms -->
                  <LinearLayout android:id="@+id/tabSymptoms" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:visibility="gone">
                      <Button android:id="@+id/upCough" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Coughing (10 DNA)" android:textSize="9sp"/>
                      <Button android:id="@+id/upOrgan" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Total Organ Failure (40 DNA)" android:textSize="9sp"/>
                  </LinearLayout>

                  <!-- Tab 3: Abilities -->
                  <LinearLayout android:id="@+id/tabAbilities" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:visibility="gone">
                      <Button android:id="@+id/upCold" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Cold Resistance (20 DNA)" android:textSize="9sp"/>
                      <Button android:id="@+id/upDrug" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="Drug Resistance (30 DNA)" android:textSize="9sp"/>
                  </LinearLayout>
              </LinearLayout>
          </RelativeLayout>
          EOF

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Virus Evolution Pro
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH="$PWD/gradle-8.5/bin:$PATH"
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: Virus-Evolution-Pro
          path: app/build/outputs/apk/debug/app-debug.apk
