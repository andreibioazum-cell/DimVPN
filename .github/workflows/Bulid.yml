name: Build SimpleClaim (block privat via click)

on:
  push: {}
  workflow_dispatch:
    inputs:
      paper_api_version:
        description: "Paper API version (у тебя: 1.21.11-R0.1-SNAPSHOT)"
        required: true
        default: "1.21.11-R0.1-SNAPSHOT"
      plugin_version:
        description: "Plugin version"
        required: true
        default: "1.0.0"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate plugin sources (Maven project)
        shell: bash
        env:
          PAPER_API_VERSION: ${{ inputs.paper_api_version }}
          PLUGIN_VERSION: ${{ inputs.plugin_version }}
        run: |
          set -euxo pipefail

          mkdir -p project/src/main/java/com/example/simpleclaim
          mkdir -p project/src/main/resources

          cat > project/pom.xml <<'EOF'
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>

            <groupId>com.example</groupId>
            <artifactId>simpleclaim</artifactId>
            <version>${env.PLUGIN_VERSION}</version>
            <packaging>jar</packaging>

            <properties>
              <maven.compiler.release>21</maven.compiler.release>
              <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
              <paper.api.version>${env.PAPER_API_VERSION}</paper.api.version>
            </properties>

            <repositories>
              <repository>
                <id>papermc</id>
                <url>https://repo.papermc.io/repository/maven-public/</url>
              </repository>
            </repositories>

            <dependencies>
              <dependency>
                <groupId>io.papermc.paper</groupId>
                <artifactId>paper-api</artifactId>
                <version>${paper.api.version}</version>
                <scope>provided</scope>
              </dependency>
            </dependencies>

            <build>
              <plugins>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-compiler-plugin</artifactId>
                  <version>3.13.0</version>
                  <configuration>
                    <release>${maven.compiler.release}</release>
                  </configuration>
                </plugin>
              </plugins>
            </build>
          </project>
          EOF

          cat > project/src/main/resources/plugin.yml <<'EOF'
          name: SimpleClaim
          version: __PLUGIN_VERSION__
          main: com.example.simpleclaim.SimpleClaimPlugin
          api-version: "1.21"
          author: generated-by-github-actions

          commands:
            scgive:
              description: Give claim tools (Creative only)
              usage: /scgive

          permissions:
            simpleclaim.tools:
              default: op
          EOF

          sed -i "s/__PLUGIN_VERSION__/${PLUGIN_VERSION}/g" project/src/main/resources/plugin.yml

          cat > project/src/main/java/com/example/simpleclaim/SimpleClaimPlugin.java <<'EOF'
          package com.example.simpleclaim;

          import org.bukkit.GameMode;
          import org.bukkit.Location;
          import org.bukkit.Material;
          import org.bukkit.NamespacedKey;
          import org.bukkit.World;
          import org.bukkit.block.Block;
          import org.bukkit.command.Command;
          import org.bukkit.command.CommandSender;
          import org.bukkit.configuration.ConfigurationSection;
          import org.bukkit.configuration.file.YamlConfiguration;
          import org.bukkit.entity.Player;
          import org.bukkit.event.EventHandler;
          import org.bukkit.event.EventPriority;
          import org.bukkit.event.Listener;
          import org.bukkit.event.block.*;
          import org.bukkit.event.entity.EntityExplodeEvent;
          import org.bukkit.event.player.PlayerInteractEvent;
          import org.bukkit.inventory.ItemFlag;
          import org.bukkit.inventory.ItemStack;
          import org.bukkit.inventory.meta.ItemMeta;
          import org.bukkit.persistence.PersistentDataContainer;
          import org.bukkit.persistence.PersistentDataType;
          import org.bukkit.plugin.java.JavaPlugin;

          import java.io.File;
          import java.io.IOException;
          import java.util.*;

          public final class SimpleClaimPlugin extends JavaPlugin implements Listener {

              private NamespacedKey keyToolType;
              private static final String TOOL_CLAIM = "claim_block";
              private static final String TOOL_UNCLAIM = "unclaim_block";

              // blockKey -> ownerUUID (owner хранится, но unclaim разрешён любому с тулом)
              private final Map<String, UUID> claimedBlocks = new HashMap<>();

              private File dataFile;
              private YamlConfiguration cfg;

              private final Map<UUID, Long> lastWarn = new HashMap<>();

              @Override
              public void onEnable() {
                  keyToolType = new NamespacedKey(this, "tool_type");

                  dataFile = new File(getDataFolder(), "claims.yml");
                  if (!getDataFolder().exists()) getDataFolder().mkdirs();

                  loadClaims();

                  getServer().getPluginManager().registerEvents(this, this);
                  getLogger().info("SimpleClaim enabled. Claimed blocks: " + claimedBlocks.size());
              }

              @Override
              public void onDisable() {
                  saveClaims();
              }

              // ===== /scgive (взять можно только в креативе) =====
              @Override
              public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {
                  if (!command.getName().equalsIgnoreCase("scgive")) return false;

                  if (!(sender instanceof Player p)) {
                      sender.sendMessage("Only players.");
                      return true;
                  }

                  if (!p.hasPermission("simpleclaim.tools")) {
                      p.sendMessage("§c[Приват] §7Нет прав.");
                      return true;
                  }

                  if (p.getGameMode() != GameMode.CREATIVE) {
                      p.sendMessage("§c[Приват] §7Взять инструменты можно только в креативе.");
                      return true;
                  }

                  ItemStack claimTool = makeTool(TOOL_CLAIM,
                          "§cПриват блока",
                          List.of("§7ПКМ по блоку — заприватить.",
                                  "§7Пока приват активен — блок §fне ломается никому§7."));

                  ItemStack unclaimTool = makeTool(TOOL_UNCLAIM,
                          "§aСнять приват блока",
                          List.of("§7ПКМ по блоку — снять приват.",
                                  "§7Снять может §fлюбой§7 у кого есть этот тул."));

                  p.getInventory().addItem(claimTool);
                  p.getInventory().addItem(unclaimTool);
                  p.sendMessage("§a[Приват] §7Инструменты выданы.");
                  return true;
              }

              private ItemStack makeTool(String type, String name, List<String> lore) {
                  ItemStack it = new ItemStack(Material.BARRIER, 1);
                  ItemMeta meta = it.getItemMeta();
                  meta.setDisplayName(name);
                  meta.setLore(lore);
                  meta.addItemFlags(ItemFlag.HIDE_ATTRIBUTES);

                  PersistentDataContainer pdc = meta.getPersistentDataContainer();
                  pdc.set(keyToolType, PersistentDataType.STRING, type);

                  it.setItemMeta(meta);
                  return it;
              }

              private boolean isTool(ItemStack it, String type) {
                  if (it == null || it.getType() == Material.AIR || !it.hasItemMeta()) return false;
                  String v = it.getItemMeta().getPersistentDataContainer().get(keyToolType, PersistentDataType.STRING);
                  return type.equals(v);
              }

              // чтобы барьер-инструмент нельзя было поставить как блок
              @EventHandler(ignoreCancelled = true, priority = EventPriority.HIGHEST)
              public void onPlace(BlockPlaceEvent e) {
                  ItemStack it = e.getItemInHand();
                  if (isTool(it, TOOL_CLAIM) || isTool(it, TOOL_UNCLAIM)) {
                      e.setCancelled(true);
                  }
              }

              // ===== Claim/Unclaim по ПКМ =====
              @EventHandler(ignoreCancelled = true, priority = EventPriority.HIGHEST)
              public void onInteract(PlayerInteractEvent e) {
                  if (!e.getAction().isRightClick()) return;
                  if (e.getClickedBlock() == null) return;

                  Player p = e.getPlayer();
                  Block b = e.getClickedBlock();
                  Location loc = b.getLocation();
                  ItemStack hand = e.getItem();

                  // Claim (кто с тулом — тот и приватит)
                  if (isTool(hand, TOOL_CLAIM)) {
                      e.setCancelled(true);

                      String k = blockKey(loc);
                      if (claimedBlocks.containsKey(k)) {
                          msg(p, "§c[Приват] §7Этот блок уже приватный.");
                          return;
                      }

                      claimedBlocks.put(k, p.getUniqueId());
                      saveClaims();
                      msg(p, "§a[Приват] §7Блок заприватен. Ломать его теперь нельзя никому (даже тебе).");
                      return;
                  }

                  // Unclaim (любой с тулом может снять)
                  if (isTool(hand, TOOL_UNCLAIM)) {
                      e.setCancelled(true);

                      String k = blockKey(loc);
                      if (!claimedBlocks.containsKey(k)) {
                          msg(p, "§c[Приват] §7Этот блок не приватный.");
                          return;
                      }

                      claimedBlocks.remove(k);
                      saveClaims();
                      msg(p, "§a[Приват] §7Приват снят.");
                      return;
                  }

                  // запрет взаимодействий с приватным блоком для всех (пока приват активен)
                  if (isClaimed(loc)) {
                      e.setCancelled(true);
                      warn(p, "§c[Приват] §7Этот блок приватный. Взаимодействовать нельзя.");
                  }
              }

              // ===== Protection: приватный блок не ломается НИКОМУ =====
              @EventHandler(ignoreCancelled = true, priority = EventPriority.HIGHEST)
              public void onBreak(BlockBreakEvent e) {
                  if (!isClaimed(e.getBlock().getLocation())) return;
                  e.setCancelled(true);
                  warn(e.getPlayer(), "§c[Приват] §7Этот блок приватный и не ломается, пока приват активен.");
              }

              // взрывы не удаляют приватные блоки
              @EventHandler(ignoreCancelled = true, priority = EventPriority.HIGHEST)
              public void onEntityExplode(EntityExplodeEvent e) {
                  e.blockList().removeIf(b -> isClaimed(b.getLocation()));
              }

              @EventHandler(ignoreCancelled = true, priority = EventPriority.HIGHEST)
              public void onBlockExplode(BlockExplodeEvent e) {
                  e.blockList().removeIf(b -> isClaimed(b.getLocation()));
              }

              // поршни не двигают приватные блоки
              @EventHandler(ignoreCancelled = true, priority = EventPriority.HIGHEST)
              public void onPistonExtend(BlockPistonExtendEvent e) {
                  for (Block b : e.getBlocks()) {
                      if (isClaimed(b.getLocation())) { e.setCancelled(true); return; }
                  }
              }

              @EventHandler(ignoreCancelled = true, priority = EventPriority.HIGHEST)
              public void onPistonRetract(BlockPistonRetractEvent e) {
                  for (Block b : e.getBlocks()) {
                      if (isClaimed(b.getLocation())) { e.setCancelled(true); return; }
                  }
              }

              @EventHandler(ignoreCancelled = true, priority = EventPriority.HIGHEST)
              public void onBurn(BlockBurnEvent e) {
                  if (isClaimed(e.getBlock().getLocation())) e.setCancelled(true);
              }

              @EventHandler(ignoreCancelled = true, priority = EventPriority.HIGHEST)
              public void onFade(BlockFadeEvent e) {
                  if (isClaimed(e.getBlock().getLocation())) e.setCancelled(true);
              }

              private boolean isClaimed(Location loc) {
                  return claimedBlocks.containsKey(blockKey(loc));
              }

              private void warn(Player p, String msg) {
                  long now = System.currentTimeMillis();
                  long last = lastWarn.getOrDefault(p.getUniqueId(), 0L);
                  if (now - last < 1200) return;
                  lastWarn.put(p.getUniqueId(), now);
                  p.sendMessage(msg);
              }

              private void msg(Player p, String msg) {
                  p.sendMessage(msg);
              }

              private String blockKey(Location loc) {
                  World w = loc.getWorld();
                  return w.getUID() + ":" + loc.getBlockX() + ":" + loc.getBlockY() + ":" + loc.getBlockZ();
              }

              // ===== YAML =====
              private void loadClaims() {
                  cfg = YamlConfiguration.loadConfiguration(dataFile);
                  claimedBlocks.clear();

                  ConfigurationSection root = cfg.getConfigurationSection("blocks");
                  if (root == null) return;

                  for (String k : root.getKeys(false)) {
                      String ownerStr = root.getString(k + ".owner");
                      if (ownerStr == null) continue;
                      try { claimedBlocks.put(k, UUID.fromString(ownerStr)); }
                      catch (IllegalArgumentException ignored) {}
                  }
              }

              private void saveClaims() {
                  if (cfg == null) cfg = new YamlConfiguration();
                  cfg.set("blocks", null);

                  for (var e : claimedBlocks.entrySet()) {
                      cfg.set("blocks." + e.getKey() + ".owner", e.getValue().toString());
                  }

                  try { cfg.save(dataFile); }
                  catch (IOException ex) { getLogger().severe("Failed to save claims.yml: " + ex.getMessage()); }
              }
          }
          EOF

      - name: Build with Maven
        run: mvn -B -ntp -f project/pom.xml clean package

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: SimpleClaim-jar
          path: |
            project/target/*.jar
            !project/target/*-sources.jar
            !project/target/*-javadoc.jar
