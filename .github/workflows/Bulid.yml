          package com.gamescript.pro;

          import android.content.Context;
          import android.graphics.*;
          import android.util.AttributeSet;
          import android.view.*;

          public class GameView extends SurfaceView implements Runnable {
              Thread gameThread;
              SurfaceHolder holder;
              boolean running = false;
              Paint paint = new Paint();
              PythonInterpreter interpreter;
              
              int fps = 0;
              long frameCount = 0;
              long lastFpsTime = System.currentTimeMillis();
              
              float touchX = 0, touchY = 0;
              boolean touching = false;

              public GameView(Context context, AttributeSet attrs) {
                  super(context, attrs);
                  holder = getHolder();
                  setFocusable(true);
                  paint.setAntiAlias(true);
              }

              public void setInterpreter(PythonInterpreter interp) {
                  this.interpreter = interp;
                  interp.setGameView(this);
                  resume();
              }

              public void resume() {
                  running = true;
                  gameThread = new Thread(this);
                  gameThread.start();
              }

              public void pause() {
                  running = false;
                  try {
                      if (gameThread != null) gameThread.join();
                  } catch (InterruptedException e) {}
              }

              @Override
              public void run() {
                  while (running) {
                      long startTime = System.currentTimeMillis();
                      
                      if (holder.getSurface().isValid()) {
                          Canvas canvas = holder.lockCanvas();
                          if (canvas != null) {
                              update();
                              draw(canvas);
                              holder.unlockCanvasAndPost(canvas);
                          }
                          
                          frameCount++;
                          long now = System.currentTimeMillis();
                          if (now - lastFpsTime >= 1000) {
                              fps = (int) frameCount;
                              frameCount = 0;
                              lastFpsTime = now;
                          }
                      }
                      
                      // Target 60 FPS
                      long frameTime = System.currentTimeMillis() - startTime;
                      if (frameTime < 16) {
                          try {
                              Thread.sleep(16 - frameTime);
                          } catch (InterruptedException e) {}
                      }
                  }
              }

              void update() {
                  if (interpreter != null) {
                      interpreter.update();
                  }
              }

              void draw(Canvas canvas) {
                  if (interpreter != null) {
                      interpreter.draw(canvas, paint);
                  }
              }

              @Override
              public boolean onTouchEvent(MotionEvent event) {
                  touchX = event.getX();
                  touchY = event.getY();
                  
                  switch (event.getAction()) {
                      case MotionEvent.ACTION_DOWN:
                      case MotionEvent.ACTION_MOVE:
                          touching = true;
                          break;
                      case MotionEvent.ACTION_UP:
                      case MotionEvent.ACTION_CANCEL:
                          touching = false;
                          break;
                  }
                  return true;
              }

              public int getFPS() { return fps; }
              public int getObjectCount() { return interpreter != null ? interpreter.getObjectCount() : 0; }
              public int getVarCount() { return interpreter != null ? interpreter.getVarCount() : 0; }
              public float getTouchX() { return touchX; }
              public float getTouchY() { return touchY; }
              public boolean isTouching() { return touching; }
              public int getWidth2() { return getWidth(); }
              public int getHeight2() { return getHeight(); }
          }
